- id: origins
  title: Where Are You From?
  narration: |
    The galley is small and smells like recycled air and whatever passes for
    coffee out here. The ship hums around you — that particular frequency
    that means the drive is warm and the grav is holding. You've been aboard
    for six hours and you still don't know where anything is.

    Someone slides a mug across the table toward you. It's hot. That's about
    all you can say for it.

    "So. New crew. We're going to be in transit for a while, and I figure
    we should get to know each other. Start easy — where are you from?"
  choices:
    - label: The Core
      description: >-
        Gleaming towers, good schools, a life that looked perfect from the
        outside. You had every advantage. You walked away from all of them.
      mechanical_effects:
        race_hint: Coreworlder
        background: Core-educated
    - label: The Rim
      description: >-
        Red dust, tight communities, a sky full of nothing and everything.
        You learned to fix what broke because nobody was coming to fix it
        for you.
      mechanical_effects:
        race_hint: Colonial
        background: Rim-raised
    - label: A Ship
      description: >-
        You were born in transit. Station-raised, ship-schooled, zero-g
        before you could walk in gravity. The void isn't hostile to you —
        it's home.
      mechanical_effects:
        race_hint: Spacer
        background: Void-born
    - label: A Lab
      description: >-
        You were made. Grown, compiled, activated — the word depends on
        who's being polite. Your first memory is fluorescent light and
        someone checking a clipboard.
      mechanical_effects:
        race_hint: Uplifted
        background: Constructed
  allows_freeform: true

- id: crucible
  title: What Did You Do Before This?
  narration: |
    They nod like your answer explained something. Maybe it did. The mug
    is warm in your hands and the ship creaks softly as she adjusts course
    — a sound you'll learn to sleep through, eventually.

    "Okay, I can work with that. But nobody signs onto a crew like this
    because their career was going great. What were you doing before you
    ended up here?"
  choices:
    - label: I Gave Orders
      description: >-
        Military, command, the weight of other people's lives on your
        decisions. You know what it costs to be the one who says go.
      mechanical_effects:
        class_hint: Officer
        personality_trait: decisive
    - label: I Fixed Things
      description: >-
        Engines, systems, bodies — whatever was broken, you made it work
        again. Sometimes with the right parts. Usually without.
      mechanical_effects:
        class_hint: Engineer
        personality_trait: methodical
    - label: I Flew
      description: >-
        Ships, fighters, shuttles, anything with a stick and a throttle.
        The space between stars is just distance. You eat distance.
      mechanical_effects:
        class_hint: Pilot
        personality_trait: restless
    - label: I Survived
      description: >-
        Ran cargo, ran scams, ran from things. You kept moving because
        standing still meant getting caught, and getting caught meant
        something worse than moving.
      mechanical_effects:
        class_hint: Smuggler
        personality_trait: adaptable
    - label: I Talked
      description: >-
        Negotiated, translated, lied professionally. Words are tools and
        you know which ones open doors, which ones close them, and which
        ones are doors themselves.
      mechanical_effects:
        class_hint: Diplomat
        personality_trait: perceptive
  allows_freeform: true

- id: drive
  title: Why Did You Leave?
  narration: |
    The coffee is half gone and it hasn't gotten better. Somewhere aft,
    someone drops a wrench and swears creatively. The ship doesn't seem
    to mind.

    Your companion is quiet for a moment. Not judging — measuring. Like
    they're figuring out where you fit.

    "Here's the question that matters, though. People don't end up on a
    ship like this because everything was fine. Something pushed you out
    the airlock. What was it?"
  choices:
    - label: Someone I Lost
      description: >-
        They're gone, or missing, or waiting somewhere you can't reach yet.
        Everything since then has been motion — filling the shape of where
        they were.
      mechanical_effects:
        relationship: lost_beloved
        goals: find_what_was_lost
        emotional_state: quietly grieving
    - label: A Debt
      description: >-
        Not money. Something worse. A promise you broke, a betrayal you
        can't undo, a life you owe. It follows you like engine noise —
        always there, even when you stop hearing it.
      mechanical_effects:
        relationship: creditor
        goals: settle_a_debt
        emotional_state: burdened
    - label: Nowhere Left
      description: >-
        The place you were is gone. Not metaphorically — gone. Burned,
        annexed, collapsed, quarantined. Forward is the only direction
        that exists.
      mechanical_effects:
        relationship: displaced_community
        goals: find_belonging
        emotional_state: determined
    - label: Curiosity
      description: >-
        You wanted to see what was out there. That's it. No tragedy, no
        vendetta, no dark past. Just a need to know what's on the other
        side of the next jump point. Is that so strange?
      mechanical_effects:
        relationship: wanderlust
        goals: explore_the_unknown
        emotional_state: wide-eyed
  allows_freeform: true

- id: role
  title: What Do You Bring?
  narration: |
    They lean back. The chair squeaks against the deck plate. Through the
    bulkhead you can hear the rest of the crew — voices, footsteps, the
    particular rhythm of people who've learned to live in a metal tube
    together. You're not part of that rhythm yet.

    "Last question. I'm not asking what you can do — I'll see that soon
    enough. I'm asking what you bring to a crew. When it all goes sideways
    and we're three days from anywhere, what do you have that we need?"
  choices:
    - label: Steady Hands
      description: >-
        When everything goes wrong, you get calm. Not brave — calm. The
        panic doesn't reach your hands. People notice that about you.
      mechanical_effects:
        personality_trait: steady
    - label: A Sharp Mouth
      description: >-
        You talk fast, think faster, and people listen before they realize
        they've been convinced. It's not charm — it's velocity.
      mechanical_effects:
        personality_trait: quick-witted
    - label: Loyalty
      description: >-
        Once you're in, you're in. You don't leave people behind, you
        don't sell people out, and that is not negotiable. It's cost you
        before. You'd pay it again.
      mechanical_effects:
        personality_trait: loyal
    - label: The Wrong Kind of Luck
      description: >-
        Things happen around you. Interesting things. Unlikely things.
        The kind of things that make for great stories and terrible
        insurance premiums.
      mechanical_effects:
        personality_trait: trouble-magnet
  allows_freeform: true

- id: confirmation
  title: Welcome Aboard
  narration: |
    They drain their mug, wince at the last sip, and stand. For a moment
    they look at you like they're seeing something — not what you said,
    but what you didn't.

    "Welcome aboard, {name}. Stow your gear in bunk seven. We jump in
    an hour, and after that it's all new sky."

    The {class} from {race} space. The ship hums around you, and for the
    first time in a while, the sound doesn't feel like someone else's
    home.

    It feels like yours might.
  choices: []
  allows_freeform: false
