affinities:
  - name: Command
    description: "Leadership, tactics, and the weight of making the hard call."
    triggers:
      - "leading the crew through a crisis"
      - "making tactical decisions under pressure"
      - "taking responsibility for a bad outcome"
      - "coordinating crew actions in ship combat"
      - "inspiring someone who was ready to give up"
    tier_thresholds: [6, 15, 30]

  - name: Grit
    description: "Survival, toughness, and doing more with less than you should have."
    triggers:
      - "enduring physical hardship or injury"
      - "improvising with limited resources"
      - "refusing to quit when the odds are impossible"
      - "taking damage and staying on your feet"
      - "surviving vacuum, zero-g, or hostile environment"
    tier_thresholds: [6, 15, 30]

  - name: Savvy
    description: "Street smarts, deal-making, and reading a room before it reads you."
    triggers:
      - "successful negotiation or deal-making"
      - "reading a situation correctly before it goes wrong"
      - "navigating social danger or political intrigue"
      - "detecting a lie or hidden agenda"
      - "talking your way out of a fight"
    tier_thresholds: [6, 15, 30]

  - name: Craft
    description: "Technical skill — fixing, building, healing, making things work."
    triggers:
      - "repairing critical systems under pressure"
      - "saving a life with medical skill"
      - "building or modifying equipment"
      - "solving a technical problem no one else could"
      - "keeping the ship running past her limits"
    tier_thresholds: [6, 15, 30]

  - name: Kinship
    description: "Crew bonds, loyalty, and the found family you chose to keep."
    triggers:
      - "protecting a crewmate at personal cost"
      - "meaningful conversation that deepens a bond"
      - "sacrificing personal gain for the crew"
      - "resolving interpersonal conflict without violence"
      - "welcoming someone new into the crew"
    tier_thresholds: [6, 15, 30]

  - name: Horizon
    description: "Exploration, curiosity, and the pull of what's on the other side."
    triggers:
      - "discovering a new place or phenomenon"
      - "making first contact with an alien culture"
      - "learning alien customs or languages"
      - "choosing the unknown path over the safe one"
      - "mapping uncharted space or territory"
    tier_thresholds: [6, 15, 30]

# Psionics/powers are NOT an affinity. They are a narrative condition —
# something that was done TO you, not something you earned. Powers come
# from experimentation, protomolecule-equivalent exposure, or similar
# violation. They are plot, not progression. See magic_design.md.

milestone_categories:
  - survival
  - connection
  - discovery
  - sacrifice
  - audacity

milestones_per_level: 3
max_level: 8

level_bonuses:
  "1": "Starting crew. You know each other's names."
  "2": "The crew has survived something together. Bonds are forming."
  "3": "You trust each other in a fight. Crew combat coordination improves."
  "4": "The ship feels like home. Ship condition tracks gain a buffer."
  "5": "Reputation precedes you. NPCs have heard of your crew."
  "6": "The crew operates as a unit. Multiple station actions per round."
  "7": "Legends of the lane. Factions seek you out — as allies or targets."
  "8": "Whatever comes next, you face it together. Peak crew synergy."

wealth_tiers:
  - max_credits: 500
    label: Broke
    description: "Scraping by. Can't afford fuel. Eating ration paste."
  - max_credits: 2000
    label: Working
    description: "Pays the bills, barely. Ship runs. Crew grumbles."
  - max_credits: 5000
    label: Comfortable
    description: "Ship runs well, crew eats real food, shore leave happens."
  - max_credits: 15000
    label: Prosperous
    description: "Upgrades, good quarters, the kind of ship people notice."
  - max_credits: 50000
    label: Wealthy
    description: "Nice ship, reputation, options. People come to you."
  - max_credits: null
    label: Magnate
    description: "Fleet, influence, political weight. People owe you favors."
