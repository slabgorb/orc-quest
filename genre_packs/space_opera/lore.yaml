world_name: The Inhabited Galaxy
setting_anchor: >-
  The Inhabited Galaxy. Humanity spread through the stars via jump points —
  natural wormholes that connect distant systems — and found they were not
  alone.
history: >-
  Humanity discovered the first jump point two centuries ago and poured
  through it like water through a crack. Colony ships, corporate ventures,
  military expeditions, refugee flights — everyone had a reason to leave
  Earth behind. The core systems organized into the Hegemony, a sprawling
  bureaucratic authority that maintains order through regulation, trade
  control, and the quiet threat of fleet power. The rim stayed wild —
  frontier worlds where the law is whatever the local strongman says it is.
  Between them, the spacers: born on ships, loyal to crews, owing nothing
  to any government. And then there are the aliens — some friendly, some
  incomprehensible, some terrifying. The galaxy is vast and full of people
  who disagree about how to live in it.
factions:
  - name: The Hegemony
    description: >-
      The central human authority. A bureaucratic empire that controls the
      core systems through regulation, trade policy, and fleet presence.
      Not evil, exactly — just convinced that order requires control, and
      that they're the ones qualified to provide it.
    disposition: neutral
  - name: Rim Confederacy
    description: >-
      A loose alliance of frontier worlds, free ports, and independent
      stations. United mainly by their refusal to submit to Hegemonic
      authority. More of an idea than an institution — "we govern ourselves"
      is the only policy they agree on.
    disposition: friendly
  - name: The Guilds
    description: >-
      Merchant and trade guilds that operate across both Hegemonic and
      Rim space. Pragmatic, profit-driven, and politically neutral — they
      sell to everyone and owe loyalty to no government. The Free Traders
      are their backbone.
    disposition: neutral
  - name: Void Clans
    description: >-
      Spacer families who've lived on ships for generations. They have
      their own customs, their own laws, their own superstitions. They
      don't belong to any system — they belong to the void and to each
      other.
    disposition: neutral
cosmology: >-
  The galaxy is natural — no gods, no cosmic force, no destiny. Jump points
  are natural wormholes, not magical portals. Alien species evolved
  independently. The universe is indifferent. What meaning exists, people
  make for themselves. If there are things that seem supernatural — psionics,
  alien artifacts, protomolecule-equivalents — they have explanations, even
  if those explanations are terrifying. The galaxy is not magical. It is
  merely vast, and vastness is frightening enough.
geography: >-
  Space is organized by jump point networks. Core systems cluster around
  dense jump point intersections — wealthy, regulated, cosmopolitan. Rim
  systems sit at the edges of the network — fewer connections, more
  independence, harsher conditions. Between them, the lanes: trade routes
  that connect the inhabited galaxy. Some systems are cul-de-sacs — one
  jump point in, one jump point out. These are the frontier's frontier,
  where the desperate and the determined end up. And beyond the mapped
  network, there are jump points nobody's charted. What's on the other
  side is anyone's guess.
