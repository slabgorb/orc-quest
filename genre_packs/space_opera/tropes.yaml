- id: the_project
  name: The Project
  description: >-
    Someone with resources and no ethics ran an experiment — psionics,
    bioweapons, alien tech, forced evolution. The results got loose,
    or the test subjects escaped, or the data leaked. Now powerful people
    want it back and don't care who gets hurt in the recovery. The crew
    is in the way. Miranda. Protomolecule. River Tam. That thing in the
    lab that shouldn't exist.
  category: revelation
  triggers:
    - discovery of classified data
    - encounter with modified individuals
    - contact with alien technology
  narrative_hints:
    - coded transmissions on abandoned frequencies
    - people in suits asking questions at the last port
    - a crewmember's past doesn't add up
  tension_level: 0.8
  resolution_hints:
    - expose the project to the public
    - destroy the research and everyone who knows
    - negotiate with the project's creators from a position of strength
    - protect the subject and disappear
  tags: [institutional, secret, psionics, hubris, cover-up]
  escalation:
    - at: 0.2
      event: >-
        The crew encounters something that doesn't fit — a person with
        abilities that shouldn't exist, or tech that no one recognizes.
        It seems like a curiosity, not a threat.
      npcs_involved: [Burned Operative]
      stakes: Curiosity. No immediate danger.
    - at: 0.4
      event: >-
        Someone comes looking. Company officers arrive at the last station
        asking about the crew's recent activities. Data cores are
        remotely wiped. A contact goes silent.
      npcs_involved: [Company Officer]
      stakes: The crew is on a list now.
    - at: 0.6
      event: >-
        A recovery team intercepts the crew. Professional, well-equipped,
        operating outside normal authority. They want something specific
        and are willing to kill for it.
      npcs_involved: [Company Officer, Burned Operative]
      stakes: Direct violence. Someone could die.
    - at: 0.8
      event: >-
        The scope of the project becomes clear. This isn't one experiment —
        it's a program. Other subjects exist. Other crews have been
        silenced. The crew now knows enough to be a permanent threat.
      npcs_involved: [Company Officer]
      stakes: The crew can never go back to not knowing.
    - at: 1.0
      event: >-
        The project's creators decide the crew is a liability. Full
        resources deployed — military assets, media blackout, warrants
        in every system. Run, fight, or burn it all down.
      npcs_involved: [Company Officer, Burned Operative]
      stakes: Total pursuit. The crew's old life is over.
  passive_progression:
    rate_per_turn: 0.008
    rate_per_day: 0.015
    accelerators:
      - investigate
      - research
      - classified
      - experiment
      - psionics
    decelerators:
      - hide
      - lay low
      - destroy evidence
      - run
    accelerator_bonus: 0.05
    decelerator_penalty: 0.03

- id: crew_fracture
  name: Crew Fracture
  description: >-
    The found family is under stress. A disagreement about the mission,
    a secret that surfaces, a betrayal of trust — something is pulling
    the crew apart. This is the emotional core of space opera: the
    people you chose might unchoose you.
  category: conflict
  triggers:
    - crew disagreement about a major decision
    - discovery of a crewmate's secret
    - one crewmate endangering others
  narrative_hints:
    - meals eaten alone instead of together
    - clipped responses over the comm
    - someone spending too much time in their bunk
  tension_level: 0.6
  resolution_hints:
    - honest conversation that clears the air
    - a crisis that forces the crew to rely on each other
    - someone leaves the crew (temporarily or permanently)
    - the crew changes course to honor the dissenter's concern
  tags: [crew, interpersonal, found-family, trust]
  escalation:
    - at: 0.2
      event: >-
        A decision splits the crew. Two positions, both reasonable,
        no compromise in sight. The argument is civil but real.
      npcs_involved: []
      stakes: Hurt feelings. Tension at meals.
    - at: 0.4
      event: >-
        The disagreement hardens into sides. Crew members start avoiding
        each other. Someone says something they can't take back.
      npcs_involved: []
      stakes: Crew bonds weakening.
    - at: 0.6
      event: >-
        A crewmate makes a unilateral decision that affects everyone.
        Trust is damaged. The ship feels smaller.
      npcs_involved: []
      stakes: A bond may break permanently.
    - at: 0.8
      event: >-
        Someone packs a bag. Or someone's been contacted by an outside
        offer. The crew is one bad conversation from losing a member.
      npcs_involved: [Station Bartender]
      stakes: The family might lose someone.
    - at: 1.0
      event: >-
        The breaking point. A crewmate walks, or the crew must make an
        impossible choice between two of their own. Whatever happens
        next, the crew will be different.
      npcs_involved: []
      stakes: The found family is tested to destruction.
  passive_progression:
    rate_per_turn: 0.01
    rate_per_day: 0.02
    accelerators:
      - argue
      - secret
      - betray
      - lie
      - alone
    decelerators:
      - talk
      - apologize
      - share
      - crew meal
      - together
    accelerator_bonus: 0.04
    decelerator_penalty: 0.04

- id: hegemonic_tightening
  name: The Hegemony Tightens
  description: >-
    The central authority is expanding its reach. New regulations, new
    patrols, new checkpoints. What used to be frontier freedom is becoming
    controlled space. The crew's way of life — independent, ungoverned,
    free — is being squeezed.
  category: political
  triggers:
    - encounter with new hegemonic regulations
    - patrol stops in previously free space
    - a free port comes under hegemonic control
  narrative_hints:
    - new transponder requirements at jump points
    - hegemonic recruitment posters on rim stations
    - free traders complaining about new tariffs
  tension_level: 0.5
  resolution_hints:
    - organize rim resistance
    - find a corrupt official to exploit
    - go deeper into uncontrolled space
    - negotiate a charter that preserves some autonomy
  tags: [political, faction, freedom, authority]
  escalation:
    - at: 0.2
      event: >-
        New regulations at a familiar port. Registration fees, cargo
        inspections, questions about the crew manifest. Annoying but
        manageable.
      npcs_involved: [Company Officer]
      stakes: Inconvenience. Time and money.
    - at: 0.4
      event: >-
        A free port the crew uses regularly is brought under hegemonic
        authority. Old contacts are nervous. Some have left.
      npcs_involved: [Free Trader, Company Officer]
      stakes: Loss of safe harbor.
    - at: 0.6
      event: >-
        The crew's ship is flagged for detailed inspection. Someone in
        authority is interested in them specifically — not just routine.
      npcs_involved: [Company Officer]
      stakes: Contraband, unregistered crew, or past crimes could surface.
    - at: 0.8
      event: >-
        Independent ships are being impounded. Crews are given the choice:
        register with the hegemony or be classified as smugglers. The
        frontier is closing.
      npcs_involved: [Company Officer, Free Trader]
      stakes: The crew's independence is at risk.
    - at: 1.0
      event: >-
        Full military presence in formerly free space. Blockades at jump
        points. The crew must choose: submit, fight, or find a way
        through that nobody's mapped.
      npcs_involved: [Company Officer]
      stakes: Freedom or compliance. No middle ground.
  passive_progression:
    rate_per_turn: 0.005
    rate_per_day: 0.01
    accelerators:
      - smuggle
      - evade
      - resist
      - illegal
    decelerators:
      - comply
      - register
      - cooperate
      - bribe
    accelerator_bonus: 0.04
    decelerator_penalty: 0.03

- id: ghost_ship
  name: Ghost Ship
  description: >-
    Something is out there in the dark between stars. A derelict ship
    broadcasting on an old frequency. A station that stopped responding.
    A route that ships enter and don't leave. The void has a secret and
    it's drifting toward the crew.
  category: revelation
  triggers:
    - detection of unknown signal
    - discovery of abandoned vessel
    - unexplained disappearance on a known route
  narrative_hints:
    - static on comms that almost sounds like words
    - a salvage listing that nobody will bid on
    - voidborn spacers making warding signs
  tension_level: 0.7
  resolution_hints:
    - board the derelict and discover the truth
    - destroy it from a safe distance and live with not knowing
    - sell the coordinates and let someone else deal with it
    - the truth is worse than the mystery
  tags: [mystery, void, horror, unknown, alien]
  escalation:
    - at: 0.2
      event: >-
        A signal. Old encoding, repeating. The ship's computer flags it
        as a distress call but the format hasn't been used in decades.
      npcs_involved: [Grease Monkey]
      stakes: Curiosity vs caution.
    - at: 0.4
      event: >-
        Visual contact. A ship, dark, drifting. No power signatures but
        the hull is intact. The registry comes back to a vessel reported
        lost years ago.
      npcs_involved: [Grease Monkey]
      stakes: Salvage value vs the reason it's empty.
    - at: 0.6
      event: >-
        The crew boards or scans in detail. Something is wrong. The
        interior doesn't match the exterior dimensions. Or the crew
        is still there, technically. Or the cargo hold contains
        something that shouldn't exist.
      npcs_involved: [Ship's Doctor]
      stakes: What they find cannot be unfound.
    - at: 0.8
      event: >-
        Whatever is on that ship is now aware of the crew. Or the
        crew realizes this isn't a derelict — it's a trap, or a test,
        or something that was waiting to be found.
      npcs_involved: [Ship's Doctor, Burned Operative]
      stakes: The crew is no longer the hunter.
    - at: 1.0
      event: >-
        The truth. Alien artifact. Failed experiment. Time anomaly.
        Something that changes what the crew thought they knew about
        the galaxy. And now they have to decide what to do with it.
      npcs_involved: [Xeno Cultural Liaison]
      stakes: Knowledge that powerful people will kill for.
  passive_progression:
    rate_per_turn: 0.005
    rate_per_day: 0.008
    accelerators:
      - investigate
      - scan
      - board
      - signal
      - derelict
    decelerators:
      - ignore
      - leave
      - retreat
      - jump away
    accelerator_bonus: 0.05
    decelerator_penalty: 0.04

- id: reputation_precedes
  name: Reputation Precedes You
  description: >-
    The crew is becoming known. Their deeds — good, bad, or complicated —
    are spreading through the ports and lanes. People recognize the ship.
    People have opinions about the crew. Fame is a currency, but it spends
    in ways you can't always control.
  category: economic
  triggers:
    - completing a high-profile job
    - being seen in a memorable situation
    - a patron or enemy spreading word about the crew
  narrative_hints:
    - strangers nodding at the ship's name
    - a dock rat asking for the captain's autograph
    - a job offer that arrives before the crew even docks
  tension_level: 0.3
  resolution_hints:
    - lean into the reputation and build a legend
    - rebrand and disappear
    - use the reputation as leverage in a major negotiation
    - discover the reputation has been manipulated by someone else
  tags: [reputation, social, crew, fame, consequence]
  escalation:
    - at: 0.2
      event: >-
        A free trader mentions the crew by name at a port they've never
        visited. The story is mostly accurate. Mostly.
      npcs_involved: [Free Trader]
      stakes: Attention. Not necessarily unwanted.
    - at: 0.4
      event: >-
        Better jobs, better rates, better berths. But also harder
        questions from authorities and jealous looks from competitors.
        The crew's name opens doors and closes others.
      npcs_involved: [Free Trader, Station Bartender]
      stakes: The crew can no longer be anonymous.
    - at: 0.6
      event: >-
        Someone is trading on the crew's name — impersonating them,
        blaming them for things they didn't do, or using their reputation
        to set a trap.
      npcs_involved: [Dock Rat, Burned Operative]
      stakes: Identity theft with real consequences.
    - at: 0.8
      event: >-
        A faction approaches with a proposition that assumes the crew
        is who the stories say they are. The job is enormous. The
        payment is life-changing. The assumption may be wrong.
      npcs_involved: [Company Officer, Diplomat]
      stakes: Take the job and become the legend, or admit the limits.
    - at: 1.0
      event: >-
        The crew's reputation has made them a symbol. People rally
        to them, or rally against them. They can't walk into a port
        without being recognized. The legend has outgrown the people.
      npcs_involved: [Station Bartender, Xeno Cultural Liaison]
      stakes: The crew must decide who they actually are.
  passive_progression:
    rate_per_turn: 0.008
    rate_per_day: 0.015
    accelerators:
      - famous
      - public
      - heroic
      - notorious
      - broadcast
    decelerators:
      - disguise
      - low profile
      - anonymous
      - quiet
    accelerator_bonus: 0.04
    decelerator_penalty: 0.03
