  rest:
    - path: audio/music/rest.ogg
      title: "Ship-Time 0300"
      bpm: 60
  galley:
    - path: audio/music/galley.ogg
      title: "Bad Coffee, Good Company"
      bpm: 85
  drift:
    - path: audio/music/drift.ogg
      title: "Between the Stars"
      bpm: 55
  docking:
    - path: audio/music/docking.ogg
      title: "Port of Call"
