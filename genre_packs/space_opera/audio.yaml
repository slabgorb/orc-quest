sfx_library:
  blaster_fire:
    - audio/sfx/blaster_fire.ogg
  blaster_impact:
    - audio/sfx/blaster_impact.ogg
  ship_hum:
    - audio/sfx/ship_hum.ogg
  airlock_cycle:
    - audio/sfx/airlock_cycle.ogg
  hull_creak:
    - audio/sfx/hull_creak.ogg
  alarm_klaxon:
    - audio/sfx/alarm_klaxon.ogg
  decompression:
    - audio/sfx/decompression.ogg
  jump_drive:
    - audio/sfx/jump_drive.ogg
  comms_chatter:
    - audio/sfx/comms_chatter.ogg
  footsteps_metal:
    - audio/sfx/footsteps_metal.ogg
  door_hiss:
    - audio/sfx/door_hiss.ogg
  engine_failure:
    - audio/sfx/engine_failure.ogg
  docking_clamp:
    - audio/sfx/docking_clamp.ogg

creature_voice_presets:
  synthetic:
    creature_type: synthetic
    description: "Calm, measured voice with subtle digital processing"
    pitch: 1.0
    rate: 0.95
    effects:
      - type: highpass_filter
        params:
          cutoff_hz: 200
  xeno_deep:
    creature_type: xeno_deep
    description: "Low, resonant alien voice with harmonic undertones"
    pitch: 0.6
    rate: 0.7
    effects:
      - type: reverb
        params:
          room_size: 0.5
  xeno_light:
    creature_type: xeno_light
    description: "Quick, high-pitched alien voice with clicking cadence"
    pitch: 1.4
    rate: 1.2
    effects:
      - type: highpass_filter
        params:
          cutoff_hz: 400

mixer:
  music_volume: 0.35
  sfx_volume: 0.7
  voice_volume: 1.0
  duck_music_for_voice: true
  duck_amount_db: -12.0
  crossfade_default_ms: 4000

ai_generation:
  enabled: true
  model: musicgen_small
  max_generation_time_s: 15
  cache_generated: true
