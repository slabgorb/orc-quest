currency:
  name: credits
  denominations:
    - credits
    - kilocredits

item_catalog:
  # --- WEAPONS ---
  - id: blaster_sidearm
    name: Sidearm Blaster
    description: Standard-issue energy pistol, reliable and unimpressive.
    category: weapon
    value: 150
    weight: 1.0
    rarity: common
    power_level: 1
    tags: [ranged, energy, one-handed, sidearm]
    lore: Every station market has a bin of these. They all work. Mostly.
    narrative_weight: 0.1

  - id: blaster_rifle
    name: Blaster Rifle
    description: Military-grade energy rifle with adjustable output.
    category: weapon
    value: 500
    weight: 3.0
    rarity: uncommon
    power_level: 2
    tags: [ranged, energy, two-handed, military]
    lore: Hegemonic standard issue. Serial numbers filed off on the rim.
    narrative_weight: 0.2

  - id: vibroknife
    name: Vibroknife
    description: Oscillating blade for close work. Quiet. Personal.
    category: weapon
    value: 80
    weight: 0.5
    rarity: common
    power_level: 1
    tags: [melee, blade, one-handed, silent]
    lore: Operatives carry them. So do cooks. Hard to tell which is which.
    narrative_weight: 0.1

  - id: stun_baton
    name: Stun Baton
    description: Electroshock compliance tool. Non-lethal, technically.
    category: weapon
    value: 120
    weight: 1.5
    rarity: common
    power_level: 1
    tags: [melee, electric, one-handed, non-lethal]
    lore: Station security's best friend. Leaves bruises, not bodies.
    narrative_weight: 0.1

  # --- ARMOR ---
  - id: flight_suit
    name: Flight Suit
    description: Insulated shipboard suit with light ballistic weave.
    category: armor
    value: 200
    weight: 2.0
    rarity: common
    power_level: 1
    tags: [light, shipboard, pressure-rated]
    lore: Won't stop a rifle bolt but it'll keep you warm in a hull breach.
    narrative_weight: 0.1

  - id: tactical_vest
    name: Tactical Vest
    description: Armored vest with plate inserts and mag pouches.
    category: armor
    value: 600
    weight: 4.0
    rarity: uncommon
    power_level: 2
    tags: [medium, ballistic, military]
    lore: Frontier militia standard. Stops fragmentation. Probably.
    narrative_weight: 0.2

  # --- CONSUMABLES ---
  - id: medpatch
    name: Medpatch
    description: Adhesive trauma patch with coagulant and local anesthetic.
    category: consumable
    value: 25
    weight: 0.1
    rarity: common
    power_level: 1
    tags: [healing, medical, single-use]
    lore: Peel, stick, stop bleeding. Instructions in twelve languages.
    narrative_weight: 0.1

  - id: stim_pack
    name: Stim Pack
    description: Adrenaline cocktail injector. Keeps you moving when you shouldn't be.
    category: consumable
    value: 40
    weight: 0.1
    rarity: common
    power_level: 1
    tags: [stimulant, medical, single-use]
    lore: Ship's doctors hate them. Ship's doctors also carry three at all times.
    narrative_weight: 0.2

  - id: ration_pack
    name: Ration Pack
    description: Vacuum-sealed meal substitute. Technically food.
    category: consumable
    value: 5
    weight: 0.3
    rarity: common
    power_level: 0
    tags: [food, survival]
    lore: Tastes like cardboard seasoned with regret. Keeps you alive.
    narrative_weight: 0.0

  # --- TOOLS ---
  - id: multitool_engineer
    name: Engineer's Multitool
    description: Magnetic ratchet, plasma cutter, diagnostic probe, and wire stripper in one handle.
    category: tool
    value: 300
    weight: 1.0
    rarity: common
    power_level: 1
    tags: [repair, engineering, shipboard]
    lore: An engineer without their multitool is just a person with opinions.
    narrative_weight: 0.2

  - id: medkit_field
    name: Field Medkit
    description: Portable trauma kit with sutures, antiseptic, bone-set foam, and a prayer.
    category: tool
    value: 350
    weight: 2.0
    rarity: common
    power_level: 1
    tags: [medical, healing, reusable]
    lore: The good ones are battered. The clean ones haven't been tested.
    narrative_weight: 0.2

  - id: datapad
    name: Datapad
    description: Handheld terminal for comms, navigation, and looking busy.
    category: tool
    value: 100
    weight: 0.5
    rarity: common
    power_level: 0
    tags: [electronic, comms, navigation]
    lore: Everyone has one. Nobody's is fully charged.
    narrative_weight: 0.0

  - id: scanner_handheld
    name: Handheld Scanner
    description: Multi-spectrum sensor for life signs, atmosphere composition, and energy signatures.
    category: tool
    value: 450
    weight: 1.0
    rarity: uncommon
    power_level: 2
    tags: [electronic, sensor, survey]
    lore: Points at things and tells you what they are. Usually right.
    narrative_weight: 0.2

  # --- TREASURE ---
  - id: jump_key
    name: Jump Key
    description: Encrypted navigation data for a specific jump route. Worth more than the ship that carries it.
    category: treasure
    value: 5000
    weight: 0.1
    rarity: rare
    power_level: 3
    tags: [navigation, data, valuable]
    lore: Some routes aren't in the public charts. The people who mapped them are often dead.
    narrative_weight: 0.7

