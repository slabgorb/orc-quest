philosophy:
  carry_limit: 0
  restricted_categories: []
  progression_gates: {}
  notes: >-
    Inventory is not the point of space opera. The ship carries the heavy
    stuff. Personal gear is what's on your belt and in your bunk. We track
    items that matter narratively — the gun, the medkit, the thing someone
    gave you — not every ration bar and spare battery. If it doesn't drive
    a scene, it doesn't need to be in the inventory.
