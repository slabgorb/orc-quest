- name: The Sealed Lane
  era: "pre-human"
  summary: >-
    Spacers and prospectors tell a story about why Coyote Reach has
    only one jump point. Every other system in the local cluster has
    at least two — most have three or four. The accepted theory is
    simple astrophysics: the star's mass and position just didn't
    produce more than one stable wormhole. But the voidborn
    star-readers say the charts don't support that. The gravitational
    signature suggests there should be a second jump point on the far
    side of the system, out past where Last Drift begins. It's not
    there. The Tsveri, when asked, use a word that translates roughly
    as "closed" — not absent, not collapsed. Closed. As if someone
    shut it.
  cultural_impact: >-
    The Tsveri's refusal to explain shapes every interaction between
    them and human settlers. It is the silence at the center of
    coexistence.
  affected_cultures: [Tsveri, Voidborn]
  terrain_scars:
    - type: anomaly
      name: The Absent Gate
      region: last_drift
      description: >-
        The gravitational signature of a jump point that should exist
        but doesn't. Instruments detect the mass shadow but find
        nothing there — no wormhole throat, no transit corridor, just
        a region of space that bends light wrong and makes navigation
        computers return errors they weren't programmed to produce.
    - type: geological
      name: The Structured Deposits
      region: deep_root_world
      description: >-
        The Deep Root mountains contain mineral formations that don't
        match any known geological process. The rare-earth deposits
        are arranged in patterns that geologists privately describe as
        "structured" — too regular for natural deposition, too vast
        for any known engineering.

- name: Mendes' Run
  era: "founding"
  summary: >-
    The first human to jump into Coyote Reach was a prospector named
    Cado Mendes, flying a converted cargo shuttle with a jury-rigged
    jump drive and more nerve than sense. He came through the jump
    point, found an uncharted system with a breathable world, and
    staked the first claim. The story goes that he landed on the
    habitable planet, drove a survey spike into the ground, and said
    "this'll do." The settlement that grew there is still called
    Far Landing. Mendes made three more runs before his jump drive
    failed on the return trip. His granddaughter Dura runs the Free
    Miners' Compact now, and she keeps his survey spike on her desk.
  cultural_impact: >-
    Far Landing's identity as a place for people who want to disappear
    traces directly to Mendes. The settlement attracts the desperate
    and the determined in equal measure.
  affected_cultures: [Frontier]
  terrain_scars:
    - type: monument
      name: Mendes' Spike
      region: far_landing
      description: >-
        Mendes' original survey spike still stands at the center of
        Far Landing's oldest district — a corroded metal rod driven
        into alkaline hardpan, surrounded by buildings that grew up
        around it like a town around a well. It's not a monument.
        Nobody put a plaque on it. It's just there, and everyone
        knows what it is.

- name: The Long Hum
  era: "ongoing"
  summary: >-
    Prospectors who push past Red Prospect into the outer system
    report a low-frequency signal — not a transmission, not a beacon,
    just a persistent vibration at the edge of sensor range. It
    doesn't repeat in any pattern anyone can identify. It doesn't
    respond to hails. It gets stronger the further out you go, which
    is backwards — signals weaken with distance from their source,
    and this one seems to have no source at all. Ship crews call it
    the Long Hum. Most people who've heard it describe it as
    unsettling in a way they can't articulate. The voidborn
    star-readers say it sounds like something breathing. The Tsveri
    will not discuss it.
  cultural_impact: >-
    The Long Hum is a campfire story and a superstition. Voidborn
    crews won't transit the outer system without ritual. Some
    prospectors have made good money running claims out there
    specifically because most people won't go.
  affected_cultures: [Voidborn, Tsveri]
  terrain_scars:
    - type: anomaly
      name: The Hum Field
      region: last_drift
      description: >-
        Sensor readings in the outer system show a diffuse energy
        signature that doesn't correspond to any known stellar or
        planetary source. It occupies a volume of space roughly
        where a jump point should be, and it fluctuates in a rhythm
        that is not random but is not any recognizable pattern. Ships
        that spend too long in the area report navigational drift,
        clock desynchronization, and crew unease that manifests as
        a conviction that something very large is very close — despite
        instruments showing empty space in every direction.
