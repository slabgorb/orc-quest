world_name: Coyote Reach
setting_anchor: >-
  One jump point in, one jump point out. Coyote Reach is the frontier's
  frontier — a cul-de-sac system where the Hegemony's writ runs thin
  and everyone else has been here longer.
history: >-
  The system was charted sixty-odd years ago by a Hegemonic survey team
  that found a marginal yellow star, a rocky habitable world, a gas
  giant, an asteroid belt, and not much else worth reporting. They filed
  their claim and moved on. The frontier came first — wildcatters and
  prospectors who jumped in looking for claims too far from authority
  to attract attention. They found decent ore in the asteroid belt and
  a habitable world that was ugly but breathable, and they stayed.

  The voidborn came next. Clan Moana-Teru brought three station hulls
  through the jump point and set up a refueling waypoint at the gas
  giant. Within a decade they'd built a proper freeport — Turning Hub —
  and were taking a cut of everything that moved through the system.
  The frontier miners needed fuel and repair; the voidborn needed cargo
  and customers. It worked.

  What nobody expected was the Tsveri. The frontier miners pushed deeper
  into the inner system and found them on the second world — a species
  that had been there for thousands of years, quiet, patient, and
  profoundly uninterested in humanity's arrival. The Tsveri claimed no
  territory except a single mountain range they called the Deep Root,
  and the early settlers were happy to leave them to it. The mountain
  range had no ore worth extracting, and the Tsveri traded occasionally
  in materials nobody else could manufacture. It was a good arrangement.

  Then the Hegemony arrived. Governor Vaskov brought a patrol cruiser,
  a customs station, and a mandate to bring Coyote Reach into compliance
  with Hegemonic trade law. That was twenty-three years ago. The
  cruiser is still here. The customs station sits at the jump point.
  Compliance is a work in progress. Vaskov governs from the planet,
  issues regulations nobody follows, and sends quarterly reports to a
  Hegemonic admiralty that stopped reading them a decade ago. The real
  power in the system is whoever has fuel, ore, and friends — and none
  of those belong to the governor.

  Recently, the mining consortiums have been pushing into the Deep Root
  range. New surveys found rare-earth deposits under Tsveri sacred
  ground. The Tsveri have said no. The miners have not stopped asking.
  Governor Vaskov sees tax revenue. Clan Moana-Teru sees a fight that's
  bad for business. And out past the gas giant, prospectors have been
  reporting things that don't make sense — energy readings from the
  outer system where nothing should be generating energy at all.
factions:
  - name: Vaskov Administration
    description: >-
      The Hegemonic governor's office, operating from Vaskov Centrum on
      the habitable world. Prefect Ilara Vaskov inherited the post from
      her father and runs it with more pragmatism than ideology. She has
      one aging patrol cruiser, a small customs staff, and the legal
      authority of a government that is very far away. She wants order,
      tax revenue, and to not be the governor who lost a system.
    disposition: neutral
  - name: Free Miners' Compact
    description: >-
      The frontier miners and prospectors who were here before the
      Hegemony. They operate claims in the asteroid belt and on the
      mining moon, organized into a loose cooperative that negotiates
      collectively and fights internally. They pay Hegemonic taxes when
      they can't avoid it and consider the governor an expensive
      inconvenience. Their current leader, a woman named Dura Mendes,
      has been pushing hard for rights to survey the Deep Root range.
    disposition: neutral
  - name: Clan Moana-Teru
    description: >-
      The voidborn clan that operates Turning Hub and controls most of
      the system's fuel supply. They've been here forty years and
      consider themselves neutral ground — they'll dock any ship, fuel
      any hull, and ask no questions about cargo manifests. Their clan
      elder, Rangi Moana-Teru, plays every faction against the others
      and always has. They want stability, trade flow, and to never be
      under anyone's authority.
    disposition: neutral
  - name: The Tsveri
    description: >-
      The alien species native to the second world. Tall, slow-moving,
      silicon-laced integument, subsonic vocal range that humans feel
      more than hear. They've been in-system for millennia and claim
      only the Deep Root mountain range as sovereign territory. They
      trade rarely, speak to humans less, and have made it clear that
      the Deep Root is not negotiable. What they know about the outer
      system, they will not say.
    disposition: wary
  - name: Broken Drift Runners
    description: >-
      A smuggling network that operates out of the asteroid belt,
      moving cargo that doesn't appear on customs manifests. They use
      dead prospector claims as dead drops and maintain a loose
      confederation of independent captains who share routes and
      warnings. Everyone knows they exist. Nobody can prove it. They
      are useful to every faction and loyal to none.
    disposition: neutral
cosmology: >-
  People in Coyote Reach don't think much about cosmic meaning. The
  Hegemonic officials maintain a secular rationalism that treats
  the universe as knowable and governable. The frontier miners are
  practical — they believe in what pays. The voidborn have their
  own traditions, star-reading and void-songs, but they'd call it
  culture, not religion. The Tsveri are the exception. They maintain
  that the Deep Root connects to something older than the star, and
  that the system's single jump point is not an accident but a seal.
  Humans find this poetic. The Tsveri do not appear to be speaking
  poetically.
geography: >-
  Coyote Reach is a single-star system with one mapped jump point,
  located at the system's outer edge. The habitable world — called
  Far Landing by the settlers — orbits in the temperate zone: dry,
  windy, breathable, ugly. The second world is cooler and wetter,
  dominated by the Deep Root mountain range where the Tsveri live.
  A gas giant called Red Prospect anchors the outer system, with
  Clan Moana-Teru's Turning Hub station in orbit. The asteroid belt
  stretches between the inner worlds and the gas giant — the miners
  call it the Broken Drift, and it's where most of the system's ore
  comes from. The jump point station — Grand Gate — sits at the
  system's edge, controlling all traffic in and out. Beyond the gas
  giant, the outer system is dark, cold, and supposedly empty.
  Supposedly.
