name: Coyote Reach
slug: coyote_reach
description: >-
  A single star system at the end of a dead-end jump lane, where Hegemonic
  authority arrived a generation ago and found frontier miners, voidborn
  station clans, and an alien species who'd been here long before any
  human ever jumped in-system. The economy runs on ore, salvage, and
  not asking questions. The only way in or out is through one jump point,
  and whoever holds it holds everything.
