chapters:
  - id: fresh
    label: "New Drift"
    session_range: [1, 5]
    description: >-
      The players arrive in Coyote Reach through the jump point or
      are already here, scraping by on the margins. The system is
      tense but functional — the governor taxes, the miners grumble,
      the voidborn trade, and the Tsveri keep to themselves. The
      mining dispute over the Deep Root range is heating up but
      hasn't boiled over. Odd reports from the outer system are
      just bar talk. The players find work, make contacts, and
      learn who matters in a system where everyone knows everyone
      and nobody trusts anyone completely.
    events: []

  - id: early
    label: "Broken Compact"
    session_range: [6, 12]
    description: >-
      The mining dispute cracks open. Someone — a prospector, a
      corporate surveyor, a desperate claim-holder — pushes into
      Tsveri territory without authorization. The Tsveri response
      is measured but unmistakable, and suddenly the system's
      careful balance of mutual tolerance starts to slip. Governor
      Vaskov tries to mediate but has no leverage anyone respects.
      Clan Moana-Teru starts making contingency plans. The Broken
      Drift Runners smell opportunity. And the outer system readings
      get stronger — close enough now that ignoring them takes
      effort.
    events: []

  - id: mid
    label: "Grand Gate"
    session_range: [13, 20]
    description: >-
      Control of the jump point becomes the central question. With
      the mining dispute unresolved and outside interests starting
      to notice Coyote Reach's rare-earth deposits, whoever holds
      Grand Gate decides what comes in, what goes out, and who gets
      to stay. The Hegemony sends a second ship — or threatens to.
      The voidborn consider closing Turning Hub to pressure all
      sides. The Tsveri break their silence about the outer system,
      and what they say changes the stakes entirely. The players
      are no longer bystanders in a trade dispute. They're in the
      middle of a fight over what this system is and who it belongs
      to.
    events: []
