world_name: Coyote Reach
starting_region: far_landing
map_style: >-
  Utilitarian system chart on dark background, trade routes as dotted
  lines, orbital paths in faded arcs, hand-annotated claim numbers in
  the asteroid belt, one red circle around the outer system anomaly
  with a question mark
regions:
  far_landing:
    name: Far Landing
    description: >-
      The main habitable world and the system's largest population
      center. Dry plains, alkaline flats, and wind-scoured mesas
      surround a handful of settlements that grew up around the
      original colony drop site. Governor Vaskov administers from
      Vaskov Centrum, a prefab compound that's been expanded and
      patched for two decades. The air is breathable, the water
      needs filtering, and the sunsets are brown.
    adjacent:
      - deep_root_world
      - broken_drift
      - grand_gate
    tags: [settlement, authority, frontier]
  deep_root_world:
    name: Deep Root World
    description: >-
      The system's second habitable planet, cooler and wetter than
      Far Landing, dominated by the Deep Root mountain range where
      the Tsveri have lived for millennia. The lowlands are temperate
      and empty — the Tsveri don't use them, and the Hegemony hasn't
      authorized settlement. The mountains themselves are old,
      heavily eroded, and seismically quiet in a way geologists
      find suspicious. Recent surveys detected rare-earth deposits
      under the sacred peaks.
    adjacent:
      - far_landing
      - broken_drift
    tags: [alien_territory, sacred, disputed]
  broken_drift:
    name: Broken Drift
    description: >-
      The asteroid belt between the inner worlds and the gas giant.
      Thousands of rocks ranging from gravel to small-moon size,
      riddled with mining claims, prospector shacks, dead equipment,
      and the occasional hull that drifted in from somewhere else.
      The Free Miners' Compact operates here, along with anyone
      willing to work a vacuum suit and a drill. Salvage is common.
      So are claim disputes.
    adjacent:
      - far_landing
      - deep_root_world
      - red_prospect
      - turning_hub
      - new_claim
    tags: [mining, salvage, lawless]
  new_claim:
    name: New Claim
    description: >-
      The largest mining moon, orbiting the outer edge of the
      asteroid belt. The Compact maintains its main processing
      facility here — refineries, crew quarters, a bar called
      Mendes' Post that serves as the miners' unofficial parliament.
      Ore comes in from the belt, gets processed, and ships out
      through Turning Hub. The work is hard, the pay is irregular,
      and the Hegemonic tax collector visits quarterly.
    adjacent:
      - broken_drift
      - turning_hub
    tags: [mining, industrial, frontier]
  turning_hub:
    name: Turning Hub
    description: >-
      Clan Moana-Teru's freeport station, orbiting the gas giant
      Red Prospect. Three connected station hulls that have been
      expanded, patched, and welded into a sprawling waypoint that
      serves as the system's neutral ground. Fuel scooping from the
      gas giant, ship repair, cargo exchange, and a docking ring
      where customs inspectors have learned not to look too closely.
      If you need something in Coyote Reach, someone on Turning Hub
      can find it.
    adjacent:
      - red_prospect
      - broken_drift
      - new_claim
      - grand_gate
    tags: [station, trade, voidborn, neutral]
  red_prospect:
    name: Red Prospect
    description: >-
      The system's gas giant — a rust-banded hydrogen world with
      violent upper-atmosphere storms and a deep gravity well. Clan
      Moana-Teru runs fuel-scooping operations in the upper
      atmosphere, skimming hydrogen with converted haulers. The work
      is dangerous and essential. No station orbits Red Prospect
      except Turning Hub, and the voidborn consider the giant itself
      clan territory by custom if not by law.
    adjacent:
      - turning_hub
      - broken_drift
      - last_drift
    tags: [gas_giant, fuel, voidborn]
  grand_gate:
    name: Grand Gate
    description: >-
      The customs and traffic control station at the system's only
      jump point. A Hegemonic installation staffed by a small crew
      that logs every ship entering or leaving Coyote Reach. In
      theory, nothing moves through the jump point without
      authorization. In practice, the station is undermanned, the
      sensor net has gaps, and the Broken Drift Runners know every
      one of them. Whoever controls Grand Gate controls access to
      the entire system.
    adjacent:
      - far_landing
      - turning_hub
    tags: [jump_point, authority, strategic]
  last_drift:
    name: Last Drift
    description: >-
      The outer system beyond Red Prospect — cold, dark, and
      officially empty. Prospectors who've pushed out this far
      report anomalous energy readings, navigational drift that
      doesn't match any known gravitational source, and a persistent
      low-frequency signal that no one has been able to triangulate.
      The Hegemony says it's sensor noise. The voidborn say it's
      nothing worth chasing. The Tsveri say nothing at all, which
      is the most unsettling response of the three.
    adjacent:
      - red_prospect
    tags: [outer_system, mystery, unexplored]
routes:
  - from_id: far_landing
    to_id: grand_gate
    name: Vaskov Lane
    description: >-
      The main transit corridor from Far Landing to the jump point
      station. Hegemonic patrol route, well-charted, and the only
      path that customs officially recognizes for commercial traffic.
    distance: long
    danger: safe
  - from_id: far_landing
    to_id: deep_root_world
    name: Inner Crossing
    description: >-
      The short hop between the two habitable worlds. Quick transit
      but politically sensitive — the Vaskov Administration
      technically requires a permit for civilian traffic to the
      Deep Root World, a rule that miners ignore routinely.
    distance: short
    danger: safe
  - from_id: broken_drift
    to_id: turning_hub
    name: Ore Run
    description: >-
      The hauler route from the asteroid belt to Turning Hub, where
      ore gets traded for fuel, parts, and credit. Heavy traffic,
      slow ships, and the occasional Broken Drift Runner using a
      bulk hauler as cover.
    distance: medium
    danger: moderate
  - from_id: turning_hub
    to_id: grand_gate
    name: Far Lane
    description: >-
      The long transit from Turning Hub to the jump point. Ships
      making the run carry fuel, processed ore, and whatever Clan
      Moana-Teru is exporting this quarter. The route passes through
      open space with no cover and no help if something goes wrong.
    distance: long
    danger: moderate
  - from_id: red_prospect
    to_id: last_drift
    name: Dark Reach
    description: >-
      The route into the outer system — not a charted lane so much
      as a heading. No nav beacons, no refueling, no rescue. The
      prospectors who go out this way do it on their own fuel and
      their own nerve. Some of them come back with strange data.
      Some of them don't come back.
    distance: long
    danger: dangerous
  - from_id: new_claim
    to_id: broken_drift
    name: Drift Run
    description: >-
      The short hop from the mining moon into the belt proper.
      Prospectors and haulers make this run daily, threading through
      asteroid traffic with the casual familiarity of people who've
      done it a thousand times. New pilots find it terrifying.
    distance: short
    danger: moderate
