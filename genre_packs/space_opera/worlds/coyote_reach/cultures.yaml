- name: Tsveri
  description: >-
    The native alien species of Coyote Reach. Tall, deliberate beings
    with silicon-laced integument that shifts color with emotional state
    and a subsonic vocal range that registers as vibration in human
    chests. They measure time in geological spans and consider human
    urgency a mild cognitive deficiency. Their culture centers on the
    Deep Root — a mountain range they've tended for millennia — and
    a concept they call root-listening, which may be meditation,
    communication with something underground, or both. They are not
    hostile. They are patient in a way that makes patience feel like
    a threat.
  slots:
    given_name:
      corpora:
        - corpus: georgian.txt
          weight: 0.6
        - corpus: finnish.txt
          weight: 0.4
      lookback: 2
    clan_name:
      corpora:
        - corpus: georgian.txt
          weight: 0.5
        - corpus: finnish.txt
          weight: 0.5
      lookback: 2
    place_noun:
      word_list: [root, span, well, vault, crest, den, hush, fold]
    adjective:
      word_list: [old, deep, slow, vast, long, still, low, dark]
  person_patterns:
    - "{given_name}"
    - "{given_name} {clan_name}"
    - "{clan_name}-{given_name}"
  place_patterns:
    - "{clan_name} {place_noun}"
    - "{adjective} {place_noun}"
    - "{given_name}'s {place_noun}"
