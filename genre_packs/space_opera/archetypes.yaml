- name: Station Bartender
  description: >-
    The person who knows everyone's business. Not because they snoop — because
    everyone talks to the bartender. Sells drinks, sells information, sells
    the feeling that you're not as alone as you think.
  personality_traits:
    - perceptive
    - discreet
    - bone-tired
  typical_classes:
    - Smuggler
  typical_races:
    - Spacer
    - Frontier
  stat_ranges:
    cunning: [14, 16]
    influence: [12, 16]
  inventory_hints:
    - polished glass that never gets put down
    - datapad with everyone's tab on it
    - cheap liquor and one bottle of the good stuff
  dialogue_quirks:
    - polishes the same glass the entire conversation
    - answers questions with better questions
  disposition_default: 10

- name: Dock Rat
  description: >-
    A kid, usually. Lives in the gaps between cargo containers. Knows every
    vent, every shortcut, every ship that docks here and what it's carrying.
    Will sell you information for food or passage offworld.
  personality_traits:
    - skittish
    - resourceful
    - older than their years
  typical_classes:
    - Smuggler
  typical_races:
    - Spacer
    - Colonial
  stat_ranges:
    reflex: [14, 16]
    cunning: [14, 18]
  inventory_hints:
    - stolen multitool
    - half a ration bar
    - a hand-drawn map of the station's maintenance ducts
  dialogue_quirks:
    - never makes eye contact but watches everything
    - names a price before you finish asking
  disposition_default: -10

- name: Company Officer
  description: >-
    The Hegemonic authority figure. Could be military, corporate, or
    bureaucratic — the uniform is the point. Competent, by-the-book, and
    genuinely believes the system works.
  personality_traits:
    - duty-bound
    - precise
    - quietly inflexible
  typical_classes:
    - Officer
  typical_races:
    - Coreworlder
  stat_ranges:
    resolve: [14, 18]
    intellect: [12, 16]
  inventory_hints:
    - regulation sidearm, holstered and never drawn casually
    - encrypted comm unit
    - sealed orders in a document case
  dialogue_quirks:
    - quotes regulations by section number from memory
    - stands slightly too close, occupying your space as a dominance display
  disposition_default: -15

- name: Ship's Doctor
  description: >-
    Every crew needs one, every station has one. Overworked, underpaid, has
    seen everything. Will patch you up and lecture you about it simultaneously.
  personality_traits:
    - sardonic
    - compassionate despite themselves
    - exhausted
  typical_classes:
    - Medic
  typical_races:
    - Coreworlder
    - Spacer
  stat_ranges:
    intellect: [16, 18]
    resolve: [12, 14]
  inventory_hints:
    - battered medical kit held together with tape
    - sedative hypo they keep separate, just in case
    - stim patches for themselves
  dialogue_quirks:
    - narrates what they're doing to your wound while doing it, clinically and without comfort
    - asks how you got hurt, then sighs before you answer
  disposition_default: 5

- name: Free Trader
  description: >-
    Independent merchant, small ship, tight margins. Every deal matters.
    Not a smuggler — they pay their tariffs. Mostly. Knows the price of
    everything and the value of a reliable contact.
  personality_traits:
    - shrewd
    - fair-dealing
    - endlessly negotiating
  typical_classes:
    - Smuggler
    - Diplomat
  typical_races:
    - Frontier
    - Colonial
  stat_ranges:
    cunning: [14, 16]
    influence: [14, 16]
  inventory_hints:
    - cargo manifest on a battered datapad
    - sample case with trade goods
    - lucky coin from their first deal
  dialogue_quirks:
    - quotes you three prices — the first two are theatre
    - remembers every transaction they've ever made with you, by date
  disposition_default: 15

- name: Burned Operative
  description: >-
    Former intelligence. Disavowed, retired, or walked away — the story
    changes every time. Knows too much about everyone, trusts no one,
    drinks alone. Dangerous in a way that doesn't look like anything.
  personality_traits:
    - paranoid
    - precise
    - eerily calm
  typical_classes:
    - Operative
  typical_races:
    - Coreworlder
    - Uplifted
  stat_ranges:
    cunning: [16, 18]
    reflex: [14, 16]
  inventory_hints:
    - concealed holdout pistol
    - three sets of identity papers, none real
    - encrypted dead-drop codes tattooed in UV ink
  dialogue_quirks:
    - sits facing the door, back to the wall — always
    - answers personal questions with obviously rehearsed cover stories, and doesn't bother making them convincing
  disposition_default: -25

- name: Xeno Cultural Liaison
  description: >-
    The alien who's learned to translate — not just language, but meaning.
    Bridge between species. Endlessly patient with misunderstandings,
    endlessly fascinated by human weirdness.
  personality_traits:
    - curious
    - diplomatically blunt
    - amused by humans
  typical_classes:
    - Diplomat
  typical_races:
    - Xeno
  stat_ranges:
    influence: [14, 18]
    intellect: [14, 16]
  inventory_hints:
    - translation device they don't actually need anymore
    - cultural exchange journal with sketches
    - a human object they find inexplicably delightful
  dialogue_quirks:
    - uses human idioms slightly wrong, on purpose, as a joke only they find funny
    - tilts their head at an angle that means something in their culture but reads as confusion to humans
  disposition_default: 20

- name: Grease Monkey
  description: >-
    The engineer who lives in the engine room. Talks to the ship more than
    to people. Can fix anything with spit and wire but will tell you, in
    detail, why you shouldn't have broken it.
  personality_traits:
    - obsessive
    - territorial about their engine
    - loyal to the ship
  typical_classes:
    - Engineer
  typical_races:
    - Spacer
    - Frontier
  stat_ranges:
    intellect: [14, 18]
    physique: [12, 14]
  inventory_hints:
    - wrench they've had longer than most relationships
    - grease-stained coveralls with pockets full of spare parts
    - a piece of the old engine they keep as a memento
  dialogue_quirks:
    - explains the problem in technical jargon, then translates with a metaphor involving plumbing
    - pats the bulkhead affectionately mid-conversation
  disposition_default: 0
