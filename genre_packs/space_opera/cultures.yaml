- name: Hegemonic
  description: >-
    Core-world imperial culture. Formal, hierarchical, old money and old
    power. Military titles matter, family names open doors, and protocol
    is a weapon. Think Barrayaran aristocracy, Imperial officers, Alliance
    bureaucrats.
  slots:
    given_name:
      corpora:
        - corpus: latin.txt
          weight: 0.5
        - corpus: russian.txt
          weight: 0.5
      lookback: 3
    family_name:
      corpora:
        - corpus: latin.txt
          weight: 0.4
        - corpus: russian.txt
          weight: 0.6
      lookback: 3
    title:
      word_list:
        - Commander
        - Admiral
        - Senator
        - Consul
        - Prefect
        - Legate
        - Minister
        - Count
        - Lord
        - Captain
    place_noun:
      word_list: [citadel, prime, centrum, spire, arch, palatine, forum, bastion]
    adjective:
      word_list: [imperial, high, inner, old, grand, first, sovereign, golden]
  person_patterns:
    - "{family_name}, {given_name}"
    - "{title} {family_name}"
    - "{title} {given_name} {family_name}"
  place_patterns:
    - "{adjective} {place_noun}"
    - "{family_name} {place_noun}"
    - "{adjective} {family_name}"

- name: Frontier
  description: >-
    Colonial and rim-world culture. Practical, independent, suspicious of
    authority. First-name basis, calluses on their hands, loyalty earned not
    inherited. Firefly's border moons, Expanse's belters minus the creole.
  slots:
    given_name:
      corpora:
        - corpus: english.txt
          weight: 0.5
        - corpus: spanish.txt
          weight: 0.5
      lookback: 3
    family_name:
      corpora:
        - corpus: english.txt
          weight: 0.6
        - corpus: spanish.txt
          weight: 0.4
      lookback: 3
    place_noun:
      word_list: [landing, reach, prospect, drift, claim, gulch, post, flat]
    adjective:
      word_list: [red, dry, far, lost, new, broken, last, free]
  person_patterns:
    - "{given_name} {family_name}"
    - "{given_name}"
  place_patterns:
    - "{family_name}'s {place_noun}"
    - "{adjective} {place_noun}"
    - "{given_name}'s {place_noun}"

- name: Voidborn
  description: >-
    Spacer culture — born on ships and stations, the void is home. Tight-knit
    crews, ship-name as identity, fluid and adaptive. Seafaring cultures
    mapped to star-faring — Polynesian wayfinding meets Japanese shipboard
    discipline.
  slots:
    given_name:
      corpora:
        - corpus: polynesian.txt
          weight: 0.5
        - corpus: japanese.txt
          weight: 0.5
      lookback: 3
    clan_name:
      corpora:
        - corpus: polynesian.txt
          weight: 0.6
        - corpus: japanese.txt
          weight: 0.4
      lookback: 2
    ship_name:
      corpora:
        - corpus: polynesian.txt
          weight: 0.7
        - corpus: japanese.txt
          weight: 0.3
      lookback: 2
    place_noun:
      word_list: [berth, dock, ring, hub, anchor, waypoint, gate, lane]
    adjective:
      word_list: [deep, far, still, bright, dark, long, open, turning]
  person_patterns:
    - "{given_name} of {ship_name}"
    - "{given_name} {clan_name}"
    - "{clan_name} {given_name}"
  place_patterns:
    - "{clan_name} {place_noun}"
    - "{adjective} {place_noun}"
    - "{ship_name} {place_noun}"

- name: Synthetic
  description: >-
    AI, android, and construct culture. Names are self-chosen — an act of
    identity, not inheritance. Some pick human names, some pick concepts,
    some pick something that just sounded right. No family names because
    family is chosen, not born into.
  slots:
    given_name:
      word_list:
        - Patience
        - Echo
        - Index
        - Clarity
        - Wren
        - Sable
        - Lux
        - Cipher
        - Vesper
        - Harbor
        - Meridian
        - Quill
        - Tessera
        - Vigil
        - Ember
        - Aria
        - Cosine
        - Drift
        - Feldspar
        - Lacuna
    designation:
      word_list:
        - Unit
        - Model
        - Series
        - Instance
        - Build
        - Version
        - Iteration
    place_noun:
      word_list: [node, array, lattice, process, thread, stack, core, frame]
    adjective:
      word_list: [quiet, warm, bright, clean, steady, "true", open, new]
  person_patterns:
    - "{given_name}"
    - "{given_name} ({designation})"
  place_patterns:
    - "{adjective} {place_noun}"
    - "{given_name} {place_noun}"

- name: Xeno
  description: >-
    Placeholder culture for nonhuman sapients. Deliberately alien phonemics
    at genre level — worlds override this with species-specific naming
    systems. The genre provides a fallback that sounds foreign to all human
    cultures.
  slots:
    given_name:
      corpora:
        - corpus: georgian.txt
          weight: 0.5
        - corpus: finnish.txt
          weight: 0.5
      lookback: 2
    clan_name:
      corpora:
        - corpus: georgian.txt
          weight: 0.6
        - corpus: finnish.txt
          weight: 0.4
      lookback: 2
    place_noun:
      word_list: [den, span, root, well, crest, vault, nest, shard]
    adjective:
      word_list: [old, vast, deep, high, sharp, slow, wide, long]
  person_patterns:
    - "{given_name}"
    - "{given_name} {clan_name}"
    - "{clan_name}-{given_name}"
  place_patterns:
    - "{clan_name} {place_noun}"
    - "{adjective} {place_noun}"
    - "{given_name}'s {place_noun}"

