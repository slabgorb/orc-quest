positive_suffix: >-
  cinematic concept art, dramatic lighting, bold composition,
  lived-in sci-fi aesthetic, warm interior light, vast space beyond

negative_prompt: >-
  photorealistic, photograph, anime, cartoon, pixel art,
  clean sterile surfaces, lens flare, stock photo, watercolor

preferred_model: flux

base_seed: 42

visual_tag_overrides:
  bridge: "ship bridge, holographic displays, viewport showing stars, warm amber instrument light"
  galley: "cramped ship kitchen, steel counter, mugs, warm overhead light"
  engine_room: "ship engine room, pipes and conduits, grease stains, pulsing drive core"
  cargo_bay: "cavernous cargo hold, crates and netting, industrial lighting"
  bunk: "narrow ship cabin, personal effects on shelf, viewport sliver of stars"
  station: "bustling space station concourse, mixed species crowd, neon signage"
  cantina: "dim station bar, mismatched furniture, haze, colored bottle light"
  docks: "industrial docking bay, ship hulls, fuel lines, dock workers"
  market: "rim world open market, dust and tarps, salvage and produce"
  planet_surface: "alien landscape, unfamiliar sky, distant settlement"
  void: "deep space, stars, distant nebula, absolute silence made visible"
  debris_field: "twisted metal wreckage drifting, sparks, damaged hulls"
  corridor: "narrow ship corridor, emergency lighting, cable runs along walls"
  medbay: "small ship medical bay, surgical light, instrument trays, clean surfaces"
