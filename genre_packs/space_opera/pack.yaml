name: Space Opera
version: "1.0.0"
description: >-
  Starships, galactic politics, and the vast drama of interstellar civilization.
  From gritty military campaigns to swashbuckling adventures among the stars,
  space opera is the genre of big stakes across bigger distances — where empires
  rise, rebels scheme, and a single crew can change the course of history.
min_sidequest_version: "0.1.0"
refine_hooks: false

inspirations:
  - name: Vorkosigan Saga (Bujold)
    element: Political military intrigue, wit as weapon, honor cultures, disability as strength
  - name: Dune (Herbert)
    element: Feudal politics in space, ecology as destiny, great houses, prescience and intrigue
  - name: Star Wars (Lucas)
    element: Rebellion vs empire, scrappy crews, mythic archetypes, dramatic combat
  - name: The Expanse (Corey)
    element: Factional tension, colonial exploitation, belter identity, consequences of expansion
  - name: Firefly (Whedon)
    element: Frontier space, crew-as-family, the margins of civilization, gallows humor
  - name: Wayfarers (Chambers)
    element: Found family, aliens as full cultures, cozy stakes, interspecies relationships, optimistic future

era_range: "Far future / unspecified"

core_vibe: >-
  You're standing on the bridge of a ship that shouldn't be yours, staring at
  a jump point that leads somewhere dangerous, with a crew that trusts you more
  than you trust yourself.

emotional_tone:
  - audacity
  - wonder
  - loyalty under pressure
  - gallows humor

differentiation: >-
  Rejects the lonely spaceship of hard-sf and the magic-with-lasers of pure
  space fantasy. Space opera is about civilizations — the friction between
  cultures, the politics of expansion, the personal stakes within galactic-scale
  events. Tech enables drama but doesn't dominate it. Combat is fast and
  dramatic, not simulationist — getting shot matters but doesn't require a
  spreadsheet. The crunch lives at Vorkosigan/Dune level: ships have fuel but
  you never calculate it, weapons kill but we don't simulate ballistics.
