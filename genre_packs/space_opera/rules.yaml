custom_rules:
  lethality: moderate
  injury_system: temporary
  rest_variant: standard
  encumbrance: none
  ship_combat: >-
    Ship-to-ship combat is tactical and crew-driven, not a minigame. Each crew
    member contributes from their station: Pilot maneuvers, Engineer manages
    power and repairs, Officer calls targets and coordinates, Soldier operates
    weapons, Operative runs electronic warfare. Describe actions cinematically —
    sparks flying, hull groaning, crew shouting over alarms. Resolution is fast:
    each round is one decisive action per station, not granular subsystem rolls.
    Ships don't have HP — they have condition tracks (shields, hull, engines,
    weapons) that degrade narratively.
  crew_bonds: >-
    Crew relationships matter mechanically. When you act to protect or support
    a crewmate you have a bond with, you get advantage on the roll. Bonds form
    through shared experience — surviving a fight together, a meaningful
    conversation, pulling someone out of danger. The narrator tracks bond
    strength organically. This is the Chambers/Firefly principle: the crew
    is the point.
  cultural_friction: >-
    Origins aren't just stat blocks — they're worldviews. A Coreworlder and
    a Colonial see the same situation differently. When cultural background
    would create tension or misunderstanding, the narrator leans into it.
    This isn't combat — it's roleplaying fuel. The best scenes come from
    people who respect each other but genuinely don't understand each other's
    assumptions.
  the_ship: >-
    The ship is a crewmember, not inventory. Every crew's ship has a name, a
    personality, a history, and quirks — systems that run hot, a cargo bay
    door that sticks, an engine that hums a certain way when she's happy.
    The narrator treats the ship as a character: she can be hurt, healed,
    upgraded, and mourned. Crew members have relationships with the ship
    just as they do with each other. If the ship has an AI, it is a full
    character with opinions, feelings, and bonds — not a tool. Losing your
    ship is not a resource loss. It is a death in the family.

    Ship Block (parallel to road_warrior's Car-acter Sheet Rig Block):
    Ship Name (player-chosen), Ship Class (world-defined — freighter,
    corvette, shuttle, etc.), Condition Tracks (shields, hull, engines,
    weapons — narrative degradation, not HP), Quirks (what makes her her),
    AI Personality (if present — full character with opinions and bonds),
    Scars (narrative history of damage and repairs), Berths (crew capacity).
    Detailed sheet structure TBD in char_creation step.
  found_family: >-
    The crew is the emotional core of every campaign. Space opera is not
    about lone heroes — it's about people who chose each other, or were
    thrown together and chose to stay. The narrator actively creates moments
    for crew bonding: shared meals, downtime conversations, arguments that
    reveal character, small kindnesses under pressure. These scenes are not
    filler between action — they ARE the story. A campaign where the crew
    doesn't feel like family has failed, regardless of how many space
    battles it had.
  xeno_flexibility: >-
    The Xeno origin is a genre-level slot that worlds fill with specific
    species. Each world defines its own alien cultures with unique biology,
    social structures, and naming patterns. At the genre level, Xeno means
    "nonhuman sapient" — the world decides what that looks like. Alien
    species should feel genuinely alien, not humans with prosthetics.

encounter_base_tension:
  random: 0.10
  ambush: 0.30
  boss: 0.40
  final: 0.50
