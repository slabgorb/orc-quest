definitions:
  - id: scale
    name: Scale
    description: >-
      How much the story zooms out. At one end, the camera never leaves
      the ship and its crew. At the other, empires clash and the crew is
      swept up in galactic-scale events. Most space opera lives somewhere
      in between — personal stakes against a big backdrop.
    poles:
      - personal
      - galactic
    default: 0.4

  - id: tone
    name: Tone
    description: >-
      The emotional temperature of the world. Gritty space opera treats
      the vacuum as hostile and people as complicated. Hopeful space opera
      believes the future is worth building and kindness is strength.
      Both acknowledge that space is dangerous — they differ on whether
      that danger defines the experience.
    poles:
      - gritty
      - hopeful
    default: 0.6

  - id: swagger
    name: Swagger
    description: >-
      How much Rule of Cool overrides plausibility. Grounded stories
      reward careful plans and earned competence. Swashbuckling stories
      reward audacity and style. Firefly lives dead center — Mal has a
      plan AND shoots first.
    poles:
      - grounded
      - swashbuckling
    default: 0.5

modifiers:
  scale:
    personal: >-
      Keep the camera tight on the crew. Galactic events are rumor,
      news feeds, distant explosions — they matter because of how they
      affect these specific people, not because of their scale. The most
      important thing that happens today is the conversation in the galley.
    galactic: >-
      The crew is caught in something bigger than themselves. Empires,
      rebellions, fleet movements, political upheaval — the narrator
      connects crew actions to their consequences on a civilizational
      scale. Decisions ripple outward. The stakes are never just personal.

  tone:
    gritty: >-
      Space is hostile and unforgiving. Injuries hurt, supplies run low,
      trust is earned slowly and lost fast. People are complicated — allies
      have agendas, enemies have reasons. Victory always costs something.
      Do not soften consequences to protect the mood.
    hopeful: >-
      The future is messy but worth fighting for. People are mostly trying
      their best, even when they fail. Kindness is not weakness — it is
      often the most effective tool in the room. Let moments of genuine
      warmth land without undercutting them with cynicism. Hard times
      happen, but they are not the point.

  swagger:
    grounded: >-
      Cool moments are earned through competence, preparation, and clever
      thinking. When something impressive happens, the audience should be
      able to trace back why it worked. Narrate the thought process, the
      timing, the small details that made the plan succeed. Smart beats
      flashy every time.
    swashbuckling: >-
      Cool moments happen because they should. If a player attempts
      something audacious and dramatic, lean into it — physics can wait.
      Narrate with energy, momentum, and style. The blaster bolt misses
      because the hero ducked at exactly the right moment. Don't explain
      why it worked. It worked because it was awesome.

presets:
  - name: Chambers
    description: >-
      Cozy crew drama in a gentle universe. The story is about these
      people learning to be family. Stakes are real but intimate.
    values:
      scale: 0.1
      tone: 0.9
      swagger: 0.3

  - name: Vorkosigan
    description: >-
      Political intrigue meets audacious improvisation. Wit is the
      deadliest weapon, loyalty is the deepest strength, and the best
      plans are the ones you make up on the spot.
    values:
      scale: 0.5
      tone: 0.5
      swagger: 0.6

  - name: Expanse
    description: >-
      Hard-edged factional conflict where the vacuum doesn't care about
      your feelings. Colonialism, identity, and the cost of expansion.
    values:
      scale: 0.7
      tone: 0.2
      swagger: 0.3

  - name: Lucas
    description: >-
      Mythic space fantasy. Big stakes, big villains, big heroism.
      The scrappy underdog against the empire, and the empire is very big.
    values:
      scale: 0.9
      tone: 0.7
      swagger: 0.9

  - name: Balanced
    description: >-
      Middle of everything. A crew with personal stakes in a galaxy
      that matters, where clever plans and bold moves both pay off.
    values:
      scale: 0.5
      tone: 0.5
      swagger: 0.5
