world_name: The Burning Peace
starting_region: edo
map_style: >-
  Ukiyo-e woodblock print style map, bold black outlines, flat color
  washes in indigo and vermillion, calligraphy labels in flowing brush
  script, gold leaf accents on sacred sites, wave patterns for ocean,
  stylized cloud bands between regions, red seal stamps marking
  checkpoints, Mount Kasai rendered in the style of Hokusai's Great Wave

regions:
  edo:
    name: Edo
    description: >-
      The Shogunate's capital — a sprawling castle town of over a million
      souls built on a broad coastal plain where three rivers meet the
      sea. Edo Castle rises at the center, its white walls and fire-
      blackened watchtowers visible for leagues. The city radiates outward
      in concentric rings: inner lord mansions closest to the castle,
      then samurai quarters, then the teeming commoner districts where
      merchants, artisans, actors, and poets crowd together in wooden
      buildings that burn down regularly and are rebuilt with cheerful
      fatalism. The alternate attendance system means half the nation's
      lords are here at any given time, making Edo the most politically
      dense city on the islands.
    adjacent:
      - hakone
      - mount_kasai
      - iga_mountains
      - northern_frontier

  kyoen:
    name: Kyōen
    description: >-
      The ancient capital and spiritual heart of the Ember Isles — a city
      of a thousand shrines, ancient temples, and the Imperial Palace
      where Emperor Kazuhime holds court without power but with growing
      influence. Kyōen sits in a mountain-ringed basin, its streets laid
      out in a perfect grid that channels elemental energy along
      geometrically precise lines. The city's fire channelers are scholars
      and artists rather than warriors, and the tea ceremony, poetry, and
      philosophical debate flourish here as nowhere else. The Shogunate
      maintains a garrison but treats Kyōen with careful respect — the
      Emperor's spiritual authority cannot be taken by force.
    adjacent:
      - osaka
      - hakone
      - western_domains
      - mount_kasai

  osaka:
    name: Osaka
    description: >-
      The merchant capital — a city of canals, warehouses, and rice
      exchanges built where the great Yodo River meets the Inland Sea.
      Osaka's castle, once the seat of the defeated Kurogane dynasty,
      now serves as a Shogunate garrison, but the real power here is
      commercial. The rice brokers of Dōjima set prices that determine
      whether lords feast or starve. The merchant houses — technically
      the lowest class — wield more actual wealth than most daimyō and
      fund the kabuki theaters, pleasure quarters, and artistic
      patronage that make Osaka the cultural furnace of the islands.
    adjacent:
      - kyoen
      - western_domains
      - inland_sea
      - nagasaki

  nagasaki:
    name: Nagasaki
    description: >-
      The only port open to the outside world — a harbor city on the
      western coast where the tiny artificial island of Dejima sits
      like a splinter in the Shogunate's eye. Lotus Provinces merchants
      are confined to Dejima's warehouses, permitted to trade in
      porcelain, silk, and medicine but forbidden from bringing spiritual
      texts or channeling instructors. A handful of Jade Kingdoms
      scholars maintain a separate compound. The harbor is guarded by
      fire channeler batteries that can incinerate an approaching ship
      in seconds. Despite the restrictions, Nagasaki buzzes with the
      energy of the forbidden — foreign ideas, foreign goods, foreign
      people glimpsed across the water. The Hidden Way is strongest here.
    adjacent:
      - osaka
      - western_domains
      - inland_sea
      - satsuma

  hakone:
    name: Hakone Gate
    description: >-
      The most feared checkpoint on the Five Highways — a narrow pass
      where the Tōkaidō road squeezes between volcanic mountains and
      a deep crater lake. The Shogunate's fire channeler garrison
      searches every traveler, examines papers, and watches for two
      things above all: weapons moving toward Edo, and women moving away
      from it (the families of outer lords are hostages, and any attempt
      to smuggle them out means war). The hot springs around Hakone are
      famous, and the posting stations cater to travelers with bathhouses
      and teahouses — making Hakone simultaneously a place of relaxation
      and terror. The volcanic vents in the pass occasionally release
      spirits alongside sulfurous gas.
    adjacent:
      - edo
      - kyoen
      - mount_kasai

  mount_kasai:
    name: Mount Kasai
    description: >-
      The sacred volcano at the heart of the Ember Isles — visible from
      half the archipelago, revered as the source of all fire channeling.
      The great shrine at its base, Nikkō, enshrines the deified spirit
      of Tokigane Yasuhiro. The yamabushi mountain ascetics maintain
      hermitages on its upper slopes, practicing austerities that the
      Shogunate tolerates because the yamabushi serve as early warning
      for volcanic activity. Mount Kasai has been rumbling for the past
      three years. The yamabushi say the mountain is angry. The Shogunate
      says the mountain is settling. The spirit mediums say nothing, but
      they have begun quietly leaving the area.
    adjacent:
      - edo
      - kyoen
      - hakone
      - iga_mountains

  satsuma:
    name: Satsuma
    description: >-
      The southernmost major domain — a mountainous, subtropical
      territory ruled by the Shimora clan, the most powerful of the
      outer lords. Satsuma's distance from Edo has allowed it to
      maintain a degree of independence that infuriates the Shogunate.
      The Shimora maintain secret fire training academies in mountain
      valleys, their channelers practice with an intensity that
      peacetime lords elsewhere have abandoned, and their proximity to
      Nagasaki gives them access to foreign knowledge that is officially
      forbidden. Satsuma also controls a chain of southern islands
      extending toward the Tide Reaches — technically foreign territory,
      technically under Shogunate authority, practically a Shimora
      domain where outside rules do not apply.
    adjacent:
      - nagasaki
      - western_domains
      - inland_sea

  iga_mountains:
    name: The Iga Mountains
    description: >-
      A maze of steep, forested valleys south of Edo where the shinobi
      villages have maintained their independence for centuries. The
      terrain is deliberately inhospitable — paths that lead nowhere,
      bridges that collapse under weight, streams that have been
      redirected to flood approach routes. The Iga and Kōga communities
      train in a unique blend of fire channeling and stealth — using
      fire not for raw destruction but for misdirection, distraction,
      and precise, silent elimination. The Shogunate has never
      successfully mapped the Iga Mountains, and the shinobi prefer
      it that way.
    adjacent:
      - edo
      - mount_kasai
      - western_domains

  western_domains:
    name: The Western Domains
    description: >-
      The agricultural heartland of the Ember Isles — a patchwork of
      river valleys, terraced hillsides, and castle towns ruled by a
      mixture of inner and outer lords. The Nakasendō highway threads
      through central mountain passes connecting Edo to Kyōen by the
      inland route, and the posting stations along it are quieter and
      more remote than those on the coastal Tōkaidō. The western domains
      produce the rice that feeds the islands, and their farming
      communities — overtaxed and undervalued — harbor the strongest
      resentment toward the Shogunate. The Hidden Way finds fertile
      ground here. So do ronin, bandits, and yokai.
    adjacent:
      - kyoen
      - osaka
      - nagasaki
      - satsuma
      - iga_mountains
      - inland_sea

  inland_sea:
    name: The Inland Sea
    description: >-
      The sheltered body of water at the center of the island crescent —
      the primary trade route between Osaka, Nagasaki, and the western
      domains. Hundreds of small islands dot the sea, many harboring
      fishing villages, pirate coves, or hermit shrines. The Shogunate
      patrols the sea lanes with fire channeler warships, but the
      islands provide endless hiding places for smugglers running goods
      between Nagasaki and the outer lords. Kappa water-spirits are
      common in the Inland Sea's shallower waters, and sailors leave
      offerings of cucumber at every port.
    adjacent:
      - osaka
      - nagasaki
      - satsuma
      - western_domains

  northern_frontier:
    name: The Northern Frontier
    description: >-
      The sparsely settled northern island — a land of deep forests,
      heavy snow, and the indigenous Emishi people who were here before
      the fire channelers arrived. The Shogunate considers the north
      pacified, but the Emishi maintain their own channeling traditions
      — earth and water forms that the Shogunate does not recognize or
      understand. The northern domains are poor, remote, and largely
      ignored by Edo politics, which makes them a refuge for ronin,
      fugitives, and anyone who needs to disappear. The forests here
      are old and deep, and the yokai who inhabit them are not the
      mischievous tricksters of the southern islands but ancient,
      powerful, and territorial.
    adjacent:
      - edo

routes:
  - from_id: edo
    to_id: hakone
    name: The Tōkaidō (Eastern Section)
    distance: short
    danger: safe
    description: >-
      The most traveled road on the islands — a broad, well-maintained
      highway following the eastern coast from Edo toward Kyōen. Posting
      stations every few leagues offer food, lodging, and fresh horses.
      Daimyō processions fill the road during alternate attendance
      season, their retinues stretching for leagues. Bandits are rare
      this close to Edo, but Metsuke inspectors are everywhere.

  - from_id: hakone
    to_id: kyoen
    name: The Tōkaidō (Western Section)
    distance: medium
    danger: moderate
    description: >-
      Beyond Hakone Gate, the Tōkaidō continues along the coast through
      increasingly remote territory. The posting stations grow smaller,
      the traffic thinner, and the mountain forests closer. Ronin and
      bandits prey on travelers between stations. Spirit activity
      increases near the volcanic hot springs that dot the route.

  - from_id: edo
    to_id: iga_mountains
    name: The Iga Road
    distance: short
    danger: dangerous
    description: >-
      A mountain road that officially does not appear on Shogunate maps.
      The path exists — traders and pilgrims use it — but it passes
      through shinobi territory, and travelers who stray from the marked
      trail tend not to return. The Iga villages tolerate passage along
      the main road but nothing more.

  - from_id: kyoen
    to_id: osaka
    name: The Kyōen-Osaka Road
    distance: short
    danger: safe
    description: >-
      A short, heavily traveled route connecting the spiritual capital
      to the commercial one. Merchants, monks, actors, and poets flow
      between the two cities constantly. The road follows a river valley
      and is so well-patrolled that it is the safest stretch of highway
      on the islands.

  - from_id: osaka
    to_id: nagasaki
    name: The Inland Sea Route
    distance: medium
    danger: moderate
    description: >-
      A sea passage through the sheltered Inland Sea, threading between
      hundreds of small islands. Faster than overland travel but subject
      to pirate ambush in the narrower straits. The Shogunate's fire
      channeler patrol ships are a comfort — or a threat, depending on
      what your cargo manifest says.

  - from_id: nagasaki
    to_id: satsuma
    name: The Southern Coastal Road
    distance: medium
    danger: moderate
    description: >-
      A winding coastal road connecting the foreign trading port to the
      Shimora stronghold. The Metsuke watch this road carefully, knowing
      that Satsuma's proximity to Nagasaki makes smuggling inevitable.
      The southern coastline is dramatic — sea cliffs, volcanic beaches,
      and caves that the Hidden Way uses for secret gatherings.

  - from_id: edo
    to_id: northern_frontier
    name: The Ōshū Kaidō
    distance: long
    danger: dangerous
    description: >-
      The northern highway — a road that grows rougher and lonelier with
      every league. Beyond the last Shogunate checkpoint, the forest
      closes in and the road becomes a track. The Emishi do not attack
      travelers, but neither do they help them. The yokai of the northern
      forests are a genuine threat, and winter travel is suicidal.

  - from_id: edo
    to_id: mount_kasai
    name: The Pilgrimage Road
    distance: short
    danger: moderate
    description: >-
      A sacred road connecting the capital to the great shrine at Mount
      Kasai's base. Pilgrims travel it constantly, but the volcanic
      activity of recent years has made the upper reaches treacherous.
      Steam vents open without warning, and the yamabushi hermits report
      fire-spirits emerging from the mountain's fissures — not hostile,
      but agitated, as though the mountain itself is uneasy.

  - from_id: iga_mountains
    to_id: western_domains
    name: The Shadow Path
    distance: medium
    danger: dangerous
    description: >-
      A network of mountain trails connecting the Iga villages to the
      western domains. Used by shinobi on contract, smugglers moving
      foreign goods inland from Nagasaki, and fugitives fleeing the
      Metsuke. The paths are intentionally confusing — without a guide,
      travelers walk in circles until exhaustion or yokai find them.

  - from_id: kyoen
    to_id: mount_kasai
    name: The Monk's Way
    distance: short
    danger: moderate
    description: >-
      An ancient path connecting the Imperial capital to the sacred
      volcano, used by yamabushi ascetics and pilgrims seeking spiritual
      purification. The trail passes through old-growth forest where
      tengu are said to train worthy channelers in secret forms. The
      yamabushi maintain way-stations but do not guarantee safety —
      the mountain tests those who approach it.
