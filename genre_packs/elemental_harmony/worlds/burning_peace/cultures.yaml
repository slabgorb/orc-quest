- name: Burning Peace Ember Isles
  description: >-
    The dominant culture of the Tokigane era — rigid social hierarchy,
    family name before given name, honorifics expressing status. Fire
    channeler families carry names referencing flame, forge, and iron.
    Commoner names are simpler, drawn from nature and seasons.
  slots:
    family_name:
      corpora:
        - corpus: fire_nation.txt
          weight: 1.0
      lookback: 3
    given_name:
      corpora:
        - corpus: fire_nation.txt
          weight: 1.0
      lookback: 2
    place_noun:
      word_list:
        - castle
        - shrine
        - gate
        - bridge
        - harbor
        - forge
        - temple
        - hall
        - pass
        - peak
        - well
        - market
    adjective:
      word_list:
        - burning
        - crimson
        - iron
        - golden
        - ash
        - obsidian
        - eternal
        - sacred
        - silent
        - hidden
        - moonlit
        - ancient
  person_patterns:
    - "{family_name} {given_name}"
    - "{family_name} no {given_name}"
  place_patterns:
    - "{adjective} {place_noun}"
    - "{family_name} {place_noun}"
    - "{given_name} {place_noun}"

- name: Nanban Visitors
  description: >-
    Foreign merchants and missionaries from the Lotus Provinces and
    beyond — their names follow different patterns, marking them as
    outsiders in every interaction. Based on Portuguese and Southern
    European naming.
  slots:
    given_name:
      word_list:
        - Rodrigo
        - Sebastião
        - Francisco
        - Álvaro
        - Gaspar
        - Luís
        - João
        - Fernão
        - Diogo
        - António
        - Maria
        - Isabel
        - Catarina
        - Ana
        - Beatriz
        - Leonor
    family_name:
      word_list:
        - Ferreira
        - Cardoso
        - Valignano
        - Almeida
        - Rodrigues
        - Pinto
        - Coutinho
        - Tavares
        - Mendes
        - Correia
    title:
      word_list:
        - Padre
        - Capitão
        - Senhor
        - Senhora
        - Irmão
  person_patterns:
    - "{given_name} {family_name}"
    - "{title} {family_name}"
    - "{title} {given_name}"
  place_patterns:
    - "{family_name} {given_name}"

- name: Emishi Northern People
  description: >-
    The indigenous people of the northern island — earth and water
    channelers with naming patterns distinct from the fire-culture
    mainstream. Their names carry the weight of forest, river, and
    mountain.
  slots:
    given_name:
      corpora:
        - corpus: earth_kingdom.txt
          weight: 0.5
        - corpus: water_tribe.txt
          weight: 0.5
      lookback: 2
    clan_name:
      corpora:
        - corpus: water_tribe.txt
          weight: 1.0
      lookback: 3
    place_noun:
      word_list:
        - forest
        - river
        - ridge
        - hollow
        - spring
        - clearing
        - stone
        - falls
    adjective:
      word_list:
        - deep
        - ancient
        - frozen
        - singing
        - hidden
        - mossy
        - grey
        - silent
  person_patterns:
    - "{given_name} of {clan_name}"
    - "{given_name} {clan_name}"
  place_patterns:
    - "{adjective} {place_noun}"
    - "{clan_name} {place_noun}"
