world_name: The Burning Peace
history: >-
  Eighty years ago, Tokigane Yasuhiro ended a century of civil war by
  defeating the Shimora and Kurogane dynasties at the Battle of Sekimori
  Plain. He declared himself Taishōgun — Supreme Fire Marshal — and
  imposed an order so absolute that three generations have lived and died
  without seeing open war between the great lords. But the Burning Peace
  is not harmony. It is the absence of war enforced by the threat of
  overwhelming fire channeling power. The Tokigane dynasty rules from Edo
  Castle, surrounded by loyal inner lords who hold the levers of
  government. The outer lords — descendants of those who surrendered at
  Sekimori — control the largest and richest domains but are excluded from
  power, drained by the alternate attendance system, and watched by the
  Metsuke, the Shogunate's network of fire channeler inspectors. Forty
  years ago, the Uprising of the Faithful in the southern islands —
  thirty thousand farmers and ronin following a charismatic spirit medium
  named Amakusa Shion — shook the Shogunate so deeply that it sealed the
  islands from foreign contact entirely. Now the Ember Isles look inward.
  The warrior class grows restless in peacetime. The merchant class grows
  wealthy despite being the lowest rank in the social order. Spirit
  activity is increasing — yokai appear in castle towns, the sacred
  volcano Mount Kasai rumbles with displeasure, and the boundary between
  the mortal world and the spirit world grows thinner each year. Something
  is coming. The fire channelers feel it in their forms. The spirit
  mediums see it in their visions. Even the poets write about it, in
  careful metaphors that pass the censors but carry warnings to those who
  know how to read them.

geography: >-
  The Ember Isles are a volcanic archipelago stretching northeast to
  southwest across a thousand leagues of ocean. Four main islands and
  hundreds of smaller ones form a crescent around the Inland Sea — a
  sheltered body of water that serves as the primary trade route between
  the great port cities. The terrain is dramatic: volcanic peaks wreathed
  in cloud, steep forested mountains that drop to narrow coastal plains,
  river valleys terraced for rice cultivation, and hot springs that steam
  in every province. Mount Kasai, the sacred volcano at the geographic
  and spiritual center of the isles, rises above everything — visible
  from Edo on clear days, from Kyōen always. The Five Highways connect
  the major cities: the Tōkaidō follows the eastern coast from Edo to
  Kyōen through fifty-three posting stations; the Nakasendō cuts through
  the central mountains; the Ōshū Kaidō runs north into frontier
  territory; and two lesser roads serve the western and shrine routes.
  Travel is controlled — fire channeler checkpoints at every major pass
  examine travelers' papers, search for weapons, and watch for fugitives.
  The most feared checkpoint is Hakone Gate, where the mountains meet the
  sea and the road narrows to a single bridge over a volcanic gorge.

cosmology: >-
  The people of the Burning Peace live in a world where the spirit realm
  presses close. Every mountain, river, crossroads, and ancient tree may
  house a kami — a spirit of place that must be respected, appeased, or
  avoided. The great shrines channel fire energy to maintain the boundary
  between worlds, but since the Sealing of the Gates cut the isles off
  from the elemental balance of the wider world, that boundary has
  weakened. Yokai — spirits that take animal, monstrous, or deceptively
  human form — have grown bolder, appearing in villages and even castle
  towns. Kitsune foxes bewitch travelers on mountain roads. Tengu crow-
  spirits haunt the deep forests and occasionally teach channeling forms
  to those they deem worthy. Kappa water-spirits lurk in rivers and
  demand tribute from those who would cross. The yamabushi — mountain
  ascetics who practice a syncretic blend of fire channeling, spirit
  communion, and physical austerity — claim the spirit world is
  responding to the Shogunate's attempt to control it. You cannot
  regulate kami, they say. You can only listen. The Shogunate disagrees.
  The great temple at Nikkō enshrines the spirit of Tokigane Yasuhiro
  himself, deified after death as the Burning Ancestor, and the official
  doctrine holds that the Tokigane bloodline channels fire with divine
  authority. Beneath this official faith, the Hidden Way persists — the
  outlawed foreign doctrine that teaches all elements are equal and the
  spirit world is not to be feared but embraced. Its followers meet in
  secret, worship in silence, and die without recanting when discovered.

factions:
  - name: The Burning Throne
    description: >-
      The Tokigane Shogunate and its network of loyal inner lords — the
      uchidaimyō — who hold every significant government position. Led by
      the current Taishōgun, Tokigane Ienori, a cautious administrator
      more comfortable with ledgers than fire forms, who inherited a
      system designed by warriors and must now govern with bureaucrats.
      The Shogunate's power rests on three pillars: the Metsuke inspector
      network that watches every domain for disloyalty, the alternate
      attendance system that keeps outer lords financially drained and
      their families hostage in Edo, and the simple fact that the Tokigane
      fire channelers remain the most powerful military force on the
      islands. But Ienori knows the pillars are cracking. The Metsuke
      report increasing spirit activity they cannot explain. The outer
      lords grow restless. And his own fire channelers, three generations
      removed from war, are becoming administrators who happen to know
      fire forms rather than warriors who happen to govern.
    disposition: neutral

  - name: The Outer Flame
    description: >-
      A loose alliance of sotodaimyō — the outer lords who surrendered
      after Sekimori and have spent three generations nursing their
      grievances in wealthy exile. The alliance has no single leader,
      which is both its weakness and its strength — the Metsuke cannot
      decapitate what has no head. The most powerful outer lords are the
      Shimora of the western mountains (whose secret fire academies train
      channelers in forbidden techniques), the Kurogane of the southern
      coast (who control the richest mining operations on the islands),
      and the Hayashi of the far south (whose proximity to Nagasaki
      gives them access to foreign goods and ideas). The Outer Flame
      does not yet seek open rebellion — the memory of Sekimori is too
      fresh, and the Shogunate's military superiority too real. Instead,
      they prepare. They train. They wait. They watch Mount Kasai and
      wonder if the volcano's awakening might finally shift the balance.
    disposition: wary

  - name: The Imperial Shrine
    description: >-
      The Emperor of the Ember Isles — the Tennō — resides in the ancient
      capital of Kyōen, surrounded by a court of scholars, spirit mediums,
      and artists who preserve the old ways. The Emperor holds no military
      power; the Tokigane Shogunate controls his finances, restricts his
      movement, and appoints his advisors. But the Emperor possesses
      something the Shogunate cannot manufacture: spiritual legitimacy.
      The Tennō is believed to be the living bridge between the mortal
      world and the spirit world, the one person who can speak to kami as
      an equal. As spirit activity increases and Mount Kasai rumbles, more
      people — even some inner lords — are quietly sending envoys to Kyōen
      to ask what the Emperor sees. The current Emperor, a young woman
      named Kazuhime, is far more politically astute than the Shogunate
      realizes. She has begun receiving visitors from the outer lords.
    disposition: cautious

  - name: The Hidden Way
    description: >-
      The underground community of followers of the foreign faith brought
      by Nanban missionaries before the Sealing. They believe all elements
      are equal expressions of a single divine source, that the spirit
      world is a doorway to enlightenment rather than a threat to be
      managed, and that fire channeling holds no inherent superiority over
      any other form. The Hidden Way has no formal hierarchy — cells
      operate independently, recognizing each other through coded phrases,
      small gestures, and objects that appear mundane but carry symbolic
      meaning. Some followers are farmers and fishermen. Others are
      merchants who use trade networks to move people and information.
      A few are ronin who protect the faithful. The Shogunate's inspection
      system — requiring citizens to step on a sacred image to prove they
      do not follow the foreign faith — catches some, but the truly
      devoted have learned to step on the image and weep inside. Their
      leader, if they have one, is known only as the Shepherd.
    disposition: cautious

  - name: The Shadow Schools
    description: >-
      The shinobi networks of the Iga and Kōga mountain villages —
      communities that developed a unique blend of fire channeling,
      stealth, and intelligence gathering during the civil war era. The
      Shogunate officially disbanded the shinobi after unification, but
      in practice, the Metsuke inspector network is staffed heavily by
      Iga graduates, and every major lord quietly employs Kōga operatives
      for tasks that fire channelers in uniform cannot perform. The
      Shadow Schools serve no single master — they take contracts from
      whoever pays, maintain strict neutrality between the Shogunate and
      the outer lords, and guard their independence fiercely. Their
      mountain villages are effectively autonomous, hidden in terrain
      so rugged that even the Shogunate's fire channelers cannot easily
      reach them. The current grandmaster of the Iga school, known only
      as Kagerō — Heat Haze — is rumored to channel fire so precisely
      that they can extinguish a candle from across a room without
      disturbing the air around it.
    disposition: neutral
