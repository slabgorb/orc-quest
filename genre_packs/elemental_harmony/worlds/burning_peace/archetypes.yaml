- name: Samurai Retainer
  description: >-
    A fire channeler sworn to a lord's service — disciplined, bound by
    duty, trained in the forms since childhood. In peacetime, they serve
    as administrators, bodyguards, and enforcers of their lord's will.
    Most have never fought a real battle. Some wonder if they ever will.
    The best ones wonder if they should.
  role: ally_or_obstacle
  personality_traits:
    - dutiful
    - proud
    - privately uncertain
  typical_classes:
    - Martial Artist
    - Guardian
  typical_races:
    - Ember Isles
  stat_ranges:
    Strength: [12, 16]
    Agility: [12, 16]
    Harmony: [10, 14]
  inventory_hints:
    - paired swords (long and short)
    - family crest armor
    - lord's letter of authority
  dialogue_quirks:
    - speaks formally, uses honorifics precisely to establish hierarchy
    - cites duty before personal opinion, always
  disposition_default: -5

- name: Ronin Swordsman
  description: >-
    A masterless warrior — cast out, released, or orphaned by the
    collapse of a lord's house. Ronin range from honorable wanderers
    seeking new service to desperate criminals selling their sword arm
    to whoever pays. The Shogunate distrusts all of them. Some ronin
    still practice their fire forms daily. Others have let the flame
    die and fight with steel alone.
  role: ally_or_antagonist
  personality_traits:
    - bitter
    - pragmatic
    - haunted by lost purpose
  typical_classes:
    - Wanderer
    - Martial Artist
  typical_races:
    - Ember Isles
  stat_ranges:
    Agility: [14, 18]
    Endurance: [12, 16]
  inventory_hints:
    - single sword (the short sword was pawned)
    - threadbare traveling clothes
    - an empty coin purse
    - a letter of service that no longer means anything
  dialogue_quirks:
    - drops honorifics deliberately — either from contempt or exhaustion
    - measures everyone they meet as a potential opponent or employer
  disposition_default: 0

- name: Shadow Operative
  description: >-
    A shinobi from the Iga or Kōga mountain villages — trained in
    stealth, intelligence gathering, and a precise form of fire
    channeling that emphasizes control over power. They can extinguish
    a flame as easily as ignite one, create diversions with smoke and
    flash, and move through shadows that seem darker than they should
    be. Officially, shinobi do not exist. Unofficially, every lord
    employs them and every lord knows it.
  role: quest_giver_or_antagonist
  personality_traits:
    - observant
    - patient
    - professionally detached
  typical_classes:
    - Wanderer
    - Channeler
  typical_races:
    - Ember Isles
  stat_ranges:
    Agility: [16, 18]
    Insight: [14, 18]
    Spirit: [10, 14]
  inventory_hints:
    - dark clothing that is not quite uniform
    - concealed blades in unexpected places
    - smoke powder in sealed packets
    - a cover identity with matching papers
  dialogue_quirks:
    - answers questions with questions
    - remembers everything they are told and reminds you of it later
  disposition_default: 0

- name: Nanban Missionary
  description: >-
    A spiritual teacher from the Lotus Provinces who traveled to the
    Ember Isles before the Sealing — or who smuggled themselves in
    after. They preach that all elements are equal expressions of a
    single divine source, which makes them the most dangerous kind of
    person the Shogunate can imagine. Most missionaries who remained
    after the Sealing are in hiding, protected by the Hidden Way,
    moving between safe houses, teaching in whispers. They carry no
    weapons. They carry something worse: ideas.
  role: quest_giver_or_protected
  personality_traits:
    - serene under pressure
    - stubborn about faith
    - genuinely compassionate
  typical_classes:
    - Scholar
    - Spirit Medium
  typical_races:
    - Lotus Provinces
    - Mixed Heritage
  stat_ranges:
    Insight: [14, 18]
    Spirit: [14, 18]
    Harmony: [12, 16]
  inventory_hints:
    - simple robes that blend with local clothing
    - a sacred text hidden inside an innocuous book cover
    - prayer beads that could be mistaken for a merchant's abacus
    - medicines from the Lotus Provinces
  dialogue_quirks:
    - speaks the local language fluently but with a soft accent
    - quotes scripture that sounds like folk wisdom until you listen carefully
  disposition_default: 10

- name: Nanban Trader
  description: >-
    A merchant from the Lotus Provinces confined to Dejima island in
    Nagasaki harbor — the only legal point of foreign contact. They
    trade in porcelain, silk, medicine, and curiosities, but their
    real currency is information. They know what the outside world
    looks like. They know what the Jade Kingdoms are doing, what the
    Tide Reaches are building, what technologies the other nations
    have developed while the Ember Isles turned inward. Every lord
    wants what they know. The Shogunate wants to control what they say.
  role: information_broker
  personality_traits:
    - charming
    - calculating
    - homesick
  typical_classes:
    - Scholar
    - Wanderer
  typical_races:
    - Lotus Provinces
  stat_ranges:
    Insight: [14, 18]
    Harmony: [10, 14]
  inventory_hints:
    - foreign clothes worn under local outer garments
    - a ledger in a language no local can read
    - trade samples of exotic goods
    - a pocket telescope
  dialogue_quirks:
    - quotes prices in multiple currencies from habit
    - describes the outside world in ways that make listeners ache with curiosity
  disposition_default: 10

- name: Tea Ceremony Master
  description: >-
    A practitioner of the Way of Tea — an art form that is simultaneously
    meditation, status display, philosophy, and espionage opportunity.
    The tea room is the one place where a merchant can sit across from
    a lord as something approaching an equal. Tea masters hear everything.
    The best ones understand that the pause before pouring is where the
    real negotiation happens.
  role: information_broker_or_mentor
  personality_traits:
    - serene
    - perceptive
    - quietly powerful
  typical_classes:
    - Scholar
    - Channeler
  typical_races:
    - Ember Isles
    - Jade Kingdoms
  stat_ranges:
    Insight: [16, 18]
    Harmony: [14, 18]
    Spirit: [12, 16]
  inventory_hints:
    - a portable tea set worth more than most houses
    - a rare tea canister with a storied provenance
    - a single flower in a simple vase
  dialogue_quirks:
    - speaks only during pauses in the ceremony, making every word deliberate
    - offers tea before answering any question, no exceptions
  disposition_default: 5

- name: Kabuki Performer
  description: >-
    An actor in the flamboyant kabuki theater — an art form that the
    Shogunate considers morally suspect but cannot suppress because
    everyone from merchants to inner lords attends. Kabuki performers
    are celebrities, social chameleons, and natural spies. They observe
    their audience as carefully as their audience watches them. Some
    specialize in onnagata — male actors playing female roles with such
    conviction that the boundary between performance and identity
    blurs. A few maintain hidden martial training, because the theater
    district is not a safe place after dark.
  role: information_broker_or_ally
  personality_traits:
    - charismatic
    - observant
    - lives between identities
  typical_classes:
    - Wanderer
    - Scholar
  typical_races:
    - Ember Isles
  stat_ranges:
    Agility: [12, 16]
    Insight: [14, 18]
    Harmony: [12, 16]
  inventory_hints:
    - elaborate costume and makeup kit
    - a fan that conceals a blade
    - playbills from a dozen cities
    - love letters from admirers of every class
  dialogue_quirks:
    - shifts between characters mid-conversation, sometimes deliberately
    - quotes famous plays to make points without stating them directly
  disposition_default: 15

- name: Yamabushi Ascetic
  description: >-
    A mountain hermit who practices a syncretic blend of fire channeling,
    spirit communion, and brutal physical austerity. Yamabushi meditate
    under freezing waterfalls, fast for weeks, walk barefoot through
    volcanic terrain, and claim that suffering opens doorways to the
    spirit world that comfort keeps closed. The Shogunate tolerates
    them because they serve as early warning for volcanic activity and
    because their mountain hermitages are genuinely difficult to reach.
    The yamabushi answer to no lord. They answer to the mountain.
  role: mentor_or_quest_giver
  personality_traits:
    - cryptic
    - tough as mountain stone
    - sees things others cannot
  typical_classes:
    - Spirit Medium
    - Channeler
  typical_races:
    - Ember Isles
    - Sky Temples
  stat_ranges:
    Spirit: [16, 18]
    Endurance: [14, 18]
    Insight: [12, 16]
  inventory_hints:
    - a conch shell horn
    - prayer beads made from volcanic stone
    - a staff topped with metal rings that chime in the wind
    - robes that smell of woodsmoke and pine
  dialogue_quirks:
    - speaks in koans and natural metaphors
    - refers to the mountain as though it were a person with opinions
  disposition_default: 0

- name: Geisha Informant
  description: >-
    A professional entertainer trained in conversation, music, dance,
    and the art of making powerful people feel comfortable enough to
    say things they shouldn't. Geisha operate in the licensed pleasure
    quarters of the great cities, and their clients include lords,
    merchants, foreign traders, and Metsuke inspectors. The best geisha
    maintain networks of information that rival the Shadow Schools — but
    where shinobi trade in secrets for money, geisha trade in them for
    influence, protection, and the quiet satisfaction of knowing more
    than anyone in the room.
  role: information_broker
  personality_traits:
    - graceful
    - politically astute
    - fiercely independent behind the performance
  typical_classes:
    - Scholar
    - Wanderer
  typical_races:
    - Ember Isles
  stat_ranges:
    Insight: [16, 18]
    Harmony: [14, 18]
  inventory_hints:
    - a shamisen with a hidden compartment
    - silk robes that cost more than a samurai's annual stipend
    - a client book written in personal cipher
    - hairpins that are decorative and functional
  dialogue_quirks:
    - never asks a direct question — draws information through conversation
    - remembers every client's preferences, weaknesses, and secrets
  disposition_default: 5

- name: Wandering Poet
  description: >-
    A traveler who wanders the Five Highways composing verse about what
    they see — the beauty of a frog jumping into a pond, the sadness of
    an abandoned checkpoint, the way firelight looks on snow. Poets are
    tolerated everywhere because they seem harmless. They are not. A
    poet who has walked every highway and stayed at every posting station
    knows the terrain, the people, the mood of the countryside, and the
    things that officials would prefer remain unwritten. Their poems,
    passed from teahouse to teahouse, carry coded warnings to those who
    know how to read the seasonal references.
  role: information_broker_or_guide
  personality_traits:
    - observant
    - melancholy
    - deceptively harmless
  typical_classes:
    - Wanderer
    - Scholar
  typical_races:
    - Ember Isles
  stat_ranges:
    Insight: [16, 18]
    Spirit: [12, 16]
  inventory_hints:
    - a travel journal filled with haiku
    - a walking staff worn smooth
    - a straw hat and rain cloak
    - letters of introduction from teahouse keepers along every highway
  dialogue_quirks:
    - responds to questions with haiku that are more useful than they first appear
    - notices small details — a new fence, a missing boat, a changed expression
  disposition_default: 15

- name: Metsuke Inspector
  description: >-
    The Shogunate's eyes and ears — a fire channeler assigned to watch
    a domain, a highway, or a city district for signs of disloyalty,
    smuggling, or the Hidden Way. Metsuke operate openly (everyone knows
    who they are) and covertly (nobody knows all of them). They have
    the authority to arrest, detain, and interrogate, and they report
    directly to the Shogunate council, bypassing local lords entirely.
    Some are diligent servants of order. Some are corrupt. Some are
    quietly sympathetic to the people they are supposed to be watching.
  role: antagonist_or_complex_ally
  personality_traits:
    - methodical
    - suspicious
    - burdened by what the job requires
  typical_classes:
    - Channeler
    - Guardian
  typical_races:
    - Ember Isles
  stat_ranges:
    Insight: [14, 18]
    Spirit: [10, 14]
    Strength: [12, 16]
  inventory_hints:
    - Shogunate authority seal
    - a ledger of observations in coded shorthand
    - fire channeling restraints for prisoners
    - a concealed signal flare
  dialogue_quirks:
    - asks questions they already know the answer to, watching for the lie
    - addresses everyone with scrupulous politeness that feels like a threat
  disposition_default: -10

- name: Daimyō's Advisor
  description: >-
    The political brain behind a lord's throne — a scholar, strategist,
    or retired channeler who navigates the deadly politics of the
    alternate attendance system, manages domain finances squeezed by
    Shogunate taxation, and plots long-term moves on a board where one
    mistake means the end of a family that has survived for generations.
    The best advisors see three moves ahead. The worst ones see only
    their own advancement.
  role: quest_giver_or_antagonist
  personality_traits:
    - calculating
    - patient
    - loyal to the clan above all
  typical_classes:
    - Scholar
    - Channeler
  typical_races:
    - Ember Isles
  stat_ranges:
    Insight: [16, 18]
    Harmony: [12, 16]
    Spirit: [10, 14]
  inventory_hints:
    - a map of political alliances updated daily
    - correspondence in multiple ciphers
    - a seal that carries a lord's authority
    - a small blade they have never drawn but always carry
  dialogue_quirks:
    - speaks in metaphors drawn from strategy games
    - never states their lord's true position — only implies it
  disposition_default: -5
