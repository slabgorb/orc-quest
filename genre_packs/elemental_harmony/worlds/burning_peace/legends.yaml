- name: The Unification War of the Three Flames
  era: 80 years ago
  summary: >-
    For a century, the Ember Isles tore themselves apart in civil war as
    three great fire channeler dynasties — the Tokigane of the eastern
    plains, the Shimora of the western mountains, and the Kurogane of the
    southern coast — fought for supremacy. The war ended at the Battle of
    Sekimori Plain, where Tokigane Yasuhiro, a patient strategist who had
    spent decades forging alliances with lesser lords, lured the Shimora
    and Kurogane armies into a pincer between his fire channelers and the
    sudden betrayal of three western lords he had secretly turned. The
    conflagration at Sekimori burned for three days. When the fires died,
    Tokigane Yasuhiro declared himself Taishōgun — Supreme Fire Marshal —
    and imposed a peace backed by the threat of absolute channeling
    supremacy. The Shimora surrendered. The Kurogane knelt. The islands
    unified for the first time in recorded history.
  cultural_impact: >-
    The Unification War defines everything about the current political
    order. The Tokigane dynasty rules from Edo Castle, and every lord who
    fought beside Yasuhiro at Sekimori — the inner lords, or uchidaimyō —
    holds privileged positions in government. The lords who surrendered
    after the battle — the outer lords, or sotodaimyō — rule larger,
    wealthier domains but are excluded from power and watched constantly.
    The alternate attendance system forces every outer lord to spend half
    their years in Edo, leaving family members as hostages. The peace is
    real but brittle. Three generations have passed and the outer lords
    have not forgotten.
  affected_cultures:
    - Ember Isles
  faction_grudges:
    - from: Outer Lords (sotodaimyō)
      to: Tokigane Shogunate
      reason: >-
        The western lords who were betrayed at Sekimori — the Shimora and
        their allies — were stripped of their best channeling grounds and
        forced into submission. Their descendants maintain secret fire
        training academies in defiance of Shogunate weapons restrictions.
    - from: Kurogane remnants
      to: Tokigane Shogunate
      reason: >-
        The Kurogane clan's ancestral volcano-forge was confiscated and
        converted into a Shogunate military academy. The family serves as
        minor administrators, burning with resentment passed from parent
        to child.
  lost_arts:
    - >-
      Shimora storm-fire — a technique combining fire channeling with
      weather manipulation that died with the Shimora war-masters at
      Sekimori
    - >-
      The Kurogane volcano-forge method — deep-earth fire channeling that
      drew power directly from magma, now forbidden by Shogunate decree
  monuments:
    - >-
      The Victory Pillars at Sekimori Plain — twelve obsidian columns
      marking where each betraying lord turned their flames against the
      western army, maintained by the Shogunate as a reminder of what
      happens to those who resist unification
    - >-
      The Kneeling Stone at Edo Castle — a flat basalt slab where the
      Kurogane lord prostrated himself before Tokigane Yasuhiro, now
      embedded in the castle's audience hall floor where every visiting
      lord must stand upon it
  terrain_scars:
    - type: battlefield
      name: The Scorched Plain of Sekimori
      description: >-
        A vast expanse of blackened earth east of the central mountains
        where the three-day conflagration fused the topsoil into a dark,
        glassy crust. Nothing grows there. Fire channelers report their
        flames burning hotter and wilder on the plain, as though the
        concentrated violence left a permanent elemental scar. Local
        farmers avoid it and claim to hear war-drums on windless nights.
    - type: cursed_ground
      name: The Ash Fields of Nishigawa
      description: >-
        The western mountain passes where the Shimora army was trapped
        and incinerated. The ash layer is still several feet deep in
        places, and the mountain slopes are permanently stained grey.
        Spirits of the war dead drift through the passes at dusk —
        fire-ghosts that flicker at the edge of vision and vanish when
        addressed.

- name: The Uprising of the Faithful
  era: 45 years ago
  summary: >-
    Thirty-five years into the Burning Peace, a charismatic young spirit
    medium named Amakusa Shion emerged among the farming communities of
    the southern islands. Shion preached a foreign spiritual doctrine
    brought by Nanban missionaries from the Lotus Provinces — a faith
    that taught all elements were equal expressions of a single divine
    source, that fire held no special authority, and that the spirit
    world was not to be feared but embraced as a doorway to
    enlightenment. The doctrine spread like wildfire among overtaxed
    farmers and masterless channelers. When the local lord attempted to
    arrest Shion, thirty thousand followers — farmers, ronin, and
    spirit-touched outcasts — fortified an abandoned coastal castle and
    declared themselves free of the Shogunate. The Taishōgun mobilized
    eighty thousand fire channelers and besieged the fortress for four
    months. The final assault was a coordinated conflagration that melted
    the castle walls. No quarter was given. Amakusa Shion died channeling
    a barrier of pure spirit energy that held for three hours before
    collapsing. Every defender was killed.
  cultural_impact: >-
    The Uprising terrified the Shogunate far more than the Unification
    War. Farmers — people without fire channeling — had nearly overthrown
    a regional lord using spirit channeling and sheer numbers. The
    Shogunate responded with three policies that define the current era:
    First, all Nanban missionaries were expelled and the southern ports
    sealed to foreign spiritual teachers. Second, spirit channeling
    was placed under strict regulation — spirit mediums must register
    with the local temple authority and submit to annual inspection.
    Third, the practice of any faith not sanctioned by the Shogunate
    became punishable by death. Despite this, the Hidden Way persists
    underground, its followers meeting in secret, recognizing each other
    by small gestures and coded phrases. The Shogunate's inspection
    system — requiring citizens to step on a sacred image to prove they
    do not follow the foreign faith — is enforced in every village.
  affected_cultures:
    - Ember Isles
  faction_grudges:
    - from: The Hidden Way (underground faithful)
      to: Tokigane Shogunate
      reason: >-
        The massacre at Shimabara Castle is remembered as a martyrdom.
        Amakusa Shion's spirit barrier — three hours of pure channeling
        against eighty thousand — is whispered about as proof that the
        foreign faith grants power beyond fire alone.
    - from: Tokigane Shogunate
      to: Nanban missionaries (Lotus Provinces)
      reason: >-
        The Shogunate views the foreign faith as a weapon designed to
        undermine fire channeler authority. Any Nanban spiritual teacher
        found on the islands faces execution. Secular traders are
        tolerated only at Dejima, the artificial island in Nagasaki
        harbor.
  lost_arts:
    - >-
      Amakusa Shion's spirit barrier technique — a sustained defensive
      channeling form that drew on all four elements simultaneously,
      something modern channelers consider impossible
    - >-
      The Nanban communion ritual — a group meditation technique that
      allowed non-channelers to briefly perceive the spirit world
  monuments:
    - >-
      The Melted Walls of Shimabara — the ruins of the coastal fortress,
      deliberately left uncleared as a warning. The stone walls are
      partially fused into smooth glass from the final assault's heat.
      Flowers appear at the base each spring, left by unknown hands.
    - >-
      The Sealed Southern Gate at Nagasaki — a massive iron gate across
      the harbor entrance, opened only for approved Nanban trading
      vessels and closed with channeled fire-welds at all other times
  terrain_scars:
    - type: ruin
      name: The Melted Fortress of Shimabara
      description: >-
        The remains of the coastal castle where thirty thousand followers
        of the foreign faith made their last stand. The walls are fused
        into smooth obsidian from the final conflagration. The ground
        inside the walls is barren — nothing grows in the footprint of
        the fortress. Spirit mediums report hearing chanting from within
        the ruins at night, and the air inside the walls is always
        several degrees cooler than outside, as though Shion's spirit
        barrier left a permanent chill.
    - type: cursed_ground
      name: The Weeping Shore
      description: >-
        The beach below Shimabara where the tide carried ash and remains
        for weeks after the massacre. Fishermen avoid the waters. On
        still nights, the sea glows faintly blue — the color of spirit
        energy — and shapes move beneath the surface that are not fish.

- name: The Sealing of the Gates
  era: 40 years ago
  summary: >-
    In the aftermath of the Uprising, the third Taishōgun — Tokigane
    Iemasa — declared the Ember Isles closed to all foreign contact
    except through a single controlled port at Nagasaki. The Lotus
    Provinces trading houses, which had operated freely in Osaka and
    the southern ports for decades, were expelled. Nanban missionaries
    from multiple cultures were hunted down and executed or driven
    underground. A tiny artificial island — Dejima — was constructed
    in Nagasaki harbor, and only Lotus Provinces secular merchants were
    permitted to dock there, under armed guard, forbidden to set foot
    on the mainland. The Sealing transformed the Ember Isles from an
    outward-looking maritime culture into an isolated fortress-state.
    Trade routes that had connected the isles to the Jade Kingdoms, the
    Tide Reaches, and the Lotus Provinces withered. Knowledge of the
    outside world became contraband. The Shogunate's fire channeler
    inspectors — the Metsuke — patrol the coastline, and any unauthorized
    ship approaching the islands is burned on sight.
  cultural_impact: >-
    The Sealing created the world the players inhabit: an island chain
    that has turned inward, its warrior class growing restless in peace,
    its merchants growing wealthy despite their low status, its spiritual
    life controlled by a government that fears any power it cannot
    channel through fire. The outside world has become mythical —
    younger generations know the Jade Kingdoms and the Tide Reaches
    only from old stories and the carefully censored goods that arrive
    at Dejima. Meanwhile, the isolation has concentrated the spirit
    world's attention on the isles. With fewer channelers traveling
    abroad, the elemental balance within the islands has grown
    increasingly unstable. Mount Kasai's rumbling is the most visible
    symptom, but spirit-sightings have tripled in the past decade, and
    the yokai — spirits that take animal or monstrous form — have grown
    bolder, appearing in villages and castle towns where they were
    once confined to deep forests and mountain passes.
  affected_cultures:
    - Ember Isles
    - Lotus Provinces
    - Jade Kingdoms
    - Tide Reaches
  faction_grudges:
    - from: Lotus Provinces merchants
      to: Tokigane Shogunate
      reason: >-
        Decades of profitable trade relationships were severed overnight.
        The Lotus Provinces lost their most lucrative market and their
        merchants — confined to tiny Dejima — are treated as potential
        spies rather than partners.
    - from: Ember Isles merchants
      to: Tokigane Shogunate
      reason: >-
        The merchant class, already the lowest in the social hierarchy,
        lost their most profitable foreign trade routes. Some have grown
        wealthy through domestic trade, but they resent the Shogunate's
        restrictions and quietly fund smuggling operations.
  lost_arts:
    - >-
      Cross-cultural channeling techniques — Ember Isles channelers who
      trained with Jade Kingdoms earth masters or Tide Reaches water
      teachers brought home hybrid forms that are now dying out as the
      teachers are gone and the techniques are not written down
    - >-
      Nanban navigation — foreign star-reading and current-mapping
      techniques that allowed long-distance ocean travel, now
      deliberately suppressed
  monuments:
    - >-
      Dejima Island — the tiny artificial island in Nagasaki harbor where
      foreign merchants are confined, connected to the mainland by a
      single guarded bridge that is closed and fire-sealed each night
    - >-
      The Coastal Fire Beacons — a chain of signal towers along the
      entire coastline, each staffed by fire channelers who can ignite
      the next beacon within seconds, creating a perimeter warning
      system that can alert the Shogunate to any approaching ship
      within minutes
  terrain_scars:
    - type: ruin
      name: The Burned Wharves of Sakai
      description: >-
        The once-thriving international port of Sakai, south of Osaka,
        was deliberately burned by Shogunate channelers when the Sealing
        was declared. The charred pilings still stand in the harbor,
        too large to remove, a forest of blackened wood rising from the
        water. Foreign merchant houses that lined the waterfront are
        hollow shells. Smugglers use the ruins as a meeting point,
        knowing the Metsuke consider the area too visible to hide in.
    - type: dead_zone
      name: The Forbidden Coast
      description: >-
        A stretch of southern coastline where the Shogunate maintains
        a permanent fire channeling patrol. The beaches are swept clean
        of boats, the fishing villages relocated inland, and anyone
        found on the shore without authorization is arrested. The sea
        itself seems to respond to the isolation — currents have shifted,
        making unauthorized approach by ship genuinely dangerous even
        without the fire patrols.
