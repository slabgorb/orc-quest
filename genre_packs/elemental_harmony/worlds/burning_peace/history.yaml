chapters:
  - id: early
    label: "Newcomer on the Highway"
    session_range: [1, 5]
    character:
      name: ""
      level: 1
      gold: 30
      relationships:
        - name: Takeda Jirō
          role: teahouse keeper on the Tōkaidō
          disposition: 15
          notes: "Gave you shelter during a storm. Knows everyone who passes through."
        - name: Hasegawa Ren
          role: ronin traveling the same road
          disposition: 5
          notes: "Shared a meal at a posting station. Too disciplined to be truly aimless."
      progression:
        primary_affinity: null
        affinity_scores: {}
        milestones_earned: []
    npcs:
      - archetype: Teahouse Keeper
        name: Takeda Jirō
        disposition: 15
        location: hakone
        notes: "Runs a teahouse at the Hakone posting station. Hears every rumor."
      - archetype: Ronin Swordsman
        name: Hasegawa Ren
        disposition: 5
        location: edo
        notes: "Recently arrived in Edo. Looking for work. Carries a grudge."
      - archetype: Metsuke Inspector
        name: Kageyama Tōru
        disposition: -10
        location: hakone
        notes: "Stationed at Hakone Gate. Thorough, suspicious, not corrupt."
    quests:
      "Deliver a letter to Edo": "in_progress"
      "Find lodging in the capital": "not_started"
    lore:
      - "The Tōkaidō highway has fifty-three posting stations between Edo and Kyōen."
      - "Every traveler must carry papers stamped by their local lord."
      - "Hakone Gate searches for weapons moving toward Edo and women moving away."
      - "Mount Kasai has been rumbling for three years. The officials say it is nothing."
    notes:
      - "The player arrives on the Tōkaidō, traveling toward Edo with a simple task."
      - "First encounters establish the social hierarchy and the checkpoint system."
      - "The ronin Hasegawa Ren will become important later — a thread, not a plot."
    narrative_log:
      - speaker: narrator
        text: >-
          The highway stretches before you through morning mist. Ahead,
          the posting stations of the Tōkaidō march toward Edo like
          soldiers standing at attention. Behind you, the mountains hide
          everything you left.
    location: hakone
    time_of_day: morning
    atmosphere: >-
      A world in careful, beautiful, controlled order — paper screens,
      precise courtesies, the smell of charcoal and green tea. Beneath
      the beauty, the constant awareness of being watched.
    active_stakes: "Reach Edo safely. Avoid the attention of the Metsuke."
    points_of_interest:
      - name: Hakone Gate
        description: "The checkpoint. Your papers will be examined. Be ready."
        type: obstacle
      - name: The hot springs
        description: "Steam rises from volcanic pools. Travelers bathe and gossip."
        type: social
      - name: The volcanic gorge
        description: "The road narrows to a bridge. Below, sulfur vents hiss."
        type: environmental
    tropes:
      - id: the_spirit_gate_opens
        name: The Spirit Gate Opens
        progress: 0.05
        status: background
        notes: "A fox watches from the treeline at dusk. Too still. Too attentive."

  - id: mid
    label: "The Fires Below"
    session_range: [6, 15]
    character:
      name: ""
      level: 3
      gold: 150
      items:
        - name: Traveler's Sword
          description: "A serviceable blade. Nothing special, but yours."
        - name: Papers of passage
          description: "Stamped by three different checkpoints. Getting worn."
        - name: Teahouse keeper's letter
          description: "A letter of introduction from Takeda Jirō. Opens doors."
      relationships:
        - name: Takeda Jirō
          role: teahouse keeper, information source
          disposition: 25
          notes: "You did him a favor. He remembers. His network remembers."
        - name: Hasegawa Ren
          role: ronin ally
          disposition: 20
          notes: "You've fought together. He trusts you. He is one of forty-seven."
        - name: Padre Rodrigo Ferreira
          role: Nanban missionary in hiding
          disposition: 15
          notes: "You found him in a merchant's basement. He asked for nothing."
        - name: Kageyama Tōru
          role: Metsuke inspector
          disposition: -5
          notes: "He's watching you now. Something you did caught his attention."
        - name: Shimora Takako
          role: outer lord's daughter
          disposition: 10
          notes: "Met during alternate attendance season in Edo. Dangerous."
      progression:
        primary_affinity: null
        affinity_scores: {}
        milestones_earned:
          - "Survived Hakone Gate inspection"
          - "Earned a teahouse keeper's trust"
          - "Witnessed a spirit at the mountain shrine"
    npcs:
      - archetype: Teahouse Keeper
        name: Takeda Jirō
        disposition: 25
        location: hakone
        notes: "Has become a reliable contact. Passes messages through his network."
      - archetype: Ronin Swordsman
        name: Hasegawa Ren
        disposition: 20
        location: edo
        notes: "Revealed himself as one of the forty-seven loyal ronin."
      - archetype: Nanban Missionary
        name: Padre Rodrigo Ferreira
        disposition: 15
        location: osaka
        notes: "Moving between safe houses. The Hidden Way protects him."
      - archetype: Metsuke Inspector
        name: Kageyama Tōru
        disposition: -5
        location: edo
        notes: "Reassigned to Edo. Following leads on the forty-seven."
      - archetype: Daimyō's Advisor
        name: Shimora Takako
        disposition: 10
        location: edo
        notes: "Outer lord's daughter, but also a trained channeler and strategist."
      - archetype: Yamabushi Ascetic
        name: Enkū
        disposition: 5
        location: mount_kasai
        notes: "Descended from the mountain. Says the fire spirits are afraid."
      - archetype: Kabuki Performer
        name: Ichikawa Danjūrō
        disposition: 10
        location: osaka
        notes: "The most famous actor on the islands. Knows everything about everyone."
    quests:
      "Deliver a letter to Edo": "completed"
      "Find lodging in the capital": "completed"
      "Help Hasegawa Ren with a 'small favor'": "in_progress"
      "Investigate the spirit sighting at Nikkō shrine": "in_progress"
      "Decide what to do about the missionary": "not_started"
    lore:
      - "The forty-seven ronin are real. Their lord was stripped of his domain unjustly."
      - "The Hidden Way has cells in every major city."
      - "Mount Kasai's fire spirits have begun appearing outside the mountain."
      - "The Shimora clan of Satsuma is training channelers in secret."
      - "Emperor Kazuhime has been receiving visitors from the outer lords."
    notes:
      - "Multiple plot threads converging — the ronin, the faith, the mountain."
      - "The player must start choosing sides, even passively."
      - "The Metsuke attention creates time pressure."
    narrative_log:
      - speaker: narrator
        text: >-
          Edo is a city of a million fires — cooking fires, forge fires,
          lantern fires, and the controlled channeling of samurai
          practicing their forms at dawn. You know the rhythms now.
          You know which alleys to avoid and which tea houses to trust.
          But the city is changing. Ronin gather in quiet clusters.
          The mountain's tremors rattle teacups. And somewhere in the
          merchant quarter, a foreign priest is teaching that fire is
          not supreme. The peace is burning from the inside.
    location: edo
    time_of_day: evening
    atmosphere: >-
      The careful order of the early sessions is cracking. Every
      conversation has a subtext. Every courtesy might be surveillance.
      The beauty is still there but now you see the cracks.
    active_stakes: >-
      The ronin conspiracy is moving. The mountain is waking. The
      Metsuke are watching. The player cannot stay uninvolved much longer.
    points_of_interest:
      - name: Hasegawa Ren's lodging
        description: "A small room above a sake shop. Maps on the wall."
        type: conspiracy
      - name: The merchant's basement
        description: "Where the Hidden Way meets. Lantern light and whispered prayer."
        type: underground
      - name: Shimora residence
        description: "The outer lord's Edo mansion. Beautiful and watched."
        type: political
    tropes:
      - id: the_loyal_ronin
        name: The Loyal Ronin
        progress: 0.4
        status: active
        notes: "Hasegawa has revealed the conspiracy. The clock is ticking."
      - id: the_hidden_congregation
        name: The Hidden Congregation
        progress: 0.3
        status: active
        notes: "The player knows about the missionary. The Metsuke do not. Yet."
      - id: the_spirit_gate_opens
        name: The Spirit Gate Opens
        progress: 0.3
        status: active
        notes: "Fire spirits appearing outside the mountain. Wards weakening."
      - id: the_outer_lords_gambit
        name: The Outer Lords' Gambit
        progress: 0.2
        status: background
        notes: "Shimora Takako dropped hints. The Shimora are preparing something."
