- name: The Wandering Blade
  extends: the-mentor
  description: >-
    A legendary swordsman walks the highways alone, challenging every
    school they encounter. They fight with wooden weapons and win. They
    refuse service to any lord. They seek something that cannot be found
    by staying still. Every martial artist on the islands knows the name
    and argues about whether the stories are real.
  triggers:
    - player encounters a martial arts school
    - player challenges or is challenged to a duel
    - player reaches a crossroads on a major highway
  narrative_hints:
    - the Wandering Blade appears at moments of crisis, not convenience
    - they test philosophy as much as skill
    - they have already been where the player is going
  tension_level: 0.6
  resolution_hints:
    - the Blade offers a lesson, not a solution
    - defeating the Blade proves nothing — understanding them proves everything
  tags:
    - rival
    - philosophy
  escalation:
    - at: 0.2
      event: rumors of the Wandering Blade reaching the next town
      npcs_involved: [teahouse keeper, posting station attendant]
      stakes: reputation
    - at: 0.5
      event: the Wandering Blade appears and challenges the player
      npcs_involved: [the Wandering Blade]
      stakes: honor and self-understanding
    - at: 0.8
      event: the Blade reveals they are dying and seeking a successor
      npcs_involved: [the Wandering Blade]
      stakes: legacy and the future of a sword philosophy

- name: The Mountain's Warning
  extends: the-spirit-crisis
  description: >-
    Mount Kasai is rumbling. The yamabushi say the mountain is angry.
    The Shogunate says it is nothing. Spirit mediums see fire in their
    visions. The truth is worse than either side admits — the volcano's
    awakening is connected to the elemental imbalance caused by the
    Sealing of the Gates, and no amount of fire channeling can calm
    a mountain that wants to speak.
  category: climax
  triggers:
    - player visits Mount Kasai or the Nikkō shrine
    - player consults a yamabushi or spirit medium
    - earthquake or volcanic tremor occurs during gameplay
  narrative_hints:
    - the mountain's activity increases as the story progresses
    - the Shogunate's denial grows more desperate
    - the yamabushi begin leaving the mountain — a deeply ominous sign
  tension_level: 0.8
  resolution_hints:
    - the eruption can be delayed but not prevented by fire channeling
    - the solution requires cooperation between elements — exactly what the Sealing forbids
    - opening the gates may save the islands but destroy the Shogunate's power
  tags:
    - environmental
    - political
  escalation:
    - at: 0.1
      event: minor tremors felt in Edo — dismissed by officials
      npcs_involved: [Metsuke inspector]
      stakes: public confidence
    - at: 0.3
      event: hot springs near Hakone boil over, scalding travelers
      npcs_involved: [yamabushi ascetic, posting station keeper]
      stakes: highway safety and trade
    - at: 0.5
      event: the yamabushi abandon their hermitages and descend to the lowlands
      npcs_involved: [yamabushi ascetic]
      stakes: the sacred mountain is being evacuated by its guardians
    - at: 0.7
      event: fire channelers near the mountain lose control — their flames burn wild
      npcs_involved: [samurai retainer, Metsuke inspector]
      stakes: military reliability and Shogunate authority
    - at: 0.9
      event: the mountain speaks — a voice from the volcano addresses the islands
      npcs_involved: []
      stakes: everything

- name: The Loyal Ronin
  description: >-
    A lord has been unjustly stripped of his domain by the Shogunate.
    His retainers, now ronin, scatter and disappear — some into poverty,
    some into service with other lords, some into the pleasure quarters.
    But forty-seven of them have not given up. They are waiting. Planning.
    They will have their revenge, and they will accept the consequences.
    The question is whether justice and law can coexist, or whether
    sometimes you must break the peace to keep your honor.
  category: conflict
  triggers:
    - player encounters a ronin who seems too disciplined to be truly masterless
    - player discovers evidence of a conspiracy among former retainers
    - player is asked to help or hinder an act of revenge
  narrative_hints:
    - the ronin are sympathetic — their cause is just
    - the Shogunate is not wrong — the law exists for a reason
    - there is no clean resolution — honor and order are in genuine conflict
  tension_level: 0.7
  resolution_hints:
    - the raid succeeds but the ronin surrender to execution
    - the player must choose between helping justice and preserving peace
    - the story becomes a legend that challenges the Shogunate's moral authority
  tags:
    - honor
    - revenge
    - moral_dilemma
  escalation:
    - at: 0.2
      event: a ronin approaches the player seeking help with a seemingly minor task
      npcs_involved: [ronin swordsman]
      stakes: a small favor that is not small
    - at: 0.4
      event: the player discovers the ronin is one of forty-seven
      npcs_involved: [ronin swordsman, tea ceremony master]
      stakes: knowledge of a conspiracy
    - at: 0.6
      event: the Metsuke begin investigating — the ronin's time is running out
      npcs_involved: [Metsuke inspector, ronin swordsman]
      stakes: the conspiracy's survival
    - at: 0.8
      event: the raid — the player must choose a side
      npcs_involved: [ronin swordsman, samurai retainer, Metsuke inspector]
      stakes: honor, law, and lives

- name: The Hidden Congregation
  description: >-
    Followers of the foreign faith meet in secret — in basements, in
    forest clearings, in the back rooms of sympathetic merchants. They
    worship quietly, help each other survive the inspections, and
    shelter the few remaining missionaries. The Shogunate's image-
    stepping test catches the careless, but the truly faithful have
    learned to separate the act from the belief. When the player
    discovers a congregation, they must decide: report them, ignore
    them, or protect them.
  category: recurring
  triggers:
    - player discovers Hidden Way symbols or coded messages
    - player witnesses an image-stepping inspection
    - player is approached by someone seeking protection
  narrative_hints:
    - the faithful are ordinary people — farmers, merchants, fishermen
    - the Shogunate's persecution is genuinely cruel
    - the foreign faith's teachings about elemental equality are politically dangerous
  tension_level: 0.5
  resolution_hints:
    - protecting the faithful puts the player at risk
    - betraying them ensures safety but costs something internal
    - the faith persists regardless — you cannot burn an idea
  tags:
    - faith
    - moral_dilemma
    - underground
  passive_progression:
    rate_per_turn: 0.02
    accelerators:
      - player helps a member of the Hidden Way
      - player visits a southern port or fishing village
    decelerators:
      - player assists a Metsuke inspection
      - player publicly denounces the foreign faith
    accelerator_bonus: 0.05
    decelerator_penalty: 0.03

- name: The Outer Lords' Gambit
  extends: the-corruption
  description: >-
    The sotodaimyō are moving. Not openly — never openly — but the signs
    are there for those who know where to look. Secret fire academies
    training channelers in forbidden techniques. Envoys traveling
    between Satsuma and the western domains under cover of merchant
    caravans. Unusual purchases of iron and sulfur. The question is not
    whether the outer lords are preparing for something — the question
    is what, and when, and whether the Shogunate will discover them
    before they are ready.
  triggers:
    - player visits Satsuma or the western domains
    - player discovers evidence of military preparation
    - player is recruited by either side
  narrative_hints:
    - the outer lords' grievances are legitimate
    - their methods are dangerous
    - the Shogunate's response to discovery would be devastating
  resolution_hints:
    - open rebellion would mean another Sekimori — fire against fire
    - reform from within requires leverage the outer lords do not yet have
    - the mountain's awakening may force a crisis before anyone is ready
  tags:
    - military
  passive_progression:
    rate_per_turn: 0.015
    accelerators:
      - player assists an outer lord's agent
      - the Shogunate increases restrictions on outer domains
    decelerators:
      - player reports outer lord activity to the Metsuke
      - a diplomatic concession reduces tension
    accelerator_bonus: 0.04
    decelerator_penalty: 0.03

- name: The Spirit Gate Opens
  extends: the-spirit-crisis
  description: >-
    Yokai sightings are increasing. The boundary between the spirit world
    and the mortal world is thinning, and the solution requires the very
    people the Shogunate has been persecuting.
  triggers:
    - player encounters a yokai in an unusual location
    - player witnesses a spirit medium being arrested
    - player visits a shrine where the wards are failing
  narrative_hints:
    - the spirits are not invading — they are responding to imbalance
    - fire channeling alone cannot restore the balance
  resolution_hints:
    - working with spirit mediums is politically dangerous but necessary
    - the Emperor's spiritual authority becomes relevant
  tags:
    - supernatural
    - political
  passive_progression:
    rate_per_turn: 0.025
    accelerators:
      - a spirit ward fails at a major shrine
      - the mountain trembles
    decelerators:
      - player helps restore a spirit ward
      - a spirit medium is freed to practice openly
    accelerator_bonus: 0.04
    decelerator_penalty: 0.02
