name: The Burning Peace
slug: burning_peace
description: >-
  The Ember Isles have unified under a single fire channeler dynasty after
  a century of civil war. The Burning Peace is an era of enforced order —
  warrior-channelers who trained their whole lives for war now govern,
  administrate, and slowly forget what their fire was for. Beneath the
  surface, the old grudges smolder. Outer lords chafe under the Shogun's
  alternate attendance system. A foreign faith spreads through the southern
  ports. The spirit world, disturbed by the violence that birthed this
  peace, pushes closer than it has in centuries. Mount Kasai — the sacred
  volcano at the heart of the isles — has begun to rumble.
starting_location: "Hakone posting station, along the Tōkaidō highway"
axis_snapshot:
  balance: 0.3
