- affected_cultures:
  - Jade Kingdoms
  - Ember Isles
  - Sky Temples
  - Tide Reaches
  - Iron Peaks
  - Monsoon Courts
  - Lotus Provinces
  - Saffron Reaches
  cultural_impact: "This is the defining event of the world's history and the origin\
    \ of its name. No pan-cultural alliance has been attempted since. The elemental\
    \ balance remains fractured \u2014 fire and earth run dominant across most of\
    \ the world, while water and air currents have become erratic, spawning unnatural\
    \ storms, droughts, and spiritual bleeds. The spirit world now pushes through\
    \ the old wound-sites, and restless spirits wander freely near the scars. Every\
    \ culture remembers the Shattering differently: the Jade Kingdoms claim Anhuanzhou\
    \ acted to prevent a Sky Temple plot; the Sky Temples preserve oral accounts of\
    \ his naked ambition. The Ember Isles honor Ayuriko as a martyr-saint whose sacrifice\
    \ contained the worst of the blast. Channelers today are measurably weaker than\
    \ pre-Shattering records suggest, and multi-element channeling \u2014 once rare\
    \ but possible \u2014 is now virtually extinct."
  era: 1,400 years ago
  faction_grudges:
  - from: Sky Temples
    reason: The monks hold that Anhuanzhou the Jade deliberately shattered the Accord
      to seize elemental supremacy, killing Chomolun of the Singing Cloud and dozens
      of air channelers in the process. They have never forgiven this.
    to: Jade Kingdoms
  - from: Ember Isles
    reason: Ayuriko of Ash Tower died attempting to contain the detonation. The Ember
      Isles consider this a blood-debt the Jade Kingdoms have never acknowledged,
      let alone repaid.
    to: Jade Kingdoms
  - from: Jade Kingdoms
    reason: Imperial histories record that the Sky Temple delegation sabotaged the
      ritual first, and Anhuanzhou acted in defense. This version is taught in every
      school behind the Celestial Wall.
    to: Sky Temples
  lost_arts:
  - "Multi-element channeling \u2014 the ability to harmonize two or more elements\
    \ simultaneously"
  - "The Accord Ritual itself \u2014 the precise ceremonial forms that once realigned\
    \ the world's elemental currents"
  - "Spirit-binding without coercion \u2014 pre-Shattering channelers could commune\
    \ with spirits as equals; now spirits are agitated and must be subdued or bargained\
    \ with"
  monuments:
  - "The Empty Dais at Dignag\u0101lav\u0101 Monastery \u2014 a circular stone platform\
    \ where the Sky Temples' delegation departed for the last Accord, kept bare and\
    \ unadorned as a permanent accusation"
  - "The Ash Cenotaph at Shijin Shrine \u2014 a towering column of fused volcanic\
    \ glass containing Ayuriko's broken channeling staff, recovered from the blast\
    \ site"
  - "The Celestial Wall's Foundation Stones \u2014 Anhuanzhou's name is carved into\
    \ the base of every section of the Jade Kingdoms' great border wall, recast as\
    \ a hero who 'defended the earth from sky treachery'"
  name: The Shattering of the Accord Eternal
  summary: "The eight elemental peoples once maintained a sacred pact \u2014 the Accord\
    \ Eternal \u2014 a ritual alignment performed every century at the nexus where\
    \ all elemental currents converged. When Anhuanzhou the Jade, the Jade Kingdoms'\
    \ emperor-channeler, attempted to bind the nexus permanently to earth, the ritual\
    \ collapsed catastrophically. The resulting detonation tore the elemental balance\
    \ apart, shattered the convergence site into eight drifting shards, and killed\
    \ every channeler present \u2014 including Ayuriko of Ash Tower and Chomolun of\
    \ the Singing Cloud, who had tried to stabilize the backlash. The spirit world,\
    \ which had been layered gently atop the mortal plane, was ripped open in dozens\
    \ of places, and has never fully closed."
  terrain_scars:
  - description: Eight massive tears in the landscape radiating outward from a central
      point in what is now contested borderland between the Jade Kingdoms and the
      Sky Temples. Each rift hums with a different elemental resonance, and spirits
      drift freely through them. The land between the rifts is a shimmering, unstable
      zone where gravity shifts, fires ignite spontaneously, and rain falls upward.
    name: The Accord Wounds
    region: ''
    type: rift
  - description: The exact point of detonation is a perfectly flat, glass-smooth disc
      of fused stone three leagues across. Nothing grows on it. Channelers who step
      onto it report hearing all eight elements screaming simultaneously. Spirit-sightings
      here are constant and often violent.
    name: The Nexus Scar
    region: ''
    type: cursed_ground
  - description: A vast corridor of land stretching from the Nexus Scar toward the
      Tide Reaches where elemental channeling simply does not function. Water channelers
      crossing it become ordinary mortals. The Tide Reaches consider this dead zone
      a permanent wound inflicted upon them by continental arrogance.
    name: The Silenced Reach
    region: ''
    type: dead_zone
- affected_cultures:
  - Tide Reaches
  - Jade Kingdoms
  - Lotus Provinces
  - Monsoon Courts
  cultural_impact: "The Tide Reaches lost their ancestral capital and a third of their\
    \ population in an act of self-sacrifice that remains deeply controversial among\
    \ their own people. Taamila is venerated as a savior by some clans and cursed\
    \ as a mass-murderer by others \u2014 the division defines Tide Reaches politics\
    \ to this day. The Jade Kingdoms' imperial navy never recovered its former strength,\
    \ and a cultural terror of deep water persists across the empire. The deep-ocean\
    \ spirits awakened by Taamila's pact now patrol the waters between the continents,\
    \ making all long-distance sea travel extraordinarily dangerous. The Lotus Provinces,\
    \ whose Silk Delta trade routes were strangled by the newly hostile seas, blame\
    \ both the Jade Kingdoms and the Tide Reaches for their economic decline. The\
    \ Monsoon Courts' river-mouth ports at The Drowned Palace were inundated by aftershock\
    \ flooding and took generations to rebuild."
  era: 600 years ago
  faction_grudges:
  - from: Tide Reaches
    reason: The invasion of Qalanolei's Atoll is the defining atrocity in Tide Reaches
      memory. Meishangdao the Imperial's name is a curse-word in every reef-tongue
      dialect.
    to: Jade Kingdoms
  - from: Lotus Provinces
    reason: "Hi\u1EC1n Th\u1ECBnh, the great merchant-scholar of Amber Harbor, documented\
      \ how the awakened deep-spirits destroyed Lotus Province trade for a century.\
      \ The Lotus Provinces view Taamila's pact as reckless \u2014 she drowned their\
      \ livelihood along with the Jade fleet."
    to: Tide Reaches
  - from: Monsoon Courts
    reason: The flooding of The Drowned Palace and Nayutsa's Basin was collateral
      devastation from a war the Monsoon Courts had no part in. Garuda Kreah, the
      Monsoon Courts' ruler at the time, declared the Jade Kingdoms 'a people who
      poison every water they cannot own.'
    to: Jade Kingdoms
  - from: Tide Reaches (Coral Clans)
    reason: 'Internal schism: the Coral Clans of the surviving atolls hold that Taamila
      had no right to sacrifice island civilians for a military victory, creating
      a rift within the culture that persists six centuries later.'
    to: Tide Reaches (Deep Clans)
  lost_arts:
  - "Coral-font channeling \u2014 the Qalanolei coral beds amplified water channeling\
    \ tenfold; they are now submerged beneath spirit-haunted waters too dangerous\
    \ to dive"
  - "Jade Kingdoms deep-water shipbuilding \u2014 the empire's naval engineering tradition\
    \ died with its fleet and was never rebuilt"
  - "The Tidal Accord \u2014 a Tide Reaches governing tradition where all clan leaders\
    \ convened at Qalanolei's Atoll during solstice tides; no replacement site has\
    \ ever been accepted by all clans"
  monuments:
  - "The Pillar of Taamila at Upapuuk's Shore \u2014 a lone stone column rising from\
    \ the shallows, carved by Naumehau Tiruana a generation after the drowning, listing\
    \ the names of every island lost"
  - "The Chain of Meishangdao at the Imperial Terrace \u2014 eight hundred iron links\
    \ set into the floor of the Jade Kingdoms' throne hall, one for each ship lost,\
    \ maintained as a reminder of imperial hubris by reformist bureaucrats"
  - "Amber Harbor's Tide Markers \u2014 brass lines set into the walls of the Lotus\
    \ Provinces' greatest port showing how high the aftershock flooding reached, still\
    \ visible today"
  name: The Drowning of Qalanolei
  summary: "Two centuries after the Shattering destabilized the elemental balance,\
    \ the Jade Kingdoms launched a vast naval invasion of the Tide Reaches, seeking\
    \ to secure sea routes and coral-bed channeling fonts that the empire believed\
    \ could restore earth-element dominance. Meishangdao the Imperial commanded a\
    \ fleet of eight hundred warships that converged on Qalanolei's Atoll, the Tide\
    \ Reaches' sacred governing seat. Taamila of the Deep Atoll, the Tide Reaches'\
    \ greatest water channeler, performed a forbidden spirit-pact \u2014 she offered\
    \ her own life and the lives of her entire bloodline to the deep-ocean spirits\
    \ in exchange for a single cataclysmic wave. The resulting tsunami annihilated\
    \ the Jade fleet entirely, but also drowned Qalanolei's Atoll and six surrounding\
    \ island chains, killing tens of thousands of Tide Reaches civilians alongside\
    \ the invaders. The ocean spirits, glutted on death, have never returned to dormancy."
  terrain_scars:
  - description: "The sunken remains of the Tide Reaches' former capital, visible\
      \ through clear water on calm days \u2014 coral-crusted towers, ceremonial platforms,\
      \ and the great navigation stones all submerged beneath twenty fathoms of spirit-thick\
      \ ocean. Channelers report hearing singing from below."
    name: Drowned Qalanolei
    region: ''
    type: ruin
  - description: A vast stretch of open ocean between the Tide Reaches and the continent
      where the awakened deep-spirits patrol. Ships that enter are dragged under by
      currents that move against the wind. No vessel larger than a outrigger canoe
      has survived the crossing in six centuries.
    name: The Hungering Deep
    region: ''
    type: cursed_ground
  - description: "A reef-system northwest of Singing Current formed entirely from\
      \ the calcified remains of Meishangdao's fleet \u2014 wooden hulls turned to\
      \ stone, anchors fused to coral, and the skeletal remains of soldiers visible\
      \ at low tide. The water here is perpetually warm and smells of iron."
    name: The Bone Shallows
    region: ''
    type: battlefield
  - description: The land surrounding the Monsoon Courts' ancient riverside palace
      that was scoured flat by aftershock flooding. The soil never recovered its fertility.
      Rishi Nouk declared the ground 'salted by foreign grief,' and the Monsoon Courts
      built their new temples uphill at The Moonlit Temple, leaving the flats as a
      permanent wasteland.
    name: The Drowned Palace Flats
    region: ''
    type: dead_zone
- affected_cultures:
  - Iron Peaks
  - Ember Isles
  - Jade Kingdoms
  - Saffron Reaches
  cultural_impact: "The Iron Peaks survived as an independent kingdom but at devastating\
    \ cost \u2014 their greatest mines were destroyed, their finest general killed\
    \ by an ally's arrogance, and their mountains permanently infested with hostile\
    \ fire-spirits that make deep mining nearly impossible. The Iron Peaks now trust\
    \ no outside power and maintain the most heavily fortified borders in the known\
    \ world. The Ember Isles consider the Battle of Hyeong Ridge a righteous victory\
    \ and teach it as a case study in decisive channeling at Yuragasasasu Forge's\
    \ war academy, which enrages Iron Peaks diplomats. The Jade Kingdoms lost an entire\
    \ army and abandoned continental expansion northward, hardening instead into isolationist\
    \ paranoia behind the Celestial Wall. The Saffron Reaches, whose temple-scholars\
    \ Ty\u0101ga the Sacred and Pa\xF1c\u0101la the Still had attempted to mediate\
    \ the conflict before the battle, withdrew entirely from inter-state diplomacy\
    \ after their peace envoys were ignored by all three sides, retreating into spiritual\
    \ isolationism at The Gay\u0101 Sanctuary."
  era: 300 years ago
  faction_grudges:
  - from: Iron Peaks
    reason: Tsuka of Ash Peak killed Dojin of Granite Stronghold and destroyed three
      fortress-mines while ostensibly fighting as an ally. The Iron Peaks saying 'ember
      aid is ash' reflects a 300-year grudge that has never softened.
    to: Ember Isles
  - from: Iron Peaks
    reason: Shengguan the Verdant's invasion is the foundational trauma of Iron Peaks
      national identity. Every child in Suwon Stronghold learns to recite the names
      of the fallen.
    to: Jade Kingdoms
  - from: Ember Isles
    reason: The Ember Isles believe Dojin's forces were positioned incorrectly and
      that the Iron Peaks' refusal to follow Tsuka's command structure caused the
      friendly casualties. They view Iron Peaks resentment as ingratitude.
    to: Iron Peaks
  - from: Saffron Reaches
    reason: "Ty\u0101ga the Sacred's peace delegation was turned away at Namhan Pass,\
      \ at Kwon Gate, and at Nain Gate in succession. The Saffron Reaches concluded\
      \ that the warring peoples were beyond redemption and retreated into isolationist\
      \ contemplation, a posture they maintain to this day."
    to: all belligerents
  lost_arts:
  - "Iron Peaks deep-vein extraction \u2014 the techniques for mining the deepest\
    \ iron deposits in Hyeong Ridge died with the miners and are now inaccessible\
    \ due to fire-spirit infestation"
  - "The Mountain Accord \u2014 a mutual-defense pact between the Iron Peaks and the\
    \ Sky Temples that collapsed when the Sky Temples refused to intervene, severing\
    \ centuries of highland solidarity"
  - "Saffron meditation-diplomacy \u2014 the Saffron Reaches' tradition of sending\
    \ unarmed scholar-mediators into conflict zones ended permanently after this humiliation"
  monuments:
  - "The Granite Cenotaph at Kwon Gate \u2014 a monolithic block of unworked granite\
    \ placed at the entrance to the Iron Peaks, carved only with Dojin's name and\
    \ the words 'betrayed by fire, unbroken by earth'"
  - "The Victory Frieze at Yuragasasasu Forge \u2014 a massive bas-relief depicting\
    \ Tsuka of Ash Peak's conflagration as a moment of glorious triumph, pointedly\
    \ omitting all Iron Peaks casualties"
  - "The Closed Gate at The Gay\u0101 Sanctuary \u2014 the Saffron Reaches sealed\
    \ the western entrance to their holiest sanctuary with a stone slab bearing the\
    \ names of the three gates that rejected Ty\u0101ga's peace mission, vowing it\
    \ would not reopen until the world proved worthy of wisdom"
  name: The Burning Schism of Hyeong Ridge
  summary: "When the Iron Peaks refused to swear fealty to the Jade Kingdoms' expanding\
    \ border, Shengguan the Verdant marched an army of ten thousand earth channelers\
    \ through Namhan Pass to crush the mountain fortresses. Dojin of Granite Stronghold\
    \ rallied the Iron Peaks' defenders and sent emissaries to the Ember Isles for\
    \ military aid. Tsuka of Ash Peak answered the call \u2014 but the Ember Isles'\
    \ fire channelers, bred on rigid tactical doctrine, treated the Iron Peaks as\
    \ a subordinate force rather than allies. When the decisive battle came at Hyeong\
    \ Ridge, Tsuka ordered a full elemental conflagration that incinerated the Jade\
    \ army but also collapsed three Iron Peaks fortress-mines and immolated Dojin's\
    \ rearguard, killing the very people the Ember Isles had come to save. The fire\
    \ burned so intensely that the mountain's iron ore deposits melted and re-solidified\
    \ into twisted formations, and fire-spirits, drawn by the carnage, have nested\
    \ in the ridge ever since."
  terrain_scars:
  - description: "The upper third of Hyeong Ridge is a landscape of twisted iron formations\
      \ \u2014 ore deposits melted by Tsuka's conflagration and re-solidified into\
      \ jagged, unnatural spires. The stone is permanently warm to the touch. Fire-spirits\
      \ nest in the crevices, glowing like embers at night, and attack any miners\
      \ who attempt to work the deposits."
    name: The Molten Ridge of Hyeong
    region: ''
    type: battlefield
  - description: Three vast sinkholes along Hyeong Ridge's western face where Iron
      Peaks fortress-mines once stood. The tunnels below are flooded with toxic air
      and inhabited by territorial fire-spirits. Iron Peaks sappers have attempted
      to reclaim them four times in three centuries; every expedition has ended in
      casualties.
    name: The Three Collapsed Mines
    region: ''
    type: ruin
  - description: The mountain pass through which Shengguan's army marched is still
      coated in a layer ofiteiteiteiteiteite fine volcanic glass from the conflagration's
      blowback. Nothing grows in the pass. The glass cuts through boot leather within
      hours, making overland travel between the Jade Kingdoms and the Iron Peaks punishing
      even in peacetime.
    name: The Ash Corridor of Namhan Pass
    region: ''
    type: dead_zone
  - description: "Fissures along Hyeong Ridge that emit high-pitched whistling sounds\
      \ when wind passes over them \u2014 the locals say they are the screams of Dojin's\
      \ rearguard, trapped in the moment of their burning. Channelers of any element\
      \ report nausea and disorientation near the vents, and fire channeling becomes\
      \ dangerously unstable within a league of the ridge."
    name: The Screaming Vents
    region: ''
    type: cursed_ground
