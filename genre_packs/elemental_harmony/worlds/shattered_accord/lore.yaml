cosmology: "The people of the Shattered Accord do not worship gods in the traditional\
  \ sense \u2014 they fear, bargain with, and occasionally bind spirits, which are\
  \ understood to be the living expressions of elemental forces rather than divine\
  \ beings. Before the Shattering, spirits existed in a separate layer of reality\
  \ that pressed gently against the mortal plane, accessible only through disciplined\
  \ channeling and the century-ritual of the Accord Eternal. Now that barrier is torn,\
  \ and spirits of every element flood through unchecked: fire-spirits nest in Hyeong\
  \ Ridge's twisted iron, ocean-spirits drag the living into Qalanolei's drowned ruins,\
  \ wind-spirits howl through the spirit-tears with voices that drive listeners mad,\
  \ and earth-spirits burrow beneath the Jade Kingdoms' foundations, destabilizing\
  \ the very ground the empire claims to command. Channeling \u2014 the art of aligning\
  \ one's body and will with an elemental current \u2014 is both martial discipline\
  \ and spiritual communion, and every culture practices it differently: the Ember\
  \ Isles treat it as a forge-art refined through rigid kata at Shijin Shrine, the\
  \ Sky Temples at Dignag\u0101lav\u0101 Monastery pursue it as a path to enlightenment\
  \ through breath and altitude, and the Monsoon Courts at Rathep's Temple blend it\
  \ with monsoon-dance and blood-offering. The great theological question of the age\
  \ is whether the Accord Eternal can ever be restored, or whether the spirit world\
  \ and the mortal world are now permanently fused \u2014 and whether that fusion\
  \ is a catastrophe to be reversed or a new reality to be mastered."
factions:
- description: "Led by Songnan the Silent from the Imperial Terrace, the Jade Reclamation\
    \ is the military and political apparatus of the Jade Kingdoms' ruling channeler-caste.\
    \ They believe the Shattering was a tragedy but not a sin \u2014 Anhuanzhou the\
    \ Jade was right to attempt permanent binding, he simply lacked the power to succeed.\
    \ The Reclamation seeks to reunify the eight shards under Jade sovereignty, capture\
    \ the Broken Nexus, and perform a second binding ritual using accumulated earth-channeling\
    \ force. They have garrisoned the Celestial Wall and the Shou Pass, and Qing the\
    \ Stone commands a corps of deep-earth channelers who tunnel beneath enemy territory\
    \ through spirit-infested rock. Their agents \u2014 coordinated by Pingzhou Anhai\
    \ \u2014 operate in every nation, bribing, assassinating, and destabilizing governments\
    \ that resist Jade expansion. They view the Iron Peaks as rebellious subjects,\
    \ the Tide Reaches as a conquered province that simply hasn't accepted defeat,\
    \ and every other nation as a future vassal."
  disposition: hostile
  name: The Jade Reclamation
- description: "Operating from the Sky Temples' Sacred Spire and Tripita Peak, the\
    \ Accord Reborn is a coalition of channelers from multiple nations who believe\
    \ the original Accord Eternal must be reconstructed \u2014 not through one element's\
    \ dominance, but through the voluntary alignment of all eight. Led by Dhya of\
    \ the Eternal Cloud and advised by Karma of the Singing Cloud, the faction began\
    \ as a scholarly monastic order but has grown increasingly authoritarian as the\
    \ world's elemental instability worsens. Dhya now insists that nations unwilling\
    \ to send channelers to the reconstruction effort must be 'guided' \u2014 a euphemism\
    \ for military intervention. The faction has recruited Ninh of the Fragrant Bridge\
    \ from the Lotus Provinces and Ty\u0101ga the Sacred from the Saffron Reaches,\
    \ giving it footholds beyond the Sky Temples, but its insistence that air channeling\
    \ must serve as the 'binding breath' of the new Accord has alienated potential\
    \ allies who see it as Sky Temple imperialism dressed in spiritual robes."
  disposition: wary
  name: The Accord Reborn
- description: "Born from the wreckage of the Drowning of Qalanolei, the Drowned Covenant\
    \ is a Tide Reaches faction that has embraced the deep-ocean spirits Taamila's\
    \ sacrifice awakened. Led by Ananga of the Deep Atoll \u2014 who claims descent\
    \ from Taamila's bloodline despite the spirit-pact supposedly consuming it \u2014\
    \ the Covenant performs ritual drownings at Nuuktok's Cove to feed the ocean spirits\
    \ and maintain their terrible favor. They believe the spirit world's intrusion\
    \ into the mortal plane is not a wound but a gift, and that the Shattering liberated\
    \ spirits from unjust imprisonment. The Covenant's channelers can call localized\
    \ tsunamis, bend currents to crush ship hulls, and breathe underwater for hours\
    \ by merging partially with ocean spirits \u2014 but each use of these powers\
    \ costs something human, and the Covenant's inner circle are visibly changed,\
    \ their skin translucent, their eyes lightless, their voices carrying the harmonic\
    \ resonance of deep water. They oppose any attempt to restore the Accord or seal\
    \ the spirit-tears, and they have sworn to drown any Jade fleet that approaches\
    \ the Tide Reaches \u2014 along with anyone else's fleet, if necessary. Haktoko\
    \ Qaqri serves as their war-captain, raiding shipping lanes from a base hidden\
    \ in the Singing Current."
  disposition: hostile
  name: The Drowned Covenant
- description: "The Iron Peaks' isolationist government, headquartered at Suwon Stronghold\
    \ and commanded by Mong of Iron Stronghold, a channeler who can sense vibrations\
    \ through a hundred meters of solid rock. After Tsuka of Ash Peak's betrayal at\
    \ Hyeong Ridge \u2014 where Ember Isles fire channelers incinerated the very Iron\
    \ Peaks soldiers they were supposed to protect \u2014 the Sealed Gate adopted\
    \ a doctrine of absolute self-reliance. They have blocked Namhan Pass with walls\
    \ of channeled granite, fortified every gate from Kwon to Yejin, and declared\
    \ that any foreign channeler crossing their borders will be imprisoned in the\
    \ deep mines beneath Anso Forge. Byeonjoo of Steep Mine leads the faction's intelligence\
    \ network, monitoring the Jade Reclamation's tunneling operations and the fire-spirits\
    \ that still infest Hyeong Ridge. The Sealed Gate's fatal weakness is economic:\
    \ their sealed borders have cut off trade in food, medicine, and the raw materials\
    \ needed to maintain their fortress-mines, and Jungnyasan of Frosted Hall leads\
    \ a quiet internal opposition arguing that the Iron Peaks must open at least one\
    \ gate or starve within a generation."
  disposition: cautious
  name: The Sealed Gate
- description: "A military alliance between the Monsoon Courts and sympathetic elements\
    \ of the Tide Reaches, forged by Garuda Kreah at the Moonlit Palace and sealed\
    \ with storm-channeling rituals at the Flowering Falls. The Pact unites monsoon-wind\
    \ channelers with ocean-current channelers to control the sea lanes between the\
    \ southern shards \u2014 a strategic chokepoint that both the Jade Reclamation\
    \ and the Accord Reborn need access to. Pounamilaq of the Storm Shore commands\
    \ the Pact's naval arm from Upapuuk's Shore, while N\u0101g\u012B Chattang oversees\
    \ land forces garrisoned at Rathep's Temple. The Pact's stated goal is defensive\
    \ \u2014 preventing any single power from dominating the southern waters \u2014\
    \ but Garuda Kreah privately harbors ambitions to unite the Tide Reaches, Monsoon\
    \ Courts, and Lotus Provinces into a southern confederation powerful enough to\
    \ dictate terms to the Jade Kingdoms. Rishi Kalamphaitie, the Pact's chief diplomat,\
    \ has been dispatched to Amber Harbor in the Lotus Provinces to negotiate Ng\u1ECD\
    c of the Misty Garden's support, offering protection from Jade expansion in exchange\
    \ for access to the Silk Delta's trade wealth. The Pact views the Drowned Covenant\
    \ as dangerous fanatics but useful ones \u2014 ocean spirits that attack Jade\
    \ ships serve the Pact's interests, even if the Covenant's ideology is abhorrent."
  disposition: wary
  name: The Monsoon Pact
geography: "The world is arranged around the absence at its center: the Broken Nexus,\
  \ a roiling storm of raw elemental energy where the convergence site once stood,\
  \ orbited by eight continent-sized shards that were blasted outward during the Shattering\
  \ and now drift in slow, unpredictable paths through a sea of spirit-fog. Each shard\
  \ bears the dominant element of the people who settled it \u2014 the Ember Isles\
  \ are volcanic archipelagos wreathed in perpetual smoke, their forges at Yuragasasasu\
  \ and Menki Citadel glowing like fallen stars; the Iron Peaks are brutal granite\
  \ ranges honeycombed with mines, connected by precarious bridges over spirit-haunted\
  \ chasms; the Tide Reaches are half-drowned island chains where the water level\
  \ rises and falls with the moods of the deep-ocean spirits, and the sunken ruins\
  \ of Qalanolei's Atoll are visible on clear days as dark shapes beneath the waves.\
  \ Between the shards, spirit-tears gash the sky like infected wounds \u2014 some\
  \ small enough that a channeler can seal them temporarily, others vast enough to\
  \ swallow a city, pouring alien light and hostile spirits into the mortal world.\
  \ Travel between shards requires either navigating the spirit-fog by ship or crossing\
  \ through the tears themselves, and both methods kill the unprepared."
history: "Fourteen centuries after the Shattering of the Accord Eternal, the world\
  \ remains a scarred and volatile place. The eight elemental shards still drift in\
  \ slow, grinding orbits above the ruins of the convergence site \u2014 now called\
  \ the Broken Nexus \u2014 and the spirit world continues to hemorrhage through the\
  \ dozens of tears Anhuanzhou the Jade's hubris ripped open. Elemental storms rake\
  \ the land without warning: earth tremors split fertile valleys into chasms, rogue\
  \ tides swallow coastal villages, and columns of spirit-fire erupt from Hyeong Ridge\
  \ where Tsuka of Ash Peak's conflagration never truly died. The Jade Kingdoms, though\
  \ diminished from their imperial height, still claim sovereign right over the Broken\
  \ Nexus and insist that only earth channeling can mend what earth channeling broke\
  \ \u2014 a position that enrages every other nation. The Tide Reaches have never\
  \ recovered from the Drowning of Qalanolei; the deep-ocean spirits that Taamila\
  \ of the Deep Atoll fed with her bloodline still prowl the sunken atolls, dragging\
  \ ships and swimmers into lightless trenches, and the surviving Tide Reaches people\
  \ have fractured into competing clans, some of whom worship the glutted spirits\
  \ as wrathful gods. The Iron Peaks, scarred by betrayal at the Burning Schism, have\
  \ sealed Namhan Pass and Kwon Gate with channeled granite and sworn never again\
  \ to trust an outside power \u2014 but their sealed borders have left them starving\
  \ for trade goods and desperate for allies they refuse to accept.\n\nWar is not\
  \ brewing \u2014 it is already here, fought in skirmishes along every contested\
  \ border and in the shadow-campaigns of channelers who slip through spirit-tears\
  \ to strike behind enemy lines. Songnan the Silent, the current Jade strategist,\
  \ has positioned garrisons along the Celestial Wall and the Shou Pass, ostensibly\
  \ to defend against 'spirit incursions' but transparently aimed at the Iron Peaks\
  \ and the Monsoon Courts beyond. Garuda Kreah of the Monsoon Courts has responded\
  \ by forging a military pact with Pounamilaq of the Storm Shore, uniting monsoon-wind\
  \ and ocean-current channelers into a combined force that patrols the sea lanes\
  \ between the Tide Reaches and the Flowering Falls. The Sky Temples, once neutral\
  \ mediators, have grown increasingly militant under Dhya of the Eternal Cloud, who\
  \ believes that only air channeling \u2014 the element of connection and breath\
  \ \u2014 can reweave the shattered Accord, and that any nation refusing to submit\
  \ to Sky Temple guidance must be compelled by force. Meanwhile, the Saffron Reaches\
  \ and the Lotus Provinces, historically peripheral to the great-power conflicts,\
  \ find themselves squeezed between expanding spheres of influence, their own channelers\
  \ recruited or press-ganged by larger nations, their sacred sites \u2014 the K\u1E5B\
  \u1E63\u1E47a Mandala, the Lantern Garden \u2014 threatened by elemental instability\
  \ that worsens with each passing year."
world_name: The Shattered Accord
