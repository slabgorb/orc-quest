- name: The Master Who Walks
  extends: the-mentor
  description: >-
    A channeler of impossible breadth has abandoned position, title, and
    element-loyalty to live beneath notice. They teach only when the world
    forces their hand — not through philosophy lectures but through
    problems that demand immediate, practical channeling. Every lesson
    is a mission. Every mission reveals another layer of what the master
    gave up and why. The students do not yet understand that the master
    is also learning — relearning — whether the world deserves what they
    know.
  triggers:
    - player encounters a problem that requires multi-element channeling
  narrative_hints:
    - every technique the master reveals makes the party more visible to those hunting multi-element channelers
    - the master's retirement was not cowardice — it was the only way to survive what he knows
  resolution_hints:
    - the master's final lesson is that he cannot protect them from what comes next
    - teaching was the mission all along — Po's design, not the master's choice
  tags:
    - multi-element
  escalation:
    - at: 0.1
      event: the master demonstrates a technique by solving an immediate crisis — not a lecture, an act
      npcs_involved: [Won Pyru]
      stakes: a village's survival
    - at: 0.3
      event: someone recognizes the master's channeling signature — his cover is blown in one region
      npcs_involved: [Won Pyru, Jade Reclamation agent]
      stakes: the party's anonymity
    - at: 0.5
      event: a former student of the master appears — one who was not taught well, and blames the master
      npcs_involved: [Won Pyru]
      stakes: the master's past failures made flesh
    - at: 0.7
      event: the master is forced to channel all his elements simultaneously to save the party — an act visible for leagues
      npcs_involved: [Won Pyru]
      stakes: every faction now knows a multi-element master is active in the highlands
    - at: 0.9
      event: the master is captured or incapacitated — the students must act without him
      npcs_involved: [Won Pyru]
      stakes: everything the master taught is tested without a safety net
  passive_progression:
    rate_per_turn: 0.02
    accelerators:
      - a lesson connects directly to saving lives or stopping the Authority
      - the master channels in front of witnesses
    decelerators:
      - the master lectures without immediate stakes
      - the party avoids confrontation for more than two turns
    accelerator_bonus: 0.06
    decelerator_penalty: 0.02

- name: The Bureaucracy of Ruin
  extends: the-corruption
  description: >-
    An empire does not conquer with swords alone — it conquers with
    assessors, requisition notices, and the quiet violence of
    reclassification. The Jade Reclamation Authority is dismantling
    highland villages not through war but through paperwork: sabotage
    the water, devalue the land, resettle the people, claim the ground.
    The evil is not a villain with a speech — it is a system that makes
    cruelty procedural and resistance illegal.
  triggers:
    - player encounters a Jade Reclamation assessor or requisition notice
    - player discovers evidence of deliberate sabotage disguised as natural disaster
    - player attempts to organize village resistance
  narrative_hints:
    - the bureaucracy has a saboteur working ahead of the assessors — find them and the whole schedule breaks
    - legal resistance is possible but requires evidence that is being destroyed
    - every village saved accelerates the Authority's timeline for the others
  resolution_hints:
    - exposing the sabotage publicly forces the Authority to disavow or double down
    - the saboteur is someone with their own reasons — not a monster, a person under pressure
    - the system can be broken at the joints where Saffron and Jade mistrust each other
  tags:
    - villages
  escalation:
    - at: 0.1
      event: a second village's water source fails — the pattern becomes undeniable
      npcs_involved: [village elder]
      stakes: food security for hundreds
    - at: 0.3
      event: the saboteur's trail is found — deliberate rockslides, poisoned wells, specific targets
      npcs_involved: [Jade Reclamation agent]
      stakes: proof that the resettlement is manufactured
    - at: 0.5
      event: the assessors arrive early — someone accelerated the timeline because of the party's interference
      npcs_involved: [Jade Reclamation assessor, Saffron Reaches escort]
      stakes: villages that are not yet prepared
    - at: 0.7
      event: the Authority dispatches channeler-enforcers — paperwork has failed, force follows
      npcs_involved: [Jade Reclamation earth channeler]
      stakes: open conflict between the party and an imperial military force
    - at: 0.9
      event: the highland resettlement is revealed as preparation for something larger — the Authority wants the land, not the people
      npcs_involved: [Jade Reclamation strategist]
      stakes: the true scope of the Jade Kingdoms' plan
  passive_progression:
    rate_per_turn: 0.025
    accelerators:
      - the party restores a village's water source
      - the party confronts or exposes a Jade agent
    decelerators:
      - the party avoids the highland villages
      - the party cooperates with Authority representatives
    accelerator_bonus: 0.05
    decelerator_penalty: 0.04

- name: The Convergence Mistranslated
  extends: the-prophecy
  description: >-
    A prophecy has shaped the world's politics for centuries — and it
    is wrong. Not false, but mistranslated. The academies teach that one
    person will channel all elements and restore balance. The original
    Old River Tongue says all elements will find one purpose. The
    difference is everything: one reading creates a messiah to be found
    and controlled; the other demands cooperation that no single faction
    can own. Everyone is looking for the Avatar. No one is looking for
    the convergence.
  triggers:
    - player discusses the Avatar prophecy with a scholar or channeler
    - player demonstrates multi-element channeling in the presence of a faction agent
    - player finds evidence of the original Old River Tongue text
  narrative_hints:
    - the mistranslation was deliberate — someone changed the text to consolidate power
    - multiple factions are hunting for the Avatar, each wanting to control or kill the candidate
    - the truth is more dangerous than the lie — if anyone can converge, no one can be controlled
  resolution_hints:
    - the original text exists somewhere — finding it is a quest, protecting it is a war
    - the convergence requires willing participants, not a single chosen one
    - revealing the truth publicly would destabilize every faction simultaneously
  tags:
    - political
  escalation:
    - at: 0.2
      event: a faction agent approaches the party, probing whether any of them might be the Avatar
      npcs_involved: [faction scout]
      stakes: the party's freedom
    - at: 0.4
      event: the party discovers that the academies knowingly teach the wrong translation
      npcs_involved: [Won Pyru]
      stakes: trust in institutions
    - at: 0.6
      event: a channeler attempts to force convergence alone — and the elemental backlash is catastrophic
      npcs_involved: []
      stakes: proof that the one-person reading is not just wrong but lethal
    - at: 0.8
      event: the location of the original Old River Tongue text is revealed — and multiple factions race to reach it
      npcs_involved: [Grand Master Po]
      stakes: the truth itself
    - at: 0.9
      event: the party must decide whether to reveal the correct translation or weaponize the lie
      npcs_involved: [Won Pyru, Grand Master Po]
      stakes: the shape of the world's future
  passive_progression:
    rate_per_turn: 0.015
    accelerators:
      - a party member channels multiple elements in front of witnesses
      - the party discusses the prophecy with someone who knows the original text
    decelerators:
      - the party avoids elemental display
      - the party stays in regions where the prophecy is not politically active
    accelerator_bonus: 0.05
    decelerator_penalty: 0.02

- name: The Soldier Who Chose
  extends: the-coming-of-age
  description: >-
    A young soldier left a garrison, a cloak, and the only life he knew
    because he believed the word evil was not too strong. He follows a
    master he does not fully trust toward a destiny a prophecy may have
    gotten wrong. He is eighteen. He is not naive — he is clear. The
    world will test whether clarity survives contact with complexity,
    and whether a man who enlisted to fight evil can recognize it when
    it wears familiar colors.
  triggers:
    - Zhang encounters former garrison comrades
    - Zhang must choose between the party's mission and protecting innocents
    - Zhang discovers that the Saffron Reaches are complicit in the highland resettlement
  narrative_hints:
    - Zhang's moral clarity is a strength until it becomes rigidity
    - the Saffron Reaches are not evil — they are complicit, which is harder to fight
    - Zhang's instinct to protect is what Po saw in him
  resolution_hints:
    - Zhang defines what evil means on his own terms, not the prophecy's
    - Zhang's garrison training becomes the party's tactical advantage in a crisis
    - the cloak he left behind finds its way back to him in a form he does not expect
  tags:
    - military
  escalation:
    - at: 0.2
      event: Zhang sees Saffron Reaches soldiers escorting Jade Reclamation assessors — his former comrades serving the machine
      npcs_involved: [Saffron Reaches soldier]
      stakes: identity and loyalty
    - at: 0.4
      event: a former garrison officer recognizes Zhang and offers him a chance to return — no punishment, just come home
      npcs_involved: [Saffron Reaches officer]
      stakes: the easier path
    - at: 0.6
      event: Zhang discovers that the garrison knew about the highland sabotage and said nothing
      npcs_involved: [Saffron Reaches officer]
      stakes: the institution he served was complicit
    - at: 0.8
      event: Zhang must fight someone wearing ochre — not a villain, a soldier following orders
      npcs_involved: [Saffron Reaches soldier]
      stakes: can you fight evil without hating the people trapped inside it
    - at: 0.9
      event: Zhang is offered command — lead a resistance, not just follow a master
      npcs_involved: [village elders, Won Pyru]
      stakes: the difference between fighting evil and building something better
  passive_progression:
    rate_per_turn: 0.02
    accelerators:
      - Zhang takes independent action without waiting for Won Pyru's instruction
      - Zhang encounters evidence of Saffron Reaches complicity
    decelerators:
      - Zhang defers all decisions to the master
      - the party avoids garrison territory
    accelerator_bonus: 0.05
    decelerator_penalty: 0.03

- name: The Puppeteer's Threads
  description: >-
    Grand Master Po is not present but he is everywhere. He sent each
    party member to a specific place with specific instructions and told
    none of them why. He appears in dreams. He knew where Won Pyru was
    hiding. He assembled water, air, fire, and void in one morning.
    Either Po is orchestrating the convergence the prophecy describes,
    or he is running the longest con in the world's history. The party
    must decide whether to trust the design of a man who has never once
    explained himself.
  category: climax
  triggers:
    - player receives a message or dream from Grand Master Po
    - player discovers that a seemingly random event was arranged by Po
    - player questions Po's motives or methods
  narrative_hints:
    - Po's design becomes visible only in retrospect — each step makes sense only after the next one
    - Po is not omniscient — he is a brilliant strategist who has made mistakes before
    - the party's trust in Po is a resource he is spending, and it is not infinite
  tension_level: 0.7
  resolution_hints:
    - Po's plan requires the party to act freely — control would ruin it
    - Po has a personal stake he has not revealed
    - meeting Po in person changes everything — he is not what they imagined
  tags:
    - conspiracy
    - mentor
    - trust
  escalation:
    - at: 0.1
      event: a seemingly random encounter turns out to have been arranged — Po's fingerprints are on it
      npcs_involved: [Grand Master Po]
      stakes: trust
    - at: 0.3
      event: the party finds evidence that Po has been planning this for decades — maps, letters, timelines
      npcs_involved: [Grand Master Po]
      stakes: the scope of the manipulation
    - at: 0.5
      event: Po's plan fails at a critical point — something he did not predict forces improvisation
      npcs_involved: [Grand Master Po]
      stakes: the limits of design
    - at: 0.7
      event: a faction reveals they have been hunting Po for years — he is not just a teacher, he is a fugitive
      npcs_involved: [Grand Master Po, Jade Reclamation strategist]
      stakes: the master behind the master is also prey
    - at: 0.9
      event: the party meets Po — and must decide whether his endgame justifies his methods
      npcs_involved: [Grand Master Po, Won Pyru]
      stakes: the convergence itself
  passive_progression:
    rate_per_turn: 0.015
    accelerators:
      - the party completes a task that advances Po's design
      - a new connection between Po's instructions and current events is revealed
    decelerators:
      - the party acts against Po's apparent design
      - the party ignores signs of Po's involvement
    accelerator_bonus: 0.04
    decelerator_penalty: 0.02

- name: The Highland Resistance
  extends: the-resistance
  description: >-
    Twenty villages. Three weeks. No army, no political standing, no
    legal authority. The party must turn scattered farming communities
    into a coordinated resistance capable of surviving an imperial
    bureaucracy backed by channeler-soldiers. Every village saved is a
    lesson applied. Every technique learned has a use. The resistance
    is the classroom and the classroom is the resistance — this is how
    pacing works when the master stops lecturing and starts fighting.
  triggers:
    - player arrives at a new highland village
    - player encounters Jade Reclamation forces in the highlands
  narrative_hints:
    - each village has a different problem that requires a different element or approach
    - speed matters — every day spent teaching is a day the assessors get closer
  resolution_hints:
    - the resistance succeeds not through force but through making resettlement more expensive than the land is worth
    - the villages develop their own channelers — the party's legacy is capability, not dependency
    - the Saffron-Jade alliance fractures under the cost of highland enforcement
  tags:
    - villages
  escalation:
    - at: 0.1
      event: Bao Shen's rider network delivers warnings — some villages prepare, others panic
      npcs_involved: [Bao Shen, village elders]
      stakes: coordination versus chaos
    - at: 0.3
      event: the party must split up to reach multiple villages before the assessors — each member alone
      npcs_involved: [Won Pyru]
      stakes: the students must teach what they have barely learned
    - at: 0.5
      event: the first assessor team arrives at a village the party has prepared — the legal defense is tested
      npcs_involved: [Jade Reclamation assessor, village elder]
      stakes: does preparation work against bureaucratic power
    - at: 0.7
      event: the Authority escalates — channeler-enforcers are dispatched to a village that resisted
      npcs_involved: [Jade Reclamation earth channeler]
      stakes: the line between resistance and war
    - at: 0.9
      event: the highland villages must stand together or fall separately — a council is called
      npcs_involved: [Bao Shen, village elders, Won Pyru]
      stakes: the birth of something larger than survival
  passive_progression:
    rate_per_turn: 0.03
    accelerators:
      - the party restores a village's resources using channeling
      - the party successfully delays or redirects assessors
    decelerators:
      - the party leaves the highlands
      - a village capitulates to resettlement
    accelerator_bonus: 0.05
    decelerator_penalty: 0.04

- name: The Elements Remember
  extends: the-spirit-crisis
  description: >-
    The spirit world is not a metaphor in the Shattered Accord — it is
    a bleeding wound fourteen centuries old. Spirit-tears gash the sky,
    hostile spirits flood through, and the elemental balance has never
    recovered from Anhuanzhou's hubris. But the party's multi-element
    channeling is doing something no one expected: the elements respond
    to cooperation. Where the party channels together, spirit-tears
    shrink. Where they fight, the tears widen. The world itself is
    keeping score.
  triggers:
    - player channels multiple elements simultaneously or cooperatively
    - player visits a site scarred by the Shattering
  narrative_hints:
    - hostile spirits near the party become confused rather than aggressive when multiple elements harmonize
    - the Broken Nexus is reacting to what the party is doing, even from a distance
  resolution_hints:
    - the convergence the prophecy describes is not a person — it is an act of cooperation repeated until the world heals
    - healing the Accord requires channelers from all eight elements working in concert
    - the party's journey is a small-scale proof that the Accord can be rebuilt
  tags:
    - environmental
  escalation:
    - at: 0.2
      event: the party's cooperative channeling calms a local spirit-tear — an effect no single channeler has achieved
      npcs_involved: []
      stakes: a new understanding of what multi-element work can do
    - at: 0.4
      event: spirits begin approaching the party not with hostility but with recognition — they remember the Accord
      npcs_involved: [spirit seer]
      stakes: the spirit world has noticed
    - at: 0.6
      event: a major spirit-tear near the highlands begins to shrink — factions take notice and want to control whatever is causing it
      npcs_involved: [Accord Reborn envoy]
      stakes: the party's work has geopolitical consequences
    - at: 0.8
      event: the Broken Nexus pulses — felt across all eight shards — in response to the party's channeling
      npcs_involved: []
      stakes: the world is waking up
    - at: 0.9
      event: the elements speak — not words, but a resonance that every channeler in the world feels simultaneously
      npcs_involved: []
      stakes: the Accord remembers what it was
  passive_progression:
    rate_per_turn: 0.01
    accelerators:
      - the party channels cooperatively with real stakes
      - a spirit responds positively to multi-element channeling
    decelerators:
      - the party fights spirits with force instead of harmony
      - the party channels single-element in isolation
    accelerator_bonus: 0.05
    decelerator_penalty: 0.03
