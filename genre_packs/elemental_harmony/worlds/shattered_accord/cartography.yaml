map_style: East Asian ink wash cartography, sumi-e brush style map, rice paper texture,
  mountain ranges painted in traditional Chinese landscape style, calligraphy labels,
  red seal stamps, silk border
regions:
  broken_nexus:
    adjacent:
    - jade_kingdoms
    - sky_temples
    - tide_reaches
    - ember_isles
    description: A roiling maelstrom of raw elemental energy at the world's center,
      where the Accord Eternal was shattered. The glass-smooth Nexus Scar sits at
      its heart, ringed by eight radiating rifts that pour alien light into contested
      borderlands shrouded in spirit-fog.
    name: Naropa Peak
    landmarks:
      - name: Kṣatavāri
        type: crater
        description: >-
          The Nexus Scar — a perfectly flat, glass-smooth disc of fused stone
          three leagues across at the exact point of detonation. Nothing grows
          on it. Channelers who step onto it report hearing all eight elements
          screaming simultaneously. Spirit-sightings here are constant and
          often violent.
      - name: The Saṃdhāna Rifts
        type: natural
        description: >-
          The Accord Wounds — eight massive tears in the landscape radiating
          outward from the Nexus Scar, each humming with a different elemental
          resonance. Spirits drift freely through them. The land between the
          rifts is a shimmering, unstable zone where gravity shifts, fires
          ignite spontaneously, and rain falls upward.
  ember_isles:
    adjacent:
    - broken_nexus
    - iron_peaks
    - tide_reaches
    description: A volcanic archipelago wreathed in perpetual smoke, where the great
      forges of Yuragasasasu and Menki Citadel glow like fallen stars against black
      basalt shores. Rigid military doctrine and fire-channeling mastery define a
      people who remember Hyeong Ridge as a tactical success.
    name: Crimson Tower
    settlements:
      - name: Yuragasasasu Forge
        type: city
        description: >-
          The great fire-channeler forge complex — fallen-star glow against
          black basalt shores, where rigid military doctrine is hammered into
          every channeler alongside the metal. Houses the Victory Frieze, a
          massive bas-relief depicting the Battle of Hyeong Ridge as a moment
          of glorious triumph, pointedly omitting all Iron Peaks casualties.
      - name: Menki Citadel
        type: outpost
        description: >-
          Fire-channeler military citadel perched on volcanic black basalt,
          its signal fires visible across the strait. Garrison command for
          the Ember Isles' southern approaches, where warships patrol the
          spirit-haunted waters between the shards.
    landmarks:
      - name: Shijin Shrine
        type: shrine
        description: >-
          Sacred fire-channeling temple housing the Ash Cenotaph — a towering
          column of fused volcanic glass containing Ayuriko of Ash Tower's
          broken channeling staff, recovered from the Shattering blast site.
          Channelers come here to study the old forms and pay respects to the
          martyr who tried to contain the detonation.
  iron_peaks:
    adjacent:
    - jade_kingdoms
    - ember_isles
    - sky_temples
    description: Brutal granite ranges honeycombed with fortress-mines and connected
      by precarious bridges over spirit-haunted chasms. The Molten Ridge of Hyeong
      scars its southern face, where twisted iron spires glow with nesting fire-spirits
      and the Screaming Vents wail in the wind.
    name: Chan Stronghold
    settlements:
      - name: Suwon Stronghold
        type: city
        description: >-
          Headquarters of the Sealed Gate faction, deep in the honeycombed
          granite ranges. Commander Mong senses vibrations through a hundred
          meters of solid rock from this fortress-mine. Every gate from Kwon
          to Yejin is fortified, every tunnel mapped, every foreign channeler
          turned away or imprisoned in the deep mines beneath Anso Forge.
    landmarks:
      - name: Hyeong Ridge
        type: natural
        description: >-
          The Molten Ridge — twisted iron formations where ore deposits melted
          by Tsuka's conflagration re-solidified into jagged, unnatural spires.
          The stone is permanently warm. Fire-spirits nest in the crevices,
          glowing like embers at night, attacking any miners who attempt to
          work the deposits. Three centuries and the mountain still burns.
      - name: Kwon Gate
        type: monument
        description: >-
          The Granite Cenotaph — a monolithic block of unworked granite at the
          entrance to the Iron Peaks, carved only with Dojin's name and the
          words "betrayed by fire, unbroken by earth." Every Iron Peaks child
          learns to recite the names of the fallen here.
      - name: Dojin's Vents
        type: natural
        description: >-
          The Screaming Vents — fissures along Hyeong Ridge that emit
          high-pitched wailing when wind passes over them. The locals say
          they are the screams of Dojin's rearguard, trapped in the moment
          of their burning. Channelers of any element report nausea and
          disorientation near the vents, and fire channeling becomes
          dangerously unstable within a league.
  jade_kingdoms:
    adjacent:
    - broken_nexus
    - iron_peaks
    - monsoon_courts
    - sky_temples
    description: A vast continental shard of terraced highlands and fertile river
      valleys, dominated by monumental stone architecture and earth-channeling academies.
      The Imperial Terrace rises from its heart, surrounded by jade-veined cliffs
      that hum with deep elemental resonance.
    name: The Ping Bridge
    settlements:
      - name: The Songnan Terrace
        type: city
        description: >-
          The Imperial Terrace — monumental stone architecture rising from
          jade-veined cliffs that hum with deep elemental resonance. Seat
          of Songnan the Silent and the Jade Reclamation's military apparatus.
          Anhuanzhou's name is carved into the foundation stones, recast as
          a hero who defended the earth from sky treachery.
    landmarks:
      - name: The Anhuanzhou Wall
        type: monument
        description: >-
          The Celestial Wall — a great border fortification stretching across
          the Jade Kingdoms' northern frontier. Anhuanzhou's name is carved
          into the base of every section. Garrisons at every gate ostensibly
          defend against spirit incursions but are transparently aimed at
          the Iron Peaks and the Monsoon Courts beyond.
  monsoon_courts:
    adjacent:
    - jade_kingdoms
    - tide_reaches
    description: Lush river-delta lowlands battered by seasonal storms of supernatural
      intensity, where temple-cities are built on elevated stone platforms above the
      flood line. The Drowned Palace Flats below the Moonlit Temple remain a barren
      wasteland salted by ancient grief.
    name: The Moonlit Palace
    settlements:
      - name: Kreah's Palace
        type: city
        description: >-
          The Moonlit Temple — elevated temple-city built on stone platforms
          above the flood line, seat of Garuda Kreah and the Monsoon Pact.
          Rebuilt uphill from the devastated Drowned Palace after the
          aftershock flooding, its spires catch moonlight and channel it
          through crystal-capped towers into the monsoon-dance chambers below.
      - name: Rathep's Temple
        type: town
        description: >-
          Where Nāgī Chattang oversees the Monsoon Pact's land forces.
          Monsoon-dance and blood-offering channeling are practiced here in
          rituals that blend storm-calling with martial discipline. The
          temple complex sprawls along the river delta, its stone platforms
          rising above the seasonal floods.
    landmarks:
      - name: Nouk's Basin
        type: natural
        description: >-
          The Drowned Palace Flats — a barren wasteland below the Moonlit
          Temple where the ancient riverside palace was scoured flat by
          aftershock flooding from the Drowning of Qalanolei. Rishi Nouk
          declared the ground "salted by foreign grief." The soil has never
          recovered its fertility.
      - name: The Flowering Falls
        type: natural
        description: >-
          Sacred cascades where the Monsoon Pact was sealed with
          storm-channeling rituals. Water plunges through ancient stone
          channels carved with serpent motifs, and the spray carries a faint
          elemental charge that makes the surrounding jungle bloom in colors
          found nowhere else on the shard.
  sky_temples:
    adjacent:
    - jade_kingdoms
    - broken_nexus
    - iron_peaks
    description: Wind-scoured plateaus and floating stone monasteries tethered to
      mountain peaks by chains of solidified air. The Sacred Spire and Tripita Peak
      house the Accord Reborn coalition, where channelers of all elements attempt
      to relearn the convergence rituals lost in the Shattering.
    name: Kausalyā Temple
    settlements:
      - name: Dignagālavā Monastery
        type: city
        description: >-
          Floating stone monastery tethered to mountain peaks by chains of
          solidified air. Headquarters of the Accord Reborn coalition, where
          Dhya of the Eternal Cloud grows increasingly authoritarian as
          elemental instability worsens. Channelers from multiple nations
          attempt to relearn the convergence rituals lost in the Shattering.
    landmarks:
      - name: Tripita Spire
        type: tower
        description: >-
          The Sacred Spire — a needle of wind-carved stone rising from the
          highest plateau, where the most advanced convergence experiments
          take place. Air channelers use the altitude and thin atmosphere to
          achieve states of elemental communion impossible at lower elevations.
          Lightning strikes the spire constantly but never damages it.
      - name: Chomolun's Dais
        type: shrine
        description: >-
          The Empty Dais — a circular stone platform where the Sky Temples'
          delegation departed for the last Accord Eternal, kept bare and
          unadorned for fourteen centuries as a permanent accusation against
          the Jade Kingdoms. No offering is placed here. No prayer is spoken.
          The emptiness is the memorial.
  tide_reaches:
    adjacent:
    - broken_nexus
    - monsoon_courts
    - ember_isles
    description: Half-drowned island chains where water levels shift with the moods
      of awakened deep-ocean spirits. The dark silhouette of sunken Qalanolei is visible
      on calm days, and the Bone Shallows — a reef of calcified warships — marks where
      an empire's fleet became a graveyard.
    name: Salt Channel
    settlements:
      - name: Upapuuk's Shore
        type: outpost
        description: >-
          Naval base of the Monsoon Pact's southern arm, commanded by
          Pounamilaq of the Storm Shore. Outrigger war-canoes line the
          black-sand beach, and the constant sound of ocean-spirit chanting
          drifts from the deep water beyond the reef. The settlement clings
          to existence between the drowned ruins below and the hostile seas
          beyond.
    landmarks:
      - name: Qalanolei
        type: ruin
        description: >-
          The sunken capital of the Tide Reaches — coral-crusted towers,
          ceremonial platforms, and the great navigation stones all submerged
          beneath twenty fathoms of spirit-thick ocean. Visible through clear
          water on calm days. Channelers report hearing singing from below.
          The deep-ocean spirits that Taamila's sacrifice awakened still
          patrol these waters.
      - name: Taamila's Reef
        type: ruin
        description: >-
          The Bone Shallows — a reef formed entirely from the calcified
          remains of Meishangdao's eight hundred warships. Wooden hulls
          turned to stone, anchors fused to coral, skeletal remains of
          soldiers visible at low tide. The water here is perpetually warm
          and smells of iron.
      - name: Tiruana's Pillar
        type: monument
        description: >-
          A lone stone column rising from the shallows, carved by Naumehau
          Tiruana a generation after the Drowning, listing the names of every
          island lost. The names run from the waterline to the top, and
          the lower names are slowly being consumed by salt and coral — the
          sea reclaiming even the memory.
routes:
- danger: dangerous
  description: A mountain pass still coated in razor-sharp volcanic glass from the
    Burning Schism, where boot leather shreds within hours and nothing has grown for
    three centuries.
  distance: medium
  from_id: jade_kingdoms
  name: Granite Forge
  to_id: iron_peaks
- danger: deadly
  description: A treacherous path through the shimmering instability zone between
    the eight elemental rifts, where gravity shifts without warning and spirits drift
    freely through tears in reality.
  distance: long
  from_id: jade_kingdoms
  name: Steep Stronghold
  to_id: broken_nexus
- danger: moderate
  description: An ancient trade route following the great river downstream from the
    Jade highlands into the Monsoon Courts' delta lowlands, still patrolled by Jade
    Reclamation border garrisons.
  distance: medium
  from_id: jade_kingdoms
  name: Siwonyoung Mine
  to_id: monsoon_courts
- danger: moderate
  description: A winding mountain trail rising from the Jade Kingdoms' northern frontier
    to the wind-scoured plateaus of the Sky Temples, marked by ancient prayer cairns
    and guarded by Accord Reborn sentinels.
  distance: short
  from_id: jade_kingdoms
  name: Taekdurumagi Gate
  to_id: sky_temples
- danger: dangerous
  description: A dead corridor stretching from the Nexus Scar toward the ocean where
    all elemental channeling ceases entirely, leaving travelers defenseless against
    spirits and the elements alike.
  distance: long
  from_id: broken_nexus
  name: Samarapratna Monastery
  to_id: tide_reaches
- danger: deadly
  description: Open ocean patrolled by glutted deep-spirits who drag ships beneath
    currents that move against the wind — no vessel larger than an outrigger canoe
    has survived the crossing in six hundred years.
  distance: long
  from_id: tide_reaches
  name: Steep Mine
  to_id: ember_isles
- danger: dangerous
  description: A precarious route along the Molten Ridge where fire-spirit nests glow
    like embers in twisted iron spires, and the Screaming Vents cause nausea and wild
    channeling instability.
  distance: medium
  from_id: iron_peaks
  name: Chace's Canopy
  to_id: ember_isles
- danger: moderate
  description: A coastal shipping route maintained by the military alliance between
    the Monsoon Courts and sympathetic Tide Reaches pilots, skirting the Bone Shallows
    where a petrified fleet forms a grim reef.
  distance: medium
  from_id: monsoon_courts
  name: Silent Garden
  to_id: tide_reaches
- danger: dangerous
  description: A spirit-fog passage from the Sky Temples' lowest plateaus into the
    contested borderland surrounding the Nexus, used by Accord Reborn channelers attempting
    to study the elemental rifts.
  distance: short
  from_id: sky_temples
  name: The Daliang Fortress
  to_id: broken_nexus
starting_region: jade_kingdoms
world_name: The Shattered Accord
