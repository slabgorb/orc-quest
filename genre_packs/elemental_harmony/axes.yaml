definitions:
  - id: balance
    name: Elemental Balance
    description: >-
      How stable is the world's elemental harmony? Low balance means one
      element is dominant, spirits are agitated, and natural disasters
      are common. High balance means the elements coexist, spirits are
      calm, and channelers can train in peace.
    poles:
      - fractured
      - harmonious
    default: 0.4

  - id: mysticism
    name: Mysticism
    description: >-
      How present and active is the spirit world? Low mysticism means
      spirits are rare and distant — channeling is more martial art than
      spiritual practice. High mysticism means spirits walk among mortals,
      the spirit world bleeds through, and enlightenment is a real and
      tangible thing.
    poles:
      - martial
      - spiritual
    default: 0.6

  - id: conflict
    name: Conflict
    description: >-
      How much tension exists between the nations? Low conflict means
      trade flourishes, borders are open, and disputes are settled with
      words. High conflict means war is brewing or underway, borders
      are closed, and people are choosing sides.
    poles:
      - peaceful
      - warring
    default: 0.5

modifiers:
  balance:
    fractured: >-
      The elements are out of balance. One nation has grown too powerful
      or an elemental force has been disrupted. Storms rage, harvests
      fail, and spirits grow hostile. Channelers of the dominant element
      are stronger than they should be. Others struggle.
    harmonious: >-
      The elements flow in balance. Channelers train freely, spirits are
      approachable, and the natural world is healthy. Conflicts exist
      but they are political, not elemental. The world is at peace
      with itself, even if its people are not.

  mysticism:
    martial: >-
      Channeling is a physical discipline — forms, training, muscle memory.
      Spirits are distant legends. The spirit world is theoretical.
      Channelers are athletes and warriors, not mystics. Power comes
      from practice, not meditation.
    spiritual: >-
      The spirit world is close and active. Channelers meditate to
      deepen their connection. Spirits appear in dreams, at crossroads,
      in sacred groves. Enlightenment unlocks abilities that training
      alone cannot reach. The line between channeler and spirit medium
      is blurred.

  conflict:
    peaceful: >-
      The nations are at peace — fragile, perhaps, but real. Trade
      flows between kingdoms. Mixed-heritage channelers are accepted.
      The threat is internal: corruption, inequality, spiritual neglect.
    warring: >-
      War is here or imminent. Borders are militarized. Channelers
      are conscripted. Mixed-heritage people are distrusted. The threat
      is external: invasion, blockade, the destruction of a way of life.

presets:
  - name: Avatar
    description: >-
      The classic: world out of balance, one nation dominant, a hero
      must restore harmony. High adventure, strong moral themes,
      spirits are real and involved.
    values:
      balance: 0.2
      mysticism: 0.7
      conflict: 0.7

  - name: Ghibli
    description: >-
      Wonder and beauty over conflict. The spirit world is vivid and
      close. Nature is a character. Conflicts are personal, not
      geopolitical. The world is magical and worth protecting.
    values:
      balance: 0.7
      mysticism: 0.9
      conflict: 0.2

  - name: Wuxia
    description: >-
      Martial arts focus. Channeling is disciplined combat, not spiritual
      communion. Wandering heroes, corrupt officials, honor and revenge.
      The spirit world is distant but the martial world is intense.
    values:
      balance: 0.5
      mysticism: 0.3
      conflict: 0.6

  - name: Warring Kingdoms
    description: >-
      Full-scale conflict between nations. Political intrigue, military
      strategy, desperate alliances. Every channeler is a weapon.
      The spirit world is disturbed by the violence.
    values:
      balance: 0.15
      mysticism: 0.4
      conflict: 0.9
