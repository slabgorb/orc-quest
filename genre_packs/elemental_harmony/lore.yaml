world_name: ""
history: >-
  The world was shaped by the elements long before humans learned to
  channel them. The spirit world lies beneath the physical like a
  reflection in water — close, connected, and easily disturbed.
geography: ""
cosmology: >-
  The elements are alive. Fire is not just heat — it is will, ambition,
  the drive to create and destroy. Water is adaptation, healing, the
  patience that wears mountains to sand. Earth is endurance, truth,
  the stubbornness that holds the world together. Air is freedom,
  wisdom, the breath between thoughts. The spirits that embody these
  elements are ancient, powerful, and not always kind.
