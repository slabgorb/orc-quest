# Audio configuration for elemental harmony genre pack
# Mood tracks, SFX library, creature voice presets, mixer settings

mood_tracks:
  exploration:
    - path: audio/music/exploration.ogg
      title: "Mountain Winds"
      bpm: 90
    - path: audio/music/exploration_3.ogg
      title: "Spirit Trail"
      bpm: 85
  combat:
    - path: audio/music/combat.ogg
      title: "Elemental Clash"
      bpm: 140
    - path: audio/music/combat_3.ogg
      title: "Storm of Fists"
      bpm: 150
  tension:
    - path: audio/music/tension.ogg
      title: "Gathering Storm"
      bpm: 70
    - path: audio/music/tension_3.ogg
      title: "Dark Currents"
      bpm: 60
  teahouse:
    - path: audio/music/teahouse.ogg
      title: "Jasmine Steam"
      bpm: 100
    - path: audio/music/teahouse_3.ogg
      title: "Paper Lanterns"
      bpm: 95
  spirit:
    - path: audio/music/spirit.ogg
      title: "Ancestral Whispers"
      bpm: 75
    - path: audio/music/spirit_3.ogg
      title: "Spirit Realm"
      bpm: 80
  sorrow:
    - path: audio/music/sorrow.ogg
      title: "Fallen Petals"
      bpm: 55
  rest:
    - path: audio/music/rest.ogg
      title: "Moonlit Garden"
      bpm: 65
  triumph:
    - path: audio/music/triumph.ogg
      title: "Dragon's Victory"
      bpm: 130

