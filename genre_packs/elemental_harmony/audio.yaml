  chi_burst:
    - audio/sfx/chi_burst.ogg
    - audio/sfx/chi_burst_2.ogg
  elemental_push:
    - audio/sfx/elemental_push.ogg
    - audio/sfx/elemental_push_2.ogg
  # Cloth (robes, gi)
  robe_swish:
    - audio/sfx/robe_swish.ogg
    - audio/sfx/robe_swish_2.ogg
    - audio/sfx/robe_swish_3.ogg
    - audio/sfx/robe_swish_4.ogg
  # Environment
  door_slide:
    - audio/sfx/door_slide.ogg
    - audio/sfx/door_slide_2.ogg
  door_close:
    - audio/sfx/door_close.ogg
    - audio/sfx/door_close_2.ogg
  armor_clink:
    - audio/sfx/armor_clink.ogg
    - audio/sfx/armor_clink_2.ogg
  # Movement
  footsteps:
    - audio/sfx/footsteps.ogg
    - audio/sfx/footsteps_2.ogg
    - audio/sfx/footsteps_3.ogg
    - audio/sfx/footsteps_4.ogg
    - audio/sfx/footsteps_5.ogg
  footsteps_wood:
    - audio/sfx/footsteps_wood.ogg
    - audio/sfx/footsteps_wood_2.ogg
    - audio/sfx/footsteps_wood_3.ogg
  # Items
  coins:
    - audio/sfx/coins.ogg
    - audio/sfx/coins_2.ogg
  scroll_open:
    - audio/sfx/scroll_open.ogg
  scroll_close:
    - audio/sfx/scroll_close.ogg
  page_turn:
    - audio/sfx/page_turn.ogg
    - audio/sfx/page_turn_2.ogg

creature_voice_presets:
  earth_elemental:
    creature_type: earth_elemental
    description: "Deep, rumbling voice like grinding stones"
    pitch: 0.5
    rate: 0.6
    effects:
      - type: reverb
        params:
          room_size: 0.7
      - type: lowpass_filter
        params:
          cutoff_frequency_hz: 1500
  spirit_fox:
    creature_type: spirit_fox
    description: "Airy, ethereal voice with shimmering echo"
    pitch: 1.3
    rate: 1.0
    effects:
      - type: reverb
        params:
          room_size: 0.8
  water_dragon:
    creature_type: water_dragon
    description: "Flowing, deep voice with watery reverb"
    pitch: 0.7
    rate: 0.8
    effects:
      - type: reverb
        params:
          room_size: 0.9
      - type: lowpass_filter
        params:
          cutoff_frequency_hz: 2200

mixer:
  music_volume: 0.4
  sfx_volume: 0.7
  voice_volume: 1.0
  duck_music_for_voice: true
  duck_amount_db: -12.0
  crossfade_default_ms: 3000

