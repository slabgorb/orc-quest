  plank_break:
    - audio/sfx/plank_break.ogg
    - audio/sfx/plank_break_2.ogg
  bamboo_creak:
    - audio/sfx/bamboo_creak.ogg
    - audio/sfx/bamboo_creak_2.ogg
    - audio/sfx/bamboo_creak_3.ogg
  # Temple / spiritual
  temple_bell:
    - audio/sfx/temple_bell.ogg
    - audio/sfx/temple_bell_2.ogg
    - audio/sfx/temple_bell_3.ogg
  gong:
    - audio/sfx/gong.ogg
    - audio/sfx/gong_2.ogg
  crystal_chime:
    - audio/sfx/crystal_chime.ogg
    - audio/sfx/crystal_chime_2.ogg
