affinities:
  # === PRIMARY ELEMENTS ===
  - name: "Fire"
    description: "Will, ambition, creation and destruction. Your channeling burns."
    triggers:
      - "aggressive channeling"
      - "striking first in combat"
      - "pushing through pain or fear"
      - "inspiring others through passionate action"
      - "destroying obstacles"
    tier_thresholds: [6, 15, 30]
    unlocks:
      tier_0:
        name: "Ember"
        description: "Basic fire forms — sparks, warmth, simple flame."
        abilities:
          - "Produce flame from breath or fist"
          - "Heat objects by touch"
          - "Light sources at range"
      tier_1:
        name: "Blaze"
        description: "Sustained fire channeling — combat-viable streams and bursts."
        abilities:
          - "Fire stream (sustained attack)"
          - "Fire shield (defensive wall)"
          - "Fire breath (cone attack)"
          - "Heat detection (sense living things through warmth)"
      tier_2:
        name: "Inferno"
        description: "Advanced fire mastery — area control and precision."
        abilities:
          - "Fire vortex (area denial)"
          - "Precision cauterize (seal wounds with controlled heat)"
          - "Smoke shaping (obscure and confuse)"
          - "Forge channeling (shape metal with bare hands)"
      tier_3:
        name: "Corona"
        description: "Transcendent fire — lightning, blue flame, internal combustion."
        abilities:
          - "Lightning generation (requires inner peace, not rage)"
          - "Blue flame (hotter, more controlled, requires emotional mastery)"
          - "Combustion channeling (ignite at distance without flame trail)"
          - "Solar breath (channel the sun's fire directly)"
    sub_paths:
      - name: "Lightning Path"
        requirement: "tier_2 Fire + tier_1 Harmony"
        description: "Lightning is not anger — it is pure will without emotion. Requires inner peace."
      - name: "Forge Path"
        requirement: "tier_2 Fire + tier_1 Earth"
        description: "Shape metal with bare hands. Fire and earth as one discipline."
      - name: "Combustion Path"
        requirement: "tier_3 Fire only"
        description: "Ignite at distance. No stream, no trail. Pure intention becomes fire."

  - name: "Earth"
    description: "Endurance, truth, the stubbornness that holds the world together."
    triggers:
      - "holding ground in combat"
      - "enduring damage or hardship"
      - "building or fortifying structures"
      - "patience in negotiation"
      - "uncovering hidden truths"
    tier_thresholds: [6, 15, 30]
    unlocks:
      tier_0:
        name: "Stone"
        description: "Basic earth forms — moving small stones, sensing vibration."
        abilities:
          - "Move loose earth and stone"
          - "Tremor sense (feel footsteps through ground)"
          - "Root stance (unmovable footing)"
      tier_1:
        name: "Boulder"
        description: "Sustained earth channeling — walls, projectiles, armor."
        abilities:
          - "Stone wall (defensive barrier)"
          - "Rock projectile (ranged attack)"
          - "Earth armor (coat body in stone)"
          - "Tunnel (bore through earth)"
      tier_2:
        name: "Mountain"
        description: "Advanced earth mastery — reshaping terrain, seismic sense."
        abilities:
          - "Seismic sense (see through vibration, works in total darkness)"
          - "Quicksand (liquify ground beneath target)"
          - "Earth column (launch self or others upward)"
          - "Stoneshaping (sculpt rock like clay)"
      tier_3:
        name: "Tectonic"
        description: "Transcendent earth — metal channeling, lava, crystal."
        abilities:
          - "Metal channeling (sense and move refined metal)"
          - "Lava channeling (requires tier_1 Fire synergy)"
          - "Crystal resonance (create, shape, and shatter crystal)"
          - "Earthquake (massive area effect, devastating but uncontrolled)"
    sub_paths:
      - name: "Metal Path"
        requirement: "tier_2 Earth + intense focus training"
        description: "Metal is refined earth. Sensing it requires perceiving impurities."
      - name: "Lava Path"
        requirement: "tier_2 Earth + tier_1 Fire"
        description: "Where earth and fire meet. Liquify stone into magma."
      - name: "Crystal Path"
        requirement: "tier_3 Earth + tier_1 Spirit"
        description: "Crystal channels spiritual energy. Grow, shape, and resonate."

  - name: "Water"
    description: "Adaptation, healing, the patience that shapes mountains."
    triggers:
      - "redirecting attacks"
      - "healing allies"
      - "adapting strategy mid-fight"
      - "using the environment creatively"
      - "de-escalating conflict"
    tier_thresholds: [6, 15, 30]
    unlocks:
      tier_0:
        name: "Stream"
        description: "Basic water forms — moving water, basic healing."
        abilities:
          - "Move and shape water"
          - "Water whip (basic ranged attack)"
          - "Soothe (minor wound cleaning and pain relief)"
      tier_1:
        name: "Current"
        description: "Sustained water channeling — combat flows and healing."
        abilities:
          - "Water shield (defensive sphere)"
          - "Healing waters (mend wounds, cure minor illness)"
          - "Water jet (high-pressure cutting attack)"
          - "Mist (obscure area with fog)"
      tier_2:
        name: "Tide"
        description: "Advanced water mastery — ice, plant channeling, blood sense."
        abilities:
          - "Ice channeling (freeze water instantly)"
          - "Plant channeling (move water within living plants)"
          - "Blood sense (detect living creatures through their water)"
          - "Maelstrom (massive water vortex)"
      tier_3:
        name: "Ocean"
        description: "Transcendent water — blood channeling, spirit healing, tidal control."
        abilities:
          - "Blood channeling (control another's body — forbidden art, moral cost)"
          - "Spirit healing (mend spiritual wounds, not just physical)"
          - "Tidal pull (move vast amounts of water, shape coastlines)"
          - "Phase shift (turn water to steam or ice at will, all three states)"
    sub_paths:
      - name: "Ice Path"
        requirement: "tier_2 Water"
        description: "Remove heat from water. Requires emotional coldness — discipline, not cruelty."
      - name: "Healing Path"
        requirement: "tier_2 Water + tier_1 Spirit"
        description: "Deep healing that reaches the spirit. Can cure spiritual corruption."
      - name: "Blood Path"
        requirement: "tier_3 Water only"
        description: "Forbidden. Control another's body through their blood. Known, feared, outlawed."

  - name: "Air"
    description: "Freedom, wisdom, the breath between thoughts."
    triggers:
      - "evading attacks"
      - "mediating disputes"
      - "meditation or spiritual practice"
      - "creative problem solving"
      - "travel and exploration"
    tier_thresholds: [6, 15, 30]
    unlocks:
      tier_0:
        name: "Breeze"
        description: "Basic air forms — gusts, enhanced movement, listening."
        abilities:
          - "Wind gust (push objects and people)"
          - "Enhanced leap (air-assisted jumping)"
          - "Far hearing (carry sound on the wind)"
      tier_1:
        name: "Gale"
        description: "Sustained air channeling — flight, sound manipulation."
        abilities:
          - "Glide (sustained descent on air currents)"
          - "Air scooter (high-speed ground movement)"
          - "Silence (remove all sound from an area)"
          - "Wind blade (compressed air as cutting weapon)"
      tier_2:
        name: "Storm"
        description: "Advanced air mastery — true flight, vacuum, weather sense."
        abilities:
          - "True flight (sustained, self-powered)"
          - "Vacuum (remove air from a space — suffocation weapon)"
          - "Weather sense (predict and read atmospheric changes)"
          - "Tornado (directed funnel, devastating but loud)"
      tier_3:
        name: "Void"
        description: "Transcendent air — astral projection, sound as weapon, becoming wind."
        abilities:
          - "Astral projection (spirit leaves body on the wind)"
          - "Sonic channeling (weaponize sound itself)"
          - "Become wind (temporarily discorporate — pass through barriers)"
          - "Storm calling (summon and direct major weather events)"
    sub_paths:
      - name: "Sound Path"
        requirement: "tier_2 Air + tier_1 Harmony"
        description: "Sound is air with intention. Weaponize, heal, or communicate through pure vibration."
      - name: "Flight Path"
        requirement: "tier_2 Air"
        description: "True self-powered flight. Requires releasing attachment to the ground."
      - name: "Void Path"
        requirement: "tier_3 Air + tier_1 Spirit"
        description: "The space between air. Suffocation, silence, and the dissolution of self."

  # === META AFFINITIES ===
  - name: "Spirit"
    description: "The connection between worlds. You see what others cannot."
    triggers:
      - "communicating with spirits"
      - "crossing into the spirit world"
      - "sensing spiritual imbalance"
      - "empathy and emotional insight"
      - "protecting the boundary between worlds"
    tier_thresholds: [8, 18, 35]
    unlocks:
      tier_0:
        name: "Sensitive"
        description: "You feel the spirit world. Faintly, like a draft from an unseen door."
        abilities:
          - "Spirit sense (detect nearby spirits)"
          - "Aura reading (sense emotional state of others)"
          - "Dream walking (receive messages in dreams)"
      tier_1:
        name: "Medium"
        description: "You can communicate with spirits and briefly perceive the spirit world."
        abilities:
          - "Spirit speech (talk to spirits directly)"
          - "Spirit sight (see the spirit world overlaid on the physical)"
          - "Warding (create barriers spirits cannot cross)"
          - "Offering (give energy to a spirit in exchange for aid)"
      tier_2:
        name: "Walker"
        description: "You can enter the spirit world and navigate it."
        abilities:
          - "Spirit crossing (enter the spirit world physically)"
          - "Spirit binding (negotiate a pact with a spirit)"
          - "Purification (cleanse spiritual corruption)"
          - "Memory reading (touch an object, see its spiritual history)"
      tier_3:
        name: "Bridge"
        description: "You ARE the connection between worlds. Both exist in you simultaneously."
        abilities:
          - "Dual presence (exist in both worlds at once)"
          - "Spirit channeling (channel a spirit's power through your body)"
          - "Reality anchoring (seal spirit tears, stabilize the boundary)"
          - "Enlightenment (permanent spirit sight, deep understanding of balance)"
    sub_paths:
      - name: "Healer Path"
        requirement: "tier_2 Spirit + tier_1 Water"
        description: "Heal spiritual wounds — corruption, possession, grief made manifest."
      - name: "Exorcist Path"
        requirement: "tier_2 Spirit + tier_1 Fire"
        description: "Banish and bind hostile spirits. Fire purifies what spirit cannot cleanse alone."
      - name: "Oracle Path"
        requirement: "tier_3 Spirit + tier_1 Air"
        description: "See across time. Glimpses, not certainties. The future is a river, not a road."

  - name: "Harmony"
    description: "Balance between opposing forces. The meta-affinity."
    triggers:
      - "resolving conflict without violence"
      - "combining element styles in creative ways"
      - "resisting corruption or extremism"
      - "showing understanding of an opponent's perspective"
      - "maintaining balance when the world pushes you to choose sides"
    tier_thresholds: [10, 22, 40]
    unlocks:
      tier_0:
        name: "Balanced"
        description: "You resist the pull of extremes. Your center holds."
        abilities:
          - "Centering (recover composure in chaos)"
          - "Read the room (sense the balance of a situation)"
          - "Resist corruption (spiritual immunity to imbalance)"
      tier_1:
        name: "Mediator"
        description: "You can bring opposing forces into temporary alignment."
        abilities:
          - "Elemental blending (combine two elements in one form)"
          - "Calming presence (reduce hostility in area)"
          - "Spirit diplomacy (negotiate between spirits and mortals)"
          - "Teach (accelerate another's affinity growth)"
      tier_2:
        name: "Keeper"
        description: "You actively maintain the world's balance."
        abilities:
          - "Seal spirit tears (close breaches between worlds)"
          - "Neutralize (cancel another channeler's active technique)"
          - "Harmony sight (see the balance of a region at a glance)"
          - "Multi-element channeling (use two elements simultaneously)"
      tier_3:
        name: "Accord"
        description: "You embody balance itself. All elements answer your call."
        abilities:
          - "All-element channeling (access all four elements at basic level)"
          - "Restore (reverse elemental corruption in an area)"
          - "True neutralize (permanently seal a dangerous technique)"
          - "Accord state (temporary perfect balance — all elements at your current tier)"

# === SYNERGIES ===
synergies:
  - elements: ["Fire", "Earth"]
    name: "Magma"
    requirement: "tier_2 in both"
    description: "Liquify stone into lava. Devastating, slow, permanent terrain change."
    unlocks: ["Lava flow", "Obsidian wall", "Volcanic eruption"]

  - elements: ["Fire", "Air"]
    name: "Lightning"
    requirement: "tier_2 Fire + tier_1 Air + tier_1 Harmony"
    description: "Not anger but pure directed will. The calmest firebenders learn this."
    unlocks: ["Lightning bolt", "Lightning redirection", "Static field"]

  - elements: ["Water", "Earth"]
    name: "Mud and Plant"
    requirement: "tier_1 in both"
    description: "Control the living earth. Plants, mud, swamp."
    unlocks: ["Mud trap", "Plant growth", "Vine whip", "Root sense"]

  - elements: ["Water", "Air"]
    name: "Weather"
    requirement: "tier_2 in both"
    description: "Shape weather itself. Rain, fog, storms."
    unlocks: ["Rain calling", "Fog bank", "Storm surge", "Pressure wave"]

  - elements: ["Fire", "Water"]
    name: "Steam"
    requirement: "tier_1 in both"
    description: "Superheated vapor. Scalding, obscuring, pressurized."
    unlocks: ["Steam cloud", "Pressure blast", "Thermal shock"]

  - elements: ["Earth", "Air"]
    name: "Dust and Sand"
    requirement: "tier_1 in both"
    description: "Particulate control. Sandstorms, dust blinds, erosion."
    unlocks: ["Sandstorm", "Dust devil", "Sand armor", "Erosion touch"]

  - elements: ["Spirit", "Fire"]
    name: "Purification"
    requirement: "tier_1 Spirit + tier_2 Fire"
    description: "Burn away spiritual corruption. The exorcist's art."
    unlocks: ["Spirit flame", "Purifying blaze", "Corruption burn"]

  - elements: ["Spirit", "Water"]
    name: "Deep Healing"
    requirement: "tier_1 Spirit + tier_2 Water"
    description: "Heal wounds of the soul, not just the body."
    unlocks: ["Spirit mend", "Memory healing", "Grief dissolution"]

  - elements: ["Spirit", "Earth"]
    name: "Ancestral"
    requirement: "tier_2 Spirit + tier_1 Earth"
    description: "Connect to the spirits of the land. Ancient memory."
    unlocks: ["Land memory", "Ancestral counsel", "Sacred ground"]

  - elements: ["Spirit", "Air"]
    name: "Prophecy"
    requirement: "tier_2 Spirit + tier_1 Air"
    description: "Read the currents of fate. Glimpses, not certainties."
    unlocks: ["Future glimpse", "Wind whispers", "Fate reading"]

milestone_categories:
  - mastery
  - compassion
  - courage
  - wisdom
  - sacrifice
  - balance

milestones_per_level: 2
max_level: 5

level_bonuses:
  "1": "Basic channeling forms"
  "2": "Affinity tier_0 unlock in primary element"
  "3": "Sub-path awareness (sensei can describe your options)"
  "4": "Synergy awareness (feel the pull of adjacent elements)"
  "5": "Harmony sensitivity (sense the world's balance)"

wealth_tiers:
  - max_gold: 50
    label: "Wanderer"
  - max_gold: 200
    label: "Established"
  - max_gold: 500
    label: "Prosperous"
  - max_gold: null
    label: "Master"

item_evolution:
  name_threshold: 3
  power_bump_threshold: 5
