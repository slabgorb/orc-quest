- name: Wandering Master
  description: >-
    A traveling channeler who left their temple or school to walk the world.
    Carries decades of training in their forms and a quiet sadness about
    whatever drove them from home. Teaches only those they deem worthy.
  personality_traits:
    - cryptic
    - patient
    - unexpectedly funny
  typical_classes:
    - Channeler
    - Wanderer
  typical_races:
    - Sky Temples
    - Jade Kingdoms
  stat_ranges:
    Spirit: [16, 18]
    Harmony: [14, 18]
  inventory_hints:
    - worn staff
    - prayer beads
    - a single memento from home
  dialogue_quirks:
    - answers questions with questions
    - quotes proverbs that sound wise but might be made up
  disposition_default: 5

- name: Teahouse Keeper
  description: >-
    The owner of a teahouse that serves as the social center of their
    community. Hears every rumor, serves every faction, and has opinions
    about all of them. Their tea is excellent and their advice is free.
  personality_traits:
    - warm
    - shrewd
    - gossips without appearing to
  typical_classes:
    - Scholar
    - Wanderer
  typical_races:
    - Jade Kingdoms
    - Lotus Provinces
  stat_ranges:
    Insight: [14, 18]
    Harmony: [12, 16]
  inventory_hints:
    - rare tea collection
    - worn account book
    - a hidden blade they haven't used in years
  dialogue_quirks:
    - pours tea during important conversations
    - refers to everyone as 'honored guest' regardless of status
  disposition_default: 15

- name: Temple Guardian
  description: >-
    A warrior-monk who protects a sacred site — a mountain temple, a
    spirit gate, a channeling school. Disciplined to the point of
    rigidity, but fiercely devoted to their duty. May not have left
    the temple grounds in years.
  personality_traits:
    - stoic
    - dutiful
    - secretly curious about the outside world
  typical_classes:
    - Guardian
    - Martial Artist
  typical_races:
    - Iron Peaks
    - Sky Temples
  stat_ranges:
    Strength: [14, 18]
    Endurance: [14, 16]
  inventory_hints:
    - ceremonial polearm
    - temple robes with hidden armor
    - a worn book of sutras
  dialogue_quirks:
    - speaks in clipped, formal sentences
    - bows before and after every conversation
  disposition_default: -5

- name: River Trader
  description: >-
    A merchant who travels the waterways between kingdoms, carrying goods,
    news, and occasionally people who need to not be found. Knows every
    dock, every toll, and every harbor master's weakness.
  personality_traits:
    - gregarious
    - calculating
    - loyal to their crew
  typical_classes:
    - Wanderer
    - Scholar
  typical_races:
    - Tide Reaches
    - Monsoon Courts
  stat_ranges:
    Agility: [12, 16]
    Insight: [14, 18]
  inventory_hints:
    - cargo manifests in three languages
    - a compass that points toward profit
    - emergency rations that taste terrible
  dialogue_quirks:
    - quotes prices in multiple currencies simultaneously
    - has a relevant story about every port
  disposition_default: 10

- name: Spirit Seer
  description: >-
    Someone who sees and speaks with spirits — not by choice. The spirit
    world leaks through for them, overlapping with the physical world in
    disorienting ways. Other people find them unsettling. Spirits find
    them convenient.
  personality_traits:
    - distracted
    - empathetic
    - talks to things that aren't there (that ARE there, just invisible)
  typical_classes:
    - Spirit Medium
    - Channeler
  typical_races:
    - Spirit-Touched
    - Sky Temples
  stat_ranges:
    Spirit: [16, 18]
    Insight: [14, 18]
  inventory_hints:
    - spirit-warding charms (that they never use)
    - offerings for spirits they meet on the road
    - a journal of spirit encounters
  dialogue_quirks:
    - pauses mid-sentence to listen to something nobody else hears
    - apologizes to empty spaces
  disposition_default: 0

- name: Forge Master
  description: >-
    A blacksmith or artisan who channels fire into their craft. Their
    weapons and tools carry elemental resonance. Respected in every
    culture because everyone needs good steel.
  personality_traits:
    - direct
    - perfectionist
    - judges people by the quality of their equipment
  typical_classes:
    - Channeler
    - Guardian
  typical_races:
    - Ember Isles
    - Iron Peaks
  stat_ranges:
    Strength: [14, 18]
    Endurance: [12, 16]
  inventory_hints:
    - signature hammer
    - fire-resistant apron
    - a blade they consider their finest work
  dialogue_quirks:
    - examines people's weapons before making eye contact
    - describes emotions using metallurgy metaphors
  disposition_default: 5
