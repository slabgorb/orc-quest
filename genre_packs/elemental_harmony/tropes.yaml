# Genre-Level Tropes — Elemental Harmony
#
# Archetypes (abstract: true) define universal narrative patterns.
# Cross-cutters (abstract: false) fire on player behavior in any world.
# World tropes in worlds/{world}/tropes.yaml extend these via `extends:`.

# ============================================================
# ARCHETYPES — must be specialized by world tropes
# ============================================================

- name: The Mentor
  abstract: true
  category: recurring
  tags: [mentor, identity, cost-of-knowledge]
  triggers:
    - player asks to be taught a new technique
    - player encounters a problem beyond their current ability
    - player discovers something about the mentor's past
  narrative_hints:
    - lessons must emerge from stakes, not sitting — the mentor teaches through action
    - every lesson has a cost — visibility, debt, or truth revealed
    - the mentor is also learning something from the student
  resolution_patterns:
    - the student surpasses the mentor in a way the mentor did not expect
    - the mentor's past catches up and forces a reckoning
    - the mentor's final lesson is absence — the student must stand alone
  tension_level: 0.5

- name: The Corruption
  abstract: true
  category: conflict
  tags: [political, conspiracy, power]
  triggers:
    - player discovers an institution is acting against its stated purpose
    - player witnesses authority figures abusing power over civilians
    - player uncovers evidence of systemic corruption
  narrative_hints:
    - corruption is structural, not individual — removing one bad actor changes nothing
    - the corrupt system offers the player something real in exchange for compliance
    - the people harmed by the system have their own agency and plans
  resolution_patterns:
    - the system is reformed from within by those it tried to crush
    - the system collapses under its own contradictions
    - the players build something new to replace what was broken
  tension_level: 0.6

- name: The Prophecy
  abstract: true
  category: revelation
  tags: [prophecy, spiritual, destiny]
  triggers:
    - player learns of a prophecy or ancient prediction
    - player's actions accidentally fulfill part of a prophecy
    - player meets someone who claims to know their destiny
  narrative_hints:
    - prophecies are ambiguous — multiple interpretations are always valid
    - the prophecy may describe what will happen, not what should happen
    - characters who try to force a prophecy often cause the opposite
  resolution_patterns:
    - the prophecy is fulfilled in a way no one expected
    - the prophecy was a mistranslation or misunderstanding all along
    - the player chooses to defy the prophecy and pays the cost
  tension_level: 0.7

- name: The Coming of Age
  abstract: true
  category: recurring
  tags: [coming-of-age, identity, moral-dilemma]
  triggers:
    - player faces a choice between duty and personal desire
    - player must act without guidance from authority figures
    - player's childhood beliefs are challenged by reality
  narrative_hints:
    - the choice is real — both options have genuine value and genuine cost
    - adults in the story are not infallible; their failures are instructive
    - growing up means accepting complexity, not choosing a side
  resolution_patterns:
    - the character defines themselves through an irreversible choice
    - the character reconciles opposing values into something new
    - the character accepts loss as the price of growth
  tension_level: 0.5

- name: The Resistance
  abstract: true
  category: conflict
  tags: [political, military, villages]
  triggers:
    - player encounters a community under threat from a larger power
    - player is asked to help defend people who cannot defend themselves
    - player must choose between direct action and strategic patience
  narrative_hints:
    - the resistance is not unified — internal disagreements are real
    - victory through violence creates new problems
    - the occupiers have individuals who doubt their own mission
  resolution_patterns:
    - the resistance succeeds through cost the players feel
    - the larger power withdraws for reasons unrelated to the resistance
    - the players negotiate a compromise that satisfies no one fully
  tension_level: 0.6

- name: The Spirit Crisis
  abstract: true
  category: climax
  tags: [spiritual, environmental, prophecy]
  triggers:
    - player encounters a breach between the physical and spirit worlds
    - player witnesses elemental imbalance affecting the natural world
    - player's channeling begins behaving unpredictably
  narrative_hints:
    - the spirit world has its own politics and factions
    - imbalance is not evil — it is a symptom of something deeper
    - fixing the imbalance requires understanding, not force
  resolution_patterns:
    - balance is restored through sacrifice or compromise
    - the boundary between worlds is permanently changed
    - the player becomes a bridge between worlds
  tension_level: 0.8

# ============================================================
# CROSS-CUTTERS — fire on player behavior, no world needed
# ============================================================

- name: The Sacrifice
  abstract: false
  category: climax
  tags: [sacrifice, loss, meaning]
  triggers:
    - player voluntarily offers to give up significant mechanical power
    - player chooses personal loss to protect others
    - player destroys something valuable to prevent it being misused
  narrative_hints:
    - the sacrifice must be the player's choice, never forced
    - the world should acknowledge the weight of what was given up
    - the thing sacrificed should have been genuinely useful, not obsolete
  resolution_patterns:
    - the sacrifice achieves its goal but the loss is permanent
    - the sacrifice inspires others to act
    - the sacrifice transforms the character's story — what was lost becomes legend
  tension_level: 0.8
  escalation:
    - at: 0.2
      event: the moment of decision — the player sees what they could give up and why
      roles: [the-one-who-sacrifices]
      stakes: whether the player commits
    - at: 0.5
      event: the cost becomes real and visible — the power or item is gone
      roles: [the-one-who-sacrifices]
      stakes: the immediate consequence
    - at: 0.8
      event: the world responds to the sacrifice — reputation, lore, NPC reactions
      roles: [the-one-who-sacrifices]
      stakes: how the sacrifice is remembered

- name: The Vow
  abstract: false
  category: recurring
  tags: [honor, commitment, identity]
  triggers:
    - player makes a solemn promise to an NPC or to the party
    - player declares a personal code or restriction
    - player refuses to break a commitment despite pressure
  narrative_hints:
    - vows create dramatic tension when circumstances make them costly
    - the game should test the vow, not ignore it
    - breaking a vow is a valid story beat — it has consequences, not punishment
  resolution_patterns:
    - the vow is kept at great personal cost
    - the vow is broken and the character must live with it
    - the vow is fulfilled and becomes part of the character's legend
  tension_level: 0.4
  escalation:
    - at: 0.3
      event: circumstances make the vow inconvenient
      roles: [the-one-who-vowed]
      stakes: minor cost to keep the vow
    - at: 0.6
      event: keeping the vow conflicts with another obligation
      roles: [the-one-who-vowed]
      stakes: something real must be given up to honor the vow
    - at: 0.9
      event: the ultimate test — keeping the vow may cost everything
      roles: [the-one-who-vowed]
      stakes: the character's identity is defined by this choice

- name: The Reluctant Leader
  abstract: false
  category: recurring
  tags: [leadership, responsibility, identity]
  triggers:
    - party looks to one player for decisions in a crisis
    - NPCs address one player as the group's leader
    - player resists being put in charge but acts decisively anyway
  narrative_hints:
    - leadership is a burden, not a reward — the game should show the cost
    - the reluctant leader's strength is that they don't want power
    - other party members have their own leadership moments
  resolution_patterns:
    - the reluctant leader accepts the role and grows into it
    - the reluctant leader delegates and builds a team instead of leading alone
    - the reluctant leader steps aside for someone better suited
  tension_level: 0.4
  escalation:
    - at: 0.2
      event: the group faces a decision and looks to one person
      roles: [the-reluctant-one]
      stakes: a choice that affects everyone
    - at: 0.5
      event: a follower challenges the leader's authority or decision
      roles: [the-reluctant-one]
      stakes: group cohesion
    - at: 0.8
      event: the leader must make an irreversible decision alone
      roles: [the-reluctant-one]
      stakes: the leader's relationship with the group
