name: Elemental Harmony
version: "0.1.0"
description: >-
  Elemental martial arts in a world inspired by historical Asia — Tokugawa-era
  Japan, Imperial China, Joseon Korea, Khmer kingdoms, Vedic India, Polynesian
  seafarers. Channelers shape fire, earth, water, and air through disciplined
  forms. The spirit world is close and has opinions. Balance is everything.
  Character growth through training, discipline, and spiritual breakthroughs.
min_sidequest_version: "0.1.0"
