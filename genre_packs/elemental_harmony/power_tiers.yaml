# Power Tiers — elemental_harmony
# Per-class visual descriptions at each level range.
# max_level: 5 (compressed progression — one tier per level)
#
# Classes from rules.yaml:
#   Channeler, Martial Artist, Spirit Medium, Scholar, Wanderer, Guardian

Channeler:
  - level_range: [1, 1]
    label: spark
    player: >-
      plain student robes with a single colored sash — vermillion fire,
      indigo water, ochre earth, silver wind — a focus crystal held in
      both hands during meditation, no elemental manifestation beyond
      a faint warmth or chill in the palms, uncertain gestures when
      attempting to channel
    npc: >-
      academy student practicing basic channeling forms, hands trembling
      with concentration, a wisp of elemental energy that flickers out
      immediately, ink-stained fingers from copying theory texts
  - level_range: [2, 2]
    label: conduit
    player: >-
      layered robes in their element's color with embroidered sigils at
      cuffs and collar, a focus crystal mounted on a short rod, faint
      elemental shimmer visible around the hands when concentrating —
      sparks, condensation, dust motes, or a breeze from nowhere,
      controlled gestures and steady breath
    npc: >-
      temple channeler in formal robes conducting elemental rituals,
      hands wreathed in stable elemental energy, performing practical
      work — heating forges, purifying water, enriching soil, calming
      winds
  - level_range: [3, 3]
    label: weaver
    player: >-
      fine silk robes with metallic thread tracing elemental circuit
      patterns, a staff crowned with a resonating crystal that hums
      with stored energy, ambient elemental aura visible without
      concentration — hair lifting in unfelt wind, condensation forming
      on skin, warmth radiating in a visible shimmer, small stones
      orbiting the feet
    npc: >-
      guild master channeler demonstrating complex elemental weaving to
      awestruck students, multiple elements responding simultaneously,
      the air around them alive with controlled power
  - level_range: [4, 4]
    label: tempest
    player: >-
      robes of rare fabric that reacts to elemental energy — rippling
      like water or edges trailing embers, a bonded staff that
      resonates with their heartbeat, permanent elemental manifestation
      — flames dancing on shoulders or ice crystallizing in their wake,
      elemental energy arcing between their fingers at rest
    npc: >-
      elemental master whose presence changes the weather in a room,
      robes flowing with contained power, speaking causes the element
      to echo — words that warm or chill or shake the floor
  - level_range: [5, 5]
    label: avatar
    player: >-
      the boundary between channeler and element dissolving — robes
      merging with elemental energy, body partially translucent with
      raw power flowing through it, a staff that exists between physical
      and pure energy, all four elements responding to emotion and
      intent, the serene devastation of a living elemental force

Martial Artist:
  - level_range: [1, 1]
    label: student
    player: >-
      cotton training wrap and loose trousers, bare feet on practice
      mats, fists wrapped in linen, a wooden bokken or bamboo staff
      for forms practice, sweat-soaked headband, bruises from sparring,
      stances still too wide and movements still too stiff
    npc: >-
      dojo junior sweeping floors and running drills, practicing the
      same strike a thousand times, wooden practice weapons, bowing
      to everyone senior
  - level_range: [2, 2]
    label: disciple
    player: >-
      fitted training robes in school colors with rank sash, bare feet
      calloused from a thousand forms, a forged steel weapon — proper
      sword or spear with simple fittings, stances that flow into each
      other without pause, knuckles permanently thickened from iron
      body training
    npc: >-
      traveling martial artist in road-worn school robes, weapon
      wrapped in cloth across the back, challenges dojos in each
      town to test their art, eats little and trains constantly
  - level_range: [3, 3]
    label: adept
    player: >-
      silk robes that move like extensions of the body during forms,
      a quality weapon whose blade catches light differently — faint
      elemental resonance in the steel, bare feet that grip any surface,
      movements blurring at combat speed, faint elemental energy
      trailing strikes — fire sparks or wind cuts or stone-heavy impacts
    npc: >-
      school instructor demonstrating techniques that students cannot
      follow with their eyes, weapon forms that incorporate elemental
      channeling, a body that is itself a perfected weapon
  - level_range: [4, 4]
    label: master
    player: >-
      robes of exceptional craft that are part uniform part weapon —
      weighted hems and reinforced sleeves, a signature weapon famous
      in the region, bare feet leaving elemental traces with each step,
      combat movement that transcends technique into art, strikes that
      channel elements through flesh and steel simultaneously
    npc: >-
      legendary fighter whose school is a pilgrimage destination,
      movements that seem slow until you realize three strikes have
      already landed, a weapon bonded to their spirit, students who
      would die at a word
  - level_range: [5, 5]
    label: sage fist
    player: >-
      simple robes that belie a body transcending physical limits,
      weapon and body and element unified — strikes that are part flesh
      part fire part wind, movement that seems to fold space, elemental
      energy woven into every breath and gesture, the terrible calm
      of perfected violence held in absolute stillness

Spirit Medium:
  - level_range: [1, 1]
    label: sensitive
    player: >-
      white mourning robes with a thin grey sash, prayer beads of bone
      and wood, a paper talisman tucked in the collar, pale complexion
      from too much time in dark shrines, eyes that unfocus when spirits
      are near, the distracted manner of someone listening to voices
      others cannot hear
    npc: >-
      village shrine keeper burning incense for the dead, startles at
      things no one else sees, leaves offerings at crossroads, the
      locals bring her questions for their ancestors
  - level_range: [2, 2]
    label: medium
    player: >-
      formal spirit-caller robes in white and grey with protective sigils,
      a spirit bell and paper talismans in a leather case, prayer beads
      that click with unseen movement, eyes that flash white when
      channeling the dead, the steady voice of someone who speaks for
      those beyond the veil
    npc: >-
      temple spirit caller conducting ceremonies in full ritual dress,
      incense smoke that moves against the breeze, speaking in voices
      not their own, ancestors attending like invisible courtiers
  - level_range: [3, 3]
    label: oracle
    player: >-
      layered ceremonial robes with spirit-script embroidery that shifts
      when not watched directly, a ritual staff hung with spirit chimes
      that ring in still air, talismans of increasing power bound to
      the sash, eyes permanently touched with white — the dead leave
      their mark on those who speak for them
    npc: >-
      renowned spirit oracle whose shrine draws pilgrims, surrounded by
      visible spirit phenomena — cold spots, flickering candles, whispered
      voices, speaks prophecy that later proves accurate
  - level_range: [4, 4]
    label: revenant caller
    player: >-
      ancient ceremonial robes of white silk that move in a spectral
      wind, a staff bound with spirit chains that glow faintly, visible
      spirit companions hovering at the edges of perception, eyes fully
      white during communion, hair lifting as if underwater, the boundary
      between living and dead blurring around their presence
    npc: >-
      legendary medium who walks between worlds — spirits visible in
      their wake as heat shimmer, speaking simultaneously to the living
      and the dead, age indeterminate, alive but not entirely here
  - level_range: [5, 5]
    label: threshold keeper
    player: >-
      robes that exist in both the spirit realm and the physical — fabric
      shifting between solid and translucent, a spirit host visible
      attending like a court, eyes that see past and future simultaneously,
      the uncanny grace of someone who has one foot beyond death and
      finds it comfortable there

Scholar:
  - level_range: [1, 1]
    label: scribe
    player: >-
      cotton robes with deep pockets for brushes and ink, a satchel of
      scrolls and a portable writing desk, ink stains on fingers and
      cuffs, reading spectacles perched on the nose, a small reference
      book open in one hand at all times, the squinting focus of someone
      who learns by writing everything down
    npc: >-
      academy clerk copying texts in a scriptorium, surrounded by
      stacked scrolls, knows facts about everything and practical skills
      about nothing, flinches at loud noises
  - level_range: [2, 2]
    label: researcher
    player: >-
      scholarly robes with university insignia and rank pins, a leather
      journal filled with field notes and diagrams, specialized tools —
      compass, measuring cord, sample jars, reading spectacles with
      multiple flip-down lenses, the excited energy of someone who
      just noticed something nobody else has
    npc: >-
      field researcher from the academy cataloging elemental phenomena,
      measuring instruments and journals spread on a folding table,
      too absorbed in data to notice danger
  - level_range: [3, 3]
    label: sage
    player: >-
      fine robes marking academic rank with multiple specialty sashes,
      a journal that cross-references itself through an elegant indexing
      system, specialized instruments of their own design, elemental
      knowledge so deep they can predict reactions before they happen,
      the quiet confidence of expertise earned through obsessive study
    npc: >-
      academy professor lecturing from memory on elemental theory,
      instruments that are themselves minor inventions, students
      hanging on every word, consulted by channelers on technique
  - level_range: [4, 4]
    label: luminary
    player: >-
      academic robes of distinction worn like armor — knowledge is
      their protection, a masterwork journal containing original
      theoretical breakthroughs, instruments that reveal elemental
      flows invisible to others, the piercing gaze of someone who
      understands how the elements work better than those who wield them
    npc: >-
      legendary scholar whose published works changed how elements are
      understood, surrounded by prototypes and proofs, the academy
      named a wing after them while still alive
  - level_range: [5, 5]
    label: grand theorist
    player: >-
      simple robes of a mind that has transcended status markers,
      a single journal containing the unified theory they have spent
      their life pursuing, the ability to see and map elemental flows
      with naked eyes, speaking about harmony with the authority of
      someone who has finally understood it completely

Wanderer:
  - level_range: [1, 1]
    label: drifter
    player: >-
      travel-worn clothing from multiple regions — a Jade Kingdoms coat
      over Tide Reaches trousers, a walking staff and a pack containing
      everything they own, road dust on the shoulders, a map with more
      unknown territory than known, the restless eyes of someone who
      cannot stay in one place
    npc: >-
      traveling stranger at the inn asking about the road ahead, a
      pack and a staff and nothing else, stories from distant places
      told in exchange for a meal, gone by morning
  - level_range: [2, 2]
    label: wayfarer
    player: >-
      eclectic traveling gear combining practical elements from every
      region visited — layered for any climate, a weapon picked up along
      the way and kept because it works, a journal of maps and contacts,
      road-hardened body and sun-lined face, the easy confidence of
      someone who has been lost enough times to always find the way
    npc: >-
      professional guide or messenger who knows every pass and shortcut,
      multiple regional travel papers, a weapon for each terrain type,
      hired by those who need to go where roads don't
  - level_range: [3, 3]
    label: pathwalker
    player: >-
      masterwork travel gear that incorporates the best innovations from
      every culture — armor that breathes in heat and insulates in cold,
      a versatile weapon adapted for any opponent, boots that have crossed
      every terrain type and survived, a network of contacts in every
      major settlement, the calm adaptability of someone at home everywhere
    npc: >-
      legendary explorer returned from regions others claim don't exist,
      gear incorporating materials no one in town recognizes, a map of
      places the academy disputes, trusted by every faction for neutrality
  - level_range: [4, 4]
    label: horizon walker
    player: >-
      travel gear that is an archive of journeys — each piece from a
      different land and carrying its own story, a weapon given by a
      grateful community along the way, elemental adaptations learned
      from exposure to every climate, the encyclopedic knowledge of
      someone who has walked further than anyone living
    npc: >-
      wanderer whose name appears in the histories of settlements
      separated by months of travel, brings word between isolated
      communities, a living legend of the open road
  - level_range: [5, 5]
    label: eternal pilgrim
    player: >-
      clothing and gear that seems to carry the essence of every place
      visited — desert sand in the hem, mountain frost on the collar,
      forest green in the weave, a staff worn smooth by every road in
      the known world, the profound peace of someone who has walked
      far enough to find what they were looking for

Guardian:
  - level_range: [1, 1]
    label: shield-bearer
    player: >-
      basic lacquered armor in a protective order's colors, a heavy
      shield and a simple spear or sword, a ward talisman pinned to the
      chest plate, stance planted and defensive, the earnest determination
      of someone who has sworn to stand between danger and those behind
    npc: >-
      temple guard in standard-issue armor at the shrine entrance, shield
      up and spear ready, a ward against evil pinned inside the helm,
      protecting the threshold with more courage than skill
  - level_range: [2, 2]
    label: warden
    player: >-
      reinforced armor with ward sigils lacquered onto the plates, a
      sturdy shield that has blocked real blows, a weapon blessed at
      ordination, an amulet of protection that warms during danger,
      the rooted stance of someone who does not step back
    npc: >-
      caravan guardian in practical ward-inscribed armor, shield scarred
      from defending charges, a reputation for bringing people home alive,
      sleeps facing the door
  - level_range: [3, 3]
    label: bulwark
    player: >-
      heavy armor with complex ward patterns that glow faintly under
      threat, a tower shield inscribed with protective elemental sigils,
      a weapon consecrated to defense — a sword that deflects as well
      as strikes, elemental energy reinforcing armor at the moment of
      impact, visible shimmering barrier around those they protect
    npc: >-
      fortress guardian whose ward zone is visible as a shimmer in the
      air, armor so heavily inscribed it hums, has held positions that
      should have been overrun, the immovable center of any defense
  - level_range: [4, 4]
    label: aegis
    player: >-
      masterwork ward-armor that is itself a protective artifact — plates
      resonating with layered elemental barriers, a legendary shield
      that projects force beyond its physical edge, weapon and shield
      working as a unified defensive system, elemental barriers springing
      up at will around allies nearby
    npc: >-
      legendary guardian whose very presence is a shield — elemental
      barriers manifesting unconsciously, armor that has turned blows
      from legendary weapons, a name that means safety in every language
  - level_range: [5, 5]
    label: living fortress
    player: >-
      armor that has merged with elemental protective energy — plates
      and barriers indistinguishable, a shield that is more force wall
      than physical object, the ability to extend protection across
      a battlefield, the absolute immovability of someone who has become
      the concept of shelter made flesh
