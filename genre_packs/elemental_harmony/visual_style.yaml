# Visual style configuration for elemental harmony genre pack
#
# Controls how Flux image generation renders scenes for this genre.
# Elemental harmony visual identity: traditional East Asian ink wash
# painting (sumi-e) with ukiyo-e woodblock print composition. Bold
# black ink strokes on textured rice paper, deliberate negative space,
# controlled ink gradation from deep black to pale grey wash. Color
# accents are limited and intentional — vermillion red, indigo blue,
# mineral green, gold leaf — applied as woodblock overprint layers.
# Composition follows classical scroll painting principles: vertical
# depth, atmospheric perspective through ink density, and the tension
# between precise calligraphic strokes and loose wet-on-wet washes.

# ── Core Style ────────────────────────────────────────────────

positive_suffix: >-
  sumi-e ink wash painting on textured rice paper, bold black ink
  strokes with controlled gradation, ukiyo-e woodblock print
  composition, deliberate negative space, limited color accents of
  vermillion and indigo as woodblock overprint, atmospheric
  perspective through ink density, visible paper grain

negative_prompt: >-
  photorealistic, western medieval fantasy, plate armor, gothic,
  dark gritty, horror, cyberpunk, neon, anime cel-shading, cartoon,
  3d render, photograph, airbrushed, digital painting, smooth
  gradients, high saturation, flat even lighting

preferred_model: flux

base_seed: 42

# ── Location Tag Overrides ────────────────────────────────────

visual_tag_overrides:
  temple: >-
    mountain monastery rendered in layered ink washes, curved tile
    roofs defined by single confident brush strokes, incense smoke
    as pale grey wash dissolving into paper white, cedar columns
    in dry brush texture, prayer flags as vermillion accents against
    misty negative space
  shrine: >-
    roadside shrine in spare sumi-e composition, weathered stone
    torii gate in bold dark ink, sacred rope as single calligraphic
    line, bamboo grove suggested by vertical strokes of varying
    density, offerings of fruit as small vermillion woodblock accents
  forest: >-
    ancient forest in classical landscape scroll style, massive
    camphor trees built from layered ink washes darkest at trunk,
    dappled light as untouched paper between canopy strokes,
    mossy roots in wet-on-wet green-grey wash, mist as bare paper
  city: >-
    tiered mountain city in ukiyo-e perspective, pagoda rooftops
    as precise geometric ink lines, colored lanterns as scattered
    vermillion and gold dots, market streets bustling with small
    figures in flowing robes, bridges in bold arch strokes over
    pale wash canals
  village: >-
    farming village in pastoral sumi-e, thatched roofs as quick
    textured strokes, terraced paddies as horizontal wash bands
    graduating from pale green to deep ink at the treeline, small
    figures with conical hats, distant mountains fading into paper
  mountain: >-
    dramatic peak in classical Chinese mountain painting tradition,
    bold vertical rock faces with axe-cut texture strokes, cloud
    banks as untouched paper between ink masses, tiny figures on
    a carved stairway for scale, prayer flags as thread-thin
    vermillion lines between pinnacles
  river: >-
    wide river scene in horizontal scroll composition, traditional
    boats rendered with minimal precise strokes, willow branches
    as flowing calligraphic lines trailing into current wash,
    stone bridge with carved details in fine dry brush, morning
    mist rising as pale grey gradation
  crater: >-
    ancient impact crater rendered in dramatic ink contrast, warped
    rock formations radiating outward in bold fractured strokes,
    faint elemental glow as subtle wash tint from deep fissures,
    scorched earth in heavy dry brush transitioning to delicate
    regrowth strokes at the rim, pilgrimage markers as ink dots
  tower: >-
    tall pagoda rising above forest canopy in vertical composition,
    each floor defined by precise architectural linework with
    elemental motifs in woodblock color — vermillion fire, indigo
    water, mineral green earth, silver-grey wind — observation
    balcony as fine detail against broad sky wash
  ruins: >-
    overgrown ruins in melancholy sumi-e, collapsed walls rendered
    in broken fragmented strokes suggesting decay, vine overgrowth
    as wild spontaneous ink marks, courtyard fountain as circular
    wash, faded murals suggested by ghost-pale undertones beneath
    darker weathering strokes
  battlefield: >-
    scarred plain in stark high-contrast ink, glass craters as
    sharp white negative space ringed by dense black ink, frozen
    wave formations in dynamic curved strokes, upthrust stone
    pillars as bold vertical marks, memorial cairns as small
    careful stacked forms, desolate sky as bare paper
  market: >-
    open-air bazaar in lively ukiyo-e style with many small
    figures, colored silk canopies as woodblock overprint in
    warm tones, stalls rendered with quick structural strokes,
    calligraphy brush sellers with visible text samples, tea house
    with sliding screens as clean geometric lines
  cave: >-
    crystal cavern rendered in dramatic ink contrast, deep black
    cave walls framing luminous interior space as untouched paper,
    geode formations as delicate crystalline linework, underground
    pool as smooth pale wash with subtle reflection, ancient wall
    carvings as fine incised marks in the ink
  outpost: >-
    fortified waystation in spare brushwork, wooden palisade as
    rough vertical dry brush strokes, watch fires as vermillion
    accent points, supply depot suggested by minimal geometric
    forms, hardy ponies in fluid calligraphic animal strokes,
    mountain pass wind as sweeping grey wash lines
  monument: >-
    massive stone obelisk dominating the composition in bold dark
    ink, four faces each bearing elemental symbols in woodblock
    color — vermillion, indigo, green, gold — offerings at base
    as small detailed still life, lichen as spattered ink texture,
    weather-worn inscription in fading grey brush

