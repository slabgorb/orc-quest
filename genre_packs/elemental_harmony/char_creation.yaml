- id: origins
  title: "Where the Wind Carried You"
  narration: >-
    The world is shaped by four elements, and every person carries one
    in their heart — even those who cannot channel. Where were you born,
    and which element first answered your call?
  choices:
    - label: "The Ember Isles"
      description: "Volcanic islands of fire and steel. Discipline is survival. Your channeling burns."
      mechanical_effects:
        race_hint: Ember Isles
        class_hint: Channeler
    - label: "The Jade Kingdoms"
      description: "A vast empire of stone and patience. Your channeling endures."
      mechanical_effects:
        race_hint: Jade Kingdoms
        class_hint: Channeler
    - label: "The Tide Reaches"
      description: "Islands and coastlines where the ocean is teacher, healer, and destroyer."
      mechanical_effects:
        race_hint: Tide Reaches
        class_hint: Channeler
    - label: "The Sky Temples"
      description: "Mountain monasteries above the clouds. Freedom is your element."
      mechanical_effects:
        race_hint: Sky Temples
        class_hint: Channeler
    - label: "The Iron Peaks"
      description: "Mountain fortresses where martial discipline is forged in cold and stone."
      mechanical_effects:
        race_hint: Iron Peaks
        class_hint: Martial Artist
    - label: "The Monsoon Courts"
      description: "Jungle river kingdoms where spirits walk among mortals and the canopy hides ancient secrets."
      mechanical_effects:
        race_hint: Monsoon Courts
        class_hint: Spirit Medium
    - label: "The Lotus Provinces"
      description: "Coastal trading cities where knowledge flows like water and every merchant is a scholar."
      mechanical_effects:
        race_hint: Lotus Provinces
        class_hint: Scholar
    - label: "The Saffron Reaches"
      description: "Temple cities on golden plains where the boundary between world and spirit is thinnest."
      mechanical_effects:
        race_hint: Saffron Reaches
        class_hint: Spirit Medium

- id: element
  title: "Your Element"
  narration: >-
    Every channeler has an affinity — the element that resonates with
    their spirit. Some discover it young, in a moment of emotion or
    danger. Others train for years before the connection ignites.
    What calls to you?
  choices:
    - label: "Fire"
      description: "Will. Ambition. The drive to create and destroy. Your forms are aggressive, explosive, forward."
      mechanical_effects:
        affinity_hint: Fire
    - label: "Earth"
      description: "Endurance. Truth. The stubbornness that holds the world together. Your forms are rooted, immovable, patient."
      mechanical_effects:
        affinity_hint: Earth
    - label: "Water"
      description: "Adaptation. Healing. The patience that wears mountains to sand. Your forms flow, redirect, transform."
      mechanical_effects:
        affinity_hint: Water
    - label: "Air"
      description: "Freedom. Wisdom. The breath between thoughts. Your forms evade, deflect, and turn force against itself."
      mechanical_effects:
        affinity_hint: Air
    - label: "Spirit"
      description: "The connection between worlds. You see what others cannot. Your power is not of the elements but of the space between them."
      mechanical_effects:
        affinity_hint: Spirit
    - label: "None"
      description: "You do not channel. Your power is your body, your mind, your will. And that is enough."
      mechanical_effects:
        affinity_hint: none

- id: path
  title: "Your Path"
  narration: >-
    A channeler's path determines how they develop. Some train in
    schools. Some learn from wandering masters. Some are self-taught,
    their power shaped by necessity and instinct.
  choices:
    - label: "Temple-Trained"
      description: "Years of disciplined study. Your forms are precise. Your understanding is deep. Your patience was earned."
      mechanical_effects:
        training_hint: formal
    - label: "Street-Learned"
      description: "You learned to channel to survive. Your forms are rough, improvised, effective. Theory is for people with time."
      mechanical_effects:
        training_hint: street
    - label: "Master's Student"
      description: "A single teacher shaped everything you know. Their philosophy is your foundation."
      mechanical_effects:
        training_hint: apprentice
    - label: "Spirit-Awakened"
      description: "Your channeling woke itself — in a crisis, a dream, a moment of profound emotion. You're still figuring it out."
      mechanical_effects:
        training_hint: awakened

- id: confirmation
  title: "The Road Begins"
  narration: >-
    The wind shifts. The earth hums. The water remembers. The fire knows
    your name. You are part of the balance now — for better or worse.
    What do they call you?
  choices: []
