creature_voice_presets:
  ai_entity:
    creature_type: ai
    description: "Clean, precise, slightly reverbed — like a voice in an empty server room"
    pitch: 1.0
    rate: 0.9
    effects:
      - type: reverb
        params:
          room_size: 0.6

mixer:
  music_volume: 0.4
  sfx_volume: 0.7
  voice_volume: 1.0
  duck_music_for_voice: true
  duck_amount_db: -12.0
  crossfade_default_ms: 3000

ai_generation:
  enabled: true
  model: musicgen_small
  max_generation_time_s: 15
  cache_generated: true
