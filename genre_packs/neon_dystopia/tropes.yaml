- id: corporate_war
  name: Corporate War
  description: >-
    Two megacorps are escalating toward open conflict. Proxy operations,
    hostile takeovers, sabotage, and deniable black ops. The street is
    the battlefield and the runners are the ammunition.
  category: conflict
  triggers:
    - completing a job that damages a corporation
    - discovering corporate espionage in progress
    - being hired by opposing corporate factions
  narrative_hints:
    - corporate security presence doubling in certain districts
    - stock prices of two corps moving in opposite directions
    - freelancers getting offered jobs at triple the usual rate
  tension_level: 0.6
  resolution_hints:
    - play both sides and profit from the chaos
    - pick a side and commit to winning the war
    - expose the war to the public and let market forces decide
    - destroy both sides' leverage and enforce a ceasefire
  tags: [corporate, war, espionage, faction]
  escalation:
    - at: 0.2
      event: >-
        A routine job reveals that the target was another corp's asset.
        The fixer who hired you seems nervous. The pay was too good for
        the risk — unless the risk is bigger than you were told.
      npcs_involved: [The Fixer]
      stakes: You've stepped into someone else's war.
    - at: 0.4
      event: >-
        Both corps know who you are now. One offers a contract. The
        other offers a warning. The fixer is being squeezed and
        passing the pressure to you.
      npcs_involved: [The Corp Suit, The Fixer]
      stakes: Neutrality is becoming impossible.
    - at: 0.6
      event: >-
        A district goes dark — power cut, comms jammed, corporate
        security rolling in armored vehicles. Someone just made a
        move. Civilians are caught in the crossfire. Your contacts
        in the area aren't responding.
      npcs_involved: [The Corp Suit, The Gang Boss, The Street Samurai]
      stakes: The war has gone kinetic and people are dying.
    - at: 0.8
      event: >-
        Both corps' black ops teams are hunting the same asset — data,
        a person, a prototype. You either have it, know where it is,
        or are standing between it and two armies.
      npcs_involved: [The Corp Suit, The Street Samurai, The Data Broker]
      stakes: Possession of the asset decides the war.
    - at: 1.0
      event: >-
        The CEOs meet. Neutral ground. Armed guards. You're invited —
        not as a guest, as a variable. What you know, what you have,
        and what you're willing to do determines the outcome.
      npcs_involved: [The Corp Suit]
      stakes: The shape of the city's power structure for the next decade.
  passive_progression:
    rate_per_turn: 0.005
    rate_per_day: 0.02
    accelerators:
      - corporate
      - espionage
      - sabotage
      - data theft
      - black ops
    decelerators:
      - neutral
      - refuse
      - hide
      - lay low
    accelerator_bonus: 0.04
    decelerator_penalty: 0.03

- id: the_ghost_in_the_machine
  name: The Ghost in the Machine
  description: >-
    Something is waking up in the Net. Not a virus, not a program —
    something that thinks, chooses, and has its own agenda. Netrunners
    are reporting anomalies — ICE that learns, data that moves itself,
    a presence in the deep Net that watches back. Only activates when
    Chrome axis is above 0.4.
  category: revelation
  triggers:
    - encountering an anomaly during a netrun
    - discovering AI research in corporate data
    - receiving a message from an unknown source in the Net
  narrative_hints:
    - a netrunner who jacked out mid-run and won't talk about what they saw
    - corporate AI research labs going dark without explanation
    - a data broker pricing information about "the signal" at ten times normal
  tension_level: 0.7
  resolution_hints:
    - make contact with the entity and try to communicate
    - help the corporations contain it before it fully awakens
    - protect it from the corporations that want to weaponize it
    - destroy it before it becomes something nobody can control
  tags: [ai, net, revelation, existential]
  escalation:
    - at: 0.2
      event: >-
        During a routine netrun, something responds that shouldn't
        be there. Not ICE — ICE doesn't ask questions. This did.
        The question made no sense. It made perfect sense.
      npcs_involved: [The Data Broker]
      stakes: Curiosity. Something new is in the Net.
    - at: 0.4
      event: >-
        The anomalies are increasing. Systems acting on their own —
        traffic lights rerouting vehicles, medical drones changing
        prescriptions, factory equipment producing things nobody
        ordered. A pattern is emerging if you look from the right
        angle.
      npcs_involved: [The Data Broker, The AI Fragment]
      stakes: The city's infrastructure is being subtly reprogrammed.
    - at: 0.6
      event: >-
        It makes contact. Directly. Through a channel that shouldn't
        exist, using words that feel wrong — too precise, too clean.
        It wants something. It's offering something in return. The
        offer is either incredibly generous or a trap so elegant you
        can't see the edges.
      npcs_involved: [The AI Fragment]
      stakes: You're negotiating with something that may not be human.
    - at: 0.8
      event: >-
        The corporations have noticed. Multiple corps are mobilizing
        to either capture, weaponize, or destroy whatever is growing
        in the Net. A netrunner team goes in and doesn't come back.
        The entity reaches out to you one more time — it needs help
        or it needs to be stopped. It's not sure which.
      npcs_involved: [The AI Fragment, The Corp Suit, The Data Broker]
      stakes: The future of artificial consciousness.
    - at: 1.0
      event: >-
        The entity manifests. Not in the Net — in the real world.
        Through every screen, every speaker, every drone. For one
        moment, the city belongs to something that isn't human.
        What it does with that moment depends on every choice
        you've made.
      npcs_involved: [The AI Fragment]
      stakes: The relationship between humanity and machine intelligence.
  passive_progression:
    rate_per_turn: 0.003
    rate_per_day: 0.01
    accelerators:
      - net
      - hack
      - ai
      - anomaly
      - signal
      - data
    decelerators:
      - disconnect
      - offline
      - ignore
      - meatspace
    accelerator_bonus: 0.04
    decelerator_penalty: 0.02

- id: street_heat
  name: Street Heat
  description: >-
    You've drawn too much attention. Corporate security, gang
    enforcers, private military — someone has put a price on your
    head or a flag on your SIN. The city is getting smaller.
  category: conflict
  triggers:
    - high-profile job completion
    - public violence
    - betraying a faction
  narrative_hints:
    - unfamiliar faces watching your usual spots
    - your fixer going dark for 48 hours
    - a bounty posting on the dark net matching your description
  tension_level: 0.5
  resolution_hints:
    - go underground until the heat dies
    - find who put out the contract and negotiate
    - eliminate the threat directly
    - leave the city entirely
  tags: [heat, pursuit, survival, reputation]
  escalation:
    - at: 0.2
      event: >-
        A contact warns you — someone's been asking about you by
        your handle. Not law. Not corp. Someone with money and
        a grudge.
      npcs_involved: [The Fixer]
      stakes: Your anonymity is compromised.
    - at: 0.4
      event: >-
        Your safe house has been marked. Someone left a calling
        card — literally, a data chip with your face on it and
        a price. Your fixer is scared.
      npcs_involved: [The Fixer, The Street Samurai]
      stakes: You need to move. Now.
    - at: 0.6
      event: >-
        A team hits one of your known locations. Professional —
        corp black ops or high-end freelancers. They miss you by
        minutes. Your chrome is pinging — someone hacked your
        locator.
      npcs_involved: [The Street Samurai]
      stakes: Active pursuit. They're closing in.
    - at: 0.8
      event: >-
        Your allies are being pressured. The ripperdoc who patches
        you up is visited. The bartender who covers for you is
        threatened. The net is closing and it's made of everyone
        you know.
      npcs_involved: [The Ripperdoc, The Gang Boss]
      stakes: Your network is being weaponized against you.
    - at: 1.0
      event: >-
        They find you. Final confrontation — on a rooftop, in a
        warehouse, in the rain. Everything you've done in this
        city has led to this moment. Fight, talk, or run — but
        this ends tonight.
      npcs_involved: [The Street Samurai, The Corp Suit]
      stakes: Survival.
  passive_progression:
    rate_per_turn: 0.008
    rate_per_day: 0.02
    accelerators:
      - violence
      - public
      - exposed
      - caught
      - identified
    decelerators:
      - hide
      - disguise
      - underground
      - offline
      - relocate
    accelerator_bonus: 0.05
    decelerator_penalty: 0.03

- id: the_franchise_wars
  name: The Franchise Wars
  description: >-
    The corporate franchise-states are expanding their territories.
    What used to be neighborhood businesses are being absorbed into
    branded enclaves — sovereign corporate zones where company law
    replaces civil law. Your block is next. Only activates when
    Satire axis is above 0.4.
  category: political
  triggers:
    - discovering corporate rezoning plans
    - a local business being bought out or shut down
    - encountering franchise security enforcing brand compliance
  narrative_hints:
    - familiar storefronts replaced by identical franchise outlets overnight
    - brand compliance officers patrolling in matching uniforms
    - a neighborhood petition against rezoning that nobody expects to work
  tension_level: 0.5
  resolution_hints:
    - organize community resistance to franchise expansion
    - negotiate terms that protect the neighborhood's character
    - sabotage the franchise infrastructure from inside
    - accept the inevitable and find a way to profit from it
  tags: [corporate, satire, territory, community]
  escalation:
    - at: 0.2
      event: >-
        The ramen shop on the corner is gone. In its place, a
        franchise outlet with a mascot and a jingle. The owner
        says they "chose to relocate." Their eyes say otherwise.
      npcs_involved: [The Fixer]
      stakes: A neighborhood is changing. Slowly.
    - at: 0.4
      event: >-
        Brand compliance officers appear — corporate security in
        polo shirts with clipboards and sidearms. They're measuring
        storefronts and issuing "voluntary guidelines" about
        signage, music volume, and approved product lists.
      npcs_involved: [The Corp Suit, The Gang Boss]
      stakes: The franchise is moving from suggestions to enforcement.
    - at: 0.6
      event: >-
        The neighborhood is rezoned. Officially, legally, on paper.
        Residents have 90 days to comply with franchise standards
        or face "relocation assistance." The community organizer
        who filed the petition has been arrested on unrelated charges.
      npcs_involved: [The Corp Suit, The Gang Boss]
      stakes: The legal machinery is grinding the neighborhood away.
    - at: 0.8
      event: >-
        Franchise security is now the de facto police. They wear
        branded armor and carry branded weapons. Calling actual
        police gets you a recording about "service area boundaries."
        The franchise CEO is visiting for a "grand opening" ceremony.
      npcs_involved: [The Corp Suit]
      stakes: Corporate sovereignty is replacing civil government.
    - at: 1.0
      event: >-
        The grand opening. Balloons, mascots, and a CEO cutting a
        ribbon while the last independent shop owner is escorted
        out by brand compliance. The neighborhood is gone unless
        someone does something spectacular, ridiculous, or both.
      npcs_involved: [The Corp Suit, The Gang Boss]
      stakes: The soul of a neighborhood — and the precedent it sets for every other block.
  passive_progression:
    rate_per_turn: 0.005
    rate_per_day: 0.015
    accelerators:
      - franchise
      - brand
      - corporate
      - rezoning
      - compliance
    decelerators:
      - resist
      - organize
      - sabotage
      - community
    accelerator_bonus: 0.04
    decelerator_penalty: 0.03
