affinities:
  - name: "Chrome"
    description: "Cyberware mastery, body augmentation, pushing hardware past its limits"
    triggers:
      - "using cyberware in a critical moment"
      - "surviving chrome damage and getting repaired"
      - "pushing augmentation beyond rated specs"
      - "integrating new cyberware successfully"
      - "maintaining humanity while heavily augmented"
    tier_thresholds: [5, 12, 25]

  - name: "Neon"
    description: "Street knowledge, reputation, navigating the city's social ecosystem"
    triggers:
      - "completing a job for a fixer"
      - "earning respect from a gang or faction"
      - "navigating a dangerous social situation"
      - "knowing the right person at the right time"
      - "surviving a betrayal without losing your network"
    tier_thresholds: [5, 12, 25]

  - name: "Ghost"
    description: "Stealth, infiltration, being invisible to systems and people"
    triggers:
      - "infiltrating a secure location undetected"
      - "evading pursuit or surveillance"
      - "operating without leaving digital traces"
      - "disappearing when someone is looking for you"
      - "stealing something without anyone knowing it's gone"
    tier_thresholds: [5, 12, 25]

  - name: "Wire"
    description: "Net skills, hacking, cyberspace navigation, digital warfare"
    triggers:
      - "breaching corporate ICE"
      - "extracting data from a secure system"
      - "quickhacking an enemy in combat"
      - "navigating dangerous cyberspace architecture"
      - "communicating with or manipulating AI entities"
    tier_thresholds: [5, 12, 25]

  - name: "Iron"
    description: "Combat prowess, tactical thinking, surviving violence"
    triggers:
      - "winning a firefight or melee encounter"
      - "protecting someone during combat"
      - "using the environment as a weapon"
      - "surviving against superior numbers"
      - "making a tactical decision that changes the fight"
    tier_thresholds: [5, 12, 25]

  - name: "Edge"
    description: "Luck, instinct, the ability to find the angle nobody else sees"
    triggers:
      - "succeeding when the odds were against you"
      - "noticing something everyone else missed"
      - "making a desperate gamble that pays off"
      - "turning a bad situation around through sheer nerve"
      - "being in the right place at the right time"
    tier_thresholds: [5, 12, 25]

milestone_categories:
  - "survival"
  - "defiance"
  - "connection"
  - "discovery"
  - "transcendence"

milestones_per_level: 3
max_level: 10

wealth_tiers:
  - max_gold: 10
    label: "Flatline"
  - max_gold: 50
    label: "Scraping By"
  - max_gold: 150
    label: "Working"
  - max_gold: 400
    label: "Comfortable"
  - max_gold: 1000
    label: "Connected"
  - max_gold: null
    label: "Corporate"
