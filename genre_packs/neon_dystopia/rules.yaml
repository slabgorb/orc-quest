stat_generation: point_buy
point_buy_budget: 27
magic_level: none

ability_score_names:
  - Body
  - Reflex
  - Tech
  - Net
  - Cool
  - Edge

allowed_classes:
  - Netrunner
  - Solo
  - Fixer
  - Tech
  - Nomad
  - Face
  - Ghost

allowed_races:
  - Corporate
  - Street
  - Nomad Clan
  - Synthetic
  - Augmented
  - SINless

hp_formula: "class_base + (body_mod * level)"

stat_display_fields:
  - hp
  - max_hp
  - armor

class_hp_bases:
  Netrunner: 6
  Solo: 12
  Fixer: 8
  Tech: 8
  Nomad: 10
  Face: 6
  Ghost: 8

default_class: Solo
default_race: Street
default_hp: 12
default_ac: 10
default_location: "A coffin hotel in the lower levels of the megacity"
default_time_of_day: night

custom_rules:
  lethality: moderate
  injury_system: temporary
  rest_variant: standard
  encumbrance: none
  humanity_tracker: >-
    Every piece of cyberware installed costs Humanity. Start at 100.
    Minor implants cost 5-10. Major chrome costs 15-25. Full limb
    replacement costs 30. At 50 Humanity, NPCs notice something off
    about you — you move wrong, your eyes don't track naturally. At
    25, you're more machine than meat and social interactions suffer
    mechanical penalties. At 0, cyberpsychosis — the character becomes
    an NPC. Humanity can be restored slowly through genuine human
    connection, but the chrome doesn't come out easy.
  street_cred: >-
    Reputation on the street. Starts at 0, grows through completed
    jobs, displayed competence, and word of mouth. High Street Cred
    opens doors — fixers offer better jobs, gangs respect you, corps
    fear you. Negative Street Cred means nobody will work with you.
    Different factions track your rep independently.
  net_combat: >-
    Cyberspace encounters are narrative, not technical. When a
    Netrunner jacks in, describe the virtual architecture as
    physical space — ice walls, data streams, guardian programs
    as creatures. Net combat uses Net stat instead of Body/Reflex.
    Never ask players to solve technical puzzles — the character
    is the expert, not the player.

encounter_base_tension:
  random: 0.10
  ambush: 0.30
  boss: 0.40
  final: 0.50
