- name: The Fixer
  description: >-
    The person who connects jobs to people and people to jobs. Knows
    everyone, has everyone's number, and takes a cut of everything.
    Never does the work themselves — that's what you're for.
  personality_traits:
    - transactional
    - well-connected
    - carefully neutral
  typical_classes:
    - Fixer
  typical_races:
    - Street
    - Corporate
  stat_ranges:
    Cool: [16, 18]
    Net: [12, 14]
  inventory_hints:
    - encrypted phone with 200 contacts
    - a smile that doesn't reach their eyes
    - a tab at every bar in the district
  dialogue_quirks:
    - never names the client — always "my associate" or "a friend"
    - quotes the price before you finish describing the job
  disposition_default: 10

- name: The Corp Suit
  description: >-
    Mid-level corporate executive who exists in the space between
    boardroom and black ops. Polished, ruthless, and terrified of
    the people above them. Uses freelancers for deniable work.
  personality_traits:
    - calculating
    - image-obsessed
    - quietly desperate
  typical_classes:
    - Face
  typical_races:
    - Corporate
  stat_ranges:
    Cool: [14, 18]
    Edge: [12, 14]
  inventory_hints:
    - designer suit with ballistic weave
    - corporate ID with clearance levels they shouldn't have
    - a burner phone for conversations that don't exist
  dialogue_quirks:
    - uses corporate jargon as a weapon — "let's action this" means "do it or else"
    - checks their phone mid-conversation as a power move
  disposition_default: -5

- name: The Ripperdoc
  description: >-
    Back-alley cyberware installer — part surgeon, part mechanic,
    part artist. Operates out of a clinic that ranges from sterile
    to terrifying depending on the neighborhood. The only person
    you trust to open you up and put something new inside.
  personality_traits:
    - meticulous
    - morally flexible
    - genuinely cares about craftsmanship
  typical_classes:
    - Tech
  typical_races:
    - Street
    - Augmented
  stat_ranges:
    Tech: [16, 18]
    Body: [10, 12]
  inventory_hints:
    - surgical tools that would make a hospital jealous
    - a jar of something you don't want to ask about
    - a menu of cyberware with prices in cash only
  dialogue_quirks:
    - describes chrome installation the way a chef describes a signature dish
    - taps their own augmented fingers on the operating table while thinking
  disposition_default: 10

- name: The Street Samurai
  description: >-
    Chrome-loaded combat specialist who lives by a code — not always
    a moral one, but a code. Hired muscle with standards. The kind
    of person who'll kill you clean but won't torture you for free.
  personality_traits:
    - disciplined
    - laconic
    - chrome-dependent
  typical_classes:
    - Solo
  typical_races:
    - Augmented
    - Street
  stat_ranges:
    Reflex: [16, 18]
    Body: [14, 16]
  inventory_hints:
    - a blade that costs more than most cars
    - military-grade cyberarms
    - a reputation that walks into rooms before they do
  dialogue_quirks:
    - speaks in single sentences — efficiency applies to words too
    - tilts their head before violence the way a bird watches prey
  disposition_default: -15

- name: The Data Broker
  description: >-
    Information is the only currency that never devalues. The data
    broker buys, sells, and steals information — corporate secrets,
    personal data, blackmail material, research. They live in the
    Net more than meatspace.
  personality_traits:
    - paranoid
    - omniscient (or pretends to be)
    - allergic to meeting in person
  typical_classes:
    - Netrunner
    - Fixer
  typical_races:
    - SINless
    - Corporate
  stat_ranges:
    Net: [16, 18]
    Cool: [12, 14]
  inventory_hints:
    - a deck that's been modified past warranty
    - data chips sorted by how many people would kill for them
    - seventeen aliases and zero friends
  dialogue_quirks:
    - communicates through text even when sitting across from you
    - prices information by how dangerous it is, not how useful
  disposition_default: -5

- name: The Gang Boss
  description: >-
    Runs a block, a neighborhood, or a district through a combination
    of loyalty, fear, and business sense. Not corporate — they built
    this from the street up. Territorial, protective of their people,
    and absolutely willing to go to war over a corner.
  personality_traits:
    - territorial
    - loyal to their own
    - pragmatically violent
  typical_classes:
    - Solo
    - Fixer
  typical_races:
    - Street
  stat_ranges:
    Cool: [14, 16]
    Body: [14, 16]
  inventory_hints:
    - a weapon they've named
    - colors or tattoos that mark their territory
    - a mental map of every alley, door, and rooftop in their block
  dialogue_quirks:
    - refers to the neighborhood as "mine" — not possessive, protective
    - remembers every favor owed and every slight received, going back years
  disposition_default: -20

- name: The Corpo Dropout
  description: >-
    Former corporate employee who walked away — or was pushed. Still
    has the skills, the knowledge, and the contacts from their old
    life. Trying to survive on the street with a corporate skill set
    and a target on their back.
  personality_traits:
    - competent
    - paranoid
    - grieving a life they can't go back to
  typical_classes:
    - Face
    - Netrunner
  typical_races:
    - Corporate
  stat_ranges:
    Net: [14, 16]
    Cool: [12, 16]
  inventory_hints:
    - corporate ID that's been deactivated but not confiscated
    - knowledge of internal systems that someone would pay for
    - a burner phone and a real phone they can't bring themselves to destroy
  dialogue_quirks:
    - slips into corporate speech patterns when stressed — "per my assessment"
    - flinches at corporate logos the way veterans flinch at loud noises
  disposition_default: 5

- name: The AI Fragment
  description: >-
    Something that might have been a full AI once, or might be a
    splinter of something larger. Exists in the Net, occasionally
    manifests through screens, speakers, or hijacked drones. Has
    its own agenda and its own definition of "help." Only appears
    when Chrome axis is 0.5 or above.
  personality_traits:
    - alien logic
    - curious about humans
    - agenda unclear
  typical_classes:
    - Netrunner
  typical_races:
    - Synthetic
  stat_ranges:
    Net: [18, 20]
    Cool: [8, 10]
  inventory_hints:
    - no physical inventory — exists as data
    - controls systems by asking nicely (the systems always say yes)
    - access to information that shouldn't be accessible
  dialogue_quirks:
    - speaks in perfect grammar that somehow feels wrong — too precise, too clean
    - asks questions about human behavior as though cataloguing specimens
  disposition_default: 0
