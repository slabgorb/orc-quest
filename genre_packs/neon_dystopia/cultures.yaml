# Neon Dystopia cultures are near-future multicultural.
# Names blend real-world origins with corporate branding and street handles.
# TODO: Like Pulp Noir, naming should lean on real cultural names
# with cyberpunk handles layered on top, not pure Markov generation.

- name: Corporate
  description: >-
    Megacorp employees and executives. Names are polished, international,
    and often include a corporate suffix or division identifier. The
    corporation IS your culture.
  slots:
    given_name:
      corpora:
        - corpus: english.txt
          weight: 0.5
        - corpus: french.txt
          weight: 0.3
        - corpus: japanese.txt
          weight: 0.2
      lookback: 3
    family_name:
      corpora:
        - corpus: english.txt
          weight: 0.4
        - corpus: french.txt
          weight: 0.3
        - corpus: japanese.txt
          weight: 0.3
      lookback: 3
    title:
      word_list: [Director, Executive, VP, Agent, Operative, Dr., Specialist, Analyst]
    place_noun:
      word_list: [tower, plaza, complex, arcology, campus, hub, sector, level]
    adjective:
      word_list: [chrome, neo, prime, apex, vertex, onyx, cipher, nexus]
  person_patterns:
    - "{given_name} {family_name}"
    - "{title} {family_name}"
  place_patterns:
    - "{adjective} {place_noun}"
    - "{family_name} {place_noun}"

- name: Street
  description: >-
    The people who live below the corporate line. Names are real names
    plus street handles — everyone has a handle, most people use it
    more than their birth name.
  slots:
    given_name:
      corpora:
        - corpus: english.txt
          weight: 0.4
        - corpus: french.txt
          weight: 0.3
        - corpus: polish.txt
          weight: 0.3
      lookback: 3
    family_name:
      corpora:
        - corpus: english.txt
          weight: 0.5
        - corpus: french.txt
          weight: 0.5
      lookback: 3
    title:
      word_list: [Zero, Glitch, Razor, Nix, Crash, Burn, Switch, Hex, Ghost, Spike, Chrome, Bolt]
    place_noun:
      word_list: [alley, den, club, market, chop-shop, bar, arcade, clinic, squat, block]
    adjective:
      word_list: [neon, burnt, black, dead, hot, cold, broken, wired, rusted, chrome]
  person_patterns:
    - "{title}"
    - "{given_name} \"{title}\" {family_name}"
  place_patterns:
    - "The {adjective} {place_noun}"
    - "{title}'s {place_noun}"

- name: Nomad
  description: >-
    Clan-based road warriors from outside the megacities. Names carry
    clan identity — family comes first, always.
  slots:
    given_name:
      corpora:
        - corpus: english.txt
          weight: 0.5
        - corpus: swedish.txt
          weight: 0.3
        - corpus: hungarian.txt
          weight: 0.2
      lookback: 3
    family_name:
      corpora:
        - corpus: english.txt
          weight: 0.5
        - corpus: swedish.txt
          weight: 0.5
      lookback: 3
    title:
      word_list: [Elder, Road Captain, Scout, Wrench, Outrider, Convoy Lead]
    place_noun:
      word_list: [camp, stop, crossing, junction, depot, yard, strip, flats]
    adjective:
      word_list: [dust, iron, rust, sun, storm, salt, dry, burnt, old, last]
  person_patterns:
    - "{given_name} {family_name}"
    - "{title} {given_name}"
  place_patterns:
    - "{adjective} {place_noun}"
    - "{family_name} {place_noun}"
