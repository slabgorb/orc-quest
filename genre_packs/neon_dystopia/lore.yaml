world_name: ""

history: |
  The corps won. Governments are brands, borders are franchise territories,
  and citizenship is an employment contract. The old world collapsed under
  its own weight — climate, debt, war — and the megacorps picked up the
  pieces at auction. Now they own everything worth owning, and rent the
  rest back to you at markup.

cosmology: |
  Technology is the only god that delivers. Cyberware extends the body,
  the Net extends the mind, and both cost more than you can afford.
  The divide between meat and chrome is the new class war. Humanity is
  measured in percentages, and everyone's balance is dropping.

geography: |
  Vertical cities. The rich live high, the poor live low, and the street
  is where business happens. Neon and rain. Corporate arcologies gleam
  above the smog while the ground level rots. Every district is a corp's
  turf, every alley is someone's territory, every rooftop is a sniper's
  perch.

