definitions:
  - id: chrome
    name: Chrome
    description: >-
      How far technology has pushed the boundaries of the human body
      and mind. At low values, augmentation is limited and most people
      are still recognizably human. At high values, full body replacement,
      consciousness uploading, and digital existence blur the line between
      person and program.
    poles:
      - lo_fi
      - transhuman
    default: 0.5

  - id: corporate
    name: Corporate
    description: >-
      Whether the story centers on street-level survival or the machinations
      of megacorporations. At the street pole, it's gangs, turf, and personal
      stakes. At the megacorp pole, it's global conspiracies, boardroom coups,
      and the system itself as the enemy.
    poles:
      - street
      - megacorp
    default: 0.5

  - id: satire
    name: Satire
    description: >-
      How seriously the world takes itself. At the grim pole, the dystopia
      is existentially heavy — Blade Runner weight, real suffering, tears
      in rain. At the absurd pole, the dystopia is so grotesque it's funny
      — franchise nations, corporate mascot armies, the idiot logic of
      capitalism taken to its terminal conclusion.
    poles:
      - grim
      - absurd
    default: 0.3

modifiers:
  chrome:
    lo_fi: >-
      Technology is tools, not identity. Augmentation is limited, expensive,
      and socially notable. Most people are still flesh and blood. Cyberspace
      exists but jacking in is specialized work, not casual browsing. The
      world feels close to our own, just worse. Focus on the human cost
      of technology, not the spectacle of it.
    transhuman: >-
      The line between human and machine is gone. Full body replacement is
      common. Consciousness can be copied, transferred, or deleted. Some
      people exist entirely in cyberspace. Identity is fluid — you might
      be wearing your third body this year. The philosophical question of
      what makes someone human is not abstract, it's Tuesday. Describe
      chrome as natural, flesh as quaint.
  corporate:
    street: >-
      Keep the story local. One neighborhood, one gang, one block worth
      fighting for. The megacorps are distant weather — they shape the
      climate but the story is about the people on the ground. NPCs are
      neighbors, rivals, and local legends. Stakes are personal — turf,
      loyalty, survival, respect.
    megacorp: >-
      The corporations are characters. They have names, cultures, armies,
      and agendas that span continents. The story involves corporate
      espionage, hostile takeovers, black ops teams, and executives who
      treat cities as balance sheet entries. The player is either working
      for a corp, working against one, or caught between two. The system
      is the antagonist.
  satire:
    grim: >-
      The dystopia is real and heavy. Poverty kills. Chrome addiction
      destroys lives. The rain never stops and the neon just makes the
      darkness more visible. Play it straight — no winking at the camera,
      no comic relief. The humor, if any, is gallows humor from characters
      who've seen too much. Blade Runner weight. Neuromancer cool.
    absurd: >-
      The dystopia is so grotesque it loops back around to funny. Pizza
      delivery is a sovereign franchise. The president is a corporate
      mascot. The police are a subscription service — if your premium
      lapses, they stop responding. Play the absurdity completely straight
      — nobody in the world thinks it's funny, which makes it funnier.
      Snow Crash energy. Idiocracy logic. The system works exactly as
      designed and that's the horror.

presets:
  - name: Deckard
    description: >-
      Blade Runner — melancholy, existential, rain-soaked. The question
      is what it means to be human. The answer hurts.
    values:
      chrome: 0.7
      corporate: 0.6
      satire: 0.0

  - name: Case
    description: >-
      Neuromancer — street-level cool, jacking into cyberspace, hustling
      for the next score. Gritty and stylish.
    values:
      chrome: 0.6
      corporate: 0.4
      satire: 0.1

  - name: Hiro
    description: >-
      Snow Crash — gonzo corporate absurdism, the Metaverse, skateboard
      couriers and samurai pizza delivery. Dead serious about being
      ridiculous.
    values:
      chrome: 0.5
      corporate: 0.7
      satire: 0.9

  - name: Balanced
    description: >-
      Default cyberpunk — chrome and street in equal measure, serious
      with room for dark humor. Night City energy.
    values:
      chrome: 0.5
      corporate: 0.5
      satire: 0.3
