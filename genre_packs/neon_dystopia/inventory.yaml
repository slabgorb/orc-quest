currency:
  name: eddies
  denominations:
    - chips
    - creds
    - stacks

item_catalog:
  - id: smart_pistol
    name: Smart Pistol
    description: Tracks targets around corners. Point in the general direction and let the gun do the math.
    category: weapon
    value: 40
    weight: 1.0
    rarity: common
    power_level: 2
    tags: [ranged, firearm, one-handed, smart]
    lore: Standard corporate sidearm. The aiming assist makes everyone a marksman.
    narrative_weight: 0.2

  - id: katana
    name: Mono-Edge Katana
    description: Monomolecular edge. Cuts through armor like opinion through fact.
    category: weapon
    value: 80
    weight: 1.5
    rarity: uncommon
    power_level: 3
    tags: [melee, blade, two-handed, mono]
    lore: Street samurai weapon of choice. The blade never dulls because it's one molecule wide.
    narrative_weight: 0.4

  - id: assault_rifle
    name: Assault Rifle
    description: Full auto. Loud. Effective. Not subtle.
    category: weapon
    value: 60
    weight: 3.0
    rarity: common
    power_level: 3
    tags: [ranged, firearm, two-handed, automatic]
    lore: When you need a problem to stop being a problem.
    narrative_weight: 0.3

  - id: mantis_blades
    name: Mantis Blades
    description: Retractable arm blades. Slice through anything. Part of you now.
    category: weapon
    value: 200
    weight: 0.0
    rarity: rare
    power_level: 4
    tags: [melee, cyberware, concealed, blade]
    lore: Installed by a ripperdoc, deployed by thought. The chrome that kills.
    narrative_weight: 0.5

  - id: armored_jacket
    name: Armored Jacket
    description: Ballistic weave under leather. Stops small arms. Looks good doing it.
    category: armor
    value: 30
    weight: 2.0
    rarity: common
    power_level: 1
    tags: [light, torso, concealable]
    lore: The street's dress code. If you're not wearing armor, you're not paying attention.
    narrative_weight: 0.1

  - id: subdermal_armor
    name: Subdermal Armor
    description: Installed under the skin. Invisible until someone shoots you and the round bounces.
    category: armor
    value: 150
    weight: 0.0
    rarity: uncommon
    power_level: 3
    tags: [cyberware, full-body, concealed]
    lore: Costs humanity. Worth it when the bullet stops.
    narrative_weight: 0.3

  - id: medkit
    name: Combat Medkit
    description: Trauma patches, stim injectors, and bioglue. Not a hospital, but better than bleeding.
    category: consumable
    value: 15
    weight: 1.0
    rarity: common
    power_level: 1
    tags: [healing, medical, field]
    lore: Standard issue for anyone who expects to get shot today.
    narrative_weight: 0.1

  - id: cyberdeck
    name: Cyberdeck
    description: Your interface to the Net. Jack in, breach ICE, ride data. The world behind the world.
    category: tool
    value: 100
    weight: 0.5
    rarity: uncommon
    power_level: 3
    tags: [hacking, net, electronic, essential]
    lore: Every deck is customized. A netrunner's deck is as personal as their fingerprints.
    narrative_weight: 0.5

  - id: encrypted_comm
    name: Encrypted Commlink
    description: Secure communications. Or as secure as anything gets.
    category: tool
    value: 20
    weight: 0.2
    rarity: common
    power_level: 1
    tags: [communication, electronic, encrypted]
    lore: Everybody has one. The question is who's listening on the other end.
    narrative_weight: 0.1

  - id: grapple_line
    name: Grapple Line
    description: Magnetic anchor and monofilament line. Goes up. You go with it.
    category: tool
    value: 25
    weight: 0.5
    rarity: uncommon
    power_level: 1
    tags: [mobility, infiltration, physical]
    lore: The city is vertical. This makes it climbable.
    narrative_weight: 0.2

  - id: optical_camo
    name: Optical Camo Module
    description: Bends light around you. Not invisible — but close enough in the dark.
    category: tool
    value: 250
    weight: 0.0
    rarity: rare
    power_level: 4
    tags: [cyberware, stealth, infiltration]
    lore: Military prototype that found its way to the street. Glitches in the rain.
    narrative_weight: 0.6

  - id: data_chip
    name: Stolen Data Chip
    description: Contains something someone wants. You don't know what. That's either a problem or leverage.
    category: treasure
    value: 0
    weight: 0.1
    rarity: legendary
    power_level: 5
    tags: [data, plot-device, unique, electronic]
    lore: The most dangerous thing you can carry. Worth nothing until you know what's on it.
    narrative_weight: 0.9

starting_equipment:
  Netrunner: [cyberdeck, smart_pistol, encrypted_comm]
  Solo: [assault_rifle, armored_jacket, medkit]
  Fixer: [encrypted_comm, smart_pistol, armored_jacket]
  Tech: [medkit, encrypted_comm, grapple_line]
  Nomad: [assault_rifle, medkit, grapple_line]
  Face: [smart_pistol, armored_jacket, encrypted_comm]
  Ghost: [smart_pistol, grapple_line, encrypted_comm]

