- id: origins
  title: Boot Sequence
  narration: |
    The screen flickers. Blue light. A clinic somewhere — you can tell by
    the antiseptic smell and the hum of medical equipment. Someone is
    standing over you. A ripperdoc, chrome fingers tapping on a tablet.

    "Easy. Easy. You're coming out of something. Give it a second."

    They check a readout, nod. "So. Before we finish up here, I need
    some baseline data. Insurance purposes." They don't smile. Nobody
    has insurance.

    "Where'd you come from? Before all this?"
  choices:
    - label: The Corporation
      description: >-
        You grew up inside the machine. Corporate schools, corporate
        housing, corporate friends. You had a badge, a clearance level,
        and a future mapped out in quarterly projections. Then something
        changed.
      mechanical_effects:
        race_hint: Corporate
        background: Corpo Kid
    - label: The Streets
      description: >-
        You grew up in the concrete. No corporate safety net, no SIN
        worth scanning. You learned to run before you learned to read,
        and you learned to fight before both.
      mechanical_effects:
        race_hint: Street
        background: Street Rat
    - label: The Clans
      description: >-
        You grew up moving — convoy to convoy, camp to camp. Family
        is the only thing that matters out past the city limits.
        The road is home. The city is a temporary stop.
      mechanical_effects:
        race_hint: Nomad Clan
        background: Road Born
    - label: A Lab
      description: >-
        You woke up. That's the first thing you remember. Someone
        designed you, built you, or grew you. The question of what
        you are is not philosophical for you. It's personal.
      mechanical_effects:
        race_hint: Synthetic
        background: Manufactured
    - label: The Chop Shop
      description: >-
        You've been modded since you were old enough to choose — or
        maybe before. More chrome than flesh now. You move faster,
        hit harder, see further. You also dream in static sometimes.
      mechanical_effects:
        race_hint: Augmented
        background: Chrome Junkie
    - label: Nowhere
      description: >-
        No records. No SIN. No birth certificate. As far as the
        system is concerned, you don't exist. That's not a bug.
        That's a feature.
      mechanical_effects:
        race_hint: SINless
        background: Ghost
  allows_freeform: true

- id: crucible
  title: What's Your Edge?
  narration: |
    The ripperdoc scrolls through something on their tablet. Whatever
    they see makes them raise an eyebrow — the chrome one.

    "Interesting history. Look, I don't care what you did before.
    Everybody's got a past in this city. What I need to know is what
    you DO." They set down the tablet.

    "When the job goes sideways — and it always goes sideways — what's
    your move?"
  choices:
    - label: I Jack In
      description: >-
        Cyberspace is more real to you than meatspace. You breach
        ICE, ride data streams, and talk to machines more honestly
        than you talk to people.
      mechanical_effects:
        class_hint: Netrunner
        personality_trait: wired
    - label: I Handle It
      description: >-
        Chrome arms, reflex boosters, and a talent for violence that
        was either trained or installed. When diplomacy fails, you
        don't.
      mechanical_effects:
        class_hint: Solo
        personality_trait: lethal
    - label: I Know A Guy
      description: >-
        The right contact, the right moment, the right price. You
        don't do the work — you make the work possible. Everyone
        owes you a favor.
      mechanical_effects:
        class_hint: Fixer
        personality_trait: connected
    - label: I Build It
      description: >-
        If it's broken, you fix it. If it doesn't exist, you make it.
        Chrome, drones, vehicles, weapons — your hands know machines
        the way a musician knows an instrument.
      mechanical_effects:
        class_hint: Tech
        personality_trait: methodical
    - label: I Drive
      description: >-
        The open road, the convoy, the getaway. You're from outside
        the city and you move between worlds — nomad camps, megacity
        streets, corporate zones. Nobody knows the routes like you.
      mechanical_effects:
        class_hint: Nomad
        personality_trait: restless
    - label: I Walk In The Front Door
      description: >-
        A good suit, the right words, and the confidence to look
        a corporate executive in the eye and lie. Social engineering
        is the most powerful hack there is.
      mechanical_effects:
        class_hint: Face
        personality_trait: smooth
    - label: I Was Never There
      description: >-
        Infiltration, stealth, disappearance. You get in, get what
        you came for, and get out without anyone knowing you existed.
        Security footage? What security footage?
      mechanical_effects:
        class_hint: Ghost
        personality_trait: invisible
  allows_freeform: true

- id: connection
  title: Who's Got Your Back?
  narration: |
    The ripperdoc pauses. Something crosses their face — not quite
    sympathy, but close. They've been doing this long enough to know
    that chrome doesn't keep you alive. People do. Sometimes.

    "One more thing. And this one matters." They lean against the
    operating table.

    "Who do you call when it all falls apart? Who's in your corner?"
  choices:
    - label: A Crew
      description: >-
        You've got people. A team, a gang, a squad — whatever you
        call them. You've bled together, and that means something
        that no contract can replicate.
      mechanical_effects:
        relationship: crew
        personality_trait: loyal
    - label: A Handler
      description: >-
        Someone in the shadows who gives you work, watches your back
        from a distance, and knows things about you that keep you
        both honest. Mutual dependence dressed up as professionalism.
      mechanical_effects:
        relationship: handler
        personality_trait: cautious
    - label: A Ghost
      description: >-
        Someone who used to be there. Dead, disappeared, or just
        gone. You still talk to them sometimes — in your head,
        in your dreams, in the static between channels.
      mechanical_effects:
        relationship: ghost
        personality_trait: haunted
    - label: Nobody
      description: >-
        You work alone. Trust is a vulnerability. Attachments are
        leverage. The only person you can count on is the one in
        the mirror — and even they look different every morning.
      mechanical_effects:
        relationship: loner
        personality_trait: isolated
  allows_freeform: true

- id: drive
  title: What Are You Chasing?
  narration: |
    The ripperdoc powers down their equipment. The clinic lights shift
    from clinical blue to the amber glow of the street outside. Rain
    on the window. Neon reflections sliding across the ceiling.

    "Last question. And don't bullshit me — I've heard every answer
    there is." They hand you your jacket.

    "What gets you out of bed? What makes you take jobs that any
    smart person would walk away from?"
  choices:
    - label: The Score
      description: >-
        One big job. Enough eddies to disappear — buy a boat, a
        farm, a new identity. Retire before the city eats you.
        Everyone has a number. You haven't hit yours yet.
      mechanical_effects:
        goals: the_big_score
        emotional_state: hungry
    - label: The Truth
      description: >-
        Something happened and someone lied about it. A corpo cover-up,
        a missing person, a memory that doesn't match the records.
        You need to know what's real.
      mechanical_effects:
        goals: find_the_truth
        emotional_state: obsessed
    - label: Revenge
      description: >-
        Someone took something from you — a person, a life, a future.
        You're going to find them. What happens after that is the only
        open question.
      mechanical_effects:
        goals: revenge
        emotional_state: cold
    - label: Freedom
      description: >-
        The system owns everything — your data, your chrome, your
        debt. You want out. Not just for you — for everyone who's
        trapped in the machine. Burn it down or build something new.
      mechanical_effects:
        goals: liberation
        emotional_state: defiant
  allows_freeform: true

- id: confirmation
  title: System Online
  narration: |
    The ripperdoc opens the clinic door. The city hits you —
    noise, light, rain, the smell of street food and exhaust
    and ozone.

    "You're good to go, {name}. Try not to come back too soon."

    They pause in the doorway. "And {name}? Whatever you're
    chasing out there — make sure it's worth what it costs."

    The door closes. The city doesn't care about your name,
    your chrome, or your story. But {name}, a {race} {class}
    with more ambition than good sense, is about to give it
    a reason to.
  choices: []
  allows_freeform: false
