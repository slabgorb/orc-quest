name: Neon Dystopia
version: "1.0.0"
description: >-
  Megacities ruled by corporations, streets ruled by gangs, and cyberspace
  ruled by nobody. Players are mercs, hackers, runners, and rebels navigating
  a world where humanity is a spectrum — flesh and chrome on one end, pure
  data on the other. The future arrived and it's not evenly distributed.
  Hacking is cinematic and narrative, not technical.
min_sidequest_version: "0.1.0"
refine_hooks: false

# --- Creative DNA (reference for all subsequent steps) ---

inspirations:
  - name: "Blade Runner"
    element: "Melancholy megacity, corporate gods, rain and neon, what does it mean to be human"
  - name: "Neuromancer"
    element: "The street finds its own uses for things, cyberspace cowboys, rogue AI"
  - name: "Snow Crash"
    element: "Gonzo corporate dystopia, the Metaverse, sword-wielding hackers"
  - name: "Cyberpunk 2077"
    element: "Street mercs, body modification, fixers, Night City energy"
  - name: "The Matrix"
    element: "Reality is a cage, cinematic combat, transcendence through technology"

era_range: "Near future / unspecified"

core_vibe: >-
  You just jacked out of a corporate mainframe with stolen data, your
  cyberarm is glitching, and the fixer who hired you isn't answering
  the phone.

emotional_tone:
  - defiance
  - alienation
  - neon-lit cool
  - existential unease

differentiation: >-
  Not fantasy, not historical — speculative near-future. Technology is
  the source of both power and oppression. Corporations have replaced
  governments. Body modification blurs the line between human and
  machine. Cyberspace is a second world layered on top of the physical.
  Hacking is always narrative and cinematic, never technical puzzles.
  Lethality is moderate — chrome breaks, debts pile up, but player
  death is dramatic and story-driven, never random.
