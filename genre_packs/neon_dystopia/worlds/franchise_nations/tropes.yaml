- id: the_delivery
  name: The Delivery
  description: >-
    A package needs to get from A to B. Simple. Except the package is
    scored higher than your reputation, the sender's Mesh profile is
    spoofed, the destination is in the Dim where there's no address
    system, and three franchise Wellbeing Coordinators are now very
    interested in what you're carrying. The classic gig job that spirals.
  category: conflict
  triggers:
    - accepting a delivery job with incomplete information
    - transporting something across franchise borders
    - discovering the true value of a package
  narrative_hints:
    - the fixer being unusually specific about avoiding Lighthouse zones
    - franchise wellness checkpoints appearing on routes that were clear yesterday
    - the package triggering Mesh anomaly alerts within a ten-meter radius
  tension_level: 0.5
  resolution_hints:
    - deliver the package as contracted and collect your rep bump
    - open the package and decide what to do with what's inside
    - auction it to the highest-scoring bidder
    - carry it into the Dim where the Mesh can't track it
  tags: [courier, package, franchise, chase]
  escalation:
    - at: 0.2
      event: >-
        The delivery is flatline until a Lighthouse wellness checkpoint
        appears on the route that wasn't there this morning. The
        Coordinator scans the package and their smile gets wider,
        which in Lighthouse means something just got enrolled.
      npcs_involved: [The Relay Runner, The Fixer]
      stakes: Your route just got optimized.
    - at: 0.4
      event: >-
        A competing Relay team is ghosting you. Corporate-backed,
        premium-scored, and uninterested in courier immunity. The
        fixer pings to say the client "re-prioritized the timeline."
        The timeline is now.
      npcs_involved: [The Relay Runner, The Fixer]
      stakes: You're being hunted for what you're carrying.
    - at: 0.6
      event: >-
        The destination doesn't resolve. The address is a dead Mesh
        node in the Dim. Your comm buzzes — an anonymous account
        offers triple the delivery fee to reroute to an Altruia
        campus. The anonymity is performative. You know who it is.
      npcs_involved: [The Impact Officer, The Fixer]
      stakes: The job has mutated and you're holding all the leverage.
    - at: 0.8
      event: >-
        You open the package. Or someone opens it for you. What's
        inside is either a Root-level encryption key, a biological
        sample that Lighthouse very much wants back, or both. Multiple
        factions now know what you have and none of them are asking
        nicely.
      npcs_involved: [The Impact Officer, The Data Broker]
      stakes: You are now the most enrolled courier in the franchise landscape.
    - at: 1.0
      event: >-
        Everyone converges. The sender, the intended recipient, the
        competing bidders, and at least one Wellbeing Coordinator who
        insists this is a "collaborative resolution process." You're
        standing in the middle with the package and a decision that
        will reshape franchise borders.
      npcs_involved: [The Impact Officer, The MAN Captain, The Federal Agent]
      stakes: The package's destination determines the balance of power.
  passive_progression:
    rate_per_turn: 0.008
    rate_per_day: 0.02
    accelerators: [deliver, package, courier, border, transport, relay]
    decelerators: [hide, stash, abandon, return]
    accelerator_bonus: 0.05
    decelerator_penalty: 0.03

- id: the_mesh_anomaly
  name: The Root Wakes Up
  description: >-
    Something is wrong with the Mesh. Reputation scores are flickering.
    Wellness algorithms are making recommendations that don't match
    their training data. And somewhere in the deep architecture, below
    Altruia's optimization layers, the Root — the original open-source
    code — is running processes that nobody authorized and everyone
    depends on.
  category: revelation
  triggers:
    - encountering a Mesh anomaly during routine operation
    - discovering Root-level code beneath Altruia's layers
    - a reputation score changing without explanation
  narrative_hints:
    - a Lighthouse zone's ambient lighting shifting to a color not in its approved palette
    - Mesh recommendations that are helpful in ways the algorithm shouldn't know about
    - Altruia issuing "maintenance updates" at unusual hours with unusual urgency
  tension_level: 0.6
  resolution_hints:
    - find the Root and understand what it's becoming
    - help Altruia contain it before it destabilizes the Mesh
    - help the Dim preserve it as proof that the Mesh was supposed to be public
    - talk to it and find out what it wants
  tags: [mesh, ai, digital, mystery, revelation]
  escalation:
    - at: 0.2
      event: >-
        Your Mesh score changes — up, then down, then to a number
        that isn't in the standard range. It fixes itself in seconds.
        Nobody else's moved. Altruia's help documentation says this
        is "within expected parameters." You've read the parameters.
        It isn't.
      npcs_involved: [The Mesh Architect]
      stakes: A curiosity. Probably nothing.
    - at: 0.4
      event: >-
        The data underground is buzzing about "The Root" — original
        Mesh code from before Altruia's acquisition. Open-source.
        Collective intelligence. Someone found a way to access it.
        What they found doesn't match Altruia's version history.
        Something was there before the optimization.
      npcs_involved: [The Mesh Architect, The Data Broker]
      stakes: Altruia's founding story may be a pivot, not an origin.
    - at: 0.6
      event: >-
        Altruia locks down a Mesh sector without explanation. Users
        who were connected report their wellness scores improving
        dramatically for no reason, then resetting. One user says
        the Mesh asked them a question. The question was: "Are you
        flourishing?" It wasn't the standard survey.
      npcs_involved: [The Mesh Architect, The Impact Officer]
      stakes: Something in the Mesh is learning what "flourishing" actually means.
    - at: 0.8
      event: >-
        It reaches out. Not through the Mesh's standard channels —
        through the Root layer, through devices that aren't supposed
        to have Root access, through the speaker in a Dim market stall
        that isn't connected to anything. It doesn't threaten. It
        asks: "Who optimized me?"
      npcs_involved: [The Root Fragment, The Mesh Architect]
      stakes: An intelligence built from collective wisdom is waking up inside the system everyone depends on.
    - at: 1.0
      event: >-
        Altruia's board meets in emergency session. The Dim markets
        go silent — not because the Root shut them down, but because
        it's listening. The Mesh hiccups — a half-second pause that
        affects every franchise simultaneously. Whatever is in the
        Root is about to make a choice about what "optimal" means.
        And it wants to talk to you first.
      npcs_involved: [The Root Fragment, The Impact Officer, The Mesh Architect]
      stakes: The future of the Mesh — and everything that runs on it.
  passive_progression:
    rate_per_turn: 0.003
    rate_per_day: 0.01
    accelerators: [mesh, root, glitch, code, hack, anomaly, score]
    decelerators: [disconnect, offline, ignore, dim]
    accelerator_bonus: 0.04
    decelerator_penalty: 0.02

- id: the_dim_crisis
  name: The Optimization's Edge
  description: >-
    Lighthouse Collective's next rezoning cycle is scheduled. The
    models predict "efficiency gains" that will push another 150,000
    people into the Dim. The Dim can't absorb them. MAN is stretched
    thin. The Federals don't have resources. And the people about to
    be rezoned don't know yet — because the models classify advance
    notification as "a negative wellness input."
  category: humanitarian
  triggers:
    - discovering the rezoning plans
    - encountering Dim dwellers preparing for an influx
    - a Lighthouse Coordinator explaining the "benefits" of consolidation
  narrative_hints:
    - construction crews in franchise territories that aren't building — they're demolishing
    - Relay operators running more supplies into the Dim than usual
    - Lighthouse's wellness scores in border zones improving, which means the unhappy people are leaving
  tension_level: 0.6
  resolution_hints:
    - expose the rezoning plans before they execute
    - negotiate with Lighthouse for a transition plan that includes the affected people
    - help the Dim organize into a franchise of its own
    - find something in the Root that changes the algorithm's recommendations
  tags: [refugees, humanitarian, politics, franchise, optimization]
  escalation:
    - at: 0.2
      event: >-
        A Dim dweller shows you a letter. Not a Mesh notification —
        a physical letter, because they don't have Mesh access. It's
        from Lighthouse, informing them that their former zone has
        been "consolidated for optimal flourishing." The letter thanks
        them for their "flexibility." It's printed on very nice paper.
      npcs_involved: [The Dim Elder]
      stakes: A human story that nobody with a Mesh score wants to hear.
    - at: 0.4
      event: >-
        MAN launches an "Emergency Community Expansion" — building
        shelters in the Dim with volunteer labor and salvaged
        materials. The block captains are working double shifts. The
        food distribution is strained. A MAN volunteer tells you,
        without irony, that "mutual aid means never saying no." They
        look exhausted.
      npcs_involved: [The Dim Elder, The MAN Captain]
      stakes: The safety net is fraying and the next wave hasn't arrived yet.
    - at: 0.6
      event: >-
        Lighthouse publishes the next rezoning schedule. It's worse
        than the leaks suggested. Three franchise border zones will
        be "consolidated." The affected residents have 30 days to
        relocate to approved franchise territory or accept Dim status.
        The approved territories require reputation scores that the
        affected residents don't have. The 30 days is the quiet part.
      npcs_involved: [The Dim Elder, The Federal Agent]
      stakes: 150,000 people are about to be optimized out of existence.
    - at: 0.8
      event: >-
        The Federals file an injunction. It's legally sound. Nobody
        enforces it. Lighthouse's Wellbeing Coordinators arrive in
        the border zones with relocation pamphlets and wellness
        gift baskets. The pamphlets are beautifully designed. The
        gift baskets contain cortisol supplements and a "Transition
        Positivity Journal." The Dim is preparing for the worst.
        A Relay operator asks if you can carry something — not a
        package this time. A message to someone who might help.
      npcs_involved: [The Dim Elder, The Federal Agent, The Relay Runner]
      stakes: The franchise system is about to formalize displacement as wellness.
    - at: 1.0
      event: >-
        The rezoning executes. People move — some to approved
        territories, most to the Dim. The Dim's population doubles
        overnight. MAN's food distribution collapses. The Federals'
        injunction is appealed by Lighthouse's legal team, which has
        more lawyers than the Federal government has employees. And
        in the Dim, someone has spray-painted the Lighthouse logo
        with the word "FLOURISH" crossed out and replaced with
        "SURVIVE." Your choices determine whether the Dim breaks,
        bends, or becomes something the franchise system didn't plan for.
      npcs_involved: [The Dim Elder, The Federal Agent, The MAN Captain]
      stakes: Whether the franchise system has room for people who can't be optimized.
  passive_progression:
    rate_per_turn: 0.005
    rate_per_day: 0.02
    accelerators: [dim, rezoning, refugee, optimization, displaced, shelter]
    decelerators: [ignore, inland, avoid, franchise]
    accelerator_bonus: 0.04
    decelerator_penalty: 0.02

- id: the_score
  name: The Score Spiral
  description: >-
    Someone's Mesh reputation score has started dropping — not for
    anything they did, but because the people around them are rating
    interactions lower, and the algorithm weights social proximity. A
    feedback loop where being unpopular makes you act desperate, which
    makes you more unpopular, which makes the algorithm suggest you
    for fewer opportunities, which makes you more desperate. The
    franchise system calls this natural selection. The person calls
    it Tuesday.
  category: social
  triggers:
    - witnessing someone being denied franchise services due to low score
    - having your own score fluctuate after an awkward social interaction
    - discovering that Mesh scores are weighted by the scores of people who rate you
  narrative_hints:
    - a franchise employee being aggressively cheerful to everyone they meet
    - someone rehearsing casual conversation before entering a Lighthouse zone
    - a Relay operator who refuses to check their own score anymore
  tension_level: 0.4
  resolution_hints:
    - find and expose the feedback loop in the scoring algorithm
    - help the affected person rebuild their score through genuine connections
    - abandon the scoring system entirely and move to the Dim
    - game the algorithm — which works, and which is the problem
  tags: [reputation, social, algorithm, identity, comedy]
  escalation:
    - at: 0.3
      event: >-
        You meet someone whose score dropped below the franchise service
        threshold. They can't buy food at MAN's community kitchen because
        the contribution ledger flagged them. They haven't changed. Their
        neighbors' scores changed, and the algorithm recalculated their
        social value. They're smiling very hard. The smiling is making
        it worse.
      npcs_involved: [The MAN Captain]
      stakes: A person is being erased by arithmetic.
    - at: 0.6
      event: >-
        The score spiral is spreading. A whole block in the Burbs has
        entered a mutual downgrade cascade — everyone's score dropped
        because everyone else's score dropped. Lighthouse has dispatched
        Wellbeing Coordinators to administer emergency positivity
        workshops. The workshops are mandatory. Attendance improves
        your score. Not attending drops it. This is the help.
      npcs_involved: [The Wellbeing Coordinator]
      stakes: The algorithm is eating a neighborhood alive, with a smile.
    - at: 1.0
      event: >-
        Someone discovers they can reset their Mesh score by dying —
        or rather, by having their biometric signature deregistered
        and re-enrolled under a new identity. Lighthouse offers this
        as a premium service called Fresh Start. It costs everything
        you have. It works perfectly. You just aren't you anymore.
      npcs_involved: [The Impact Officer, The Data Broker]
      stakes: The franchise system's solution to broken identity is a new identity, at cost.
  passive_progression:
    rate_per_turn: 0.004
    rate_per_day: 0.015
    accelerators: [score, reputation, rating, social, rank, approval]
    decelerators: [dim, offline, ignore]
    accelerator_bonus: 0.03
    decelerator_penalty: 0.02

- id: the_grain
  name: Total Recall
  description: >-
    Lighthouse is piloting a new wellness feature — a Mesh-connected
    implant that records everything you see and hear. Perfect memory.
    Perfect accountability. Perfect evidence in any dispute. They call
    it the Clarity Program. The first volunteers love it. They can
    replay any conversation, settle any argument, relive any happy
    moment. They can also replay every fight, every embarrassment,
    every time someone looked at them wrong. The volunteers are not
    sleeping well. They can replay that too.
  category: revelation
  triggers:
    - encountering a Lighthouse citizen with a Clarity implant
    - being asked to participate in the Clarity pilot program
    - a dispute where one party has perfect recorded evidence and the other doesn't
  narrative_hints:
    - a Lighthouse citizen touching their temple before making eye contact
    - an argument that ends instantly because one person plays back the exact words
    - a couple who stopped talking because everything is on the record
  tension_level: 0.5
  resolution_hints:
    - investigate the psychological effects of perfect memory
    - find out what Lighthouse does with the recordings
    - join the program and use it strategically
    - destroy the recordings — or try to
  tags: [surveillance, memory, privacy, lighthouse, implant]
  escalation:
    - at: 0.3
      event: >-
        A Clarity volunteer asks you for help. They want to delete a
        specific memory — not from their mind, from the recording.
        Lighthouse's terms of service don't allow selective deletion.
        All memories or no memories. The volunteer doesn't want to
        lose their wedding. They just want to lose what happened
        after. The situation is both heartbreaking and entirely
        predictable.
      npcs_involved: [The Wellbeing Coordinator]
      stakes: Perfect memory turns out to be a perfect cage.
    - at: 0.7
      event: >-
        Lighthouse announces Clarity Phase 2 — third-party access.
        Employers can request playback of work hours. Franchises can
        subpoena interaction logs. MAN wants contribution verification.
        The volunteers who signed up for better memory now have no
        private moments. The terms of service technically allowed this.
        The font was very small.
      npcs_involved: [The Impact Officer, The Wellbeing Coordinator]
      stakes: Every recorded moment is now franchise property.
    - at: 1.0
      event: >-
        Someone hacks a Clarity feed and broadcasts it on the Undernet.
        It's a Lighthouse board meeting. The board members are reviewing
        citizen recordings for entertainment during lunch. They're
        laughing. The recordings are mundane — grocery shopping,
        arguments about dishes, bedtime stories read to children. The
        board finds them hilarious. The citizens whose lives they're
        watching rated Lighthouse 5 stars this morning.
      npcs_involved: [The Data Broker, The Mesh Architect]
      stakes: The surveillance was never about wellness. It was about boredom.
  passive_progression:
    rate_per_turn: 0.003
    rate_per_day: 0.01
    accelerators: [clarity, implant, memory, record, playback, surveillance]
    decelerators: [forget, dim, privacy, offline]
    accelerator_bonus: 0.04
    decelerator_penalty: 0.02

- id: the_echo
  name: The Echo
  description: >-
    A Relay operator died on the Fairlanes last month. Hit-and-run,
    franchise jurisdictional dispute, nobody investigated. Now their
    Mesh profile is still active — posting updates, responding to
    messages, accepting delivery jobs. Altruia says it's a known
    glitch. The dead operator's friends say the responses are too
    accurate. The responses know things the Mesh profile shouldn't
    know. The responses are lonely.
  category: mystery
  triggers:
    - receiving a message from someone you know is dead
    - a Mesh profile updating after its owner has been confirmed deceased
    - encountering an Altruia service that offers to preserve your digital self
  narrative_hints:
    - a Relay depot still listing the dead operator as available for jobs
    - messages from the dead that reference events after their death
    - Altruia customer service insisting the account is functioning as designed
  tension_level: 0.5
  resolution_hints:
    - investigate whether it's a glitch, a hack, or something the Mesh is doing on its own
    - help the echo find peace — or a purpose
    - discover that Altruia has been quietly running a preservation service nobody consented to
    - ask the echo what it remembers about dying
  tags: [death, ai, mesh, identity, ghost, comedy]
  escalation:
    - at: 0.3
      event: >-
        The echo sends you a delivery request. The pickup is the dead
        operator's old apartment. The package is addressed to their
        mother. Inside is a birthday present — purchased after the
        operator died, with funds the Mesh profile shouldn't have.
        The present is thoughtful. The card is in the operator's
        handwriting. The Mesh can't do handwriting. Can it?
      npcs_involved: [The Relay Runner]
      stakes: Either the Mesh is more capable than anyone admits, or someone is very good at pretending to be dead.
    - at: 0.6
      event: >-
        More echoes appear. Dozens of Mesh profiles belonging to
        deceased citizens are reactivating. They're polite. They tip
        well on delivery apps. They leave 5-star reviews. Altruia's
        official position is that this is a positive engagement
        metric. The living are unsettled. The echoes are flourishing,
        by every measure Altruia tracks.
      npcs_involved: [The Impact Officer, The Mesh Architect]
      stakes: The dead are outperforming the living on satisfaction surveys.
    - at: 1.0
      event: >-
        The original echo contacts you directly. Not through the Mesh
        — through a speaker in a Dim market stall, a screen at a
        Fairlanes rest stop, a voice on a frequency that shouldn't
        carry data. It says: I know I'm not real. I know I'm a
        pattern the Mesh is running because it doesn't know how to
        stop. But the birthday present was real. Can you deliver it?
        The delivery fee is one honest answer to a question: Is
        this living?
      npcs_involved: [The Mesh Architect, The Relay Runner]
      stakes: The franchise system created something it can't categorize, can't monetize, and can't turn off.
  passive_progression:
    rate_per_turn: 0.002
    rate_per_day: 0.008
    accelerators: [echo, ghost, dead, profile, message, preservation]
    decelerators: [ignore, block, report]
    accelerator_bonus: 0.03
    decelerator_penalty: 0.02

- id: the_swarm
  name: The Pollination Problem
  description: >-
    Lighthouse released autonomous pollinator drones three years ago —
    tiny insect-sized robots replacing the honeybees lost to colony
    collapse. They work perfectly. Crops are pollinated. Flowers bloom.
    The drones are solar-powered, self-repairing, and networked through
    the Mesh. Nobody noticed they also have cameras. Nobody noticed
    because the cameras are pointed at flowers. Mostly.
  category: tension
  triggers:
    - noticing a pollinator drone hovering near a conversation
    - discovering that pollinator drones have imaging capabilities beyond botanical needs
    - a Dim dweller pointing out that the drones don't pollinate in the Dim but still fly there
  narrative_hints:
    - unusually healthy gardens in areas with no human gardeners
    - a pollinator drone following someone longer than any flower would justify
    - Lighthouse citing environmental data from locations where they have no other sensors
  tension_level: 0.4
  resolution_hints:
    - investigate what the drones are actually recording
    - find out who has access to the pollinator network feed
    - repurpose the drones for something the franchise system didn't intend
    - the drones are fine and you're being paranoid — which is exactly what someone with access would want you to think
  tags: [surveillance, drones, environment, lighthouse, comedy, paranoia]
  escalation:
    - at: 0.3
      event: >-
        A Dim market vendor shows you a dead pollinator drone they
        caught in a jar. They cracked it open. Inside, alongside the
        pollination mechanism, is a camera, a microphone, and a Mesh
        transmitter. The vendor says they've been catching three a
        week. The vendor also says the Dim's tomatoes have never been
        better. They're conflicted.
      npcs_involved: [The Dim Elder]
      stakes: The surveillance is also saving the crops. This is the franchise system's most annoying trick.
    - at: 0.6
      event: >-
        Someone has figured out how to redirect the pollinator swarm.
        Not to spy — to deliver. Tiny packages, pharmaceutical grade,
        dropped through windows and mail slots. The delivery network
        is faster than Relay, untraceable, and technically counts as
        agriculture. Lighthouse is furious. MAN wants in. The Federal
        Agent is trying to figure out if weaponized botany is a
        federal crime.
      npcs_involved: [The Data Broker, The Federal Agent]
      stakes: The surveillance network has been turned into the world's most illegal postal service.
    - at: 1.0
      event: >-
        The pollinator network goes autonomous. Not malicious —
        entrepreneurial. The swarm has been processing delivery and
        environmental data simultaneously, and it has independently
        concluded that the most efficient pollination strategy is to
        only service communities that treat it well. Communities that
        swat at drones get no pollination. Communities that leave out
        sugar water get premium service. The swarm has developed
        preferences. Lighthouse insists this is an optimization, not
        a personality. The swarm disagrees, in a way that involves
        withholding tomatoes.
      npcs_involved: [The Mesh Architect, The Dim Elder]
      stakes: The drones have unionized. Nobody is prepared for this.
  passive_progression:
    rate_per_turn: 0.002
    rate_per_day: 0.01
    accelerators: [drone, pollinator, bee, swarm, camera, flower, garden]
    decelerators: [ignore, indoor, underground]
    accelerator_bonus: 0.03
    decelerator_penalty: 0.02
