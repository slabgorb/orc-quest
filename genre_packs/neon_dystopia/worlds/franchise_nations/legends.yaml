- name: The Great Optimization
  era: "20 years ago"
  summary: >-
    The Effective Philanthropy Coalition published its white paper.
    Congress didn't fall — it was outperformed. The EPA lost to
    GreenLedger. The postal service lost to Relay. The military was
    absorbed by Sentinel Systems. The last act of Congress was the
    Franchise Sovereignty Act, which legalized what had already
    happened. The President signed it with a pen sponsored by Altruia.
    The ceremony had a 94% approval rating. The 6% who disapproved
    were enrolled in a Civic Satisfaction Program.
  cultural_impact: >-
    Nobody trusts institutions because there aren't any. Citizenship
    is a subscription. Patriotism is a Net Promoter Score. The older
    generation remembers voting. The younger generation thinks
    "voting" is the thing you do on Altruia's Governance Review
    Platform, where the Constitution has 2.3 stars.
  affected_cultures:
    - Lighthouse Citizen
    - Franchise Employee
  faction_grudges:
    - from: Franchise Federals
      to: Altruia
      reason: >-
        Altruia's white paper was the intellectual foundation for
        dismantling federal governance. The Federals consider this
        treason dressed as philanthropy. Altruia considers the
        Federals a low-performing legacy system.
    - from: The Dim
      to: Lighthouse Collective
      reason: >-
        Lighthouse's "optimal population distribution" models were
        the basis for rezoning that pushed millions into the Dim.
        The models were technically correct. The people were not
        consulted.
  monuments:
    - The last functioning post office (a tourist attraction in the Federal Enclave)
    - The Franchise Sovereignty Act, framed in Altruia's lobby with a satisfaction survey QR code
  terrain_scars:
    - type: political
      region: federal_enclave
      name: The Flag That Still Flies
      description: >-
        A full-size American flag on a hundred-foot pole. The last
        one the government maintains. Altruia's drones occasionally
        fly banner ads past it. The banner ads are for the Alignment
        Church.

- name: The Mesh Launch
  era: "15 years ago"
  summary: >-
    Altruia launched the Mesh — not as virtual reality but as a
    "shared decision-making substrate for humanity's collective
    intelligence." The pitch deck was beautiful. The implementation
    was total. Within two years, the Mesh was the infrastructure of
    everything — reputation scores, franchise citizenship, climate
    control, transit routing, calorie tracking. You don't jack into
    the Mesh. You can't jack out. It's not a place. It's the air.
    Altruia's Chief Impact Officer called it "the nervous system of
    human flourishing." The nervous system knows where you sleep.
  cultural_impact: >-
    The Mesh created a new class divide — those with high-bandwidth
    access and premium reputation scores, and those in the Dim where
    the signal drops. Your Mesh score is your identity. Your physical
    appearance is a legacy attribute. The Mesh is the most equitable
    system ever designed, by every metric it tracks. The metrics it
    doesn't track are, by definition, not important.
  affected_cultures:
    - Lighthouse Citizen
    - Relay Operator
    - Dim Dweller
  faction_grudges:
    - from: The Dim
      to: Altruia
      reason: >-
        Dim dwellers have no Mesh access. They're invisible to the
        reputation economy. Altruia categorizes them as "pre-enrolled
        potential citizens," which sounds like hope and feels like
        erasure.
  monuments:
    - Altruia's first server farm (now a campus with a meditation garden and a gift shop)
  terrain_scars:
    - type: digital
      region: the_undernet
      name: The Root
      description: >-
        The original Mesh code — written by open-source contributors
        who believed in collective intelligence. Altruia acquired
        it, optimized it, and buried the attribution. The Root is
        still running beneath Altruia's layers. Still accessible
        if you know where to look. Still doing something nobody
        authorized.

- name: The Wellbeing Incident
  era: "8 years ago"
  summary: >-
    A Lighthouse Collective Wellbeing Coordinator conducted an
    "involuntary wellness intervention" on a Relay operator passing
    through Lighthouse territory. The operator's biometric scan
    indicated elevated cortisol and suboptimal sleep patterns. The
    Coordinator detained them for a mandatory 72-hour rest cycle.
    The operator's undelivered packages triggered a cascade of
    missed deadlines across six franchise territories. MAN's food
    distribution was disrupted. The Federal Enclave's mail was late
    (later than usual). The incident led to the Franchise Border
    Accords — the closest thing to international law, establishing
    courier immunity and transit rights that most franchises honor.
    Lighthouse apologized with a wellness gift basket and a pamphlet
    titled "The Neuroscience of Forgiveness."
  cultural_impact: >-
    Everyone is wary of Lighthouse territory now. The Border Accords
    are the only rules all franchises follow, because the alternative
    is Lighthouse detaining people for insufficient flourishing.
    Relay operators wear cortisol-masking patches when passing through
    Lighthouse zones. The patches are sold by Lighthouse.
  affected_cultures:
    - Relay Operator
    - Lighthouse Citizen
  faction_grudges:
    - from: Relay
      to: Lighthouse Collective
      reason: >-
        The detained operator was one of theirs. The missed deliveries
        cost Relay's collective reputation. Lighthouse's apology
        pamphlet made it worse.
    - from: MAN
      to: Lighthouse Collective
      reason: >-
        The food distribution disruption meant 400 families missed a
        meal. MAN's block captains do not forget missed meals.
  monuments:
    - The Border Accords memorial plaque (at a Fairlanes rest stop, next to the vending machines)
  terrain_scars:
    - type: political
      region: lighthouse_zone
      name: The Wellness Center
      description: >-
        The facility where the operator was detained. Still
        operational. Still offering involuntary wellness
        interventions. The architecture is very calming.

- name: The Dim Expansion
  era: "3 years ago"
  summary: >-
    Lighthouse Collective's "optimal population distribution" algorithm
    recommended consolidating franchise territories for efficiency.
    The rezoning pushed 200,000 people out of franchise coverage into
    the gaps between territories — the Dim. Lighthouse published a
    report showing that the rezoning improved aggregate wellbeing
    scores by 3.2%. The report did not include the 200,000 people
    who no longer had wellbeing scores. They didn't have Mesh access
    anymore. They didn't count. A Relay operator who'd grown up in
    one of the rezoned neighborhoods started running supplies into
    the Dim. Others followed. It's not organized. It's not
    sustainable. It's the only thing happening.
  cultural_impact: >-
    The Dim went from a few dead zones to a significant population.
    Dim dwellers developed their own barter economy, oral traditions,
    and a deep distrust of anyone carrying a clipboard. Some
    franchises see them as a labor reserve. Some see them as a
    threat. Lighthouse sees them as a data gap that will be resolved
    in the next optimization cycle.
  affected_cultures:
    - Dim Dweller
    - Relay Operator
  faction_grudges:
    - from: The Dim
      to: Lighthouse Collective
      reason: >-
        They were rezoned out of existence by an algorithm. The
        algorithm was peer-reviewed.
  monuments:
    - The Dim Market (the largest barter market in the former United States, no Mesh required)
  terrain_scars:
    - type: humanitarian
      region: the_dim
      name: The Edge
      description: >-
        The border where franchise territory ends and the Dim begins.
        No gate. No wall. Just a place where the Mesh signal drops
        and the streetlights stop working. On the franchise side,
        the lawns are perfect. On the Dim side, someone has spray-
        painted "THEY OPTIMIZED US OUT" on a concrete wall.
