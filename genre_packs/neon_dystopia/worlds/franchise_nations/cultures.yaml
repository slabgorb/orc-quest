# Franchise Nations cultures — names reflect corporate idealism
# and the absurdity of optimized citizenship

- name: Lighthouse Citizen
  description: >-
    Lighthouse Collective citizens. Names are algorithmically
    assigned at enrollment for "optimal phonemic distinctiveness."
    Most people keep their birth names as a private nickname.
    Official names tend toward the aspirational and vaguely Nordic.
  slots:
    given_name:
      corpora:
        - corpus: finnish.txt
          weight: 0.4
        - corpus: english.txt
          weight: 0.4
        - corpus: french.txt
          weight: 0.2
      lookback: 3
    family_name:
      corpora:
        - corpus: finnish.txt
          weight: 0.3
        - corpus: english.txt
          weight: 0.5
        - corpus: french.txt
          weight: 0.2
      lookback: 3
    title:
      word_list: [Coordinator, Facilitator, Wellbeing Lead, Safety Liaison, Impact Analyst, Flourishing Director, Nudge Architect]
    place_noun:
      word_list: [campus, commons, atrium, hub, sanctuary, greenhouse, garden]
    adjective:
      word_list: [serene, optimal, flourishing, verdant, aligned, mindful, resilient]
  person_patterns:
    - "{given_name} {family_name}"
    - "{title} {family_name}"
  place_patterns:
    - "{adjective} {place_noun}"
    - "{family_name} {place_noun}"

- name: MAN Resident
  description: >-
    Mutual Aid Network community members. Names are whatever you
    showed up with. The culture is warm, polyglot, and slightly
    too familiar — everyone knows your name, your schedule, and
    your Community Contribution Score.
  slots:
    given_name:
      corpora:
        - corpus: english.txt
          weight: 0.3
        - corpus: french.txt
          weight: 0.2
        - corpus: hungarian.txt
          weight: 0.2
        - corpus: polish.txt
          weight: 0.15
        - corpus: finnish.txt
          weight: 0.15
      lookback: 3
    family_name:
      corpora:
        - corpus: english.txt
          weight: 0.3
        - corpus: french.txt
          weight: 0.3
        - corpus: hungarian.txt
          weight: 0.2
        - corpus: polish.txt
          weight: 0.2
      lookback: 3
    title:
      word_list: [Neighbor, Block Captain, Volunteer, Community Elder, Kitchen Lead, Safety Vest, First Responder]
    place_noun:
      word_list: [kitchen, clinic, commons, block, hall, pantry, workshop]
    adjective:
      word_list: [shared, open, free, community, neighborhood, mutual, together]
  person_patterns:
    - "{given_name} {family_name}"
    - "{title} {given_name}"
  place_patterns:
    - "The {adjective} {place_noun}"
    - "{given_name}'s {place_noun}"

- name: Relay Operator
  description: >-
    Independent couriers and logistics contractors. Names are
    handles — part callsign, part brand. Most operators haven't
    used their legal name in years. The Mesh knows them by their
    reputation score; the Fairlanes know them by their silhouette.
  slots:
    given_name:
      corpora:
        - corpus: english.txt
          weight: 0.6
        - corpus: french.txt
          weight: 0.2
        - corpus: finnish.txt
          weight: 0.2
      lookback: 2
    family_name:
      word_list: [Razor, Switch, Drift, Axle, Spoke, Volt, Throttle, Circuit, Bypass, Clutch, Torque, Swerve, Gauge, Piston, Crank]
    title:
      word_list: [Runner, Rider, Driver, Operator, Courier]
    place_noun:
      word_list: [stop, waypoint, depot, garage, rest, cache, drop]
    adjective:
      word_list: [last, fast, free, open, dead, live, hot]
  person_patterns:
    - "{given_name} '{family_name}'"
    - "'{family_name}'"
  place_patterns:
    - "The {adjective} {place_noun}"
    - "{family_name}'s {place_noun}"

- name: Dim Dweller
  description: >-
    People living in the unmonitored gaps. No franchise affiliation,
    no Mesh score, no algorithmic name assignment. Just names —
    passed down, chosen, borrowed, or stolen. The last people on
    the continent who introduce themselves without a title.
  slots:
    given_name:
      corpora:
        - corpus: english.txt
          weight: 0.3
        - corpus: french.txt
          weight: 0.2
        - corpus: hungarian.txt
          weight: 0.2
        - corpus: polish.txt
          weight: 0.15
        - corpus: finnish.txt
          weight: 0.15
      lookback: 3
    family_name:
      corpora:
        - corpus: english.txt
          weight: 0.3
        - corpus: french.txt
          weight: 0.3
        - corpus: hungarian.txt
          weight: 0.2
        - corpus: polish.txt
          weight: 0.2
      lookback: 3
    title:
      word_list: [Elder, Doc, Chief, Sister, Brother, Old, Boss]
    place_noun:
      word_list: [camp, squat, shelter, market, yard, pit, hollow]
    adjective:
      word_list: [old, dark, lost, free, dead, last, quiet]
  person_patterns:
    - "{given_name} {family_name}"
    - "{title} {given_name}"
  place_patterns:
    - "The {adjective} {place_noun}"
    - "{given_name}'s {place_noun}"
