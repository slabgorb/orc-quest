world_name: Franchise Nations

starting_region: the_fairlanes

map_style: >-
  Corporate franchise map, clean vector graphics, color-coded territory
  zones, logo-marked borders, highway system in bold lines, Mesh
  coverage heat map overlay, satirical branding everywhere, dead zones
  in grey where the Mesh drops

map_resolution: [1920, 1080]

regions:
  the_fairlanes:
    name: The Fairlanes
    description: >-
      The highway system — the only true neutral ground. Operated by
      a consortium that charges by the mile and enforces traffic law
      with autonomous drones. The Fairlanes connect every franchise
      territory and belong to none of them. Relay operators race along
      the margins. Armed convoys roll through at night. The rest stops
      are franchise neutral zones where anything can be bought, sold,
      or arranged — and where the vending machines accept every
      franchise's loyalty currency at criminally bad exchange rates.
    adjacent: [lighthouse_zone, man_district, altruia_campus, federal_enclave, the_burbs, the_port, the_dim]

  lighthouse_zone:
    name: Lighthouse Zone
    description: >-
      Lighthouse Collective territory. Glass and bamboo architecture.
      Biometric gates. Air that smells faintly of lavender because it's
      pumped through the ventilation to "reduce ambient cortisol." The
      safest, healthiest, most surveilled place on Earth. Crime is near
      zero. So is privacy. Citizens wear wellness badges that track
      heart rate, sleep quality, and "social flourishing metrics."
      Everything is very calm. The calm is mandatory. Exits are clearly
      marked but somehow never where you remember them being.
    adjacent: [the_fairlanes, altruia_campus, the_burbs]

  man_district:
    name: MAN District
    description: >-
      Mutual Aid Network territory. Dense, loud, and smelling of
      whatever the community kitchen is making today. Block parties
      every Friday. Free clinics. Volunteer safety patrols in yellow
      vests. It feels like community because it was community, before
      it scaled. The contribution tracking boards on every corner are
      new. The armed delivery drivers are new. The warmth is genuine.
      The obligation is also genuine. MAN's motto: "Nobody waits for
      help." This is a promise and a warning.
    adjacent: [the_fairlanes, the_burbs, the_port]

  altruia_campus:
    name: Altruia Campus
    description: >-
      The mothership. Server farms, impact offices, and the Mesh
      infrastructure that runs the world. The campus looks like a
      university designed by someone who learned about universities
      from stock photography — open plan, sun-drenched, with a
      meditation garden and a gift shop that sells branded journals
      titled "My Flourishing Journey." Most employees live on campus.
      Most believe, with absolute sincerity, that your data is making
      the world better. They're not wrong. By every metric they track.
    adjacent: [the_fairlanes, lighthouse_zone, the_undernet]

  the_burbs:
    name: The Burbs
    description: >-
      Suburban franchise enclaves — gated communities run by competing
      brands. Each burb has its own security, its own compliance
      standards, and its own approved list of products, services, and
      emotional expressions. Crossing from one burb to another requires
      ID and compatibility with the destination's brand values. The
      lawns are perfect. The residents are medicated. The security is
      armed and smiling.
    adjacent: [the_fairlanes, lighthouse_zone, man_district, federal_enclave]

  federal_enclave:
    name: The Federal Enclave
    description: >-
      What remains of the United States government — a few square
      blocks of underfunded offices that no franchise wanted. The flag
      still flies. The buildings need paint. The agents carry real
      federal badges and genuine legal authority that Lighthouse's
      lawyers find "quaint." The cafeteria serves government-surplus
      food. The parking lot is half empty. It's either the last hope
      for democratic governance or the world's saddest office park.
      Occasionally both.
    adjacent: [the_fairlanes, the_burbs]

  the_port:
    name: The Port
    description: >-
      Container terminals, warehouses, and the edge of the ocean where
      the Dim's coastal settlements are visible — people living in
      shipping containers and boat hulls. The port is technically
      franchise neutral, which means it's controlled by whoever has
      the most guns this week. Relay operators, MAN volunteers, and
      franchise recruiters all work the docks. The recruiters have
      pamphlets. The pamphlets have very small print.
    adjacent: [the_fairlanes, man_district]

  the_dim:
    name: The Dim
    description: >-
      Not a territory — an absence. The gaps between franchise zones
      where the Mesh signal drops, the streetlights stop working, and
      the optimization algorithms have nothing to optimize. Some people
      live here because they fell through the system. Some chose to.
      There's a barter market. There are oral histories. There's
      spray paint on the walls that says things the Mesh would flag
      for "negative sentiment." It's the only place in the former
      United States where nobody is measuring your flourishing.
    adjacent: [the_fairlanes, the_port]

  the_undernet:
    name: The Undernet
    description: >-
      Not a physical location — a layer of the Mesh that Altruia
      doesn't officially acknowledge. Unauthorized access points,
      data markets, and processing spaces that exist outside franchise
      jurisdiction. Below the Undernet is the Root — the original
      open-source code that Altruia built on and buried. The Root is
      still running. The Root is doing something. The Undernet is
      where people go to find out what.
    adjacent: [altruia_campus]

routes:
  - from_id: the_fairlanes
    to_id: lighthouse_zone
    name: Exit 23 — Lighthouse Collective
    distance: short
    danger: safe
    description: >-
      The cleanest off-ramp you've ever seen. The air changes at the
      border — literally, the ventilation system kicks in. A Wellbeing
      Coordinator waves you through with a smile. The smile is
      protocol. The biometric scan is automatic.

  - from_id: the_fairlanes
    to_id: man_district
    name: Exit 17 — MAN District
    distance: short
    danger: safe
    description: >-
      Take the exit, smell the cooking. A volunteer in a yellow vest
      checks your ID. They're friendly. They remember your name from
      last time. They remember everyone's name. That's their job.

  - from_id: the_fairlanes
    to_id: altruia_campus
    name: Altruia Interchange
    distance: medium
    danger: safe
    description: >-
      Follow the Mesh-projected wayfinding. The road gets smoother.
      The recommendations get more personal. By the time you arrive,
      the campus has prepared a visitor wellness profile for you.
      You didn't ask for one.

  - from_id: the_fairlanes
    to_id: the_burbs
    name: Burb Ring Road
    distance: medium
    danger: safe
    description: >-
      A ring of exits, each one leading to a different branded
      suburb. The gates are automatic. The brand compatibility
      check is not.

  - from_id: the_fairlanes
    to_id: the_port
    name: Harbor Highway
    distance: long
    danger: moderate
    description: >-
      South to the coast. The franchise territories thin out. The
      Mesh signal weakens. The last mile is unbranded and smells
      like salt water and diesel.

  - from_id: the_fairlanes
    to_id: the_dim
    name: The Off-Ramp to Nowhere
    distance: medium
    danger: moderate
    description: >-
      Not an official exit. The Fairlane navigation doesn't show it.
      But there's a gap in the guardrail where the franchise territory
      ends and the streetlights stop. Relay operators know it. The
      Mesh doesn't.

  - from_id: man_district
    to_id: the_port
    name: The Supply Line
    distance: medium
    danger: moderate
    description: >-
      MAN runs food distribution to the port. The yellow-vest
      convoys move through franchise gaps with an authority that
      isn't legal but isn't challenged. Don't get between a MAN
      truck and a hungry neighborhood.

  - from_id: altruia_campus
    to_id: the_undernet
    name: Root Access
    distance: short
    danger: dangerous
    description: >-
      Not a physical route — a Mesh exploit. Find an unpatched
      access point, bypass the reputation checks, and drop below
      Altruia's optimization layer. What's down there is older than
      the franchise system and doesn't care about your wellness score.
