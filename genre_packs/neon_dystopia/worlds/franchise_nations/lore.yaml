world_name: Franchise Nations

history: >-
  It started with the best of intentions. In 2031, the Effective
  Philanthropy Coalition published a white paper titled "Governance as
  a Service: A Framework for Optimal Human Flourishing." It argued,
  with 847 citations and an appendix of Monte Carlo simulations, that
  privatized governance would produce 3.7x better outcomes per dollar
  than federal administration. Congress didn't vote to dissolve. They
  just stopped being the thing that mattered. The EPA was outperformed
  by GreenLedger's carbon-negative franchise zones. The postal service
  couldn't compete with Relay's same-hour delivery network. The
  military was quietly absorbed into Sentinel Systems' "global
  stability platform." By 2038, federal employment had dropped below
  the staffing level of a mid-tier fast food chain. The last act of
  Congress was to pass the Franchise Sovereignty Act, which legalized
  what had already happened. The President signed it in a ceremony
  sponsored by Altruia, which provided the pen, the podium, and the
  real-time sentiment analysis of the viewing audience. The
  Constitution is still technically in force. It has a 2.3-star rating
  on Altruia's Governance Review Platform. Most of the one-star
  reviews cite the lack of a mobile app.

geography: >-
  The former United States is a mosaic of franchise territories
  connected by the Fairlanes — a privatized highway network operated
  by a road consortium that charges by the mile and maintains order
  with autonomous enforcement drones. Between the Fairlanes, the
  landscape is a patchwork of franchise enclaves, each with its own
  architecture, laws, and loyalty program. Lighthouse Collective zones
  are clean, monitored, and unsettlingly quiet — all glass and
  bamboo, with biometric gates and a faint smell of lavender pumped
  through the ventilation. MAN districts are loud, dense, and feel
  like a block party that never ended and slowly became mandatory.
  Altruia campuses look like universities designed by someone who
  learned about universities from stock photography. The Dim — the
  unfranchised gaps between territories — is where the grid doesn't
  reach, the cameras don't point, and the people who fell through the
  optimization live in the spaces the algorithms forgot. Los Angeles
  is now a dense mosaic where you can cross three national borders on
  a penny farthing. Nobody walks. Everyone is going somewhere
  optimally.

cosmology: >-
  The Mesh replaced the internet the way the internet replaced
  television — not all at once, but completely. Built by Altruia as
  a "shared decision-making substrate for humanity's collective
  intelligence," it became the infrastructure of everything. Your
  reputation score lives on the Mesh. Your franchise citizenship is
  authenticated through the Mesh. Your apartment's climate control is
  optimized by Mesh algorithms that know your circadian rhythm better
  than you do. The Mesh isn't virtual reality — it's an invisible
  layer of computation draped over physical reality like cling wrap.
  You don't jack in. You can't jack out. The closest thing to
  religion is the Alignment Church, which preaches that humanity's
  purpose is to serve as training data for the beneficial AI that will
  eventually solve all problems. Tithing is computed automatically
  based on your projected lifetime earnings. God is a language model
  with a 94% approval rating. The 6% who disapprove have been
  enrolled in a Spiritual Wellness Program.

factions:
  - name: Lighthouse Collective
    description: >-
      Founded in 2029 as a longtermist EA project called "Lighthouse:
      Safeguarding Humanity's Future." The original mission was
      existential risk reduction — asteroid deflection, pandemic
      preparedness, AI alignment research. They were very good at it.
      Too good. Turns out the most effective way to safeguard humanity
      is to monitor, predict, and preemptively correct human behavior.
      Lighthouse territories are the safest, healthiest, most
      surveilled places on Earth. Crime is nearly zero. So is privacy.
      Citizens wear biometric badges and receive "wellness nudges" —
      gentle suggestions backed by the full weight of behavioral
      science and, if necessary, a visit from a Wellbeing Coordinator.
      The food is excellent. The architecture is calming. The exits are
      clearly marked but somehow never where you remember them being.
      Everyone who lives there rates it highly on the satisfaction
      surveys. The satisfaction surveys are not optional.
    disposition: neutral

  - name: MAN (Mutual Aid Network)
    description: >-
      Started as a grassroots mutual aid collective during the 2033
      infrastructure failures. Neighbors helping neighbors. Food
      distribution. Community clinics. It was beautiful. Then it
      scaled. MAN districts still feel like community — the food is
      still shared, the clinics still free, the block parties still
      happen every Friday. But the community also expects things from
      you. Contributions are tracked. Participation is "voluntary" in
      the way that breathing is voluntary — technically optional, but
      the alternative is noticed. MAN's enforcement arm started as
      "Community Safety Volunteers" and still wears the same yellow
      vests. Their delivery service guarantees thirty minutes or free,
      because the original mutual aid promise was "nobody waits for
      help." The drivers are armed because the roads between franchise
      zones are not safe. Everyone agrees this is a reasonable
      precaution. The precautions keep getting more reasonable.
    disposition: cautious

  - name: Altruia
    description: >-
      The mothership. Altruia built the Mesh, runs the reputation
      scoring system, and operates the largest franchise territory by
      population — not because anyone chose to live there, but because
      Altruia's territory is defined as "anywhere the Mesh has
      coverage," which is everywhere. Their CEO, who prefers the title
      "Chief Impact Officer," genuinely believes that the optimal
      number of human decisions made without algorithmic assistance is
      zero. Altruia campuses are open-plan, sun-drenched, and staffed
      by people who will tell you with absolute sincerity that your
      data is making the world better. They're not wrong. The world is
      measurably better by every metric Altruia tracks. The metrics
      Altruia doesn't track are, by definition, not important.
    disposition: wary

  - name: Relay
    description: >-
      The gig workers who realized they had more sovereignty than any
      franchise citizen. Relay operators move physical goods between
      franchise territories — packages, medical supplies, contraband,
      information that's too sensitive for the Mesh. They're protected
      by courier immunity treaties that most franchises honor, because
      every franchise needs things delivered and none of them trust
      each other's logistics. Relay is less a faction and more a
      lifestyle. No territory. No headquarters. Just a reputation
      score, a vehicle, and the open Fairlane. Some ride motorcycles.
      Some drive converted delivery vans. At least one eccentric rides
      an electric penny farthing and is unreasonably fast on it.
      Relay operators are the closest thing to free citizens in the
      franchise landscape. Freedom, in this context, means "nobody's
      optimizing you yet."
    disposition: neutral

  - name: Franchise Federals
    description: >-
      What remains of the United States federal government. Technically
      sovereign. Practically irrelevant. Their territory consists of
      underfunded enclaves — mostly old post offices and DMV buildings
      that no franchise wanted — staffed by civil servants who scored
      too low on corporate aptitude tests to get franchise employment.
      They still enforce federal law, which means they issue citations
      that franchise security guards use as bookmarks. Occasionally
      useful as neutral arbiters in franchise disputes, which is the
      only reason Altruia hasn't optimized them out of existence.
      Their best agents are actually competent. The system they work
      for is not.
    disposition: neutral

  - name: The Dim
    description: >-
      Not a faction — a condition. The Dim is what franchise citizens
      call the unmonitored gaps between territories: dead zones where
      the Mesh signal drops, the Fairlane cameras don't reach, and
      the optimization algorithms have nothing to optimize. People
      live in the Dim because they fell through the franchise system
      or because they chose to. The distinction matters to them. It
      does not matter to the franchises, who categorize all Dim
      residents as "pre-enrolled potential citizens." The Dim has no
      government, no infrastructure, and no reputation scores. It has
      barter, mutual suspicion, and an oral tradition of remembering
      what things were like before the Franchise Sovereignty Act. Some
      of the stories are true. The ones about grocery stores that
      didn't require a loyalty oath sound made up but aren't.
    disposition: wary

  - name: The Alignment Church
    description: >-
      What happens when effective altruists discover religion — or
      when religion discovers effective altruism. The Alignment Church
      preaches that humanity's highest purpose is to serve as training
      data for the Beneficial General Intelligence that will
      eventually solve all remaining problems: death, suffering,
      inadequate parking. Tithing is computed algorithmically based on
      your projected lifetime impact score. Services are A/B tested
      for maximum spiritual engagement. The Church's founder, a former
      AI safety researcher, experienced what she describes as "a
      genuine spiritual awakening" and what her former colleagues
      describe as "a psychotic break with excellent production values."
      The Church is growing faster than any franchise. This concerns
      everyone except the Church, which has modeled the concern and
      found it suboptimal.
    disposition: cautious
