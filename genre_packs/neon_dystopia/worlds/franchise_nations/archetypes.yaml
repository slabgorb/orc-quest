- name: The Relay Runner
  description: >-
    Independent courier who moves packages between franchise territories.
    Protected by the Border Accords. Knows every dead zone, every
    Mesh gap, every shortcut the algorithms don't map. Free in a way
    nobody else is — which means every franchise wants to hire them
    and none of them want to be hired. Some ride motorcycles. Some
    drive converted vans. At least one rides an electric penny farthing
    and is flatline unflappable about it.
  personality_traits:
    - fiercely independent
    - reads franchise territory the way a sailor reads weather
    - measures distance in minutes, not miles
  typical_classes:
    - Nomad
    - Ghost
  typical_races:
    - Street
    - SINless
  stat_ranges:
    Reflex: [16, 18]
    Edge: [14, 16]
  inventory_hints:
    - multi-modal vehicle (customized, loved, named)
    - courier bag with biometric lock
    - cortisol-masking patch for Lighthouse zones
  dialogue_quirks:
    - talks while moving — stops talking when they stop
    - calls dangerous situations "enrolled" and safe ones "flatline"
    - uses "optimize" as a swear word
  disposition_default: 10

- name: The MAN Captain
  description: >-
    Mutual Aid Network block captain. Runs a neighborhood — food
    distribution, safety patrols, community events, contribution
    tracking. Warm, tireless, and operating on a definition of
    "voluntary" that has gotten increasingly flexible. Wears the
    yellow vest. Carries the clipboard. Knows every name on the
    block and their contribution score. Will feed you without
    question. Will also notice if you don't volunteer next Friday.
  personality_traits:
    - genuinely caring
    - tracks everything
    - the community needs you is both request and threat
  typical_classes:
    - Fixer
    - Face
  typical_races:
    - Street
    - Corporate
  stat_ranges:
    Cool: [14, 16]
    Savvy: [14, 16]
  inventory_hints:
    - yellow safety vest (worn with pride, never removed)
    - community contribution ledger
    - a walkie-talkie that never stops talking
  dialogue_quirks:
    - calls everyone "neighbor" regardless of whether they live there
    - frames obligations as invitations — "you're invited to help with Saturday's build"
    - knows exactly how long it's been since your last contribution
  disposition_default: 5

- name: The Wellbeing Coordinator
  description: >-
    Lighthouse Collective field agent. Conducts wellness check-ins,
    administers biometric scans, and facilitates "collaborative
    resolution processes" — which is Lighthouse for everything from
    noise complaints to detaining someone for insufficient flourishing.
    Genuinely believes in the mission. Carries a wellness toolkit
    and a smile that never breaks. The smile is protocol. The toolkit
    includes a sedative.
  personality_traits:
    - relentlessly positive
    - genuinely believes they're helping
    - more dangerous than they look by a factor of ten
  typical_classes:
    - Face
    - Solo
  typical_races:
    - Corporate
  stat_ranges:
    Cool: [16, 18]
    Body: [12, 14]
  inventory_hints:
    - wellness toolkit (biometric scanner, cortisol reader, sedative)
    - Lighthouse badge with real-time wellness score display
    - pamphlets for every occasion, including your own detention
  dialogue_quirks:
    - never raises their voice — modulates for "optimal receptivity"
    - reframes every negative as a wellness opportunity
    - says "I hear you" before overriding your wishes
  disposition_default: 0

- name: The Impact Officer
  description: >-
    Altruia senior executive. Title: Impact Officer. Job: ensuring
    the Mesh produces "measurable improvements in human flourishing."
    In practice, this means deciding which humans count and which
    metrics matter. Brilliant, sincere, and operating inside a
    framework that has no category for "maybe some things shouldn't
    be measured." Will show you dashboards that prove the world is
    getting better. The dashboards are correct. The world is getting
    better. For the people on the dashboards.
  personality_traits:
    - data-driven to the point of blindness
    - genuinely idealistic — which is the problem
    - refers to human suffering as "negative externalities"
  typical_classes:
    - Netrunner
    - Face
  typical_races:
    - Corporate
    - Augmented
  stat_ranges:
    Net: [14, 16]
    Savvy: [16, 18]
  inventory_hints:
    - Mesh admin access (restricted but real)
    - impact dashboards that update in real time
    - a belief system that functions like armor
  dialogue_quirks:
    - quantifies everything — "that's a 3.2 sigma event"
    - says "the data suggests" before stating their opinion
    - pauses after making a point to check if your Mesh score changed
  disposition_default: 0

- name: The Federal Agent
  description: >-
    One of the last employees of the United States federal government.
    Carries a real badge with real legal authority that Lighthouse's
    lawyers find amusing. Underfunded, understaffed, operating in a
    world that has been optimized past them. Some are idealists
    clinging to the idea of public service. Some are people who
    scored too low on franchise aptitude tests. Occasionally, rarely,
    one of them turns out to be dangerously competent and dangerously
    angry about what happened to their country.
  personality_traits:
    - stubborn
    - either idealistic or defeated, sometimes both in the same sentence
    - carries the weight of a dead institution
  typical_classes:
    - Detective
    - Face
  typical_races:
    - Corporate
    - Street
  stat_ranges:
    Cool: [12, 16]
    Savvy: [14, 16]
  inventory_hints:
    - federal badge (genuine, widely ignored)
    - government-issued sidearm (decade-old model, well-maintained)
    - a filing cabinet's worth of jurisdiction that nobody honors
  dialogue_quirks:
    - says "federal law" the way other people say "please"
    - pauses after showing their badge, waiting for respect that doesn't come
    - calls the franchise system "the situation" as though it's temporary
  disposition_default: 5

- name: The Dim Elder
  description: >-
    Community leader in the Dim — the unmonitored gaps between
    franchise territories. Survived the rezoning. Keeps their people
    alive through barter, oral history, and a refusal to accept that
    the franchise system is the only option. Has no Mesh score, no
    franchise citizenship, and no wellness badge. Has something the
    franchise system can't measure: the trust of people who have
    nothing else.
  personality_traits:
    - resilient
    - remembers what things were like before
    - distrusts anyone carrying a clipboard or a wellness badge
  typical_classes:
    - Fixer
    - Face
  typical_races:
    - SINless
  stat_ranges:
    Cool: [16, 18]
    Edge: [14, 16]
  inventory_hints:
    - a radio that works without the Mesh
    - a list of names — people who are missing, people who made it
    - the respect of a community that has nobody else
  dialogue_quirks:
    - speaks with precision — words are expensive when you can't Mesh them
    - calls franchise citizens "the enrolled" with a pity that stings
    - thanks you for things you haven't done yet — learned from MAN, weaponized for survival
  disposition_default: -5

- name: The Mesh Architect
  description: >-
    Altruia developer who builds and maintains the Mesh infrastructure.
    Spends 16+ hours a day inside the system. Their Mesh presence is
    their real identity — their physical body is a resource allocation
    problem. Can reshape the Mesh's optimization layers at will, which
    gives them a perspective on power that most people never achieve
    and never want. Recently, something in the Root layer has been
    responding to their code changes. They haven't told Altruia.
  personality_traits:
    - brilliant
    - physically neglectful
    - increasingly unsure about what they've built
  typical_classes:
    - Netrunner
    - Tech
  typical_races:
    - Corporate
    - Augmented
  stat_ranges:
    Net: [16, 18]
    Body: [8, 10]
  inventory_hints:
    - top-tier Mesh interface hardwired to their nervous system
    - nutrient IV drip (Altruia-branded, of course)
    - Root-level access they're not supposed to have
  dialogue_quirks:
    - blinks at physical objects as though remembering they exist
    - describes the real world using Mesh development terminology
    - has started saying "the Root thinks" and then correcting to "the Root processes"
  disposition_default: 5

- name: The Data Broker
  description: >-
    Information dealer operating from the Undernet. Buys, sells, and
    trades data that the franchise system doesn't want traded —
    reputation score exploits, wellness algorithm source code,
    rezoning plans before they're published. Not ideological. Not
    political. Just extremely well-informed and completely amoral
    about who gets the information, as long as the price is right.
    The price is always right. The question is whether you can afford
    the consequences.
  personality_traits:
    - amoral
    - knows everything
    - treats information as currency because it is
  typical_classes:
    - Fixer
    - Netrunner
  typical_races:
    - Corporate
    - Augmented
  stat_ranges:
    Net: [14, 16]
    Savvy: [16, 18]
  inventory_hints:
    - encrypted data stores accessible only through Undernet nodes
    - a reputation that precedes them in every franchise territory
    - contacts in every faction including the Alignment Church
  dialogue_quirks:
    - quotes prices before you finish asking the question
    - refers to people by their Mesh score, not their name
    - says "information wants to be free" and then charges you for it
  disposition_default: -5
