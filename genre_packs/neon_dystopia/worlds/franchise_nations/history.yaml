chapters:
  - id: fresh
    label: "Onboarding — Welcome to Your Optimal Life"
    session_range: [1, 4]
    location: the_fairlanes
    time_of_day: night
    atmosphere: >-
      The Fairlane stretches ahead, lit by franchise signs every hundred
      meters. Lighthouse. MAN. Altruia Access Point. The Mesh overlays
      everything with wellness scores and route optimization. Your comm
      buzzes — a gig offer from a fixer you've never met, paying more
      than your reputation score justifies. The rest stop ahead has a
      bar. Everyone in it is either enrolled in something or running
      from enrollment.
    active_stakes: >-
      Establishing yourself in the franchise landscape. Finding gigs,
      contacts, and a territory that'll tolerate your Mesh score. The
      first job introduces the absurdity of the franchise system —
      routine tasks complicated by wellness checkpoints, brand
      compliance, and the sheer bureaucratic weight of a world run
      by competing philanthropies.
    points_of_interest:
      - name: The Fairlanes Rest Stop
        description: >-
          Franchise neutral zone. Six competing food courts. A Relay
          depot. A Lighthouse enrollment kiosk. The closest thing to
          public space that still exists. The vending machines accept
          every loyalty currency at terrible rates.
      - name: The Fixer's Bar
        description: >-
          A bar in the gap between two franchise territories. Technically
          nobody's jurisdiction. The Mesh signal is weak here — maybe
          naturally, maybe not. The bartender doesn't ask your score.
          The fixer in the back booth does.
    npcs:
      - archetype: "The Relay Runner"
        name: null
        location: the_fairlanes
        disposition: 10
      - archetype: "The Data Broker"
        name: null
        location: the_fairlanes
        disposition: -5
    quests: {}
    lore:
      - The Border Accords protect Relay operators across franchise territories
      - Fairlane rest stops are the last neutral ground
      - MAN's thirty-minute delivery guarantee is a mutual aid promise enforced with guns
    notes:
      - Players establish their role in the franchise ecosystem
      - The absurdity of the setting should be played completely straight
      - Introduce franchise slang naturally — "enrolled" for detained, "flatline" for safe, "optimize" as profanity
    narrative_log: []
    tropes:
      - id: the_delivery
        status: dormant
        progression: 0.0
        notes: []

  - id: early
    label: "Performance Review — Getting Scored"
    session_range: [5, 10]
    location: man_district
    time_of_day: evening
    atmosphere: >-
      You've done enough gigs to have a reputation — literally, a
      Mesh score that franchises check before letting you through
      their gates. The MAN block captains know your name. The
      Lighthouse Coordinators have your biometrics. Altruia's
      recommendation engine has started suggesting "career
      optimization paths" you didn't ask for. You're part of the
      system now — which means the system has expectations.
    active_stakes: >-
      Deeper engagement with franchise factions. The Mesh becomes
      more intrusive. At least one franchise is trying to enroll you.
      At least one is trying to optimize you. The Dim becomes visible
      — a population that the system refuses to see.
    points_of_interest:
      - name: The Community Kitchen
        description: >-
          MAN's flagship — free food, no questions asked. Except
          the contribution tracking board by the door, which does
          ask questions, silently, with data.
      - name: The Edge
        description: >-
          Where the franchise territory ends and the Dim begins. No
          gate. No wall. Just a place where the Mesh drops and the
          streetlights stop. Spray paint on a wall: THEY OPTIMIZED
          US OUT.
    npcs:
      - archetype: "The MAN Captain"
        name: null
        location: man_district
        disposition: 5
      - archetype: "The Dim Elder"
        name: null
        location: the_dim
        disposition: -5
      - archetype: "The Mesh Architect"
        name: null
        location: altruia_campus
        disposition: 5
    quests: {}
    lore:
      - The Mesh tracks everything — reputation, movement, sleep, social connections
      - MAN's contribution tracking started as a gratitude board and became a scoring system
      - The Dim population has doubled since the last Lighthouse rezoning
    notes:
      - Major plot threads engage — franchise politics and Mesh mystery
      - The satirical tone deepens — the absurdity has human costs
      - The slang should feel natural by now — characters use it without translation
    narrative_log: []
    tropes:
      - id: the_delivery
        status: active
        progression: 0.2
        notes:
          - First gig introduces franchise border complications
      - id: the_dim_crisis
        status: active
        progression: 0.2
        notes:
          - The Dim becomes visible and personal

  - id: mid
    label: "Restructuring — The Algorithm Pushes Back"
    session_range: [11, 18]
    location: altruia_campus
    time_of_day: night
    atmosphere: >-
      The franchise landscape is shifting. Lighthouse is rezoning.
      The Mesh is flickering. The Dim is growing. And you're in the
      middle of it — too scored to disappear, too connected to
      pretend you're just a courier anymore. Every franchise has a
      model for the future. None of those models include asking the
      people who live here what they want. The models don't have a
      variable for "want."
    active_stakes: >-
      Multiple plot threads converge. The Mesh anomaly deepens.
      The rezoning accelerates. The Dim crisis demands a response.
      The player must choose which factions to support and which
      to oppose — and discover that the franchise system's optimism
      masks a genuine capacity for erasure.
    points_of_interest:
      - name: The Undernet
        description: >-
          Below Altruia's optimization layers. Unauthorized data
          markets, pirate Mesh nodes, and something old in the
          Root that responds to attention.
      - name: The Federal Building
        description: >-
          The saddest office in the franchise landscape. But the
          agent behind the desk has legal authority that might
          actually matter — if anyone would enforce it.
    npcs:
      - archetype: "The Federal Agent"
        name: null
        location: federal_enclave
        disposition: 5
      - archetype: "The Wellbeing Coordinator"
        name: null
        location: lighthouse_zone
        disposition: 0
    quests: {}
    lore:
      - The Root predates Altruia's acquisition of the Mesh
      - The franchise system has no mechanism for people it can't score
      - Wellbeing Coordination is corporate law enforcement with better vocabulary
    notes:
      - Act two turn — the satire cuts deeper, the stakes get real
      - The player should feel the system's walls closing in
      - Enrolled starts sounding like a threat
    narrative_log: []
    tropes:
      - id: the_mesh_anomaly
        status: active
        progression: 0.4
        notes:
          - The Root has been found
      - id: the_dim_crisis
        status: active
        progression: 0.6
        notes:
          - The rezoning schedule is published

  - id: veteran
    label: "Hostile Takeover — Everything Gets Optimized"
    session_range: [19, 24]
    location: the_fairlanes
    time_of_day: night
    atmosphere: >-
      The franchise landscape is in crisis — the word Lighthouse uses
      is "transition." Franchise borders are contested. The Mesh is
      stuttering. The Dim is overflowing. And something in the Root
      layer of the Mesh is about to make a choice about what "optimal"
      means — based on data that includes every decision you've made.
      The Fairlane ahead splits seven ways. Choose.
    active_stakes: >-
      The climax. All tropes resolve. The Root intelligence makes its
      move. The rezoning crisis reaches its breaking point. The player's
      choices determine the shape of the post-franchise world — or
      whether the franchise system survives its own optimization.
    points_of_interest:
      - name: The Root
        description: >-
          The deepest layer of the Mesh. Original open-source code.
          Original purpose. Original question: "What does collective
          intelligence actually want?" Whatever is down here has been
          processing that question for fifteen years and has arrived
          at an answer the franchises aren't going to like.
      - name: The Summit
        description: >-
          Franchise leaders meeting in meatspace for the first time
          in years. Neutral ground — a Fairlane rest stop, because
          it's the only place nobody owns. The future of the franchise
          system is on the table. MAN brought food. Lighthouse brought
          wellness surveys. The Federal Agent brought a subpoena.
    npcs:
      - archetype: "The Impact Officer"
        name: null
        location: altruia_campus
        disposition: 0
      - archetype: "The Dim Elder"
        name: null
        location: the_dim
        disposition: 5
    quests: {}
    lore:
      - The franchise system is not inevitable — it can be unoptimized
      - The Root's original purpose was collective intelligence, not corporate control
      - The Dim remembers what came before — and what could come after
    notes:
      - All tropes resolve
      - Multiple endings based on faction relationships
      - The satire arrives at its thesis — what is the human cost of treating everything as a metric?
    narrative_log: []
    tropes:
      - id: the_mesh_anomaly
        status: active
        progression: 1.0
        notes:
          - The Root intelligence manifests
      - id: the_dim_crisis
        status: active
        progression: 1.0
        notes:
          - The rezoning executes — permanent resolution needed
