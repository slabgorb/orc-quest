name: Franchise Nations
slug: franchise_nations
description: >-
  The United States federal government didn't collapse. It was
  optimized away. Effective altruists calculated that government was
  the least efficient vehicle for human flourishing — and they were
  right, technically, in the way that a spreadsheet is technically
  correct when it recommends you stop feeding the unprofitable. What
  replaced it is a patchwork of franchise-states, each one founded on
  a beautiful mission statement and a Series D funding round. Every
  franchise genuinely believes it's saving the world. This is what
  makes them terrifying. The pizza still arrives in thirty minutes.
  The satisfaction survey afterwards is mandatory.

starting_location: the_fairlanes

axis_snapshot:
  chrome: 0.5
  corporate: 0.7
  satire: 0.9
