# Power Tiers — neon_dystopia
# Per-class visual descriptions at each level range.
# max_level: 10
#
# Classes from rules.yaml:
#   Netrunner, Solo, Fixer, Tech, Nomad, Face, Ghost

Netrunner:
  - level_range: [1, 3]
    label: script_kiddie
    player: >-
      oversized hoodie hiding a basic neural jack behind the ear, a
      beat-up laptop with sticker-covered case, a tangle of cables in
      a messenger bag, caffeine-stained fingers and bloodshot eyes from
      all-night sessions, cheap VR visor with cracked lens, the pale
      skin of someone who lives in the dark
    npc: >-
      basement hacker in energy-drink-stained clothing, three screens
      running simultaneously, a cheap neural interface with visible
      infection around the port, mostly downloads other people's exploits
  - level_range: [4, 6]
    label: decker
    player: >-
      tactical jacket with hidden cable ports and a custom cyberdeck
      mounted at the hip, proper cranial interface with clean chrome
      port, data goggles with real-time feed, fingers twitching with
      interface muscle memory, a compact sidearm for the real world,
      the thousand-yard stare of someone who sees two realities at once
    npc: >-
      professional netrunner with a portable cyberdeck in an armored
      case, clean neural interface with status LEDs, hired by corps
      and criminals alike, eyes unfocusing mid-conversation to check
      data feeds
  - level_range: [7, 9]
    label: ghost_in_the_machine
    player: >-
      custom-built cyberdeck integrated into a forearm housing, military-
      grade neural interface with redundant connections, AR overlay
      contacts showing data streams invisible to others, clothing lined
      with signal-blocking mesh, the detached calm of someone who is
      more comfortable in cyberspace than meatspace
    npc: >-
      legendary netrunner whose handle is spoken with reverence in the
      deep net, custom rig worth more than a corporate salary, multiple
      neural interfaces for parallel processing, a digital ghost that
      corps have bounties on
  - level_range: [10, 10]
    label: daemon
    player: >-
      full neural integration — the cyberdeck is internal, accessed by
      thought alone, eyes that shift to display mode involuntarily
      showing scrolling data, the ability to interface with any system
      by proximity, clothing that is itself a wearable computer,
      consciousness that spans physical and digital simultaneously,
      the most dangerous person in any room with a wireless signal

Solo:
  - level_range: [1, 3]
    label: muscle
    player: >-
      cheap ballistic vest under a surplus military jacket, a used
      handgun with filed-off serial numbers, combat boots and cargo
      pants, maybe a basic reflex booster visible as a lump under the
      forearm skin, the alert tension of someone who expects violence
      and isn't sure they'll win it
    npc: >-
      bouncer or low-level enforcer in a too-tight jacket, visible
      sidearm, basic subdermal armor showing as slightly unnatural
      skin texture, stands where told and hits who pointed at
  - level_range: [4, 6]
    label: operator
    player: >-
      armored jacket with concealed ballistic panels over a fitted
      bodysuit, proper combat sidearm in a quick-draw holster with
      smartgun link — glowing trace lines on the firing hand, visible
      reflex boosters as subdermal lines along the forearms, combat
      optics with targeting overlay, the controlled economy of movement
      of someone trained to kill efficiently
    npc: >-
      professional combat contractor in standardized tactical gear
      with employer patches, service weapon and backup, regulation
      cyberware package visible in the too-smooth movements, follows
      rules of engagement when paid to
  - level_range: [7, 9]
    label: razorgirl
    player: >-
      reactive armor that shifts with movement — matte black tactical
      suit with hardening panels, premium cyberware visible as polished
      chrome — retractable arm blades, targeting optics cycling through
      spectrums, subdermal armor as a faint hexagonal pattern, multiple
      weapon systems accessible in under a second, the lethal stillness
      of someone who is always the most dangerous person in the room
    npc: >-
      elite solo with a body count and a reputation, full combat
      cyberware suite — arm blades, sandevistan, kerenzikov, subdermal
      armor, a walking weapon platform that corporations hire for
      impossible jobs
  - level_range: [10, 10]
    label: reaper
    player: >-
      military-grade full body conversion — a combat chassis in a human
      silhouette, every limb containing weapon systems, armor that
      stops anti-materiel rounds, reflexes that process faster than
      unaugmented humans can perceive, the terrible calm of a precision
      instrument of violence that has never found its limit

Fixer:
  - level_range: [1, 3]
    label: hustler
    player: >-
      flashy street clothes that try too hard — knock-off designer,
      a cheap encrypted phone clutched constantly, a small pistol in
      an ankle holster, too much cologne covering the smell of desperation,
      a handful of business cards with a burner number, the nervous
      energy of someone juggling favors they can barely track
    npc: >-
      street-corner deal broker in imitation leather, a phone with
      three SIM cards, a list of contacts mostly stolen from someone
      bigger, arranges small jobs for a cut that barely covers rent
  - level_range: [4, 6]
    label: broker
    player: >-
      well-tailored street fashion that signals connected not corporate,
      multiple encrypted comms devices, a quality concealed weapon, an
      encrypted tablet with a contact database that is real currency,
      cufflinks that are data storage, the easy smile of someone who
      knows who needs what and takes a percentage of everything
    npc: >-
      established fixer with a regular booth at a known bar, armed
      bodyguard nearby, reputation for fair dealing and reliable crews,
      a network that spans three districts
  - level_range: [7, 9]
    label: kingpin
    player: >-
      designer clothing that costs what a solo earns in a month, subtle
      but premium cyberware — encrypted cranial comm, lie detector
      optics, subdermal armor for insurance, a weapon they rarely need
      to draw because they know people, a private booth in every club
      that matters, the power of someone who can get anything for anyone
    npc: >-
      legendary fixer whose name opens doors across the city, penthouse
      office with panoramic views, a network of operators at every level
      of society, makes one call and things happen
  - level_range: [10, 10]
    label: architect
    player: >-
      clothing that is understated because true power doesn't advertise,
      cyberware so premium it's invisible, a contact network that spans
      continents, multiple identities each with their own life, the
      quiet authority of someone who doesn't arrange jobs anymore —
      they arrange the people who arrange the jobs

Tech:
  - level_range: [1, 3]
    label: wrench
    player: >-
      grease-stained coveralls with pockets full of tools and parts, a
      basic multitool and a soldering wand, safety goggles pushed up
      on the forehead, burn marks on the forearms from close work, a
      jury-rigged repair on their own gear that actually works, the
      distracted look of someone always mentally disassembling things
    npc: >-
      chop-shop mechanic under a vehicle with a flashlight in teeth,
      tools spread on a dirty tarp, can fix anything with enough zip
      ties and cursing, charges in parts not credits
  - level_range: [4, 6]
    label: techie
    player: >-
      custom work vest with integrated tool holsters and a wrist-mounted
      diagnostic display, proper cyberware toolkit — precision fingers,
      magnification optics, a nano-fabricator on the belt, light armor
      with built-in component storage, the focused intensity of someone
      who sees the machine inside everything
    npc: >-
      corporate tech specialist with employer-provided toolkit, clean
      lab coat over practical clothing, certified to work on cyberware
      without voiding warranties, a workshop that smells of solder
      and ozone
  - level_range: [7, 9]
    label: artificer
    player: >-
      powered workspace exoskeleton with articulated tool arms, custom
      fabrication systems built into the forearm housings, diagnostic
      cyberware that can analyze any technology by touch, signature
      inventions that are one-of-a-kind, light power armor of their own
      design, the creative confidence of someone whose builds are art
    npc: >-
      legendary tech whose custom builds sell for six figures, a workshop
      full of prototypes that shouldn't work but do, hired by corps to
      solve the problems their own engineers can't, a drone escort of
      personal creations
  - level_range: [10, 10]
    label: prometheus
    player: >-
      a walking workshop — fabrication systems, diagnostic arrays, and
      repair drones all integrated into powered armor of their own
      design, the ability to interface with and improve any technology
      by touch, inventions that push the boundary of what's possible,
      followed by a cloud of helpful micro-drones, the god-complex
      of someone who can literally build the future

Nomad:
  - level_range: [1, 3]
    label: prospect
    player: >-
      road-worn denim and leather with clan patches still shiny and new,
      a beat-up vehicle with more rust than paint, a hunting rifle and
      a bowie knife, dust goggles and a bandana, sunburn and wind-chap,
      the eager restlessness of someone who just left the city behind
    npc: >-
      young nomad riding shotgun in a clan vehicle, borrowed weapons
      and hand-me-down leathers, still proving themselves to the pack,
      knows engines but not yet the road
  - level_range: [4, 6]
    label: road warrior
    player: >-
      broken-in armored leathers with earned clan patches and road
      trophies, a tuned vehicle that runs better than it looks, proper
      weapons — a combat shotgun and a machete, vehicle-mounted comms,
      goggles with night vision, the sun-darkened squint of someone
      who has driven through things cities only hear rumors about
    npc: >-
      clan convoy driver in road-tested armor, a vehicle modified for
      combat and long hauls, weapons mounted and personal, trusted to
      run the dangerous routes between settlements
  - level_range: [7, 9]
    label: pack alpha
    player: >-
      custom armored vehicle that is part home part fortress, premium
      road gear — reactive armor jacket, integrated comms and nav,
      a personal arsenal in the back seat, clan leadership markings
      earned through runs that became legends, a convoy of loyal
      vehicles following, the authority of someone who owns the road
    npc: >-
      clan chief in a war-rig surrounded by outriders, full armored
      convoy at their command, negotiates passage rights and trade
      deals for the pack, a legend of the highway
  - level_range: [10, 10]
    label: road king
    player: >-
      a legendary war-rig that is itself a mobile fortress — armored,
      armed, and self-sufficient, personal combat gear that rivals
      military spec, a clan of hundreds following across the wastes,
      the highway bending to accommodate their convoy, the mythical
      presence of someone the road belongs to

Face:
  - level_range: [1, 3]
    label: smooth talker
    player: >-
      decent street clothes chosen to blend into any crowd, a charming
      smile and a fake business card, a concealed holdout pistol and a
      backup story for every occasion, a cheap encrypted comm, the
      practiced body language of someone who learned to lie before they
      learned to walk
    npc: >-
      club promoter or low-level con artist in clothing just above
      their station, a winning smile and a talent for remembering names,
      no weapons visible because they talk faster than they shoot
  - level_range: [4, 6]
    label: operator
    player: >-
      tailored clothing that shifts from corporate to street depending
      on the meeting, subtle social cyberware — pheromone emitters,
      vocal modulator, micro-expression reader in the optics, a quality
      concealed weapon for when talking fails, multiple identities in
      the wallet, the effortless charm of someone who is always exactly
      who you need them to be
    npc: >-
      corporate negotiator or undercover operative in perfect attire
      for whatever role today requires, social cyberware suite calibrated
      for maximum influence, always remembers your name and your leverage
  - level_range: [7, 9]
    label: puppeteer
    player: >-
      clothing that is a weapon of social engineering — every detail
      chosen for psychological effect, premium social cyberware invisible
      to scanners, a network of identities each with credit history and
      social media presence, able to read and manipulate a room in
      minutes, a concealed weapon they've never had to use
    npc: >-
      legendary social engineer who has changed corporate policy through
      a dinner conversation, multiple lives running simultaneously in
      different social strata, it's unclear which face is the real one
  - level_range: [10, 10]
    label: masquerade
    player: >-
      a presence that reshapes social reality — every interaction
      calibrated by invisible social cyberware, multiple simultaneous
      identities across the social spectrum, the ability to walk into
      any room and own it within minutes, never needs weapons because
      they never need to be in danger, the terrifying power of someone
      who controls narrative itself

Ghost:
  - level_range: [1, 3]
    label: shadow
    player: >-
      nondescript clothing chosen to be forgettable — grey, generic,
      no logos, a basic signal-blocking sleeve for their comm, a compact
      weapon hidden where it won't print, cash only — no digital
      footprint, the cultivated invisibility of someone practicing
      the art of not existing
    npc: >-
      figure in the corner of the bar nobody remembers seeing arrive,
      clothing that defies description afterward, no comm signal, paid
      in cash for everything, the informant you can't describe to police
  - level_range: [4, 6]
    label: wraith
    player: >-
      stealth-optimized clothing with signal-dampening weave, optical
      camo patches that blur the silhouette, cyberware designed for
      evasion — dampened footfalls, thermal masking, a suppressed
      weapon that whispers, multiple clean IDs that pass deep scans,
      the practiced art of being in a room without being in the room
    npc: >-
      professional infiltrator in gear that security cameras can't
      quite resolve, moves through crowds like water, corporate
      facilities find evidence of visits but never footage
  - level_range: [7, 9]
    label: phantom
    player: >-
      full stealth suite — active camo that renders near-invisible,
      thermal baffling, acoustic dampening, signal void around the
      body like a walking dead zone, a weapon designed for single
      silent kills, multiple identities that are themselves ghosts,
      the unsettling presence of someone who can be anywhere and
      nowhere simultaneously
    npc: >-
      the operative corporations deny exists, suspected of impossible
      infiltrations, no confirmed photo or biometric record, a
      reputation built entirely on absence — things happen and no one
      was there
  - level_range: [10, 10]
    label: void
    player: >-
      a person who has perfected non-existence — technology and
      technique erasing every trace of their passage, active camo
      so complete they cast no shadow, no record in any database
      that isn't a deliberate plant, the existential paradox of
      someone whose greatest achievement is that no one can prove
      they exist
