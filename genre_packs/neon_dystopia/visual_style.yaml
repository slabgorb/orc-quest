# Visual style configuration for neon dystopia genre pack
#
# Controls how Flux image generation renders scenes for this genre.
# Neon dystopia visual identity: cyberpunk illustration with extreme
# contrast between darkness and saturated neon. Rain-slicked surfaces
# reflect holographic advertisements. Chrome, glass, and concrete
# dominate architecture. The upper city gleams; the lower city rots.
# Color palette anchors on cyan, magenta, and acid green against
# deep blacks and steel greys. Atmosphere is dense with rain, steam,
# and light pollution.

# ── Core Style ────────────────────────────────────────────────

positive_suffix: >-
  cyberpunk digital illustration, extreme neon lighting contrast,
  rain-slicked reflective surfaces, holographic advertisements,
  chrome and glass megastructures, dense atmospheric haze,
  cyan magenta and acid green color palette against deep blacks,
  cinematic composition with dramatic depth of field

negative_prompt: >-
  photorealistic, bright daylight, pastoral, fantasy, medieval,
  cheerful, cartoon, pixel art, watercolor, soft lighting,
  natural landscape, sunny, warm colors, vintage, sepia

preferred_model: flux

base_seed: 42

# ── Location Tag Overrides ────────────────────────────────────

visual_tag_overrides:
  street: >-
    rain-slicked megacity street at night, neon signs reflecting
    in puddles, holographic billboard advertisements cycling above,
    dense crowd with umbrellas and augmented visors, steam rising
    from subway grates, food cart with LED menu board
  bar: >-
    underground club behind an unmarked door, neon strip lighting
    in magenta and blue, chrome bar top with integrated drink
    dispensers, smoke machine haze, DJ booth with holographic
    mixing interface, patrons with visible cyberware
  office: >-
    corporate tower interior on the 90th floor, floor-to-ceiling
    smart glass with city panorama, holographic displays floating
    above a glass desk, sterile white surfaces, corporate logo
    projected on the wall, armed security at the elevator
  market: >-
    street market underneath a massive highway overpass, LED-lit
    stalls selling knockoff cyberware, drone delivery docks, jury-
    rigged power cables overhead, rain dripping through expansion
    joints, haggling in three languages
  clinic: >-
    back-alley ripperdoc clinic with a reclined surgical chair,
    harsh surgical lights on articulated arms, chrome surgical
    tools in sterile trays, wall of labeled cyberware in vacuum
    cases, biomonitor beeping softly, questionable license on wall
  alley: >-
    narrow gap between megabuildings barely wide enough for two,
    steam vents hissing from pipe clusters, flickering neon sign
    with missing letters, rain cascading from far above, graffiti
    tags and gang markers, a single security camera
  rooftop: >-
    megacity rooftop landing pad with skyline of corporate towers,
    flying vehicles in distant traffic lanes, rain and wind at
    altitude, antenna arrays and satellite dishes, city lights
    stretching to every horizon, clouds lit from below
  highway: >-
    elevated smart highway with autonomous traffic in sorted lanes,
    nomad convoy of armored vehicles in the breakdown lane, dust
    and exhaust haze, concrete barriers tagged with gang colors,
    distant megacity silhouette glowing against dark sky
  arcade: >-
    VR arcade with rows of full-immersion pods, jacked-in users
    with slack faces and twitching fingers, holographic game
    previews floating between pods, blue-white light washing out
    all color, energy drink vending machines, teenager crowd
  warehouse: >-
    abandoned industrial warehouse repurposed as a netrunner den,
    server racks humming behind chain-link cage walls, makeshift
    workstations with multiple screens, sleeping bags and takeout
    containers, red emergency lighting, cable bundles everywhere
  penthouse: >-
    corporate executive penthouse with panoramic smart glass,
    entire city visible below like a circuit board, minimalist
    furniture in white leather and chrome, personal AI assistant
    hologram, wet bar with top-shelf synthetics, private elevator
  undercity: >-
    lower infrastructure levels beneath the megacity, exposed pipe
    systems and cable conduits, dim emergency lighting in amber,
    dripping condensation, homeless encampments in alcoves, rats,
    distant mechanical hum of the city above
  cyberspace: >-
    virtual architecture of impossible geometry, streaming data
    visualized as luminous rivers, geometric ICE walls pulsing
    with defensive patterns, avatar silhouettes surfing data
    streams, deep digital void stretching infinitely, grid lines
  train: >-
    maglev train interior, seamless windows showing blurred city
    lights, holographic route display, molded plastic seats with
    integrated screens, commuters plugged into personal feeds,
    gentle acceleration hum, sterile recycled air
  dock: >-
    cargo port at the city edge, massive container ships under
    automated crane arrays, floodlit loading zones, smuggler
    boats in the shadow of legitimate commerce, oily water
    reflecting industrial lights, armed port security drones

