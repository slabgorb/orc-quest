# Audio configuration for low fantasy genre pack
# Mood tracks, SFX library, creature voice presets, mixer settings

mood_tracks:
  exploration:
    - path: audio/music/exploration.ogg
      title: "Wanderer's Path"
      bpm: 90
    - path: audio/music/exploration_3.ogg
      title: "Open Road"
      bpm: 85
    - path: audio/music/exploration_4.ogg
      title: "Distant Horizons"
      bpm: 95
  combat:
    - path: audio/music/combat.ogg
      title: "Steel and Mud"
      bpm: 140
    - path: audio/music/combat_3.ogg
      title: "Blood and Iron"
      bpm: 150
    - path: audio/music/combat_4.ogg
      title: "Shield Wall"
      bpm: 135
  tension:
    - path: audio/music/tension.ogg
      title: "Shadows Gather"
      bpm: 70
    - path: audio/music/tension_3.ogg
      title: "Something Watches"
      bpm: 60
    - path: audio/music/tension_4.ogg
      title: "The Silence Before"
      bpm: 65
  tavern:
    - path: audio/music/tavern.ogg
      title: "The Merry Minstrel"
      bpm: 120
    - path: audio/music/tavern_3.ogg
      title: "Ale and Stories"
      bpm: 110
  mystery:
    - path: audio/music/mystery.ogg
      title: "Unseen Threads"
      bpm: 75
    - path: audio/music/mystery_3.ogg
      title: "Riddle in the Dark"
      bpm: 80
  sorrow:
    - path: audio/music/sorrow.ogg
      title: "Ashes and Embers"
      bpm: 55
  rest:
    - path: audio/music/rest.ogg
      title: "Campfire Lullaby"
      bpm: 65
    - path: audio/music/rest_3.ogg
      title: "Stars Above"
      bpm: 70

sfx_library:
  # Combat sounds (Kenney CC0)
  sword_clash:
    - audio/sfx/sword_clash.ogg
    - audio/sfx/sword_slash.ogg
    - audio/sfx/sword_slash_2.ogg
  draw_weapon:
    - audio/sfx/draw_weapon.ogg
    - audio/sfx/draw_weapon_2.ogg
    - audio/sfx/draw_weapon_3.ogg
  shield_bash:
    - audio/sfx/shield_bash.ogg
  armor_clank:
    - audio/sfx/armor_clank.ogg
  bow_release:
    - audio/sfx/bow_release.ogg
  # Environment (Kenney CC0 + synthetic)
  door_creak:
    - audio/sfx/door_creak.ogg
    - audio/sfx/door_creak_2.ogg
    - audio/sfx/door_creak_3.ogg
  door_open:
    - audio/sfx/door_open.ogg
    - audio/sfx/door_open_2.ogg
  door_close:
    - audio/sfx/door_close.ogg
    - audio/sfx/door_close_2.ogg
  chest_open:
    - audio/sfx/chest_open.ogg
  lock_pick:
    - audio/sfx/lock_pick.ogg
  thunder:
    - audio/sfx/thunder.ogg
  # Movement (Kenney CC0)
  footsteps:
    - audio/sfx/footsteps.ogg
    - audio/sfx/footsteps_2.ogg
    - audio/sfx/footsteps_3.ogg
    - audio/sfx/footsteps_4.ogg
    - audio/sfx/footsteps_5.ogg
  leather_rustle:
    - audio/sfx/leather_rustle.ogg
  bag_drop:
    - audio/sfx/bag_drop.ogg
  # Items (Kenney CC0)
  coin_drop:
    - audio/sfx/coin_drop.ogg
    - audio/sfx/coin_drop_2.ogg
  pouch_open:
    - audio/sfx/pouch_open.ogg
  book_open:
    - audio/sfx/book_open.ogg
    - audio/sfx/book_close.ogg
  book_flip:
    - audio/sfx/book_flip.ogg
    - audio/sfx/book_flip_2.ogg
    - audio/sfx/book_flip_3.ogg
  # Magic (synthetic placeholders)
  magic_cast:
    - audio/sfx/magic_cast.ogg
  healing:
    - audio/sfx/healing.ogg
  # Social
  crowd_murmur:
    - audio/sfx/crowd_murmur.ogg

creature_voice_presets:
  dragon:
    creature_type: dragon
    description: "Deep, rumbling voice with cavernous reverb"
    pitch: 0.6
    rate: 0.8
    effects:
      - type: reverb
        params:
          room_size: 0.8
      - type: lowpass_filter
        params:
          cutoff_frequency_hz: 2000
  goblin:
    creature_type: goblin
    description: "High-pitched, fast, chittering voice"
    pitch: 1.4
    rate: 1.3
    effects:
      - type: highpass_filter
        params:
          cutoff_frequency_hz: 300
  undead:
    creature_type: undead
    description: "Hollow, echoing rasp from beyond the grave"
    pitch: 0.7
    rate: 0.6
    effects:
      - type: reverb
        params:
          room_size: 0.6

mixer:
  music_volume: 0.08
  sfx_volume: 0.15
  voice_volume: 1.0
  duck_music_for_voice: true
  duck_amount_db: -12.0
  crossfade_default_ms: 3000

ai_generation:
  enabled: true
  model: musicgen_small
  max_generation_time_s: 15
  cache_generated: true

