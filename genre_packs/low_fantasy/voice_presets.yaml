# Voice preset configuration for low fantasy genre pack
#
# Maps narrator and NPC archetypes to Piper TTS voices with
# post-processing effects via pedalboard. The `model` field
# references a Piper ONNX voice name. The `effects` list feeds
# into PedalboardEffectsChain for pitch/tone shaping.
#
# Available voices (cached locally):
#   en_US-lessac-high   — clear, neutral American (narrator default)
#   en_US-ryan-high     — deeper male American
#   en_US-amy-medium    — female American
#   en_GB-alan-medium   — British male
#   en_US-lessac-medium — lighter fallback

# ── Narrator ──────────────────────────────────────────────────
# The narrator voice is used for all non-dialogue text: scene
# descriptions, transitions, action results. Should be clear
# and unobtrusive — the player's window into the world.
narrator:
  model: en_US-lessac-high
  pitch: 1.0
  rate: 0.95
  effects:
    - type: compressor
      params:
        threshold_db: -20
    - type: reverb
      params:
        room_size: 0.15

# ── NPC Archetype Voices ──────────────────────────────────────
# Each archetype maps to a voice model + effects chain that
# reinforces their personality. The VoiceRouter looks up
# character names through the registry; unregistered characters
# fall back to the fallback preset below.

characters:
  # Grizzled Veteran — stoic, clipped, world-weary
  # Deep male voice, slight compression to flatten emotion,
  # low-end warmth suggesting a voice roughened by years.
  Grizzled Veteran:
    model: en_US-ryan-high
    pitch: 0.85
    rate: 0.9
    effects:
      - type: lowpass_filter
        params:
          cutoff_frequency_hz: 5000
      - type: compressor
        params:
          threshold_db: -15
      - type: gain
        params:
          gain_db: 1

  # Nervous Fence — anxious, fast, thin
  # Higher pitch and faster rate sell the anxiety. High-pass
  # thins the voice out — he sounds like he hasn't eaten well.
  Nervous Fence:
    model: en_US-lessac-high
    pitch: 1.15
    rate: 1.2
    effects:
      - type: highpass_filter
        params:
          cutoff_frequency_hz: 250
      - type: compressor
        params:
          threshold_db: -12
      - type: gain
        params:
          gain_db: -1

  # Hedge Witch — wary, perceptive, quietly bitter
  # Female voice with intimate reverb — sounds like she's
  # speaking from a cramped cottage full of drying herbs.
  Hedge Witch:
    model: en_US-amy-medium
    pitch: 0.95
    rate: 0.9
    effects:
      - type: reverb
        params:
          room_size: 0.3
      - type: compressor
        params:
          threshold_db: -18
      - type: lowpass_filter
        params:
          cutoff_frequency_hz: 6000

  # Traveling Merchant — affable, shrewd, perpetually exhausted
  # British accent sells the well-traveled feel. Slightly bright
  # to cut through tavern ambience. Normal rate — he talks at
  # the pace of someone who talks for a living.
  Traveling Merchant:
    model: en_GB-alan-medium
    pitch: 1.0
    rate: 1.05
    effects:
      - type: highpass_filter
        params:
          cutoff_frequency_hz: 150
      - type: gain
        params:
          gain_db: 2

  # Zealous Inquisitor — fanatical, terrifyingly calm
  # Deep, deliberate, with cathedral reverb. Speaks slowly
  # because every word is a verdict. The reverb suggests
  # stone halls and absolute authority.
  Zealous Inquisitor:
    model: en_US-ryan-high
    pitch: 0.9
    rate: 0.8
    effects:
      - type: reverb
        params:
          room_size: 0.6
      - type: lowpass_filter
        params:
          cutoff_frequency_hz: 4500
      - type: compressor
        params:
          threshold_db: -22
      - type: gain
        params:
          gain_db: 2

  # Weary Innkeeper — sardonic, observant, warm underneath
  # Lessac high for clarity (you need to hear him over the
  # crowd murmur SFX). Slight warmth from low-pass, gentle
  # compression — steady, unhurried, heard it all before.
  Weary Innkeeper:
    model: en_US-lessac-high
    pitch: 0.95
    rate: 1.0
    effects:
      - type: lowpass_filter
        params:
          cutoff_frequency_hz: 5500
      - type: compressor
        params:
          threshold_db: -16
      - type: reverb
        params:
          room_size: 0.2

# ── Effects Presets ───────────────────────────────────────────
# Reusable named presets for the EffectsPresetLibrary. These
# supplement the built-in presets (dry, bright, dark, intimate)
# with genre-specific options. Characters can reference these
# by name via the CharacterEffectsRouter.

effects_presets:
  # Outdoor scenes — slight air, no reverb
  open_air:
    effects:
      - type: highpass_filter
        params:
          cutoff_frequency_hz: 120
      - type: gain
        params:
          gain_db: 1

  # Underground / dungeon — heavy reverb, muffled highs
  cavern:
    effects:
      - type: reverb
        params:
          room_size: 0.85
      - type: lowpass_filter
        params:
          cutoff_frequency_hz: 3000
      - type: gain
        params:
          gain_db: -2

  # Tavern / indoor crowd — warm, compressed, intimate
  tavern:
    effects:
      - type: lowpass_filter
        params:
          cutoff_frequency_hz: 5000
      - type: compressor
        params:
          threshold_db: -14
      - type: reverb
        params:
          room_size: 0.25

  # Whisper — thin, close, conspiratorial
  whisper:
    effects:
      - type: highpass_filter
        params:
          cutoff_frequency_hz: 300
      - type: compressor
        params:
          threshold_db: -10
      - type: gain
        params:
          gain_db: -4

  # Commanding / authority — full, present, cuts through
  authority:
    effects:
      - type: compressor
        params:
          threshold_db: -20
      - type: gain
        params:
          gain_db: 3
      - type: reverb
        params:
          room_size: 0.4

  # Wounded / dying — thin, fading, strained
  wounded:
    effects:
      - type: highpass_filter
        params:
          cutoff_frequency_hz: 400
      - type: gain
        params:
          gain_db: -6
      - type: reverb
        params:
          room_size: 0.15
