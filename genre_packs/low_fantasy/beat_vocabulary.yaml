obstacles:
  - name: Fallen tree
    description: A massive trunk blocks the forest trail
    stat_check: Athletics
    failure_penalty: Stamina -1, separation unchanged
    tags: [forest, natural]

  - name: Market crowd
    description: Dense foot traffic through a market square — weave or shove
    stat_check: Dexterity
    failure_penalty: Separation -1, alerting guards
    tags: [urban, crowd]

  - name: Crumbling wall
    description: Ancient stonework — climb it for a shortcut or find the gate
    stat_check: Athletics
    failure_penalty: Fall damage, separation -2
    tags: [urban, terrain]

  - name: River crossing
    description: Chest-deep water with a strong current
    stat_check: Athletics
    failure_penalty: Gear soaked, speed halved for 1 beat
    tags: [water, natural]

  - name: Guard checkpoint
    description: Armed guards blocking the street — talk through or run past
    stat_check: Charisma
    failure_penalty: New pursuers join the chase
    tags: [urban, social]

  - name: Rooftop gap
    description: A leap between rooftops — miss and it's a long fall
    stat_check: Dexterity
    failure_penalty: Fall damage, chase ends badly
    tags: [urban, vertical]

  - name: Mudslide path
    description: Rain-soaked hillside trail — every step could be a slide
    stat_check: Dexterity
    failure_penalty: Prone, separation -1
    tags: [terrain, weather]

  - name: Livestock stampede
    description: Panicked animals block the road — dodge or wait
    stat_check: Dexterity
    failure_penalty: Trampled, minor injury
    tags: [rural, hazard]

event_flavor:
  - event: gap_widens
    descriptions:
      - Your boots find purchase and you pull ahead — their shouts fade behind
      - The alley twists and you slip around a corner — bought yourself some distance
      - You vault a low wall and hit open ground — the gap grows with every stride
      - Their armor slows them — you hear the clanking fall behind

  - event: gap_closes
    descriptions:
      - Footsteps hammering closer — they know these streets better than you
      - A shortcut cuts your lead — they burst from a side alley, almost on you
      - The crowd thins and suddenly there's nowhere to hide — they're gaining
      - You hear breathing behind you, ragged and close

  - event: obstacle_hit
    descriptions:
      - You clip the cart and stumble — apples scatter across the cobblestones
      - Your cloak catches on a nail and tears — lost a step
      - A loose cobblestone rolls underfoot and you stagger sideways
      - The low beam catches you across the chest — the air leaves your lungs

  - event: shortcut_found
    descriptions:
      - A servants' passage between the buildings — dark but direct
      - The storm drain is open — it cuts under the wall to the other side
      - A sympathetic face in a doorway, beckoning — quick, through here
      - The old tower stairs — three flights up, across the roof, and down the other side

  - event: near_catch
    descriptions:
      - Fingers brush your collar — close enough to smell their sweat
      - A thrown net whistles past your ear — the next one won't miss
      - They're an arm's length behind — you feel the heat of their exertion
      - A hand grabs your pack strap — you twist free but barely

  - event: terrain_shift
    descriptions:
      - The cobblestones give way to muddy track — footing changes everything
      - The forest canopy closes in — branches whip and roots catch feet
      - You break from the alley into the open market — suddenly exposed
      - The path leads uphill — legs burn, lungs ache, the terrain fights you

decision_framings:
  - "The bridge ahead is guarded — bluff past or find another way across the river"
  - "A merchant's cart blocks the alley — vault over or shove through?"
  - "Your companion stumbles — help them up or keep running?"
  - "The rooftops offer escape but the jump is far — risk it or stay on the ground?"
  - "Guards ahead, pursuers behind — talk your way out or fight through?"

chase_modes:
  - foot
  - mounted
