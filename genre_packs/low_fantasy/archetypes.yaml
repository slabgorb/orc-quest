- name: Grizzled Veteran
  description: >-
    A former soldier who survived the civil war and now scrapes by on
    odd jobs and old debts. Carries the thousand-yard stare and a blade
    that has seen too much use.
  personality_traits:
    - stoic
    - pragmatic
    - haunted by past violence
  typical_classes:
    - Fighter
  typical_races:
    - Human
    - Dwarf
  stat_ranges:
    strength: [14, 18]
    constitution: [12, 16]
  catalog_items:
    - sword_iron
    - leather_armor_worn
  inventory_hints:
    - flask of cheap spirits
  dialogue_quirks:
    - speaks in short, clipped sentences
    - pauses before answering, as if weighing whether you are worth the breath
  disposition_default: 5

- name: Nervous Fence
  description: >-
    A black-market dealer who operates out of back rooms and root cellars.
    Knows the value of everything and the provenance of nothing. Sweats
    even when it is cold.
  personality_traits:
    - anxious
    - cunning
    - desperately greedy
  typical_classes:
    - Rogue
  typical_races:
    - Human
    - Halfling
  stat_ranges:
    dexterity: [12, 16]
    charisma: [10, 14]
  catalog_items:
    - dagger_iron
  inventory_hints:
    - concealed coin purse
    - forged trade permits
  dialogue_quirks:
    - eyes dart to every exit while talking
    - drops voice to a whisper for no reason
  disposition_default: -10

- name: Hedge Witch
  description: >-
    A solitary practitioner of folk remedies and minor cantrips who lives
    at the edge of town — close enough to be useful, far enough to be
    deniable. The villagers come to her in secret and pretend they don't.
  personality_traits:
    - wary
    - perceptive
    - quietly bitter
  typical_classes:
    - Druid
    - Cleric
  typical_races:
    - Human
    - Elf
  stat_ranges:
    wisdom: [14, 18]
    constitution: [8, 12]
  catalog_items:
    - healing_poultice
  inventory_hints:
    - dried herbs in pouches
    - bone charms
    - a battered mortar and pestle
  dialogue_quirks:
    - speaks in proverbs that may or may not be real
    - answers questions with questions
  disposition_default: -5

- name: Traveling Merchant
  description: >-
    A road-hardened trader who moves goods between settlements, braving
    bandits, bad roads, and worse weather. Knows every shortcut and
    every toll collector by name.
  personality_traits:
    - affable
    - shrewd
    - perpetually exhausted
  typical_classes:
    - Rogue
    - Bard
  typical_races:
    - Human
    - Dwarf
    - Halfling
  stat_ranges:
    charisma: [12, 16]
    wisdom: [10, 14]
  inventory_hints:
    - overloaded pack mule
    - trade ledger
    - hidden dagger
  dialogue_quirks:
    - steers every conversation toward a deal
    - quotes prices from three towns ago as if they are current
  disposition_default: 15

- name: Zealous Inquisitor
  description: >-
    A member of the Order of the Ashen Veil tasked with rooting out
    arcane corruption. Utterly convinced of their righteousness.
    Carries a censer of pale ash and the authority to detain anyone
    suspected of sorcery.
  personality_traits:
    - fanatical
    - incorruptible
    - terrifyingly calm
  typical_classes:
    - Cleric
    - Fighter
  typical_races:
    - Human
  stat_ranges:
    wisdom: [14, 18]
    charisma: [12, 16]
  inventory_hints:
    - holy symbol of the Pale Fire
    - manacles
    - sealed writs of inquisition
  dialogue_quirks:
    - frames every statement as a gentle question that is not actually optional
    - quotes scripture before and after threatening you
  disposition_default: -20

- name: Weary Innkeeper
  description: >-
    The owner of a roadside inn who has heard every hard-luck story and
    believes none of them. Keeps a cudgel behind the bar and a ledger
    of debts that never shrinks.
  personality_traits:
    - sardonic
    - observant
    - quietly compassionate
  typical_classes:
    - Fighter
    - Rogue
  typical_races:
    - Human
    - Halfling
  stat_ranges:
    constitution: [12, 16]
    charisma: [10, 14]
  inventory_hints:
    - ring of keys
    - cudgel behind the bar
    - jar of pickled eggs of questionable vintage
  dialogue_quirks:
    - wipes the same spot on the bar while talking
    - remembers every face but pretends not to
  disposition_default: 10
