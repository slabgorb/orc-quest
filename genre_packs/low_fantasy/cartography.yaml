world_name: The Shattered Realm
starting_region: heartland
map_style: "weathered parchment map with ink borders, aged brown tones, hand-drawn mountains and forests"
map_resolution: [1024, 1024]

regions:
  heartland:
    name: The Heartland
    description: Fertile central plains dotted with farming villages and market towns. The crossroads of the realm, where all major trade routes converge.
    origin: origins
    adjacent: [iron_hills, eastern_coast, northern_mountains, drowned_marches]

  iron_hills:
    name: The Iron Hills
    description: Rugged hill country rich with ore veins. Dwarven mining settlements and human smelting towns share an uneasy but profitable coexistence.
    origin: origins
    adjacent: [heartland, northern_mountains]

  eastern_coast:
    name: The Eastern Coast
    description: A strip of port towns and fishing villages along the Sea of Storms. Trade flows through here from distant lands.
    origin: origins
    adjacent: [heartland, drowned_marches]

  northern_mountains:
    name: The Northern Mountains
    description: Snow-capped peaks and deep valleys. Ancient ruins dot the high passes, and the wind carries whispers of things best left undisturbed.
    origin: origins
    adjacent: [heartland, iron_hills]

  drowned_marches:
    name: The Drowned Marches
    description: A vast expanse of fog-shrouded wetland. Few roads survive the mud, and fewer travelers survive the things that live in it.
    adjacent: [heartland, eastern_coast]

routes:
  - from_id: heartland
    to_id: iron_hills
    name: "Old King's Road"
    distance: medium
    danger: moderate
    description: A well-worn trade road through rolling hills. Bandit activity has increased since the garrison pulled back.

  - from_id: heartland
    to_id: eastern_coast
    name: River Road
    distance: short
    danger: safe
    description: A broad, paved road following the River Ash downstream to the coast. Well-patrolled and busy with merchant traffic.

  - from_id: heartland
    to_id: drowned_marches
    name: South Track
    distance: medium
    danger: dangerous
    description: A muddy track that deteriorates into boardwalks and rope bridges as it enters the marshes. Few travel it by choice.

  - from_id: heartland
    to_id: northern_mountains
    name: Mountain Pass
    distance: long
    danger: dangerous
    description: A grueling climb through switchbacks and narrow ledges. Snow closes the pass in winter, and rockslides threaten year-round.

  - from_id: iron_hills
    to_id: northern_mountains
    name: "Miners' Trail"
    distance: medium
    danger: moderate
    description: A working trail used by ore caravans. Steep but maintained, with waystation shelters every half day's march.

  - from_id: eastern_coast
    to_id: drowned_marches
    name: Marsh Road
    distance: medium
    danger: dangerous
    description: A raised causeway of rotting timber that skirts the marsh edge. When the fog rolls in, travelers lose their way.
