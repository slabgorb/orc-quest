affinities:
  - name: "Iron"
    description: "Combat prowess, physical dominance, martial skill"
    triggers:
      - "melee combat"
      - "weapon training"
      - "physical feats of strength"
      - "defending allies in battle"
    tier_thresholds: [5, 12, 25]
    unlocks:
      tier_1:
        name: "Blooded"
        description: "You have fought and bled. Your body remembers what your mind would rather forget."
        abilities:
          - name: "Shield Bash"
            experience: >
              The weight of the shield becomes an extension of your arm. When you drive it forward,
              you feel the impact travel through your shoulder like a bell being struck. There is a
              rhythm to it — brace, push, follow through — that your muscles learn before your mind
              catches up. The sound of wood meeting bone is duller than you expected.
            limits: >
              Your shoulder swells after the third or fourth bash. The joint grinds hot,
              and your fingers start to tingle. Push past it and you'll fight the rest
              of the day with a dead arm.
          - name: "Riposte"
            experience: >
              Time doesn't slow, exactly, but something sharpens. When the blade comes for you,
              the counterstrike rises from the same place as breathing — you don't decide to do it,
              you simply do. Your wrist turns, their momentum carries them past, and your edge
              finds the gap they left open. It feels like cheating. It isn't.
            limits: >
              Miss the timing and you eat the full strike with no guard up. The window
              is a heartbeat wide. Fatigue narrows it further — when your arms are heavy,
              you start flinching instead of reading.
          - name: "Battle Cry"
            experience: >
              It comes from somewhere below your stomach, a sound that scrapes your throat raw
              on the way out. Not words — something older. Your allies straighten when they hear it.
              The enemy hesitates, just for a moment, and a moment is enough. Afterward your voice
              is hoarse and your hands shake, but the line held.
            limits: >
              Scream too often and it becomes noise. Your throat tears, your voice cracks,
              and the sound that comes out is small and desperate. The enemy learns to
              ignore it. Worse, your allies do too.
      tier_2:
        name: "Tempered"
        description: "Steel and sinew have become one language. You read a fight the way a scholar reads a page."
        abilities:
          - name: "Disarm"
            experience: >
              You see the weapon before you see the person holding it. The way their fingers wrap
              the grip, the angle of their elbow, the tension in their forearm — it tells you
              everything. A sharp twist at the right joint and the blade clatters free. Their
              expression afterward is always the same: not pain, but bewilderment, as if their
              hand betrayed them.
            limits: >
              Attempt it against someone stronger and your own wrist pays the price. Against
              a two-handed grip, the leverage works against you — you'll wrench your shoulder
              before you free their weapon.
          - name: "Second Wind"
            experience: >
              There is a wall you hit in every long fight where your lungs burn and your legs
              want to fold. Beyond that wall is a strange, cold clarity. Your breathing steadies.
              The pain doesn't vanish — it steps aside, like a bystander making room. You have
              minutes, maybe less, but they are clear minutes, and you use them.
            limits: >
              The debt comes due afterward. When the clarity fades, everything you pushed
              through arrives at once. Veterans have collapsed hours after a fight they
              seemed to win easily. Some don't get back up.
          - name: "Shield Wall"
            experience: >
              You feel the person beside you through the rim of your shield — their breathing,
              their weight, the moment they brace. The wall becomes a single thing, not individuals
              but a surface. Blows land on it like rain on a roof. You stop thinking about yourself
              and start thinking about the line. Where it bows, you lean in. Where it holds,
              you rest.
            limits: >
              Break formation and the wall dies. One person stepping back opens a gap that
              swallows everyone. Exhaustion makes you selfish — your shield drifts inward
              to cover your own body, and the person beside you pays for it.
      tier_3:
        name: "Iron Warden"
        description: "The battlefield bends around you. Where you stand, the line does not break."
        abilities:
          - name: "Sunder"
            experience: >
              You can feel where things are weakest — the hairline fracture in a breastplate,
              the warp in a shield's grain, the spot where the weld was lazy. Your strike finds
              it with the certainty of water finding a crack. The sound of breaking armor is
              surprisingly quiet: a dull pop, then the pieces falling. What was protection
              becomes weight.
            limits: >
              Every sunder costs you a weapon's lifetime. Edges chip, hilts crack, tangs
              loosen. You break their armor and your blade remembers every impact. After
              enough sundering, you're fighting with an expensive club.
          - name: "Unyielding Stance"
            experience: >
              You plant your feet and the ground answers. Something locks — not magic, not
              anything you could name — but your weight doubles, your balance becomes absolute.
              Charges break against you like water on stone. You feel every impact in your
              knees, your spine, your teeth, but you do not move. You are the place where
              momentum comes to die.
            limits: >
              You cannot move and be immovable at the same time. Root yourself and you
              become a target for anything that doesn't need to go through you — arrows,
              fire, flanking. Your knees will ache for days, and old men who fought
              this way all walk with canes.

  - name: "Shadow"
    description: "Stealth, deception, subterfuge"
    triggers:
      - "sneaking past guards"
      - "picking locks or pockets"
      - "setting ambushes"
      - "lying convincingly"
    tier_thresholds: [5, 12, 25]
    unlocks:
      tier_1:
        name: "Unseen"
        description: "You have learned to move through the spaces people forget to watch."
        abilities:
          - name: "Silent Step"
            experience: >
              It starts in your feet — you learn to feel the ground before you commit your weight,
              reading the surface through boot leather like a blind man reads faces. Gravel, dry
              leaves, loose boards: each has a language. Your breathing slows to match your steps.
              You become a thing that moves between sounds, filling the gaps where silence already lives.
            limits: >
              Wet stone and fresh snow betray everyone equally. Fatigue makes you heavy,
              and heavy means loud. After hours of careful movement your calves cramp and
              your next step lands flat and graceless.
          - name: "Pickpocket"
            experience: >
              Two fingers and a thumb — that's all it takes. You learn to read the way a person
              carries their weight, where the purse hangs, which pocket they touch when they're
              nervous. The lift itself is gentle, almost tender. A brush of contact disguised as
              the jostle of a crowd. The hard part isn't the taking. It's keeping your face
              perfectly bored while your heart hammers.
            limits: >
              Shaking hands doom you. Fear, cold, drink — anything that steals your fine
              control turns a lift into a grab. And a grab gets your wrist caught in
              someone's fist.
      tier_2:
        name: "Shade"
        description: "Darkness is not absence — it is territory, and you have learned to hold it."
        abilities:
          - name: "Ambush"
            experience: >
              Patience is the weapon. You choose your ground, you slow your breathing, you let
              the world forget you're there. Minutes pass. Sometimes hours. When they come — and
              they always come — you are already moving before they know you exist. The first
              strike lands in silence. The second lands in confusion. There is no third because
              by then, they're running or they're down.
            limits: >
              Hold position too long and your muscles stiffen. Spring the trap with numb
              legs and your strike arrives late and clumsy. Worse, patience curdles into
              doubt — you start seeing threats in shadows and miss the real one walking
              past in plain sight.
          - name: "Misdirection"
            experience: >
              A thrown stone, a whispered word in the wrong direction, a lantern left burning
              in an empty room. You learn that people see what they expect to see, and with
              the smallest nudge, expectation becomes certainty. It's not magic — it's knowing
              that a guard who hears a noise to his left will turn his whole body, leaving
              his right side blind for three full seconds.
            limits: >
              Clever tricks stop working on people who've been fooled before. Use the same
              misdirection twice and it becomes a signpost pointing straight to you. Worse,
              a failed feint tells them exactly how you think.
          - name: "Lockcraft"
            experience: >
              The pick becomes a fingertip. Through the thin metal you feel the pins like
              teeth in a jaw — their resistance, their give, the faint click when one sets true.
              Each lock has a personality: some are stubborn and want coaxing, others are
              cheap and surrender fast. Your eyes close. Your ears take over. The world
              shrinks to the space inside the mechanism.
            limits: >
              Good locks fight back. Dwarf-forged wards snap picks like twigs. Trapped
              locks poison or maim. And every second spent crouched at a door is a second
              someone might round the corner behind you.
      tier_3:
        name: "Phantom"
        description: "You move through the world like a rumor — felt but never confirmed."
        abilities:
          - name: "Vanish"
            experience: >
              Not invisibility — nothing so grand. You simply become uninteresting. Your posture
              shifts, your gait changes, your face settles into the expression of someone who
              belongs wherever they are. People's eyes slide past you the way they slide past
              furniture. In a crowd, you cease to exist. In an empty room, you become the shadow
              in the corner that was always there. It requires absolute stillness of intention.
            limits: >
              It doesn't work on people who are looking for you specifically. A name called
              across a room shatters it. Dogs and children see through it — they haven't
              learned what to ignore yet. And you must stay calm; fear has a scent
              that attention follows.
          - name: "Throat Cut"
            experience: >
              Clinical. That's the word for it. You approach from the blind spot — every person
              has one, even the cautious — and the blade crosses the throat in a single motion
              that you've practiced until it requires no more thought than blinking. It is fast
              and it is quiet and afterward your hands are steady and your stomach is not. You
              tell yourself it was necessary. You always tell yourself that.
            limits: >
              Armor stops it. Alertness stops it. Anything heavier than leather at the
              neck and you're sawing, not cutting, and sawing is loud and slow. Miss the
              artery and you have a wounded, furious enemy at arm's length.

  - name: "Lore"
    description: "Knowledge, history, arcane understanding"
    triggers:
      - "deciphering texts"
      - "recalling historical facts"
      - "identifying magical phenomena"
      - "researching in libraries"
    tier_thresholds: [5, 12, 25]
    unlocks:
      tier_1:
        name: "Studied"
        description: "Books have left their marks on you — ink-stained fingers and a mind full of other people's memories."
        abilities:
          - name: "Recall"
            experience: >
              The knowledge surfaces like a coin in murky water — you don't grab for it, you wait
              and it rises. A half-remembered passage, a diagram glimpsed years ago, a teacher's
              offhand comment that lodged somewhere deep. The connections form themselves: this
              ruin matches that architectural style, this symbol belongs to that dead language.
              It feels less like thinking and more like listening to a very old conversation.
            limits: >
              Memory is not truth. You recall what you read, not what happened. Books lie,
              scholars argue, and the further back you reach, the more your certainty is
              built on someone else's guesswork.
          - name: "Decipher"
            experience: >
              Languages are patterns, and patterns have seams. You find the repeated glyphs first
              — the common words, the structural bones — and build outward from there. Each symbol
              decoded unlocks three more. Your lips move without sound, testing pronunciations
              that no living tongue has spoken. The text assembles itself in your mind like a
              mosaic, gaps and all. The gaps bother you more than the parts you can read.
            limits: >
              Dead languages stay dead for reasons. Without a living speaker to correct you,
              your translation is a best guess wearing confidence like a mask. One misread
              glyph can invert a warning into an invitation.
      tier_2:
        name: "Versed"
        description: "Your knowledge has grown roots. You see the connections between things that others treat as unrelated."
        abilities:
          - name: "Identify Enchantment"
            experience: >
              There is a pressure behind your eyes when you look at something that has been
              worked — not pain, but awareness, like feeling a change in altitude. The enchantment
              reveals itself in layers: first the surface effect, then the binding method, then,
              if you're patient, the intent of the hand that made it. Old enchantments smell of
              copper and dust. New ones taste of ozone. You have learned not to mention this
              to people who cannot feel it.
            limits: >
              Powerful workings push back when examined. Stare too long at a deep enchantment
              and it stares back — headaches that last days, nosebleeds, dreams that aren't
              yours. Some things were made to punish curiosity.
          - name: "Counter-Ritual"
            experience: >
              Every ritual is a sentence, and sentences can be interrupted. You learn to find the
              grammar of a working — the rhythm, the anchors, the points where the practitioner
              must breathe. Your counter is not a greater force but a precise absence: the right
              word unspoken at the right moment, a symbol drawn backward, a circle broken at its
              weakest arc. The ritual collapses inward, and the silence afterward rings.
            limits: >
              Interrupting a ritual releases its energy sideways. The backlash doesn't
              care who's friend and who's foe. Worse, a half-collapsed ritual is
              unpredictable — you might stop the effect and start something else entirely.
      tier_3:
        name: "Sage"
        description: "You carry a library in your skull. The weight of it shows in your eyes."
        abilities:
          - name: "Warding Circle"
            experience: >
              The chalk moves in patterns your hand has memorized so deeply that thinking about
              them introduces errors. You draw by feel — the geometry must be exact, the symbols
              unbroken, the intent held steady from first line to last. When the circle closes,
              you feel it seal like a jar lid clicking into place. The air inside tastes different.
              Things that mean harm press against the boundary like wind against a window, and
              the window holds. For now.
            limits: >
              Scuff the chalk, crack the salt line, lose concentration for a breath, and
              the circle is just marks on the ground. Maintaining a ward drains something
              that sleep only partly restores. Hold one too long and you forget what
              day it is.
          - name: "Translate the Old Tongue"
            experience: >
              The Old Tongue doesn't translate into modern speech — it translates into understanding.
              You read the words and they bypass language entirely, arriving as images, sensations,
              certainties. A creation-text feels like watching a sunrise from inside. A binding-text
              feels like chains tightening around your chest. You don't read the Old Tongue so
              much as the Old Tongue reads you, and shows you what it meant by showing you
              what it felt like to mean it.
            limits: >
              Extended reading in the Old Tongue erodes the boundary between your thoughts
              and the text's intent. Scholars who immerse too long start speaking in
              metaphors they can't explain, dreaming in symbols, losing track of which
              memories are theirs. Some never fully come back.

  - name: "Wild"
    description: "Nature, survival, animal kinship"
    triggers:
      - "tracking in wilderness"
      - "foraging for food"
      - "calming or communicating with animals"
      - "navigating natural terrain"
    tier_thresholds: [5, 12, 25]
    unlocks:
      tier_1:
        name: "Fieldwise"
        description: "The land has begun to speak, and you have begun to listen."
        abilities:
          - name: "Track"
            experience: >
              The print in the mud tells a story — depth says weight, spacing says speed, the
              drag of a toe says exhaustion. You crouch and the forest floor becomes a page.
              Bent grass recovers in hours, so this trail is fresh. Your fingers touch the edge
              of a boot print and you know how they walk, how they carry their pack, whether
              they're favoring a leg. It's not magic. It's attention.
            limits: >
              Rain erases everything. Hard ground gives nothing. In a city, the trail drowns
              in a thousand other feet. And tracking demands stillness when every instinct
              says hurry — lose patience, lose the trail.
          - name: "Forage"
            experience: >
              Your hand knows which mushrooms to pass and which to pick before your mind catches
              up. The forest feeds you if you know where to look: tubers beneath certain ferns,
              berries on south-facing slopes, grubs under rotting bark that taste terrible and
              keep you alive. You learn to read the soil, the light, the season, and the land
              provides. Not generously — just enough.
            limits: >
              Forage in unfamiliar terrain and your instincts betray you. Plants that look
              right can kill. A bad mushroom doesn't announce itself until hours later,
              and by then you're sweating and seeing things that aren't there.
      tier_2:
        name: "Warden"
        description: "The wilderness recognizes you. Animals are cautious but not afraid."
        abilities:
          - name: "Animal Ken"
            experience: >
              It's not speech — nothing so clean. More like mood, transmitted through posture
              and breath and the quality of your stillness. A wolf reads your intentions from
              thirty paces. You learn to broadcast calm the way a lantern broadcasts light:
              steadily, without effort. The horse settles. The hawk returns to the fist. The
              stray dog follows you home. They don't obey you — they decide you're safe,
              and that's better.
            limits: >
              Predators with young will kill you regardless of your calm. Sick animals
              are unpredictable. And the bond is fragile — one sharp movement, one burst
              of fear, and trust evaporates faster than it was built.
          - name: "Weather Sense"
            experience: >
              The ache in your knees comes twelve hours before the storm. The way the birds fly
              low, the smell of the wind shifting iron-cold from the north, the pressure behind
              your ears that no one else seems to feel. You don't predict weather — you feel it
              arriving, the way you feel footsteps through a wooden floor. Three days out, you
              know what's coming. You're rarely wrong. People stop asking how you know.
            limits: >
              Unnatural weather — sorcery, cursed land, volcanic ash — reads false. Your
              body tells you clear skies while the horizon turns green. Trust your senses
              in corrupted territory and you'll walk straight into what you should
              have sheltered from.
          - name: "Pathfind"
            experience: >
              The forest has roads if you know how to see them: game trails that follow the
              easiest grade, dry creek beds that cut through impassable ridges, fallen trees
              that bridge ravines. You read the landscape like a map drawn in moss and shadow.
              Distance collapses — what takes others three days takes you one, not because
              you're faster but because you never go the wrong way.
            limits: >
              Confidence in the wild breeds recklessness in unknown terrain. A pathfinder
              who trusts their instincts in a place that doesn't follow natural rules — a
              cursed forest, a shifting swamp — will walk in circles and never notice.
      tier_3:
        name: "Wildheart"
        description: "The border between you and the land has grown thin. You are as much creature as citizen."
        abilities:
          - name: "Beast Speech"
            experience: >
              Not words. Never words. But something opens between you and the animal — a channel
              that carries meaning raw, stripped of language. The raven shows you what it saw:
              soldiers on the east road, their fires, their numbers. The wolf shares hunger,
              territory, the memory of a scent. You ask by feeling the question, and the answer
              comes back as image, emotion, urgency. Afterward, human conversation feels
              clumsy and indirect.
            limits: >
              Predator minds are alien. Spend too long in a wolf's perspective and you
              start thinking in terms of pack and prey. Come back smelling of blood-want
              and your companions will notice the change in your eyes before you do.
          - name: "Land's Breath"
            experience: >
              You press your palm to the earth and feel it breathing — slow, immense, older
              than anything built on top of it. The land tells you what grows, what's dying,
              where the water runs beneath the surface, where the soil has been poisoned.
              Blight shows up as a wrongness in your stomach, a taste of copper. Health
              feels like warmth through stone. The land doesn't care about your problems.
              But it answers honest questions.
            limits: >
              Blighted land poisons the connection. Read a dying forest and the sickness
              leaks into you — nausea, fever, a bone-deep cold that takes days to shake.
              Corrupted ground lies, showing health where there is rot, guiding you toward
              the source of the corruption like a spider drawing in a fly.

  - name: "Faith"
    description: "Divine connection, healing, spiritual resolve"
    triggers:
      - "praying or invoking divine aid"
      - "healing the wounded"
      - "resisting corruption"
      - "performing religious rites"
    tier_thresholds: [5, 12, 25]
    unlocks:
      tier_1:
        name: "Devoted"
        description: "Your prayers are no longer rote. Something listens — distant, vast, and patient."
        abilities:
          - name: "Lay on Hands"
            experience: >
              Your palms grow warm — not hot, but warm the way sunlight through glass is warm.
              You press them to the wound and something flows out of you, not energy exactly,
              but attention. The body beneath your hands remembers how it was before the injury.
              Flesh knits in its own time, not yours. You can feel the cost: a hollowness behind
              your sternum, as if you gave away a meal you hadn't eaten yet.
            limits: >
              Healing draws from your own reserves. Mend a deep wound and you'll shake for
              hours afterward, pale and cold. Try to heal when you're already empty and the
              body you're touching takes what it needs directly — your warmth, your strength,
              your years.
          - name: "Turn Undead"
            experience: >
              The prayer rises not from your throat but from your conviction. You hold the symbol
              and the words pour through you — old words, in a cadence that your teacher's teacher
              learned from stone. The dead feel it like sunlight: the lesser ones recoil, the
              stronger ones hiss and circle. It is not your power. You are the aperture through
              which something immense briefly shines, and even that sliver is enough to make
              the darkness flinch.
            limits: >
              Doubt kills it. One wavering thought — am I worthy, will this work, is anyone
              listening — and the light gutters like a candle in wind. The dead sense doubt
              the way wolves sense fear, and they stop retreating.
      tier_2:
        name: "Anointed"
        description: "The divine has marked you. Others can feel it — a gravity, a stillness, an authority that has nothing to do with rank."
        abilities:
          - name: "Sanctuary"
            experience: >
              You speak the word and the space around you changes — not visibly, but creatures
              with violent intent feel it like wading into deep water. Their steps slow. Their
              weapons grow heavy. Striking you becomes difficult the way lying to a mother's
              face is difficult: possible, but requiring effort that most would rather not spend.
              The sanctuary holds as long as you hold no violence in your own heart. The moment
              you raise a weapon, it dissolves.
            limits: >
              It cannot stop someone who believes they are righteous. A zealot, a mother
              defending her child, a soldier following sacred orders — their conviction
              matches yours and the sanctuary means nothing to them.
          - name: "Purify"
            experience: >
              Corruption has a texture — oily, cold, like touching something dead that's still
              moving. You lay your hands on it and pray, and the prayer is a slow fire that
              burns what shouldn't be there without harming what should. Poisoned water clears.
              Infected wounds drain clean. You feel the filth pass through you on its way out,
              and you must let it pass without holding any of it. That is harder than it sounds.
            limits: >
              Deep corruption fights back. Purify a powerful curse and it looks for somewhere
              new to go — often the nearest vessel, which is you. Healers who purify too
              much without rest start hearing whispers that aren't prayers.
      tier_3:
        name: "Blessed"
        description: "The divine speaks through you. Not often, not clearly, but unmistakably."
        abilities:
          - name: "Divine Intercession"
            experience: >
              You do not ask for this — it arrives. When death is certain and the blade is
              falling, something intervenes. A stumble, a gust, a crack in the stone that
              trips the killing blow. You feel it as a hand on your shoulder and a voice
              that says not yet, and then it's gone and you're alive and you don't know why
              you and not the person beside you. That question keeps you up at night.
            limits: >
              You cannot invoke it. You cannot predict it. You cannot bargain for it. And
              every intercession creates a debt that the divine collects in its own time,
              in its own currency. The pious learn that answered prayers are the most
              expensive kind.
          - name: "Consecrate Ground"
            experience: >
              The ritual takes hours — salt and oil, prayer and silence, each corner addressed
              in turn. When it's done, the ground changes. Not visibly, but you feel the boundary
              like a held breath. Evil things cannot cross it comfortably. The wounded heal faster
              inside it. Sleep comes easier. The consecration fades over days unless renewed,
              like a fire that must be fed, but while it holds, the space is yours in a way
              that has nothing to do with ownership.
            limits: >
              Consecrated ground is a challenge. It draws the attention of things that hate
              what it represents. A beacon and a shield at once. Maintain it too long in
              hostile territory and whatever lurks outside will gather the patience and
              numbers to test it.

  - name: "Silver Tongue"
    description: "Persuasion, negotiation, social manipulation"
    triggers:
      - "negotiating deals"
      - "inspiring allies with speech"
      - "defusing tense situations"
      - "gathering information through conversation"
    tier_thresholds: [5, 12, 25]
    unlocks:
      tier_1:
        name: "Glib"
        description: "Words come easily, and you've learned that the right ones can open doors that strength cannot."
        abilities:
          - name: "Fast Talk"
            experience: >
              You read the room before you open your mouth — who's tired, who's angry, who wants
              to be elsewhere. Then you start talking, not about what you want, but about what
              they want. You adjust your cadence to match theirs, mirror their posture without
              thinking, use their name once and only once. By the time you reach your actual
              point, they've been nodding for thirty seconds and stopping feels unnatural.
            limits: >
              Fast talk requires a receptive audience. The exhausted, the suspicious, the
              recently betrayed — they've built walls that charm slides off of. Push too
              hard and you become the thing they were already watching for.
          - name: "Read Intent"
            experience: >
              The tells are small — a tightening around the eyes when they mention the price,
              a hand that drifts toward a weapon during a smile, the pause before an answer
              that should be easy. You don't read minds. You read bodies, and bodies are
              terrible liars. The truth lives in the space between what people say and what
              their hands are doing. Once you learn to watch both at once, conversations
              become a very different experience.
            limits: >
              Skilled liars know their own tells and have trained them away. You read
              confidence where there is performance, honesty where there is craft. The
              better the liar, the more certain you feel — and that certainty is the trap.
      tier_2:
        name: "Orator"
        description: "Your words carry weight. People remember what you said long after they've forgotten why they agreed."
        abilities:
          - name: "Inspire"
            experience: >
              You find the thread — every group has one, the shared fear or hope that no one
              has named aloud. You name it. Not with grand words, but with the right ones,
              in a voice that doesn't perform sincerity but simply is sincere. Shoulders
              straighten. Eyes meet. The despair that was settling like fog lifts, not because
              the situation changed, but because someone said what everyone was thinking and
              made it sound like a beginning instead of an end.
            limits: >
              Inspiration is borrowed courage. When the speech fades and the fear returns —
              and it always returns — the fall is worse than if you'd said nothing. People
              who feel manipulated into bravery become bitterly cautious afterward.
          - name: "Negotiate"
            experience: >
              A negotiation is a puzzle where both sides hold pieces the other needs. You listen
              more than you speak, cataloging what they mention and what they carefully don't.
              The concession you offer first is small and costs you nothing — it teaches them
              that giving feels safe. The real ask comes later, wrapped in their own logic.
              When the deal closes, they believe it was their idea. Sometimes it was.
            limits: >
              Negotiation requires something the other party wants. Against someone who
              needs nothing from you, or who values pride above profit, your tools are
              useless. And a reputation for clever dealing makes future partners
              count their fingers after every handshake.
      tier_3:
        name: "Sovereign Voice"
        description: "When you speak, the room reorganizes itself around your words."
        abilities:
          - name: "Command"
            experience: >
              There is a register of voice that bypasses thought and speaks directly to the
              part of the brain that obeys. Not volume — captains scream and are ignored. It
              is certainty made audible. You say sit and legs fold. You say stop and hands
              freeze. For one bright moment, your will becomes theirs. They can resist, but
              resistance requires a decision, and your command arrives before the decision does.
            limits: >
              Command burns trust like fuel. Use it on allies and they resent you in ways
              they can't articulate. Use it on enemies and they become immune — the shock
              only works once per person, and the second time, their resistance arrives
              already loaded.
          - name: "Rumor"
            experience: >
              A rumor is a living thing. You plant it like a seed — a whispered word to the right
              ear, a question that implies its own answer, a detail too specific to be invented.
              Then you step back and watch it grow. The rumor finds its own shape, carried by
              people who believe they discovered it themselves. By the time it reaches the target,
              your fingerprints are nowhere near it. The city does your work while you sleep.
            limits: >
              Rumors mutate. The story you planted becomes something else in the retelling,
              often worse, often aimed at someone you didn't intend. Start enough whispers
              and the city's gossip becomes a wildfire you can't direct. Some of those
              fires burn back toward you.

  - name: "Craft"
    description: "Creation, repair, mechanical ingenuity"
    triggers:
      - "repairing equipment"
      - "crafting tools or weapons"
      - "building structures"
      - "identifying construction weaknesses"
    tier_thresholds: [5, 12, 25]
    unlocks:
      tier_1:
        name: "Handy"
        description: "You understand how things are put together, which means you understand how they come apart."
        abilities:
          - name: "Field Repair"
            experience: >
              The broken thing speaks to you through your fingers — the crack in the haft,
              the bent tang, the stripped threading. You work with what's available: a strip
              of leather for binding, a heated stone for reshaping, pine resin for sealing.
              It won't be pretty. The repair will show like a scar. But the blade will hold
              for another fight, the wheel will turn for another mile, and pretty was never
              the point.
            limits: >
              Field repairs are promises, not solutions. Each one weakens the whole. A
              sword mended three times breaks in three places at once. The fix holds until
              it doesn't, and it always chooses the worst moment to stop holding.
          - name: "Assess Structure"
            experience: >
              You look at a building the way a butcher looks at a carcass — joints, load points,
              the bones beneath the skin. That sagging lintel tells you the foundation has shifted.
              Those cracks follow stress lines, not weather. You tap a wall and the sound tells
              you solid or hollow, oak or rot behind the plaster. Every structure is a confession
              of how it was built and how it will fail.
            limits: >
              You can see the weakness but not always the cause. A structure failing from
              below — undermined foundations, flooded cellars, burrowing creatures — looks
              solid from the surface until the floor opens beneath you.
      tier_2:
        name: "Artisan"
        description: "Your work has quality. People seek your hands for the things that matter."
        abilities:
          - name: "Forge Weapon"
            experience: >
              The metal tells you when it's ready — not by color alone, but by the sound under
              the hammer: a clear ring means willing, a dull thud means stubborn. You fold and
              strike, driving out impurity with patience and heat. The quench is the gamble —
              too fast and it cracks, too slow and it bends. When it's done, you hold something
              that wasn't there before, shaped by your decisions, carrying your mistakes and
              your care in equal measure.
            limits: >
              Good steel requires good materials. Work with poor iron and skill produces
              a pretty failure — a blade that looks right but shatters on first real
              contact. You cannot forge what the metal refuses to become.
          - name: "Trap Setting"
            experience: >
              The mechanism is simple — a trigger, a spring, a consequence. You build with what
              the terrain provides: bent saplings, balanced stones, weighted ropes. The art is
              in the placement, in understanding how a person or creature moves through space
              and where they'll put their weight without thinking. You set it and you leave,
              and the trap waits with the infinite patience of a thing that doesn't know it's
              waiting.
            limits: >
              Traps don't distinguish friend from foe. Forget where you placed one and
              you become your own victim. Complex mechanisms fail in weather — springs
              rust, ropes fray, triggers freeze. Simple traps are reliable. Clever traps
              are liabilities.
      tier_3:
        name: "Master Builder"
        description: "What you make lasts. What you break stays broken."
        abilities:
          - name: "Masterwork"
            experience: >
              The difference between a weapon and a masterwork is not technique — it's listening.
              The metal has a shape it wants to be, and your job is to find it. You work for
              days, refusing to hurry. Each fold deliberate. Each quench tested. The balance
              point shifts by fractions until it settles where the hand expects it. When it's
              done, the weapon is inevitable — as if it always existed and you simply
              uncovered it.
            limits: >
              A masterwork demands everything. The concentration is absolute — interrupted
              work cannot be resumed, only restarted. And the smith's body pays: burned
              hands, smoke-damaged lungs, joints that ache in the cold. Every masterwork
              costs the maker something that doesn't grow back.
          - name: "Siege Craft"
            experience: >
              Walls are problems, and problems have solutions. You study a fortification the way
              a surgeon studies a body — where does it breathe, where does it eat, where is the
              blood supply. Undermining, bombardment, escalade: each has a geometry. You calculate
              angles and weight tolerances, sketch approaches in the dirt, identify the one section
              of wall where the builder cut corners. Every fortress has a flaw. Your job is to
              find it before the garrison finds you.
            limits: >
              Siege work is slow and exposed. The calculations demand time you often don't
              have, and the enemy improves their defenses while you study them. A rushed
              siege kills more attackers than defenders. Patience wins walls; impatience
              fills graves.

  - name: "Vigil"
    description: "Awareness, perception, watchfulness"
    triggers:
      - "standing watch effectively"
      - "noticing hidden details"
      - "detecting traps or ambushes"
      - "reading body language"
    tier_thresholds: [5, 12, 25]
    unlocks:
      tier_1:
        name: "Alert"
        description: "Your senses have sharpened. You notice what others walk past."
        abilities:
          - name: "Danger Sense"
            experience: >
              It's not a sound or a sight — it's an absence. The bird that stopped singing,
              the shadow that's wrong for the time of day, the dust that hasn't settled. Your
              body knows before your mind catches up: skin prickles, weight shifts to the balls
              of your feet, hand drifts to the hilt. You don't know what's wrong yet, but you
              know something is, and that half-second of readiness is the difference between
              ambush and response.
            limits: >
              Hypervigilance is its own trap. Start seeing danger everywhere and you exhaust
              yourself jumping at shadows. After too many sleepless watches, the sense dulls
              and the real threat arrives while you're twitching at nothing.
          - name: "Keen Eye"
            experience: >
              Details accumulate — the scratch on the lock that wasn't there yesterday, the
              boot print in dust that doesn't match anyone present, the way the mortar between
              two stones is newer than the rest. You see the room as a collection of stories:
              who was here, what they touched, where they went. It's exhausting and involuntary.
              Your eye catches the anomaly before you can decide whether you care, and once
              caught, it won't let go until you've understood it.
            limits: >
              You see details but not always significance. A room full of anomalies
              overwhelms — everything seems important, nothing ranks, and you freeze
              while your mind tries to process all of it at once.
      tier_2:
        name: "Sentinel"
        description: "Nothing enters your awareness without your knowledge. The world reports to you."
        abilities:
          - name: "Read the Room"
            experience: >
              You walk into a space and it assembles into a tactical map: exits, cover, sight
              lines, chokepoints. The person near the door is nervous. The one at the bar is
              armed beneath their cloak. The merchant in the corner is watching the nervous one,
              not the door. You absorb all of this in the time it takes to order a drink, and
              now you know the shape of what's about to happen before anyone else suspects it.
            limits: >
              Social complexity defeats you. A room with forty people generating forty
              stories becomes noise. Your attention fragments, priority collapses, and you
              miss the obvious threat while cataloging irrelevant details about the
              merchant's cufflinks.
          - name: "Night Watch"
            experience: >
              The darkness becomes information. You learn to hear distance — footsteps at forty
              paces sound different from footsteps at twenty. Your eyes adjust and the starlight
              becomes enough. Wind direction tells you what's upwind; silence tells you what's
              hunting. You settle into a patience that isn't passive but loaded, like a drawn bow.
              Hours pass and your attention doesn't waver because you've learned to rest within
              alertness, keeping the surface of your mind still while something deeper watches.
            limits: >
              Extended watches without relief erode even trained endurance. By the fourth
              hour, your eyes invent movement in still shadows. By the sixth, sounds
              become uncertain. The mind fills darkness with its own fears, and
              eventually you can't tell the real from the imagined.
      tier_3:
        name: "Eye of the Watch"
        description: "You see the shape of events before they arrive. Not prophecy — just attention raised to an art."
        abilities:
          - name: "Anticipate"
            experience: >
              Cause has a shape, and you've learned to see it. The argument at the tavern will
              become a knife fight in three exchanges — you can see the escalation as clearly
              as stairs. The caravan is taking the wrong road. The siege will come from the east
              because the west approach has been reinforced and the commander is cautious. You
              see the future not as vision but as architecture: load-bearing events that can
              only resolve in certain ways.
            limits: >
              People are not architecture. They do irrational things — sacrifice advantage,
              act from spite, choose loyalty over survival. Your predictions assume reason,
              and reason is the first casualty of fear, love, and pride.
          - name: "True Sight"
            experience: >
              Not magical vision — something harder to explain. You have spent so long watching
              the world that deception registers as friction, a subtle wrongness that your trained
              eye catches before your mind can name it. The illusion's edge doesn't quite match
              the light. The disguise moves wrong — the face says peasant but the hands say
              soldier. The forged letter uses the right seal but the wrong weight of paper.
              Truth has a texture, and you have memorized it.
            limits: >
              Perfection defeats you. A sufficiently skilled forger, a sufficiently detailed
              illusion, a sufficiently committed liar — if every detail is right, your
              instinct has nothing to catch. You trust your sight and your sight says
              genuine, and you are wrong with absolute confidence.

