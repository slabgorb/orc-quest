# Visual style configuration for low fantasy genre pack
#
# Controls how Flux image generation renders scenes for this genre.
# Low fantasy visual identity: watercolor painting on rough paper.
# Soft washes of warm, muted color — ochre, sienna, slate blue —
# with visible paper texture bleeding through. Figures have weight
# and character but an otherworldly softness. Backgrounds dissolve
# into loose wet-on-wet suggestion. The mood comes from pigment
# and paper grain, not from digital post-processing.

# ── Core Style ────────────────────────────────────────────────

positive_suffix: >-
  watercolor painting on rough cold-pressed paper, soft wet-on-wet
  washes, visible paper texture bleeding through pigment, warm muted
  palette of ochre sienna and slate blue, loose brushwork in
  backgrounds, ink linework defining edges, atmospheric depth

negative_prompt: >-
  photorealistic, glossy, 3d render, digital art, smooth skin,
  airbrushed, photograph, sharp focus, anime, cartoon, neon,
  high saturation, plastic, clean lines, vector art

preferred_model: flux

base_seed: 42

# ── Location Tag Overrides ────────────────────────────────────

visual_tag_overrides:
  tavern: >-
    low timber beams blackened by decades of hearth smoke, tallow
    candles guttering in iron holders, scarred oak tables ringed
    with ale stains, flagstone floor worn smooth, warmth pooling
    around the fireplace while shadows gather in corners
  forest: >-
    gnarled ancient oaks with twisted branches, grey mist threading
    between trunks, undergrowth of fern and bramble, crows on dead
    boughs silhouetted against overcast sky, damp leaf litter
  dungeon: >-
    rough-hewn stone corridors with arched ceilings, single torch
    casting long shadows, dripping water pooling on uneven floor,
    iron-banded doors, scratched tally marks on walls
  castle: >-
    weathered limestone walls patched and repatched over centuries,
    tall narrow windows with warped glass, tattered banners faded
    to near-white, worn flagstones hollowed by generations of boots
  market: >-
    crowded market square with canvas-and-timber stalls, muddy
    cobblestones, overcast sky threatening rain, hawkers with
    weathered faces, baskets of root vegetables and dried fish
  cave: >-
    deep natural cavern receding into darkness, rough limestone
    formations, single lantern casting a warm circle of light,
    stalactites dripping into still pools, bat shadows on ceiling
  temple: >-
    small stone chapel with a single cracked stained glass window,
    wooden benches worn smooth by prayer, incense smoke curling
    in dusty light shafts, moss creeping along the threshold
  battlefield: >-
