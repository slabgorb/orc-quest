stat_generation: point_buy
point_buy_budget: 27
magic_level: low

allowed_classes:
  - Fighter
  - Ranger
  - Rogue
  - Cleric
  - Druid
  - Bard
  - Barbarian
  - Monk
  - Wizard

allowed_races:
  - Human
  - Dwarf
  - Elf
  - Halfling

banned_spells:
  - Fireball
  - Wish
  - Meteor Swarm
  - Power Word Kill
  - Gate
  - Teleport
  - Plane Shift
  - True Resurrection
  - Time Stop

hp_formula: "class_base * level"

custom_rules:
  rest_variant: gritty_realism
  encumbrance: variant
  injuries: lingering

default_class: Fighter
default_race: Human
default_hp: 10
default_ac: 10
default_location: "The crossroads outside a small village"
default_time_of_day: dusk

class_hp_bases:
  Fighter: 10
  Barbarian: 12
  Wizard: 6
  Rogue: 8
  Cleric: 8
  Ranger: 10
  Paladin: 10
  Bard: 8
  Sorcerer: 6
  Warlock: 8
  Druid: 8
  Monk: 8

ability_score_names:
  - STR
  - DEX
  - CON
  - INT
  - WIS
  - CHA

stat_display_fields:
  - hp
  - max_hp
  - ac

encounter_base_tension:
  random: 0.10
  ambush: 0.30
  boss: 0.40
  final: 0.50
