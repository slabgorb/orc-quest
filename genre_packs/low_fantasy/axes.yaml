# Low Fantasy — Tone Alignment Axes
# These axes control the narrative tone of the game session.
# Values range from 0.0 (first pole) to 1.0 (second pole).

definitions:
  - id: comedy
    name: Comedy
    description: >-
      How much humor pervades the narrative. At the low end, the world is
      played straight — violence hurts, consequences stick, and jokes are
      rare. At the high end, absurdity is welcome, pratfalls happen in
      combat, and NPCs deliver dry wit or slapstick.
    poles:
      - serious
      - comedic
    default: 0.3

  - id: gravity
    name: Gravity
    description: >-
      The weight of consequences and stakes. Low gravity means scrapes heal
      fast, failure is a setback, and death is unlikely. High gravity means
      wounds fester, mistakes cascade, and named characters can die
      permanently.
    poles:
      - light
      - heavy
    default: 0.6

  - id: outlook
    name: Outlook
    description: >-
      The prevailing mood of the world. A bleak outlook means corruption
      wins more than it loses, hope is scarce, and morality is grey. A
      hopeful outlook means good deeds matter, redemption arcs land, and
      the world bends toward justice — eventually.
    poles:
      - bleak
      - hopeful
    default: 0.4

modifiers:
  comedy:
    serious: >-
      Keep the tone grounded and earnest. Avoid jokes, puns, or comedic
      timing in narration. NPCs speak plainly. Pain is described without
      levity. If something absurd happens, treat it with the same weight
      as everything else.
    comedic: >-
      Lean into dry humor, irony, and the absurd. NPCs can be eccentric
      or self-aware. Combat descriptions may include slapstick or comic
      misfortune. The narrator voice can be wry and occasionally
      break-the-fourth-wall adjacent.

  gravity:
    light: >-
      Consequences are mild and recoverable. Wounds heal quickly, lost
      items turn up, and NPCs forgive easily. Death is off the table
      for player characters and rare for anyone else. The world is
      forgiving.
    heavy: >-
      Every choice has weight. Wounds take time to heal and may leave
      scars. Resources are scarce and hard-won. NPCs remember slights.
      Player characters can die if they act recklessly. Describe the
      cost of violence plainly.

  outlook:
    bleak: >-
      The world is weary and worn. Power corrupts, institutions fail,
      and kindness is often exploited. Frame moral choices as hard
      trade-offs with no clean answers. Hope exists but is fragile
      and easily crushed.
    hopeful: >-
      Good faith efforts pay off more often than not. NPCs can be
      genuinely kind without hidden motives. Frame moral choices so
      that doing the right thing is hard but rewarded. The world is
      troubled but salvageable.

presets:
  - name: Pratchett
    description: >-
      Inspired by Terry Pratchett's Discworld — sharp wit layered over
      genuine humanity. The world is funny but the people in it are real.
      Consequences exist but rarely crush.
    values:
      comedy: 0.85
      gravity: 0.3
      outlook: 0.7

  - name: Abercrombie
    description: >-
      Inspired by Joe Abercrombie's First Law — dark, gritty, and
      unsparing. Humor is gallows humor at best. Heroes are flawed,
      victory is pyrrhic, and the world does not care about your
      feelings.
    values:
      comedy: 0.15
      gravity: 0.9
      outlook: 0.15

  - name: Balanced
    description: >-
      A middle-ground tone suitable for most tables. Moments of levity
      break tension without undercutting drama. Consequences matter but
      the world offers second chances. Neither grim nor whimsical.
    values:
      comedy: 0.4
      gravity: 0.5
      outlook: 0.5
