- affected_cultures:
  - Brevonne
  - Nordmark
  cultural_impact: The Brevonne still celebrate 'Beaumont's Ambition' as a holiday
    about reaching for greatness, which the Nordmark find so offensive they refuse
    to trade during that week. Brevonne children are taught he was a visionary; Nordmark
    children are taught he was a tyrant who worked their ancestors to death and then
    had the audacity to fall on them. The spinning compass phenomenon means all Pinwheel
    Coast navigation relies on guild-trained star-readers, making the Navigator's
    Guild obscenely powerful and smug about it.
  era: 1,200 years ago
  faction_grudges:
  - from: Nordmark
    reason: Three generations of highland clans were conscripted as laborers for the
      Ladder. The Brevonne have never formally apologized, and instead named a holiday
      after the man responsible.
    to: Brevonne
  - from: Nordmark
    reason: The Guild charges extortionate fees to guide ships through the compass-dead
      waters, profiting from a disaster that killed Nordmark ancestors.
    to: Navigator's Guild
  lost_arts:
  - "Moonlight crystallization \u2014 the technique died with Beaumont, though fragments\
    \ of his notes surface occasionally and are immediately fought over"
  - The Nordmark rope-singing tradition used by conscripted laborers, now only performed
    as a funeral dirge
  monuments:
  - "The Stump \u2014 a two-hundred-foot base of fused stone and crystal that still\
    \ stands on Cape Malheur, warm to the touch and faintly humming on clear nights"
  - "Beaumont's Grave \u2014 not where he's buried (nobody knows where that is), but\
    \ a Nordmark latrine built on the spot where the collapse killed their clan-chief,\
    \ maintained with grim dedication for twelve centuries"
  name: The Folly of Saint Beaumont's Ladder
  summary: "The Brevonne archmage Saint Beaumont attempted to build a literal staircase\
    \ to the moon using crystallized moonlight and the forced labor of Nordmark highland\
    \ clans. The structure reached impossible heights before collapsing spectacularly,\
    \ scattering shards of solidified light across three hundred miles of coastline\
    \ and creating a permanent navigational hazard that gives the Pinwheel Coast its\
    \ name \u2014 the debris field causes ships' compasses to spin uselessly."
  terrain_scars:
  - description: A three-hundred-mile stretch of coastal waters littered with crystallized
      moonlight shards on the seabed. Compasses spin wildly, tides behave unpredictably,
      and on moonless nights the seafloor glows a pale silver. Fish caught here taste
      faintly of lavender, which is either a delicacy or an abomination depending
      on who you ask.
    name: The Pinwheel Shallows
    region: ''
    type: cursed_ground
  - description: "The surviving foundation of the Ladder \u2014 a massive fused-stone\
      \ platform covered in half-melted crystalline stairs that lead nowhere. Local\
      \ Brevonne couples consider it romantic to picnic there. Local Nordmark consider\
      \ this further evidence of Brevonne moral bankruptcy."
    name: The Stump of Saint Beaumont
    region: ''
    type: ruin
  - description: A twelve-mile-wide impact zone in the Nordmark highlands where the
      upper Ladder came down. The ground is permanently depressed and strewn with
      glassy debris. Nothing grows taller than knee-height. Nordmark clans hold annual
      remembrance there, which mostly consists of drinking and swearing about Brevonne.
    name: The Clatter
    region: ''
    type: crater
- affected_cultures:
  - Khorvath
  - Brevonne
  cultural_impact: "The Khorvath developed an intense cultural suspicion of enclosed\
    \ light sources and to this day prefer open fires to lanterns, which makes them\
    \ deeply uncomfortable guests in Brevonne households. The Brevonne rebuilt Solenne\
    \ but never recovered the Sun-Lantern's technology, and the city's famous river-wine\
    \ now grows in soil laced with glass particulate, giving it a distinctive grit\
    \ that sommeliers insist is 'terroir' and everyone else calls 'sand.' Both cultures\
    \ blame each other for the loss of the artifact \u2014 the Khorvath say the Brevonne\
    \ hoarded it selfishly during a crisis; the Brevonne say the Khorvath broke the\
    \ only thing that could have saved everyone."
  era: 600 years ago
  faction_grudges:
  - from: Khorvath
    reason: The Brevonne refused to share the Sun-Lantern during a winter that was
      killing Khorvath herds by the thousands. The Khorvath consider this an act of
      passive genocide.
    to: Brevonne
  - from: Brevonne
    reason: The Khorvath destroyed an irreplaceable artifact that the Brevonne had
      maintained for six centuries. Also, the wine has sand in it now, and they will
      never forgive this.
    to: Khorvath
  lost_arts:
  - "Sun-Lantern construction \u2014 the last working example was destroyed in the\
    \ Flash, and the artisan lineage that maintained it was incinerated along with\
    \ their workshop"
  - "Khorvath winter-herding formations that kept their massive horse herds alive\
    \ during polar darkness \u2014 the herds died during the Long Winter and the techniques\
    \ became irrelevant"
  monuments:
  - "The Blind Wall \u2014 the western wall of Solenne, still standing, permanently\
    \ bleached white on the side that faced the Flash. Touch it at noon and it's still\
    \ warm."
  - "The Khorvath Cairn of Szemere \u2014 a massive stone pile on the edge of the\
    \ glass desert where the Khorvath clans meet every decade to renew their grievance.\
    \ A sapper's broken pickaxe is embedded in the top stone."
  name: The War of the Borrowed Sun
  summary: "When a magical winter locked the Pinwheel Coast in eighteen months of\
    \ darkness, the Khorvath steppe-clans besieged the Brevonne city of Solenne to\
    \ seize its Sun-Lantern \u2014 a pre-Beaumont artifact that could illuminate an\
    \ entire river valley. The siege lasted nine months and ended when a Khorvath\
    \ sapper accidentally cracked the Lantern's casing, releasing stored sunlight\
    \ in a single catastrophic flash that burned the besieging army, half the city,\
    \ and created a glass desert where the Khorvath camp had stood."
  terrain_scars:
  - description: A four-mile radius of fused glass desert where the Khorvath siege
      camp once stood. The ground is smooth, slightly convex, and reflects sunlight
      so intensely that travelers crossing it at midday have been known to get sunburned
      from below. Khorvath riders consider it sacred ground and will fight anyone
      who tries to build on it, though they also refuse to camp on it because it gets
      unbearably hot.
    name: The Bright Flat
    region: ''
    type: dead_zone
  - description: "The eastern district of Solenne where the Sun-Lantern was housed.\
      \ The buildings are still standing but hollowed out \u2014 the Flash burned\
      \ everything inside while leaving the stone shells intact. Brevonne artisans\
      \ have converted some into open-air workshops, but locals say the walls still\
      \ smell of ozone during thunderstorms."
    name: Solenne's Lantern Quarter
    region: ''
    type: ruin
  - description: The road leading to Solenne's eastern gate, where the heaviest fighting
      occurred during the nine-month siege. The soil is still iron-rich from blood
      and broken weapons. Farmers who work adjacent fields regularly plow up arrowheads,
      horse bones, and occasionally a remarkably well-preserved Khorvath boot.
    name: The Ash Approach
    region: ''
    type: battlefield
- affected_cultures:
  - Brevonne
  - Nordmark
  - Khorvath
  cultural_impact: "The phrase 'drowning the table' is used across all three cultures\
    \ to mean snatching defeat from the jaws of victory, though each culture pronounces\
    \ it in a way that subtly blames the other two. Diplomatic meetings are now never\
    \ held on islands, near water, or with alcohol \u2014 rules that are widely resented\
    \ and frequently violated. The original treaty text, waterlogged but legible,\
    \ was recovered and is kept in a Brevonne archive. Historians who have read it\
    \ confirm it was genuinely fair and reasonable, which makes everyone angrier."
  era: 350 years ago
  faction_grudges:
  - from: Brevonne
    reason: The Nordmark delegate's drunken singing sank the island and killed the
      Brevonne chief ambassador, who by all accounts was a genuinely decent person.
    to: Nordmark
  - from: Nordmark
    reason: The Brevonne blamed the sinking on deliberate Nordmark sabotage and used
      it as a pretext to seize three Nordmark river-ports during the subsequent war.
    to: Brevonne
  - from: Khorvath
    reason: The Brevonne kept the recovered treaty document rather than sharing it,
      and now charge admission to view it in their archive. The Khorvath consider
      this the most Brevonne thing that has ever happened.
    to: Brevonne
  - from: Khorvath
    reason: A Khorvath ambassador drowned because the Nordmark delegate who accidentally
      caused the sinking panicked and swam to safety rather than helping anyone else.
    to: Nordmark
  lost_arts:
  - "Nordmark sea-wards \u2014 the entire tradition of maritime protective chanting\
    \ was banned by the Nordmark clans themselves after the disaster, though a few\
    \ remote coastal families still know fragments"
  - "Trilateral diplomacy \u2014 the three cultures have not attempted a joint summit\
    \ since, conducting all negotiations bilaterally, which takes three times as long\
    \ and pleases no one"
  monuments:
  - "The Drowning Table itself \u2014 the stone negotiation table is still visible\
    \ at low tide, six feet underwater, with the treaty's preamble carved into its\
    \ surface. All three cultures maintain it is in their territorial waters."
  - "Three Fools' Fountain in the Brevonne capital \u2014 a fountain depicting three\
    \ diplomats sinking, commissioned by a Brevonne queen who thought it was hilarious.\
    \ The Nordmark and Khorvath embassies have formally complained about it eleven\
    \ times."
  name: The Pact of the Drowning Table
  summary: "All three cultures sent diplomats to a neutral island to negotiate a permanent\
    \ peace treaty. The negotiations were going surprisingly well until a Nordmark\
    \ delegate's celebratory drinking song accidentally invoked an old sea-ward, sinking\
    \ the island six feet into the ocean. The delegations blamed each other for sabotage,\
    \ three ambassadors drowned in the ensuing panic, and the resulting war lasted\
    \ forty years \u2014 fought primarily over who was responsible for ruining what\
    \ everyone privately admits was a pretty good treaty."
  terrain_scars:
  - description: A submerged island plateau visible just below the waterline at low
      tide. The stone table and chairs are still arranged as they were during negotiations.
      Seaweed grows on everything except the treaty stone, which remains inexplicably
      clean. Fishermen avoid the area because their nets snag on diplomatic furniture.
    name: The Sunken Parley
    region: ''
    type: cursed_ground
  - description: The narrow waterway that formed when the island sank, creating a
      shipping channel between two previously connected landmasses. It is the most
      efficient trade route on the Pinwheel Coast, which means all three cultures
      must use it constantly, which means all three cultures must be reminded of the
      Pact's failure constantly. Toll collection rights are disputed and have caused
      no fewer than six minor naval skirmishes since.
    name: The Grudge Straits
    region: ''
    type: rift
  - description: "On the shores flanking the Grudge Straits, the foundations of the\
      \ three temporary embassies built for the negotiations still stand \u2014 each\
      \ culture built theirs in their own architectural style, and each has been defaced\
      \ by the other two cultures' graffiti so many times that the original stonework\
      \ is barely visible under centuries of insults."
    name: The Embassy Stumps
    region: ''
    type: ruin
