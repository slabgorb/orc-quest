      lookback: 2
      reject_files: []
      word_list: []
    place_noun:
      corpora: []
      lookback: 2
      reject_files: []
      word_list:
      - heim
      - stead
      - fell
      - mark
      - hold
      - garth
      - thorpe
      - vik
