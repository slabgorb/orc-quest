  - '{given_name} {patronymic}dottir'
  - '{given_name} the {adjective}'
  place_patterns:
  - '{adjective}{place_noun}'
  - '{patronymic}{place_noun}'
  slots:
    adjective:
      corpora: []
      lookback: 2
      reject_files: []
      word_list:
      - iron
      - frost
      - stone
      - black
      - winter
      - storm
      - grey
      - old
    given_name:
