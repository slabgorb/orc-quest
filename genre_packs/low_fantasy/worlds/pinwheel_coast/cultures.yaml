- description: "Franco-Celtic river kingdom culture \u2014 smooth, elegant names"
  name: Brevonne
  person_patterns:
  - '{given_name} {family_name}'
  - '{given_name} de {family_name}'
  - '{given_name} le {family_name}'
  place_patterns:
  - '{adjective} {place_noun}'
  - '{given_name}''s {place_noun}'
  slots:
    adjective:
      corpora: []
      lookback: 2
      reject_files: []
      word_list:
      - grey
      - silver
      - dark
      - old
      - high
      - fallen
      - quiet
      - lost
    family_name:
      corpora:
      - corpus: french.txt
        weight: 1.0
      lookback: 2
      reject_files: []
      word_list: []
    given_name:
      corpora:
      - corpus: french.txt
        weight: 0.7
      - corpus: english.txt
        weight: 0.3
      lookback: 3
      reject_files: []
      word_list: []
    place_noun:
      corpora: []
      lookback: 2
      reject_files: []
      word_list:
      - hollow
      - ford
      - crossing
      - vale
      - ridge
      - keep
      - bridge
      - mire
- description: "Nordic-influenced highland clan culture \u2014 harder consonants,\
