cosmology: "The peoples of the Pinwheel Coast broadly agree that gods exist, in the\
  \ same way one might agree that weather exists \u2014 as a persistent, largely inconvenient\
  \ force that occasionally ruins your plans. The dominant theological framework holds\
  \ that the world was shaped by a council of divine beings who have since become\
  \ distracted, asleep, or quietly embarrassed by how things turned out. Magic is\
  \ understood to be the residual leakage of divine intention, which is why it works\
  \ unpredictably and often with unintended consequences \u2014 Saint Beaumont's Ladder\
  \ being the definitive cautionary tale. The Brevonne worship through academic study,\
  \ believing that understanding magic's rules is the closest one gets to prayer.\
  \ The Khorvath honor ancestral spirits and the Burned Ones, the soldiers who died\
  \ in the Solenne flash and whose ghosts are said to warm the Glass Waste still.\
  \ The Nordmark maintain that the old sea-wards and mountain-songs are not magic\
  \ but simply good manners toward a world that is, at its core, alive and listening\
  \ \u2014 a position somewhat undermined by the Drowning Table incident, which they\
  \ attribute to the sea being 'in a mood that day.'"
factions:
- description: A Brevonne scholarly order dedicated to recovering and studying fragments
    of Saint Beaumont's Ladder, which they believe contain encoded knowledge of pre-Folly
    magic. They maintain lighthouse-laboratories along the coast and have developed
    techniques for safely handling crystallized moonlight, which they sell at extraordinary
    markup to fund further research. Their stated goal is to 'complete Beaumont's
    work responsibly,' a phrase that makes everyone else on the Pinwheel Coast deeply
    nervous. They are currently locked in a bitter funding war with the Regatta Commission,
    which considers the debris field a sporting venue, not a research site. Several
    senior Collegiates have been caught sabotaging race buoys.
  disposition: neutral
  name: The Lamplighters' Collegium
- description: Khorvath artisans and merchants who have built an economic empire on
    the Glass Waste, crafting everything from architectural panels to precision lenses
    from the fused earth. They control the most valuable real estate on the Coast
    and defend it with a combination of trade leverage and a surprisingly well-equipped
    militia armed with glass-edged weapons that never dull. Their political goal is
    recognition of the Glass Waste as a sovereign territory belonging to neither Khorvath
    traditionalists nor Brevonne claimants. The old Khorvath steppe-clans consider
    them sellouts who've turned a mass grave into a shopping district; the Glasswrights
    consider the steppe-clans sentimental fossils who'd rather starve nobly than adapt.
  disposition: wary
  name: The Glasswrights of Solenne
- description: A secretive Nordmark tradition-keeper society that maintains the old
    sea-wards, mountain-songs, and land-charms that their ancestors used long before
    Beaumont started building staircases. They are simultaneously the Nordmark's most
    respected cultural institution and their biggest diplomatic liability, since it
    was a Tide Singer's apprentice who sank the Drowning Table. The order has spent
    three hundred and fifty years trying to prove the sinking was the sea's independent
    decision and not their fault, commissioning increasingly elaborate academic studies
    that always conclude 'further research is needed.' They want to restore Nordmark
    cultural prestige and, more practically, to be allowed to sing at diplomatic functions
    again.
  disposition: cautious
  name: The Tide Singers
- description: A multi-cultural organization founded eighty years ago by idealists
    from all three cultures who believe that the Drowning Table treaty was genuinely
    good and should be recovered, ratified, and enacted. They employ divers, historians,
    and waterproof ink specialists to recover documents from the sunken island, which
    now sits in about six feet of water and serves as an unusually contentious reef.
    The Commission is perpetually underfunded, internally fractious, and haunted by
    the irony that their own meetings frequently devolve into the same cultural misunderstandings
    that sank the original negotiations. Despite this, they've recovered roughly sixty
    percent of the original treaty text, and what they've found suggests it was, in
    fact, a pretty good treaty.
  disposition: friendly
  name: The Treaty Salvage Commission
- description: 'A Khorvath spiritual-military order that claims descent from survivors
    of the Solenne flash. They maintain that the catastrophic release of the Sun-Lantern
    was not an accident but divine judgment against both the Brevonne for hoarding
    light and the Khorvath besiegers for trying to steal it. They preach radical self-sufficiency
    and view both the Glasswrights'' commercialism and the Brevonne''s scholarship
    as repetitions of the same old sin: treating power as property. They patrol the
    edges of the Glass Waste performing rituals for the dead and occasionally raiding
    Lamplighter caravans transporting moonlight fragments, which they consider equally
    dangerous stolen light. Their membership is small but fanatically committed, and
    they have a troubling habit of being right about which experiments are going to
    explode.'
  disposition: hostile
  name: The Burned Court
geography: "The Pinwheel Coast stretches roughly three hundred miles along the western\
  \ shore of a continent that cartographers have named at least six times without\
  \ any name sticking. The coastline is famously treacherous: the shattered remnants\
  \ of Saint Beaumont's Ladder create a near-permanent aurora of refracted light over\
  \ the shallow waters, beautiful to look at and absolutely murderous to navigate,\
  \ since the crystallized moonlight fragments cause compasses to spin like children's\
  \ toys \u2014 hence the name. Inland, the terrain rises sharply through Nordmark\
  \ highland country, all peat bogs and granite ridges and sheep that have developed\
  \ a concerning level of self-determination, before leveling out into the Khorvath\
  \ steppe to the east. The Glass Waste sits where the Solenne river valley used to\
  \ be, a miles-wide expanse of fused earth that glows faintly orange at sunset and\
  \ hums on windless nights. The river itself, the Brevonne's old lifeline, was diverted\
  \ by the blast and now takes an apologetic detour through three Nordmark villages\
  \ that never asked for waterfront property and remain vocally ungrateful about it."
history: "The Pinwheel Coast remains, three and a half centuries after the Drowning\
  \ Table incident, a region defined by spectacular failures of ambition and the lingering\
  \ grudges they produce. The Brevonne city-states still dominate the southern coast,\
  \ their spired universities and trade houses built atop foundations of old guilt\
  \ \u2014 Saint Beaumont's Ladder is simultaneously their greatest shame and their\
  \ most popular tourist attraction, with guided boat tours through the shimmering\
  \ debris field available for twelve silver a head. The Khorvath clans have retreated\
  \ to the Glass Waste, the vitrified desert their ancestors helped create at Solenne,\
  \ which they've transformed from a monument to catastrophe into a thriving trade\
  \ hub \u2014 it turns out that fused sand makes excellent building material, and\
  \ the perpetual warmth radiating from the old blast site means their greenhouses\
  \ produce tomatoes year-round. The Nordmark highlanders, meanwhile, have never quite\
  \ lived down the Drowning Table affair, and their diplomats are now contractually\
  \ forbidden from singing at state functions.\n\nThe forty-year War of the Singing\
  \ Delegate (as historians diplomatically call it) ended not with a treaty but with\
  \ exhaustion, and the three cultures settled into a wary coexistence held together\
  \ by trade, intermarriage, and the shared understanding that every time they try\
  \ to formalize peace, something goes catastrophically wrong. A new generation of\
  \ leaders has emerged who view the old rivalries as somewhere between sacred tradition\
  \ and collective embarrassment. Border skirmishes still flare up seasonally \u2014\
  \ usually in spring, when the highland clans get restless and the Brevonne tax collectors\
  \ get ambitious \u2014 but full-scale war has been avoided, mostly because nobody\
  \ can agree on whose turn it is to start one. The real power struggles now play\
  \ out through merchant guilds, scholarly rivalries, and an increasingly cutthroat\
  \ annual regatta through the Beaumont debris field, where cheating is technically\
  \ illegal but functionally expected."
world_name: The Pinwheel Coast
