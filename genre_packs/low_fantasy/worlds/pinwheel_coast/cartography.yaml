map_style: Weathered nautical chart with ink-wash coastlines, compass roses with spinning
  needles, silver-leaf accents on cursed waters, and burn-scarred parchment near the
  Glass Waste
regions:
  ash_approach_farmlands:
    adjacent:
    - solenne
    - the_glass_waste
    - khorvath_steppe
    description: Iron-rich fields flanking the old siege road to Solenne's eastern
      gate, where farmers grow blood-red wheat in soil still saturated with six hundred
      years of war debris. Plowing season reliably produces arrowheads, horse bones,
      and the occasional remarkably preserved Khorvath boot.
    name: The Ash Approach Farmlands
  grudge_straits:
    adjacent:
    - solenne
    - pinwheel_shallows
    - nordmark_heights
    description: A narrow shipping channel formed when the Parley Island sank, flanked
      by graffiti-encrusted Embassy Stumps and contested toll stations, where the
      submerged treaty table is still visible at low tide. The most efficient and
      most diplomatically aggravating trade route on the entire coast.
    name: The Grudge Straits
  khorvath_steppe:
    adjacent:
    - nordmark_heights
    - the_glass_waste
    - ash_approach_farmlands
    description: Vast eastern grasslands where mounted Khorvath clans follow ancient
      migration circuits between seasonal camps, their routes now complicated by the
      Glass Waste's expansion and the Burned Court's growing territorial claims. The
      horizon is unbroken in every direction except west, where the highlands rise
      like a wall.
    name: Khorvath Steppe
  nordmark_heights:
    adjacent:
    - the_clatter
    - grudge_straits
    - khorvath_steppe
    description: Rolling granite ridges and waterlogged peat bogs home to fiercely
      independent Nordmark highland clans and their disturbingly organized sheep,
      now bisected by the unwelcome River Brevonne which flooded three villages into
      reluctant prosperity. The Tide Singers maintain hidden song-halls in the deepest
      valleys.
    name: Nordmark Heights
  pinwheel_shallows:
    adjacent:
    - solenne
    - the_stump
    - grudge_straits
    description: Three hundred miles of treacherous coastal waters and the fishing
      villages clinging to their edge, where the seafloor glitters with crystallized
      moonlight and the aurora of refracted light turns every sunset into a navigational
      nightmare. The lavender-tasting fish sustain a grudging export economy.
    name: The Pinwheel Shallows
  solenne:
    adjacent:
    - the_glass_waste
    - pinwheel_shallows
    - ash_approach_farmlands
    - grudge_straits
    description: A half-hollowed Brevonne river city split between its intact western
      merchant quarters and the eerie, ozone-scented stone shells of the Lantern Quarter.
      The diverted river now skirts the city's south wall in an awkward oxbow that
      everyone pretends was always there.
    name: Solenne
  the_clatter:
    adjacent:
    - the_stump
    - nordmark_heights
    description: A twelve-mile-wide bowl of permanently depressed highland terrain
      strewn with glassy debris from the Ladder's collapse, where nothing grows above
      the knee and the wind makes an unsettling chiming sound through the shards.
      The surrounding Nordmark clan-holds use it as neutral gathering ground for remembrance
      drinking.
    name: The Clatter
  the_glass_waste:
    adjacent:
    - solenne
    - khorvath_steppe
    - ash_approach_farmlands
    description: A miles-wide expanse of fused earth centered on the Bright Flat where
      the Khorvath siege camp was incinerated by the cracked Sun-Lantern, glowing
      faintly orange at sunset and humming on still nights. The Glasswrights of Solenne
      harvest its edges while Khorvath riders patrol the sacred center, sunburned
      from below.
    name: The Glass Waste
  the_stump:
    adjacent:
    - pinwheel_shallows
    - the_clatter
    description: A massive fused-stone platform rising from the coastal hills where
      the Ladder's foundation still stands, surrounded by Brevonne pilgrimage towns
      and Lamplighter research camps amid half-melted crystalline stairs that catch
      the light like broken teeth. Picnicking couples and furious scholars coexist
      uneasily.
    name: The Stump of Saint Beaumont
routes:
- danger: moderate
  description: A once-grand Brevonne highway descending from the city to the coastal
    fishing towns, now warped by subsidence and lined with compass-disrupting moonlight
    fragments that fell inland during the Ladder's collapse.
  distance: medium
  from_id: solenne
  name: The Lantern Road
  to_id: pinwheel_shallows
- danger: dangerous
  description: A blistering trail from Solenne's Lantern Quarter directly onto the
    Glass Waste, where the ground radiates heat upward and Glasswright harvesting
    crews mark safe paths with obsidian cairns that shift after windstorms.
  distance: short
  from_id: solenne
  name: The Scorch Walk
  to_id: the_glass_waste
- danger: moderate
  description: A coastal path connecting fishing villages to the Ladder's foundation,
    popular with Lamplighter researchers and Brevonne romantics, treacherous at night
    when the aurora off the shallows creates disorienting false horizons.
  distance: medium
  from_id: pinwheel_shallows
  name: The Pilgrim's Glow
  to_id: the_stump
- danger: dangerous
  description: A highland track following the Ladder's debris scatter pattern uphill
    from foundation to impact crater, where the crystalline wreckage grows denser
    and sharper with every mile and the chiming of wind through glass shards can drown
    out conversation.
  distance: long
  from_id: the_stump
  name: The Shard Trail
  to_id: the_clatter
- danger: safe
  description: A well-worn path from the crater rim into the Nordmark clan-holds,
    maintained by the highland clans for their annual drinking-and-cursing pilgrimages
    and kept clear of glass debris by generations of grudging labor.
  distance: short
  from_id: the_clatter
  name: The Remembrance Road
  to_id: nordmark_heights
- danger: moderate
  description: A muddy switchback trail from the flooded Nordmark river-villages down
    to the disputed straits, named by the villagers who never wanted waterfront property
    and resent every merchant who uses their docks.
  distance: medium
  from_id: nordmark_heights
  name: The Ungrateful Descent
  to_id: grudge_straits
- danger: moderate
  description: A contested waterway connecting the straits to Solenne's river port,
    where toll disputes have sparked six naval skirmishes and the Treaty Salvage Commission
    maintains a perpetually underfunded peacekeeping barge.
  distance: medium
  from_id: grudge_straits
  name: The Treaty Shame Canal
  to_id: solenne
- danger: moderate
  description: An old Khorvath military supply route from the siege lines to the steppe,
    now a trade road where Burned Court patrols extract informal tolls and farmers
    sell arrowhead souvenirs to passing riders.
  distance: medium
  from_id: ash_approach_farmlands
  name: The Boot Road
  to_id: khorvath_steppe
- danger: dangerous
  description: A disputed frontier trail along the highland escarpment where Khorvath
    outriders and Nordmark shepherds maintain a tense coexistence, complicated by
    sheep that have learned to steal supplies from unattended Khorvath camps.
  distance: long
  from_id: khorvath_steppe
  name: The Grudge Line
  to_id: nordmark_heights
- danger: deadly
  description: A direct route across the sacred fused-glass center of the Waste where
    sunlight reflects from below with searing intensity, attempted only by the desperate
    or the Burned Court initiates who cross it barefoot as a rite of devotion.
  distance: short
  from_id: the_glass_waste
  name: The Bright Flat Crossing
  to_id: khorvath_steppe
starting_region: solenne
world_name: The Pinwheel Coast
