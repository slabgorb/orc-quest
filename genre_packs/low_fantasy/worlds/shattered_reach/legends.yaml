- name: The Sundering
  era: "Three generations ago"
  summary: >-
    King Aldric III died without an heir, and three rival claimants
    tore the realm apart in a civil war that lasted eleven years.
    Farmland burned, trade routes collapsed, and entire towns were
    put to the sword.
  cultural_impact: >-
    The old alliances shattered like glass on stone, and nothing has
    truly healed since. Trust is the scarcest currency in the Reach.
    The common folk survive by keeping their heads down and their
    loyalties flexible.
  affected_cultures:
    - Brevonne
    - Nordmark
    - Khorvath
  faction_grudges:
    - from: Crown Remnant
      to: Thornfield Freeholders
      reason: "The Freeholders declared independence during the war and never bent the knee again."
    - from: Order of the Ashen Veil
      to: Hedge Witches
      reason: "The Veil blames unchecked sorcery for the chaos that followed the Sundering."
  monuments:
    - "Old battlefields scar the heartland farmland"
    - "The Iron Accord treaty stone at the Merchant Consortium headquarters"
  terrain_scars:
    - type: ruined_road
      region: heartland
      name: "The Old King's Road"
      description: "A decayed highway, once paved, now rutted mud — a monument to the kingdom that was."
    - type: battlefield
      region: heartland
      name: "Ashwood Ford"
      description: "The site of the war's bloodiest battle. Farmers still turn up bones when they plow."
