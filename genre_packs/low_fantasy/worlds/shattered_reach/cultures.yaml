- name: Brevonne
  description: "Franco-Celtic river kingdom culture — smooth, elegant names"
  slots:
    given_name:
      corpora:
        - corpus: french.txt
          weight: 0.7
        - corpus: english.txt
          weight: 0.3
      lookback: 3
    family_name:
      corpora:
        - corpus: french.txt
          weight: 1.0
      lookback: 2
    place_noun:
      word_list: [hollow, ford, crossing, vale, ridge, keep, bridge, mire]
    adjective:
      word_list: [grey, silver, dark, old, high, fallen, quiet, lost]
  person_patterns:
    - "{given_name} {family_name}"
    - "{given_name} de {family_name}"
    - "{given_name} le {family_name}"
  place_patterns:
    - "{adjective} {place_noun}"
    - "{given_name}'s {place_noun}"

- name: Nordmark
  description: "Nordic-influenced highland clan culture — harder consonants, patronymics"
  slots:
    given_name:
      corpora:
        - corpus: swedish.txt
          weight: 0.6
        - corpus: finnish.txt
          weight: 0.4
      lookback: 2
    patronymic:
      corpora:
        - corpus: swedish.txt
          weight: 1.0
      lookback: 2
    place_noun:
      word_list: [heim, stead, fell, mark, hold, garth, thorpe, vik]
    adjective:
      word_list: [iron, frost, stone, black, winter, storm, grey, old]
  person_patterns:
    - "{given_name} {patronymic}son"
    - "{given_name} {patronymic}dottir"
    - "{given_name} the {adjective}"
  place_patterns:
    - "{adjective}{place_noun}"
    - "{patronymic}{place_noun}"

- name: Khorvath
  description: "Eastern steppe culture — Polish-Hungarian blend, clan-based"
  slots:
    given_name:
      corpora:
        - corpus: polish.txt
          weight: 0.5
        - corpus: hungarian.txt
          weight: 0.5
      lookback: 2
    clan_name:
      corpora:
        - corpus: hungarian.txt
          weight: 0.7
        - corpus: polish.txt
          weight: 0.3
      lookback: 3
    place_noun:
      word_list: [pass, tor, waste, steppe, camp, hold, wall, scar]
    adjective:
      word_list: [red, burnt, broken, bitter, blood, bone, deep, ash]
  person_patterns:
    - "{clan_name} {given_name}"
    - "{given_name} of the {clan_name}"
  place_patterns:
    - "{adjective} {place_noun}"
    - "The {adjective} {place_noun}"
