world_name: The Shattered Reach

history: |
  Three generations ago, the Reach was one kingdom under the Aldric dynasty. Then the Sundering came — not a cataclysm of magic, but of politics. King Aldric III died without an heir, and three rival claimants tore the realm apart in a war that lasted eleven years. Farmland burned, trade routes collapsed, and entire towns were put to the sword. The old alliances shattered like glass on stone, and nothing has truly healed since.

  Now the Reach is a patchwork of petty lordships, free towns, and lawless borderlands. The Iron Accord — a fragile peace brokered by the Merchant Consortium — holds the major powers in check, but border skirmishes, bandit raids, and blood feuds are daily realities. The common folk survive by keeping their heads down, their doors barred, and their loyalties flexible. Trust is the scarcest currency in the Reach.

factions:
  - name: The Merchant Consortium
    description: >-
      A coalition of wealthy trading families who brokered the Iron Accord
      and now enforce it — mostly to protect their caravans. They control
      the major trade routes and levy tolls at every crossing. Their
      private guards are better equipped than most lord's soldiers, and
      their coin buys loyalty faster than any crown.
    disposition: wary

  - name: The Order of the Ashen Veil
    description: >-
      A religious order devoted to the cult of the Pale Fire, an austere
      faith that teaches suffering purifies the soul. They view magic as
      corruption and actively hunt those who practice it. Their inquisitors
      travel the countryside burning hedge witches and confiscating
      anything that reeks of the arcane. The common folk fear them, but
      many believe they are the only thing standing between humanity and
      the chaos of unchecked sorcery.
    disposition: hostile

  - name: The Crown Remnant
    description: >-
      Loyalists who still claim descent from the Aldric bloodline and
      dream of reuniting the Reach under a single banner. They hold a
      handful of fortified towns in the heartland and maintain the
      largest standing army, though it is stretched thin. Their current
      leader, Duchess Maren Aldric, is a shrewd politician who trades
      favors like a merchant trades grain.
    disposition: neutral

  - name: The Thornfield Freeholders
    description: >-
      An alliance of border communities that declared independence during
      the civil war and never bent the knee again. Fiercely self-reliant,
      they govern by local councils and defend their lands with citizen
      militias. They distrust nobility, organized religion, and anyone
      who arrives with a title and an army.
    disposition: cautious

cosmology: >-
  The people of the Reach hold no unified theology. The Pale Fire cult
  teaches that the world was shaped by a single divine flame that has
  nearly guttered out — what little magic remains is its dying embers,
  dangerous and unpredictable. Older folk still leave offerings at standing
  stones for nameless spirits, and sailors swear by the Drowned Mother.
  No one has seen proof of any god's intervention in living memory, and
  most people have stopped expecting it.

geography: >-
  The Shattered Reach spans a broad river valley hemmed in by mountains
  to the north and marshland to the south. The Greyvein River bisects the
  region, its tributaries forming natural borders between territories. The
  heartland is rolling farmland, scarred by old battlefields. The western
  hills hold played-out silver mines and bandit warrens. The eastern coast
  is dotted with fishing villages and the occasional fortified port town.
  Roads exist, but maintenance ended with the kingdom — travel between
  towns is slow, muddy, and dangerous.
