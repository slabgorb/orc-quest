    lore:
      - "The Sundering was not just political — it was triggered by the last time someone accessed the old power."
      - "The standing stone glyphs are a warning, not a spell. They say: 'Do not wake what sleeps beneath.'"
      - "The plague was caused by tainted water leaking from an old power site into the Greyvein's aquifer."
      - "Maren's wards are anchored to the standing stones. When she dies, the wards fail."
      - "The Ashen Veil was originally founded to guard the standing stones, not to persecute magic users."
      - "Grand Inquisitor Morath knows about the old power. He wants to destroy it permanently."
      - "Duchess Aldric's heir is real, but the 'birthmark' was tattooed on by Crown Remnant agents."
      - "The Thorn Queen's grievance is legitimate — her family was murdered by Lord Varnell's father."
      - "Keeper Yew is the last of an order of guardians that predates all current factions."
      - "The old power is not magic in the conventional sense — it is the living memory of the land."
      - "Mother Cinder lost her sight when she looked directly at the old power fifty years ago."
      - "The river plague has a natural cure that grows only near standing stone sites."
      - "Captain Roth's obsession stems from his sister's death by uncontrolled magic."
      - "Silas Blackhand was hired by Fenwick Varnell to eliminate anyone who could unite the factions."
      - "The sealed chamber contains an Aldric-era crown that was used to channel the old power."
      - "Giles Ashford spent fifteen years in a Crown Remnant prison. He was released as a message."
      - "Nessa Thatch's talent is not arcane magic — it is a connection to the old power."
      - "Fort Greywatch sits directly above a secondary old power node."
      - "Blind Sorrel's visions correspond exactly to the escalation of the standing stone activity."
      - "The Thorn Queen and Duchess Aldric have been secretly corresponding."
      - "Rat King Gully's undercity passages connect to pre-Sundering tunnels."
      - "Brother Ash's original scripture was an uncensored Veil text that describes the old power as sacred."
      - "The River Hermit is a former Keeper, like Yew. He abandoned his post decades ago."
      - "Mira Ashford's archery talent is natural, but her uncanny aim near standing stones is not."
      - "The Merchant Consortium was founded by the same people who created the Iron Accord."
      - "Aldric the Younger genuinely has the royal bloodline — the tattoo was a redundant precaution."
      - "The old power responds to strong emotion. The civil war's collective trauma may have wounded it."
      - "Pik was educated by Brother Ash, who found him as an infant and left him at the orphanage."
      - "Marsh Tom's noble family was destroyed in the Sundering. He has old maps of pre-war tunnel networks."
      - "The standing stones are not isolated monuments — they are nodes in a network that spans the entire Reach."
      - "When all the nodes activate simultaneously, the old power will either heal the land or consume it."
      - "Goodwife Thera has documented that plague survivors develop a sensitivity to standing stone vibrations."
      - "Drell's information network discovered that three assassination contracts were issued on the same day — targeting Kael, the Thorn Queen, and Duchess Aldric."
      - "The Pale Fire described in Veil scripture is the old power, misinterpreted through religious dogma."
      - "Lord Aldric Voss's fort was built by his ancestors specifically to guard the node beneath it."
      - "Jorah the Quiet reported that Morath brought a device from the Veil's central archives — its purpose is unknown."
      - "Kael's sword Ashford's Edge resonates near standing stones because Greta forged it with river-iron from a node site."
      - "Wenna Thatch has organized the Freeholders into the most effective militia force in the region."
      - "The final glyph in the sealed chamber reads: 'When the land remembers, the broken will be mended — or unmade.'"
      - "Rook deserted the Crown Remnant because he learned the heir was being used as a political tool."
    notes:
      - "All major plot threads converge on the standing stones. The old power is the central mystery."
      - "Every faction has a reason to be at the standing stones: Veil to destroy, Crown to claim, Freeholders to protect, merchants to exploit."
      - "Kael must decide: wake the old power (risk), seal it (lose allies who need it), or find a middle path."
      - "Old Maren's death will be the catalyst. When her wards fail, the stones fully activate."
      - "Silas Blackhand will make one final attempt — this time targeting someone Kael loves."
    narrative_log:
      - speaker: narrator
        text: >-
          Twenty-six sessions. That's how long it took for a burnt-out
          farmboy to become the most important person in the Shattered
          Reach — and the most hunted.
      - speaker: narrator
        text: >-
          The standing stones sing at night now. Not a song anyone
          remembers teaching them. Old Maren says the land is dreaming.
          Keeper Yew says it is waking. The difference matters.
      - speaker: narrator
        text: >-
          Every faction in the Reach has sent someone to Kael's door.
          The Crown wants his sword. The Veil wants his head. The
          merchants want his silence. The Thorn Queen wants his respect.
          The land itself wants something he hasn't figured out yet.
    location: Millhaven
    time_of_day: midnight
    atmosphere: >-
      The town that was once a crossroads backwater has become the
      reluctant capital of an informal alliance. Militia patrols mix
      with merchant guards. Refugees camp outside the walls. The
      standing stones on the hill glow faintly against the night sky.
    active_stakes: >-
      Everything converges. The Grand Inquisitor prepares a purge.
      The heir's existence threatens war. The Thorn Queen's truce
      is fragile. The old power beneath the standing stones builds
      toward a threshold. And Old Maren is dying — when her wards
      fall, the stones will fully activate. Kael has days, not weeks.
    points_of_interest:
      - name: Millhaven (expanded)
        description: >-
          Now a fortified town with proper walls, a training ground,
          and Magister Holt's glyph-covered tower.
      - name: The Standing Stones (active)
        description: >-
          Glowing visibly at night. The sealed chamber is partially
          open. The air tastes of iron and ozone.
      - name: Greyvein Crossing (recovering)
        description: >-
          Plague contained but scars remain. The cathedral has become
          the Grand Inquisitor's seat of power.
      - name: Thornfield (fortified)
        description: >-
          The Freeholder community has become a military camp. Wenna
          Thatch commands its defense.
      - name: Fort Greywatch
        description: >-
          Lord Voss's fort serves as neutral ground for faction talks.
          Commander Bryce watches everything.
      - name: The Undercity
        description: >-
          Greyvein Crossing's sewer network, home to Rat King Gully's
          community and pre-Sundering tunnels.
    tropes:
      - id: bandit_unification
        status: progressing
        progression: 0.7
        notes:
          - "Truce holding but the Thorn Queen is restless."
          - "Her army could be an ally or an enemy in the final confrontation."
          - "Lira Blackthorn's presence in Millhaven is a sign of good faith — or a hostage."
      - id: inquisition_closes_in
        status: progressing
        progression: 0.75
        notes:
          - "Grand Inquisitor Morath has arrived. Full purge imminent."
          - "Sister Vael exposed and sheltered. Captain Roth losing control."
          - "The Veil's original purpose — guarding the stones — is a weapon against Morath."
      - id: plague_on_the_river
        status: progressing
        progression: 0.85
        notes:
          - "Cure found and distributed. But the source — tainted old power water — remains."
          - "Plague survivors have a connection to the standing stones."
      - id: old_power_stirs
        status: progressing
        progression: 0.8
        notes:
          - "The land is waking. Standing stones glow at night."
          - "The sealed chamber prophecy has been partially translated."
          - "Maren's death will trigger full activation."
      - id: merchant_war
        status: progressing
        progression: 0.65
        notes:
          - "Greymoor and Varnell temporarily united by plague crisis."
          - "Fenwick Varnell's assassination contracts threaten to shatter the truce."
          - "The Consortium's collapse would end the Iron Accord."
      - id: heir_resurfaces
        status: active
        progression: 0.5
        notes:
          - "The heir has been found. Commander Bryce is positioning forces."
          - "The birthmark is real — the tattoo was insurance."
          - "Aldric the Younger does not want the throne."
