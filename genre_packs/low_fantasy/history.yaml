chapters:
  # ─────────────────────────────────────────────────────────────
  # EARLY (Sessions 1-5): A reluctant hero emerges
  # ─────────────────────────────────────────────────────────────
  - id: early
    label: "The Reluctant Sword"
    session_range: [1, 5]
    character:
      name: Kael Ashford
      race: Human
      class: Fighter
      level: 3
      hp: 30
      max_hp: 30
      ac: 14
      backstory: >-
        A former farm hand from Thornfield who took up the sword after
        bandits burned his family's homestead. Not a hero by choice —
        just a man too stubborn to die quietly.
      personality: >-
        Dry-witted, slow to trust, quick to act. Hides compassion
        behind a wall of pragmatism.
      description: >-
        A broad-shouldered young man with calloused hands and a fresh
        scar across his left cheek. Wears patched leather armor and
        carries a notched iron sword.
      items:
        - sword_iron
        - leather_armor_worn
        - torch
        - rope_hemp
        - healing_poultice
        - {catalog: dagger_iron, name: "Boot Knife", lore: "Taken from the bandit who gave him the scar."}
      gold: 15
      relationships:
        - target: Old Maren
          description: "The hedge witch who stitched his wounds after the homestead fire. He owes her his life."
        - target: Drell
          description: "A nervous fence who buys Kael's salvage, no questions asked."
        - target: Corporal Hask
          description: "A weary militia leader who gave Kael his first paying job — clearing a cellar of rats."
      milestones:
        - "survival:Survived the homestead fire"
        - "triumph:Cleared the Millhaven cellar"
        - "connection:Earned Old Maren's trust"
        - "discovery:Found the bandit camp in Ashwood"
      affinities:
        Iron: {tier: 1, progress: 8}
        Shadow: {tier: 0, progress: 3}
        Lore: {tier: 0, progress: 1}
        Wild: {tier: 0, progress: 4}
        Faith: {tier: 0, progress: 0}
        Silver Tongue: {tier: 0, progress: 2}
        Craft: {tier: 0, progress: 1}
        Vigil: {tier: 0, progress: 5}
    npcs:
      # Archetype-based NPCs with overrides
      - archetype: Hedge Witch
        name: Old Maren
        location: Edge of Thornfield
        disposition: 20
        personality: >-
          Gruff, maternal in a terrifying way, speaks in half-riddles
          that always turn out to be literal.
      - archetype: Nervous Fence
        name: Drell
        location: Millhaven back alley
        disposition: 5
      - archetype: Weary Innkeeper
        name: Berta Cask
        location: The Sodden Boot, Millhaven
        disposition: 15
      - archetype: Traveling Merchant
        name: Halwick Brenn
        location: Millhaven market road
        disposition: 20
      # Custom NPCs
      - name: Corporal Hask
        role: militia_leader
        description: >-
          A tired middle-aged man who keeps Millhaven's small militia
          together through sheer stubbornness.
        personality: "Practical, fair, quietly despairing."
        disposition: 10
        location: Millhaven barracks
        dialogue_quirks:
          - rubs the bridge of his nose when thinking
          - always asks "and then what?" after hearing a plan
      - name: Pik
        role: orphan
        description: >-
          A sharp-eyed street urchin in Millhaven who survives by
          running errands and stealing scraps.
        personality: "Bold, hungry, surprisingly loyal."
        disposition: 5
        location: Millhaven streets
      - name: Wenna Thatch
        role: farmer
        description: Kael's former neighbor. Lost her husband in the same raid.
        personality: "Bitter, resilient, fiercely protective of her daughters."
        disposition: 15
        location: Thornfield outskirts
      - name: Brother Ash
        role: wandering_priest
        description: >-
          A quiet, hollow-eyed priest of the Pale Fire who seems to
          question his own faith more than he preaches it.
        personality: "Soft-spoken, conflicted, gentle despite his order's cruelty."
        disposition: 0
        location: Wandering
      - name: Greta Voss
        role: blacksmith
        description: >-
          Millhaven's blacksmith. A powerfully built woman who judges
          people by the state of their gear.
        personality: "Direct, professional, secretly sentimental about good blades."
        disposition: 10
        location: Millhaven forge
      - name: Tam Redshanks
        role: bandit_scout
        description: >-
          A former farmboy turned bandit who still looks more nervous
          than threatening.
        personality: "Cowardly, opportunistic, pitiable."
        disposition: -15
        location: Ashwood camp
    quests:
      "Clear the Millhaven Cellar": "completed"
      "Find the missing merchant Halwick": "completed"
      "Scout the Ashwood bandit camp": "active"
      "Repay Old Maren's kindness": "active"
      "Find work in Millhaven": "completed"
    lore:
      - "Thornfield was a Freeholder community — they never bent the knee after the civil war."
      - "The Millhaven cellar was infested by rats driven in by flooding from the Greyvein."
      - "Bandits in the Ashwood wear thorn-branch armbands — they answer to someone called the Thorn Queen."
      - "The Sodden Boot serves the worst ale in the Reach, but Berta's stew is legendary."
      - "Brother Ash carries a copy of the Pale Fire scriptures with half the passages crossed out."
      - "Drell operates from a root cellar beneath a condemned tannery."
      - "Millhaven sits at a crossroads between Thornfield and the river towns."
      - "Old Maren's cottage is protected by wards that even the Ashen Veil avoids."
      - "The Iron Accord prohibits standing armies larger than 200 soldiers."
      - "Corporal Hask lost his right ear in the civil war and never talks about it."
    notes:
      - "Kael is suspicious of organized religion after seeing what the Veil did to a healer in Thornfield."
      - "Pik may have overheard something at the docks — follow up next session."
    narrative_log:
      - speaker: narrator
        text: >-
          The fire took everything — the house, the livestock, the quiet life.
          What it left was a man with nothing to lose and a sword he barely
          knew how to hold.
      - speaker: narrator
        text: >-
          Millhaven is not much, but it is something. The walls are low, the
          militia is thin, and the ale is terrible. But the coin is real and
          the work keeps coming.
    location: Millhaven
    time_of_day: evening
    atmosphere: >-
      A small town trying to hold itself together. Lamplight spills from
      tavern windows. The militia patrol is two men and a dog.
    active_stakes: >-
      The Ashwood bandits are growing bolder. Millhaven's militia cannot
      hold if they attack in force.
    points_of_interest:
      - name: The Sodden Boot
        description: Millhaven's only tavern. Hub of gossip and bad decisions.
      - name: Millhaven Barracks
        description: A converted grain warehouse where the militia sleeps.
      - name: Ashwood
        description: Dense forest west of Millhaven. Bandit territory.
      - name: Old Maren's Cottage
        description: A warded hut at the edge of Thornfield.
    tropes:
      - id: bandit_unification
        status: active
        progression: 0.15
        notes:
          - "Thorn-branch armbands spotted on Ashwood bandits."
      - id: inquisition_closes_in
        status: dormant
        progression: 0.05
        notes:
          - "Brother Ash mentioned increased Veil patrols on the eastern road."

  # ─────────────────────────────────────────────────────────────
  # MID (Sessions 6-15): Alliances form, enemies multiply
  # ─────────────────────────────────────────────────────────────
  - id: mid
    label: "The Tightening Web"
    session_range: [6, 15]
    character:
      level: 6
      hp: 60
      max_hp: 60
      ac: 16
      items:
        - {catalog: chain_shirt, name: "Hask's Chain", lore: "Given by Corporal Hask after the Battle of Ashwood Ford.", narrative_weight: 0.4, tags: [armor, gifted, named]}
        - {catalog: silver_amulet, name: "Maren's Ward", lore: "A protective charm from Old Maren. Grows warm near arcane danger.", narrative_weight: 0.6, tags: [magical, protective, named]}
        - healing_poultice
        - healing_poultice
        - spellbook_apprentice
      gold: 85
      relationships:
        - target: Old Maren
          description: "Mentor and surrogate mother. She trusts Kael with dangerous knowledge about the old wards."
        - target: Drell
          description: "Uneasy alliance. Drell provides information; Kael pretends not to know where it comes from."
        - target: Corporal Hask
          description: "Respect forged in battle. Hask sees Kael as the son he lost in the civil war."
        - target: Pik
          description: "Kael has become Pik's reluctant guardian. The boy follows him everywhere."
        - target: The Thorn Queen
          description: "A dangerous enemy. She offered Kael a place in her army. He refused."
        - target: Sister Vael
          description: "A moderate voice within the Ashen Veil. She secretly feeds Kael information about Veil movements."
        - target: Duchess Maren Aldric
          description: "Met once at a border parley. She took note of Kael's name."
        - target: Wenna Thatch
          description: "Old neighbor, now ally. She organized Thornfield's militia with Kael's help."
      milestones:
        - "triumph:Won the Battle of Ashwood Ford"
        - "sacrifice:Took a wound protecting Pik from an assassin"
        - "discovery:Found the sealed chamber beneath the standing stones"
        - "connection:Earned Sister Vael's trust"
        - "revelation:Learned that the Thorn Queen was once a Freeholder"
        - "survival:Escaped the plague quarantine at Greyvein Crossing"
        - "connection:Helped Wenna rebuild Thornfield's defenses"
        - "sacrifice:Gave his savings to feed quarantined refugees"
        - "discovery:Deciphered the first glyph in the sealed chamber"
      affinities:
        Iron: {tier: 2, progress: 18}
        Shadow: {tier: 1, progress: 8}
        Lore: {tier: 1, progress: 7}
        Wild: {tier: 1, progress: 9}
        Faith: {tier: 0, progress: 3}
        Silver Tongue: {tier: 1, progress: 6}
        Craft: {tier: 0, progress: 4}
        Vigil: {tier: 1, progress: 10}
    npcs:
      # Update existing NPCs
      - name: Old Maren
        disposition: 30
        description: >-
          Visibly aged since the Veil increased patrols. Her wards strain
          against something she won't name.
        location: Edge of Thornfield
      - name: Drell
        disposition: 10
        location: Moves between Millhaven and Greyvein Crossing
      - name: Corporal Hask
        disposition: 25
        description: >-
          Promoted to Captain after the Battle of Ashwood Ford. Still
          uncomfortable with the title.
        role: captain
        location: Millhaven barracks
      - name: Pik
        disposition: 30
        description: >-
          Growing fast. Kael is teaching him swordwork. The boy has
          a gift for reading people.
        location: Follows Kael
      - name: Brother Ash
        disposition: 10
        description: >-
          Has quietly stopped wearing his Veil robes in public.
          Something is eating at him.
        location: Millhaven chapel
      # New NPCs for mid-game
      - name: The Thorn Queen
        role: bandit_warlord
        description: >-
          A scarred, charismatic woman who united the western hill bandits
          through equal parts cunning and violence. Her real name is
          Sera Blackthorn — she was a Thornfield farmer's daughter.
        personality: "Magnetic, ruthless, driven by genuine grievance."
        disposition: -25
        location: Ashwood fortress
        dialogue_quirks:
          - calls everyone 'friend' in a tone that is distinctly unfriendly
          - quotes Freeholder oaths with bitter sincerity
      - name: Sister Vael
        role: veil_moderate
        description: >-
          A young priestess of the Ashen Veil who joined for faith and
          found fanaticism. She leaks information to those she deems
          righteous — a dangerous game.
        personality: "Devout, conflicted, quietly brave."
        disposition: 15
        location: Ashen Veil chapter house, Greyvein Crossing
        dialogue_quirks:
          - fidgets with her prayer beads when lying
          - always speaks as if someone is listening
      - name: Captain Roth
        role: veil_enforcer
        description: >-
          The Veil's senior enforcer in the region. A true believer who
          sees sorcery in every shadow.
        personality: "Cold, methodical, patient as a spider."
        disposition: -30
        location: Greyvein Crossing
      - name: Alderman Cogg
        role: politician
        description: >-
          Greyvein Crossing's chief administrator. A sweating, indecisive
          man caught between the Veil, the Consortium, and his own survival.
        personality: "Nervous, self-serving, occasionally decent."
        disposition: 0
        location: Greyvein Crossing town hall
      - name: Quartermaster Brin
        role: supply_officer
        description: >-
          Millhaven's new quartermaster. Efficient, humorless, and
          allergic to waste.
        personality: "Precise, frugal, surprisingly loyal."
        disposition: 10
        location: Millhaven
      - name: Elda Greymoor
        role: merchant_heir
        description: >-
          Youngest daughter of House Greymoor. Sent to oversee river
          operations. Sharp as a blade and twice as dangerous.
        personality: "Calculating, ambitious, unexpectedly fair."
        disposition: 0
        location: Greyvein Crossing docks
      - name: Fenwick Varnell
        role: merchant_heir
        description: >-
          House Varnell's representative. A portly, jovial man whose
          smile never reaches his eyes.
        personality: "Manipulative, generous with bribes, vindictive."
        disposition: -5
        location: Greyvein Crossing trade quarter
      - name: Asha the Riverwarden
        role: scout
        description: >-
          A lean, quiet woman who patrols the Greyvein in a flat-bottomed
          skiff. She knows every bend and sandbar.
        personality: "Taciturn, fiercely independent, deeply observant."
        disposition: 5
        location: Greyvein River
      - name: Magister Holt
        role: scholar
        description: >-
          A former university lecturer who was expelled for 'dangerous
          curiosity.' Now lives in a tower of books in Millhaven.
        personality: "Absent-minded, brilliant, dangerously curious."
        disposition: 15
        location: Millhaven
      - name: Daveth One-Eye
        role: bandit_lieutenant
        description: >-
          The Thorn Queen's most feared lieutenant. Lost his eye to
          a militia arrow and holds no grudges — he holds debts.
        personality: "Laconic, violent, oddly honorable."
        disposition: -20
        location: Western hills
      - name: Goodwife Thera
        role: healer
        description: >-
          A river village healer overwhelmed by plague patients. She
          has not slept in three days.
        personality: "Exhausted, compassionate, running on spite."
        disposition: 10
        location: Greyvein village
      - name: Marsh Tom
        role: smuggler
        description: A river smuggler who moves contraband past quarantine lines.
        personality: "Cheerful, amoral, surprisingly reliable."
        disposition: 5
        location: Greyvein marshes
      - name: Lord Aldric Voss
        role: minor_lord
        description: >-
          A minor Aldric loyalist who controls a border fort. Related
          to Wenna Thatch by marriage — a connection he prefers not
          to advertise.
        personality: "Proud, cautious, genuinely honorable."
        disposition: 5
        location: Fort Greywatch
      - name: Silas Blackhand
        role: assassin
        description: >-
          A professional killer hired by unknown parties. He attempted
          to kill Pik and failed. He will try again.
        personality: "Professional, quiet, completely amoral."
        disposition: -35
        location: Unknown
      - name: Mother Cinder
        role: veil_elder
        description: >-
          The eldest member of the local Ashen Veil chapter. Blind,
          ancient, and possibly the only person Captain Roth fears.
        personality: "Serene, perceptive, carries old secrets."
        disposition: -10
        location: Ashen Veil chapter house
      - name: Torva Brenn
        role: caravan_guard
        description: >-
          Halwick Brenn's daughter and head of his caravan guard.
          Better with a blade than her father is with a deal.
        personality: "Fierce, loyal, impatient with dishonesty."
        disposition: 15
        location: Travels with Halwick
      - name: Keeper Yew
        role: standing_stone_guardian
        description: >-
          An ancient figure who lives near the standing stones.
          Claims to be a groundskeeper. Is almost certainly more.
        personality: "Cryptic, patient, amused by mortal urgency."
        disposition: 0
        location: Standing stones
    quests:
      "Scout the Ashwood bandit camp": "completed"
      "Repay Old Maren's kindness": "completed"
      "Defeat the Thorn Queen's raiders at Ashwood Ford": "completed"
      "Investigate the standing stones": "active"
      "Help Sister Vael gather evidence of Veil corruption": "active"
      "Find a cure for the river plague": "active"
      "Protect Pik from the assassin Silas Blackhand": "active"
      "Escort Halwick's caravan through bandit territory": "completed"
      "Negotiate between House Varnell and House Greymoor": "active"
      "Fortify Thornfield against Thorn Queen reprisal": "completed"
      "Decipher the glyphs in the sealed chamber": "active"
      "Investigate the quarantine breach at Greyvein Crossing": "active"
      "Find Brother Ash's missing scripture": "completed"
    lore:
      - "The Thorn Queen's real name is Sera Blackthorn. She lost her family to a lord's tax raid."
      - "The standing stones predate the Reach by at least a thousand years."
      - "The sealed chamber beneath the stones contains glyphs in no known language."
      - "Sister Vael's order requires a vow of silence during the new moon."
      - "Captain Roth personally burned three hedge witches last spring."
      - "The river plague first appeared near a collapsed mine shaft upstream."
      - "House Greymoor controls 60% of the Greyvein barge traffic."
      - "House Varnell made its fortune in the civil war selling weapons to both sides."
      - "Silas Blackhand is rumored to be ex-Crown Remnant intelligence."
      - "Keeper Yew has been at the standing stones longer than anyone can remember."
      - "The Thorn Queen's army now numbers over 300 — larger than most lords' forces."
      - "Alderman Cogg takes bribes from both trading houses and pretends not to."
      - "The plague kills roughly one in five who contract it. The young and old fare worst."
      - "Magister Holt was expelled from the University of Greyhaven for 'unauthorized excavation.'"
      - "Fort Greywatch was built on the ruins of an Aldric-era watchtower."
      - "The Freeholders consider Sera Blackthorn a traitor for taking up banditry."
      - "Old Maren's wards are older than she is — she maintains them, she didn't create them."
      - "The Pale Fire scripture contains a passage about 'the sleeping flame beneath the stones.'"
      - "Mother Cinder lost her sight in a ritual accident fifty years ago."
      - "Marsh Tom's real name is Thomas Alderidge. He is a disgraced minor noble."
      - "The Battle of Ashwood Ford was the first coordinated defense by Millhaven militia in a decade."
      - "Drell has a twin brother in debtors' prison in Greyvein Crossing."
      - "Brother Ash crossed out the passages in his scripture that justify burning."
      - "The iron in the well water near standing stones is not natural iron."
      - "Torva Brenn lost three guards to Thorn Queen ambushes last season."
      - "Wenna Thatch's eldest daughter shows signs of arcane talent — a dangerous secret."
      - "The Merchant Consortium's charter explicitly forbids hiring armies. Both houses ignore this."
      - "Goodwife Thera learned healing from Old Maren twenty years ago."
      - "Lord Aldric Voss is the only noble who still pays road maintenance levies."
      - "Pik can read — unusual for a street orphan. Someone educated him."
    notes:
      - "The plague and the standing stones may be connected — Old Maren hinted at 'the earth bleeding.'"
      - "Silas Blackhand was hired by someone with resources — possibly a trading house or the Veil."
      - "The Thorn Queen offered alliance once. She won't offer again."
      - "Kael suspects Keeper Yew knows more about the old power than he reveals."
    narrative_log:
      - speaker: narrator
        text: >-
          The battle at Ashwood Ford was short, ugly, and decisive. Kael
          held the bridge with six militia while Hask flanked through the
          trees. When it was over, seventeen bandits lay dead and Kael
          had a new scar and a new reputation.
      - speaker: narrator
        text: >-
          The plague came quietly. A fisherman's cough. A child's fever.
          By the time anyone noticed the pattern, the river villages
          were already dying.
      - speaker: narrator
        text: >-
          The sealed chamber hummed when Kael touched the wall. The
          glyphs glowed faintly — not with light, but with warmth, as
          if the stone itself remembered fire.
    location: Greyvein Crossing
    time_of_day: dawn
    atmosphere: >-
      A river town under strain. Quarantine flags flutter from the
      eastern gate. Merchant guards outnumber militia. The docks
      are quiet — too quiet for a trading hub.
    active_stakes: >-
      The plague spreads along the river. The Thorn Queen regroups
      after her defeat at Ashwood Ford. The Ashen Veil tightens its
      grip. And something beneath the standing stones is waking up.
    points_of_interest:
      - name: Greyvein Crossing
        description: The largest river town in the region. Currently under partial quarantine.
      - name: The Standing Stones
        description: Ancient megaliths on a hill north of Millhaven. A sealed chamber lies beneath.
      - name: Ashwood Fortress
        description: The Thorn Queen's stronghold, built from the ruins of an old fort.
      - name: Fort Greywatch
        description: Lord Aldric Voss's border fort. The closest thing to legitimate authority.
      - name: The Greyvein River
        description: The region's lifeline. Currently a vector for plague.
    tropes:
      - id: bandit_unification
        status: progressing
        progression: 0.45
        notes:
          - "Thorn Queen's army defeated at Ashwood Ford but not broken."
          - "She is regrouping and recruiting displaced plague refugees."
      - id: inquisition_closes_in
        status: active
        progression: 0.35
        notes:
          - "Captain Roth conducting systematic sweeps east of the river."
          - "Sister Vael feeding information to Kael at great personal risk."
      - id: plague_on_the_river
        status: progressing
        progression: 0.4
        notes:
          - "Source suspected near upstream mine collapse."
          - "Quarantine declared at Greyvein Crossing."
      - id: old_power_stirs
        status: active
        progression: 0.25
        notes:
          - "Sealed chamber discovered. First glyph partially deciphered."
          - "Standing stones humming audibly at night."
      - id: merchant_war
        status: active
        progression: 0.2
        notes:
          - "House Varnell and Greymoor competing aggressively at Greyvein Crossing."

  # ─────────────────────────────────────────────────────────────
  # VETERAN (Sessions 16-26): The world on the brink
  # ─────────────────────────────────────────────────────────────
  - id: veteran
    label: "The Breaking Point"
    session_range: [16, 26]
    character:
      level: 10
      hp: 100
      max_hp: 100
      ac: 18
      items:
        - {catalog: sword_iron, name: "Ashford's Edge", power_level: 6, lore: "Reforged by Greta Voss after the Battle of Ashwood Ford. The blade remembers blood.", narrative_weight: 0.9, tags: [weapon, named, evolved, signature]}
        - {catalog: chain_shirt, name: "Hask's Legacy", power_level: 5, lore: "Reinforced with river-iron plates. Bears the dents of a dozen battles.", narrative_weight: 0.7, tags: [armor, named, evolved]}
        - {catalog: silver_amulet, name: "Maren's Last Ward", power_level: 4, lore: "The final ward Old Maren ever made. It pulses near the standing stones.", narrative_weight: 0.85, tags: [magical, protective, named, evolved]}
        - {catalog: spellbook_apprentice, name: "Holt's Cipher Notes", lore: "Magister Holt's translation key for the standing stone glyphs.", narrative_weight: 0.5, tags: [knowledge, named]}
        - healing_poultice
        - healing_poultice
        - healing_poultice
        - "Thorn Queen's signet ring (taken as proof of parley)"
        - "Vial of purified standing-stone water"
        - "Sealed letter from Duchess Maren Aldric"
        - "Captain Roth's confiscated writ of inquisition"
      gold: 340
      relationships:
        - target: Old Maren
          description: "She is dying. The wards drain her life force. She insists Kael must not try to save her."
        - target: Drell
          description: "Trusted informant. Drell's loyalty was earned when Kael freed his brother from debtors' prison."
        - target: Captain Hask
          description: "Hask retired after a wound that wouldn't heal. He gave Kael his command."
        - target: Pik
          description: "Kael's adopted ward. The boy is growing into a capable young man and scout."
        - target: The Thorn Queen
          description: "A grudging mutual respect. She stopped attacking Millhaven after Kael proved the plague was not a weapon."
        - target: Sister Vael
          description: "She was exposed and excommunicated. Kael gave her shelter. She is now his most trusted advisor."
        - target: Duchess Maren Aldric
          description: "The Duchess considers Kael a useful asset. Kael considers the Duchess a necessary evil."
        - target: Keeper Yew
          description: "Yew has revealed himself as a guardian of the old power. He is testing Kael."
        - target: Captain Roth
          description: "Mortal enemy. Roth burned Kael's name into the Veil's heresy register."
        - target: Wenna Thatch
          description: "Kael helped hide Wenna's daughter's arcane talent. They share a dangerous secret."
        - target: Greta Voss
          description: "The blacksmith who reforged his sword. She considers Ashford's Edge her masterwork."
        - target: Elda Greymoor
          description: "Unlikely ally. Elda funded the plague cure research in exchange for trade route protection."
        - target: Magister Holt
          description: "Fellow investigator of the old power. Holt is dangerously excited about what they've found."
        - target: Asha the Riverwarden
          description: "Kael's eyes on the river. She broke quarantine to deliver plague samples to Old Maren."
      milestones:
        - "triumph:Broke the siege of Greyvein Crossing"
        - "revelation:Deciphered the standing stone prophecy"
        - "sacrifice:Gave up his bounty to fund the plague cure"
        - "connection:Brokered the Thornfield-Millhaven defense pact"
        - "survival:Survived Captain Roth's ambush at the river ford"
        - "discovery:Found the source of the plague — tainted ancient water"
        - "triumph:Freed Drell's brother from debtors' prison"
        - "revelation:Learned that the Sundering was caused by the old power, not politics"
        - "sacrifice:Sheltered Sister Vael despite the Veil's bounty"
        - "connection:Earned the Thorn Queen's grudging respect"
        - "triumph:Defended Thornfield against Veil purge"
        - "discovery:The old power is not magic — it is the land itself"
        - "survival:Escaped the sealed chamber collapse"
      affinities:
        Iron: {tier: 3, progress: 30}
        Shadow: {tier: 2, progress: 15}
        Lore: {tier: 2, progress: 18}
        Wild: {tier: 2, progress: 16}
        Faith: {tier: 1, progress: 8}
        Silver Tongue: {tier: 2, progress: 14}
        Craft: {tier: 1, progress: 7}
        Vigil: {tier: 3, progress: 28}
    npcs:
      # Update existing NPCs
      - name: Old Maren
        disposition: 40
        description: >-
          Frail now. The wards consume her. She spends her days teaching
          anyone who will listen — before it's too late.
        location: Thornfield, bedridden
      - name: Drell
        disposition: 25
        description: >-
          Transformed from petty fence to intelligence broker. He runs
          a network of informants across the Reach.
        role: intelligence_broker
        location: Mobile — Millhaven, Greyvein Crossing, Fort Greywatch
      - name: Captain Hask
        disposition: 30
        description: >-
          Retired. Tends a small garden behind the barracks. Still gives
          advice when asked, which is often.
        role: retired_captain
        location: Millhaven
      - name: Pik
        disposition: 40
        description: >-
          Sixteen now. A skilled scout and passable swordsman. Fiercely
          loyal to Kael. Has a crush on Torva Brenn.
        role: scout
        location: Follows Kael
      - name: Brother Ash
        disposition: 25
        description: >-
          Left the Order entirely. Now serves as Millhaven's unofficial
          chaplain. His faith has changed shape but not diminished.
        role: chaplain
        location: Millhaven chapel
      - name: The Thorn Queen
        disposition: -5
        description: >-
          The grudging truce holds. Her army patrols the western hills
          in an uneasy parallel with Millhaven's militia.
        location: Ashwood fortress
      - name: Sister Vael
        disposition: 35
        description: >-
          Excommunicated, price on her head, and more at peace than
          she's ever been. She serves as Kael's advisor on Veil matters.
        role: advisor
        location: Millhaven
      - name: Captain Roth
        disposition: -40
        description: >-
          Increasingly erratic. His superiors in the Veil have begun
          questioning his methods. He blames Kael for everything.
        location: Greyvein Crossing
      - name: Greta Voss
        disposition: 25
        description: >-
          Proud of Ashford's Edge. Has begun experimenting with
          standing-stone iron in her forgework.
        location: Millhaven forge
      - name: Keeper Yew
        disposition: 15
        description: >-
          Has revealed more of his nature. He is bound to the stones
          and cannot leave them. He needs Kael to act where he cannot.
        location: Standing stones
      - name: Magister Holt
        disposition: 20
        description: >-
          Obsessed with the old power. His tower is covered in
          glyph translations. He sleeps rarely and eats less.
        location: Millhaven tower
      - name: Elda Greymoor
        disposition: 15
        description: >-
          The plague cure alliance created a genuine bond. She is
          reconsidering her house's ruthless methods.
        location: Greyvein Crossing
      - name: Wenna Thatch
        disposition: 30
        description: >-
          Thornfield's elected leader. Her daughter's secret grows
          harder to keep as the girl's talent strengthens.
        role: freeholder_leader
        location: Thornfield
      - name: Asha the Riverwarden
        disposition: 20
        description: >-
          The plague cost her two of her crew. She patrols the
          river with grim determination.
        location: Greyvein River
      - name: Torva Brenn
        disposition: 25
        description: >-
          Halwick's daughter has become a formidable warrior and
          caravan leader in her own right.
        location: Trade routes
      # New veteran-era NPCs
      - name: Grand Inquisitor Morath
        role: veil_leader
        description: >-
          The highest-ranking Veil officer in the Reach. Arrived
          to assess Roth's failures and 'restore order.' His
          methods make Roth look gentle.
        personality: "Cultured, soft-spoken, absolutely terrifying."
        disposition: -35
        location: Greyvein Crossing cathedral
        dialogue_quirks:
          - never raises his voice, even when ordering executions
          - quotes philosophy alongside scripture
      - name: Lira Blackthorn
        role: bandit_emissary
        description: >-
          The Thorn Queen's daughter, sent as an emissary to
          Millhaven. Young, idealistic, and nothing like her mother.
        personality: "Earnest, diplomatic, believes in redemption."
        disposition: 10
        location: Millhaven
      - name: Sage Windhallow
        role: historian
        description: >-
          An elderly historian who traveled from Greyhaven University
          after hearing about the standing stone discoveries.
        personality: "Meticulous, kind, terrified of what the glyphs say."
        disposition: 10
        location: Millhaven
      - name: Commander Bryce
        role: crown_remnant_officer
        description: >-
          A Crown Remnant officer sent by Duchess Aldric to 'observe.'
          He is actually scouting for allies before the heir's reveal.
        personality: "Professional, guarded, subtly testing loyalties."
        disposition: 5
        location: Fort Greywatch
      - name: Nessa Thatch
        role: apprentice
        description: >-
          Wenna's eldest daughter. Her arcane talent has grown beyond
          what anyone can hide. Old Maren is training her in secret.
        personality: "Curious, frightened, powerful beyond her years."
        disposition: 15
        location: Thornfield / Old Maren's cottage
      - name: Fenwick Varnell
        disposition: -15
        description: >-
          Increasingly desperate. His house is losing the merchant
          war. He is considering drastic measures.
        location: Greyvein Crossing
      - name: Rat King Gully
        role: plague_survivor
        description: >-
          A plague survivor who lives in the sewers of Greyvein
          Crossing. Leads a community of outcasts. Knows the
          underground passages better than anyone alive.
        personality: "Paranoid, resourceful, fiercely protective of his people."
        disposition: 0
        location: Greyvein Crossing undercity
      - name: Alderman Cogg
        disposition: 10
        description: >-
          The plague broke something in Cogg. He stopped taking
          bribes and started actually governing. No one is more
          surprised than he is.
        location: Greyvein Crossing
      - name: Goodwife Thera
        disposition: 20
        description: >-
          Survived the plague. Now trains healers across the region.
          She and Old Maren correspond by letter.
        location: Greyvein village
      - name: Marsh Tom
        disposition: 15
        description: >-
          His smuggling network became the plague's lifeline. He
          delivered medicine past quarantine lines. He insists he
          did it for profit, but no one believes him.
        location: Greyvein marshes
      - name: Lord Aldric Voss
        disposition: 15
        description: >-
          The most reliable lord in the region. He opened Fort
          Greywatch to plague refugees when others closed their gates.
        location: Fort Greywatch
      - name: Mother Cinder
        disposition: 5
        description: >-
          Growing restless. She knows about the old power and has
          been keeping it from the younger Veil members for decades.
        location: Ashen Veil chapter house
      - name: Halwick Brenn
        disposition: 30
        description: >-
          Semi-retired. Letting Torva run most operations. Still
          the best negotiator in the Reach.
        location: Millhaven
      - name: Tam Redshanks
        disposition: 5
        description: >-
          Deserted the Thorn Queen's army. Works as a farmhand
          in Thornfield under a false name. Jumpy but trying.
        role: reformed_bandit
        location: Thornfield
      - name: Silas Blackhand
        disposition: -30
        description: >-
          Still at large. His employer has been identified as
          someone within the Merchant Consortium.
        location: Unknown
      - name: Daveth One-Eye
        disposition: -10
        description: >-
          The truce has left him restless. He follows the Thorn
          Queen's orders, but he'd rather be fighting.
        location: Western hills
      # Additional veteran NPCs for density
      - name: Willow Ashtree
        role: herbalist
        description: An apprentice of Goodwife Thera. Travels between river villages with medicines.
        personality: "Gentle, determined, sings while she works."
        disposition: 10
        location: River villages
      - name: Bors Ironhand
        role: militia_sergeant
        description: Millhaven's militia sergeant. Trained by Hask, promoted by Kael.
        personality: "Loyal, unimaginative, utterly dependable."
        disposition: 20
        location: Millhaven
      - name: Petra Slate
        role: stonemason
        description: Hired to examine the standing stone architecture. Terrified by what she found.
        personality: "Practical, superstitious, drinks to forget."
        disposition: 5
        location: Standing stones area
      - name: Jorah the Quiet
        role: spy
        description: Drell's best agent. Nobody knows what he looks like because nobody remembers him.
        personality: "Forgettable by design, observant, dry humor."
        disposition: 10
        location: Varies
      - name: Mistress Tallow
        role: chandler
        description: >-
          Greyvein Crossing's chandler. Her shop is the unofficial
          neutral ground where all factions can meet.
        personality: "Matronly, perceptive, keeps everyone's secrets."
        disposition: 10
        location: Greyvein Crossing
      - name: Rook
        role: deserter
        description: >-
          A Crown Remnant deserter who knows about the heir.
          He's hiding in Millhaven and drinking himself to death.
        personality: "Haunted, self-destructive, knows too much."
        disposition: -5
        location: The Sodden Boot
      - name: Yara Sunless
        role: plague_doctor
        description: >-
          A masked healer from outside the Reach. Her methods
          are effective but disturbing.
        personality: "Clinical, secretive, compassionate beneath the mask."
        disposition: 0
        location: Greyvein Crossing plague ward
      - name: Aldric the Younger
        role: heir_claimant
        description: >-
          The supposed Aldric heir. A confused young person who
          was raised as a shepherd and wants none of this.
        personality: "Overwhelmed, genuine, stubborn."
        disposition: 0
        location: Under Crown Remnant protection
      - name: Captain Wren
        role: river_patrol
        description: >-
          Commands the Consortium's river patrol. Torn between
          duty to her employers and sympathy for plague victims.
        personality: "Conflicted, competent, increasingly insubordinate."
        disposition: 5
        location: Greyvein River
      - name: Blind Sorrel
        role: seer
        description: >-
          A blind old woman in Thornfield who has begun having
          visions since the standing stones started humming.
        personality: "Cryptic, frightened, unnervingly accurate."
        disposition: 5
        location: Thornfield
      - name: Giles Ashford
        role: relative
        description: >-
          Kael's uncle. Thought dead in the homestead fire.
          Recently appeared at Fort Greywatch, much changed.
        personality: "Secretive, weathered, carrying guilt."
        disposition: 10
        location: Fort Greywatch
      - name: Thornfield Elder Birch
        role: elder
        description: Thornfield's eldest resident. Remembers the civil war firsthand.
        personality: "Cantankerous, wise, refuses to die out of spite."
        disposition: 15
        location: Thornfield
      - name: Corporal Fenn
        role: veil_soldier
        description: >-
          One of Roth's soldiers who is beginning to question orders.
          Sister Vael has been quietly working on him.
        personality: "Young, conflicted, scared."
        disposition: 0
        location: Greyvein Crossing
      - name: The River Hermit
        role: recluse
        description: >-
          Lives on a houseboat. Claims the river told him about
          the plague before it started. Everyone assumed he was mad.
        personality: "Eccentric, surprisingly sane, angry nobody listened."
        disposition: 0
        location: Greyvein River, upstream
      - name: Baker Loam
        role: innkeeper
        description: Runs the only bakery in Greyvein Crossing. Everyone comes here for news.
        personality: "Gossipy, warm, knows everyone's business."
        disposition: 10
        location: Greyvein Crossing
      - name: Quartermaster Brin
        disposition: 20
        description: >-
          Promoted to regional supply coordinator. Her logistics
          kept Millhaven fed during the worst of the plague.
        location: Millhaven
      - name: Mira Ashford
        role: relative
        description: >-
          Kael's younger sister. Survived the fire by hiding in
          the root cellar. Has been living with Wenna Thatch.
        personality: "Resilient, angry at her brother for leaving, talented with a bow."
        disposition: 10
        location: Thornfield
