- id: inquisition_closes_in
  name: The Inquisition Closes In
  description: >-
    The Order of the Ashen Veil tightens its grip on the region, burning hedge
    witches and confiscating anything arcane. Their patrols grow bolder and
    their writs broader. Anyone who has touched magic — or been seen near
    someone who has — is at risk.
  category: conflict
  triggers:
    - use of magic
    - discovery of arcane items
    - encounter with hedge witch
  narrative_hints:
    - inquisitor patrols appear on the road
    - villagers whisper about recent burnings
    - confiscation notices posted at crossroads
  tension_level: 0.7
  resolution_hints:
    - expose the Veil's corruption
    - broker a truce between the Veil and practitioners
    - ignite open rebellion against the Order
  tags: [faction, persecution, magic]
  escalation:
    - at: 0.2
      event: >-
        An Ashen Veil patrol stops the party and inspects their belongings
        for arcane contraband. They are suspicious but find nothing — this time.
      npcs_involved: [Zealous Inquisitor]
      stakes: Any magical items could be confiscated and the party detained.
    - at: 0.4
      event: >-
        A hedge witch the party has met is arrested. Smoke rises from the
        village square as the Veil conducts a public burning.
      npcs_involved: [Hedge Witch, Zealous Inquisitor]
      stakes: An ally may be lost. Intervening risks open conflict with the Order.
    - at: 0.6
      event: >-
        The Inquisition issues a writ naming the party or someone close to them
        as suspected sorcerers. Bounty hunters take notice.
      npcs_involved: [Zealous Inquisitor]
      stakes: The party is now hunted. Safe havens shrink.
    - at: 0.8
      event: >-
        The Grand Inquisitor arrives in the region with a full retinue.
        Martial law is declared in the nearest town.
      npcs_involved: [Zealous Inquisitor]
      stakes: Open movement becomes dangerous. The noose tightens.
    - at: 1.0
      event: >-
        The Inquisition launches a coordinated purge. Every known practitioner,
        sympathizer, and rumored wielder is targeted simultaneously.
      npcs_involved: [Zealous Inquisitor]
      stakes: Total suppression of magic in the Reach. Allies face death.
  passive_progression:
    rate_per_turn: 0.01
    rate_per_day: 0.02
    accelerators:
      - magic
      - spell
      - arcane
      - witch
      - sorcery
    decelerators:
      - hide
      - disguise
      - bribe inquisitor
      - destroy evidence
    accelerator_bonus: 0.05
    decelerator_penalty: 0.03

- id: heir_resurfaces
  name: The Heir Resurfaces
  description: >-
    Rumors spread that a true heir to the Aldric dynasty has been found —
    a young person raised in obscurity who bears the royal birthmark. The
    Crown Remnant rallies, rival lords plot assassination, and the common
    folk dare to hope for unity.
  category: revelation
  triggers:
    - mention of Aldric bloodline
    - encounter with Crown Remnant
    - discovery of royal artifacts
  narrative_hints:
    - Crown Remnant soldiers appear more confident
    - tavern talk shifts to succession
    - mysterious strangers ask pointed questions about loyalty
  tension_level: 0.8
  resolution_hints:
    - protect the heir and see them crowned
    - expose the heir as a fraud
    - use the heir as leverage in political negotiation
  tags: [political, succession, faction]
  escalation:
    - at: 0.2
      event: >-
        A Crown Remnant messenger approaches the party with a sealed letter
        requesting a private audience with Duchess Maren Aldric.
      npcs_involved: []
      stakes: Choosing sides in the succession draws powerful attention.
    - at: 0.4
      event: >-
        The heir makes a public appearance at a border town. A crowd gathers.
        Assassins are spotted in the crowd.
      npcs_involved: []
      stakes: The heir's life hangs by a thread. Inaction has consequences.
    - at: 0.7
      event: >-
        Civil war factions begin mobilizing. Mercenary companies are hired.
        Trade routes close as lords fortify their borders.
      npcs_involved: []
      stakes: The fragile peace of the Iron Accord begins to crack.
    - at: 1.0
      event: >-
        Open battle erupts between Crown Remnant forces and rival lords.
        The party must choose a side or flee the region.
      npcs_involved: []
      stakes: The Shattered Reach may shatter further — or finally heal.
  passive_progression:
    rate_per_turn: 0.008
    rate_per_day: 0.015
    accelerators:
      - heir
      - Aldric
      - crown
      - succession
      - birthmark
    decelerators:
      - silence
      - suppress rumor
      - discredit
    accelerator_bonus: 0.04
    decelerator_penalty: 0.03

- id: bandit_unification
  name: Bandit Unification
  description: >-
    The scattered bandit gangs of the western hills are being united under
    a charismatic warlord who calls herself the Thorn Queen. What were
    nuisance raids are becoming coordinated military operations.
  category: conflict
  triggers:
    - bandit encounter
    - reports of highway robbery
    - discovery of organized camp
  narrative_hints:
    - bandits now wear matching armbands
    - roadside ambushes grow more sophisticated
    - merchant caravans hire extra guards
  tension_level: 0.6
  resolution_hints:
    - defeat the Thorn Queen in battle
    - negotiate the bandits into legitimate service
    - turn the gangs against each other
  tags: [military, criminal, escalating]
  escalation:
    - at: 0.25
      event: >-
        A merchant caravan the party was traveling with is ambushed by
        bandits wearing thorn-branch insignia. They demand a toll, not blood.
      npcs_involved: [Traveling Merchant]
      stakes: Goods and gold at risk. Resistance means a real fight.
    - at: 0.5
      event: >-
        The Thorn Queen's forces seize a bridge crossing, establishing a
        permanent toll station. Trade through the western hills halts.
      npcs_involved: []
      stakes: Economic lifeline severed. Towns begin to starve.
    - at: 0.75
      event: >-
        The Thorn Queen sends an emissary to the nearest lord, demanding
        recognition as a legitimate ruler. She offers alliance — or war.
      npcs_involved: []
      stakes: A new power rises. The balance of the Reach shifts.
    - at: 1.0
      event: >-
        The Thorn Queen's army marches on a fortified town. Siege begins.
      npcs_involved: []
      stakes: A town falls or the bandit threat ends — one way or another.
  passive_progression:
    rate_per_turn: 0.012
    rate_per_day: 0.01
    accelerators:
      - bandit
      - thorn
      - raid
      - highway
      - robbery
    decelerators:
      - patrol
      - garrison
      - militia
      - fortify
    accelerator_bonus: 0.04
    decelerator_penalty: 0.03

- id: old_power_stirs
  name: The Old Power Stirs
  description: >-
    Something beneath the old standing stones is waking up. Livestock act
    strangely near ancient sites. Wells taste of iron. Dreams come unbidden
    to those who sleep near the old places. The Sundering may not have been
    purely political after all.
  category: revelation
  triggers:
    - visit to ancient site
    - magical anomaly
    - prophetic dream
  narrative_hints:
    - animals flee from standing stones
    - well water turns rusty near old sites
    - strange lights seen at night
  tension_level: 0.9
  resolution_hints:
    - seal the old power back beneath the earth
    - harness it to restore balance
    - let it wake and face the consequences
  tags: [supernatural, ancient, mystery]
  escalation:
    - at: 0.2
      event: >-
        The party finds a standing stone that hums with a low vibration.
        Touching it causes visions of a vast underground structure.
      npcs_involved: [Hedge Witch]
      stakes: Knowledge gained, but attention drawn from those who watch.
    - at: 0.5
      event: >-
        An earthquake cracks open a hillside, revealing carved passages
        that predate the Reach by centuries. Something breathes inside.
      npcs_involved: []
      stakes: The passage cannot be sealed easily. Others will find it.
    - at: 0.75
      event: >-
        Wild magic surges ripple across the region. Fires burn blue.
        Weapons hum. The Ashen Veil blames sorcerers; the truth is older.
      npcs_involved: [Zealous Inquisitor, Hedge Witch]
      stakes: The old power grows harder to ignore or contain.
    - at: 1.0
      event: >-
        The old power fully awakens. Reality warps near ancient sites.
        The land itself seems alive — and not necessarily friendly.
      npcs_involved: []
      stakes: The world changes permanently. Nothing goes back to normal.
  passive_progression:
    rate_per_turn: 0.005
    rate_per_day: 0.025
    accelerators:
      - magic
      - ancient
      - standing stone
      - ritual
      - excavate
    decelerators:
      - seal
      - ward
      - prayer
      - bury
    accelerator_bonus: 0.05
    decelerator_penalty: 0.02

- id: merchant_war
  name: Merchant War
  description: >-
    The Merchant Consortium fractures as two rival trading houses — House
    Varnell and House Greymoor — compete for control of the river trade.
    Prices spike, bribes flow, and hired muscle replaces negotiation.
  category: conflict
  triggers:
    - trade dispute
    - price gouging
    - merchant encounter
  narrative_hints:
    - prices fluctuate wildly between towns
    - merchant guards grow aggressive
    - warehouses are sabotaged
  tension_level: 0.5
  resolution_hints:
    - broker peace between the houses
    - help one house destroy the other
    - expose corruption and reform the Consortium
  tags: [economic, political, faction]
  escalation:
    - at: 0.25
      event: >-
        A merchant the party knows is undercut and ruined by a rival house.
        They beg for help — or revenge.
      npcs_involved: [Traveling Merchant]
      stakes: An ally loses their livelihood. Taking sides has consequences.
    - at: 0.5
      event: >-
        Warehouse fires break out simultaneously in three towns. Both houses
        blame the other. The Consortium threatens to dissolve the Iron Accord.
      npcs_involved: []
      stakes: The economic backbone of the Reach is at risk.
    - at: 0.75
      event: >-
        House Greymoor hires a mercenary company to blockade the river.
        Food shortages begin in downstream towns.
      npcs_involved: []
      stakes: Civilian suffering escalates. Lords consider military response.
    - at: 1.0
      event: >-
        The Consortium collapses. Trade routes close. The Iron Accord
        — the only thing preventing open war — loses its enforcer.
      npcs_involved: [Traveling Merchant]
      stakes: Without trade, the Reach descends into chaos.
  passive_progression:
    rate_per_turn: 0.008
    rate_per_day: 0.012
    accelerators:
      - trade
      - merchant
      - price
      - consortium
      - gold
    decelerators:
      - negotiate
      - mediate
      - compromise
      - treaty
    accelerator_bonus: 0.04
    decelerator_penalty: 0.04

- id: plague_on_the_river
  name: Plague on the River
  description: >-
    A wasting sickness spreads along the Greyvein River, carried by the
    water or the rats — no one is sure. Fishing villages are hit first,
    then river towns. Quarantines spring up. Blame follows close behind.
  category: conflict
  triggers:
    - sick NPC encounter
    - visit to river town
    - discovery of contaminated water
  narrative_hints:
    - coughing travelers on the road
    - quarantine flags on town gates
    - healers overwhelmed
  tension_level: 0.6
  resolution_hints:
    - find the source and cure the plague
    - contain it through quarantine
    - discover it was deliberately spread
  tags: [humanitarian, mystery, survival]
  escalation:
    - at: 0.2
      event: >-
        The party arrives at a river village where half the residents are
        bedridden. The local healer is exhausted and out of supplies.
      npcs_involved: [Hedge Witch]
      stakes: People are dying. Help is needed now.
    - at: 0.4
      event: >-
        A quarantine is declared on all river traffic. The party is trapped
        on one side. Desperate refugees crowd the banks.
      npcs_involved: []
      stakes: Movement restricted. Supplies running low.
    - at: 0.6
      event: >-
        Rumors circulate that the plague was spread deliberately — poisoned
        wells, tainted grain shipments. Accusations fly between factions.
      npcs_involved: []
      stakes: Paranoia fuels violence. Innocent people are blamed.
    - at: 0.8
      event: >-
        The plague reaches a major town. The lord orders the gates sealed
        with the sick still inside. Riots begin.
      npcs_involved: [Weary Innkeeper]
      stakes: Order collapses. The party must act or watch a town die.
    - at: 1.0
      event: >-
        The plague threatens to become endemic. Without intervention,
        the Greyvein becomes a river of death, depopulating the valley.
      npcs_involved: []
      stakes: The Reach loses its agricultural heartland.
  passive_progression:
    rate_per_turn: 0.01
    rate_per_day: 0.03
    accelerators:
      - river
      - water
      - sick
      - plague
      - disease
    decelerators:
      - heal
      - cure
      - quarantine
      - purify
      - medicine
    accelerator_bonus: 0.04
    decelerator_penalty: 0.03
