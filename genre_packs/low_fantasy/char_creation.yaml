# Character creation scenes — Low Fantasy genre pack
# 5 scenes: origins, crucible, companion, the_road, confirmation

- id: origins
  title: Where Do You Come From?
  narration: |
    The fire has burned low in the hearth of the waystation. Rain drums against the shuttered windows, and the smell of damp wool and pine smoke hangs thick in the air. Across the scarred oak table, an old woman with knowing eyes studies your face by candlelight.

    She sets down her clay cup and speaks quietly. "The road brings all manner of folk through here — farmers, soldiers, wanderers with no name worth claiming. But you carry something different. I can see it in the way you hold yourself." She tilts her head. "Tell me, where did you come from before the road found you?"
  choices:
    - label: The Hearthlands
      description: >-
        You grew up among the rolling farmsteads and market towns of the
        interior, where life was simple and the seasons set the rhythm.
      mechanical_effects:
        race_hint: Human
        background: Farmer
    - label: The Stone Halls
      description: >-
        You were raised beneath the mountain, where the ring of hammers
        and the glow of forge-light were your earliest memories.
      mechanical_effects:
        race_hint: Dwarf
        background: Smith
    - label: The Old Forest
      description: >-
        You spent your youth among ancient trees whose roots remember
        the first age, learning patience and the language of growing things.
      mechanical_effects:
        race_hint: Elf
        background: Forester
    - label: The River Towns
      description: >-
        You came of age on the bustling trade barges and dock markets,
        quick with your hands and quicker with your wits.
      mechanical_effects:
        race_hint: Halfling
        background: Merchant
  allows_freeform: true

- id: crucible
  title: What Forged You?
  narration: |
    The old woman nods slowly, as though your answer confirmed something she already suspected. She reaches beneath the table and produces a worn leather case, opening it to reveal a set of carved bone tokens — each etched with a different symbol.

    "Everyone is shaped by something," she says, spreading the tokens across the table between you. "A test, a loss, a moment when the world showed its teeth and you had to decide who you would be. Which of these speaks to your forging?"
  choices:
    - label: The Blade
      description: >-
        You were forged in conflict — border skirmishes, bandit raids,
        or the hard discipline of a militia captain who demanded perfection.
      mechanical_effects:
        class_hint: Fighter
        personality_trait: Disciplined
    - label: The Wild
      description: >-
        You survived alone in the untamed places, learning to read the
        wind and track prey through brush and bracken.
      mechanical_effects:
        class_hint: Ranger
        personality_trait: Self-reliant
    - label: The Shadow
      description: >-
        You learned early that the world rewards the clever and the
        unseen. Locks, ledgers, whispered secrets — these were your tools.
      mechanical_effects:
        class_hint: Rogue
        personality_trait: Cunning
    - label: The Vigil
      description: >-
        You tended the sick, spoke words over the dying, and kept the
        old shrines clean when others had forgotten them.
      mechanical_effects:
        class_hint: Cleric
        personality_trait: Compassionate
  allows_freeform: true

- id: companion
  title: Who Walks With You?
  narration: |
    The rain has eased to a gentle murmur. The old woman gathers the bone tokens back into their case and studies you with fresh interest. "No one walks the road truly alone," she says. "Even those who think themselves solitary carry someone with them — in memory, in debt, in love."

    She leans back in her chair, the firelight catching the silver in her hair. "Tell me about the one who matters most. The one whose face you see when the road gets long and the nights get cold."
  choices:
    - label: A Sworn Companion
      description: >-
        A fellow traveler bound to you by shared hardship. You pulled
        each other from the mud more times than you can count.
      mechanical_effects:
        relationship: sworn_companion
        personality_trait: Loyal
    - label: A Mentor Now Gone
      description: >-
        Someone older and wiser who taught you what mattered, and whose
        absence still aches like a half-healed wound.
      mechanical_effects:
        relationship: lost_mentor
        personality_trait: Reflective
    - label: A Rival
      description: >-
        Someone who pushes you to be better — or worse. You have never
        been sure whether you hate them or need them.
      mechanical_effects:
        relationship: rival
        personality_trait: Competitive
  allows_freeform: true

- id: the_road
  title: Where Does the Road Lead?
  narration: |
    The old woman rises and moves to the window, pulling the shutter open a crack. Beyond the glass, the rain has stopped and the clouds are breaking apart to reveal cold stars. The road outside glistens like a silver thread leading into darkness.

    "Last question," she says without turning around. "The road always leads somewhere, even when we pretend we are just wandering. What is it you are walking toward — or running from? What keeps your feet moving when everything in you says to stop?"
  choices:
    - label: A Debt Unpaid
      description: >-
        Someone did you a kindness you can never repay, or a wrong you
        cannot let stand. Either way, the ledger must be balanced.
      mechanical_effects:
        goals: settle_a_debt
        emotional_state: Determined
    - label: A Place to Belong
      description: >-
        You have never quite fit anywhere. The road is not a destination
        but a search for the place that feels like home.
      mechanical_effects:
        goals: find_belonging
        emotional_state: Restless
    - label: Something Lost
      description: >-
        There is something out there — a person, a relic, a truth —
        that was taken from you, and you will not rest until it is found.
      mechanical_effects:
        goals: recover_what_was_lost
        emotional_state: Haunted
  allows_freeform: true

- id: confirmation
  title: The Story So Far
  narration: |
    And so it is that {name}, a {race} {class}, steps out into the night. The road stretches ahead, and behind you the waystation light grows small. Whatever comes next, you carry with you everything that made you who you are.

    The old woman watches from the doorway until you vanish into the dark. She whispers something to herself — perhaps a blessing, perhaps a warning — and closes the door.
  choices: []
  allows_freeform: false
