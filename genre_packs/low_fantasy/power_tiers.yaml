# Power Tiers — low_fantasy
# Per-class visual descriptions at each level range.
# max_level: 10
#
# Classes from rules.yaml:
#   Fighter, Ranger, Rogue, Cleric, Druid, Bard, Barbarian, Monk, Wizard

Fighter:
  - level_range: [1, 3]
    label: recruit
    player: >-
      dented iron helm and a hand-me-down chain shirt with missing links,
      a notched sword or battered spear, wooden shield with no device,
      muddy boots and a threadbare cloak, the uncertain stance of someone
      who has drilled but not yet bled
    npc: >-
      town militia in mismatched armor — a boiled leather cuirass and an
      iron pot helm, carrying a spear and a dented round shield, standing
      guard at a gate with the bored fidgeting of a part-time soldier
  - level_range: [4, 6]
    label: man-at-arms
    player: >-
      fitted chain mail over a padded gambeson, a proper steel sword with
      leather-wrapped grip showing honest wear, a kite shield with faded
      personal device, iron helm with nose guard, sturdy boots and a
      traveling cloak, scarred knuckles and a confident grip
    npc: >-
      professional soldier in matching company armor — chain hauberk and
      steel helm with company colors on the shield, spear and short sword,
      disciplined posture, the look of someone who fights for coin
  - level_range: [7, 9]
    label: captain
    player: >-
      well-fitted plate and mail armor showing expert repair over many
      campaigns, quality sword with maker's mark on the ricasso, personal
      heraldry on shield and surcoat, good boots and a warm traveling
      cloak, the weathered confidence of someone who has led others through
      worse than this
    npc: >-
      knight or garrison captain in polished half-plate with house colors,
      longsword and dagger, riding cloak and spurs, commanding bearing,
      a squire trailing behind carrying the helm
  - level_range: [10, 10]
    label: champion
    player: >-
      masterwork plate armor with unique ornamentation earned in famous
      battles, legendary named sword with distinctive crossguard, personal
      banner recognized across the realm, a warhorse nearby in matching
      barding, the bearing of someone whose name ends arguments

Ranger:
  - level_range: [1, 3]
    label: tracker
    player: >-
      worn green-brown hunting leathers stained with mud and sap, a
      short bow with a cracked limb wrapped in cord, a skinning knife
      on the belt, soft-soled boots for quiet movement, a hood pulled
      low, the alert stillness of someone who watches more than speaks
    npc: >-
      village hunter in homespun and deerskin, carrying a short bow and
      a brace of rabbits, muddy to the knees, knows every trail within
      a day's walk but not much beyond
  - level_range: [4, 6]
    label: warden
    player: >-
      supple leather armor reinforced at shoulders and forearms, a proper
      longbow with a full quiver, a hand axe and hunting knife on the
      belt, a ranger's cloak that breaks up the silhouette, calloused
      hands and sun-darkened skin, the quiet competence of someone the
      wilderness answers to
    npc: >-
      king's forester in green leather with a silver badge of office,
      longbow and a sword at the hip, ranging dog at heel, knows the
      deep woods and who moves through them
  - level_range: [7, 9]
    label: pathfinder
    player: >-
      masterwork leather and chain armor fitted for silence and movement,
      a legendary bow with distinctive recurve, paired blades worn cross-
      draw, a cloak woven to match any terrain, an animal companion that
      fights alongside, the gaze of someone who has tracked things most
      people don't believe exist
    npc: >-
      ranger commander in woodland armor with rank insignia worked in
      antler bone, a famous bow with a name, scout network across
      three provinces, speaks to the birds and they answer
  - level_range: [10, 10]
    label: grey warden
    player: >-
      ancient ranger armor repaired and improved over decades of ranging,
      a bow of legend that never misses in the stories, twin blades worn
      smooth from a lifetime of use, a great predator companion — wolf
      or eagle or bear, the silent authority of someone the forest itself
      seems to obey

Rogue:
  - level_range: [1, 3]
    label: cutpurse
    player: >-
      dark common clothing chosen to blend with a crowd, a belt knife
      and a set of bent-wire lockpicks, soft shoes and fingerless gloves,
      a hood or cap pulled low, quick nervous eyes and nimble fingers,
      the slight build of someone who relies on not being noticed
    npc: >-
      street urchin or pickpocket in oversized hand-me-downs, barefoot
      or in stolen shoes, a shiv hidden in a sleeve, darting eyes and
      a ready excuse, knows every alley in the quarter
  - level_range: [4, 6]
    label: burglar
    player: >-
      dark leather armor fitted for silence, a quality short sword and a
      bandolier of throwing knives, professional lockpicks in a leather
      roll, a grappling hook and silk rope, a half-mask and dark cloak,
      the measured movements of someone who cases a room before entering
    npc: >-
      guild thief in dark leather with subtle guild markings, armed with
      a rapier and hidden daggers, pouch of tools at the hip, moves
      through shadows out of habit even in daylight
  - level_range: [7, 9]
    label: shadow
    player: >-
      masterwork shadow-dark leather armor that makes no sound, signature
      weapon — a blackened rapier or paired daggers of exceptional make,
      a bandolier of specialized tools and poisons, a cloak that seems
      to drink the light, the preternatural stillness of someone who
      can stand in a lit room and not be seen
    npc: >-
      guild master or legendary assassin in clothing that costs more
      than it appears to, weapons hidden in at least four places,
      a reputation that opens doors and closes mouths, never seen
      arriving or leaving
  - level_range: [10, 10]
    label: phantom
    player: >-
      armor that seems woven from shadow itself, legendary blade with
      a dark reputation, a collection of skeleton keys that open anything,
      the uncanny ability to be exactly where no one expects, the quiet
      smile of someone who has stolen from kings and left them thanking
      the empty room

Cleric:
  - level_range: [1, 3]
    label: acolyte
    player: >-
      simple undyed robes with a rope belt, a wooden holy symbol on a
      cord around the neck, a plain quarterstaff, a pouch of healing
      herbs, sandals or simple shoes, the earnest expression of someone
      whose faith is stronger than their experience
    npc: >-
      temple novice in brown robes sweeping the threshold, a small holy
      symbol clutched in both hands during prayer, no weapon, soft voice
      and downcast eyes, still learning the liturgy
  - level_range: [4, 6]
    label: priest
    player: >-
      robes in the colors of their deity over a chain shirt, a proper
      metal holy symbol on a chain, a mace or warhammer blessed at the
      temple forge, a shield bearing the deity's device, a belt with
      healer's kit and prayer beads, the steady voice of someone who
      has called on their god and been answered
    npc: >-
      parish priest in vestments appropriate to their station, mace at
      the belt, holy symbol prominently displayed, tending to the sick
      with practiced hands, the quiet authority of a community's
      spiritual anchor
  - level_range: [7, 9]
    label: prelate
    player: >-
      fine vestments over quality armor, a holy symbol of precious metal
      that glows faintly when faith is invoked, a named mace or hammer
      consecrated in a high ritual, a shield bearing miracles in its
      dents, the radiant composure of someone through whom divine power
      flows like a river
    npc: >-
      bishop or temple commander in ceremonial armor with religious
      iconography, attended by lesser clergy, a relic weapon carried
      with reverence, heals with a touch and commands with scripture
  - level_range: [10, 10]
    label: high priest
    player: >-
      vestments that shimmer with barely contained divine light, legendary
      holy weapon that burns the unholy, an aura of peace and authority
      that stills rooms, a holy symbol that is itself a minor relic,
      the serene power of someone who speaks with their god directly
      and is heard

Druid:
  - level_range: [1, 3]
    label: initiate
    player: >-
      rough-spun robes dyed with bark and berry, bare feet calloused
      from forest floor, a gnarled wooden staff still green with life,
      a pouch of seeds and dried herbs, leaves caught in uncombed hair,
      the watchful eyes of someone learning to listen to trees
    npc: >-
      hermit forager in animal skins and woven plant fiber, barefoot
      and unwashed, a wooden crook and a bag of roots, muttering to
      squirrels who seem to understand
  - level_range: [4, 6]
    label: keeper
    player: >-
      leather armor worked with leaf and vine patterns, a staff crowned
      with a living branch that buds in any season, a sickle of dark
      iron at the belt, animal teeth and feathers woven into braided
      hair, bare feet that leave green prints on stone, a small animal
      companion — owl or fox or raven — perched nearby
    npc: >-
      grove guardian in bark-like armor grown rather than crafted, a
      staff hung with charms, surrounded by animals that defer to their
      presence, speaks for the forest in village councils
  - level_range: [7, 9]
    label: archdruid
    player: >-
      armor of living bark and woven thorns that grows and repairs itself,
      a staff that is a living tree branch reaching from the earth, a
      crown of antlers or living flowers, eyes that shift color with the
      seasons, birds landing on shoulders without being called, the air
      around them smells of rain and growing things
    npc: >-
      ancient druid whose body has begun to merge with the forest —
      bark growing along one arm, moss in the hair, roots visible at
      the feet, speaks with the voice of wind through branches
  - level_range: [10, 10]
    label: elder
    player: >-
      a figure that is as much forest as person — living armor of bark
      and thorn and flower indistinguishable from skin, a staff that is
      part of the arm that holds it, animals and plants responding to
      mood and intent, the ancient calm of someone who has become the
      voice of the wild itself

Bard:
  - level_range: [1, 3]
    label: minstrel
    player: >-
      colorful but threadbare traveling clothes with patches from many
      towns, a battered lute or hand drum, a belt knife for emergencies,
      a satchel of penny-sheet ballads and a tin cup for coins, the
      easy smile of someone who survives on charm and a good tune
    npc: >-
      tavern singer in flashy secondhand clothes, an instrument of
      middling quality, singing for supper and a place by the fire,
      knows every ballad and most of the gossip
  - level_range: [4, 6]
    label: troubadour
    player: >-
      well-tailored traveling clothes in distinctive personal style,
      leather armor disguised as a fine doublet, a quality instrument
      with maker's mark, a rapier worn with theatrical flair, a journal
      of songs and secrets, the charismatic confidence of someone who
      has talked their way into courts and out of dungeons
    npc: >-
      court entertainer in fine clothes with a patron's badge, an
      instrument worth more than a soldier's yearly pay, armed with
      wit and a hidden blade, knows which nobles hate which
  - level_range: [7, 9]
    label: loremaster
    player: >-
      an outfit that is equal parts armor and performance costume —
      enchanted fabric over chain links, a legendary instrument that
      resonates with power when played, a blade that sings when drawn,
      a cape that moves dramatically regardless of wind, the magnetic
      presence of someone whose words reshape the mood of a room
    npc: >-
      legendary bard whose songs have changed the course of wars, dressed
      in a style that becomes fashion wherever they go, an instrument
      with its own reputation, kings request their counsel
  - level_range: [10, 10]
    label: voice
    player: >-
      clothing that seems to shift style and color with the story being
      told, an instrument of legend that plays harmonies impossible for
      one musician, a voice that carries power in every word, the aura
      of someone whose songs are history and whose words are law

Barbarian:
  - level_range: [1, 3]
    label: wildling
    player: >-
      rough furs and hides stitched with sinew, bare arms showing tribal
      tattoos and scars from proving fights, a crude iron axe or a heavy
      club, no shoes or simple hide wrappings, wild hair and fierce eyes,
      the coiled tension of someone who fights with fury not technique
    npc: >-
      clan warrior in animal skins with bone ornaments, carrying a rough
      axe, scarred from ritual combat, suspicious of outsiders, smells
      of smoke and animal fat
  - level_range: [4, 6]
    label: reaver
    player: >-
      layered hide and fur armor with metal reinforcements taken from
      fallen enemies, a proper battleaxe or greatsword carried across
      the back, war paint and expanded tattoos marking kills and deeds,
      a necklace of teeth or claws, the confident swagger of someone
      who has charged a shield wall and broken through
    npc: >-
      raiding party leader in war paint and trophy-decorated armor,
      greataxe stained dark, a warband that follows through fear and
      respect, has burned things that were once standing
  - level_range: [7, 9]
    label: warchief
    player: >-
      fearsome armor assembled from the best trophies — a giant's hide
      cloak, a dragon-bone pauldron, armor plates from a defeated knight,
      a legendary weapon taken from someone who no longer needed it,
      ritual scars covering most visible skin, the devastating presence
      of someone armies have learned to avoid
    npc: >-
      clan warchief in ceremonial battle dress that doubles as the
      heaviest armor in the warband, surrounded by personal guard,
      a weapon famous in campfire stories, speaks and warriors move
  - level_range: [10, 10]
    label: legend
    player: >-
      armor that is a walking monument to victories — every piece has
      a story and a kill, a weapon too large for normal people to lift,
      scars that map a lifetime of war, an animal-skin cloak from a
      beast that should not exist, the unstoppable force of someone
      whose rage has become legend and whose name is a warcry

Monk:
  - level_range: [1, 3]
    label: novice
    player: >-
      simple unbleached robes tied with a cloth sash, bare feet hardened
      from training on stone, hands wrapped in linen strips, a wooden
      staff for walking, shaved head or topknot, the careful movements
      of someone still learning to make the body a weapon
    npc: >-
      monastery student in plain training robes, barefoot on cold stone,
      going through forms in the courtyard, bruises from sparring
      practice, a bowl and nothing else
  - level_range: [4, 6]
    label: brother
    player: >-
      robes of better cloth in the monastery's color, a sash denoting
      rank, hands calloused into weapons, bare feet that grip any
      surface, a meditation focus — prayer beads or a small gong,
      the controlled stillness that precedes explosive movement,
      every gesture precise and economical
    npc: >-
      traveling monk in road-worn robes with monastery insignia, a
      walking staff and a begging bowl, moves through a crowd without
      touching anyone, breaks up tavern fights with open hands and
      calm words
  - level_range: [7, 9]
    label: master
    player: >-
      robes that flow like water around a body honed to perfection,
      hands and feet that are themselves legendary weapons, a sash
      of many colors denoting mastery of multiple disciplines, prayer
      beads worn smooth from decades of meditation, the profound
      stillness of someone who could kill with a touch and chooses not to
    npc: >-
      monastery elder whose movements defy age — hands that blur in
      demonstration, feet that don't quite seem to touch the ground,
      students copying forms they cannot yet understand, a serenity
      that is itself a kind of armor
  - level_range: [10, 10]
    label: grandmaster
    player: >-
      simple robes that belie a body transcending physical limits,
      bare hands and feet that radiate subtle energy, prayer beads
      that float when concentration deepens, the absolute stillness
      of someone who has mastered mind and body so completely that
      even their breathing seems optional

Wizard:
  - level_range: [1, 3]
    label: apprentice
    player: >-
      ink-stained robes two sizes too large from a dead master, a
      spellbook clutched protectively to the chest, a crooked staff
      topped with a dim crystal, a belt pouch of spell components —
      bat guano and sulfur and crushed gems, hollow eyes from late
      nights of study, the nervous energy of someone afraid to forget
      an incantation
    npc: >-
      hedge wizard in a patched robe selling minor cantrips at the
      market, a familiar — scrawny cat or irritable toad, a shelf
      of mostly-empty reagent jars, more theory than practice
  - level_range: [4, 6]
    label: magister
    player: >-
      properly fitted robes in the style of an arcane tradition, a
      spellbook bound in unusual leather with silver clasps, a staff
      with a crystal that pulses with stored energy, component pouches
      organized by school, a familiar grown sleek and clever, the
      focused intensity of someone who bends reality through study
    npc: >-
      tower wizard in academic robes with rank insignia, a library
      visible through an open door, staff propped by the desk, ink
      on the fingers and star charts on the wall, speaks in footnotes
  - level_range: [7, 9]
    label: archmage
    player: >-
      robes woven with protective sigils that shimmer when observed
      from the corner of the eye, a staff crackling with barely
      contained energy, a spellbook that opens to the needed page on
      its own, a familiar that is itself a minor magical creature,
      the air around them tastes of ozone and old parchment
    npc: >-
      court wizard or academy headmaster in robes that move against
      the wind, a staff that levitates when released, surrounded by
      floating books and minor illusions, advises rulers and terrifies
      students in equal measure
  - level_range: [10, 10]
    label: archon
    player: >-
      robes that are partly illusion partly reality — fabric shifting
      between star-field and solid cloth, a staff of legend that
      channels enough power to reshape landscapes, a spellbook that
      is less a book and more a living grimoire, reality bending
      slightly around their presence like heat shimmer, the quiet
      certainty of someone who has read the universe's footnotes
