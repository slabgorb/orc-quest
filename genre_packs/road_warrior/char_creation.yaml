- id: origins
  title: Where'd You Learn to Drive?
  narration: |
    A garage. Could be a barn, a warehouse, a cave — doesn't matter.
    What matters is the rig sitting in the middle of it, hood up, engine
    exposed. Someone's been working on it. That someone is you.

    There's a radio playing somewhere. Static mostly. A voice cuts through:
    "Road report — dust storm east, convoy sighting on the Nine, and if
    you're heading south, don't."

    You wipe your hands on a rag that stopped being clean a long time ago
    and look at the rig. Your rig. Every scar on it is a story. Every
    bolt you tightened yourself.

    How'd you get here?
  choices:
    - label: Born on the road
      description: >-
        You grew up in the back of a convoy rig. Learned to drive before
        you learned to read. The road is the only home you've ever known,
        and your family is whoever's driving beside you.
      mechanical_effects:
        race_hint: Convoy Born
        background: Road Born
    - label: Grew up in a garage
      description: >-
        Engines were your toys. Wrenches were your utensils. You took
        apart your first carburetor at eight and had it running better
        by nine. The machine makes sense to you in ways people don't.
      mechanical_effects:
        race_hint: Gearhead
        background: Shop Kid
    - label: Running from something
      description: >-
        You don't talk about before. Before is gone. All that matters
        is the road ahead and the thing behind you that you're not sure
        has stopped following.
      mechanical_effects:
        race_hint: Outlaw
        background: Runner
    - label: Trained for this
      description: >-
        Pit crew. Racing team. Military motor pool. Whatever it was,
        they taught you discipline, precision, and how to change a tire
        in under thirty seconds. Then that world ended and this one began.
      mechanical_effects:
        race_hint: Pit Crew
        background: Professional
    - label: Built my own rig from nothing
      description: >-
        Found the chassis in a ditch. Found the engine in a wreck. Found
        the will in yourself. Nobody gave you anything. Everything on
        this rig, you earned, scavenged, or stole.
      mechanical_effects:
        race_hint: Scrapper
        background: Self-Made
    - label: Inherited a legend
      description: >-
        The rig was someone else's first. Someone who mattered. Their
        name still opens doors — or slams them shut. You drive in their
        shadow, for better or worse.
      mechanical_effects:
        race_hint: Legacy
        background: Heir
  allows_freeform: true

- id: the_rig
  title: Tell Me About the Rig
  narration: |
    You step back and look at it. Really look at it.

    Every rig has a personality. Some purr, some growl, some scream.
    Some are fast, some are tough, some are held together by spite
    and baling wire. But every one of them is alive in a way that
    matters to the person behind the wheel.

    This one is yours. What's it like?
  choices:
    - label: Fast and fragile
      description: >-
        Built for speed. Stripped down, tuned up, everything sacrificed
        for velocity. She's light, she's quick, and if something hits
        her hard she'll fold like paper. But nothing's going to hit her,
        because nothing can catch her.
      mechanical_effects:
        rig_type_hint: interceptor
        rig_trait: speed
    - label: Heavy and mean
      description: >-
        A wall on wheels. Armored, reinforced, heavy as sin. She doesn't
        dodge — she takes the hit and keeps rolling. Slow off the line
        but once she's moving, God help whatever's in the way.
      mechanical_effects:
        rig_type_hint: war_rig
        rig_trait: armor
    - label: Jury-rigged miracle
      description: >-
        Three different vehicles welded into one beautiful disaster.
        Nothing matches, half the parts shouldn't work together, and
        she stalls if you look at her wrong. But you know her moods,
        her quirks, and the exact spot to hit the dashboard when the
        electrics fail.
      mechanical_effects:
        rig_type_hint: frankenstein
        rig_trait: character
    - label: A bike
      description: >-
        Two wheels. No armor. No roof. Just you, the engine, and the
        wind trying to kill you. Faster than anything on four wheels
        and half as safe. You wouldn't have it any other way.
      mechanical_effects:
        rig_type_hint: bike
        rig_trait: agility
    - label: A working machine
      description: >-
        Not flashy. Not fast. Not tough. But reliable. Starts every
        morning, runs all day, and has never left you stranded. In a
        world where everything breaks, reliable is the most valuable
        thing there is.
      mechanical_effects:
        rig_type_hint: hauler
        rig_trait: reliability
  allows_freeform: true

- id: crucible
  title: What Happened on the Road?
  narration: |
    The radio crackles again. Different voice this time, tighter:
    "Anyone on the Nine — war party spotted, twenty rigs, heading north.
    This is not a drill."

    You've heard calls like that before. Everyone has. The road gives
    and the road takes. Something happened to you out there — something
    that made you who you are now.

    What was it?
  choices:
    - label: I lost my crew
      description: >-
        They were good people. Good drivers. It wasn't enough. You're
        the one who made it out, and you've been driving alone since.
        The empty seats in the rig are louder than the engine.
      mechanical_effects:
        class_hint: Wheelman
        personality_trait: haunted
    - label: I won a race I shouldn't have
      description: >-
        Outmatched, outgunned, outclassed. But you drove like the devil
        was in the passenger seat, and when the dust settled, you were
        the only one still rolling. Now everyone knows your name.
      mechanical_effects:
        class_hint: Wheelman
        personality_trait: reckless
    - label: I built something from wreckage
      description: >-
        After the worst day of your life, you sat in the ruins and
        started picking up pieces. Bolted them together. Made something
        new. Turns out that's what you do — you take what's broken and
        make it run again.
      mechanical_effects:
        class_hint: Grease Monkey
        personality_trait: resourceful
    - label: I took down someone bigger than me
      description: >-
        They had more rigs, more guns, more people. You had one rig
        and a plan that was either brilliant or suicidal. It worked.
        Barely. The scars are still healing.
      mechanical_effects:
        class_hint: Wrecker
        personality_trait: defiant
    - label: I saw something on the road nobody believes
      description: >-
        Out past the last waystation, where the road dissolves into
        nothing. You saw it. You can't explain it. You drove back
        changed, and now the road calls you in a way it didn't before.
      mechanical_effects:
        class_hint: Chrome Saint
        personality_trait: seeking
    - label: I brought people together
      description: >-
        They were scattered — lost drivers, broken crews, people with
        nowhere to go. You gave them somewhere to go. You gave them a
        convoy. Now they follow you, and you're not sure you deserve it.
      mechanical_effects:
        class_hint: Road Preacher
        personality_trait: reluctant_leader
  allows_freeform: true

- id: the_name
  title: What Do They Call You?
  narration: |
    The radio goes quiet. You close the hood. The rig is ready.
    You're ready.

    On the road, nobody cares about your birth certificate. They care
    about what you drive, how you drive it, and the name people say
    when they see your dust cloud on the horizon.

    What do they call you? And what do they call the rig?
  choices: []
  allows_freeform: true
  freeform_prompt: >-
    Give your driver a road name and your rig a name. Both matter.
    Both are how the world knows you.
