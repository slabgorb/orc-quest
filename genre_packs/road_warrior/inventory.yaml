currency:
  name: Fuel
  abbreviation: F
  description: >-
    Fuel is the universal currency. Everything is priced in fuel units.
    A full tank is wealth. An empty tank is death. The world's economy
    runs on combustion — whoever controls fuel controls everything.
  secondary:
    - name: Parts
      abbreviation: P
      description: >-
        Scavenged mechanical components. Used for rig repairs and upgrades.
        More specialized parts are rarer and more valuable. A working
        alternator is worth more than gold.
    - name: Favor
      abbreviation: Fv
      description: >-
        Debts owed and favors earned. The informal economy of the road.
        A Fuel Broker who owes you a favor is better than a full tank.
        Tracked per NPC/faction, not as a number.

item_categories:
  - name: Rig Parts
    description: "Components for repair, upgrade, and modification"
    items:
      - name: Scrap Metal
        power_level: 1
        description: "Generic salvage. Enough of it fixes anything."
        fuel_value: 1
      - name: Tire (worn)
        power_level: 1
        description: "Bald and patched but it holds air. Barely."
        fuel_value: 2
      - name: Tire (good)
        power_level: 2
        description: "Actual tread. A luxury."
        fuel_value: 5
      - name: Engine Part (generic)
        power_level: 2
        description: "Belt, hose, gasket, filter. The stuff that keeps it running."
        fuel_value: 3
      - name: Armor Plate
        power_level: 2
        description: "Weldable sheet metal. Adds Rig Armor when installed."
        fuel_value: 4
      - name: Alternator
        power_level: 3
        description: "Working alternator. Keeps the battery alive. Rare."
        fuel_value: 10
      - name: Turbocharger
        power_level: 4
        description: "Bolt-on speed. Increases rig Speed when installed."
        fuel_value: 20
      - name: Engine Block
        power_level: 5
        description: "A whole working engine. The holy grail of scavenging."
        fuel_value: 50

  - name: Mount Weapons
    description: "Weapons that bolt to rig mount slots"
    items:
      - name: Spike Strip Launcher
        power_level: 2
        description: "Drops spikes behind you. One use per chase."
        fuel_value: 8
      - name: Harpoon Gun
        power_level: 3
        description: "Fires a grappling harpoon. Can tow, anchor, or board."
        fuel_value: 15
      - name: Flame Rig
        power_level: 3
        description: "Side-mounted flamethrower. Short range, dramatic effect."
        fuel_value: 15
      - name: Mounted Gun
        power_level: 4
        description: "Bolted-on firearm. Gunner-operated during chases."
        fuel_value: 25
      - name: Ram Plow
        power_level: 3
        description: "Welded front plate. Reduces ramming damage to your rig."
        fuel_value: 12

  - name: Survival Gear
    description: "Personal equipment for when you're not in the rig"
    items:
      - name: Water (1 day)
        power_level: 1
        description: "Clean water. One day's supply for one person."
        fuel_value: 1
      - name: Road Rations (1 day)
        power_level: 1
        description: "Calories. Don't ask what's in it."
        fuel_value: 1
      - name: Medkit
        power_level: 2
        description: "Basic medical supplies. Treats one injury."
        fuel_value: 5
      - name: Tool Kit
        power_level: 2
        description: "Wrenches, screwdrivers, hammer. Required for field repairs."
        fuel_value: 5
      - name: Binoculars
        power_level: 1
        description: "See trouble coming. Road Sense bonus when scouting."
        fuel_value: 3
      - name: Radio (handheld)
        power_level: 2
        description: "Short-range communication. Listen to road reports."
        fuel_value: 4
      - name: Radio (rig-mounted)
        power_level: 3
        description: "Long-range comms. Hear convoy signals, road warnings, arena broadcasts."
        fuel_value: 10

  - name: Personal Weapons
    description: "For when you're dismounted and desperate"
    items:
      - name: Tire Iron
        power_level: 1
        description: "Melee. Better than nothing."
        fuel_value: 1
      - name: Chain
        power_level: 1
        description: "Melee. Good reach. Classic road warrior accessory."
        fuel_value: 1
      - name: Sawed-off Shotgun
        power_level: 2
        description: "Two shots. Make them count."
        fuel_value: 8
      - name: Crossbow
        power_level: 2
        description: "Silent. Reusable ammo. Slow to reload."
        fuel_value: 6
      - name: Pistol
        power_level: 2
        description: "Sidearm. Limited ammo is the real constraint."
        fuel_value: 7
