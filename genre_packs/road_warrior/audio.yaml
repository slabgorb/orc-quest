# Audio configuration for road warrior genre pack
# Mood tracks, SFX library, creature voice presets, mixer settings

mood_tracks:
  combat:
    - path: audio/music/combat.ogg
      title: "Rig Versus Rig"
      bpm: 145
    - path: audio/music/combat_3.ogg
      title: "Chrome and Blood"
      bpm: 155
  chase:
    - path: audio/music/chase.ogg
      title: "Redline Pursuit"
      bpm: 160
    - path: audio/music/chase_3.ogg
      title: "Dust Wake"
      bpm: 170
  exploration:
    - path: audio/music/exploration.ogg
      title: "Open Highway"
      bpm: 90
    - path: audio/music/exploration_3.ogg
      title: "Miles of Nothing"
      bpm: 85
  tension:
    - path: audio/music/tension.ogg
      title: "Engine Idle Standoff"
      bpm: 70
    - path: audio/music/tension_3.ogg
      title: "Dust on the Horizon"
      bpm: 65
  rest:
    - path: audio/music/rest.ogg
      title: "Garage Radio"
      bpm: 75
  convoy:
    - path: audio/music/convoy.ogg
      title: "Engines in Formation"
      bpm: 100
    - path: audio/music/convoy_3.ogg
      title: "Rolling Together"
      bpm: 105
  faction:
    - path: audio/music/faction_bosozoku.ogg
      title: "Bosozoku Thunder"
      bpm: 150
    - path: audio/music/faction_cafe_racers.ogg
      title: "Cafe Racers"
      bpm: 140
    - path: audio/music/faction_dekotora.ogg
      title: "Dekotora Lights"
      bpm: 110
    - path: audio/music/faction_lowriders.ogg
      title: "Lowrider Cruise"
      bpm: 85
    - path: audio/music/faction_matatu.ogg
      title: "Matatu Beat"
      bpm: 120
    - path: audio/music/faction_mods.ogg
      title: "Mod Revival"
      bpm: 130
    - path: audio/music/faction_one_percenters.ogg
      title: "One Percenters"
      bpm: 140
    - path: audio/music/faction_raggare.ogg
      title: "Raggare Rockabilly"
      bpm: 135
    - path: audio/music/faction_rockers.ogg
      title: "Rockers"
      bpm: 145
    - path: audio/music/faction_tuk_tuk.ogg
      title: "Tuk Tuk Hustle"
      bpm: 115

sfx_library:
  engine_start:
    - audio/sfx/engine_start.ogg
  engine_die:
    - audio/sfx/engine_die.ogg
  metal_impact:
    - audio/sfx/metal_impact.ogg
  tire_blow:
    - audio/sfx/tire_blow.ogg
  crash:
    - audio/sfx/crash.ogg
  radio_crackle:
    - audio/sfx/radio_crackle.ogg
  crowd_roar:
    - audio/sfx/crowd_roar.ogg
  fuel_pour:
    - audio/sfx/fuel_pour.ogg
  wind:
    - audio/sfx/wind.ogg
  horn_blast:
    - audio/sfx/horn_blast.ogg

creature_voice_presets:
  warlord:
    creature_type: warlord
    description: "Booming voice over engine noise, megaphone distortion"
    pitch: 0.7
    rate: 0.9
    effects:
      - type: distortion
        params:
          amount: 0.3
      - type: reverb
        params:
          room_size: 0.4
  raider:
    creature_type: raider
    description: "Manic, high-energy screaming over wind noise"
    pitch: 1.2
    rate: 1.4
    effects:
      - type: highpass_filter
        params:
          cutoff_frequency_hz: 400
  announcer:
    creature_type: announcer
    description: "Arena PA system, booming and theatrical"
    pitch: 0.8
    rate: 1.0
    effects:
      - type: reverb
        params:
          room_size: 0.7
      - type: lowpass_filter
        params:
          cutoff_frequency_hz: 3000

mixer:
  music_volume: 0.08
  sfx_volume: 0.15
  voice_volume: 1.0
  duck_music_for_voice: true
  duck_amount_db: -12.0
  crossfade_default_ms: 3000

ai_generation:
  enabled: true
  model: musicgen_small
  max_generation_time_s: 15
  cache_generated: true

themes:
  - name: combat
    mood: combat
    base_prompt: ""
    variations:
      - type: full
        path: audio/music/combat.ogg
      - type: full
        path: audio/music/combat_3.ogg
  - name: chase
    mood: chase
    base_prompt: ""
    variations:
      - type: full
        path: audio/music/chase.ogg
      - type: full
        path: audio/music/chase_3.ogg
  - name: exploration
    mood: exploration
    base_prompt: ""
    variations:
      - type: full
        path: audio/music/exploration.ogg
      - type: full
        path: audio/music/exploration_3.ogg
  - name: tension
    mood: tension
    base_prompt: ""
    variations:
      - type: full
        path: audio/music/tension.ogg
      - type: full
        path: audio/music/tension_3.ogg
  - name: rest
    mood: rest
    base_prompt: ""
    variations:
      - type: full
        path: audio/music/rest.ogg
  - name: convoy
    mood: convoy
    base_prompt: ""
    variations:
      - type: full
        path: audio/music/convoy.ogg
      - type: full
        path: audio/music/convoy_3.ogg
