affinities:
  - name: "Wheel"
    description: "Driving mastery, rig bond, the art of the chase"
    triggers:
      - "winning or surviving a chase"
      - "pulling off a maneuver that shouldn't have worked"
      - "driving through conditions that should have killed you"
      - "feeling the rig's limits and pushing past them"
      - "escaping a pursuit against superior numbers"
    tier_thresholds: [5, 12, 25]

  - name: "Iron"
    description: "Toughness, survival, enduring what the road throws at you"
    triggers:
      - "surviving a crash and walking away"
      - "fighting dismounted and winning"
      - "enduring injury and continuing to drive"
      - "protecting crew during a chase"
      - "refusing to quit when the rig is falling apart"
    tier_thresholds: [5, 12, 25]

  - name: "Wrench"
    description: "Mechanical skill, repair, building and maintaining rigs"
    triggers:
      - "repairing a rig under fire or time pressure"
      - "jury-rigging a solution from scrap"
      - "upgrading a rig with scavenged parts"
      - "diagnosing a mechanical problem by sound alone"
      - "keeping a dying rig running past its breaking point"
    tier_thresholds: [5, 12, 25]

  - name: "Road"
    description: "Navigation, terrain reading, knowing the road and its dangers"
    triggers:
      - "finding a route nobody else knows"
      - "reading terrain to gain advantage in a chase"
      - "predicting an ambush before it springs"
      - "navigating through a storm, night, or zero visibility"
      - "knowing the road well enough to drive it blind"
    tier_thresholds: [5, 12, 25]

  - name: "Crew"
    description: "Leadership, loyalty, the bonds that hold a convoy together"
    triggers:
      - "rallying a scattered crew"
      - "earning loyalty from a stranger"
      - "making a sacrifice for the convoy"
      - "negotiating safe passage for your people"
      - "holding the crew together when morale breaks"
    tier_thresholds: [5, 12, 25]

  - name: "Chrome"
    description: "Body modification, machine-flesh interface, pushing the boundary"
    triggers:
      - "using a body mod in a critical moment"
      - "interfacing directly with a rig's systems"
      - "surviving a mod installation or upgrade"
      - "pushing chrome past its rated limits"
      - "doing something only a modified body could do"
    tier_thresholds: [5, 12, 25]

progression_milestones:
  - level: 1
    label: "Prospect"
    description: "Fresh on the road. Your rig is new to you or you're new to it."
    rig_benefit: "1 mount slot"

  - level: 3
    label: "Runner"
    description: "You've survived enough runs to know what you're doing."
    rig_benefit: "2 mount slots, +10 Rig HP"

  - level: 5
    label: "Road Name"
    description: "People know your name and your rig's name. Reputation opens doors."
    rig_benefit: "3 mount slots, +20 Rig HP, rig gains a Signature Trait"

  - level: 7
    label: "Convoy Legend"
    description: "War boys want to ride with you. Fuel brokers give you credit. Your rig is famous."
    rig_benefit: "4 mount slots, +30 Rig HP, rig gains a second Signature Trait"

  - level: 10
    label: "Road Immortal"
    description: "Your name is spoken on every frequency. Your rig is a legend. The road itself seems to bend for you."
    rig_benefit: "5 mount slots, +50 Rig HP, rig becomes Legendary (narratively indestructible except for story reasons)"
