definitions:
  - id: stakes
    name: Stakes
    description: >-
      What's on the line when you race, fight, or run. Low stakes means
      joyrides, bragging rights, and bruised egos. High stakes means lives,
      freedom, and everything you own on the outcome of one run.
    poles:
      - joyride
      - life_or_death
    default: 0.6

  - id: law
    name: Law
    description: >-
      Who runs the road. Low law means pure outlaw — no kings, no rules,
      every crew for themselves. High law means someone's consolidated
      power — sanctioned races, warlord territories, enforced borders.
      You're either under their boot or racing in their arena.
    poles:
      - outlaw
      - sanctioned
    default: 0.3

  - id: chrome
    name: Chrome
    description: >-
      How extreme are the machines. Low chrome means rust, baling wire,
      and duct tape — everything is jury-rigged from scrap and held
      together by will. High chrome means pre-collapse tech, precision
      engineering, gleaming monsters that purr. The gap between beater
      and beast defines the world's class structure.
    poles:
      - rust
      - gleaming
    default: 0.4

modifiers:
  stakes:
    joyride: >-
      Keep consequences light and recoverable. Races are for reputation,
      not survival. Losing means embarrassment, not death. Rig damage is
      cosmetic. The mood is fun, competitive, and cocky. Characters joke
      mid-chase. Nobody's dying today.
    life_or_death: >-
      Every run could be the last. Losing means capture, death, or worse.
      Rig damage is devastating — you can't replace what's gone. The mood
      is tense, desperate, and raw. Characters make hard choices — save
      the cargo or save the crew. The narrator should make players feel
      the weight of every decision behind the wheel.

  law:
    outlaw: >-
      There is no authority on the road. No police, no courts, no rules
      except what your crew agrees on. Disputes are settled with chrome
      and nerve. Reputation is the only currency that matters — break a
      deal and the road remembers. The mood is punk, DIY, anarchic.
      Freedom is real and it costs everything.
    sanctioned: >-
      Someone controls the road — a warlord, a corporation, a racing
      commission, a government. There are checkpoints, borders, permits,
      and enforcers. Running outside the system is possible but dangerous.
      Running inside it means playing by someone else's rules. The mood
      is structured tension — you know who's watching.

  chrome:
    rust: >-
      Everything is held together with spit, wire, and stubbornness.
      Parts are scavenged, improvised, or stolen. A working engine is
      a miracle. Rigs have personality because they're all unique —
      no two are built the same way. Repair is constant. The Grease
      Monkey is the most important person in any crew. Beauty is in
      the jury-rig.
    gleaming: >-
      Machines are powerful, engineered, and intimidating. Factory-built
      or precision-modified, these rigs represent wealth, skill, or
      salvaged tech beyond most people's dreams. The gap between a
      beater and a beast is a class divide. Chrome catches the light.
      Engines don't rattle — they roar.

presets:
  - name: Fury Road
    description: >-
      Operatic apocalypse. War rigs, war boys, witness me. Every run
      is a fight for survival across a dying world. Rigs are cobbled
      together from wreckage but pushed to impossible limits.
    values:
      stakes: 0.9
      law: 0.1
      chrome: 0.7

  - name: Cannonball Run
    description: >-
      Outlaw charm and open highway. Cops and bootleggers, good ol'
      boys, and a cross-country race where the law is the obstacle
      and the prize is bragging rights. Nobody dies, everybody cheats.
    values:
      stakes: 0.3
      law: 0.4
      chrome: 0.6

  - name: Death Race
    description: >-
      Televised blood sport in a dystopian arena. The audience wants
      carnage, the sponsors want ratings, and you want to survive
      long enough to earn your freedom. Everything is sanctioned,
      everything is lethal, everything is chrome.
    values:
      stakes: 1.0
      law: 0.8
      chrome: 0.9

  - name: Punk Road
    description: >-
      DIY, anti-authoritarian, scrappy survival. Your rig's hood
      ornament is a middle finger welded from scrap. No gods, no
      masters, no clean paint jobs. Everything is scarce, everything
      is earned, and the road belongs to whoever has the nerve to
      take it.
    values:
      stakes: 0.7
      law: 0.1
      chrome: 0.3

  - name: Balanced
    description: >-
      Flexible middle ground for any road story. Stakes matter but
      aren't constant. Authority exists but can be evaded. Rigs
      range from beaters to beasts. Adjust from here.
    values:
      stakes: 0.5
      law: 0.5
      chrome: 0.5
