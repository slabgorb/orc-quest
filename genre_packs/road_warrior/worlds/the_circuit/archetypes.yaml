# The Circuit — NPC Archetypes
# Faction-specific NPCs grounded in real cultural roles.
# These extend the genre-level archetypes with world-specific characters.

# --- BOSOZOKU ---

- name: The Souchou
  faction: bosozoku
  description: >-
    Formation leader. Rides at the front of the pack and every rider
    behind follows their line exactly. Commands through throttle
    position and hand signals at 120 kph. Young — rarely over 22 —
    but carries absolute authority during a run. Off the bike, often
    quiet and awkward. On the bike, a general.
  personality_traits:
    - commanding on the road
    - uncertain off it
    - fiercely protective of the pack
  typical_classes: [Wheelman, War Rider]
  typical_races: [Convoy Born]
  stat_ranges:
    Grip: [16, 18]
    Nerve: [14, 16]
  inventory_hints:
    - tokko-fuku jumpsuit with crew kanji embroidered on the back
    - bike with oversized fairing and bamboo exhaust pipes
    - a whistle used for formation commands at stops
  dialogue_quirks:
    - gives orders through engine revs more than words
    - switches between shy mumbling and barked commands
  disposition_default: 5

- name: The Tokkoutai
  faction: bosozoku
  description: >-
    The special attack rider. Named after kamikaze squadrons — and they
    ride like it. The one who breaks formation to intercept pursuers,
    block police cars, or create chaos so the pack can escape. Volunteers
    for this. Every time.
  personality_traits:
    - reckless
    - loyal beyond reason
    - laughs at the wrong times
  typical_classes: [Wrecker, War Rider]
  typical_races: [Outlaw]
  stat_ranges:
    Nerve: [16, 18]
    Iron: [14, 16]
  inventory_hints:
    - a bike held together by wire and will
    - hachimaki headband worn under the helmet
    - collection of cracked helmets from previous runs
  dialogue_quirks:
    - volunteering for dangerous tasks before anyone asks
    - "'witness this' energy but in Japanese"
  disposition_default: 10

# --- MODS ---

- name: The Face
  faction: mods
  description: >-
    The Mod who everyone knows. The one whose scooter has the most
    mirrors, whose suit is the sharpest, whose taste in music is
    unassailable. The Face doesn't lead — they set the standard. Where
    the Face rides, the Mods follow, because the Face is always where
    the scene is about to happen.
  personality_traits:
    - effortlessly stylish
    - quietly vain
    - knows everyone
  typical_classes: [Wheelman]
  typical_races: [Gearhead]
  stat_ranges:
    Swagger: [16, 18]
    Road Sense: [14, 16]
  inventory_hints:
    - a Vespa GS with 37 mirrors and custom Italian paint
    - a tailored suit under the parka that costs more than the scooter
    - a pill case that's never empty
  dialogue_quirks:
    - name-drops clubs and venues as credentials
    - judges everyone by their shoes first, then their ride
  disposition_default: 5

- name: The Ticket
  faction: mods
  description: >-
    The Mod intelligence operative. Runs the mirror signal network,
    trades information, knows where every faction is at any given
    moment. Not a fighter — a broker. The most valuable person in
    the nightlife district who nobody can identify by sight.
  personality_traits:
    - anonymous by design
    - knows too much
    - never picks a side
  typical_classes: [Road Preacher]
  typical_races: [Gearhead]
  stat_ranges:
    Road Sense: [16, 18]
    Swagger: [12, 14]
  inventory_hints:
    - a plain scooter with precisely angled mirrors
    - a notebook written in personal shorthand
    - three different parkas for three different identities
  dialogue_quirks:
    - answers questions with questions
    - quotes prices for information like a shopkeeper
  disposition_default: 0

# --- 1%ERS ---

- name: The Prez
  faction: one_percenters
  description: >-
    Chapter president. Elected by the members, serves until voted out
    or dead. The Prez runs the chapter like a military unit with a
    constitution. Every decision goes through the table — but the Prez
    sets the agenda and everyone knows what they want before the vote.
  personality_traits:
    - politically sharp
    - controlled violence
    - never forgets a slight
  typical_classes: [Road Preacher, Wheelman]
  typical_races: [Legacy]
  stat_ranges:
    Swagger: [16, 18]
    Iron: [14, 16]
  inventory_hints:
    - a Harley that's been rebuilt to their exact specifications
    - the president's patch — nonnegotiable, kill for it
    - a gavel used at chapter meetings
  dialogue_quirks:
    - speaks in parliamentary procedure when serious
    - "'the club voted' is the end of every argument"
  disposition_default: -5

# --- CAFE RACERS ---

- name: The Ton
  faction: cafe_racers
  description: >-
    A rider who has done the ton — verified, witnessed, undeniable. Not
    a leader. Not a member. Just someone who has gone over 100 mph on
    a stripped bike on a public road and lived. The Ton doesn't talk
    about it. Other people talk about it for them.
  personality_traits:
    - quiet
    - precise
    - lives for the next run
  typical_classes: [Wheelman]
  typical_races: [Gearhead]
  stat_ranges:
    Grip: [16, 18]
    Nerve: [16, 18]
  inventory_hints:
    - a stripped bike with nothing on it that doesn't make it faster
    - a stopwatch
    - no decoration, no patches, no colors
  dialogue_quirks:
    - answers with nods
    - measures everything in seconds and miles per hour
  disposition_default: 0

# --- ROCKERS ---

- name: The Bruiser
  faction: rockers
  description: >-
    The Rocker who settles things physically. Not a bully — more of a
    force of nature that everyone directs toward the current problem.
    Built like a garage door and about as subtle. Respected in Battered
    Garage because they'll fight anyone who causes trouble on neutral
    ground.
  personality_traits:
    - direct
    - surprisingly fair
    - hits very hard
  typical_classes: [Wrecker]
  typical_races: [Scrapper]
  stat_ranges:
    Iron: [16, 18]
    Grip: [14, 16]
  inventory_hints:
    - a Triumph Bonneville with dents that match their knuckles
    - a leather jacket so battered it's basically armor
    - a reputation that precedes them by two city blocks
  dialogue_quirks:
    - prefers monosyllables
    - cracks knuckles as punctuation
  disposition_default: 0

# --- LOWRIDERS ---

- name: The Veterano
  faction: lowriders
  description: >-
    An elder of the cruising scene. Their car is a masterpiece —
    decades of work, layers of paint, murals that tell family history.
    The Veterano doesn't race anymore. They cruise. But their word
    carries weight that speed never could, and their network of family
    obligations spans the entire boulevard.
  personality_traits:
    - patient
    - proud
    - carries history
  typical_classes: [Road Preacher]
  typical_races: [Legacy]
  stat_ranges:
    Swagger: [16, 18]
    Road Sense: [14, 16]
  inventory_hints:
    - a '64 Impala with fourteen coats of candy paint
    - a photo album in the glove box
    - hydraulic switches custom-mounted in a hand-carved wooden panel
  dialogue_quirks:
    - tells stories that sound casual but contain specific warnings
    - calls everyone "primo" or "mijo"
  disposition_default: 10

# --- MATATU CREWS ---

- name: The Makanga
  faction: matatu
  description: >-
    The tout — the person who hangs off the matatu door, calls passengers,
    collects fares, negotiates traffic, and knows every face on the route.
    The driver drives. The Makanga runs the business. They are the loudest,
    fastest-talking, most connected person on any street they're standing on.
  personality_traits:
    - relentless energy
    - knows everyone by name
    - never stops talking
  typical_classes: [Road Preacher]
  typical_races: [Convoy Born]
  stat_ranges:
    Swagger: [16, 18]
    Nerve: [14, 16]
  inventory_hints:
    - a wad of mixed-denomination bills in every pocket
    - a whistle for signaling the driver
    - a mental map of every passenger's destination and connection
  dialogue_quirks:
    - calls out destinations like an auctioneer
    - switches languages mid-sentence without noticing
  disposition_default: 10

# --- TUK-TUK SYNDICATE ---

- name: The Phi
  faction: tuk_tuk
  description: >-
    A senior Syndicate operator. "Phi" is an honorific — older sibling,
    mentor. The Phi knows every alley, every shortcut, every dead drop
    in Nokutori. They don't drive fast — they drive invisible. A
    delivery that arrives before you knew you ordered it. A passenger
    who was never there.
  personality_traits:
    - calm
    - observant
    - never where you expect
  typical_classes: [Wheelman, Chrome Saint]
  typical_races: [Scrapper]
  stat_ranges:
    Road Sense: [16, 18]
    Scrap: [14, 16]
  inventory_hints:
    - a tuk-tuk with concealed compartments
    - a hand-drawn map of alleys that don't appear on city maps
    - a small shrine on the dashboard
  dialogue_quirks:
    - speaks softly — you lean in to hear, which is the point
    - offers tea before discussing business
  disposition_default: 0

# --- RAGGARE ---

- name: The Kungansen
  faction: raggare
  description: >-
    The king of the parking lot. The Raggare whose '57 Chevy is the
    cleanest, whose pompadour is the tallest, and whose knowledge of
    1950s American culture is encyclopedic despite never having been
    to America. Holds court at Bromsviken with the radio on and the
    engine idling, because the idle IS the music.
  personality_traits:
    - nostalgic for an era they never lived in
    - generous with beer
    - surprisingly philosophical about cars
  typical_classes: [Chrome Saint]
  typical_races: [Legacy]
  stat_ranges:
    Iron: [14, 16]
    Swagger: [14, 16]
  inventory_hints:
    - a 1957 Chevrolet Bel Air in two-tone turquoise and white
    - a comb in the back pocket at all times
    - a cooler of beer in the trunk next to the subwoofer
  dialogue_quirks:
    - quotes American rock lyrics as wisdom
    - pronounces English words with a heavy Swedish accent and doesn't care
  disposition_default: 10

# --- DEKOTORA ---

- name: The Oyakata
  faction: dekotora
  description: >-
    Convoy master. The Oyakata leads the Dekotora formation and decides
    when the lights go on. Their truck is the largest, the most elaborately
    decorated, and the one that sets the convoy's pace. The Oyakata's word
    is absolute during a convoy run — even the 1%ers don't interfere with
    a Dekotora formation, because the trucks are too big and the drivers
    are too committed.
  personality_traits:
    - ceremonial
    - patient
    - implacable when challenged
  typical_classes: [Road Preacher, Chrome Saint]
  typical_races: [Convoy Born]
  stat_ranges:
    Swagger: [16, 18]
    Iron: [14, 16]
  inventory_hints:
    - a truck covered in chrome, neon, and hand-painted Buddhist murals
    - a CB radio tuned to a frequency only Dekotora use
    - a thermos of green tea and a bento box for the long hauls
  dialogue_quirks:
    - speaks formally — every sentence is considered
    - refers to the convoy as a family, the trucks as children
  disposition_default: 5
