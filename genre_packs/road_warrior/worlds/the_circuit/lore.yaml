# The Circuit — Present-Day Lore
# What everyone knows about the city and its factions.

setting:
  name: The Circuit
  era: "Late 1970s — the city is at peak cultural collision"
  description: >-
    A port city built on a crescent bay, climbing from waterfront to
    mountains. The harbor faces west. The expressway system loops the
    upper city like a concrete crown. The market district fills the old
    center. The industrial flats sprawl north. The coast road runs south
    along sea cliffs. Suburban strips push east into flat country.

    The city has three million people, most of whom drive normal cars to
    normal jobs. But at night — and sometimes during the day — the roads
    belong to the crews. Ten vehicle cultures, each with territory, codes,
    and enemies. The police know them all. The newspapers fear them all.
    The truth, as always, is more complicated than either institution admits.

  economy: >-
    The port drives legitimate commerce. The factions drive everything else.
    Fuel is available but expensive — the city imports it, and the port
    authority takes a cut. Parts are scarcer than fuel — the Rockers control
    the best salvage yards, and the Grease Witches in Grensholt set
    prices that reflect their irreplaceability. Information is the real
    currency: who's running what route, when the police are distracted,
    which faction is weak this week.

  law_enforcement: >-
    The Metropolitan Road Division — "the Divvies" — are a specialized
    police unit tasked with containing the crew problem. They have fast
    cars, radio coordination, and a genuine desire to keep civilians safe.
    They are not corrupt but they are pragmatic: they know they cannot
    eliminate ten factions, so they manage them. Certain runs are tolerated.
    Certain territories are unofficially recognized. The line is civilian
    safety — cross it and the Divvies come down hard. Stay in your lanes
    and they'll chase you for show but not to the death.

    Individual Divvies have opinions about individual factions. Some
    respect the Café Racers' discipline. Some hate the Bōsōzoku's noise.
    Some have informants in the Mod network. All of them are nervous about
    the 1%ers.

faction_relations:
  blood_feuds:
    - factions: [mods, rockers]
      description: >-
        The oldest rivalry. Mods vs. Rockers — style vs. grit, scooters
        vs. British iron, pills vs. beer. They fight on sight in neutral
        territory. In their own districts they simply refuse to acknowledge
        the other exists.
    - factions: [bosozoku, one_percenters]
      description: >-
        Generational clash. The 1%ers see the Bōsōzoku as undisciplined
        children playing at being outlaws. The Bōsōzoku see the 1%ers as
        old men who've forgotten what the road sounds like at full throttle.
        Both are right.

  uneasy_alliances:
    - factions: [tuk_tuk, mods]
      description: >-
        Information brokers recognize information brokers. The Mods sell
        intelligence gathered through their mirror network. The Tuk-Tuk
        Syndicate sells courier services and alley access. They trade.
        Neither trusts the other. Both need the other.
    - factions: [dekotora, lowriders]
      description: >-
        The art factions. Dekotora and Lowriders share a philosophy —
        the vehicle is a canvas, beauty matters, the road is a gallery.
        They respect each other's craft. They share paint suppliers.
        They do not share territory.

  neutral_ground:
    - location: grensholt
      description: >-
        The Rocker-controlled garage district is the closest thing to
        neutral ground. Every faction needs repairs. The Rockers charge
        everyone the same. Violence in the garage district is punished
        by all factions — nobody wants to lose their mechanic access.
    - location: aschgrund
      description: >-
        The industrial flats serve as arena ground for sanctioned events.
        When factions agree to settle disputes through racing rather than
        war, Aschgrund is where it happens. The 1%ers oversee — which
        means they take a cut.

  wild_cards:
    - faction: matatu
      description: >-
        The Matatu crews don't fit the binary of allies and enemies. They
        serve everyone — their buses carry civilians, crew members, cargo,
        and rumors. They are infrastructure. Attacking a Matatu bus is not
        a faction conflict — it's an attack on the city's circulatory
        system, and every faction responds.
    - faction: raggare
      description: >-
        The Raggare are outsiders even among outsiders. Their 1950s
        American aesthetic confuses everyone. The 1%ers think they're
        posers. The Lowriders think they're cultural tourists. The Raggare
        don't care what anyone thinks — they have the heaviest cars and
        the loudest music and they're not going anywhere.

daily_life:
  morning: >-
    The city wakes up normal. Traffic, commuters, delivery trucks.
    Dekotora convoys roll through the port with legitimate freight,
    their neon off, looking almost ordinary. Matatu buses run their
    routes, sound systems at low volume, touts calling passengers
    in a dozen languages.
  afternoon: >-
    The garages are busy. Rockers and Pit Crew mechanics service
    rigs from every faction. Parts are haggled over. Information
    is traded. The Mods circulate through the nightlife district,
    setting up for the evening. The Tuk-Tuks run courier errands.
  evening: >-
    The city splits. The surface population goes home. The road
    population wakes up. Lowriders begin the slow cruise on Sagrado
    Boulevard. Bōsōzoku gather at the expressway on-ramps. The
    neon comes on — the city's second face, the one the newspapers
    photograph but never understand.
  night: >-
    The Circuit is alive. Formation rides on the expressway. Speed
    trials on the coast road. Cruise processions on the boulevard.
    Courier runs through the market alleys. Smuggling runs on the
    highway. And somewhere in the industrial flats, someone has
    challenged someone else to settle it on the concrete.
  dawn: >-
    The Café Racers own the dawn. The coast road, empty and grey-blue.
    The ton run — alone, fast, quiet except for the engine. By the
    time the city wakes up, the fastest riders have already been
    and gone.
