# The Circuit — Campaign History
# FRESH → EARLY → MID → VETERAN progression with POIs and chase set pieces.
# POI descriptions are written for image generation — visually rich and
# atmosphere-forward.

chapters:
  - id: fresh
    name: "New Blood"
    maturity: FRESH
    session_range: [1, 5]
    description: >-
      The player arrives in The Circuit with a rig and a reputation that
      means nothing here. Every faction sees fresh meat — someone to
      recruit, exploit, test, or ignore. The first sessions are about
      learning whose roads are whose, what the rules are (and aren't),
      and surviving long enough to earn a name.

    character_progression:
      level_range: [1, 3]
      milestone_hints:
        - "First faction contact — someone notices you"
        - "First chase — pursued or pursuing, the road teaches"
        - "First rig damage — the car-acter sheet takes its first scar"
      item_hints:
        - "a rig that's functional but unremarkable"
        - "basic tools and a half-tank of fuel"
        - "no faction colors, no crew, no reputation"

    npcs:
      - name: Spark Greasefire
        archetype: The Grease Witch
        disposition: 5
        notes: >-
          The first friendly face. A Pit Crew mechanic at Grensholt
          who fixes anyone's rig for a fair price and doesn't ask questions.
          The safest person in the city to owe a favor.
      - name: Haraka
        archetype: The Makanga
        disposition: 10
        notes: >-
          A Matatu tout who knows every face and every route. Will give
          information for free once, then charge for it forever. The best
          source of city knowledge for a newcomer.

    active_quests:
      - "Learn the territories — drive each district and survive"
      - "Find a regular fuel source"
      - "Earn a reputation with at least one faction"

    narrative_log:
      - >-
        The city hits you with sound first. Engine noise layered ten deep —
        the high whine of scooters, the chest-thump of Harley pipes, the
        synchronized scream of formation exhausts from the expressway above.
        Then the neon. Then the smell — fuel, food, rain on hot asphalt.
        You are nobody here. Your rig is unknown. That changes tonight.

    location: nottavello
    atmosphere: overwhelming, electric, anonymous
    active_stakes: "Survival and orientation — learn the city before it eats you"

    points_of_interest:
      - name: Dunkelkurve
        region: sturmichi
        description: >-
          The expressway's tightest curve — a banked concrete sweep under a
          tunnel overhang where the sodium lights cut out for exactly four
          seconds. In that darkness, at speed, with twenty formation riders
          ahead of you and the tunnel walls close enough to touch, the only
          thing that exists is the sound of engines and the red glow of
          taillights painting the concrete. This is where the Bōsōzoku test
          new riders. Pass through without breaking formation and you belong.
          Hesitate and you're out.

      - name: Flaco's Doravio
        region: doracanto
        description: >-
          A corner of Doracanto where three palm trees frame a
          parking triangle just large enough for four lowriders. On cruise
          nights, Don Flaco de la Cruz parks here — his '64 Impala under the
          streetlight, fourteen coats of candy apple red catching every photon,
          the hydraulic switch resting on his knee like a scepter. The mural
          on the hood is La Virgen de Guadalupe surrounded by roses. The bass
          from his trunk-mounted system makes the palm fronds tremble. To park
          at Flaco's corner uninvited is to misunderstand everything about
          how The Circuit works.

      - name: Lek's Damthra
        region: nokutori
        description: >-
          The narrowest alley in the market district — a passage between two
          buildings that was never meant for vehicles. Electrical wires hang
          low enough to brush a rider's helmet. The walls are close enough to
          scrape paint. A single bare bulb hangs from a wire at the midpoint,
          swinging in the draft from passing tuk-tuks. Phi Lek uses this
          passage as a demonstration: if you can drive it without touching
          the walls, you can drive anything in Nokutori. The scrape marks
          on the walls are a history of everyone who couldn't.

    active_tropes:
      - trope_id: turf_race
        progression: 0.0
      - trope_id: rig_resurrection
        progression: 0.0

  - id: early
    name: "Earning Colors"
    maturity: EARLY
    session_range: [6, 12]
    description: >-
      The player has survived long enough to be known. One or more factions
      have an opinion about them — positive, negative, or both. The city's
      deeper politics are becoming visible: faction alliances, grudges, and
      the unspoken rules that keep the whole thing from collapsing. The
      player is being pulled in directions. Everyone wants something.

    character_progression:
      level_range: [3, 5]
      milestone_hints:
        - "Faction alignment — whose colors do you wear?"
        - "First faction mission — a run, a delivery, a fight"
        - "Rig upgrade — the car-acter sheet grows"
      item_hints:
        - "rig modifications reflecting faction identity"
        - "faction tokens or colors"
        - "a contact list and a debt list"

    npcs:
      - name: Souchou Hayate
        archetype: The Souchou
        disposition: 5
        notes: >-
          Young Bōsōzoku formation leader. Respects anyone who can keep
          formation on Sturmichi. Doesn't respect anything else.
      - name: Tombstone
        archetype: The Prez
        disposition: -10
        notes: >-
          1%er chapter president. Views every other faction as children
          playing on roads the club built. Will use anyone who's useful
          and discard anyone who isn't.
      - name: Ace Nifty
        archetype: The Ticket
        disposition: 0
        notes: >-
          Mod intelligence broker. Sells information to everyone. Buys
          information from everyone. The most neutral and most dangerous
          person in the nightlife district.

    active_quests:
      - "Complete a faction mission — prove your worth"
      - "Navigate a turf dispute without making permanent enemies"
      - "Discover the Mod intelligence network — and decide if you're a customer"

    narrative_log:
      - >-
        You have a name now. Not the one you came with — the one The Circuit
        gave you. Your rig has its first scars and its first upgrades. When
        you roll through a district, someone nods. Someone else glares. Both
        mean you exist.

    location: grensholt
    atmosphere: tense, political, choices closing in
    active_stakes: "Allegiance — who do you ride with, and what does it cost?"

    points_of_interest:
      - name: Faroporta
        region: farolumi
        description: >-
          The port gate where the Dekotora convoys enter the city. At night,
          when the trucks turn their lights on for the final approach, the
          container walls on either side become a canyon of reflected color —
          neon blue, neon red, gold chrome, all of it bouncing between steel
          surfaces until the corridor blazes like a fever dream of a Buddhist
          temple. The lead truck's mural — always a deity, always Kongou-maru's
          Fudou Myouou in wrathful pose — appears to move in the shifting light.
          Dock workers stop to watch. They've seen it a thousand times. They
          still stop.

      - name: Bromsveld
        region: bromsviken
        description: >-
          The drive-in at Bromsviken where the Raggare hold court. A
          semicircle of 1950s American steel under a neon sign that reads
          AUTOMAT in Swedish blue and yellow. The speaker posts still work.
          A jukebox glows inside the attached diner. The Raggare park in
          formation — biggest engines in the center — and idle. The combined
          rumble of eight V8 engines at rest shakes the gravel. Doo-wop
          plays from every open window. It is 1957 forever in this parking lot.

      - name: Harijumba
        region: harifasi
        description: >-
          The main Matatu terminus at evening rush — twelve wildly painted
          minibuses jostling for position at the curb, touts hanging from
          doorways shouting destinations in three languages, bass frequencies
          from competing sound systems making the puddles vibrate in opposing
          patterns. The buses are covered in graffiti-art murals of musicians,
          athletes, and political figures. One has a portrait of Bruce Lee
          across its entire side panel. Another has a sound system so powerful
          that the sheet metal of the bus visibly flexes with each bass hit.
          The air smells like diesel and fried plantain.

    active_tropes:
      - trope_id: turf_race
        progression: 0.2
      - trope_id: police_crackdown
        progression: 0.0
      - trope_id: convoy_war
        progression: 0.0

  - id: mid
    name: "The War for the Road"
    maturity: MID
    session_range: [13, 25]
    description: >-
      The Circuit is fracturing. Alliances shift. Old grudges ignite. A
      major conflict — a turf war, a police crackdown, a challenge that
      pulls every faction in — is reshaping the power structure. The
      player is no longer a bystander. They are a factor. What they do
      next matters to people who matter.

    character_progression:
      level_range: [5, 8]
      milestone_hints:
        - "Faction leadership role or independent power base"
        - "Rig is now legendary in at least one district"
        - "Debts called in — the cost of alliances comes due"
      item_hints:
        - "heavily modified rig with faction-specific upgrades"
        - "allies and enemies in multiple factions"
        - "knowledge of routes and secrets others don't have"

    npcs:
      - name: Kongou-maru
        archetype: The Oyakata
        disposition: 5
        notes: >-
          Dekotora convoy master. His truck is the most elaborately decorated
          rig in the city. Speaks formally, moves slowly, and controls the
          port road with quiet certainty. Rumored to carry something old
          in his cab that he never shows anyone.
      - name: Don Flaco de la Cruz
        archetype: The Veterano
        disposition: 10
        notes: >-
          Elder of the Lowrider scene. Brokered the Sagrado Pact. His word
          holds the boulevard together. Patient, proud, and carrying more
          history than he lets on.
      - name: Phi Lek
        archetype: The Phi
        disposition: 0
        notes: >-
          Senior Tuk-Tuk Syndicate operator. Knows every alley in Nokutori
          including ones that appear on no map. Speaks softly. Appears and
          disappears without explanation.

    active_quests:
      - "Choose a side in the factional conflict — or find a third path"
      - "Attempt The Full Circuit"
      - "Discover what connects all ten factions to this city"

    narrative_log:
      - >-
        The city is different now. The accommodations that kept the peace
        are breaking down. Turf that was settled is contested again. Old
        alliances are tested by new pressures. You've been on the road long
        enough to know that The Circuit isn't just a city with gangs — it's
        a system, and the system is designed. By whom, and why, is the
        question that keeps you up after the engines stop.

    location: aschgrund
    atmosphere: volatile, consequential, the stakes are real now
    active_stakes: "Power — who controls the roads, and what are they willing to destroy to keep them?"

    points_of_interest:
      - name: Aschpfeiler
        region: aschgrund
        description: >-
          The rusted support column in the center of the largest warehouse
          floor at Aschgrund. Scored with marks from a hundred races —
          whoever touches the pillar first on the final lap wins. The column
          is pitted with impact dents from riders who cut too close. Spray-
          painted tallies mark faction victories. The 1%ers have the most
          marks. The Bōsōzoku have the most recent. Under the paint, if
          you look closely, there are marks that predate every faction —
          scored into the metal with a tool, not a vehicle.

      - name: Sturmrohr
        region: sturmichi
        description: >-
          The longest tunnel on the expressway loop — eight hundred meters
          of concrete tube lit by failing fluorescent strips that flicker in
          sequence, creating a strobe effect at speed. The sound inside is
          deafening — engine noise compressed and reflected until it becomes
          a physical force. At the tunnel's midpoint, there is a maintenance
          access door. It is always locked. The lock is new. The door is old.

      - name: Dorapinta
        region: doracanto
        description: >-
          The wall at the north end of the boulevard where the Lowrider
          families have been painting for twenty years. Layer upon layer —
          faces of the dead, landscapes of places none of them have been,
          virgins and saints and classic cars floating in clouds. The newest
          panel is a map. Not of the boulevard. Not of the city. Of something
          underground, painted in the style of a religious illumination, with
          roads that branch and converge in patterns that look deliberate.
          The artist says it came to them in a dream.

    active_tropes:
      - trope_id: the_full_circuit_challenge
        progression: 0.2
      - trope_id: convoy_war
        progression: 0.3
      - trope_id: police_crackdown
        progression: 0.2
      - trope_id: cruise_night_incident
        progression: 0.0

  - id: veteran
    name: "The Thread"
    maturity: VETERAN
    session_range: [25, 999]
    description: >-
      The player knows The Circuit like the back of their scarred hands.
      They have allies, enemies, legends, and a rig that's been rebuilt
      so many times it's more scar than original. The deepest secrets of
      the city are within reach — the ones that explain why this place
      exists, why these factions converged, and what the roads themselves
      are trying to tell anyone who drives them in the right sequence.

    character_progression:
      level_range: [8, 12]
      milestone_hints:
        - "The player IS a faction leader or independent power"
        - "Rig is legendary — other factions tell stories about it"
        - "The conspiracy threads converge"
      item_hints:
        - "a rig that is a legend in its own right"
        - "keys, maps, or knowledge that nobody else has"
        - "the respect or fear of every faction leader"

    npcs:
      - name: The Kungansen Magnus
        archetype: The Kungansen
        disposition: 10
        notes: >-
          Raggare elder whose '57 Chevy has a VIN that doesn't match any
          factory record. Doesn't know this. Doesn't care. But the car
          runs better than any vehicle its age should.
      - name: Ton Redline
        archetype: The Ton
        disposition: 0
        notes: >-
          The fastest rider alive. Has done the ton on every road in the
          city. Speaks in nods and lap times. If anyone has run the full
          underground route, it would be this person — but they've never
          said, and nobody has asked twice.

    active_quests:
      - "Uncover the truth about The Circuit's design"
      - "Unite or shatter the factions"
      - "Run the route that connects everything"

    narrative_log:
      - >-
        You've been on these roads long enough that the city feels like an
        extension of your rig. You know every curve, every shortcut, every
        faction leader by name. But there's something underneath all of it
        — a pattern in the roads, a connection between the factions, a
        design that's too perfect to be coincidence. The circuit isn't just
        a name. It's a blueprint. And you're close to reading it.

    location: sturmichi
    atmosphere: culmination, revelation, the road has been waiting
    active_stakes: "Truth — what is The Circuit, and what happens when you complete it?"

    points_of_interest:
      - name: Der Faden
        region: sturmichi
        description: >-
          A maintenance tunnel entrance beneath the expressway overpass.
          The door is steel, unmarked, and the lock accepts a key that no
          locksmith in the city recognizes. Beyond it, the tunnel descends —
          not to sewers or utility corridors but to a road. An actual paved
          road, two lanes, lit by overhead fixtures that still work despite
          being decades old. The road runs straight for a distance that
          shouldn't be possible given the surface geography. The air smells
          like old asphalt and something else — machine oil, exhaust, and
          time. The road has been driven. Recently.

      - name: Brückner's Office
        region: farolumi
        description: >-
          A locked room on the third floor of the Port Authority building.
          The nameplate on the door reads MERIDIAN ASPHALT — CITY LIAISON
          in brass letters that haven't been polished since 1979. Inside,
          if you can get inside, there is a drafting table, a wall of
          blueprints, and a leather journal. The blueprints show the city's
          road network. All of it. Including the parts that aren't on any
          public map.

      - name: Convergence Point
        region: aschgrund
        description: >-
          The exact center of the largest warehouse floor at Aschgrund.
          Not the pillar — a point on the concrete floor that, if you
          stand on it and look up through the collapsed roof, aligns with
          the expressway overpass, the mountain ridge, and the port crane
          gantry in a perfect sightline that runs north-south. The old
          marks on the pillar — the ones that predate every faction — point
          toward this spot. The concrete here is a slightly different color
          than the rest of the floor. Slightly newer. As if someone poured
          a new slab over something.

    active_tropes:
      - trope_id: the_full_circuit_challenge
        progression: 0.6
      - trope_id: convoy_war
        progression: 0.6
      - trope_id: police_crackdown
        progression: 0.5
