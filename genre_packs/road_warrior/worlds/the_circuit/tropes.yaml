# The Circuit — Tropes
# Story beats tuned for inter-faction gang racing, turf wars, and chase drama.
# These extend/override the genre-level tropes for this specific world.

- id: turf_race
  name: Turf Race
  description: >-
    Two factions settle a territorial dispute the only way The Circuit
    respects — on the road. A race through contested ground, witnessed
    by both sides. Winner takes the territory. Loser acknowledges it
    or goes to war.
  category: conflict
  triggers:
    - two factions claiming the same route or corner
    - an insult to a faction's honor on their own turf
    - a new faction pushing into established territory
  narrative_hints:
    - increased patrols by both factions on the disputed stretch
    - intermediaries shuttling between faction leaders
    - mechanics working overtime to prepare the champion's rig
  tension_level: 0.5
  resolution_hints:
    - race clean and settle it with speed
    - cheat and risk all-out war if caught
    - sabotage the other faction's rig before the race
    - broker a shared-territory deal and skip the race entirely
  tags: [faction, race, territory, honor]
  escalation:
    - at: 0.2
      event: >-
        Skirmishes on the border. A Mod scooter tagged with Rocker grease.
        A tuk-tuk finding its shortcut blocked by a lowrider parked
        sideways. Small provocations that everyone knows aren't small.
      npcs_involved: [The Face, The Bruiser]
      stakes: Territory is being tested.
    - at: 0.4
      event: >-
        The challenge is formal. A race, a route, a date. Both factions
        choose their champion. The player is asked to ride — or to stay
        out of it. Staying out has consequences too.
      npcs_involved: [The Prez, The Souchou]
      stakes: A faction's territory and reputation are on the line.
    - at: 0.6
      event: >-
        Race day. The route cuts through two other factions' ground —
        they weren't consulted and they're not happy. The police know
        it's happening. The Matatu crews are running a betting operation
        from their buses.
      npcs_involved: [The Makanga, The Ticket]
      stakes: The race is now a city event, whether anyone planned it or not.
    - at: 0.8
      event: >-
        Mid-race, something goes wrong. A third faction intervenes. A
        rig catches fire. The route is blocked. The race becomes a chase,
        the chase becomes a running battle, and the original stakes are
        buried under immediate survival.
      npcs_involved: [The Tokkoutai, The Bruiser]
      stakes: Winning the race no longer matters — surviving does.
    - at: 1.0
      event: >-
        The finish. Whatever crosses the line first settles it — but the
        wreckage along the route has created new grudges, new debts, and
        at least one faction that wasn't involved before is now furious.
      npcs_involved: [The Prez, The Souchou, The Veterano]
      stakes: Territory changes hands. New alliances and enemies emerge.
  passive_progression:
    interval_turns: 6
    increment: 0.12

- id: the_full_circuit_challenge
  name: The Full Circuit
  description: >-
    Someone has challenged someone to run The Full Circuit — every
    faction's territory in a single run. The legendary route. Nobody
    has completed it in years. The last person who tried is still
    talked about, though nobody agrees on what happened to them.
  category: journey
  triggers:
    - a boast that can only be settled by the ultimate run
    - discovery of a route that might make it possible
    - a dare from someone who knows you can't refuse
  narrative_hints:
    - old-timers telling stories about the last attempt
    - mechanics refusing to prepare rigs for "a suicide run"
    - the Mods' intelligence network suddenly going quiet
  tension_level: 0.7
  resolution_hints:
    - complete the circuit and become legend
    - fail but survive and carry the story
    - discover something on the route that changes everything
    - realize the circuit was designed to be run — and wonder by whom
  tags: [journey, legend, all-factions, ultimate]
  escalation:
    - at: 0.2
      event: >-
        The challenge is issued. Word spreads across every faction within
        hours — the Mod mirror network, the Matatu bass signal, word of
        mouth at Grensholt. Everyone has an opinion. Most of those
        opinions are "don't."
      npcs_involved: [The Ticket, The Makanga]
      stakes: A legend is being attempted.
    - at: 0.4
      event: >-
        The first faction's territory — the entry is easy. The exit is
        where the next faction's riders are waiting, not to fight but to
        watch. If you make it through, you've earned their attention.
        If you don't, you've earned their pity.
      npcs_involved: [The Souchou]
      stakes: Every faction crossing raises the stakes.
    - at: 0.6
      event: >-
        Halfway through. Three territories crossed. The rig is taking
        damage. The Divvies have noticed. A faction that was supposed
        to let you through has changed their mind. The route ahead goes
        through the most dangerous ground in the city.
      npcs_involved: [The Prez, The Phi]
      stakes: No turning back — the route behind is closed.
    - at: 0.8
      event: >-
        The final territories. Every faction is watching now — riders
        lining the route, headlights on, engines running. The police
        have pulled back because even they want to see this. The rig
        is held together by will and wire. One more territory.
      npcs_involved: [The Oyakata, The Veterano]
      stakes: Legend or wreckage — nothing in between.
    - at: 1.0
      event: >-
        The finish. If you make it back to the start, the city will
        never look at you the same way. If you find something on the
        route that wasn't supposed to be there — a road, a tunnel,
        a connection — the city will never look the same to you.
      npcs_involved: []
      stakes: You have run The Full Circuit. Now you know what that means.
  passive_progression:
    interval_turns: 8
    increment: 0.1

- id: convoy_war
  name: Convoy War
  description: >-
    Two factions contest a freight route. Not a race — a running battle
    between convoys. Rigs smashing into rigs, riders boarding vehicles,
    cargo spilling across the road. The most destructive type of conflict
    in The Circuit.
  category: conflict
  triggers:
    - a faction claiming a freight route another faction uses
    - cargo theft from a Dekotora convoy
    - a blockade of a faction's supply line
  narrative_hints:
    - Dekotora convoys adding armor plating
    - 1%ers running escort alongside freight trucks
    - the price of parts spiking at Grensholt
  tension_level: 0.6
  resolution_hints:
    - fight through and hold the route by force
    - negotiate a toll arrangement
    - find an alternate route nobody controls
    - destroy the cargo so nobody profits
  tags: [convoy, war, freight, destruction]
  escalation:
    - at: 0.3
      event: >-
        First incident. A Dekotora truck sideswiped on the port road.
        Cargo scattered. The driver is unhurt but the mural took damage —
        in Dekotora culture, this is a personal wound. The convoy master
        wants answers.
      npcs_involved: [The Oyakata]
      stakes: A freight route is contested.
    - at: 0.6
      event: >-
        Full convoy engagement. Multiple trucks, escort riders, the
        road turned into a moving battlefield. Rig HP dropping across
        the board. Someone's fuel tank is leaking. Someone else's mount
        slots just got ripped off by a sideswipe.
      npcs_involved: [The Oyakata, The Prez, The Tokkoutai]
      stakes: Rigs are being destroyed. This is expensive and personal.
    - at: 1.0
      event: >-
        The convoys meet head-on. Trucks blocking the road in both
        directions. Every rider on both sides committed. The cargo
        is somewhere in the wreckage. The question isn't who wins —
        it's what's left.
      npcs_involved: [The Oyakata, The Prez]
      stakes: The route — and the rigs — are decided here.
  passive_progression:
    interval_turns: 8
    increment: 0.1

- id: police_crackdown
  name: Divvie Sweep
  description: >-
    The Metropolitan Road Division is cracking down. Checkpoints,
    roadblocks, helicopters. Something has embarrassed the police
    brass and they're taking it out on every faction simultaneously.
    The usual accommodations are suspended. The road is hostile.
  category: external
  triggers:
    - a civilian injury during a faction chase
    - media coverage that forces a political response
    - a new Divvie commander with something to prove
  narrative_hints:
    - checkpoints appearing on previously safe routes
    - informants going silent
    - the Mod intelligence network reporting unusual radio traffic
  tension_level: 0.4
  resolution_hints:
    - lay low until the heat passes
    - find what triggered the crackdown and fix it
    - unite factions against a common enemy (temporarily)
    - cut a deal with a Divvie who has their own agenda
  tags: [police, external, pressure, all-factions]
  escalation:
    - at: 0.2
      event: >-
        The first checkpoint. Unexpected, efficient, and on a route
        that was supposed to be clear. Someone got stopped. Someone
        got their rig impounded. The factions are nervous.
      npcs_involved: [The Ticket]
      stakes: The police are no longer predictable.
    - at: 0.5
      event: >-
        The crackdown is real. Multiple factions hit simultaneously.
        Rigs impounded, riders arrested, routes blocked. The factions
        are being squeezed and they're starting to blame each other
        for bringing the heat.
      npcs_involved: [The Prez, The Souchou, The Veterano]
      stakes: The factions may turn on each other under pressure.
    - at: 0.8
      event: >-
        The Divvies offer a deal — to one faction. Cooperate, inform,
        and we'll leave your territory alone. The offer is real. The
        question is whether any faction takes it — and what happens
        to them if the others find out.
      npcs_involved: [The Prez, The Phi]
      stakes: Faction loyalty vs. survival.
    - at: 1.0
      event: >-
        The crackdown reaches its peak. A massive operation targeting
        the expressway loop — the Bōsōzoku's sacred ground. The
        response from the factions will define the next era of The
        Circuit: submit, scatter, or unite.
      npcs_involved: [The Souchou, The Tokkoutai]
      stakes: The relationship between the factions and the law is rewritten.
  passive_progression:
    interval_turns: 10
    increment: 0.08

- id: rig_resurrection
  name: Rig Resurrection
  description: >-
    A rider has lost their rig — wrecked, stolen, or impounded. In
    The Circuit, this is an identity crisis. A driver without a ride is
    meat on the road. Getting it back — or building a new one — is a
    story arc that touches every faction, because parts come from the
    Rockers, paint comes from the Lowriders, and nobody gives anything
    for free.
  category: personal
  triggers:
    - a player's rig is destroyed in a chase or battle
    - a rig is stolen by a rival faction
    - a rig is impounded by the Divvies
  narrative_hints:
    - mechanics assessing wreckage and shaking their heads
    - the rider walking — visibly wrong, visibly diminished
    - other factions making offers that come with strings
  tension_level: 0.4
  resolution_hints:
    - rebuild from salvage with help from multiple factions
    - steal a new rig and make it yours
    - recover the original from whoever has it
    - accept help from a faction and owe them
  tags: [personal, rig, identity, rebuild]
  escalation:
    - at: 0.2
      event: >-
        The rig is gone. The rider is on foot. Everything feels wrong —
        the world is too slow, too loud, too close. Other factions see
        a vulnerability. Some see an opportunity to help. Some see an
        opportunity to recruit.
      npcs_involved: [The Bruiser]
      stakes: Identity is stripped. The clock is ticking.
    - at: 0.5
      event: >-
        A lead on parts, a stolen rig, or a deal. But every option
        comes with a cost — a favor owed, a run to complete, a debt
        to a faction you'd rather not owe. The rider has to decide
        how much of themselves they'll trade to get back on the road.
      npcs_involved: [The Veterano, The Phi]
      stakes: The price of a new rig is always more than parts and labor.
    - at: 1.0
      event: >-
        The rig is rebuilt, recovered, or replaced. The first ride.
        The engine turns over. The road opens up. Everything is right
        again — but the debts incurred getting here are now due.
      npcs_involved: []
      stakes: You're back. Now pay what you owe.
  passive_progression:
    interval_turns: 6
    increment: 0.15

- id: cruise_night_incident
  name: Cruise Night Incident
  description: >-
    Someone has violated the sanctity of Cruise Night on Sagrado
    Boulevard. The Lowrider procession — the most beautiful, most
    ceremonial event in The Circuit — has been disrupted. This is
    not just a territorial violation. This is blasphemy.
  category: faction
  triggers:
    - violence during Cruise Night
    - a non-Lowrider faction racing on the boulevard during procession
    - disrespect to a Veterano's car
  narrative_hints:
    - Lowrider crews gathering in unusual numbers
    - the Sagrado Pact being invoked by name
    - every Lowrider in the city heading for the boulevard
  tension_level: 0.6
  resolution_hints:
    - find the perpetrator and deliver them to Lowrider justice
    - mediate before the Lowriders go to war
    - discover it was a setup to provoke exactly this reaction
    - the perpetrator has a reason — hear it before judging
  tags: [faction, lowrider, sacred, honor]
  escalation:
    - at: 0.3
      event: >-
        The violation. Mid-cruise, something happens that stops the
        procession. Every Lowrider on the boulevard kills their engine.
        The silence is worse than any threat.
      npcs_involved: [The Veterano]
      stakes: The Sagrado Pact has been broken.
    - at: 0.6
      event: >-
        The Lowrider crews are united — all of them, every family, every
        grudge set aside. They want the one who did this. And they want
        every other faction to know that this is what happens when you
        touch the boulevard.
      npcs_involved: [The Veterano, The Prez]
      stakes: A unified Lowrider response threatens the balance of power.
    - at: 1.0
      event: >-
        The Lowriders roll. Not cruising — hunting. Every art car on
        the road, hydraulics locked high for visibility, sound systems
        playing the same song in unison. The city has never seen them
        like this. Nobody wants to see it again.
      npcs_involved: [The Veterano]
      stakes: The sanctity of Cruise Night — and the message it sends.
  passive_progression:
    interval_turns: 6
    increment: 0.15
