# The Circuit — Visual Style
# Late 1970s urban night photography meets vehicle culture portraiture.
# Rain-slicked asphalt, neon reflections, chrome, graffiti, exhaust haze.

positive_suffix: >-
  late 1970s photography, Kodachrome film grain, urban night scene,
  rain-slicked asphalt reflecting neon, sodium vapor streetlights,
  chrome reflections, exhaust haze in headlight beams, cinematic
  composition, shallow depth of field, gritty realism, no CGI look,
  authentic period vehicles, practical lighting

negative_prompt: >-
  clean, sterile, modern, CGI, digital, post-apocalyptic, wasteland,
  desert, sand, dust, Mad Max, war paint, spikes, skulls, dystopian,
  ruined buildings, collapsed infrastructure, zombie, mutation,
  oversaturated, anime, cartoon, illustration, watercolor, painting,
  daytime sunshine, cheerful, bright colors, plastic

visual_tag_overrides:
  sturmichi:
    positive_suffix: >-
      elevated expressway at night, banked concrete curves, amber sodium
      lights, tunnel entrance darkness, motorcycle headlight trails,
      long exposure light streaks, Japanese highway aesthetic, exhaust
      smoke in tunnel lighting, concrete barriers
    style_note: >-
      Formation riding shot — multiple headlights in synchronized pattern.
      The expressway should feel like a concrete canyon above the city.

  bruveil:
    positive_suffix: >-
      mountain switchback road, sea cliff edge, fog bank, dawn grey-blue
      light, no guardrails, gravel shoulder, hairpin curve, ocean far below,
      single motorcycle headlight in fog, wet road surface
    style_note: >-
      Isolation and speed. The rider is alone on the mountain. The ocean
      is always visible below. Fog is a character.

  nokutori:
    positive_suffix: >-
      Southeast Asian night market, narrow alley, corrugated metal shutters,
      string lights, three-wheeled vehicle in tight space, covered arcade,
      wet cobblestones, steam from food stalls, cluttered signage in
      multiple languages
    style_note: >-
      Claustrophobic and vivid. The alley should feel too narrow for
      the vehicle that's somehow moving through it at speed.

  doracanto:
    positive_suffix: >-
      lowrider car show, candy paint under streetlights, hydraulic bounce
      mid-air, mural art on car hood, palm trees, boulevard at night,
      chrome bumper reflections, warm amber and neon pink lighting,
      crowd silhouettes
    style_note: >-
      The cars are the art. Every surface is painted, chromed, or lit.
      Warm colors — this is the most beautiful territory in the city.

  farolumi:
    positive_suffix: >-
      container port at night, steel canyon corridors between container
      stacks, neon-decorated truck convoy, Japanese dekotora truck with
      chrome and light arrays, rail crossing gates, industrial lighting,
      reflected neon on wet steel
    style_note: >-
      The Dekotora trucks transform industrial ugliness into beauty.
      The contrast between cold steel and warm neon is the key image.

  aschgrund:
    positive_suffix: >-
      abandoned factory interior, wide concrete apron, rusted industrial
      machinery, motorcycle and car headlights creating arena lighting,
      spectators on warehouse roofs in silhouette, exhaust smoke in
      crossed headlight beams
    style_note: >-
      Arena fight energy. The headlights from parked vehicles create
      the lighting. The darkness beyond the light is absolute.

  grisevont:
    positive_suffix: >-
      coastal highway at dawn, grey-blue pre-sunrise light, sea cliff
      road, ocean spray on road surface, single motorcycle on empty road,
      long sweeping curve, salt air haze, distant headlight
    style_note: >-
      Solitude and speed. The most beautiful and most dangerous road
      in the city, shot in the brief window before sunrise.

  nottavello:
    positive_suffix: >-
      1970s nightclub district, neon signage, wet pavement reflections,
      mod scooters parked in rows, mirror-covered Vespa under streetlight,
      parka-wearing youth, basement club entrance, Northern Soul dance
      floor energy
    style_note: >-
      Neon and mirrors. Every surface reflects. The scooters should
      look like chrome insects gathered under the light.

  grensholt:
    positive_suffix: >-
      motorcycle repair shop interior, fluorescent strip lighting, oil-stained
      concrete floor, British motorcycle in pieces on a workbench, leather
      jacket on a hook, tools on pegboard, grease and metal
    style_note: >-
      Working-class authenticity. Nothing is clean. Everything is functional.
      The beauty is in the machines being rebuilt.

  bromsviken:
    positive_suffix: >-
      1950s American car at drive-in, chrome bumper reflecting neon sign,
      pompadour silhouette, parking lot at night, doo-wop jukebox glow,
      V8 engine idle vibration, Swedish summer twilight that never quite
      gets dark
    style_note: >-
      Time-displaced Americana. The cars are from 1957 but everything
      else is 1979. The mismatch is the point.

  harifasi:
    positive_suffix: >-
      Kenyan matatu minibus, wildly painted exterior, massive speaker
      stacks visible through windows, crowded transit terminus, tout
      hanging from doorway, graffiti art vehicle, bass vibration visible
      in puddles
    style_note: >-
      Maximum color and energy. The matatu buses are the loudest visual
      element in any scene. The sound systems should be visible — speakers
      stacked floor to ceiling.

  damreocha:
    positive_suffix: >-
      impossibly narrow alley, tuk-tuk squeezing through gap, overhead
      wires and laundry, single bare bulb lighting, rain dripping from
      eaves, hand-painted signs, motorcycle parked vertically
    style_note: >-
      The tightest spaces in the city. The camera should feel like it
      barely fits in the alley. Claustrophobia as aesthetic.

faction_portraits:
  bosozoku: >-
    Japanese youth in tokko-fuku jumpsuit with embroidered kanji on back,
    hachimaki headband, motorcycle with oversized fairing and tall bamboo
    exhaust pipes, aggressive wide stance
  mods: >-
    Sharp-dressed young person in military parka over tailored suit, Vespa
    scooter with dozens of chrome mirrors and fog lights, target roundel
    patches, amphetamine-bright eyes
  one_percenters: >-
    Weathered biker in leather vest with club patches, Harley-Davidson chopper
    with extended forks, greying beard, road-worn hands on ape-hanger bars
  cafe_racers: >-
    Lean rider in plain leather jacket, stripped motorcycle with clip-on bars
    and rear-set pegs, no decoration, bubble visor helmet, crouched racing posture
  rockers: >-
    Stocky figure in battered black leather jacket covered in pins and patches,
    British motorcycle with chrome and dents, greased-back hair, boots with steel caps
  lowriders: >-
    Chicano cruiser leaning against candy-painted '64 Impala, white t-shirt and
    khakis, tattoo sleeves, hydraulic switch in hand, mural of La Virgen on the hood
  matatu: >-
    Animated tout hanging from matatu doorway, wildly painted minibus with
    speaker stacks, fare money fanned in one hand, whistle in the other
  tuk_tuk: >-
    Calm driver in a modified three-wheeler, small shrine on dashboard, narrow
    alley behind, knowing half-smile, hands resting lightly on handlebars
  raggare: >-
    Swedish greaser leaning on '57 Chevy hood, pompadour, rolled-up sleeves,
    beer bottle, drive-in neon behind, summer twilight sky
  dekotora: >-
    Formal Japanese trucker standing before illuminated decorated truck, chrome
    and neon and hand-painted Buddhist murals, CB radio in hand, thermos of tea
