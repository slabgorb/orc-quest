# The Circuit — Legends
# SPOILER-PROTECTED: These are the deep history secrets of the world.
# The player discovers these through play, not through reading this file.

origin_myth:
  name: The Convergence
  description: >-
    Nobody agrees on why every road culture on earth ended up in the same
    city. The official history says it was economics — a port city with
    cheap fuel, loose regulation, and a highway system built by foreign
    engineers who each brought their own design philosophy. The expressway
    loops feel Japanese. The boulevard feels Californian. The mountain
    pass feels Alpine. The market district feels Southeast Asian. It's
    as if the city's roads were designed by committee — and each member
    of the committee built a road from home.

  the_truth: >-
    The roads were not built by separate committees. They were built by
    a single international engineering firm — Meridian Asphalt — that was
    contracted by the city government in 1955 to design the entire road
    network. Meridian's chief engineer, a Swiss national named Elsa
    Brückner, had a theory: that road design shapes the culture that
    drives on it. Build a touge and touge racers will come. Build a
    boulevard and cruisers will come. Build an expressway loop and
    formation riders will come. The city's roads are not a coincidence —
    they are an experiment. Brückner designed each district's road network
    to attract a specific vehicle culture. The experiment worked beyond
    anyone's expectations. Or perhaps exactly as expected.

  artifacts:
    - name: The Meridian Blueprints
      description: >-
        Original road plans filed at City Hall. If anyone bothered to
        compare them across districts, they would notice that the design
        annotations are in ten different languages — but the handwriting
        is the same.
    - name: The Brückner Journal
      description: >-
        A leather-bound notebook, rumored to be in the possession of the
        Dekotora convoy master Kongou-maru. Contains Brückner's original
        theory and her notes on which cultures she expected each road
        section to attract. The last entry, dated 1979, reads: "They are
        all here now. The circuit is complete. What happens next is not
        mine to control."
    - name: The Eleventh Road
      description: >-
        The blueprints show ten districts with ten road designs. But there
        is an eleventh — a road that connects all ten, running underground
        through the city's drainage infrastructure. It appears on no public
        map. Its entrances are disguised as maintenance tunnels. Brückner
        called it "der Faden" — the Thread. It is the reason the Full
        Circuit run is possible without ever being caught: the Thread has
        exits into every faction's territory.

legends:
  - id: the_first_run
    name: The First Run
    era: founding
    description: >-
      The first driver to complete the Full Circuit — every faction's
      territory in a single run without stopping. Nobody knows who it
      was. Every faction claims it was one of theirs. The Mods say it
      was a scooter. The 1%ers say it was a Harley. The Café Racers
      say it was a stripped Norton. The Tuk-Tuk Syndicate says nothing,
      which the other factions find suspicious.

  - id: the_great_race
    name: Kaminari no Yoru
    era: recent
    description: >-
      The Night of Thunder. Three years ago, every faction showed up at
      Sturmichi on the same night — nobody planned it, nobody called
      it. Two hundred vehicles on the expressway loop at midnight. The
      police sealed the on-ramps and let it play out. Four hours of
      running chaos. No deaths — which is either a miracle or evidence
      that something was keeping order from inside. The factions still
      argue about who won. The police still argue about who to blame.
      Nobody argues about whether it was glorious.

  - id: the_ghost_rig
    name: The Ghost Rig
    era: ancient
    description: >-
      A vehicle seen on the Thread — the underground road that connects
      all districts. Witnesses describe it differently depending on their
      faction: the Bōsōzoku see a kaido racer with impossible fairings.
      The Lowriders see a '64 Impala that gleams despite the tunnel
      darkness. The Dekotora see a truck lit with lights that cast no
      shadow. The Café Racers say they've never seen it, but they ride
      faster when they're underground.

  - id: the_syndicate_origin
    name: The Thousand Soi
    era: founding
    description: >-
      The Tuk-Tuk Syndicate claims they were here before the roads — that
      the alleys of Nokutori existed before Meridian Asphalt laid a single
      meter of highway. They claim the market was always here, the shortcuts
      were always here, and the city was built around them, not the other
      way around. This is almost certainly mythology. But the alleys of
      Nokutori do not appear on any Meridian blueprint.

  - id: the_lowrider_covenant
    name: The Sagrado Pact
    era: recent
    description: >-
      Five years ago, a crew war between two Lowrider families nearly
      destroyed the boulevard. Don Flaco de la Cruz brokered a peace:
      cruise night is sacred. No violence on the boulevard during cruise.
      Violate the pact and every Lowrider crew unites against you —
      temporarily. The pact has held. Nobody wants to test what
      "temporarily" means.

  - id: the_convoy_masters_secret
    name: The Light That Guides
    era: ancient
    description: >-
      The Dekotora convoys follow a route through the port that makes no
      logistical sense — longer than necessary, with detours through
      specific container corridors. The convoy masters say it's tradition.
      Their neon light configurations change on specific nights according
      to a pattern that, if mapped from above, traces the kanji for
      "thread." They may not know why they do this. Or they may know
      exactly why.

  - id: the_mod_intelligence_network
    name: The Mirror Signal
    era: recent
    description: >-
      Mod scooters carry an absurd number of mirrors — this is historical
      fact. In The Circuit, the mirrors serve a second purpose: angled
      correctly, they can flash signals across line-of-sight distances
      using streetlight reflection. The Mods have built an optical
      semaphore network across the nightlife district. They know who is
      moving where before anyone else does. They sell this information.
      To everyone.

  - id: the_matatu_frequency
    name: The Bass Signal
    era: recent
    description: >-
      Matatu sound systems are legendarily powerful. What other factions
      hear as music, the Matatu crews hear as communication — specific
      bass frequencies at specific volumes encode messages. Route changes,
      warnings, crew calls. The city thinks they're just playing loud
      music. The Matatu are running an encrypted broadcast network that
      requires 2000 watts of subwoofer to decode.

  - id: the_raggare_anomaly
    name: The Cars That Shouldn't Exist
    era: ancient
    description: >-
      The Raggare drive 1950s American cars. This is normal — Sweden has
      more vintage American cars per capita than anywhere outside the US.
      What is not normal is that some of the cars in The Circuit have VIN
      numbers that don't correspond to any manufactured vehicle. Factory
      records show these serial numbers were allocated but the cars were
      never built. The Raggare don't know this. They bought the cars at
      auction and they run fine. Better than fine. They run like they were
      built for roads that don't exist yet.
