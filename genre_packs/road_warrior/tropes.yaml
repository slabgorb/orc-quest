- id: fuel_war
  name: Fuel War
  description: >-
    Two factions are fighting over a fuel source — a refinery, a cache,
    a tanker convoy. Fuel is life, and whoever controls it controls the
    road. The player is caught between or recruited by one side.
  category: conflict
  triggers:
    - discovering a fuel source
    - being hired to raid or protect a fuel convoy
    - encountering factions at a contested fuel stop
  narrative_hints:
    - fuel prices spiking at known stops
    - armed convoys moving with unusual urgency
    - burned-out rigs along a known fuel route
  tension_level: 0.6
  resolution_hints:
    - pick a side and fight for the fuel
    - destroy the source so nobody gets it
    - broker a deal and take a cut
    - steal what you need and run before either side notices
  tags: [fuel, war, faction, territory]
  escalation:
    - at: 0.2
      event: >-
        A fuel stop you've used before is under new management. Armed
        guards. New prices. The old operator is gone and nobody will
        say where.
      npcs_involved: [The Fuel Broker]
      stakes: Someone is consolidating fuel access.
    - at: 0.4
      event: >-
        A convoy you're traveling with is ambushed. The raiders aren't
        after cargo — they're after the fuel in the rigs' tanks. They
        have siphon rigs and they know exactly how much you're carrying.
      npcs_involved: [The Road Boss, The War Boy]
      stakes: Fuel theft is organized, not opportunistic.
    - at: 0.6
      event: >-
        The source is located — a working refinery, an underground
        cache, a pre-collapse fuel depot. Both factions know about it.
        Neither will share.
      npcs_involved: [The Fuel Broker, The Road Boss]
      stakes: Control of the source means control of the region.
    - at: 0.8
      event: >-
        Full war on the road. Both factions commit everything — war
        rigs, war riders, every weapon they have. The route to the
        source is a running battle.
      npcs_involved: [The War Boy, The Road Boss, The Fuel Broker]
      stakes: Winner takes all. Loser walks.
    - at: 1.0
      event: >-
        The source itself is the battlefield. Rigs circle it, crash
        into it, fight over it. One spark and the whole thing goes up.
        Whatever happens here defines the road for a generation.
      npcs_involved: [The Fuel Broker, The Road Boss]
      stakes: The fuel supply — and the balance of power — is decided here.
  passive_progression:
    interval_turns: 8
    increment: 0.1

- id: the_long_run
  name: The Long Run
  description: >-
    A journey across hostile territory with a deadline, a cargo, and
    trouble at every turn. The classic convoy run — get from A to B
    before time/fuel/luck runs out.
  category: journey
  triggers:
    - accepting a delivery job across dangerous territory
    - fleeing a location with nowhere nearby to go
    - escorting someone or something valuable
  narrative_hints:
    - road reports warning about the route ahead
    - other drivers refusing to make the run
    - the cargo is suspiciously well-guarded or suspiciously unguarded
  tension_level: 0.5
  resolution_hints:
    - deliver the cargo and collect the reward
    - open the cargo and deal with what's inside
    - sell the cargo to the highest bidder en route
    - abandon the cargo when the cost gets too high
  tags: [journey, cargo, deadline, survival]
  escalation:
    - at: 0.2
      event: >-
        The first leg is quiet. Too quiet. The road reports were wrong,
        or everyone else knows something you don't. Fuel consumption
        is on track. The cargo is secure. Something feels off.
      npcs_involved: [The Road Boss]
      stakes: The easy part is over.
    - at: 0.4
      event: >-
        First contact. Raiders, a checkpoint, a road hazard. Something
        takes a piece of the rig or the crew. The cargo is still secure
        but the margin just got thinner.
      npcs_involved: [The War Boy, The Lone Driver]
      stakes: Resources are finite and the run just got harder.
    - at: 0.6
      event: >-
        A choice: the safe route is blocked. The fast route is
        dangerous. The fuel gauge says you can't afford to wait.
        Someone in the crew wants to open the cargo.
      npcs_involved: [The Road Boss, The Grease Witch]
      stakes: The run is failing and hard choices are needed.
    - at: 0.8
      event: >-
        The rig is damaged. The crew is thin. The cargo is compromised
        or someone else wants it. The destination is visible but the
        road between here and there is the worst stretch yet.
      npcs_involved: [The Grease Witch, The War Boy]
      stakes: Finish the run or abandon it — halfway isn't an option.
    - at: 1.0
      event: >-
        The final stretch. Everything that can go wrong has. The rig
        is limping. The crew is silent. The cargo is all that matters.
        One more push.
      npcs_involved: [The Road Boss]
      stakes: The destination — and what happens when you arrive.
  passive_progression:
    interval_turns: 6
    increment: 0.15

- id: rig_legend
  name: Rig Legend
  description: >-
    A legendary rig exists — a pre-collapse supercar, a mythical war
    rig, a machine that shouldn't exist. Everyone wants it. Finding it
    is a quest. Keeping it is a war.
  category: treasure
  triggers:
    - hearing stories about a legendary vehicle
    - finding a map or clue to a lost rig cache
    - encountering a driver in an impossibly good machine
  narrative_hints:
    - mechanics whispering about a rig they saw once
    - bounty hunters asking about a specific vehicle
    - road graffiti marking a trail to something
  tension_level: 0.4
  resolution_hints:
    - find the rig and claim it
    - find the rig and sell the location
    - find the rig and destroy it so nobody gets it
    - find the rig and discover why it was hidden
  tags: [treasure, rig, legend, quest]
  escalation:
    - at: 0.3
      event: >-
        A Grease Witch tells you the legend — a rig built before the
        world broke. Faster than anything on the road. Last seen
        heading into territory nobody comes back from.
      npcs_involved: [The Grease Witch]
      stakes: A legend might be real.
    - at: 0.6
      event: >-
        You find evidence — a tire track in dust that hasn't been
        touched in years, an engine part that shouldn't exist, a
        mechanic's journal with specifications that read like poetry.
        You're not the only one looking.
      npcs_involved: [The Scavenger King, The Lone Driver]
      stakes: The competition is real and closing in.
    - at: 1.0
      event: >-
        The rig. It's real. It's here. And getting it out is going to
        be the hardest thing you've ever done — because everyone else
        is here too.
      npcs_involved: [The Scavenger King, The War Boy, The Lone Driver]
      stakes: The rig of legend — and everyone who wants it.
  passive_progression:
    interval_turns: 10
    increment: 0.1

- id: road_preacher_rising
  name: Road Preacher Rising
  description: >-
    A charismatic leader is building a following on the road. Might be
    a savior, might be a tyrant, might be both. Their convoy is growing
    and their message is spreading. The road is choosing sides.
  category: faction
  triggers:
    - encountering a growing convoy with religious or ideological zeal
    - hearing broadcasts from a charismatic voice on the radio
    - meeting converts who've given up their rigs to join a commune
  narrative_hints:
    - graffiti and road markers with the preacher's symbols
    - small convoys merging into larger ones heading the same direction
    - fuel stops refusing service to non-believers
  tension_level: 0.5
  resolution_hints:
    - join the movement and rise within it
    - oppose the preacher and rally resistance
    - expose the preacher as a fraud
    - discover the preacher is genuine and deal with that
  tags: [faction, charisma, cult, politics]
  escalation:
    - at: 0.2
      event: >-
        You hear the broadcast. A voice on the radio — calm, certain,
        promising a destination. A place where the road ends and
        something better begins. Other drivers are listening.
      npcs_involved: [The Road Preacher]
      stakes: A new power is forming on the road.
    - at: 0.5
      event: >-
        The Preacher's convoy is fifty rigs strong and growing. They
        control a fuel source. They're offering shelter to anyone who
        joins. The price is loyalty — and your rig's fuel tank.
      npcs_involved: [The Road Preacher, The Fuel Broker]
      stakes: A road faction is becoming a road nation.
    - at: 0.8
      event: >-
        The Preacher demands the road. Convoys that don't join are
        taxed. Drivers who refuse are marked. The faithful are armed
        and zealous. The road is no longer free.
      npcs_involved: [The Road Preacher, The War Boy, The Road Boss]
      stakes: Freedom of the road versus security of the flock.
    - at: 1.0
      event: >-
        The promised destination. The Preacher leads the faithful
        there — and what they find either validates everything or
        shatters it. You're there when the truth is revealed.
      npcs_involved: [The Road Preacher]
      stakes: Was it ever real? Does it matter?
  passive_progression:
    interval_turns: 8
    increment: 0.1
