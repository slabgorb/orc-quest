obstacles:
  - name: Oil slick
    description: Spilled fuel across the road — wheels lose grip
    stat_check: Grip
    failure_penalty: Speed -2 for 1 beat
    tags: [road, hazard]

  - name: Wreckage field
    description: Twisted metal from a previous chase litters the road
    stat_check: Road Sense
    failure_penalty: Rig HP -10, Speed -1
    tags: [road, debris]

  - name: Burning blockade
    description: Flaming vehicles stacked across the lane
    stat_check: Nerve
    failure_penalty: Rig HP -15 if forced through
    tags: [fire, blockade]

  - name: Narrow canyon pass
    description: Rock walls close in — only one rig fits through
    stat_check: Grip
    failure_penalty: Armor panels scraped off, Rig HP -5
    tags: [terrain, canyon]

  - name: Sand drift
    description: Wind-blown dune creeping across the blacktop
    stat_check: Road Sense
    failure_penalty: Speed halved for 1 beat
    tags: [terrain, sand]

  - name: Blown bridge
    description: Gap in the road where a bridge used to be — jump or detour
    stat_check: Nerve
    failure_penalty: Crash event if failed
    tags: [terrain, gap]

  - name: Dust devil
    description: Spinning column of grit and debris crossing the chase path
    stat_check: Grip
    failure_penalty: Visibility lost, separation unchanged for 1 beat
    tags: [weather, hazard]

  - name: War party ambush
    description: Hostile rigs converge from a side canyon
    stat_check: Road Sense
    failure_penalty: New pursuers join the chase
    tags: [combat, ambush]

  - name: Fuel cache temptation
    description: Visible fuel drums on the roadside — stop or keep running
    stat_check: ""
    failure_penalty: ""
    tags: [resource, decision]

  - name: Tire shredder strip
    description: Spiked chain dragged across the road by hostiles
    stat_check: Grip
    failure_penalty: Tire blown, Speed -3 until repaired
    tags: [trap, hostile]

event_flavor:
  - event: gap_widens
    descriptions:
      - The road opens up and the engine screams with freedom
      - Dust settles between you and your pursuers — they're eating your wake
      - The mirror shows nothing but heat shimmer and distance
      - Throttle pinned, the rig surges ahead — gap growing with every heartbeat

  - event: gap_closes
    descriptions:
      - Engines howl behind you, closing fast — too fast
      - The mirror fills with chrome and fury
      - They're drafting you, riding your slipstream, and the gap is dying
      - Headlights in the rearview, growing brighter with every second

  - event: obstacle_hit
    descriptions:
      - Metal screams as the rig clips the wreckage — something tears loose
      - The impact jolts through the steering column and into your bones
      - A spray of sparks erupts from the undercarriage
      - The rig bucks sideways, tires scrabbling for grip on debris

  - event: shortcut_found
    descriptions:
      - A gap in the canyon wall — barely wide enough, but it cuts the distance
      - Tire tracks through the scrub — someone's run this shortcut before
      - The dry riverbed cuts straight where the road curves — risky but fast
      - An old service road, half-buried in sand — your pursuers won't see it

  - event: near_catch
    descriptions:
      - Close enough to see their driver's eyes in the mirror
      - A hand reaches from the pursuing rig — boarding distance
      - Bumpers kiss with a metallic shriek — they're right on you
      - The war boy on the lead rig is already climbing onto the hood

  - event: terrain_shift
    descriptions:
      - The road narrows as canyon walls close in — maneuver over speed now
      - Open desert gives way to a junkyard maze of rusted hulks
      - The blacktop ends and red dirt begins — everything changes
      - Rain-slicked road ahead — the rules just changed

decision_framings:
  - "The road forks — one path is fast but exposed, the other is tight but covered"
  - "Your mechanic shouts over the engine — fix the leak now or push through and pray"
  - "The war rig ahead is slowing — ram through or go around?"
  - "Fuel gauge is dropping — burn hard to escape or conserve and outlast?"
  - "Boarders on the roof — deal with them or trust your crew and keep driving?"

chase_modes:
  - vehicular
  - mounted
  - foot
