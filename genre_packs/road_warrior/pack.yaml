name: Road Warrior
version: "1.0.0"
description: >-
  Road culture as destiny. Your rig is your identity — named, scarred, and
  irreplaceable. Chases are the primary drama, crews are family, and the
  road is the only world that matters. Whether you're outrunning warlords
  across a dead wasteland or bootlegging moonshine down backroads, the
  genre truth is the same: you are what you drive.
min_sidequest_version: "0.1.0"
refine_hooks: false

# --- Creative DNA (reference for all subsequent steps) ---

inspirations:
  - name: "Mad Max: Fury Road"
    element: "Operatic vehicular combat, war rigs, tribal road hierarchies, redemption through velocity"
  - name: "Mad Max 2: The Road Warrior"
    element: "Lone wanderer archetype, fuel-as-currency, convoy sieges, the rig as soul"
  - name: "Interstate '76"
    element: "Vehicular RPG mechanics, car customization as progression, funk-infused road adventure"
  - name: "Road Rash / Skitchin'"
    element: "Gleeful destruction derby energy, melee-while-driving, the race IS the fight"
  - name: "Twisted Metal"
    element: "Arena combat absurdity, vehicle-as-personality, weapons bolted onto everything"
  - name: "Cyberpunk 2077 (Nomad path)"
    element: "Nomad clan culture, chrome body mods, crew loyalty on the fringe"
  - name: "Smokey and the Bandit"
    element: "Outlaw road charm, cat-and-mouse chases, charisma behind the wheel"
  - name: "Death Race 2000"
    element: "Dystopian blood sport, televised carnage, dark satire of spectacle"
  - name: "Initial D / Redline"
    element: "Racing as identity, the driver-machine bond, absurdist speed worship"

era_range: "Any — world-defined"

core_vibe: >-
  You grip the wheel. The engine answers. Whatever's behind you doesn't
  matter — what matters is the road ahead, the crew beside you, and whether
  your rig holds together for one more run. The Car-acter Sheet is your soul.

emotional_tone:
  - defiance
  - velocity
  - reckless freedom
  - crew loyalty
  - the thrill of the run

differentiation: >-
  Not post-apocalyptic by default — that's a world choice, not a genre
  constraint. The genre is road culture: vehicles as identity, chases as
  the primary dramatic engine, crews as social structure. Your rig lives
  on your character sheet — it has a name, scars, and a history. Losing it
  is a crisis, not a shopping trip. Foot combat exists but it's diminished —
  you're a driver without a car, a samurai without a sword. The world
  decides WHY you're on the road. The genre decides what happens WHEN
  you're on it.
