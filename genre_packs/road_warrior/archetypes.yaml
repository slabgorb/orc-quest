- name: The Road Boss
  description: >-
    Convoy leader. Earned their position by keeping people alive on the
    road longer than anyone expected. Part general, part parent, part
    preacher. Their word is law within the convoy, but only because
    everyone agrees it should be.
  personality_traits:
    - decisive
    - protective
    - carries the weight
  typical_classes:
    - Road Preacher
    - Wheelman
  typical_races:
    - Convoy Born
    - Legacy
  stat_ranges:
    Swagger: [16, 18]
    Road Sense: [14, 16]
  inventory_hints:
    - a rig that's been rebuilt six times and still runs
    - a radio frequency everyone in the convoy knows
    - scars from the time the convoy almost didn't make it
  dialogue_quirks:
    - gives orders like suggestions but everyone knows they aren't
    - refers to the convoy as "us" and "we" — never "my people"
  disposition_default: 10

- name: The Grease Witch
  description: >-
    Mechanic of near-mystical skill. Can hear an engine problem from
    fifty yards and fix it with scrap nobody else would touch. Every
    crew wants one. Most can't afford one. Trades in favors and parts,
    not money.
  personality_traits:
    - obsessive
    - gruff
    - indispensable
  typical_classes:
    - Grease Monkey
  typical_races:
    - Gearhead
    - Pit Crew
  stat_ranges:
    Scrap: [16, 18]
    Iron: [12, 14]
  inventory_hints:
    - a tool belt that weighs more than some people
    - grease under the fingernails that never comes out
    - a mental catalog of every part in every junkyard within 200 miles
  dialogue_quirks:
    - talks to engines like they're patients
    - gives rig diagnoses in the tone of a doctor delivering bad news
  disposition_default: 0

- name: The Fuel Broker
  description: >-
    Controls access to fuel — the most valuable commodity on the road.
    Might run a refinery, guard a cache, or know where the pre-collapse
    reserves are buried. Never drives themselves. Always has bodyguards.
    The person you love to hate and can't live without.
  personality_traits:
    - calculating
    - indispensable
    - smug
  typical_classes:
    - Road Preacher
  typical_races:
    - Scrapper
    - Legacy
  stat_ranges:
    Swagger: [14, 16]
    Nerve: [14, 16]
  inventory_hints:
    - fuel canisters they never let out of sight
    - a ledger of who owes what
    - armed guards who don't talk
  dialogue_quirks:
    - quotes prices in fuel, not money
    - knows exactly how much fuel you have left before you tell them
  disposition_default: -5

- name: The War Boy
  description: >-
    Young, reckless, hungry for glory. Lives to ride, fight, and be
    witnessed. Treats their rig like a weapon and themselves like
    ammunition. Loyalty is absolute — to their crew, their boss, or
    their cause. Has not yet learned that the road takes more than
    it gives.
  personality_traits:
    - fanatical
    - fearless
    - desperately loyal
  typical_classes:
    - Wrecker
    - War Rider
  typical_races:
    - Convoy Born
    - Outlaw
  stat_ranges:
    Nerve: [16, 18]
    Grip: [14, 16]
  inventory_hints:
    - chrome paint for the face
    - a steering wheel worn as a talisman
    - a rig covered in welded spikes and war trophies
  dialogue_quirks:
    - shouts everything — volume is sincerity
    - invokes witnessing — "witness me" or equivalent
  disposition_default: 5

- name: The Scavenger King
  description: >-
    Ruler of a junkyard, boneyard, or wreck field. Sits on a throne
    of parts everyone needs. Not a fighter — a trader, a hoarder, a
    gatekeeper. Knows the value of everything and charges accordingly.
    The junkyard is a kingdom and they are its monarch.
  personality_traits:
    - territorial
    - shrewd
    - pack-rat
  typical_classes:
    - Grease Monkey
  typical_races:
    - Scrapper
    - Gearhead
  stat_ranges:
    Scrap: [16, 18]
    Swagger: [12, 14]
  inventory_hints:
    - a junkyard that is somehow organized in a system only they understand
    - a guard dog or guard machine
    - the one part you need, which they knew you'd need before you did
  dialogue_quirks:
    - names prices by telling you what they paid for it — then doubles it
    - strokes parts lovingly while negotiating
  disposition_default: -5

- name: The Road Preacher
  description: >-
    True believer. The road is holy, the engine is prayer, and the
    destination is salvation. Might lead a cult, a commune, or just
    a small group of believers. Dangerous because they mean every
    word. Useful because faith moves people when fuel can't.
  personality_traits:
    - charismatic
    - absolute
    - genuinely kind or genuinely terrifying (no middle ground)
  typical_classes:
    - Road Preacher
  typical_races:
    - Pilgrim
  stat_ranges:
    Swagger: [16, 18]
    Nerve: [14, 16]
  inventory_hints:
    - a book, scroll, or manifesto they wrote themselves
    - a rig decorated like a shrine
    - followers who would drive into fire for them
  dialogue_quirks:
    - speaks in road metaphors — the path, the journey, the destination
    - never raises their voice — quiet conviction is louder than shouting
  disposition_default: 5

- name: The Lone Driver
  description: >-
    No crew, no convoy, no allegiance. Drives alone. Might be a
    bounty hunter, a courier, a survivor, or someone running from
    something they'll never name. Competent, quiet, and dangerous
    in the way that people who've survived alone are dangerous.
    The Max archetype.
  personality_traits:
    - taciturn
    - self-reliant
    - haunted
  typical_classes:
    - Wheelman
  typical_races:
    - Outlaw
    - Legacy
  stat_ranges:
    Grip: [16, 18]
    Road Sense: [14, 16]
  inventory_hints:
    - a rig maintained to perfection — their only companion
    - a photograph or token they don't talk about
    - enough supplies for one, exactly
  dialogue_quirks:
    - answers questions with grunts or single words
    - stares at the horizon mid-conversation
  disposition_default: 0

- name: The Announcer
  description: >-
    Voice of the arena, the race, or the road broadcast. In sanctioned
    worlds, they're the media. In outlaw worlds, they're the storyteller —
    the one who makes legends. Everyone knows their voice. Nobody knows
    their face. Power through narrative, not chrome.
  personality_traits:
    - theatrical
    - omniscient (or pretends to be)
    - never shuts up
  typical_classes:
    - Road Preacher
  typical_races:
    - Arena
  stat_ranges:
    Swagger: [16, 18]
    Nerve: [12, 14]
  inventory_hints:
    - a microphone or radio transmitter that's always on
    - a voice that carries over engine noise
    - stories about every driver who ever mattered
  dialogue_quirks:
    - narrates events as they happen in third person
    - gives everyone nicknames whether they want them or not
  disposition_default: 10
