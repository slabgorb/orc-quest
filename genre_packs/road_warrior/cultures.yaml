# Road Warrior cultures are road tribes and crew types.
# Names blend road handles, rig nicknames, and crew traditions.
# Every driver has a road name. Every rig has a name. Places are
# named for what they do (The Fuel Stop, The Pit, The Straightaway)
# or who controls them (Vex's Crossing, The Deacon's Mile).

- name: Convoy
  description: >-
    Road families. Born on the move, raised in the cab. Convoys name
    their children for the road — landmarks, weather, engine sounds.
    Family names are the convoy's name. Rigs are inherited and named
    like family members.
  slots:
    given_name:
      word_list:
        - Axle
        - Blaze
        - Cinder
        - Diesel
        - Ember
        - Flint
        - Gauge
        - Haze
        - Junction
        - Keel
        - Lug
        - Meridian
        - Nox
        - Piston
        - Ratchet
        - Sable
        - Torque
        - Vex
        - Wire
        - Zenith
    family_name:
      word_list:
        - Roadborn
        - Ironside
        - Dustwalker
        - Burnout
        - Longhaul
        - Redline
        - Blacktop
        - Gravel
        - Axlebreak
        - Turnpike
    title:
      word_list: [Boss, Lead, Elder, First, Road Captain, Convoy Chief]
    place_noun:
      word_list: [crossing, mile, stretch, fork, depot, yard, run, pass, straightaway, junction]
    adjective:
      word_list: [rust, iron, black, red, burnt, broken, long, dead, dust, chrome]
  person_patterns:
    - "{given_name} {family_name}"
    - "{title} {given_name}"
    - "{given_name}"
  place_patterns:
    - "{given_name}'s {place_noun}"
    - "The {adjective} {place_noun}"
    - "{family_name} {place_noun}"

- name: Pit Crew
  description: >-
    Mechanics, engineers, and builders. Pit Crew names are earned —
    nicknames based on what you're good at or what you survived.
    Formal names exist but nobody uses them.
  slots:
    given_name:
      word_list:
        - Wrench
        - Spark
        - Gasket
        - Cam
        - Bore
        - Rivet
        - Clutch
        - Crank
        - Socket
        - Flux
        - Solder
        - Lathe
        - Shim
        - Tap
        - Bearing
    family_name:
      word_list:
        - Fingers
        - Hands
        - Two-Stroke
        - Boltcutter
        - Greasefire
        - Flathead
        - Torchlight
        - Overhaul
        - Misfire
        - Backfire
    title:
      word_list: [Chief, Master, Senior, Head, Lead]
    place_noun:
      word_list: [shop, garage, bay, pit, shed, yard, bench, forge]
    adjective:
      word_list: [oily, hot, sparking, welded, stripped, rebuilt, salvaged]
  person_patterns:
    - "{given_name}"
    - "{given_name} {family_name}"
    - "{title} {given_name}"
  place_patterns:
    - "{given_name}'s {place_noun}"
    - "The {adjective} {place_noun}"

- name: Outlaw
  description: >-
    Runners, smugglers, and road bandits. Outlaws use handles — short,
    sharp, memorable. Your handle IS your identity. Real names are
    secrets or forgotten. Rig names are threats or jokes.
  slots:
    given_name:
      word_list:
        - Razor
        - Slash
        - Ghost
        - Smoke
        - Viper
        - Jackal
        - Fang
        - Hex
        - Shade
        - Ruin
        - Havoc
        - Spite
        - Grim
        - Scar
        - Blight
    family_name:
      word_list:
        - Runner
        - Rider
        - Burner
        - Drifter
        - Breaker
        - Chaser
        - Stalker
        - Reaper
        - Howler
        - Rattler
    title:
      word_list: [The, Old, Mad, Dead, Last, One-Eyed, No-Name]
    place_noun:
      word_list: [den, hideout, cache, strip, turf, hole, roost, blind]
    adjective:
      word_list: [bloody, burned, hollow, wrecked, stolen, cursed, nameless, forgotten]
  person_patterns:
    - "{given_name}"
    - "{title} {given_name}"
    - "{given_name} the {family_name}"
  place_patterns:
    - "The {adjective} {place_noun}"
    - "{given_name}'s {place_noun}"

- name: Arena
