    Sanctioned racers, blood sport gladiators, and sponsored drivers.
    Arena names are stage names — dramatic, memorable, built for a
    crowd. Sponsors may rename you. Your rig's name is your brand.
  slots:
    given_name:
      word_list:
        - Apex
        - Blitz
        - Crash
        - Domino
        - Eclipse
        - Fury
        - Grinder
        - Hammer
        - Inferno
        - Killswitch
        - Lightning
        - Mayhem
        - Nitro
        - Overdrive
        - Pileup
    family_name:
      word_list:
        - Supreme
        - Unchained
        - Undefeated
        - Immortal
        - Legendary
        - Invincible
        - Infamous
        - Unstoppable
        - Merciless
        - Relentless
    title:
      word_list: [Champion, Challenger, Contender, Reigning, Defending, The Mighty, The Infamous]
    place_noun:
      word_list: [arena, circuit, ring, track, bowl, dome, gauntlet, thunderdome]
    adjective:
      word_list: [grand, bloody, iron, death, thunder, savage, neon, screaming]
  person_patterns:
    - "{given_name} the {family_name}"
    - "{title} {given_name}"
    - "{given_name}"
  place_patterns:
    - "The {adjective} {place_noun}"
    - "{given_name}'s {place_noun}"

- name: Pilgrim
  description: >-
    Road mystics, preachers, and wanderers who follow the road as
    a calling. Pilgrims take road names that sound like prophecy —
    destinations they're seeking or visions they've had. They name
    places like shrines.
  slots:
    given_name:
      word_list:
        - Horizon
        - Wayward
        - Pilgrim
        - Sermon
        - Vigil
        - Dusk
        - Dawn
        - Solstice
        - Vesper
        - Requiem
        - Parish
        - Covenant
        - Psalm
        - Canon
        - Litany
    family_name:
      word_list:
        - Seeker
        - Walker
        - Witness
        - Keeper
        - Wanderer
        - Believer
        - Listener
        - Watcher
        - Dreamer
        - Wayfinder
    title:
      word_list: [Deacon, Sister, Brother, Father, Mother, The Reverend, Saint]
    place_noun:
      word_list: [shrine, chapel, waystation, altar, marker, cairn, monument, mile]
    adjective:
      word_list: [sacred, hallowed, silent, eternal, blessed, promised, forsaken, last]
  person_patterns:
    - "{title} {given_name}"
    - "{given_name} the {family_name}"
    - "{given_name}"
  place_patterns:
    - "The {adjective} {place_noun}"
    - "{title} {given_name}'s {place_noun}"
