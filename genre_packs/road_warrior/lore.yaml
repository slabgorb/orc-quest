world_name: Road Warrior
setting_anchor: "A world defined by what you drive, who you drive with, and what you're driving away from."
history: >-
  The road is the only world that matters. Civilization exists in the gaps
  between asphalt — fuel stops, junkyards, convoy camps. How it got this way
  depends on the world. The genre only cares about what happens now: you grip
  the wheel, the engine answers, and whatever's behind you doesn't matter.
factions: []
cosmology: >-
  There are no gods on the road. There are engines, fuel, and the horizon.
  Some drivers find religion in speed. Some find it in the convoy. The Road
  Preachers find it in both.
geography: >-
  World-defined. The genre supports any terrain — desert, coastline, mountain,
  urban, frozen. The road adapts. The rules don't change.
