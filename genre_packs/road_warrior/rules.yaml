tone: defiant-kinetic
lethality: gritty
magic_level: none

stat_generation: point_buy
point_buy_budget: 27

ability_score_names:
  - Grip
  - Iron
  - Nerve
  - Scrap
  - Road Sense
  - Swagger

allowed_classes:
  - Wheelman
  - Wrecker
  - Grease Monkey
  - War Rider
  - Chrome Saint
  - Road Preacher

allowed_races:
  - Convoy Born
  - Gearhead
  - Outlaw
  - Pit Crew
  - Scrapper
  - Legacy

hp_formula: "class_base + (iron_mod * level)"

stat_display_fields:
  - hp
  - max_hp
  - rig_hp
  - rig_max_hp
  - fuel
  - injuries

class_hp_bases:
  Wheelman: 8
  Wrecker: 12
  Grease Monkey: 6
  War Rider: 8
  Chrome Saint: 10
  Road Preacher: 6

default_class: Wheelman
default_race: Scrapper
default_hp: 8
default_ac: 10
default_location: "Behind the wheel of a beat-up rig on a long straight road"
default_time_of_day: dawn

custom_rules:
  lethality: gritty
  rest_variant: gritty_realism
  encumbrance: variant

  # --- DAMAGE MODEL: RIG IS YOUR ARMOR ---

  damage_model: >-
    The rig is the character's protection. While mounted, all incoming
    damage hits Rig HP first — the driver is shielded by steel, speed,
    and momentum. The rig degrades visibly as Rig HP drops: panels fly
    off, engine smokes, systems fail. The narrator MUST reflect rig
    damage in the scene — this is not a hidden number, it is the most
    visible thing happening.

    When Rig HP hits zero: CRASH EVENT. The rig is wrecked. The driver
    takes an injury roll from the crash itself, and is now dismounted —
    exposed, slow, vulnerable. Whatever caused the crash is still there.

    Dismounted characters have no HP buffer. Every hit lands directly.
    Injury system applies — humans don't have hit point pools, they get
    hurt and it's bad.

  rig_damage_tiers: >-
    100% — Tight. Everything works. Engine purrs.
    75%  — Cosmetic damage. Rattles, dents, a cracked mirror. Functional.
    50%  — Systems failing. Door hanging off, windshield gone, exhaust
           dragging sparks. Speed penalty begins.
    25%  — Skeleton mode. Barely holding together. Major speed penalty,
           mount slots may be destroyed, fire risk on any hit.
    0%   — Wreck. Crash event. Driver takes injury roll. Rig is dead
           until repaired (if salvageable) or replaced (story arc).

  injury_system: >-
    Humans don't have hit point pools. When a character takes direct
    damage (dismounted, crash event, boarding combat, or rig pierced),
    they take an INJURY — a specific, narratable wound with mechanical
    consequences. A slashed arm means Grip penalty. A concussion means
    Road Sense penalty. Injuries linger — they heal slowly, require
    medical attention, and the narrator references them until healed.
    Enough injuries and you're out — unconscious, dying, or dead
    depending on the lethality axis.

  # --- RIG AS IDENTITY ---

  rig_rules: >-
    Every character has a Rig Block on their Car-acter Sheet. The rig is
    not equipment — it is your armor, your weapon, and your home. Rig
    stats: Rig Name (player-chosen), Rig Type (world-defined), Rig HP,
    Speed, Armor, Fuel, Mount Slots (weapon/tool hardpoints that scale
    with level), and Scars (narrative history of damage and repairs).

    Losing your rig is the worst thing that can happen short of death.
    You lose your HP buffer, your speed, your mounts, your identity.
    You're meat on the road.

  fuel_system: >-
    Fuel is tracked as a resource. Every significant journey, chase, or
    pursuit costs fuel. When fuel hits zero the rig is dead weight —
    still provides cover (Rig HP remains) but no speed, no escape.
    Scavenging, trading, and raiding are the ways to refuel. The world
    determines how scarce fuel is — the genre just says it always matters.

  chase_system: >-
    Chases are structured as beat sequences, not single rolls. Each chase
    has an Opening (engage or evade?), Pursuit (distance, terrain, hazards),
    Escalation (boarding, weapons, rig damage), Crisis (something breaks,
    someone falls, a choice), and Resolution (wreckage, escape, or victory).
    Each beat is a decision point. If there is no decision, skip the beat.
    Rig HP degrades through the chase — the narrator reflects this as
    progressive visible damage. Allies can fall. The fortress crumbles.

  dismounted_rules: >-
    A driver without a rig is in survival mode. No Rig HP buffer — all
    damage is direct injury. All Grip checks are at disadvantage. Swagger
    checks to maintain reputation take a penalty. Movement is slow in a
    world built for wheels. The world treats you differently — you're a
    driver who lost their ride. Getting a new rig or recovering your old
    one is a story arc, not a shopping trip. The narrator should make
    dismounted sequences feel desperate and wrong — this is not where
    you belong.

encounter_base_tension:
  random: 0.10
  road_encounter: 0.20
  ambush: 0.35
  chase: 0.40
  boss: 0.45
  final: 0.50
