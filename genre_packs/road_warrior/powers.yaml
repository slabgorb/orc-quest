# Road Warrior has no magic system. Power comes from three sources:
# the rig, the crew, and the driver's nerve.
#
# This file defines the "supernatural equivalent" — abilities that
# feel almost magical but are grounded in skill, technology, and guts.

magic_level: none

power_sources:
  - name: Rig Mastery
    description: >-
      The bond between driver and machine. At high levels of Grip, a
      Wheelman can do things with a rig that shouldn't be physically
      possible — threading a gap that's two inches too narrow, drifting
      a turn at speeds that should roll the vehicle, feeling the road
      through the chassis like a sixth sense. It's not magic. It's
      ten thousand hours behind the wheel.
    associated_stat: Grip
    associated_classes:
      - Wheelman
      - War Rider

  - name: Scrap Genius
    description: >-
      The Grease Monkey's ability to fix anything with nothing. Given
      enough junk, they can rebuild an engine in the field, armor a
      rig with road signs, or jury-rig a weapon from plumbing parts.
      It's not magic. It's knowing machines so deeply that rules become
      suggestions.
    associated_stat: Scrap
    associated_classes:
      - Grease Monkey

  - name: Chrome Communion
    description: >-
      The Chrome Saint's interface between flesh and machine. Body
      modifications that let them feel the rig's pain, route the
      engine's heat through their own nervous system, or push a
      dying rig past its limits by bleeding for it. The boundary
      between driver and machine blurs. It's not magic. It's
      commitment that costs something.
    associated_stat: Chrome
    associated_classes:
      - Chrome Saint

  - name: Road Faith
    description: >-
      The Road Preacher's ability to move people. Not supernaturally —
      through conviction so absolute that others follow. A Road
      Preacher can rally a scattered crew, talk down a war party, or
      inspire a dying driver to make one more run. It's not magic.
      It's belief that becomes contagious.
    associated_stat: Swagger
    associated_classes:
      - Road Preacher

  - name: Wrecker's Fury
    description: >-
      The Wrecker's capacity for controlled destruction. At full
      momentum, a Wrecker can T-bone a rig twice their size and walk
      away. They read impact angles instinctively, know exactly where
      to hit a vehicle to cripple it, and their own rig is reinforced
      in ways that shouldn't work but do. It's not magic. It's
      violence as a craft.
    associated_stat: Iron
    associated_classes:
      - Wrecker
