# Visual style configuration for pulp noir genre pack
#
# Controls how Flux image generation renders scenes for this genre.
# Pulp noir visual identity: ink wash illustration with heavy shadows
# and stark dramatic lighting. Limited palette — deep blacks, warm
# ambers, cold blues, and the occasional blood red. Inspired by
# classic noir cinematography: venetian blind shadows, rain on
# windows, a single desk lamp carving light from darkness. Figures
# emerge from shadow with hard edges. Backgrounds recede into
# suggestive darkness. Every frame tells a story about power, danger,
# and moral compromise.

# ── Core Style ────────────────────────────────────────────────

positive_suffix: >-
  noir ink wash illustration, heavy dramatic shadows with hard edges,
  limited palette of deep black warm amber and cold blue, single
  strong light source, 1930s period atmosphere, cinematic chiaroscuro
  composition, visible ink texture and brush strokes, pulp magazine
  cover quality, atmospheric rain and fog

negative_prompt: >-
  photorealistic, bright colors, anime, cartoon, 3d render, fantasy,
  medieval, neon, pixel art, smooth airbrushed, cheerful, sunny,
  high saturation, flat lighting, modern clothing, digital clean lines

preferred_model: flux

base_seed: 42

# ── Location Tag Overrides ────────────────────────────────────

visual_tag_overrides:
  bar: >-
    smoky speakeasy interior behind a bookshelf door, dim amber
    light from art deco wall sconces, polished mahogany bar with
    brass rail, jazz trio on a tiny stage in the corner, cigarette
    smoke layering the air, bartender polishing a glass
  street: >-
    rain-slicked cobblestone street at midnight, gas lamp halos
    diffused by fog, wet reflections stretching like oil, a lone
    figure under a streetlight, fire escape shadows on brick walls,
    distant sound of a saxophone
  hotel: >-
    grand hotel lobby in faded art deco glory, marble floor with
    brass inlay, crystal chandelier casting fractured light, bellhop
    at attention, potted palms, a woman in fur waiting by the
    elevator, cigarette in a long holder
  office: >-
    cluttered private detective office at night, single desk lamp
    casting harsh cone of light, venetian blind shadows striping
    the wall, overflowing ashtray, half-empty bourbon bottle,
    filing cabinet with one drawer hanging open, frosted glass door
  club: >-
    jazz club interior thick with smoke and sound, spotlight on a
    singer in a dark dress, audience silhouettes at small round
