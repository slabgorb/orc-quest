- id: origins
  title: Where'd You Come From?
  narration: |
    The bar is the kind of place that doesn't have a sign outside. You found
    it because someone told you about it, or because you've been walking long
    enough that any door would do. The light is amber. The jazz is low. The
    bartender sets a glass in front of you without asking what you want.

    They polish the same spot on the bar for a while, then look up.

    "You're not from around here. Or maybe you are and you've been away.
    Either way — where'd you come from?"
  choices:
    - label: Old Money
      description: >-
        You grew up in a house with too many rooms and a name that opened
        doors. The money came with expectations, and the expectations came
        with a leash you eventually slipped.
      mechanical_effects:
        race_hint: Old Money
        background: Heir
    - label: The Streets
      description: >-
        You learned to read people before you learned to read books. Every
        neighborhood has its own rules, and you knew them all by the time
        you were twelve.
      mechanical_effects:
        race_hint: Street
        background: Hustler
    - label: Somewhere Else
      description: >-
        You came from another country, another language, another life. You
        left because you had to, or because staying would have killed you.
        The accent never quite goes away.
      mechanical_effects:
        race_hint: Immigrant
        background: Expatriate
    - label: The Service
      description: >-
        You wore a uniform. You saw things that don't fit into polite
        conversation. You came back, but not all of you made the trip.
      mechanical_effects:
        race_hint: Military
        background: Veteran
    - label: The University
      description: >-
        You spent years in libraries and lecture halls. You know things
        most people don't, and most people don't care. But someone out
        there does, and that's the problem.
      mechanical_effects:
        race_hint: Academic
        background: Scholar
    - label: Out Past the City Limits
      description: >-
        You grew up where the pavement ends. Ranches, mining towns, places
        where the law is a suggestion and you settle your own accounts.
      mechanical_effects:
        race_hint: Frontier
        background: Roughneck
  allows_freeform: true

- id: crucible
  title: What Made You Who You Are?
  narration: |
    The bartender nods like they've heard it before. They probably have.
    They refill your glass — you didn't notice it was empty.

    "Everybody's got a thing. The thing they're good at. The thing that
    got them into trouble in the first place." They lean on the bar.

    "What's yours?"
  choices:
    - label: I Find Things Out
      description: >-
        You ask questions. You notice what's missing. You follow the thread
        until it leads somewhere nobody wanted you to go.
      mechanical_effects:
        class_hint: Detective
        personality_trait: observant
    - label: I Hit Things
      description: >-
        When talking stops working, you're the one still standing. It's not
        pretty, but it's honest work.
      mechanical_effects:
        class_hint: Brawler
        personality_trait: tenacious
    - label: I Talk My Way In
      description: >-
        Doors open when you smile. People tell you things they shouldn't.
        You've been someone else so many times you almost forget who you
        started as.
      mechanical_effects:
        class_hint: Grifter
        personality_trait: charming
    - label: I've Seen Action
      description: >-
        War, mercenary work, security jobs that went sideways. You know
        how to move, how to shoot, and when to stop asking questions.
      mechanical_effects:
        class_hint: Soldier of Fortune
        personality_trait: disciplined
    - label: I Know Things
      description: >-
        Ancient languages. Forgotten temples. The kind of history that's
        not in the textbooks. You've read things that keep you up at night.
      mechanical_effects:
        class_hint: Scholar
        personality_trait: curious
    - label: I Move Things
      description: >-
        Goods, people, information — across borders, past customs, through
        the back door. You know every smuggler's route and every crooked
        customs agent.
      mechanical_effects:
        class_hint: Smuggler
        personality_trait: resourceful
    - label: I Own the Room
      description: >-
        When you step on stage, when you open your mouth, when you walk in —
        people stop what they're doing. You've turned that into currency.
      mechanical_effects:
        class_hint: Performer
        personality_trait: magnetic
  allows_freeform: true

- id: connection
  title: Who Do You Owe?
  narration: |
    The bartender whistles low through their teeth. "That's a hell of a
    skill set." They glance toward the door like they're expecting someone.

    "Nobody walks in here alone. Not really. There's always someone —
    someone who got you started, someone who's looking for you, someone
    you can't forget."

    They set down the bottle. "Who do you owe?"
  choices:
    - label: A Mentor
      description: >-
        Someone taught you everything. They're either dead, missing, or
        in so much trouble that you're the only one who can help.
      mechanical_effects:
        relationship: lost_mentor
        personality_trait: loyal
    - label: A Debt
      description: >-
        You owe someone — money, a favor, your life. They haven't collected
        yet, but they will. And you won't like the terms.
      mechanical_effects:
        relationship: debtor
        personality_trait: anxious
    - label: A Rival
      description: >-
        There's someone out there who does what you do, only they have no
        scruples. Every job, every lead, every break — they're one step
        ahead or one step behind.
      mechanical_effects:
        relationship: rival
        personality_trait: competitive
    - label: A Ghost
      description: >-
        Someone you loved. Someone you lost. Their face shows up in crowds,
        in dreams, in the bottom of glasses like this one. You're not sure
        if you're running from them or toward them.
      mechanical_effects:
        relationship: lost_love
        personality_trait: haunted
  allows_freeform: true

- id: drive
  title: So What Are You Doing Here?
  narration: |
    The jazz changes. Something slower, something with an ache in it. The
    bartender looks at you the way people look at someone who's about to
    make a decision they can't take back.

    "People come to places like this for a reason. Not the drink — you can
    get a drink anywhere." They tap the bar. "What's yours? What are you
    looking for?"
  choices:
    - label: Answers
      description: >-
        Something doesn't add up. A death that wasn't an accident. A letter
        that shouldn't exist. A name that keeps showing up where it doesn't
        belong. You need to know.
      mechanical_effects:
        goals: find_the_truth
        emotional_state: determined
    - label: A Score
      description: >-
        There's a job. A big one. The kind that sets you up for life or
        gets you killed. Probably both. But you've never been good at
        saying no to money.
      mechanical_effects:
        goals: chase_the_score
        emotional_state: hungry
    - label: A Fresh Start
      description: >-
        You're running from something — the law, the past, a version of
        yourself you don't want to be anymore. This city is big enough
        to disappear in. Maybe.
      mechanical_effects:
        goals: start_over
        emotional_state: wary
    - label: Someone
      description: >-
        There's a person. Missing, taken, hiding — you don't know which.
        But you're going to find them, and God help anyone standing between
        you and that door.
      mechanical_effects:
        goals: find_someone
        emotional_state: desperate
  allows_freeform: true

- id: confirmation
  title: The Story So Far
  narration: |
    The bartender straightens up. They look at you — really look at you —
    and something like respect crosses their face. Or maybe it's pity.
    Hard to tell in this light.

    "Well then, {name}. Sounds like you've got a long night ahead of you."

    They slide a matchbook across the bar. There's an address on the inside.

    "If you need anything — and you will — you know where to find me."

    The door is right there. The city is waiting. And {name}, a {race}
    {class} with more trouble than sense, steps out into the night.
  choices: []
  allows_freeform: false
