name: Pulp Noir
version: "1.0.0"
description: >-
  Gritty adventure in the early twentieth century — speakeasies, jazz clubs,
  and a world sliding toward war. Players are detectives, smugglers, soldiers
  of fortune, and scholars navigating political tension, criminal enterprise,
  and secrets best left buried. The occult simmers beneath the surface,
  tunable from "purely rational" to "the ritual worked."
min_sidequest_version: "0.1.0"
refine_hooks: false

# --- Creative DNA (reference for all subsequent steps) ---

inspirations:
  - name: "Indiana Jones"
    element: "Pulp adventure, occult as climax fuel not daily driver"
  - name: "The Maltese Falcon / Dashiell Hammett"
    element: "Noir mystery, everyone's working an angle, trust is currency"
  - name: "Casablanca"
    element: "Political tension, moral compromise, glamour under pressure"
  - name: "Foucault's Pendulum (Umberto Eco)"
    element: "Intellectual occult, conspiracy that might be real, paranoia of pattern-matching"
  - name: "Boardwalk Empire / Peaky Blinders"
    element: "Gangster era, prohibition, organized crime with style"

era_range: "1910s-1930s"

core_vibe: >-
  Someone knows something they shouldn't, and now everybody wants to talk
  to them — some with money, some with guns.

emotional_tone:
  - tension
  - paranoia
  - defiant glamour
  - gallows wit

differentiation: >-
  No elves, no starships — real-world adjacent. The danger is human. The occult
  exists but stays in the background as flavor and climax fuel, not the core
  loop. Lethality is forgiving: bad guys die, good guys don't. Angst and
  tension over body counts. The mechanics cover the 1910s-1930s — prohibition,
  jazz age, interwar — with worlds setting the specific decade and geography.
  Westerns are a separate genre.
