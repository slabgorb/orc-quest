  speakeasy:
    - speakeasy
    - jazz
    - bar
    - cabaret
    - drinks
    - cocktail
    - lounge
    - nightclub
    - smoke
    - bourbon
    - whiskey
    - dance
    - singer
    - piano
    - club
  intrigue:
