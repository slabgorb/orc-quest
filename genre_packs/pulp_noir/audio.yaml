creature_voice_presets: {}

mixer:
  music_volume: 0.4
  sfx_volume: 0.7
  voice_volume: 1.0
  duck_music_for_voice: true
  duck_amount_db: -12.0
  crossfade_default_ms: 3000

ai_generation:
  enabled: true
  model: musicgen_small
  max_generation_time_s: 15
  cache_generated: true
