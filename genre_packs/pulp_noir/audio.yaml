sfx_library:
  gunshot:
    - audio/sfx/gunshot.ogg
  glass_break:
    - audio/sfx/glass_break.ogg
  car_engine:
    - audio/sfx/car_engine.ogg
  rain:
    - audio/sfx/rain.ogg
  crowd_murmur:
    - audio/sfx/crowd_murmur.ogg
  phone_ring:
    - audio/sfx/phone_ring.ogg
  door_slam:
    - audio/sfx/door_slam.ogg
  footsteps_cobblestone:
    - audio/sfx/footsteps_cobblestone.ogg
  jazz_applause:
    - audio/sfx/jazz_applause.ogg
