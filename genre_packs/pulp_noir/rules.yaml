stat_generation: point_buy
point_buy_budget: 27
magic_level: low

ability_score_names:
  - Brawn
  - Finesse
  - Grit
  - Savvy
  - Nerve
  - Charm

allowed_classes:
  - Detective
  - Brawler
  - Grifter
  - Soldier of Fortune
  - Scholar
  - Smuggler
  - Performer

allowed_races:
  - Old Money
  - Street
  - Immigrant
  - Military
  - Academic
  - Frontier

hp_formula: "class_base + (grit_mod * level)"

stat_display_fields:
  - hp
  - max_hp
  - defense

class_hp_bases:
  Detective: 8
  Brawler: 12
  Grifter: 6
  Soldier of Fortune: 10
  Scholar: 6
  Smuggler: 8
  Performer: 6

default_class: Detective
default_race: Street
default_hp: 8
default_ac: 10
default_location: "A smoky bar in a city that never sleeps"
default_time_of_day: night

custom_rules:
  lethality: forgiving
  injury_system: none
  rest_variant: standard
  encumbrance: none
  contacts_system: >-
    Spend Charm to "know a guy." Each contact is a one-time favor —
    information, a safe house, a forged document, a distraction.
    The Narrator decides if the contact is available and what they want
    in return.
  heat_tracker: >-
    Actions draw attention. Heat rises from 0 (anonymous) to 5 (hunted).
    Law, criminals, and foreign agents each track Heat independently.
    High Heat means NPCs come looking for you. Heat decays slowly
    between sessions or can be reduced through story actions.
  occult_exposure: >-
    Occult encounters are rare and unsettling. Players may stumble into
    rituals, artifacts, or conspiracies that hint at something real beneath
    the paranoia. The occult level is controlled by the world's tone axes —
    from "purely rational explanations" to "the artifact actually works."
    Even at maximum, the occult is climax fuel, not daily magic.

encounter_base_tension:
  random: 0.05
  ambush: 0.20
  boss: 0.35
  final: 0.45
