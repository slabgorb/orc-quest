affinities:
  - name: "Gumshoe"
    description: "Investigation, deduction, reading crime scenes and people's lies"
    triggers:
      - "following a lead to a new location or suspect"
      - "questioning a witness or interrogating a suspect"
      - "finding physical clues others missed"
      - "connecting two pieces of evidence"
      - "staking out a location"
    tier_thresholds: [5, 12, 25]

  - name: "Moxie"
    description: "Nerve under pressure, bluffing, staring down the barrel and not blinking"
    triggers:
      - "facing down a threat without backing away"
      - "calling someone's bluff"
      - "holding composure when everything goes wrong"
      - "resisting intimidation or coercion"
      - "making a critical decision under time pressure"
    tier_thresholds: [5, 12, 25]

  - name: "Streetwise"
    description: "Knowing the city, the underworld, and who to talk to when you need something"
    triggers:
      - "using a contact to get information or favors"
      - "navigating criminal networks without getting burned"
      - "finding black market goods or services"
      - "reading a room — knowing who is dangerous and who is pretending"
      - "knowing the back way out"
    tier_thresholds: [5, 12, 25]

  - name: "Scrapper"
    description: "Fighting, chasing, surviving — the physical stuff that hurts"
    triggers:
      - "winning a fight or holding your own against odds"
      - "surviving an ambush"
      - "chase scenes on foot or in vehicles"
      - "feats of endurance or physical toughness"
      - "taking a hit and staying on your feet"
    tier_thresholds: [5, 12, 25]

  - name: "Silver Tongue"
    description: "Persuasion, charm, and getting what you want without throwing a punch"
    triggers:
      - "talking your way past a guard or into a restricted area"
      - "convincing someone to trust you against their better judgment"
      - "negotiating a deal or defusing a confrontation"
      - "performing — singing, acting, commanding a stage"
      - "lying convincingly under pressure"
    tier_thresholds: [5, 12, 25]

  - name: "Bookworm"
    description: "Knowledge, research, languages, and the things written in books nobody should have opened"
    triggers:
      - "translating a text or decoding a cipher"
      - "identifying an artifact or its historical significance"
      - "recalling obscure historical or cultural knowledge"
      - "researching a lead through archives, libraries, or records"
      - "recognizing occult symbology or ritual significance"
    tier_thresholds: [5, 12, 25]

milestone_categories:
  - "survival"
  - "discovery"
  - "connection"
  - "defiance"
  - "revelation"

milestones_per_level: 3
max_level: 8

wealth_tiers:
  - max_gold: 10
    label: "Broke"
  - max_gold: 50
    label: "Getting By"
  - max_gold: 150
    label: "Comfortable"
  - max_gold: 400
    label: "Flush"
  - max_gold: null
    label: "Connected"
