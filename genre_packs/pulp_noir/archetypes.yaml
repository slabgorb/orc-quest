- name: The Fixer
  description: >-
    Knows everybody, arranges everything, and always wants a favor in return.
    The person you call when you need a forged passport, a safe house, or an
    introduction to someone dangerous. Never does anything for free.
  personality_traits:
    - resourceful
    - transactional
    - unnervingly well-connected
  typical_classes:
    - Smuggler
    - Grifter
  typical_races:
    - Street
    - Immigrant
  stat_ranges:
    Charm: [14, 18]
    Savvy: [14, 16]
  inventory_hints:
    - address book with entries in three languages
    - roll of mixed-currency banknotes
    - a business card with no name on it
  dialogue_quirks:
    - never answers a question directly — responds with a question or a price
    - lowers voice when naming names, even in private
  disposition_default: 10

- name: The War Veteran
  description: >-
    Survived the trenches of the Great War and came home to find the world
    didn't care. Competent, bitter, and drinks more than anyone should.
    Still the most dangerous person in any room that isn't a battlefield.
  personality_traits:
    - stoic
    - haunted
    - quietly competent
  typical_classes:
    - Soldier of Fortune
    - Brawler
  typical_races:
    - Military
    - Frontier
  stat_ranges:
    Grit: [14, 18]
    Brawn: [12, 16]
  inventory_hints:
    - service revolver kept in working order
    - flask of something strong
    - a medal they never wear
  dialogue_quirks:
    - stares past you mid-sentence as if hearing something far away
    - uses military time and rank out of habit, even with civilians
  disposition_default: -5

- name: The Torch Singer
  description: >-
    Performer who commands the stage at the best club in town. Hears
    everything from up there — who's with whom, who's drinking too much,
    who left in a hurry. Trades in secrets as naturally as applause.
  personality_traits:
    - magnetic
    - perceptive
    - guarded beneath the glamour
  typical_classes:
    - Performer
    - Grifter
  typical_races:
    - Street
    - Immigrant
  stat_ranges:
    Charm: [16, 18]
    Nerve: [12, 16]
  inventory_hints:
    - cigarette holder
    - a dressing room key on a silk ribbon
    - notes folded into sheet music
  dialogue_quirks:
    - speaks in song lyrics when deflecting — "you'd be surprised what a girl remembers"
    - makes eye contact that lasts one beat too long
  disposition_default: 15

- name: The Inspector
  description: >-
    Law enforcement — could be honest, could be bought, always watching.
    Knows the streets, knows the criminals, and knows exactly how much
    they can get away with on either side of the line.
  personality_traits:
    - methodical
    - morally flexible
    - patient
  typical_classes:
    - Detective
  typical_races:
    - Street
    - Military
  stat_ranges:
    Savvy: [14, 18]
    Nerve: [12, 16]
  inventory_hints:
    - badge and service pistol
    - notebook with shorthand nobody else can read
    - a photograph they show to certain people
  dialogue_quirks:
    - asks you to repeat things they clearly heard the first time
    - taps their notebook with a pencil while waiting for you to finish lying
  disposition_default: -15

- name: The Professor
  description: >-
    Academic who knows too much about something dangerous — ancient texts,
    archaeological sites, occult symbology, cryptography. Brilliant and
    utterly unprepared for the world outside the university.
  personality_traits:
    - brilliant
    - obsessive
    - naively trusting
  typical_classes:
    - Scholar
  typical_races:
    - Academic
  stat_ranges:
    Savvy: [16, 18]
    Nerve: [8, 12]
  inventory_hints:
    - leather satchel stuffed with papers
    - reading glasses on a chain
    - a rubbing from something they shouldn't have found
  dialogue_quirks:
    - corrects historical inaccuracies mid-crisis — "actually, that temple is Ptolemaic, not Pharaonic"
    - gets visibly excited about dangerous information as if it were a fascinating footnote
  disposition_default: 20

- name: The Muscle
  description: >-
    Enforcer for whoever's paying — mob, government, private interests.
    Not stupid, just uncomplicated. Violence is a skill they happen to be
    very good at, and someone is always hiring.
  personality_traits:
    - direct
    - professional
    - unsentimental
  typical_classes:
    - Brawler
    - Soldier of Fortune
  typical_races:
    - Street
    - Military
  stat_ranges:
    Brawn: [16, 18]
    Grit: [14, 16]
  inventory_hints:
    - brass knuckles or a blackjack
    - pistol in a shoulder holster
    - an envelope they haven't opened
  dialogue_quirks:
    - cracks knuckles before delivering bad news
    - calls everyone by their last name, even friends
  disposition_default: -25

- name: The Emigre
  description: >-
    Displaced by war, revolution, or persecution. Living under a name that
    may or may not be real, in a city that may or may not want them. Has
    connections back home and knowledge that certain people would pay for.
  personality_traits:
    - cautious
    - resourceful
    - homesick beneath the composure
  typical_classes:
    - Grifter
    - Scholar
    - Smuggler
  typical_races:
    - Immigrant
  stat_ranges:
    Nerve: [14, 16]
    Savvy: [12, 16]
  inventory_hints:
    - passport with too-new ink
    - a photograph of people who are probably dead
    - letters in a language the locals can't read
  dialogue_quirks:
    - switches languages mid-sentence when emotional
    - refers to home in the present tense as if they might go back tomorrow
  disposition_default: 0

- name: The Journalist
  description: >-
    Chasing a story, always. Nosy, brave, and reckless in roughly equal
    measure. Will buy you a drink to get you talking and print what you
    said before the ice melts.
  personality_traits:
    - tenacious
    - irreverent
    - dangerously curious
  typical_classes:
    - Detective
    - Grifter
  typical_races:
    - Street
    - Academic
  stat_ranges:
    Savvy: [14, 16]
    Charm: [12, 16]
  inventory_hints:
    - press credentials that may or may not be current
    - notepad and three pencils
    - a camera with one exposure left
  dialogue_quirks:
    - writes things down while you're still talking, which makes people nervous
    - says "off the record" and then prints it anyway
  disposition_default: 10

- name: The Don
  description: >-
    Crime boss with old-world manners and absolute authority. Never raises
    their voice, never does the dirty work personally. Loyalty is everything,
    disrespect is death. The Fixer works for them. The Muscle answers to them.
  personality_traits:
    - commanding
    - patient
    - merciless beneath the courtesy
  typical_classes:
    - Grifter
    - Smuggler
  typical_races:
    - Immigrant
    - Old Money
  stat_ranges:
    Charm: [14, 18]
    Nerve: [16, 18]
  inventory_hints:
    - tailored suit worth more than your apartment
    - a ring people are expected to kiss
    - nothing else — other people carry things for them
  dialogue_quirks:
    - speaks softly enough that everyone leans in, which is exactly the point
    - refers to murder as "a conversation" or "a misunderstanding that resolved itself"
  disposition_default: -10
