# Power Tiers — pulp_noir
# Per-class visual descriptions at each level range.
# max_level: 8 (compressed)
# Power here is influence, connections, and reputation — not combat gear.
#
# Classes from rules.yaml:
#   Detective, Brawler, Grifter, Soldier of Fortune, Scholar, Smuggler, Performer

Detective:
  - level_range: [1, 2]
    label: flatfoot
    player: >-
      cheap off-the-rack suit with shiny elbows, a battered fedora that's
      seen better decades, a snub-nosed revolver in a coat pocket not a
      holster, a flask and a pack of cigarettes, a notebook with more
      questions than answers, the tired eyes of someone who took this
      job because the rent is due
    npc: >-
      beat cop in a rumpled uniform, coffee-stained tie, service revolver
      worn on the hip out of habit, walks a route and knows every face
      on it, takes small bribes to feed a family
  - level_range: [3, 4]
    label: gumshoe
    player: >-
      a decent suit that fits properly and gets pressed on Sundays, a
      good fedora worn at an angle that means business, a .38 in a
      leather shoulder holster under the jacket, a lighter that works
      first try, the steady gaze of someone who has heard enough lies
      to spot the next one before it's finished
    npc: >-
      private investigator in a respectable suit, badge in the wallet
      and a camera in the glove box, knows every bartender and desk
      clerk in the district, solves what the police can't be bothered with
  - level_range: [5, 6]
    label: ace
    player: >-
      a tailored suit in quality wool that survives back alleys and
      precinct houses, a hat that is itself a reputation, a .45 in
      a custom holster because the .38 stopped being enough, a card
      in the wallet that opens doors at the DA's office and the
      speakeasy alike, the calm of someone who has cracked cases
      that made the front page
    npc: >-
      legendary PI whose name the cops say with grudging respect,
      office with a frosted glass door and a secretary who carries
      a gun, the case file nobody else would touch
  - level_range: [7, 8]
    label: legend
    player: >-
      a suit that is armor against the city itself — tailored, lived-in,
      and unmistakable, a weapon that is itself evidence of cases survived,
      a rolodex that is the real weapon — judges, journalists, mob bosses,
      all owe favors, the quiet authority of someone whose name alone
      has solved cases before they started

Brawler:
  - level_range: [1, 2]
    label: tough
    player: >-
      undershirt and suspenders over broad shoulders, knuckles scabbed
      from last night's disagreement, a flat cap and a mean squint,
      no weapon needed when the fists work fine, a cauliflower ear and
      a nose broken more than once, the rolling walk of someone who
      takes up space on purpose
    npc: >-
      dock worker or bouncer built like a fire hydrant, sleeves rolled
      over forearms like ham hocks, standing in a doorway daring someone
      to try it, no weapon but no one asks
  - level_range: [3, 4]
    label: bruiser
    player: >-
      a suit jacket straining at the shoulders over a frame built for
      damage, knuckle dusters in the pocket for when fists alone aren't
      enough, a snub-nose as backup but the hands do the talking, a
      reputation in the fight circuit and the back rooms, scars worn
      like medals from unnamed wars
    npc: >-
      mob enforcer in a suit two sizes too tight, a sap in one pocket
      and a pistol in the other, sent to deliver messages that involve
      fewer words and more bone
  - level_range: [5, 6]
    label: slugger
    player: >-
      a tailored suit that accommodates the shoulders and hides the
      weapons — knuckle dusters, a cosh, a holdout piece, the body of
      a former boxer who never stopped training, a face that has absorbed
      punishment from professionals and smiled through it, the dangerous
      calm of someone who enjoys the work
    npc: >-
      retired boxing champion turned muscle for whoever pays, a body
      that is itself a weapon maintained like a machine, the kind of
      handshake that sends a message
  - level_range: [7, 8]
    label: iron
    player: >-
      clothing chosen to accommodate movement not fashion — every seam
      reinforced, a body that has survived things that should have
      killed it several times over, hands that have their own reputation,
      the unstoppable presence of someone the entire underworld knows
      better than to cross

Grifter:
  - level_range: [1, 2]
    label: hustler
    player: >-
      a flashy suit that's actually secondhand — good taste on a bad
      budget, a confident smile hiding an empty wallet, a marked deck
      and a quick hand, a smooth line for every mark, shoes polished
      to a mirror shine because details sell the con, the nervous
      energy of someone one blown grift from disaster
    npc: >-
      three-card monte dealer on a street corner, a silk scarf and a
      borrowed accent, tells you exactly what you want to hear then
      checks your pockets while you're smiling
  - level_range: [3, 4]
    label: confidence man
    player: >-
      a well-tailored suit in a style that says money but doesn't
      specify whose, forged credentials for three different professions,
      a concealed pistol for when the exit closes, the ability to
      adopt any accent and any backstory, the warm handshake of someone
      who makes you feel like old friends in thirty seconds
    npc: >-
      professional con artist working a long game — rented office,
      fake company letterhead, a receptionist who's in on it, selling
      something that doesn't exist to people who should know better
  - level_range: [5, 6]
    label: mastermind
    player: >-
      clothing that shifts from millionaire to priest to diplomat
      depending on the grift, a suitcase of identities each with their
      own wardrobe, forged documents that pass federal scrutiny, the
      ability to walk into a bank and walk out with the vault key and
      a lunch invitation, a pistol never needed because the best grift
      is one where no one ever knows they've been taken
    npc: >-
      legendary grifter whose greatest con is that no one knows which
      person they really are, multiple lives running simultaneously
      across the city, even their closest partners aren't sure of
      the real name
  - level_range: [7, 8]
    label: architect
    player: >-
      the grift has become reality — so many identities that the
      original doesn't matter, a wardrobe for every life, a fortune
      built on nothing but words and timing, the philosophical calm
      of someone who realized the whole city is a con and they're
      simply better at it than everyone else

Soldier of Fortune:
  - level_range: [1, 2]
    label: grunt
    player: >-
      a military surplus coat over civilian clothes, dog tags tucked
      under the shirt, a service pistol kept clean out of habit, combat
      boots and a rucksack, the thousand-yard stare of someone who came
      back from the war but hasn't really left it, flinches at car
      backfires and sleeps sitting up
    npc: >-
      discharged veteran looking for work at the hiring hall, still
      wearing parts of the uniform, a rifle in a canvas case, capable
      but directionless, will work any job that doesn't require a tie
  - level_range: [3, 4]
    label: mercenary
    player: >-
      a civilian suit worn with military bearing — pressed, straight,
      nothing wasted, a quality sidearm in a professional holster, a
      trench knife on the belt because old habits, a body maintained
      like equipment, a contact book of other veterans who work for
      hire, the disciplined calm of someone who applies battlefield
      logic to city problems
    npc: >-
      professional hired gun in a suit that doesn't quite disguise
      the soldier underneath, armed and watchful, works for whoever
      pays and does the job clean, a small unit of similar men who
      drink together and take jobs together
  - level_range: [5, 6]
    label: captain
    player: >-
      tailored suit over a body that carries weapons like a second
      skin — a .45 and a combat knife and a holdout and a garrote,
      the ability to walk into a warzone and walk out the other side,
      a crew of loyal soldiers who follow for the reputation not the
      money, a collection of passports and a duffel bag always packed
    npc: >-
      legendary mercenary whose campaigns are whispered about at the
      officer's club, a private army's worth of experience, hired by
      governments when they need deniability
  - level_range: [7, 8]
    label: old soldier
    player: >-
      clothing that hides an arsenal with the ease of decades of
      practice, a body that is a weapon maintained by discipline and
      scar tissue, a network of former soldiers across every theater,
      the quiet lethality of someone who has survived everything the
      century has thrown and is too stubborn to stop

Scholar:
  - level_range: [1, 2]
    label: bookworm
    player: >-
      a tweed jacket with leather elbow patches and chalk dust, round
      spectacles and a distracted expression, a briefcase full of
      papers and a forgotten lunch, ink-stained fingers and a
      magnifying glass, no weapon because it never occurred to them
      to carry one, the absent-minded brilliance of someone who knows
      everything except how the world actually works
    npc: >-
      university assistant in a too-large cardigan, surrounded by
      stacked books, can cite sources for anything but can't change
      a tire, useful for research and useless for everything else
  - level_range: [3, 4]
    label: professor
    player: >-
      a respectable suit worn with academic indifference to fashion,
      a briefcase of research notes and a small pistol purchased
      reluctantly after the first death threat, reading glasses on a
      chain, expertise that opens doors academic and criminal, the
      focused intensity of someone who has followed a theory into
      dangerous territory and refused to turn back
    npc: >-
      tenured professor at the university with a specialty in something
      inconvenient — ancient codes, smuggling routes, forensic chemistry,
      consulted by police and avoided by the guilty
  - level_range: [5, 6]
    label: authority
    player: >-
      clothing of quiet academic distinction — a good suit and a
      university pin that opens certain doors, a briefcase containing
      research that powerful people want suppressed, a pistol carried
      now with reluctant competence, published work that is cited in
      courtrooms and feared in boardrooms
    npc: >-
      renowned expert whose testimony has sent people to the chair,
      a locked office full of evidence copies, academic connections
      that span the Atlantic, powerful enough that threatening them
      has consequences
  - level_range: [7, 8]
    label: luminary
    player: >-
      the suit is worn like armor against ignorance — distinguished,
      lived-in, the uniform of someone who has fought with knowledge
      and won, a library that is itself a weapon, expertise that
      governments consult and criminals fear, the unshakeable authority
      of someone who has proven the truth when everyone powerful wanted
      it buried

Smuggler:
  - level_range: [1, 2]
    label: runner
    player: >-
      a dock worker's clothes with too many hidden pockets, a cap pulled
      low and a collar turned up, a knife and a snub-nose because the
      cargo doesn't protect itself, a battered truck or a small boat
      with a hidden compartment, the nervous eyes of someone who checks
      every corner and every badge
    npc: >-
      waterfront rat who knows which crates to not ask about, coat
      pockets bulging with small contraband, a network of alleys
      memorized for quick exits, one step ahead of the customs men
  - level_range: [3, 4]
    label: runner
    player: >-
      practical clothes that don't attract attention — a working man's
      jacket over a shoulder holster, a reliable truck with professional
      hidden compartments, a network of safe houses and sympathetic
      dock workers, a manifest that shows one thing while carrying
      another, the watchful competence of someone who has made the
      run enough times to smell trouble
    npc: >-
      professional smuggler with a regular route and a reputation for
      delivery, a vehicle modified by someone who knows their business,
      armed and cautious, knows every customs agent by name and habit
  - level_range: [5, 6]
    label: captain
    player: >-
      quality clothes that pass in any port — dock or dinner party,
      a concealed weapon and a diplomatic passport that might be real,
      a fleet of vehicles or a boat with a fast engine and a shallow
      draft, a network that spans the coast, the unflappable cool of
      someone who has talked their way through checkpoints while
      sitting on a fortune in contraband
    npc: >-
      smuggling boss with a fleet and a waterfront territory, a
      legitimate business as a front, armed crew and a fast boat,
      moves anything for the right price and has never been caught
  - level_range: [7, 8]
    label: ghost
    player: >-
      clothing that belongs in every port and no port — the
      cosmopolitan ease of someone who has connections everywhere,
      a smuggling empire that runs itself, legitimate businesses that
      are actually fronts for fronts, the casual power of someone who
      moves invisible cargo across borders that governments can't close

Performer:
  - level_range: [1, 2]
    label: act
    player: >-
      stage clothes that are flashier than the paycheck — sequins over
      patches, a smile practiced in dressing room mirrors, a compact
      and a flask, a talent for reading a room and giving them what
      they want, a holdout derringer because the late show crowd gets
      handsy, the magnetic desperation of someone one good break from
      stardom and one bad night from the gutter
    npc: >-
      nightclub singer in a borrowed dress, a voice that fills the room
      and tips that don't fill the rent, knows every regular and their
      drink, information flows through the stage door
  - level_range: [3, 4]
    label: headliner
    player: >-
      a wardrobe that makes an entrance — tailored stage clothes and
      a street set that still turns heads, a following that fills the
      good clubs, a concealed weapon because fame attracts trouble,
      the ability to hold a room and work it for information, tips
      from admirers that include secrets worth more than cash
    npc: >-
      club headliner with a name on the marquee, a dressing room with
      a lock, regulars who confide over cocktails, knows which cop
      takes whose money and which wife is where she shouldn't be
  - level_range: [5, 6]
    label: star
    player: >-
      clothing that sets trends not follows them — every outfit a
      statement, invitations to parties where deals happen over
      champagne, a pistol in an evening bag because even stars have
      enemies, a voice or a talent that is itself a skeleton key,
      the intoxicating power of someone everyone wants to be near
      and nobody wants to refuse
    npc: >-
      city-famous performer with a radio contract, a penthouse paid
      for by an admirer, access to every layer of society through the
      stage door, knows more secrets than the police commissioner
  - level_range: [7, 8]
    label: icon
    player: >-
      a presence that reshapes rooms — clothing, voice, bearing all
      combined into something larger than a person, a talent that
      is itself power, connections from the gutter to the governor's
      mansion, the ability to end careers and start scandals with a
      single song, the mythic status of someone the whole city claims
      to know personally
