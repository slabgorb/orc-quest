nodes:
  - id: clue_poison_vial
    type: physical
    description: "A small glass vial with traces of belladonna, found wedged behind a dining car seat"
    discovery_method: forensic
    visibility: hidden
    locations: [dining_car, luggage_van]
    implicates: [suspect_varek]
    requires: []
    red_herring: false

  - id: clue_corridor_witness
    type: testimonial
    description: "A sleepless passenger saw a figure in a dark coat moving through the corridor at two in the morning"
    discovery_method: interrogate
    visibility: obvious
    locations: []
    implicates: [suspect_lucienne]
    requires: []
    red_herring: false

  - id: clue_torn_letter
    type: physical
    description: "Fragments of a letter mentioning a disputed inheritance, torn and scattered in sleeping berth three"
    discovery_method: search
    visibility: hidden
    locations: [sleeping_berth_3, luggage_van]
    implicates: [suspect_lucienne]
    requires: []
    red_herring: false

  - id: clue_argument_overheard
    type: behavioral
    description: "Multiple passengers heard a heated argument in the dining car between the victim and a foreign gentleman"
    discovery_method: observe
    visibility: obvious
    locations: [dining_car]
    implicates: [suspect_rashid]
    requires: []
    red_herring: false

  - id: clue_locked_compartment
    type: physical
    description: "The victim's compartment was locked from the inside — but the window latch shows tool marks"
    discovery_method: search
    visibility: requires_skill
    locations: [sleeping_berth_7]
    implicates: [suspect_rashid]
    requires: []
    red_herring: false

  - id: clue_financial_records
    type: physical
    description: "A leather portfolio in the luggage van contains records of payments between the victim and a diplomatic office"
    discovery_method: search
    visibility: hidden
    locations: [luggage_van, bar_car]
    implicates: [suspect_rashid, suspect_lucienne]
    requires: []
    red_herring: false

  - id: clue_deduction_motive
    type: deduction
    description: "Cross-referencing the torn letter with the financial records reveals the victim was blackmailing someone over the inheritance"
    discovery_method: forensic
    visibility: requires_skill
    locations: []
    implicates: [suspect_lucienne]
    requires: [clue_torn_letter, clue_financial_records]
    red_herring: false

  - id: clue_sleeping_draught
    type: physical
    description: "A half-empty bottle of chloral hydrate in the bar car, prescribed to no one aboard"
    discovery_method: forensic
    visibility: hidden
    locations: [bar_car, dining_car]
    implicates: [suspect_varek]
    requires: []
    red_herring: false

  - id: clue_red_herring_scarf
    type: physical
    description: "A monogrammed silk scarf found near the victim's door — the initials match a passenger, but the scarf was reported stolen days ago"
    discovery_method: search
    visibility: obvious
    locations: [corridor_car]
    implicates: [suspect_irina]
    requires: []
    red_herring: true
    planted_by: "the real killer, using a stolen accessory"

edges:
  - from_node: clue_torn_letter
    to_node: clue_deduction_motive
    relationship: proves
  - from_node: clue_financial_records
    to_node: clue_deduction_motive
    relationship: proves
  - from_node: clue_argument_overheard
    to_node: clue_locked_compartment
    relationship: suggests
  - from_node: clue_poison_vial
    to_node: clue_sleeping_draught
    relationship: suggests
  - from_node: clue_red_herring_scarf
    to_node: clue_corridor_witness
    relationship: contradicts
  - from_node: clue_corridor_witness
    to_node: clue_torn_letter
    relationship: suggests

red_herrings:
  - id: clue_phantom_ticket
    type: physical
    description: "A second-class ticket stub for a passenger who does not appear on the manifest"
    discovery_method: search
    visibility: hidden
    locations: [corridor_car]
    implicates: []
    requires: []
    red_herring: true
