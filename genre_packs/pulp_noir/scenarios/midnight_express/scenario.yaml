name: Murder on the Midnight Express
version: "1.0.0"
description: >-
  A locked-room mystery aboard the Orient Express. One passenger lies dead in
  their sleeping berth, the train is stalled by a storm, and every traveler
  has something to hide. Players must unravel alibis, trace evidence, and
  name the killer before the train reaches its destination.
duration_minutes: 210
max_players: 5

player_roles:
  - id: lead_investigator
    archetype_hint: "A retired detective, journalist, or anyone with a nose for truth"
    narrative_position: "You were asked by the railway company to look into the matter."
    required_hooks:
      - type: MOTIVATION
        prompt: "What compels you to seek the truth, even at personal risk?"
    constraints:
      - "Must have a plausible reason to investigate"
      - "Cannot be the killer in solo mode"
    suggested_flavors:
      - "Retired military intelligence"
      - "Investigative correspondent"
      - "Insurance assessor"

  - id: fellow_traveler
    archetype_hint: "A civilian passenger with sharp eyes and a personal stake"
    narrative_position: "You knew the victim — or thought you did."
    required_hooks:
      - type: RELATIONSHIP
        prompt: "How did you know the deceased?"
    constraints:
      - "Must have a prior connection to the victim"
    suggested_flavors:
      - "Old university friend"
      - "Estranged business partner"
      - "Former lover"

  - id: train_staff
    archetype_hint: "A member of the railway crew with access to every car"
    narrative_position: "You have keys to every door on this train."
    constraints:
      - "Must justify why they cooperate with the investigation"
    suggested_flavors:
      - "Chief steward"
      - "Dining car attendant"
      - "Sleeping car porter"

  - id: foreign_dignitary
    archetype_hint: "A diplomat or noble travelling under diplomatic protection"
    narrative_position: "Your diplomatic immunity makes you untouchable — and suspect."
    constraints:
      - "Cannot be searched without consent"
    suggested_flavors:
      - "Minor royalty"
      - "Trade envoy"
      - "Embassy attache"

  - id: mysterious_stranger
    archetype_hint: "A loner whose reasons for being on this train are unclear"
    narrative_position: "Nobody remembers you boarding."
    constraints:
      - "Must have a secret reason for travelling"
    suggested_flavors:
      - "Fugitive under a false name"
      - "Undercover operative"
      - "Grieving pilgrim"

pacing:
  scene_budget: 16
  acts:
    - id: act_1
      name: Discovery
      scenes: 5
      trope_range: [0.0, 0.35]
      narrator_tone: "Atmospheric dread — fog, confined spaces, the weight of unsaid things"
    - id: act_2
      name: Investigation
      scenes: 7
      trope_range: [0.35, 0.75]
      narrator_tone: "Mounting paranoia — every answer breeds two new questions"
    - id: act_3
      name: Confrontation
      scenes: 4
      trope_range: [0.75, 1.0]
      narrator_tone: "Urgent, cornered — the truth demands to be spoken aloud"
  pressure_events:
    - at_scene: 5
      event: "A scream echoes from the luggage van — someone has been rummaging through the victim's trunk."
    - at_scene: 12
      event: "The train lurches to a halt. The bridge ahead is out. No one is leaving."
    - at_scene: 15
      event: "A note is slipped under the investigator's door: 'Stop asking questions or join the dead.'"
  escalation_beats:
    - at: 0.50
      inject: "Halfway through the journey. Alibis are crumbling. Someone is lying."
    - at: 0.75
      inject: "Three-quarters done. The killer knows you are close. They will act."
    - at: 0.95
      inject: "The station lights appear in the fog. This is your last chance."
