- id: suspect_varek
  archetype_ref: train_conductor
  name: "Varek Ostrowski"
  initial_beliefs:
    facts:
      - "Was on duty in the engine room from 22:00 to midnight"
      - "Heard raised voices from the sleeping car around 23:30"
      - "The victim ordered a nightcap from the bar car at 22:15"
    suspicions:
      - target: suspect_lucienne
        confidence: 0.3
        basis: "Saw her pacing the corridor near the victim's berth"
  when_guilty:
    truth: "Poisoned the victim's nightcap with belladonna extract, slipped into the sleeping berth during the midnight rounds"
    cover_story: "Was in the engine room checking pressure gauges all evening"
    breaking_evidence: [clue_poison_vial, clue_sleeping_draught]
  when_innocent:
    actual_activity: "Was smuggling contraband tobacco hidden in the coal tender"
    suspicion: "Thinks suspect_lucienne did it — saw her pacing the corridor near the victim's berth"
    secret: "Has been skimming fares and falsifying passenger manifests for months"

- id: suspect_lucienne
  archetype_ref: socialite
  name: "Lucienne Beaumont"
  initial_beliefs:
    facts:
      - "Dined with the victim at the first sitting — he seemed agitated"
      - "Heard the conductor pass through the sleeping car twice after midnight"
    suspicions:
      - target: suspect_rashid
        confidence: 0.4
        basis: "Overheard a heated argument between Rashid and the victim at dinner"
  when_guilty:
    truth: "Suffocated the victim with a silk pillow after a confrontation over a forged inheritance letter"
    cover_story: "Was in the dining car writing correspondence until well past midnight"
    breaking_evidence: [clue_torn_letter, clue_deduction_motive]
  when_innocent:
    actual_activity: "Was meeting a lover in the bar car — a scandal she cannot afford"
    suspicion: "Thinks suspect_rashid did it because of the argument she overheard at dinner"
    secret: "Her family fortune is entirely fictitious — she lives on credit and charm"

- id: suspect_rashid
  archetype_ref: diplomat
  name: "Rashid al-Fayed"
  initial_beliefs:
    facts:
      - "The victim owed a significant debt to a foreign creditor"
      - "Saw the conductor fumbling with a master key near the victim's berth at 23:00"
    suspicions:
      - target: suspect_varek
        confidence: 0.5
        basis: "The conductor had a master key and access to every berth on the train"
  when_guilty:
    truth: "Stabbed the victim with a ceremonial letter opener over a betrayed political alliance"
    cover_story: "Was in his compartment performing evening prayers and reading dispatches"
    breaking_evidence: [clue_locked_compartment, clue_financial_records]
  when_innocent:
    actual_activity: "Was encoding a sensitive diplomatic cable in his compartment"
    suspicion: "Thinks suspect_varek did it — the conductor had access to every berth"
    secret: "Carries forged travel documents for an operative who never boarded the train"

- id: suspect_irina
  archetype_ref: countess
  name: "Irina Volkov"
  initial_beliefs:
    facts:
      - "The victim kept a locked strongbox under his berth"
      - "Noticed the physician carrying his medical bag at an unusual hour"
    suspicions:
      - target: suspect_ashford
        confidence: 0.4
        basis: "A physician would know how to kill without leaving obvious marks"
  when_guilty:
    truth: "Cannot be the killer — was seen by three witnesses in the bar car at the time of death"
    cover_story: "Was resting in her berth with a headache"
    breaking_evidence: []
  when_innocent:
    actual_activity: "Was selling family jewels to a fence in the luggage van"
    suspicion: "Thinks suspect_ashford did it — he had medical knowledge and motive"
    secret: "Is fleeing an arranged marriage and travelling under her maiden name"

- id: suspect_hiroshi
  archetype_ref: valet
  name: "Hiroshi Kusari"
  initial_beliefs:
    facts:
      - "Noticed ink stains on Lucienne's gloves that matched the victim's stationery"
      - "The victim's berth door was ajar when he passed at 23:15"
    suspicions:
      - target: suspect_lucienne
        confidence: 0.35
        basis: "The ink stains on her gloves suggest she handled the victim's papers"
  when_guilty:
    truth: "Cannot be the killer — his master can confirm his presence all night"
    cover_story: "Was attending to his master's evening routine"
    breaking_evidence: []
  when_innocent:
    actual_activity: "Was secretly copying his master's business correspondence to sell to a rival"
    suspicion: "Thinks suspect_lucienne did it — he saw ink stains on her gloves that matched the victim's stationery"
    secret: "Is not actually a valet but an industrial spy posing as one"

- id: suspect_ashford
  archetype_ref: physician
  name: "Reginald Ashford"
  initial_beliefs:
    facts:
      - "The victim had a known heart condition — any strong poison would be doubly effective"
      - "Smelled something bitter near the victim's berth around midnight"
    suspicions:
      - target: suspect_varek
        confidence: 0.45
        basis: "Conductors handle rat poison regularly and know dosages"
  when_guilty:
    truth: "Cannot be the killer — was treating a genuine medical emergency in the next car"
    cover_story: "Was reading medical journals in the smoking lounge"
    breaking_evidence: []
  when_innocent:
    actual_activity: "Was performing an illegal surgery on a passenger who could not reach a hospital"
    suspicion: "Thinks suspect_varek did it — conductors know poisons from dealing with rail vermin"
    secret: "Lost his medical licence three years ago and practises under a false credential"

- id: witness_marguerite
  archetype_ref: governess
  name: "Marguerite Deschamps"
  initial_beliefs:
    facts:
      - "Was reading in the corridor alcove and saw someone pass toward the sleeping car at 23:20"
      - "The victim spoke harshly to the countess at dinner"
    suspicions:
      - target: suspect_irina
        confidence: 0.25
        basis: "The victim publicly humiliated the countess — motive enough for a proud woman"
  when_guilty:
    truth: "Cannot be the killer — was with her young charge all evening"
    cover_story: "Was asleep in her shared compartment"
    breaking_evidence: []
  when_innocent:
    actual_activity: "Was writing a secret letter to her sister about escaping her employment"
    suspicion: "Thinks the countess was involved — saw the look of fury at dinner"
    secret: "Plans to leave her position at the next station and never return"

- id: witness_tomasz
  archetype_ref: porter
  name: "Tomasz Brecki"
  initial_beliefs:
    facts:
      - "Carried the victim's luggage aboard — it was unusually heavy"
      - "Saw Rashid arguing with the victim on the platform before departure"
    suspicions:
      - target: suspect_rashid
        confidence: 0.3
        basis: "The argument on the platform looked personal, not political"
  when_guilty:
    truth: "Cannot be the killer — was in the luggage van all night securing cargo"
    cover_story: "Was sleeping in the porter's berth"
    breaking_evidence: []
  when_innocent:
    actual_activity: "Was rifling through first-class luggage looking for valuables to steal"
    suspicion: "Thinks the diplomat had unfinished business with the victim"
    secret: "Has been skimming valuables from luggage for months"

- id: witness_elena
  archetype_ref: singer
  name: "Elena Mirova"
  initial_beliefs:
    facts:
      - "Was performing in the bar car until 23:00 — the victim was in the audience"
      - "The victim left the bar car abruptly after receiving a folded note"
    suspicions:
      - target: suspect_lucienne
        confidence: 0.2
        basis: "Saw Lucienne slip a note to the waiter shortly before the victim left"
  when_guilty:
    truth: "Cannot be the killer — dozens of passengers saw her performing at the time of death"
    cover_story: "Retired to her berth after the performance"
    breaking_evidence: []
  when_innocent:
    actual_activity: "Was meeting the bar car manager to negotiate smuggling jewels across the border"
    suspicion: "Thinks the socialite passed the victim a lure to draw him to his death"
    secret: "Is a courier for a smuggling ring that uses the train route"

- id: witness_gregor
  archetype_ref: stoker
  name: "Gregor Harvik"
  initial_beliefs:
    facts:
      - "Was shovelling coal all evening — heard the conductor leave the engine room at 23:40"
      - "The boiler pressure log shows the conductor was absent for twenty minutes"
    suspicions:
      - target: suspect_varek
        confidence: 0.35
        basis: "The conductor left the engine room at the wrong time and lied about it"
  when_guilty:
    truth: "Cannot be the killer — was chained to the boiler room by duty and witnesses"
    cover_story: "Was stoking the boiler as always"
    breaking_evidence: []
  when_innocent:
    actual_activity: "Was drinking stolen brandy in the coal tender while neglecting the boiler"
    suspicion: "Thinks the conductor is hiding something — his absence lines up with the murder"
    secret: "Has been drunk on duty for weeks and falsifying the pressure logs"
