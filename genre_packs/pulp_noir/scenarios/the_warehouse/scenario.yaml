name: The Warehouse
version: "1.0.0"
description: >-
  A post-heist pressure cooker. The crew pulled the job clean but the cops were
  waiting at every exit — someone tipped them off. Now six armed professionals are
  locked in a derelict warehouse with the take, the heat closing in, and the
  certainty that one of them is a rat. Players must read the crew, catch the
  contradictions, and name the informant before the sirens reach the door.
duration_minutes: 120
max_players: 4

player_roles:
  - id: shot_caller
    archetype_hint: "The crew's ranking voice — respected enough that people answer when you ask"
    narrative_position: "You planned this job. If there's a rat, they burned you personally."
    required_hooks:
      - type: MOTIVATION
        prompt: "What's riding on this job for you — money, reputation, or something you can't replace?"
    constraints:
      - "Must have organized or co-planned the heist"
      - "Cannot be the rat in solo mode"
    suggested_flavors:
      - "Old-school career thief"
      - "Ex-military turned heist planner"
      - "Someone doing one last job"

  - id: outsider
    archetype_hint: "New to this crew — brought in for one specific skill"
    narrative_position: "Nobody here trusts you yet. That makes you either the prime suspect or the only one with fresh eyes."
    required_hooks:
      - type: RELATIONSHIP
        prompt: "Who vouched for you to get on this crew, and why do you owe them?"
    constraints:
      - "Must have a specific skill that justified inclusion"
    suggested_flavors:
      - "Wheelman recruited from the racing circuit"
      - "Safecracker on loan from another outfit"
      - "Tech specialist who disarmed the security"

  - id: old_hand
    archetype_hint: "A veteran who has worked with half the crew before"
    narrative_position: "You've bled with these people. If one of them flipped, you'll know."
    constraints:
      - "Must have history with at least two NPCs"
    suggested_flavors:
      - "Fence who's moved goods for the crew for years"
      - "Retired wheelman pulled back in"
      - "The one who always handles the guns"

pacing:
  scene_budget: 10
  acts:
    - id: aftermath
      name: "The Aftermath"
      scenes: 2
      trope_range: [0.0, 0.2]
      narrator_tone: "Adrenaline crash. Blood and broken glass. The money's here but so is the heat. Someone talks first — that's when the paranoia starts."
    - id: interrogation
      name: "The Reckoning"
      scenes: 6
      trope_range: [0.2, 0.8]
      narrator_tone: "Accusations fly. Alibis crack under pressure. Everyone's armed. The tension is physical — one wrong word and someone draws."
    - id: standoff
      name: "The Standoff"
      scenes: 2
      trope_range: [0.8, 1.0]
      narrator_tone: "Sirens getting closer. Make the call now or everyone goes down. Point the finger or make a run for it."
  pressure_events:
    - at_scene: 4
      event: "A police helicopter spotlight sweeps across the warehouse skylights. Everyone freezes."
    - at_scene: 7
      event: "Someone's phone buzzes — a burner, not the one they showed the crew. The room goes dead silent."
    - at_scene: 8
      event: "A patrol car rolls past the loading dock, slows, and stops. Its radio crackles. Then it moves on."
    - at_scene: 9
      event: "Distant sirens converge — three, maybe four units. They're setting up a perimeter."
    - at_scene: 10
      event: "A bullhorn from outside: 'This is the police. We know you're in there.' Time's up."
  escalation_beats:
    - at: 0.30
      inject: "The crew is starting to fracture. Side conversations. Locked eyes across the room. Someone's lying."
    - at: 0.60
      inject: "Half the crew suspects the other half. Hands are near weapons. One accusation could break this wide open."
    - at: 0.90
      inject: "Sirens on all sides. The back exit may still be clear but only for minutes. Decide now."
