variants:
  - id: wounded_standoff
    weather: "Heavy rain drumming on the corrugated roof, occasional thunder"
    setting_status: "lockdown"
    mood_baseline: "Volatile paranoia — someone is wounded and bleeding on the floor, everyone else is pointing fingers"
    concurrent_event: "One crew member took a round during the escape and is bleeding out on the warehouse floor. The argument over the rat intensifies with every groan."
    npc_mood_overrides:
      crew_brennan: "pacing like a caged animal, hand never leaving his waistband"
      crew_kovac: "kneeling by the wounded, hands shaking, avoiding everyone's eyes"

  - id: sirens_closing
    weather: "Cold fog seeping through broken windows, visibility outside near zero"
    setting_status: "compromised"
    mood_baseline: "Paranoid tension — sirens in the distance growing closer, every second counts"
    concurrent_event: "Police sirens echo from multiple directions, getting louder. A helicopter searchlight sweeps the industrial district."
    npc_mood_overrides:
      crew_sable: "chain-smoking by the window, watching the street with binoculars"
      crew_delfino: "checking exit routes obsessively, jangling car keys"

  - id: dead_silence
    weather: "Overcast and still, an unnatural quiet outside"
    setting_status: "isolated"
    mood_baseline: "Suffocating distrust — the silence outside is worse than sirens, because it means the cops are already in position"
    concurrent_event: null
    npc_mood_overrides:
      crew_tanaka: "sitting unnervingly still, watching everyone with flat eyes"
      crew_lau: "hunched over her laptop, refusing to make eye contact"

  - id: power_cut
    weather: "Freezing wind rattling the loading bay doors, sleet on the skylights"
    setting_status: "blackout"
    mood_baseline: "Hostile suspicion — the power just died and nobody knows if it was the cops or sabotage from the inside"
    concurrent_event: "The warehouse power cuts out. Emergency lights cast everything in red. Someone's phone screen lights up in the dark — and it shouldn't."
    npc_mood_overrides:
      crew_lau: "the only one who could have killed the power remotely, and she knows everyone is thinking it"
      crew_brennan: "standing in the doorway with a flashlight, blocking the only exit"
