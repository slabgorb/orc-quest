nodes:
  - id: clue_knew_east_entrance
    type: behavioral
    description: "One crew member mentioned the cops would come from the east before anyone else saw them — only police operational planning would reveal the staging direction"
    discovery_method: interrogate
    visibility: hidden
    locations: []
    implicates: [crew_delfino, crew_sable, crew_tanaka]
    requires: []
    red_herring: false

  - id: clue_contradicts_timeline
    type: testimonial
    description: "Claims to have been at the van at 23:15 but another crew member saw the van empty at 23:10 — a five-minute gap with no explanation"
    discovery_method: interrogate
    visibility: obvious
    locations: []
    implicates: [crew_kovac, crew_brennan]
    requires: []
    red_herring: false

  - id: clue_burner_phone
    type: physical
    description: "A second phone hidden in a jacket lining — prepaid, one number in recent calls, last used forty minutes before the job"
    discovery_method: search
    visibility: hidden
    locations: [main_floor, back_office]
    implicates: [crew_delfino, crew_brennan, crew_tanaka]
    requires: []
    red_herring: false

  - id: clue_response_time_knowledge
    type: behavioral
    description: "Somebody slipped and referenced the exact police response time — seven minutes and forty seconds — before the crew discussed it, as if they already knew the protocol"
    discovery_method: interrogate
    visibility: requires_skill
    locations: []
    implicates: [crew_kovac, crew_lau]
    requires: []
    red_herring: false

  - id: clue_police_scanner_frequency
    type: physical
    description: "A scrap of paper with a specific police tactical frequency written in pencil — not the kind of thing you look up for fun"
    discovery_method: search
    visibility: hidden
    locations: [back_office, loading_dock]
    implicates: [crew_sable, crew_lau]
    requires: []
    red_herring: false

  - id: clue_unaccounted_absence
    type: testimonial
    description: "During the twenty-minute window before the cops hit, one crew member cannot account for their whereabouts — and two others noticed them missing"
    discovery_method: interrogate
    visibility: obvious
    locations: []
    implicates: [crew_delfino, crew_kovac]
    requires: [clue_contradicts_timeline]
    red_herring: false

  - id: clue_camera_footage_gap
    type: behavioral
    description: "The security cameras Lau supposedly disabled have a suspicious ninety-second gap — someone toggled them back on and then off again, as if sending a signal"
    discovery_method: observe
    visibility: requires_skill
    locations: [back_office]
    implicates: [crew_lau]
    requires: []
    red_herring: false

  - id: clue_nervous_tells
    type: behavioral
    description: "One crew member has been sweating through their shirt, flinching at every siren, and cannot maintain eye contact — textbook guilt response, or just fear"
    discovery_method: observe
    visibility: obvious
    locations: []
    implicates: []
    requires: []
    red_herring: true
    planted_by: "genuine fear, not guilt — a red herring for paranoid accusers"

edges:
  - from_node: clue_contradicts_timeline
    to_node: clue_unaccounted_absence
    relationship: proves
  - from_node: clue_knew_east_entrance
    to_node: clue_police_scanner_frequency
    relationship: suggests
  - from_node: clue_response_time_knowledge
    to_node: clue_police_scanner_frequency
    relationship: suggests
  - from_node: clue_burner_phone
    to_node: clue_knew_east_entrance
    relationship: suggests
  - from_node: clue_camera_footage_gap
    to_node: clue_response_time_knowledge
    relationship: suggests
  - from_node: clue_nervous_tells
    to_node: clue_contradicts_timeline
    relationship: contradicts

red_herrings:
  - id: clue_outside_surveillance
    type: physical
    description: "A cigarette butt on the fire escape that doesn't match any brand the crew smokes — could be a cop, could be a homeless person"
    discovery_method: search
    visibility: obvious
    locations: [fire_escape]
    implicates: []
    requires: []
    red_herring: true
