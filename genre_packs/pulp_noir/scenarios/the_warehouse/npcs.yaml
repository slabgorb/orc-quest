- id: crew_kovac
  archetype_ref: safecracker
  name: "Niko Kovac"
  initial_beliefs:
    facts:
      - "The vault alarm was on a silent trip — only someone who knew the police response protocol could predict the response time"
      - "Heard Sable on the phone during the staging, speaking too quietly to make out words"
      - "The original plan had a fifteen-minute window but police arrived in eight"
    suspicions:
      - target: crew_sable
        confidence: 0.5
        basis: "Sable was whispering on a phone call during staging — who calls someone right before a job?"
  when_guilty:
    truth: "Made a plea deal with the FBI after they caught him on an unrelated forgery charge. They threatened him with fifteen years — he has a sick mother who would die alone if he went away. The deal was simple: give them the warehouse job and walk free."
    cover_story: "The security company must have upgraded their silent alarm. I told you the specs were six months old — we should have done fresh recon."
    breaking_evidence: [clue_contradicts_timeline, clue_response_time_knowledge]
  when_innocent:
    actual_activity: "Was calling his mother's hospice to check on her condition — she's dying and he can't be there"
    suspicion: "Thinks Sable is the rat — she was on the phone during staging and she's the only one with law enforcement contacts from her old life"
    secret: "His safecracking tools are borrowed from a rival crew without permission — if they find out, he's dead"

- id: crew_sable
  archetype_ref: lookout
  name: "Vivienne Sable"
  initial_beliefs:
    facts:
      - "Was positioned on the roof across the street — saw the police staging two blocks east before they hit"
      - "Delfino arrived at the warehouse twenty minutes after everyone else with no explanation"
      - "The police came from the east — the one direction we didn't scout"
    suspicions:
      - target: crew_delfino
        confidence: 0.35
        basis: "Delfino was late and came from the wrong direction — maybe he was talking to someone he shouldn't have been"
  when_guilty:
    truth: "An FBI agent has photographs of her from a previous job — armed robbery, federal jurisdiction, thirty years minimum. They coerced her into cooperating by threatening to send the photos to every crew she's ever worked with. She informed to protect herself and the people who would be targeted if her past surfaced."
    cover_story: "I was up on that roof and I saw the cops come from the east. That means they had a staging point we didn't know about. Bad recon, not a rat."
    breaking_evidence: [clue_police_scanner_frequency, clue_knew_east_entrance]
  when_innocent:
    actual_activity: "Was photographing the crew during the job as insurance — blackmail material in case anyone tries to cut her out"
    suspicion: "Thinks Delfino is the rat — he was late, evasive, and arrived from a direction that doesn't match his story"
    secret: "Has a go-bag stashed two blocks away with a fake passport and enough cash to disappear"

