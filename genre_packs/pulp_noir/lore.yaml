world_name: ""

history: |
  The world runs on secrets. Every city has its underworld, every institution
  its corruption, every hero their past. The line between law and crime is
  a gentleman's agreement, and gentlemen lie. Justice is personal, expensive,
  and rarely arrives on time.

cosmology: |
  There is no cosmic order. The universe is indifferent. What matters is what
  people do to each other — betrayal, loyalty, sacrifice, greed. The only
  supernatural force is human nature, and it's terrifying enough.

geography: |
  Cities are characters. The rain-slicked streets, the smoke-filled clubs,
  the docks at midnight. Every neighborhood has its own rules, its own boss,
  its own price for silence. The countryside is where bodies are buried and
  witnesses disappear.

