definitions:
  - id: occult
    name: Occult
    description: >-
      How much supernatural reality exists beneath the surface. At low values,
      every mystery has a rational explanation — cults are deluded, artifacts are
      just old. At high values, the ritual actually works, the artifact has power,
      and ancient forces are real and dangerous.
    poles:
      - rational
      - supernatural
    default: 0.2

  - id: intrigue
    name: Intrigue
    description: >-
      Whether the story leans toward physical adventure or social manipulation.
      At the archaeology pole, players explore ruins, chase artifacts, and decode
      ancient puzzles. At the espionage pole, players trade secrets, read dossiers,
      and figure out who is betraying whom.
    poles:
      - archaeology
      - espionage
    default: 0.5

  - id: scope
    name: Scope
    description: >-
      How far the story reaches. Local stories center on one city, one
      neighborhood, personal stakes. Global stories span borders, involve
      international conspiracies, and put nations in the balance.
    poles:
      - local
      - global
    default: 0.3

modifiers:
  occult:
    rational: >-
      Every mystery has a mundane explanation. Cults are deluded fanatics, not
      sorcerers. Artifacts are historically valuable, not magically powerful.
      When players encounter the "supernatural," it is always a trick, a drug,
      a hidden mechanism, or human madness. Maintain this consistently — the
      world is material and knowable.
    supernatural: >-
      The occult is real and dangerous. Rituals have consequences. Artifacts
      carry genuine power — curses, visions, transformations. Ancient forces
      exist and take interest in mortal affairs. Use the supernatural sparingly
      for maximum impact — it should feel transgressive and awe-inspiring, never
      routine. The climax earns the supernatural reveal.
  intrigue:
    archaeology: >-
      Lean into physical adventure — ancient sites, hidden chambers, coded maps,
      crumbling temples, booby traps. The story moves through locations and
      discoveries. NPCs are guides, rivals, and treasure hunters. The central
      question is "what is buried here and what happens when we find it?"
    espionage: >-
      Lean into social manipulation — secret meetings, coded messages, double
      agents, blackmail, surveillance. The story moves through conversations
      and betrayals. NPCs have hidden agendas and competing loyalties. The
      central question is "who is working for whom and what do they really want?"
  scope:
    local: >-
      Keep the story contained. One city, one neighborhood, a handful of blocks.
      The stakes are personal — a missing person, a local power struggle, a
      debt owed. The world beyond the city exists but does not intrude. Players
      know the streets, the regulars, the shortcuts.
    global: >-
      The story crosses borders. Events in Paris connect to Berlin, Madrid,
      Cairo, Shanghai. Players receive telegrams from foreign contacts, chase
      leads across countries, and discover that local problems are symptoms of
      international conspiracies. Governments, intelligence agencies, and
      multinational criminal networks are in play.

presets:
  - name: Hammett
    description: >-
      Pure noir detective fiction. No magic, all backstabbing, one city's
      worth of trouble. Sam Spade territory.
    values:
      occult: 0.0
      intrigue: 0.8
      scope: 0.2

  - name: Spielberg
    description: >-
      Globe-trotting pulp adventure. The artifact is real, the Nazis want it,
      and there's a map on the back of something important.
    values:
      occult: 0.7
      intrigue: 0.2
      scope: 0.8

  - name: Eco
    description: >-
      Intellectual paranoia. Is the conspiracy real? The clues fit together
      too well — or maybe you're just seeing patterns. Foucault's Pendulum
      at the gaming table.
    values:
      occult: 0.5
      intrigue: 0.6
      scope: 0.5

  - name: Balanced
    description: >-
      A bit of everything — the genre's default flavor. Some mystery, some
      intrigue, mostly local with hints of something bigger.
    values:
      occult: 0.3
      intrigue: 0.5
      scope: 0.4
