chapters:
  - id: fresh
    label: "Arrival — A Stranger in Paris"
    session_range: [1, 4]
    location: montparnasse
    time_of_day: evening
    atmosphere: >-
      The café is warm and loud. A jazz trio plays in the corner. The
      waiter brings you something you didn't order and charges you for
      something else. Outside, the rain makes the cobblestones shine
      like they're made of obsidian. You don't know anyone yet, but
      by the end of the night, three people will owe you a favor and
      one will owe you an apology.
    active_stakes: >-
      Establishing yourself in a city that doesn't care if you live
      or die. Finding lodging, contacts, and a reason to stay. The
      first threads of something larger begin to appear — a rumor,
      a face in a crowd, a name mentioned twice by people who shouldn't
      know each other.
    points_of_interest:
      - name: La Rotonde
        description: >-
          The café where everyone starts. Paintings on the walls traded
          for coffee. Hemingway's corner table. The smell of Gauloises
          and strong espresso. The owner knows everyone.
      - name: A Cheap Hotel Near the Station
        description: >-
          Third floor, no elevator, shared bathroom down the hall. The
          wallpaper is peeling and the radiator knocks. But the bed is
          clean and the landlady doesn't ask questions.
      - name: Shakespeare and Company
        description: >-
          Sylvia Beach's bookshop on Rue de l'Odéon. Lending library,
          meeting place, and the only place in Europe where you can
          borrow a copy of Ulysses without fear of arrest.
    npcs:
      - archetype: "The Expatriate Writer"
        name: null
        location: montparnasse
        disposition: 15
      - archetype: "The Fixer"
        name: null
        location: montparnasse
        disposition: 10
    quests: {}
    lore:
      - The exchange rate makes Paris absurdly cheap for Americans
      - La Rotonde accepts artwork in exchange for food and drink
      - The Préfecture monitors all foreign nationals
    notes:
      - Players establish their base of operations and initial contacts
      - The first hints of larger plot threads should appear naturally
    narrative_log: []
    tropes:
      - id: the_heat_is_on
        status: dormant
        progression: 0.0
        notes: []
      - id: somebodys_talking
        status: dormant
        progression: 0.0
        notes: []
      - id: the_collection
        status: dormant
        progression: 0.0
        notes: []

  - id: early
    label: "Entanglement — The City Takes Hold"
    session_range: [5, 10]
    location: montparnasse
    time_of_day: night
    atmosphere: >-
      You know the streets now. You have a regular bar, a regular table,
      and regulars who nod when you walk in. The city has accepted you —
      which means it's started asking for things in return. Favors owed,
      debts unpaid, questions that lead to more questions. The jazz
      hasn't stopped. The rain hasn't stopped. Neither have you.
    active_stakes: >-
      The player is now embedded in Paris's social networks. Faction
      relationships deepen. At least one major plot thread — political,
      criminal, or occult — has engaged. The player has allies and
      enemies now, and the distinction isn't always clear.
    points_of_interest:
      - name: The Milieu's Territory
        description: >-
          Pigalle at night. The neon signs, the doormen who decide
          if you enter, the back rooms where the real business happens.
          You've been invited. That's either an opportunity or a trap.
      - name: A Salon in the 16th
        description: >-
          Champagne, candelabras, and conversation that's more dangerous
          than anything in Pigalle. The hostess introduces you to people
          whose names you recognize from the newspapers.
      - name: The Préfecture
        description: >-
          You've been asked to come in for a conversation. The
          commissaire is polite. The questions are not.
    npcs:
      - archetype: "The Commissaire"
        name: null
        location: ile_de_la_cite
        disposition: -10
      - archetype: "The Chanteuse"
        name: null
        location: montmartre
        disposition: 5
      - archetype: "The Salon Hostess"
        name: null
        location: seizieme
        disposition: 10
    quests: {}
    lore:
      - The Milieu controls Pigalle through a combination of bribery and violence
      - The Salon Occultists are better connected than they appear
      - The Préfecture is stretched thin monitoring political extremists
    notes:
      - Major plot threads engage — at least one trope should reach 0.4
      - Players begin to see how factions interact and conflict
    narrative_log: []
    tropes:
      - id: the_stavisky_web
        status: active
        progression: 0.2
        notes:
          - First financial irregularities surface
      - id: the_shadow_network
        status: active
        progression: 0.2
        notes:
          - Connections between factions begin to emerge

  - id: mid
    label: "Descent — The City Reveals Itself"
    session_range: [11, 18]
    location: pigalle
    time_of_day: night
    atmosphere: >-
      The easy days are over. The people who smiled at you in the
      beginning have shown their other faces. The city's beauty has
      a cost and you're paying it. The political situation is
      deteriorating — Action Française marches through the Latin
      Quarter, the communists answer with their own demonstrations,
      and the police stand between them with insufficient conviction.
      Something is going to break.
    active_stakes: >-
      Multiple plot threads converge. The player's Heat is rising —
      law, criminal, or intelligence attention is now active. The
      occult thread, if engaged, has moved from fashionable curiosity
      to something genuinely unsettling. The player must make choices
      about which factions to support and which to oppose.
    points_of_interest:
      - name: The Catacombs
        description: >-
          Beneath the city. The bones of six million Parisians and
          tunnels that nobody has fully mapped. Someone has been
          down here recently. The candles are still warm.
      - name: Gare Montparnasse
        description: >-
          Spanish refugees arriving. The platform is crowded with
          people carrying everything they own. Among them, agents
          from both sides of a war that hasn't officially started.
      - name: The Bourse
        description: >-
          The stock exchange. Rumors of a financial scandal are
          circulating. The traders are nervous. Someone is about
          to get very rich or very arrested.
    npcs:
      - archetype: "The White Russian"
        name: null
        location: seizieme
        disposition: 0
      - archetype: "The Antiquaire"
        name: null
        location: marais
        disposition: 5
      - archetype: "The Colonial Student"
        name: null
        location: latin_quarter
        disposition: -5
    quests: {}
    lore:
      - The catacombs connect to chambers sealed since before the Revolution
      - The Spanish situation is producing refugees and arms traffic
      - A financial scandal is about to break that reaches into the government
    notes:
      - This is the act two turn — stakes escalate dramatically
      - The player should feel the city closing in from multiple directions
    narrative_log: []
    tropes:
      - id: the_stavisky_web
        status: active
        progression: 0.6
        notes:
          - The scandal is public knowledge but nobody can prove anything
      - id: the_catacombs_below
        status: active
        progression: 0.4
        notes:
          - The underground chambers have been found
      - id: the_spanish_connection
        status: active
        progression: 0.4
        notes:
          - Arms are moving through Paris

  - id: veteran
    label: "Reckoning — The Storm Breaks"
    session_range: [19, 24]
    location: ile_de_la_cite
    time_of_day: night
    atmosphere: >-
      The city is on fire — not literally, not yet, but the metaphor
      is failing. Barricades on the Place de la Concorde. Police
      firing into crowds. The Republic teeters. In the confusion,
      everything you've been chasing — the scandal, the artifact,
      the spy network, the person you came here to find — converges
      on a single night where every faction makes their move and the
      only question is whether you're a player or a piece.
    active_stakes: >-
      The climax. All major tropes reach resolution. The player's
      choices throughout the campaign determine the outcome — who
      survives, what is revealed or buried, and whether Paris emerges
      from this night as the same city or something different. The
      occult thread, if active, reaches its culmination beneath the
      city. The political crisis plays out on the streets above.
    points_of_interest:
      - name: Place de la Concorde
        description: >-
          The square where the guillotine stood during the Revolution.
          Now it's where the Republic might fall again. Demonstrators
          on one side, police on the other, and the National Assembly
          behind them deciding France's future.
      - name: Beneath the Palais Garnier
        description: >-
          Five levels below the opera house. The underground lake.
          The chambers that don't appear on any map. If the occult
          thread is active, this is where it ends.
      - name: A Bridge Over the Seine
        description: >-
          Midnight. The river is black. The city is burning orange
          on both banks. Someone is waiting for you in the middle
          of the bridge with an offer, a threat, or a gun. Probably
          all three.
    npcs:
      - archetype: "The Don"
        name: null
        location: pigalle
        disposition: -10
      - archetype: "The Camelot du Roi"
        name: null
        location: latin_quarter
        disposition: -30
    quests: {}
    lore:
      - The 6 February 1934 crisis — or a version of it — is upon the city
      - Every secret that was buried is now fighting its way to the surface
    notes:
      - All tropes resolve in this chapter
      - The player's cumulative choices determine the ending
      - Multiple endings are possible based on faction relationships and evidence held
    narrative_log: []
    tropes:
      - id: the_stavisky_web
        status: active
        progression: 1.0
        notes:
          - The scandal breaks fully — the streets respond
      - id: the_catacombs_below
        status: active
        progression: 1.0
        notes:
          - The ritual completes or is prevented
      - id: the_spanish_connection
        status: active
        progression: 0.8
        notes:
          - The arms network is exposed or exploited
