world_name: Les Années Folles

starting_region: montparnasse

map_style: >-
  1920s Parisian street map, art deco lettering, sepia-toned paper,
  ink illustrations of landmarks, Seine river in dark wash, arrondissement
  boundaries in thin gold lines, compass rose with fleur-de-lis

map_resolution: [1920, 1080]

regions:
  montparnasse:
    name: Montparnasse
    description: >-
      The bohemian capital of the world. La Rotonde, Le Dôme, La Coupole —
      the cafés where Hemingway writes, Picasso sketches, and Fitzgerald
      drinks too much. Cheap rooms above boulangeries, paint-spattered
      studios, and the smell of strong coffee and turpentine. The artistic
      heart of Paris, where a penniless poet can sit next to a millionaire
      collector and neither thinks it strange.
    adjacent: [saint_germain, latin_quarter, gare_montparnasse]

  montmartre:
    name: Montmartre
    description: >-
      The old bohemia on the hill, now equal parts artist colony and
      tourist trap. The Sacré-Cœur gleams white above the city. Below it,
      the Place du Tertre is full of portrait painters working the crowds.
      Further down, the cabarets begin — the Moulin Rouge, the Lapin Agile,
      a hundred smaller joints where the wine is cheap and the entertainment
      is variable. The neighborhood gets rougher as you descend toward
      Pigalle. Josephine Baker electrifies the Folies Bergère nearby.
      Bricktop's jazz club draws the international set.
    adjacent: [pigalle, opera_grands_boulevards]

  pigalle:
    name: Pigalle
    description: >-
      The red-light district at the foot of Montmartre. Sex clubs, opium
      dens, the Théâtre du Grand Guignol in its dead-end alley. The Apache
      gangs used to rule these streets; now the Corsican mob does, which
      is worse because they're organized. The neon signs promise pleasure
      but the alleys behind them promise trouble. Police patrol in pairs
      here. Smart people don't come alone.
    adjacent: [montmartre, opera_grands_boulevards]

  saint_germain:
    name: Saint-Germain-des-Prés
    description: >-
      The intellectual quarter. Les Deux Magots and Café de Flore face
      each other across Boulevard Saint-Germain like rival salons.
      Philosophers argue over espresso, publishers lunch at Lipp, and
      Sylvia Beach's Shakespeare and Company lends banned American novels
      to anyone with a deposit. The Jardin du Luxembourg is two blocks
      away for when the arguments get too loud. Quieter than Montparnasse,
      more serious, better dressed.
    adjacent: [montparnasse, latin_quarter, ile_de_la_cite]

  latin_quarter:
    name: The Latin Quarter
    description: >-
      The student district around the Sorbonne. Cheap restaurants,
      radical bookshops, and rooms rented by the week to young people
      from every corner of the French empire. Vietnamese revolutionaries
      eat at the Chinese restaurant on Rue Cujas. Algerian students
      argue politics at the Café Soufflot. The future leaders of a
      dozen independence movements are here, watched by plainclothes
      police who file reports that nobody reads until it's too late.
    adjacent: [saint_germain, marais, ile_de_la_cite]

  marais:
    name: The Marais
    description: >-
      Working-class, dense, and real. The Jewish community centers on
      Rue des Rosiers — kosher butchers, synagogues, Yiddish newspapers.
      Immigrants from Poland, Romania, and Russia have settled here
      alongside families who've been in the quarter for generations.
      The rents are cheap because the buildings are old. James Joyce
      finished Ulysses in a room nearby. Hemingway loved the quarter
      enough to write about it with nostalgia.
    adjacent: [latin_quarter, les_halles, ile_de_la_cite]

  les_halles:
    name: Les Halles
    description: >-
      The belly of Paris. The great central market where all of France's
      produce arrives before dawn — crates of fish from Brittany, cheese
      from Normandy, wine from Burgundy. The iron-and-glass pavilions
      designed by Baltard are cathedrals of commerce. At three in the
      morning, market workers eat onion soup at Au Pied de Cochon while
      the rest of the city sleeps. By day, it's the noisiest, most
      crowded square mile in Paris. By night, it empties out and
      becomes something else entirely.
    adjacent: [marais, opera_grands_boulevards, ile_de_la_cite]

  opera_grands_boulevards:
    name: Opéra & the Grands Boulevards
    description: >-
      The commercial heart of the Right Bank. The Palais Garnier opera
      house anchors a district of department stores (Galeries Lafayette,
      Printemps), banks, insurance companies, and brasseries that cater
      to the bourgeoisie. The grands boulevards are wide, tree-lined,
      and perfect for seeing and being seen. This is where money lives
      when it wants to be noticed. The Bourse is nearby — the stock
      exchange where fortunes are made and lost on rumors.
    adjacent: [montmartre, pigalle, les_halles, seizieme]

  ile_de_la_cite:
    name: Île de la Cité
    description: >-
      The island in the Seine where Paris began. Notre-Dame cathedral
      dominates one end. The Préfecture de Police and the Palais de
      Justice occupy the other. The Conciergerie — where Marie
      Antoinette waited for the guillotine — still operates as a
      courthouse. This is where the law lives, in buildings old enough
      to remember every revolution. Cross the Pont Neuf and you're in
      another world.
    adjacent: [saint_germain, latin_quarter, marais, les_halles]

  seizieme:
    name: The 16th Arrondissement
    description: >-
      Old money, foreign embassies, and museums. Calm, clean, and
      expensive. The avenues are wide enough to drive a Bugatti down
      without worrying about pedestrians, and the residents do exactly
      that. The Bois de Boulogne sprawls along the western edge — a
      vast park where the wealthy ride horses in the morning and
      things happen in the bushes at night that the wealthy pretend
      don't exist. The embassies of the major powers line the avenues,
      each one a sovereign fortress where intelligence officers work
      under diplomatic cover.
    adjacent: [opera_grands_boulevards]

  gare_montparnasse:
    name: Gare Montparnasse & the Southern Edge
    description: >-
      The train station that connects Paris to Brittany, the Atlantic
      coast, and eventually Spain. The area around the station is
      transient — hotels by the hour, luggage storage, ticket agents,
      and the particular kind of anonymity that comes from a place
      where everyone is either arriving or leaving. Spanish refugees
      are beginning to trickle through. In a few years, it will be
      a flood.
    adjacent: [montparnasse]

routes:
  - from_id: montparnasse
    to_id: saint_germain
    name: Boulevard Raspail
    distance: short
    danger: safe
    description: >-
      A fifteen-minute walk up the boulevard, past bookshops and
      galleries. The transition from bohemian to intellectual happens
      gradually — the coffee gets more expensive, the arguments get
      more abstract.

  - from_id: montparnasse
    to_id: latin_quarter
    name: Rue de la Gaîté to Rue Mouffetard
    distance: short
    danger: safe
    description: >-
      South through the theater district, then east into the student
      quarter. The crowds get younger and louder.

  - from_id: saint_germain
    to_id: ile_de_la_cite
    name: Pont Saint-Michel
    distance: short
    danger: safe
    description: >-
      Cross the bridge and you're on the island. Notre-Dame to your
      left, the Préfecture to your right. Choose carefully.

  - from_id: montmartre
    to_id: pigalle
    name: Descending the Butte
    distance: short
    danger: moderate
    description: >-
      Down the hill from the Sacré-Cœur toward the neon glow of
      Boulevard de Clichy. The transition is vertical — the higher
      you are, the safer you feel. Gravity works against you here
      in more ways than one.

  - from_id: pigalle
    to_id: opera_grands_boulevards
    name: Boulevard de Clichy to Boulevard Haussmann
    distance: medium
    danger: moderate
    description: >-
      South from the red lights into the commercial district.
      The storefronts get respectable fast. Nobody from the Opéra
      quarter admits to visiting Pigalle, but the taxi drivers
      know otherwise.

  - from_id: les_halles
    to_id: marais
    name: Rue de Rivoli East
    distance: short
    danger: safe
    description: >-
      East along the grand arcade, then into the narrow medieval
      streets of the Marais. The 19th century gives way to the
      16th in the space of two blocks.

  - from_id: opera_grands_boulevards
    to_id: seizieme
    name: Avenue des Champs-Élysées
    distance: medium
    danger: safe
    description: >-
      The most famous avenue in the world. From the Opéra district
      west through the Arc de Triomphe and into the 16th. The
      wealth increases with every block. So does the surveillance.

  - from_id: latin_quarter
    to_id: marais
    name: Across the 5th
    distance: short
    danger: safe
    description: >-
      East through the narrow streets behind the Panthéon, past
      the old churches and the newer immigrant restaurants. Two
      neighborhoods with nothing in common except cheap rent and
      interesting people.

  - from_id: montparnasse
    to_id: gare_montparnasse
    name: South to the Station
    distance: short
    danger: safe
    description: >-
      A ten-minute walk south to the train station. If you need
      to leave Paris fast, this is how.

  - from_id: les_halles
    to_id: ile_de_la_cite
    name: Pont au Change
    distance: short
    danger: safe
    description: >-
      Cross the bridge from the market to the island. The smell
      of fish gives way to the smell of old stone and legal paper.

  - from_id: marais
    to_id: ile_de_la_cite
    name: Pont Marie
    distance: short
    danger: safe
    description: >-
      The oldest residential bridge in Paris. Cross it and you
      leave the working-class Marais for the judicial island.
      The architecture changes from crumbling medieval to
      imposing institutional.
