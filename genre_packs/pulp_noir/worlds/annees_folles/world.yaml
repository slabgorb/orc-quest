name: Les Années Folles
slug: annees_folles
description: >-
  Paris, 1926. The Great War ended eight years ago but nobody's stopped
  bleeding. The franc is cheap, the jazz is loud, and every café on the
  Left Bank is full of Americans writing novels about how lost they are.
  Meanwhile, fascism is creeping across Europe like a gas leak — you can
  smell it but nobody wants to light a match. The city is the most
  exciting, dangerous, and beautiful place on earth. Everyone knows it
  can't last. Nobody wants to leave.

