# World-specific tropes for Les Années Folles
# These extend the genre-level tropes with Paris-specific story threads

- id: the_stavisky_web
  name: The Stavisky Web
  description: >-
    A financial scandal is unraveling — bonds sold against the assets of
    a municipal pawnshop, backed by politicians who should have known
    better. The deeper anyone digs, the more names appear. Police,
    ministers, judges — the corruption runs through every level of the
    Republic. Inspired by the real Stavisky Affair of 1933-34, which
    triggered street riots and nearly toppled the government.
  category: political
  triggers:
    - investigating a financial irregularity
    - following money between politicians and criminals
    - discovering forged bonds or fraudulent documents
  narrative_hints:
    - a banker who won't meet your eyes
    - a politician's name on a document it shouldn't be on
    - a municipal clerk who suddenly has a new automobile
  tension_level: 0.7
  resolution_hints:
    - expose the scandal to the press and let it burn
    - use the evidence as leverage for personal gain
    - destroy the evidence to protect someone you care about
    - trace the corruption to its source and confront the architect
  tags: [corruption, politics, finance, scandal]
  escalation:
    - at: 0.2
      event: >-
        A routine financial transaction reveals a discrepancy — bonds
        that shouldn't exist, backed by an institution that shouldn't
        have issued them. Someone is getting rich on paper.
      npcs_involved: [The Fixer]
      stakes: A financial puzzle that could be nothing.
    - at: 0.4
      event: >-
        The bonds trace back to a politician — someone prominent,
        someone protected. The clerk who flagged the discrepancy
        has been transferred. Quickly.
      npcs_involved: [The Journalist, The Commissaire]
      stakes: You now know something that powerful people want kept quiet.
    - at: 0.6
      event: >-
        The journalist who was investigating the story is found beaten
        in an alley near Les Halles. Their notes are missing. The
        police report calls it a robbery. It wasn't.
      npcs_involved: [The Journalist, The Muscle, The Commissaire]
      stakes: Investigating this story has become physically dangerous.
    - at: 0.8
      event: >-
        The scandal breaks partially — enough to cause panic but not
        enough to bring anyone down. Street demonstrations begin.
        Action Française and the Popular Front both smell blood.
        The police are choosing sides.
      npcs_involved: [The Camelot du Roi, The Commissaire]
      stakes: The city is on the edge of political violence.
    - at: 1.0
      event: >-
        The streets erupt. Barricades on the Place de la Concorde.
        Police firing into crowds. The Republic wobbles. In the
        chaos, the evidence that could resolve everything is about
        to be destroyed — by the people who created the scandal or
        by the people trying to exploit it.
      npcs_involved: [The Camelot du Roi, The Commissaire, The Don]
      stakes: The fate of the evidence — and possibly the Republic.
  passive_progression:
    rate_per_turn: 0.005
    rate_per_day: 0.015
    accelerators:
      - investigate
      - bonds
      - corruption
      - politician
      - bank
    decelerators:
      - ignore
      - walk away
      - destroy evidence
      - bribe
    accelerator_bonus: 0.04
    decelerator_penalty: 0.03

- id: the_catacombs_below
  name: What Lies Beneath
  description: >-
    The catacombs beneath Paris hold more than bones. Someone has been
    using the tunnels — marks on the walls, candles that were lit
    recently, doors that should be sealed but aren't. The cataphile
    community whispers about chambers that don't appear on any map,
    sealed since before the Revolution, now opened by someone who
    knew exactly what they were looking for.
  category: supernatural
  triggers:
    - entering the catacombs
    - discovering an artifact connected to pre-Revolutionary Paris
    - hearing rumors about sealed underground chambers
  narrative_hints:
    - fresh candle wax in a tunnel that's been sealed for decades
    - symbols carved into catacomb walls that don't match any known period
    - a cataphile who went in three days ago and hasn't come back
  tension_level: 0.6
  resolution_hints:
    - seal the chambers permanently and destroy the maps
    - document everything and bring it to a scholar who can explain it
    - follow the trail to whoever opened them and find out why
    - use the tunnels for your own purposes and deal with whatever's down there
  tags: [occult, underground, mystery, catacombs]
  escalation:
    - at: 0.2
      event: >-
        A cataphile friend mentions a new tunnel they found — except
        it's not new, it's very old, and someone has been through it
        recently. They show you a rubbing of markings on the wall.
        A scholar could identify them. Maybe.
      npcs_involved: [The Professor]
      stakes: Curiosity. Something interesting is down there.
    - at: 0.4
      event: >-
        The markings match a symbol found in a private collection —
        an artifact the Salon Occultists have been passing around at
        their gatherings. The antiquaire on Quai Voltaire knows more
        than he's saying. Someone with money is funding excavation
        in the tunnels.
      npcs_involved: [The Antiquaire, The Salon Hostess, The Professor]
      stakes: This is no longer casual exploration — someone organized this.
    - at: 0.6
      event: >-
        The cataphile who went missing is found — alive, in a hospital,
        unable to explain three lost days. They keep drawing the same
        symbol. A second entrance has been found, this one in a
        basement in the Marais that connects to tunnels not on any map.
      npcs_involved: [The Professor, The Commissaire]
      stakes: Something happened down there that broke someone's mind.
    - at: 0.8
      event: >-
        A private gathering in the 16th arrondissement — not a parlor
        séance but something more serious. The Salon Hostess has
        assembled people with resources and no restraint. They have
        the artifact, they have the maps, and they intend to go down
        there and complete whatever was started centuries ago.
      npcs_involved: [The Salon Hostess, The Professor, The Don]
      stakes: Wealthy, connected people are about to do something irreversible.
    - at: 1.0
      event: >-
        Beneath the city, in a chamber that predates the catacombs
        themselves, the ritual assembles. What happens next depends
        on the Occult axis — and on who is there to witness it.
      npcs_involved: [The Salon Hostess, The Professor]
      stakes: The culmination. The genre's occult promise is fulfilled or denied.
  passive_progression:
    rate_per_turn: 0.003
    rate_per_day: 0.01
    accelerators:
      - catacombs
      - tunnel
      - underground
      - artifact
      - symbol
      - séance
    decelerators:
      - seal
      - destroy
      - ignore
      - surface
      - daylight
    accelerator_bonus: 0.04
    decelerator_penalty: 0.02

- id: the_spanish_connection
  name: The Spanish Connection
  description: >-
    Spain is falling apart. The civil war hasn't started yet but the
    guns are already moving — through Paris, through the Milieu's
    smuggling networks, through diplomatic channels that aren't
    supposed to exist. Refugees are arriving at Gare Montparnasse.
    Agents from both sides are operating in the city. And someone
    is profiting from both.
  category: conflict
  triggers:
    - encountering Spanish refugees or political activists
    - discovering arms smuggling through Paris
    - visiting Gare Montparnasse during an arrival
  narrative_hints:
    - Spanish voices in a café that didn't used to serve paella
    - a crate at the docks labeled "machine parts" that's too heavy
    - a diplomat from the Spanish embassy who drinks too much and talks too little
  tension_level: 0.6
  resolution_hints:
    - help the refugees and stay out of the politics
    - expose the arms network to the press or the police
    - pick a side and commit — Republican or Nationalist
    - follow the money and find out who's profiting from both sides
  tags: [politics, smuggling, spain, refugees, international]
  escalation:
    - at: 0.2
      event: >-
        A Spanish painter at La Coupole is looking for someone to
        carry a message to a friend in Barcelona. It's just a letter,
        he says. The envelope is suspiciously thick.
      npcs_involved: [The Expatriate Writer]
      stakes: A simple favor that might not be simple.
    - at: 0.4
      event: >-
        The message connects to a network — supplies, money, and
        information flowing between Paris and Spain through channels
        the French government either doesn't know about or pretends
        not to. The Milieu is involved. So is at least one embassy.
      npcs_involved: [The Fixer, The Don]
      stakes: You've stumbled into an international operation.
    - at: 0.6
      event: >-
        A Spanish Republican agent is murdered in a hotel near
        Gare Montparnasse. The police call it a robbery. The
        Spanish embassy calls it a tragedy. The murdered agent's
        notebook — which you now have — calls it something else
        entirely.
      npcs_involved: [The Commissaire, The Emigre]
      stakes: You have evidence of an assassination with diplomatic implications.
    - at: 0.8
      event: >-
        Both sides want the notebook. The Republicans because it
        contains their network. The Nationalists because it names
        their agents. The Milieu because it documents their cut.
        You are now the most popular person in Paris — and not in
        a good way.
      npcs_involved: [The Don, The Muscle, The Emigre]
      stakes: Multiple factions are hunting you simultaneously.
    - at: 1.0
      event: >-
        A midnight meeting at a neutral location — if such a thing
        exists anymore. Every faction at the table. The notebook is
        the price of admission. What you do with it decides who
        lives, who dies, and which side of the coming war gets
        armed first.
      npcs_involved: [The Don, The Commissaire, The Emigre]
      stakes: The shape of the Spanish Civil War — and your survival.
  passive_progression:
    rate_per_turn: 0.005
    rate_per_day: 0.02
    accelerators:
      - spain
      - smuggle
      - arms
      - refugee
      - border
      - Barcelona
    decelerators:
      - ignore
      - refuse
      - return
      - neutral
    accelerator_bonus: 0.04
    decelerator_penalty: 0.03
