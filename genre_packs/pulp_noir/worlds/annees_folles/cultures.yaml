# Les Années Folles uses real names from real cultures.
# These extend the genre-level cultures with Paris-specific patterns.
# The narrator should use historically appropriate names, not generated ones.

- name: Parisian French
  description: >-
    Native Parisians — from market porters to aristocrats. Names are
    French, titles matter, and the arrondissement you live in says
    more about you than your surname.
  slots:
    given_name:
      corpora:
        - corpus: french.txt
          weight: 1.0
      lookback: 3
    family_name:
      corpora:
        - corpus: french.txt
          weight: 1.0
      lookback: 3
    title:
      word_list: [Monsieur, Madame, Mademoiselle, Professeur, Docteur, Commissaire, Inspecteur, Comte, Comtesse, Baron, Baronne]
    place_noun:
      word_list: [rue, boulevard, passage, impasse, quai, pont, place, jardin, marché, gare, café, hôtel]
    adjective:
      word_list: [vieux, noir, blanc, petit, grand, beau, rouge, ancien, sombre, perdu]
  person_patterns:
    - "{given_name} {family_name}"
    - "{title} {family_name}"
    - "{title} {given_name} {family_name}"
  place_patterns:
    - "{adjective} {place_noun}"
    - "{place_noun} de {family_name}"
    - "Chez {given_name}"

- name: American Expatriate
  description: >-
    The Lost Generation and their hangers-on. Americans in Paris —
    writers, journalists, drunks, and the occasional heiress
    slumming it on the Left Bank.
  slots:
    given_name:
      corpora:
        - corpus: english.txt
          weight: 1.0
      lookback: 3
    family_name:
      corpora:
        - corpus: english.txt
          weight: 1.0
      lookback: 3
    title:
      word_list: [Mr., Mrs., Miss, Dr., Professor, Captain, Sergeant]
    place_noun:
      word_list: [bar, hotel, bookshop, studio, club, room, office]
    adjective:
      word_list: [old, little, back, corner, upstairs, downtown]
  person_patterns:
    - "{given_name} {family_name}"
    - "{title} {family_name}"
  place_patterns:
    - "The {adjective} {place_noun}"
    - "{family_name}'s {place_noun}"

- name: Russian Émigré
  description: >-
    White Russians who fled the Revolution — former aristocrats driving
    taxis, ex-officers waiting tables, countesses selling jewelry.
    They cluster in the 16th arrondissement and around the Russian
    Orthodox cathedral on Rue Daru.
  slots:
    given_name:
      corpora:
        - corpus: polish.txt
          weight: 0.4
        - corpus: hungarian.txt
          weight: 0.3
        - corpus: french.txt
          weight: 0.3
      lookback: 3
    family_name:
      corpora:
        - corpus: polish.txt
          weight: 0.5
        - corpus: hungarian.txt
          weight: 0.5
      lookback: 3
    title:
      word_list: [Count, Countess, Prince, Princess, Colonel, Doctor, Madame]
    place_noun:
      word_list: [cathedral, salon, restaurant, club, école, pension]
    adjective:
      word_list: [ancien, russe, impérial, blanc, perdu, dernier]
  person_patterns:
    - "{given_name} {family_name}"
    - "{title} {family_name}"
    - "{title} {given_name}"
  place_patterns:
    - "Le {adjective} {place_noun}"
    - "{place_noun} {family_name}"

- name: Black American & Afro-Caribbean
  description: >-
    African Americans who came to Paris to escape Jim Crow and found
    a city that, if not free of racism, at least didn't have sundown
    laws. Jazz musicians, dancers, singers, soldiers who stayed after
    the war. Also West Indian and North African performers and workers
    from the French colonial empire.
  slots:
    given_name:
      corpora:
        - corpus: english.txt
          weight: 0.7
        - corpus: french.txt
          weight: 0.3
      lookback: 3
    family_name:
      corpora:
        - corpus: english.txt
          weight: 0.7
        - corpus: french.txt
          weight: 0.3
      lookback: 3
    title:
      word_list: [Mr., Mrs., Miss, Madame, Monsieur]
    place_noun:
      word_list: [club, stage, bar, hotel, studio, salon]
    adjective:
      word_list: [hot, blue, midnight, golden, smoky, uptown]
  person_patterns:
    - "{given_name} {family_name}"
    - "{title} {family_name}"
  place_patterns:
    - "The {adjective} {place_noun}"
    - "{given_name}'s {place_noun}"

- name: Corsican & Mediterranean
  description: >-
    The men who run the Milieu — Corsicans, Sicilians, Marseillais.
    They came to Paris from the south and took over the vice trade
    with a combination of family loyalty, extreme violence, and
    business acumen. Their names sound like the sun, but their
    business happens in the dark.
  slots:
    given_name:
      corpora:
        - corpus: french.txt
          weight: 0.5
        - corpus: italian.txt
          weight: 0.5
      lookback: 3
    family_name:
      corpora:
        - corpus: italian.txt
          weight: 0.6
        - corpus: french.txt
          weight: 0.4
      lookback: 3
    title:
      word_list: [Monsieur, Signore, Don, Patron]
    place_noun:
      word_list: [bistro, arrière-salle, bureau, entrepôt, cave, garage]
    adjective:
      word_list: [vieux, noir, fermé, dernier, sud, corse]
  person_patterns:
    - "{given_name} {family_name}"
    - "{title} {family_name}"
  place_patterns:
    - "Le {place_noun} {adjective}"
    - "Chez {given_name}"
