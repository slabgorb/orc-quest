world_name: Les Années Folles

history: >-
  The Treaty of Versailles was supposed to end the war to end all wars.
  It didn't. It created a peace so fragile that the ink was barely dry
  before everyone started preparing for the next one. France lost a
  generation in the trenches — over a million dead, twice that wounded —
  and emerged victorious but hollowed out. The government is unstable,
  cycling through premiers like a revolving door. The economy lurches
  between boom and bust. The franc collapsed in 1926, recovered, and
  nobody trusts it to hold. Germany seethes under reparations. Mussolini
  took Italy in 1922. Spain is tearing itself apart. And Paris — Paris
  is throwing the most beautiful, desperate party the world has ever seen,
  because what else is there to do when you can see the storm coming and
  you can't stop it?

geography: >-
  Paris sits in the Île-de-France, straddling the Seine as it curves
  through the city in a broad arc. The river divides the city into the
  Right Bank (north, commerce and money) and the Left Bank (south,
  intellect and art). Twenty arrondissements spiral outward from the
  center like a snail shell, each with its own character, its own
  dangers, and its own unwritten rules. The Métro connects them
  underground — 14 lines by 1930, the arteries of the city. Above
  ground, the boulevards are wide enough for tanks, which is not an
  accident — Haussmann designed them that way after the revolutions.
  Beyond the city limits, the banlieues sprawl into working-class
  suburbs, factory towns, and eventually the French countryside that
  still bears the scars of the Western Front.

cosmology: >-
  God is either dead or on holiday, depending on who you ask. The
  Catholic Church still fills its pews on Sunday but has lost the
  intellectuals. Marxism promises a materialist paradise. Freud says
  the answers are in your dreams. The Surrealists say the answers are
  in automatic writing and random chance. And in certain salons in the
  16th arrondissement, well-dressed people sit around tables in the dark
  and ask the dead for advice. Most of the time, the dead don't answer.
  Most of the time.

factions:
  - name: The Milieu
    description: >-
      The Corsican-dominated organized crime network that controls
      Pigalle, Montmartre's vice trade, gambling, opium, and
      prostitution. Led by figures who operate like businessmen —
      territorial, hierarchical, and absolutely willing to kill over
      a disputed block. The Milieu has arrangements with certain
      police officers and politicians. Everyone knows this. Nobody
      can prove it.
    disposition: hostile

  - name: The Expatriate Circle
    description: >-
      Not a faction in the organized sense — more a loose constellation
      of American writers, Black American performers, Russian émigrés,
      Spanish refugees, and assorted international artists who've washed
      up in Paris because it's the only city in the world where they can
      be who they are. They gather at the cafés of Montparnasse and
      Saint-Germain, share gossip, borrow money, sleep with each other's
      partners, and occasionally produce works of genius. Their social
      networks are vast and informal. Everybody knows everybody.
    disposition: neutral

  - name: The Préfecture de Police
    description: >-
      The Paris police force, headquartered on the Île de la Cité.
      Some officers are honest. Many are bought. All of them are
      overwhelmed. The Préfecture monitors political extremists,
      foreign agents, and organized crime simultaneously, with
      insufficient resources for any of it. The Sûreté Nationale
      handles national security and counter-espionage, operating
      alongside but not always in cooperation with the municipal
      police.
    disposition: wary

  - name: Action Française
    description: >-
      Charles Maurras's far-right nationalist movement — royalist,
      anti-Semitic, anti-democratic, and violently opposed to the
      Third Republic. Their youth wing, the Camelots du Roi, are
      street brawlers who sell newspapers and break heads with equal
      enthusiasm. They have sympathizers in the military, the
      aristocracy, and the Catholic hierarchy. The 6 February 1934
      crisis will prove how dangerous they really are.
    disposition: hostile

  - name: The Popular Front
    description: >-
      The left-wing coalition of communists, socialists, and radical
      republicans that will eventually win the 1936 elections under
      Léon Blum. In the late 1920s they're still organizing — trade
      unions, student groups, factory cells. The PCF (Parti Communiste
      Français) takes orders from Moscow, which makes them effective
      and suspect in equal measure. They control certain working-class
      arrondissements and the industrial banlieues.
    disposition: cautious

  - name: Foreign Intelligence Services
    description: >-
      Paris in the interwar period is the espionage capital of Europe.
      The German Abwehr has agents monitoring French military
      capabilities and cultivating sympathizers. Italian OVRA watches
      anti-fascist exiles. The Soviet NKVD runs networks through the
      PCF and the trade unions. British MI6 maintains a station at the
      embassy. American intelligence barely exists yet but the State
      Department has attachés who ask too many questions. Everyone is
      watching everyone. The embassies of the 16th arrondissement are
      the front line of a quiet war.
    disposition: wary

  - name: The Salon Occultists
    description: >-
      A loose network of wealthy Parisians who host séances, consult
      mediums, collect ancient artifacts, and dabble in Theosophy,
      Martinism, and whatever Aleister Crowley was selling last time
      he passed through town. Most of it is fashionable nonsense —
      bored aristocrats playing with Ouija boards after dinner. But
      some of them have money, connections, and access to things that
      have been locked away in private collections for centuries. And
      occasionally, at the best-attended séances, something happens
      that nobody can quite explain afterward.
    disposition: neutral
