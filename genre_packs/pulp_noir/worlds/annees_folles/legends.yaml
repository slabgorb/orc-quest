- name: The Armistice
  era: "November 11, 1918"
  summary: >-
    The Great War ended in a railway carriage in Compiègne. France won,
    but the victory felt like a funeral. A generation of young men were
    dead or broken. The survivors came home to a country that didn't know
    what to do with them. The celebrations lasted a week. The grief lasted
    a decade.
  cultural_impact: >-
    Every family in Paris lost someone. The war memorials went up on every
    corner and in every village. November 11th became sacred. The veterans
    drink in certain bars and don't talk about what they saw. The phrase
    "plus jamais" — never again — became a prayer that nobody believed.
  affected_cultures:
    - Continental European
    - Anglo-American
  faction_grudges:
    - from: Action Française
      to: The Popular Front
      reason: >-
        The right blames the left for undermining national unity.
        The left blames the right for starting the war. Both are
        partially correct.
    - from: Foreign Intelligence Services
      to: The Préfecture de Police
      reason: >-
        The intelligence services of defeated nations operate in
        Paris with impunity while the French police struggle to
        monitor them.
  monuments:
    - The Tomb of the Unknown Soldier beneath the Arc de Triomphe
    - War memorials in every arrondissement
    - The railway carriage at Compiègne, preserved as a museum
  terrain_scars:
    - type: memorial
      region: opera_grands_boulevards
      name: The Arc de Triomphe Eternal Flame
      description: >-
        The flame that burns day and night for the unknown dead.
        Veterans gather here on November 11th. Wreaths pile up
        in the rain.

- name: The Franc Crisis of 1926
  era: "1924-1926"
  summary: >-
    The French franc collapsed, falling from 5 to 50 against the dollar.
    Savings evaporated. The middle class panicked. American expatriates
    suddenly found they could live like kings on journalist salaries.
    Raymond Poincaré stabilized the currency, but the damage was done —
    nobody trusted the franc anymore, and the class resentment between
    those who lost everything and those who profited from the crash
    became a permanent feature of Parisian politics.
  cultural_impact: >-
    The crisis drew a flood of Americans to Paris — the exchange rate
    made the city irresistible. It also radicalized the French working
    class, who watched their wages buy less every week while foreign
    tourists drank champagne. The seeds of the Popular Front were
    planted in the bitterness of 1926.
  affected_cultures:
    - Continental European
    - Anglo-American
  faction_grudges:
    - from: The Popular Front
      to: The Expatriate Circle
      reason: >-
        Working-class Parisians resent the Americans who treat their
        poverty as a lifestyle accessory.
  monuments:
    - The Bourse (stock exchange) near the Grands Boulevards
  terrain_scars:
    - type: economic
      region: les_halles
      name: The Empty Market Stalls
      description: >-
        During the worst of the crisis, vendors couldn't afford to
        stock their stalls. The gaps in Les Halles told you more
        about the economy than any newspaper.

- name: The Phantom of the Opéra
  era: "1910 (echoes into the 1920s)"
  summary: >-
    Gaston Leroux published his novel in 1910, inspired by real events
    at the Palais Garnier — the chandelier that fell during a performance
    in 1896, the underground lake beneath the building, the labyrinthine
    cellars that nobody has fully mapped. By the 1920s, the story has
    become part of the building's mythology. Stagehands swear they hear
    things in the sub-basements. The management keeps certain doors
    locked and doesn't explain why.
  cultural_impact: >-
    The Palais Garnier's underground spaces became a source of endless
    rumor and speculation. The real underground lake exists. The cellars
    really are labyrinthine. What else might be down there? The Salon
    Occultists have theories. The management has no comment.
  affected_cultures:
    - Continental European
  faction_grudges: []
  monuments:
    - The Palais Garnier opera house
    - The underground lake beneath the building
  terrain_scars:
    - type: architectural
      region: opera_grands_boulevards
      name: The Sub-Basements of the Palais Garnier
      description: >-
        Five levels below the stage. The lowest contains a
        reservoir of water that was never fully drained. Nobody
        goes down there alone. The stories about what lives in
        the dark are probably just stories.

- name: The Dreyfus Affair (Echoes)
  era: "1894-1906 (reverberations through the 1920s-30s)"
  summary: >-
    Captain Alfred Dreyfus, a Jewish officer, was falsely convicted of
    treason in 1894. The affair split France in two — the Dreyfusards
    who fought for justice, and the anti-Dreyfusards who preferred a
    convenient scapegoat to an inconvenient truth. Dreyfus was eventually
    exonerated, but the anti-Semitism the affair revealed never went away.
    It went underground, into Action Française, into the whispered
    complaints about Jewish bankers, into the casual cruelty that the
    Jewish community of the Marais navigates every day.
  cultural_impact: >-
    The affair created a permanent fault line in French politics between
    republican universalism and ethnic nationalism. Action Française was
    born from the anti-Dreyfusard movement. The Jewish community learned
    that assimilation was no protection. The echoes of the affair poison
    every political crisis that involves questions of loyalty, foreignness,
    or betrayal.
  affected_cultures:
    - Continental European
    - Eastern European
  faction_grudges:
    - from: Action Française
      to: The Expatriate Circle
      reason: >-
        The far right views all foreigners — and especially Jews —
        as threats to French national identity.
  monuments:
    - The statue of Dreyfus in the Jardin des Tuileries
  terrain_scars:
    - type: social
      region: marais
      name: Rue des Rosiers
      description: >-
        The heart of Jewish Paris. The shop windows display Hebrew
        lettering. The synagogues fill on Shabbat. And every few
        months, someone paints something ugly on a wall that gets
        cleaned off before morning.

- name: The Catacombs
  era: "1786-present"
  summary: >-
    Beneath Paris lie the ossuary tunnels — the bones of six million
    Parisians transferred from overflowing cemeteries in the 18th
    century. The official tourist route covers a fraction of the
    network. The rest — hundreds of kilometers of tunnels, chambers,
    and passages — is unmapped, illegal to enter, and regularly
    entered anyway. Urban explorers, smugglers, and people who don't
    want to be found use the catacombs. During the occupation,
    both the Resistance and the Germans will establish headquarters
    down there. In the 1920s, the tunnels are just dark, quiet, and
    full of the dead.
  cultural_impact: >-
    The catacombs are Paris's unconscious — everything the city wants
    to forget, buried beneath its feet. The Salon Occultists are
    fascinated by them. The criminals use them. The police avoid them.
    There are rumors of chambers that don't appear on any map, sealed
    off for reasons nobody recorded.
  affected_cultures:
    - Continental European
  faction_grudges: []
  monuments:
    - The official Catacombs entrance at Place Denfert-Rochereau
  terrain_scars:
    - type: subterranean
      region: montparnasse
      name: The Unofficial Entrances
      description: >-
        Manholes, basement passages, forgotten stairways. The
        cataphiles know where they are. So do certain members
        of the Milieu. Getting in is easy. Getting out requires
        knowing the way.
