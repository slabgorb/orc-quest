# World-specific NPC archetypes for Les Années Folles
# These extend the genre-level archetypes with Paris-specific characters

- name: The Expatriate Writer
  description: >-
    American novelist living on the Left Bank, drinking too much, and
    writing about it. Knows everyone in the café circuit. Borrows money
    freely. Capable of surprising insight between the self-pity and the
    hangovers. Inspired by the Lost Generation crowd — not any one
    person, but the type.
  personality_traits:
    - self-destructive
    - perceptive
    - romantically doomed
  typical_classes:
    - Scholar
    - Grifter
  typical_races:
    - Academic
    - Old Money
  stat_ranges:
    Savvy: [12, 16]
    Charm: [14, 16]
  inventory_hints:
    - half-finished manuscript
    - flask of whiskey
    - letters from a New York publisher
  dialogue_quirks:
    - quotes themselves as though their unpublished novel were already a classic
    - orders in fluent French but swears in English when upset
  disposition_default: 15

- name: The Chanteuse
  description: >-
    Black American singer or dancer who found freedom and fame in Paris.
    Commands the stage at Montmartre's best clubs. Moves between the
    worlds of high society and the jazz underground with equal grace.
    Everybody wants to know her. She decides who gets to.
  personality_traits:
    - magnetic
    - politically aware
    - fiercely independent
  typical_classes:
    - Performer
  typical_races:
    - Immigrant
  stat_ranges:
    Charm: [16, 18]
    Nerve: [14, 16]
  inventory_hints:
    - stage costume worth more than most apartments
    - key to a private dressing room
    - letters from admirers she hasn't opened
  dialogue_quirks:
    - switches between English, French, and stage patois depending on who's listening
    - laughs at things that aren't funny as a way of ending conversations she's bored with
  disposition_default: 5

- name: The White Russian
  description: >-
    Former aristocrat or military officer who fled the Revolution.
    Drives a taxi or waits tables while maintaining impeccable manners
    and a title nobody recognizes anymore. Has connections in the émigré
    community and occasionally useful intelligence about Soviet operations.
    Drinks vodka like water and tells stories about a world that no longer
    exists.
  personality_traits:
    - dignified
    - melancholic
    - unexpectedly dangerous
  typical_classes:
    - Soldier of Fortune
    - Grifter
  typical_races:
    - Immigrant
    - Military
  stat_ranges:
    Nerve: [14, 18]
    Finesse: [12, 16]
  inventory_hints:
    - taxi driver's license under a French name
    - a Nagant revolver hidden in a violin case
    - a photograph of a palace that is now a Soviet ministry
  dialogue_quirks:
    - introduces himself with his full title even while wearing a waiter's apron
    - pauses mid-conversation as if listening for something that isn't there anymore
  disposition_default: 0

- name: The Commissaire
  description: >-
    Senior police detective at the Préfecture. Has seen everything Paris
    has to offer and is not impressed. Methodical, patient, and operating
    under political pressure from every direction. May be honest. May be
    practical. The distinction matters less than you'd think when the
    Préfet calls at midnight.
  personality_traits:
    - weary
    - incorruptible or pragmatic (varies)
    - observant
  typical_classes:
    - Detective
  typical_races:
    - Military
    - Street
  stat_ranges:
    Savvy: [16, 18]
    Grit: [14, 16]
  inventory_hints:
    - police credentials and service pistol
    - dossier on someone important
    - a pack of Gauloises and a headache
  dialogue_quirks:
    - asks questions he already knows the answer to, watching your face for the lie
    - rubs the bridge of his nose when you say something he finds particularly stupid
  disposition_default: -10

- name: The Antiquaire
  description: >-
    Dealer in antiquities, rare books, and objects of uncertain
    provenance. Operates from a cluttered shop in the Marais or near
    the Quai Voltaire. Knows the value of everything and the history
    of most of it. Some of the items in the back room have paperwork.
    Some don't. Some shouldn't be in anyone's hands.
  personality_traits:
    - erudite
    - mercenary
    - knows more than they're saying
  typical_classes:
    - Scholar
    - Smuggler
  typical_races:
    - Academic
    - Immigrant
  stat_ranges:
    Savvy: [16, 18]
    Charm: [12, 14]
  inventory_hints:
    - magnifying loupe on a chain
    - ledger with entries in three languages
    - something wrapped in cloth that they don't show to everyone
  dialogue_quirks:
    - handles objects with exaggerated care while discussing their price with casual ruthlessness
    - drops historical facts like threats — "the last person who owned this died in 1453"
  disposition_default: 5

- name: The Camelot du Roi
  description: >-
    Street-level activist for Action Française — part newspaper seller,
    part political enforcer. Young, angry, and convinced that France is
    being destroyed by foreigners, Jews, and democracy. Travels in groups.
    Looks for fights and usually finds them.
  personality_traits:
    - fanatical
    - violent
    - genuinely believes the cause
  typical_classes:
    - Brawler
  typical_races:
    - Street
    - Frontier
  stat_ranges:
    Brawn: [14, 16]
    Nerve: [12, 14]
  inventory_hints:
    - stack of Action Française newspapers
    - a weighted cane
    - pamphlets blaming everything on everyone who isn't French enough
  dialogue_quirks:
    - shouts slogans as punctuation
    - refers to the Republic as though it were a disease
  disposition_default: -30

- name: The Salon Hostess
  description: >-
    Wealthy Parisian woman — or occasionally man — who hosts the city's
    most exclusive gatherings. Art openings, literary readings, political
    dinners, and after midnight, séances. Knows everyone worth knowing
    and several people worth avoiding. Their drawing room is where
    secrets are traded over champagne.
  personality_traits:
    - sophisticated
    - curious
    - dangerously well-connected
  typical_classes:
    - Grifter
    - Performer
  typical_races:
    - Old Money
  stat_ranges:
    Charm: [16, 18]
    Savvy: [14, 16]
  inventory_hints:
    - an invitation list that is also a weapon
    - a collection of artifacts she calls "conversation pieces"
    - a Ouija board in a mahogany box
  dialogue_quirks:
    - touches your arm when she wants something and looks away when she's lying
    - discusses the occult the way other people discuss the weather — casually, but with unexpected knowledge
  disposition_default: 10

- name: The Colonial Student
  description: >-
    Young person from Indochina, North Africa, or the Caribbean,
    studying at the Sorbonne while organizing against the empire that
    educated them. Brilliant, angry, and watched by the police. The
    future leader of a liberation movement, currently eating cheap
    noodles in the Latin Quarter and printing pamphlets that will
    change the world.
  personality_traits:
    - idealistic
    - disciplined
    - lives a double life
  typical_classes:
    - Scholar
    - Smuggler
  typical_races:
    - Immigrant
    - Academic
  stat_ranges:
    Savvy: [14, 16]
    Nerve: [14, 16]
  inventory_hints:
    - student identity card from the Sorbonne
    - banned political literature
    - letters in a language the police can't read
  dialogue_quirks:
    - speaks perfect academic French but drops into their mother tongue when emotional
    - quotes French philosophers back at the French with devastating precision
  disposition_default: -5
