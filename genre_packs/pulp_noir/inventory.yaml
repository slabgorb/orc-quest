currency:
  name: cash
  denominations:
    - coins
    - bills
    - stacks

item_catalog:
  - id: revolver
    name: Revolver
    description: Six shots and a prayer — the standard sidearm of the era.
    category: weapon
    value: 30
    weight: 1.0
    rarity: common
    power_level: 2
    tags: [ranged, firearm, one-handed, concealed]
    lore: Every detective, gangster, and war vet has one in a drawer somewhere.
    narrative_weight: 0.3

  - id: switchblade
    name: Switchblade
    description: Flicks open with a sound that ends conversations.
    category: weapon
    value: 5
    weight: 0.3
    rarity: common
    power_level: 1
    tags: [melee, blade, one-handed, concealed]
    lore: Cheap, quiet, and personal. The street fighter's best friend.
    narrative_weight: 0.1

  - id: tommy_gun
    name: Tommy Gun
    description: The Chicago typewriter — when one side decides the argument is over.
    category: weapon
    value: 200
    weight: 5.0
    rarity: rare
    power_level: 4
    tags: [ranged, firearm, two-handed, automatic]
    lore: Mob weapon. If someone has one of these, things have gone very wrong.
    narrative_weight: 0.7

  - id: leather_jacket
    name: Leather Jacket
    description: Stops a knife if you're lucky, looks good either way.
    category: armor
    value: 15
    weight: 2.0
    rarity: common
    power_level: 1
    tags: [light, torso, concealable]
    lore: Standard issue for anyone who expects trouble after dark.
    narrative_weight: 0.1

  - id: trench_coat
    name: Trench Coat
    description: Conceals a multitude of sins and at least two weapons.
    category: armor
    value: 20
    weight: 2.5
    rarity: common
    power_level: 1
    tags: [light, full-body, concealable]
    lore: Left over from the war. Everyone has one. Everyone looks good in one.
    narrative_weight: 0.2

  - id: hip_flask
    name: Hip Flask
    description: Something strong to steady the nerves. Works once per scene.
    category: consumable
    value: 3
    weight: 0.3
    rarity: common
    power_level: 0
    tags: [drink, courage, social]
    lore: Prohibition or not, nobody goes anywhere without one.
    narrative_weight: 0.2

  - id: first_aid_kit
    name: First Aid Kit
    description: Bandages, iodine, and a prayer. Not magic, but it helps.
    category: consumable
    value: 8
    weight: 1.0
    rarity: common
    power_level: 1
    tags: [healing, medical]
    lore: Basic field medicine. Keeps you moving until you find a real doctor.
    narrative_weight: 0.1

  - id: lockpicks
    name: Lockpicks
    description: A leather roll of slim metal tools for doors that weren't meant to open.
    category: tool
    value: 12
    weight: 0.2
    rarity: uncommon
    power_level: 1
    tags: [stealth, breaking-entering, skill]
    lore: Illegal to carry in most cities. Useful in all of them.
    narrative_weight: 0.2

  - id: press_credentials
    name: Press Credentials
    description: Gets you into places you shouldn't be. May or may not be real.
    category: tool
    value: 5
    weight: 0.1
    rarity: common
    power_level: 1
    tags: [social, access, identity]
    lore: The press goes everywhere. That's the theory, anyway.
    narrative_weight: 0.2

  - id: camera
    name: Camera
    description: Bulky, one flash, and evidence that's hard to argue with.
    category: tool
    value: 25
    weight: 2.0
    rarity: uncommon
    power_level: 1
    tags: [evidence, investigation, bulky]
    lore: Pictures don't lie. Photographers, on the other hand.
    narrative_weight: 0.3

  - id: codebook
    name: Codebook
    description: A cipher key for messages nobody else should read.
    category: tool
    value: 15
    weight: 0.5
    rarity: uncommon
    power_level: 1
    tags: [espionage, communication, intelligence]
    lore: Useless without the matching book. Priceless with it.
    narrative_weight: 0.3

  - id: ancient_artifact
    name: Ancient Artifact
    description: You don't know what it does. Neither does anyone else. That's the problem.
    category: treasure
    value: 0
    weight: 1.0
    rarity: legendary
    power_level: 5
    tags: [occult, mystery, plot-device, unique]
    lore: It was buried for a reason. You dug it up anyway.
    narrative_weight: 0.9

starting_equipment:
