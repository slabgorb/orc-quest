- id: the_heat_is_on
  name: The Heat Is On
  description: >-
    Law enforcement is paying attention. Too many questions asked, too many
    doors kicked in, too many witnesses. Someone in a badge has your name
    on a list and the list is getting shorter.
  category: conflict
  triggers:
    - public violence
    - leaving evidence at a crime scene
    - drawing attention from authorities
  narrative_hints:
    - a patrol car parked outside your usual bar
    - a detective asking your bartender questions
    - your photograph pinned to a precinct board
  tension_level: 0.5
  resolution_hints:
    - go underground until the heat dies down
    - find leverage on the investigating officer
    - get someone else to take the fall
    - cooperate and become an informant
  tags: [law, pressure, exposure]
  escalation:
    - at: 0.2
      event: >-
        A beat cop recognizes your face and watches you a little too long.
        You notice an unmarked car parked near your apartment.
      npcs_involved: [The Inspector]
      stakes: Your movements are being noted.
    - at: 0.4
      event: >-
        An inspector shows up at a place you frequent and starts asking
        about you by name. Your contacts are getting nervous.
      npcs_involved: [The Inspector, The Fixer]
      stakes: Your network is drying up — nobody wants to be seen with you.
    - at: 0.6
      event: >-
        Your apartment is searched while you're out. Things are moved.
        They wanted you to know they were there.
      npcs_involved: [The Inspector]
      stakes: Nowhere feels safe. Evidence could be planted.
    - at: 0.8
      event: >-
        A warrant is issued. Your name is in the papers. Friendly faces
        look the other way when you walk in.
      npcs_involved: [The Inspector, The Journalist]
      stakes: You are a wanted person. Public movement is dangerous.
    - at: 1.0
      event: >-
        A raid. Armed officers at every exit. Someone tipped them off
        about exactly where you'd be tonight.
      npcs_involved: [The Inspector, The Muscle]
      stakes: Arrest or worse. Someone you trusted sold you out.
  passive_progression:
    rate_per_turn: 0.005
    rate_per_day: 0.015
    accelerators:
      - gunshot
      - arrest
      - witness
      - crime scene
      - police
    decelerators:
      - bribe
      - hide
      - disguise
      - lay low
      - alibi
    accelerator_bonus: 0.04
    decelerator_penalty: 0.03

- id: somebodys_talking
  name: Somebody's Talking
  description: >-
    An informant is feeding your business to someone who shouldn't have it.
    Every move you make, they know about it first. Your name keeps showing
    up in conversations you weren't part of.
  category: political
  triggers:
    - trusting a new contact
    - sharing plans with NPCs
    - operating in enemy territory
  narrative_hints:
    - an ambush at a location you mentioned once
    - an NPC knows something only your inner circle should
    - a contact warns you that someone is asking about your schedule
  tension_level: 0.6
  resolution_hints:
    - feed false information to identify the leak
    - confront every suspect until someone breaks
    - turn the informant into a double agent
    - eliminate the leak permanently
  tags: [betrayal, espionage, trust]
  escalation:
    - at: 0.2
      event: >-
        A plan goes wrong in a way that suggests someone knew it in
        advance. Could be coincidence. Probably isn't.
      npcs_involved: [The Fixer]
      stakes: Minor setback, but the pattern is starting.
    - at: 0.4
      event: >-
        An enemy knows details they shouldn't — where you were last
        Tuesday, who you met at the docks. Someone is reporting.
      npcs_involved: [The Emigre]
      stakes: Your operational security is compromised.
    - at: 0.6
      event: >-
        A trusted contact is found dead or missing. They knew too much
        and someone decided to clean up. The informant is still active.
      npcs_involved: [The Fixer, The Muscle]
      stakes: People close to you are in danger.
    - at: 0.8
      event: >-
        You receive evidence of the leak — a partial name, a dropped
        note, a photograph. But it implicates someone you trust.
      npcs_involved: [The Journalist, The Emigre]
      stakes: Confronting the wrong person destroys a key alliance.
    - at: 1.0
      event: >-
        The informant's handler makes a move — a trap set with perfect
        knowledge of your habits, your allies, your safe houses.
        Everything you told anyone is now a weapon aimed at you.
      npcs_involved: [The Don, The Muscle]
      stakes: Total exposure. Your entire network is compromised.
  passive_progression:
    rate_per_turn: 0.008
    rate_per_day: 0.02
    accelerators:
      - trust
      - share plan
      - confide
      - ally
      - meeting
    decelerators:
      - investigate
      - counter-intelligence
      - false trail
      - compartmentalize
    accelerator_bonus: 0.04
    decelerator_penalty: 0.03

- id: the_collection
  name: The Collection
  description: >-
    Someone powerful wants what you have — an artifact, a document, a
    piece of evidence, a debt unpaid. They started with polite offers.
    They've moved past polite.
  category: economic
  triggers:
    - acquiring a valuable item
    - discovering incriminating evidence
    - owing a debt to the wrong person
  narrative_hints:
    - a well-dressed stranger making inquiries about your possessions
    - an envelope with a generous offer and an implicit threat
    - your landlord suddenly doubling the rent
  tension_level: 0.5
  resolution_hints:
    - sell or surrender the item on your terms
    - destroy the item so nobody can have it
    - find out why they want it and use that knowledge as leverage
    - disappear with it and never look back
  tags: [pressure, greed, power, macguffin]
  escalation:
    - at: 0.2
      event: >-
        A polite offer arrives — too much money for what it's worth
        on paper. The messenger implies this is the friendliest
        conversation you'll have on the subject.
      npcs_involved: [The Fixer]
      stakes: Refusing starts a clock.
    - at: 0.4
      event: >-
        The offers stop. Your room is tossed while you're out. Nothing
        taken, but the message is clear — they know where you sleep.
      npcs_involved: [The Muscle]
      stakes: Your living situation is no longer secure.
    - at: 0.6
      event: >-
        Someone close to you is approached — threatened, bribed, or
        both. The collector is applying pressure through your
        relationships.
      npcs_involved: [The Don, The Muscle]
      stakes: Friends and allies become liabilities.
    - at: 0.8
      event: >-
        A professional shows up. Not muscle — someone quiet, competent,
        and patient. They explain exactly what will happen if you don't
        hand it over. They are not bluffing.
      npcs_involved: [The Don]
      stakes: The threat is now existential and specific.
    - at: 1.0
      event: >-
        They come for it. All of them. Whatever diplomatic options
        existed are gone. This ends tonight, one way or another.
      npcs_involved: [The Don, The Muscle]
      stakes: Violence is now unavoidable. The item's fate is decided here.
  passive_progression:
    rate_per_turn: 0.01
    rate_per_day: 0.02
    accelerators:
      - refuse
      - hide item
      - taunt
      - display
      - public
    decelerators:
      - negotiate
      - offer
      - compromise
      - move location
    accelerator_bonus: 0.05
    decelerator_penalty: 0.03

- id: the_shadow_network
  name: The Shadow Network
  description: >-
    Every lead connects to another lead. Every name opens two more doors.
    What started as a simple job is revealing a web of connections between
    people who should have nothing in common. Someone has been pulling
    strings for a very long time.
  category: revelation
  triggers:
    - investigating a conspiracy
    - discovering connections between unrelated events
    - finding coded documents or secret correspondence
  narrative_hints:
    - the same symbol appears in two unrelated locations
    - a dead person's address book contains surprising names
    - a newspaper clipping from ten years ago mirrors today's events exactly
  tension_level: 0.7
  resolution_hints:
    - expose the network to the press and let the public decide
    - infiltrate the network and take it over from inside
    - burn the evidence and walk away — some things are bigger than you
    - bring the evidence to someone powerful enough to act on it
  tags: [conspiracy, investigation, revelation, espionage]
  escalation:
    - at: 0.2
      event: >-
        Two seemingly unrelated cases share a detail — a name, an
        address, a shipping company. Coincidence is possible but
        unlikely.
      npcs_involved: [The Professor]
      stakes: Curiosity. The rabbit hole is open.
    - at: 0.4
      event: >-
        A pattern emerges. Money flowing through shell companies,
        diplomatic pouches carrying undeclared cargo, meetings between
        people who publicly despise each other.
      npcs_involved: [The Professor, The Journalist]
      stakes: You now know enough to be dangerous to someone.
    - at: 0.6
      event: >-
        You find the network's ledger, or its membership list, or its
        communication protocol. The scale is bigger than you imagined.
        Names you recognize — important names — are in it.
      npcs_involved: [The Professor, The Emigre]
      stakes: Possessing this information makes you a target.
    - at: 0.8
      event: >-
        The network knows you know. A warning arrives — elegant,
        specific, and terrifying. They offer you a choice: join,
        forget, or be forgotten.
      npcs_involved: [The Don, The Fixer]
      stakes: Your life is now part of the negotiation.
    - at: 1.0
      event: >-
        The network moves to protect itself. Assets are liquidated,
        witnesses disappear, and someone very senior is making decisions
        about you specifically. The truth is now a race against erasure.
      npcs_involved: [The Don, The Muscle, The Emigre]
      stakes: Everything you've learned could vanish — including you.
  passive_progression:
    rate_per_turn: 0.005
    rate_per_day: 0.01
    accelerators:
      - investigate
      - decode
      - follow lead
      - research
      - connect
    decelerators:
      - ignore
      - destroy evidence
      - stop asking
      - walk away
    accelerator_bonus: 0.04
    decelerator_penalty: 0.02

- id: the_salon_thickens
  name: The Salon Thickens
  description: >-
    It started as parlor entertainment — séances in a wealthy patron's
    drawing room, Ouija boards after dinner, a medium who charges too much.
    But things are happening that shouldn't be possible. Objects moving.
    Voices nobody recognizes. A guest who knew things about the dead that
    nobody told them. The fashionable occult is becoming unfashionable
    quickly. Only activates when the Occult axis is above 0.3.
  category: supernatural
  triggers:
    - attending a séance or occult gathering
    - handling an artifact with unknown properties
    - reading from a text in a language that predates the known ones
  narrative_hints:
    - a socialite cancels her weekly séance without explanation
    - a medium is found in a catatonic state after a session
    - candles extinguishing in a room with no draft
  tension_level: 0.6
  resolution_hints:
    - expose the medium as a fraud and explain everything rationally
    - find the artifact or text responsible and destroy it
    - complete the ritual and face whatever answers
    - seal the source and make sure nobody opens it again
  tags: [occult, supernatural, salon, seance, mystery]
  escalation:
    - at: 0.2
      event: >-
        A séance produces a detail nobody in the room should know —
        a dead soldier's last words, a location that hasn't been
        published. The medium looks as surprised as everyone else.
      npcs_involved: [The Professor]
      stakes: Curiosity and unease. Could be cold reading. Could be more.
    - at: 0.4
      event: >-
        Physical phenomena. A glass shatters without being touched.
        A photograph develops with an extra figure in it. A locked
        room is found rearranged. The rational explanations are
        getting harder to maintain.
      npcs_involved: [The Professor, The Torch Singer]
      stakes: Witnesses are frightened. Some refuse to return.
    - at: 0.6
      event: >-
        Someone who attended the séances begins speaking in a language
        they don't know. A scholar identifies it as pre-Sumerian. The
        person has no memory of speaking it. A symbol keeps appearing
        — scratched into tables, drawn in condensation on windows,
        written in margins of unrelated books.
      npcs_involved: [The Professor]
      stakes: The line between curiosity and danger has been crossed.
    - at: 0.8
      event: >-
        The source is identified — an artifact, a site, a text. It is
        old. Very old. And someone with resources and no scruples has
        decided to pursue it. The fashionable occult has attracted
        serious and dangerous attention.
      npcs_involved: [The Professor, The Don, The Emigre]
      stakes: Powerful people are now involved with something none of them understand.
    - at: 1.0
      event: >-
        The ritual happens — whether the players intended it or not.
        Someone with more ambition than wisdom has assembled the pieces.
        What happens next depends on the Occult axis: at low values,
        a terrifying natural disaster with suspicious timing. At high
        values, something answers. Either way, nothing is the same after.
      npcs_involved: [The Professor, The Don]
      stakes: The climax. The genre's promise is fulfilled or denied.
  passive_progression:
    rate_per_turn: 0.003
    rate_per_day: 0.01
    accelerators:
      - seance
      - ritual
      - artifact
      - occult
      - medium
      - symbol
    decelerators:
      - destroy
      - seal
      - bury
      - debunk
      - rational
    accelerator_bonus: 0.04
    decelerator_penalty: 0.03
