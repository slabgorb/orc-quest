- name: Colonial Cosmopolitan
  description: "People from colonized regions living in European capitals — North African, Middle Eastern, Southeast Asian, Caribbean."
  slots:
    given_name:
      names_file: arabic_female.txt
    family_name:
      names_file: arabic_family.txt
