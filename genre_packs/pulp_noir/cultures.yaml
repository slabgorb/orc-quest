# Pulp Noir uses real-world names from the 1900-1930 era.
# Name lists in names/ directory — no Markov generation for this genre.

- name: Anglo-American
  description: "English-speaking world — American, British, Irish, Australian. The lingua franca of the pulp era."
  slots:
    given_name:
      names_file: english_female.txt
    family_name:
      names_file: english_family.txt
    title:
      word_list: [Mr., Mrs., Miss, Dr., Professor, Captain, Sergeant, Detective, Inspector, Agent, Colonel, Reverend]
    place_noun:
      word_list: [street, avenue, alley, square, hotel, club, bar, wharf, station, bridge, warehouse, theater]
    adjective:
      word_list: [old, grand, royal, black, golden, iron, blind, lost, silver, red]
  person_patterns:
    - "{given_name} {family_name}"
    - "{title} {family_name}"
    - "{title} {given_name} {family_name}"
  place_patterns:
    - "The {adjective} {place_noun}"
    - "{family_name}'s {place_noun}"
    - "The {place_noun} on {given_name} {place_noun}"

- name: Continental European
  description: "French, German, Italian, Spanish — the great powers and their citizens caught between wars."
  slots:
    given_name:
      names_file: french_female.txt
    family_name:
      names_file: french_family.txt
    title:
      word_list: [Monsieur, Madame, Mademoiselle, Herr, Frau, Signore, Signora, Professeur, Doktor, Comte, Baron]
    place_noun:
      word_list: [rue, platz, piazza, boulevard, cafe, cabaret, villa, gare, marche, pont, jardin, palais]
    adjective:
      word_list: [vieux, noir, blanc, petit, grand, beau, rouge, ancien, haut, sombre]
  person_patterns:
    - "{given_name} {family_name}"
    - "{title} {family_name}"
    - "{title} {given_name} {family_name}"
  place_patterns:
    - "Le {adjective} {place_noun}"
    - "{place_noun} {family_name}"
    - "Chez {given_name}"

