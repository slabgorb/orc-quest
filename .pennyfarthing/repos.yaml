# Repository Configuration for SideQuest (Rust rewrite)
# Orchestrator pattern: parent repo tracks sprint files and shared config,
# subrepos (sidequest-api, sidequest-ui) are separate git repos with their own remotes.
# PRs go to individual subrepos, not the parent.

pr_title_format: "{type}({scope}): {title}"

gates:
  extensions:
    tests-fail:
      - wiring-check
    approval:
      - wiring-check

repos:
  orchestrator:
    path: .
    type: orchestrator
    description: Project coordination, sprint management, genre packs, and shared config
    branch_strategy: trunk-based
    default_branch: main

  api:
    path: sidequest-api
    type: api
    description: SideQuest game engine — Rust backend with WebSocket API
    language: rust
    test_command: cargo test
    build_command: cargo build
    lint_command: cargo clippy -- -D warnings
    dev_command: cargo run
    branch_strategy: trunk-based
    default_branch: develop
    notes: |
      Rust game engine ported from Python sq-2.
      Tokio async runtime, axum for HTTP/WebSocket, serde for serialization.
      Claude CLI subprocess calls for LLM integration.

  ui:
    path: sidequest-ui
    type: ui
    description: SideQuest game client — React/TypeScript frontend
    language: typescript
    framework: react
    test_command: vitest
    build_command: tsc -b && vite build
    lint_command: eslint .
    dev_command: vite
    branch_strategy: trunk-based
    default_branch: develop
    notes: |
      React 19 + Vite + TypeScript + Tailwind CSS + shadcn/ui.
      Ported from sq-2/client/.
      Connects to sidequest-api via WebSocket.

  content:
    path: sidequest-content
    type: content
    description: Genre packs, world data, and shared game content (single source of truth)
    branch_strategy: trunk-based
    default_branch: develop
    notes: |
      Genre packs and game content extracted from the orchestrator.
      All repos reference content via sidequest-content/genre_packs/.
      Do not duplicate genre pack files in other repos.

  daemon:
    path: sidequest-daemon
    type: service
    description: SideQuest media daemon — image generation, TTS, audio mixing
    language: python
    test_command: pytest
    build_command: "true"
    lint_command: ruff check .
    dev_command: python -m sidequest_daemon
    branch_strategy: trunk-based
    default_branch: develop
    notes: |
      Python media services extracted from sq-2.
      Renderer daemon (Flux/SDXL), Kokoro TTS, audio mixer,
      scene interpreter, subject extractor, beat filter.
      Communicates with sidequest-api via Unix socket / HTTP.
      Shares genre_packs/ with the Rust API for asset access.
      Out of scope for ADR-082 — serves uses beyond SideQuest.

  server:
    path: sidequest-server
    type: api
    description: SideQuest Python API server — port target of sidequest-api (Rust)
    language: python
    framework: fastapi
    test_command: pytest
    build_command: "true"
    lint_command: ruff check .
    dev_command: uvicorn sidequest.server.app:app --reload
    branch_strategy: trunk-based
    default_branch: develop
    notes: |
      Python FastAPI port of sidequest-api per ADR-082.
      Gitignored inline subrepo — checked out next to sidequest-api
      but not tracked by the orchestrator.
      1:1 crate-to-package mapping preserved during the port to allow
      feature/span/test comparison across trees by path.
      See docs/adr/082-port-api-rust-to-python.md for rationale,
      port strategy, and cut-over plan.
